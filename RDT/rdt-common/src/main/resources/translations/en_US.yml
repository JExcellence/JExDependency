# ============================================
# GUI Buttons
# ============================================

town:
  view_town:
    lore: "Click to view town"

main_overview_ui:
  title: "<gradient:#22c55e:#86efac>🏘 Town Overview</gradient>"
  main_overview:
    name: "<gradient:#10b981:#34d399>🌍 View Towns</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Open to explore all towns on the server!</gradient>"
  create_town:
    name: "<gradient:#f59e0b:#fbbf24>🧱 Create Town</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Open the naming anvil for your new town.</gradient>"
      - "<gradient:#22c55e:#86efac>Submit a valid name to claim a Nexus Block.</gradient>"
  view_town:
    name: "<gradient:#38bdf8:#7dd3fc>🏛 View My Town</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>You are already a member of a town.</gradient>"
      - "<gradient:#22c55e:#86efac>Open your town overview and manage it here.</gradient>"
  join_town:
    name: "<gradient:#22c55e:#86efac>🚪 Join A Town</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Browse towns and send a join request.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requests persist until accepted or declined.</gradient>"
  invite_player:
    name: "<gradient:#f59e0b:#fbbf24>✉ Invite Players</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Invite players who are not in a town.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>TOWN_INVITE</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Invite services are unavailable.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Your town data is unavailable.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to invite players.</gradient>"

server_town_overview:
  title: "<gradient:#10b981:#34d399>🏙 Server Towns</gradient>"
  town:
    open:
      name: "<gradient:#22c55e:#86efac>🏘 %town_name%</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Status:</gradient> <gradient:#22c55e:#86efac>%state%</gradient>"
        - "<gradient:#64748b:#94a3b8>Click to view this town overview.</gradient>"
      state: "<gradient:#22c55e:#86efac>Open Borders ✅</gradient>"
    closed:
      name: "<gradient:#ef4444:#f87171>🚧 %town_name%</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Status:</gradient> <gradient:#ef4444:#f87171>%state%</gradient>"
        - "<gradient:#64748b:#94a3b8>Public permission required: %permission%</gradient>"
        - "<gradient:#64748b:#94a3b8>This town is marked as closed to public viewing.</gradient>"
      state: "<gradient:#ef4444:#f87171>Closed Borders ❌</gradient>"
  message:
    closed_borders: "<gradient:#ef4444:#f87171>⚠ %town_name% has closed borders.</gradient>"
  error:
    system_unavailable: "<gradient:#ef4444:#f87171>⚠ Town services are unavailable. Try again shortly.</gradient>"

town_info_ui:
  title: "<gradient:#22d3ee:#67e8f9>🏷 Town Info</gradient>"
  info:
    name: "<gradient:#38bdf8:#7dd3fc>📘 %town_name% Basics</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Mayor:</gradient> <gradient:#f59e0b:#fbbf24>%mayor_name%</gradient>"
      - "<gradient:#64748b:#94a3b8>Members:</gradient> <gradient:#38bdf8:#7dd3fc>%member_count%</gradient>"
      - "<gradient:#64748b:#94a3b8>Claimed Chunks:</gradient> <gradient:#22c55e:#86efac>%claimed_chunks%</gradient>"
      - "<gradient:#64748b:#94a3b8>Town Level:</gradient> <gradient:#22c55e:#86efac>%town_level%</gradient>"
      - "<gradient:#64748b:#94a3b8>Nexus Chunk:</gradient> <gradient:#38bdf8:#7dd3fc>(%nexus_chunk_x%, %nexus_chunk_z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>Nexus Server:</gradient> <gradient:#22d3ee:#67e8f9>%nexus_server%</gradient>"
      - "<gradient:#64748b:#94a3b8>Status:</gradient> <gradient:#22d3ee:#67e8f9>%active_state%</gradient>"
    state:
      active: "<gradient:#22c55e:#86efac>Active ✅</gradient>"
      inactive: "<gradient:#f59e0b:#fbbf24>Inactive ⏸</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Town Data Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>No town information could be resolved.</gradient>"
  overview:
    name: "<gradient:#22c55e:#86efac>🏛 Open Town Overview</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Open the full management view for this town.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>%permission%</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Overview Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town information is unavailable.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Town services are unavailable.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data could not be resolved.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to open town overview.</gradient>"
  protections:
    name: "<gradient:#22c55e:#86efac>🛡 Town Protections</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Configure protection role requirements for this town.</gradient>"
      - "<gradient:#64748b:#94a3b8>Scope:</gradient> <gradient:#38bdf8:#7dd3fc>%scope%</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>%permission%</gradient>"
    scope:
      town: "<gradient:#22c55e:#86efac>Town-wide 🌐</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Protections Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town information is unavailable.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Protection services are unavailable.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data is unavailable for protections.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to configure protections.</gradient>"

town_chunk_ui:
  title: "<gradient:#22d3ee:#67e8f9>🧱 Chunk Block • %town_name% (%chunk_x%, %chunk_z%)</gradient>"
  chunk:
    name: "<gradient:#38bdf8:#7dd3fc>🗺 Chunk (%chunk_x%, %chunk_z%)</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Town:</gradient> <gradient:#22c55e:#86efac>%town_name%</gradient>"
      - "<gradient:#64748b:#94a3b8>Current Type:</gradient> <gradient:#f59e0b:#fbbf24>%chunk_type%</gradient>"
      - "<gradient:#64748b:#94a3b8>Use the selector to change this chunk type.</gradient>"
  select_type:
    name: "<gradient:#22c55e:#86efac>🧭 Select Chunk Type</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Target Chunk:</gradient> <gradient:#38bdf8:#7dd3fc>(%chunk_x%, %chunk_z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>Current Type:</gradient> <gradient:#f59e0b:#fbbf24>%chunk_type%</gradient>"
      - "<gradient:#64748b:#94a3b8>Click to open paginated chunk types.</gradient>"
  pickup:
    name: "<gradient:#f59e0b:#fbbf24>📦 Pickup Chunk Block</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Chunk:</gradient> <gradient:#38bdf8:#7dd3fc>(%chunk_x%, %chunk_z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>Current Type:</gradient> <gradient:#f59e0b:#fbbf24>%chunk_type%</gradient>"
      - "<gradient:#64748b:#94a3b8>Returns a Chunk Block that keeps this type.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>%permission%</gradient>"
    error:
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to pick up this Chunk Block.</gradient>"
      block_unavailable: "<gradient:#ef4444:#f87171>⚠ This placed Chunk Block could not be validated.</gradient>"
    success:
      given: "<gradient:#22c55e:#86efac>✅ Picked up Chunk Block for (%chunk_x%, %chunk_z%) with type %chunk_type%.</gradient>"
      dropped: "<gradient:#f59e0b:#fbbf24>📦 Inventory full. Chunk Block for (%chunk_x%, %chunk_z%) with type %chunk_type% dropped nearby.</gradient>"
  protections:
    name: "<gradient:#22c55e:#86efac>🛡 Chunk Protections</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Chunk:</gradient> <gradient:#38bdf8:#7dd3fc>(%chunk_x%, %chunk_z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>Configure protection role requirements for this chunk only.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>%permission%</gradient>"
    error:
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to configure chunk protections.</gradient>"
  error:
    system_unavailable: "<gradient:#ef4444:#f87171>⚠ Chunk upgrade services are unavailable.</gradient>"
    town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data is unavailable for this Chunk Block.</gradient>"
    no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to upgrade this Chunk Block.</gradient>"
    chunk_unavailable: "<gradient:#ef4444:#f87171>⚠ This target chunk could not be resolved.</gradient>"

town_chunk_type_ui:
  title: "<gradient:#22c55e:#86efac>🧭 Chunk Types • %town_name% (%chunk_x%, %chunk_z%)</gradient>"
  type:
    name: "<gradient:#38bdf8:#7dd3fc>📌 %chunk_type%</gradient> <gradient:#22d3ee:#67e8f9>(%selected_state%)</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Chunk:</gradient> <gradient:#38bdf8:#7dd3fc>(%chunk_x%, %chunk_z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>State:</gradient> <gradient:#22d3ee:#67e8f9>%selected_state%</gradient>"
      - "<gradient:#64748b:#94a3b8>Click to set this chunk type.</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Chunk Type Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>The target chunk could not be resolved.</gradient>"
    state:
      selected: "<gradient:#22c55e:#86efac>Selected ✅</gradient>"
      not_selected: "<gradient:#94a3b8:#cbd5e1>Not Selected ◻</gradient>"
  message:
    updated: "<gradient:#22c55e:#86efac>✅ Updated chunk (%chunk_x%, %chunk_z%) from %old_type% to %new_type%.</gradient>"
    already_selected: "<gradient:#f59e0b:#fbbf24>⚠ Chunk (%chunk_x%, %chunk_z%) is already set to %chunk_type%.</gradient>"
  error:
    system_unavailable: "<gradient:#ef4444:#f87171>⚠ Chunk type services are unavailable.</gradient>"
    town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data is unavailable for chunk type updates.</gradient>"
    no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to change chunk types.</gradient>"
    chunk_unavailable: "<gradient:#ef4444:#f87171>⚠ Could not resolve the target chunk.</gradient>"
    block_unavailable: "<gradient:#ef4444:#f87171>⚠ Could not validate the placed Chunk Block for this chunk.</gradient>"

town_protections_ui:
  title: "<gradient:#22d3ee:#67e8f9>🛡 Protections • %town_name% (%scope_label%)</gradient>"
  protection:
    name: "<gradient:#38bdf8:#7dd3fc>🧩 %protection%</gradient> <gradient:#22c55e:#86efac>(%required_role%)</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Scope:</gradient> <gradient:#38bdf8:#7dd3fc>%scope_label%</gradient>"
      - "<gradient:#64748b:#94a3b8>Source:</gradient> <gradient:#38bdf8:#7dd3fc>%source_state%</gradient>"
      - "<gradient:#64748b:#94a3b8>Required Role:</gradient> <gradient:#22c55e:#86efac>%required_role%</gradient>"
      - "<gradient:#64748b:#94a3b8>Click to cycle the required role.</gradient>"
    source:
      town: "<gradient:#22c55e:#86efac>Town Default 🌐</gradient>"
      chunk: "<gradient:#f59e0b:#fbbf24>Chunk Override 📍</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Protection Entry Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town data could not be resolved.</gradient>"
  scope:
    town: "<gradient:#22c55e:#86efac>Town-wide 🌐</gradient>"
    chunk: "<gradient:#f59e0b:#fbbf24>Chunk-only 📍</gradient>"
  back:
    name: "<gradient:#f59e0b:#fbbf24>↩ Back</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Return to the previous view.</gradient>"
  message:
    updated: "<gradient:#22c55e:#86efac>✅ Updated %protection% to require %required_role% (%scope_label%).</gradient>"
  error:
    system_unavailable: "<gradient:#ef4444:#f87171>⚠ Protection services are unavailable.</gradient>"
    town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data is unavailable for this view.</gradient>"
    no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to configure protections.</gradient>"
    chunk_unavailable: "<gradient:#ef4444:#f87171>⚠ Target chunk data is unavailable for chunk protections.</gradient>"
    no_roles: "<gradient:#ef4444:#f87171>⚠ No roles are available to assign protections.</gradient>"

town_overview_ui:
  title: "<gradient:#22c55e:#86efac>🏛 Town Overview</gradient>"
  info:
    name: "<gradient:#f59e0b:#fbbf24>🧭 Nexus Status for %town_name%</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Placed State: %placed_state%</gradient>"
      - "<gradient:#64748b:#94a3b8>Nexus Location: %world% (%x%, %y%, %z%)</gradient>"
      - "<gradient:#64748b:#94a3b8>Nexus Server:</gradient> <gradient:#22d3ee:#67e8f9>%nexus_server%</gradient>"
      - "<gradient:#64748b:#94a3b8>Town Level:</gradient> <gradient:#22c55e:#86efac>%town_level% ➜ %next_level%</gradient>"
    state:
      placed: "<gradient:#22c55e:#86efac>Placed ✅</gradient>"
      unplaced: "<gradient:#ef4444:#f87171>Not Placed ❌</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Town Data Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>No town data could be resolved for this view.</gradient>"
  pickup:
    name: "<gradient:#38bdf8:#7dd3fc>📦 Pickup Nexus for %town_name%</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Mayor-only action.</gradient>"
      - "<gradient:#64748b:#94a3b8>Reclaims the placed Nexus Block.</gradient>"
      - "<gradient:#64748b:#94a3b8>Use this before moving your nexus location.</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Nexus Pickup Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town data could not be resolved.</gradient>"
    not_placed:
      name: "<gradient:#94a3b8:#cbd5e1>🧱 No Nexus To Pickup</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>This town does not currently have a placed nexus.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Town services are unavailable. Try again shortly.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data could not be loaded for pickup.</gradient>"
      not_mayor: "<gradient:#ef4444:#f87171>⚠ Only the mayor can pick up the town nexus block.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to pick up the town nexus block.</gradient>"
      not_placed: "<gradient:#ef4444:#f87171>⚠ This town does not have a placed nexus block.</gradient>"
      invalid_location: "<gradient:#ef4444:#f87171>⚠ Nexus location is invalid. Contact staff.</gradient>"
    success:
      given: "<gradient:#22c55e:#86efac>✅ Picked up the nexus block for %town_name%.</gradient>"
      dropped: "<gradient:#f59e0b:#fbbf24>📦 Inventory full. Nexus block for %town_name% dropped nearby.</gradient>"
  roles:
    name: "<gradient:#38bdf8:#7dd3fc>📚 Manage Roles for %town_name%</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>View, create, and remove town roles.</gradient>"
      - "<gradient:#64748b:#94a3b8>Mayor controls add/delete actions.</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Roles Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town data could not be loaded.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Role services are unavailable. Try again shortly.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Could not resolve town data for role management.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to manage town roles.</gradient>"
  pending_join:
    name: "<gradient:#22d3ee:#67e8f9>🕒 Pending Join Requests</gradient>"
    lore:
      - "<gradient:#64748b:#94a3b8>Current requests:</gradient> <gradient:#38bdf8:#7dd3fc>%pending_count%</gradient>"
      - "<gradient:#64748b:#94a3b8>Left Click accept, Right Click decline in next view.</gradient>"
      - "<gradient:#64748b:#94a3b8>Requires permission:</gradient> <gradient:#38bdf8:#7dd3fc>%permission%</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Pending Requests Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town data could not be loaded.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Pending request services are unavailable.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Could not resolve town data for pending requests.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to manage join requests.</gradient>"
