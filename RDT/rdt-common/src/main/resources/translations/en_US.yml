prefix: "<gradient:#0ea5e9:#38bdf8>[RDT]</gradient> "

prt:
  spawn:
    unavailable: "<red>Your town spawn is unavailable right now.</red>"
  bank:
    no_town: "<red>You must belong to a town to use the remote town bank.</red>"
    locked: "<yellow>Your town has not unlocked remote bank access yet.</yellow>"

town_spawn:
  transfer_requested: "<yellow>Sending you to the town spawn server <white>{target_server}</white><yellow>.</yellow>"
  started: "<yellow>Town spawn warmup started. Teleporting in <white>{seconds}</white><yellow> seconds.</yellow>"
  teleported: "<green>Teleported to <white>{town}</white><green>.</green>"

nexus_block:
  name: "<gradient:#22c55e:#84cc16>[Nexus]</gradient> <white>{town}</white>"
  lore:
    - "<gray>Place this block to found your town.</gray>"
    - "<gray>Town:</gray> <white>{town}</white>"
    - "<gray>Color:</gray> <white>{town_color}</white>"

chunk_block:
  name: "<gradient:#f59e0b:#fbbf24>[Chunk Block]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this in the assigned chunk to claim it.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"

block_listener:
  nexus:
    pickup:
      unsupported: "<red>The active town nexus cannot be picked up yet.</red>"
    place:
      denied: "<red>You cannot place a nexus that does not belong to you.</red>"
      failed: "<red>Town creation failed. Make sure the chunk is unclaimed and your town data is valid.</red>"
      success: "<green>Town <white>{town_name}</white><green> has been founded.</green>"
    open:
      denied: "<red>Only members of this town can access its nexus.</red>"
      failed: "<red>Unable to validate nexus governance access. Return to the nexus and try again.</red>"
  chunk:
    pickup:
      denied: "<red>You do not have permission to pick up this chunk marker.</red>"
      failed: "<red>That chunk could not be unclaimed.</red>"
      success: "<green>Returned the chunk block for <white>{chunk_x}, {chunk_z}</white><green>.</green>"
    place:
      denied: "<red>You do not have permission to place town chunk markers.</red>"
      failed: "<red>That chunk claim could not be finalized here.</red>"
      success: "<green>Claimed chunk <white>{chunk_x}, {chunk_z}</white><green>.</green>"

town_protection_listener:
  break:
    denied: "<red>You cannot break blocks in this town.</red>"
  place:
    denied: "<red>You cannot place blocks in this town.</red>"
  interact:
    denied: "<red>You cannot use that here.</red>"

town_hub_ui:
  title: "<gradient:#0ea5e9:#38bdf8>Town Hub</gradient>"
  summary:
    name: "<gold>Town Status</gold>"
    lore:
      - "<gray>Current town:</gray> <white>{town_name}</white>"
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Use this hub to browse, manage, or found a town.</yellow>"
  my_town:
    name: "<aqua>My Town</aqua>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Claimed chunks:</gray> <white>{chunk_count}</white>"
      - "<yellow>Open the remote town overview.</yellow>"
    locked:
      name: "<red>No Town</red>"
      lore:
        - "<gray>You are not part of a town yet.</gray>"
  directory:
    name: "<gold>Town Directory</gold>"
    lore:
      - "<gray>Browse every town on the server.</gray>"
  invites:
    name: "<gold>Invites</gold>"
    lore:
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Click to review invitations.</yellow>"
  create:
    name: "<green>Create Town</green>"
    lore:
      - "<gray>Start the GUI-only town creation flow.</gray>"
      - "<gray>You will name your town, choose a color,</gray>"
      - "<gray>then receive a Nexus Block to place.</gray>"
    locked:
      name: "<gray>Create Locked</gray>"
      lore:
        - "<gray>Leave your current town before creating a new one.</gray>"

town_create_name_ui:
  title: "<gradient:#22c55e:#84cc16>Town Name</gradient>"
  input:
    lore:
      - "<gray>Enter the name for your town.</gray>"
  error:
    invalid_input: "<red>Enter a town name between 1 and 32 characters.</red>"
    processing_failed: "<red>That town name could not be processed.</red>"

town_create_color_ui:
  title: "<gradient:#38bdf8:#60a5fa>Town Color</gradient>"
  input:
    lore:
      - "<gray>Enter a Minecraft color like LIGHT_BLUE</gray>"
      - "<gray>or a hex value like #55c7ff.</gray>"
  error:
    invalid_input: "<red>Enter a valid Minecraft color name or hex code.</red>"
    processing_failed: "<red>That town color could not be processed.</red>"

town_create_confirm_ui:
  title: "<gradient:#22c55e:#84cc16>Confirm Town</gradient>"
  summary:
    name: "<gold>Town Draft</gold>"
    lore:
      - "<gray>Name:</gray> <white>{town_name}</white>"
      - "<gray>Color:</gray> <white>{town_color}</white>"
      - "<yellow>Confirm to receive your Nexus Block.</yellow>"
  confirm:
    name: "<green>Confirm</green>"
    lore:
      - "<gray>Give me the Nexus Block for this town.</gray>"
  cancel:
    name: "<red>Cancel</red>"
    lore:
      - "<gray>Return to the Town Hub without creating anything.</gray>"
  confirmed: "<green>Created the draft for <white>{town_name}</white><green> and gave you its Nexus Block.</green>"
  place_hint: "<yellow>Place the Nexus Block to finalize your town location and claim your first chunk.</yellow>"
  error:
    already_in_town: "<red>You are already in a town.</red>"

town_directory_ui:
  title: "<gradient:#38bdf8:#60a5fa>Town Directory</gradient>"
  summary:
    name: "<gold>Server Towns</gold>"
    lore:
      - "<gray>Total towns:</gray> <white>{town_count}</white>"
  entry:
    name: "<aqua>{town_name}</aqua>"
    lore:
      - "<gray>Members:</gray> <white>{member_count}</white>"
      - "<gray>Chunks:</gray> <white>{chunk_count}</white>"
      - "<gray>Level:</gray> <white>{town_level}</white>"
      - "<gray>Archetype:</gray> <white>{archetype}</white>"
      - "<yellow>Click to inspect this town.</yellow>"
  empty:
    name: "<red>No Towns</red>"
    lore:
      - "<gray>No towns have been founded yet.</gray>"

town_invites_ui:
  title: "<gradient:#f59e0b:#fbbf24>Town Invites</gradient>"
  summary:
    name: "<gold>Invite Inbox</gold>"
    lore:
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Click an invite to accept it.</yellow>"
  entry:
    name: "<aqua>{town_name}</aqua>"
    lore:
      - "<gray>Mayor UUID:</gray> <white>{mayor_uuid}</white>"
      - "<yellow>Click to join this town.</yellow>"
  empty:
    name: "<red>No Invites</red>"
    lore:
      - "<gray>You have no active town invites.</gray>"
  accepted: "<green>You joined <white>{town_name}</white><green>.</green>"
  accept_failed: "<red>That invite could not be accepted.</red>"

town_overview_ui:
  title: "<gradient:#22c55e:#84cc16>Town Overview</gradient>"
  summary:
    name: "<gold>{town_name}</gold>"
    lore:
      - "<gray>Chunks:</gray> <white>{chunk_count}</white>"
      - "<gray>Members:</gray> <white>{member_count}</white>"
      - "<gray>Town level:</gray> <white>{town_level}</white>"
      - "<gray>Archetype:</gray> <white>{archetype}</white>"
      - "<gray>Access mode:</gray> <white>{access_mode}</white>"
      - "<gray>Governance:</gray> <white>{governance_state}</white>"
  claims:
    name: "<gold>Claims</gold>"
    lore:
      - "<gray>Claimed chunks:</gray> <white>{chunk_count}</white>"
      - "<yellow>Open the claim map.</yellow>"
    locked:
      lore:
        - "<gray>Only town members can manage claims.</gray>"
  bank:
    name: "<gold>Town Bank</gold>"
    lore:
      - "<gray>Vault balance:</gray> <white>{vault_balance}</white>"
      - "<gray>Stored slots used:</gray> <white>{storage_slots}</white>"
      - "<yellow>Open the bank summary.</yellow>"
    locked:
      lore:
        - "<gray>Only town members can open the bank view.</gray>"
  chunk:
    name: "<gold>Current Chunk</gold>"
    lore:
      - "<gray>Open the chunk view for the claimed chunk you are standing in.</gray>"
    locked:
      lore:
        - "<gray>Only town members can inspect claimed chunks from here.</gray>"
    not_in_chunk: "<red>You must stand inside one of your town's claimed chunks to open that chunk view.</red>"
  protections:
    name: "<gold>Protections</gold>"
    lore:
      - "<gray>Security chunk detected.</gray>"
      - "<yellow>Edit town or chunk protection thresholds.</yellow>"
    locked:
      name: "<gray>Protections Locked</gray>"
      lore:
        - "<gray>You need a Security chunk before protections can be edited.</gray>"
  archetype:
    name: "<gold>Archetype</gold>"
    lore:
      - "<gray>Current archetype:</gray> <white>{archetype}</white>"
      - "<gray>Cooldown:</gray> <white>{cooldown_remaining}</white>"
      - "<yellow>Click to choose the town archetype.</yellow>"
    locked:
      lore:
        - "<gray>Return to your nexus to change the town archetype.</gray>"
    updated: "<green>Town archetype updated to <white>{archetype}</white><green>.</green>"
    cooldown: "<red>Town archetype is on cooldown for <white>{remaining}</white><red>.</red>"
    failed: "<red>The town archetype could not be updated right now.</red>"
  rename:
    name: "<gold>Rename Town</gold>"
    lore:
      - "<gray>Rename your town from the nexus.</gray>"
    locked:
      lore:
        - "<gray>Return to your nexus to rename the town.</gray>"
    success: "<green>Town renamed to <white>{town_name}</white><green>.</green>"
    failed: "<red>That town name could not be applied.</red>"
  upgrade:
    name: "<gold>Upgrade Town</gold>"
    lore:
      - "<gray>Current level:</gray> <white>{town_level}</white>"
      - "<yellow>Click to upgrade the town level.</yellow>"
    locked:
      lore:
        - "<gray>Return to your nexus to upgrade the town.</gray>"
    success: "<green>Town upgraded successfully. New level: <white>{town_level}</white><green>.</green>"
    failed: "<red>The town could not be upgraded right now.</red>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>That town could not be loaded.</gray>"
  governance:
    return_to_nexus: "<red>Return to your town nexus to use that governance action.</red>"

town_archetype_ui:
  title: "<gradient:#f59e0b:#fbbf24>Choose Archetype</gradient>"
  summary:
    name: "<gold>Archetype Selector</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Current archetype:</gray> <white>{archetype}</white>"
      - "<yellow>Select the archetype you want for this town.</yellow>"
  entry:
    name: "<gold>{archetype}</gold>"
    selected_lore:
      - "<gray>Archetype:</gray> <white>{archetype}</white>"
      - "<green>This town already uses this archetype.</green>"
    available_lore:
      - "<gray>Archetype:</gray> <white>{archetype}</white>"
      - "<yellow>Click to apply this archetype.</yellow>"
  selected: "<green>Town archetype updated to <white>{archetype}</white><green>.</green>"
  selection_failed: "<red>The town archetype could not be updated right now.</red>"
  already_selected: "<yellow>This town already uses <white>{archetype}</white><yellow>.</yellow>"
  cooldown: "<red>Town archetype is on cooldown for <white>{remaining}</white><red>.</red>"
  no_permission: "<red>You do not have permission to change the town archetype.</red>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>That town could not be loaded.</gray>"

town_bank_ui:
  title: "<gradient:#f59e0b:#fbbf24>Town Bank</gradient>"
  summary:
    name: "<gold>Bank Summary</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Stored slots used:</gray> <white>{storage_slots}</white>"
  balance:
    name: "<gold>Balances</gold>"
    lore:
      - "<gray>Vault balance:</gray> <white>{vault_balance}</white>"
      - "<gray>Tracked currencies:</gray> <white>{currency_count}</white>"
  access:
    remote:
      name: "<aqua>Remote Access</aqua>"
      lore:
        - "<gray>This bank view was opened through remote access.</gray>"
    local:
      name: "<gold>Local Access</gold>"
      lore:
        - "<gray>This bank view was opened through a town menu or bank chunk.</gray>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>That town bank is unavailable.</gray>"

town_chunk_ui:
  title: "<gradient:#38bdf8:#60a5fa>Town Chunk</gradient>"
  summary:
    name: "<gold>Chunk Summary</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
      - "<gray>Type:</gray> <white>{chunk_type}</white>"
      - "<gray>Level:</gray> <white>{chunk_level}</white>"
  type:
    name: "<gold>Chunk Type</gold>"
    lore:
      - "<gray>Current type:</gray> <white>{chunk_type}</white>"
      - "<yellow>Click to choose the chunk type.</yellow>"
    locked:
      lore:
        - "<gray>You do not have permission to change chunk types.</gray>"
    no_permission: "<red>You do not have permission to change chunk types.</red>"
    changed: "<green>Chunk type changed to <white>{chunk_type}</white><green>.</green>"
    failed: "<red>The chunk type could not be changed.</red>"
  protections:
    name: "<gold>Chunk Protections</gold>"
    lore:
      - "<gray>Edit chunk-specific protection overrides.</gray>"
    locked:
      lore:
        - "<gray>A Security chunk is required before protections can be edited.</gray>"
  info:
    name: "<gold>Chunk Info</gold>"
    lore:
      - "<gray>World:</gray> <white>{world_name}</white>"
      - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
      - "<gray>Level:</gray> <white>{chunk_level}</white>"
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the previous town view.</gray>"
  missing:
    name: "<red>Chunk Missing</red>"
    lore:
      - "<gray>That chunk could not be loaded.</gray>"

head:
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the previous town view.</gray>"

town_protections_ui:
  title: "<gradient:#ef4444:#f87171>Town Protections</gradient>"
  summary:
    name: "<gold>Protection Summary</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Scope:</gray> <white>{scope}</white>"
      - "<gray>Security:</gray> <white>{security_state}</white>"
  mode:
    name: "<gold>Editing Scope</gold>"
    lore:
      - "<gray>Current scope:</gray> <white>{scope}</white>"
      - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
      - "<yellow>Click to switch between town-global and chunk scopes.</yellow>"
  entry:
    name: "<gold>{protection}</gold>"
    lore:
      - "<gray>Required role:</gray> <white>{role}</white>"
      - "<gray>Status:</gray> <white>{state}</white>"
      - "<yellow>Click to cycle the threshold.</yellow>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>The protection editor could not load this town.</gray>"
  locked:
    security_required: "<red>You need at least one Security chunk before protections can be edited.</red>"
  updated: "<green>Updated <white>{protection}</white><green> to <white>{role}</white><green>.</green>"
  update_failed: "<red>The protection could not be updated.</red>"

town_protection_scope_ui:
  title: "<gradient:#38bdf8:#60a5fa>Select Scope</gradient>"
  summary:
    name: "<gold>Scope Selector</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Current scope:</gray> <white>{current_scope}</white>"
      - "<gray>Available scopes:</gray> <white>{scope_count}</white>"
  entry:
    global:
      name: "<gold>Town Global</gold>"
      selected_lore:
        - "<green>You are already editing the town-global protections.</green>"
      available_lore:
        - "<gray>Edit protections that apply to the whole town.</gray>"
        - "<yellow>Click to switch to the town-global scope.</yellow>"
    chunk:
      name: "<gold>{world_name} <white>{chunk_x}, {chunk_z}</white></gold>"
      selected_lore:
        - "<gray>World:</gray> <white>{world_name}</white>"
        - "<gray>Type:</gray> <white>{chunk_type}</white>"
        - "<green>You are already editing this chunk.</green>"
      available_lore:
        - "<gray>World:</gray> <white>{world_name}</white>"
        - "<gray>Type:</gray> <white>{chunk_type}</white>"
        - "<yellow>Click to edit protections for this chunk.</yellow>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>The scope selector could not load this town.</gray>"

town_claims_ui:
  title: "<gradient:#22c55e:#84cc16>Claims</gradient>"
  summary:
    name: "<gold>Claim Info</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Claimed chunks:</gray> <white>{chunk_count}</white>"
      - "<gray>Focus chunk:</gray> <white>{center_x}, {center_z}</white>"
  navigation:
    north:
      name: "<gold>North</gold>"
      lore:
        - "<gray>Shift the claim map north.</gray>"
    south:
      name: "<gold>South</gold>"
      lore:
        - "<gray>Shift the claim map south.</gray>"
    east:
      name: "<gold>East</gold>"
      lore:
        - "<gray>Shift the claim map east.</gray>"
    west:
      name: "<gold>West</gold>"
      lore:
        - "<gray>Shift the claim map west.</gray>"
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the previous town view.</gray>"
  recenter:
    name: "<gold>Center View</gold>"
    lore:
      - "<gray>Re-center the claim map on your current chunk.</gray>"
  chunk:
    claimed:
      name: "<green>Claimed</green>"
      lore:
        - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
        - "<gray>Type:</gray> <white>{chunk_type}</white>"
        - "<yellow>Click to inspect this chunk.</yellow>"
    claimable:
      name: "<yellow>Claimable</yellow>"
      lore:
        - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
        - "<yellow>Click to receive a Chunk Block for this claim.</yellow>"
    blocked:
      name: "<red>Out of Range</red>"
      lore:
        - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
        - "<gray>Claims must stay adjacent to your town.</gray>"
  missing:
    name: "<red>Town Missing</red>"
    lore:
      - "<gray>The claim map could not load this town.</gray>"
  claim:
    adjacent_only: "<red>You can only claim chunks that touch your current territory.</red>"
    no_permission: "<red>You do not have permission to claim chunks.</red>"
    granted: "<green>Received a Chunk Block for <white>{chunk_x}, {chunk_z}</white><green>.</green>"
    place_hint: "<yellow>Place that Chunk Block in <white>{chunk_x}, {chunk_z}</white><yellow> to claim the plot.</yellow>"

town_chunk_type_ui:
  title: "<gradient:#f59e0b:#fbbf24>Choose Chunk Type</gradient>"
  summary:
    name: "<gold>Chunk Type Selector</gold>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
      - "<gray>Current type:</gray> <white>{chunk_type}</white>"
      - "<yellow>Select a specialization for this claimed chunk.</yellow>"
  entry:
    name: "<gold>{chunk_type}</gold>"
    selected_lore:
      - "<gray>Type:</gray> <white>{chunk_type}</white>"
      - "<green>This chunk already uses this type.</green>"
    available_lore:
      - "<gray>Type:</gray> <white>{chunk_type}</white>"
      - "<yellow>Click to set this chunk to {chunk_type}.</yellow>"
  selected: "<green>Chunk type changed to <white>{chunk_type}</white><green>.</green>"
  selection_failed: "<red>The chunk type could not be changed.</red>"
  already_selected: "<yellow>This chunk is already set to <white>{chunk_type}</white><yellow>.</yellow>"
  missing:
    name: "<red>Chunk Missing</red>"
    lore:
      - "<gray>That chunk could not be loaded.</gray>"

town_rename_ui:
  title: "<gradient:#f59e0b:#fbbf24>Rename Town</gradient>"
  input:
    lore:
      - "<gray>Enter the new name for your town.</gray>"
  error:
    invalid_input: "<red>Enter a town name between 1 and 32 characters.</red>"
    processing_failed: "<red>That town name could not be processed.</red>"
