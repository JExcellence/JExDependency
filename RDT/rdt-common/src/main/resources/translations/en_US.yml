prefix: "<gradient:#0ea5e9:#38bdf8>[RDT]</gradient> "

prt:
  spawn:
    unavailable: "<red>Your town spawn is unavailable right now.</red>"
  bank:
    no_town: "<red>You must belong to a town to use the remote town bank.</red>"
    locked: "<yellow>Your town has not unlocked remote bank access yet.</yellow>"

town_spawn:
  transfer_requested: "<yellow>Sending you to the town spawn server <white>{target_server}</white><yellow>.</yellow>"
  started: "<yellow>Town spawn warmup started. Teleporting in <white>{seconds}</white><yellow> seconds.</yellow>"
  teleported: "<green>Teleported to <white>{town}</white><green>.</green>"

nexus_block:
  name: "<gradient:#22c55e:#84cc16>[Nexus]</gradient> <white>{town}</white>"
  lore:
    - "<gray>Place this block to found your town.</gray>"
    - "<gray>Town:</gray> <white>{town}</white>"

chunk_block:
  name: "<gradient:#f59e0b:#fbbf24>[Chunk Block]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this in the assigned chunk to claim it.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"

fuel_tank:
  name: "<gradient:#ef4444:#f97316>[Fuel Tank]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this chest inside its Security chunk.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
    - "<yellow>Only configured fuel items can be stored here.</yellow>"
  place:
    denied: "<red>You do not have permission to place Security fuel tanks.</red>"
    failed: "<red>That fuel tank could not be placed here.</red>"
    invalid_location: "<red>The fuel tank must be inside its Security chunk and within the configured radius of the chunk block.</red>"
    double_chest: "<red>Fuel tanks cannot form double chests.</red>"
    success: "<green>Fuel tank placed for this Security chunk.</green>"
    warning: "<yellow>Security features will not work until fuel is supplied.</yellow>"
  break:
    denied: "<red>Placed fuel tanks must be picked up from the Security chunk view.</red>"
  inventory:
    only_fuel: "<red>Only configured fuel items can be placed in the fuel tank.</red>"

block_listener:
  nexus:
    pickup:
      unsupported: "<red>The active town nexus cannot be picked up yet.</red>"
    place:
      denied: "<red>You cannot place a nexus that does not belong to you.</red>"
      failed: "<red>Town creation failed. Make sure the chunk is unclaimed and your town data is valid.</red>"
      success: "<green>Town <white>{town_name}</white><green> has been founded.</green>"
    open:
      denied: "<red>Only members of this town can access its nexus.</red>"
      failed: "<red>Unable to validate nexus governance access. Return to the nexus and try again.</red>"
  chunk:
    pickup:
      denied: "<red>You do not have permission to pick up this chunk marker.</red>"
      failed: "<red>That chunk could not be unclaimed.</red>"
      success: "<green>Returned the chunk block for <white>{chunk_x}, {chunk_z}</white><green>.</green>"
    place:
      denied: "<red>You do not have permission to place town chunk markers.</red>"
      failed: "<red>That chunk claim could not be finalized here.</red>"
      success: "<green>Claimed chunk <white>{chunk_x}, {chunk_z}</white><green>.</green>"

town_protection_listener:
  break:
    denied: "<red>You cannot break blocks in this town.</red>"
  place:
    denied: "<red>You cannot place blocks in this town.</red>"
  interact:
    denied: "<red>You cannot use that here.</red>"

town_hub_ui:
  title: "<gradient:#0ea5e9:#38bdf8>Town Hub</gradient>"
  summary:
    name: "<gold>Town Status</gold>"
    lore:
      - "<gray>Current town:</gray> <white>{town_name}</white>"
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Use this hub to browse, manage, or found a town.</yellow>"
  my_town:
    name: "<aqua>My Town</aqua>"
    lore:
      - "<gray>Town:</gray> <white>{town_name}</white>"
      - "<gray>Claimed chunks:</gray> <white>{chunk_count}</white>"
      - "<yellow>Open the remote town overview.</yellow>"
    locked:
      name: "<red>No Town</red>"
      lore:
        - "<gray>You are not part of a town yet.</gray>"
  directory:
    name: "<gold>Town Directory</gold>"
    lore:
      - "<gray>Browse every town on the server.</gray>"
  invites:
    name: "<gold>Invites</gold>"
    lore:
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Click to review invitations.</yellow>"
  create:
    name: "<green>Create Town</green>"
    lore:
      - "<gray>Open the creation requirements and rewards.</gray>"
      - "<gray>Complete the turn-ins, name your town,</gray>"
      - "<gray>and receive a Nexus Block to place.</gray>"
    locked:
      name: "<gray>Create Locked</gray>"
      lore:
        - "<gray>Leave your current town before creating a new one.</gray>"

town_create_name_ui:
  title: "<gradient:#22c55e:#84cc16>Town Name</gradient>"
  input:
    lore:
      - "<gray>Enter the name for your town.</gray>"
  error:
    invalid_input: "<red>Enter a town name between 1 and 32 characters.</red>"
    processing_failed: "<red>That town name could not be processed.</red>"

town_create_confirm_ui:
  title: "<gradient:#22c55e:#84cc16>Confirm Town</gradient>"
  summary:
    name: "<gold>Town Draft</gold>"
    lore:
      - "<gray>Name:</gray> <white>{town_name}</white>"
      - "<yellow>Confirm to receive your Nexus Block.</yellow>"
  confirm:
    name: "<green>Confirm</green>"
    lore:
      - "<gray>Give me the Nexus Block for this town.</gray>"
  cancel:
    name: "<red>Cancel</red>"
    lore:
      - "<gray>Return to the town creation menu.</gray>"
  confirmed: "<green>Created the draft for <white>{town_name}</white><green> and gave you its Nexus Block.</green>"
  place_hint: "<yellow>Place the Nexus Block to finalize your town location and claim your first chunk.</yellow>"
  error:
    already_in_town: "<red>You are already in a town.</red>"
    requirements_incomplete: "<red>Finish the town creation requirements before confirming a town.</red>"

town_creation_ui:
  title: "<gradient:#22c55e:#84cc16>Town Creation</gradient>"
  summary:
    name: "<gold>Creation Progress</gold>"
    lore:
      - "<gray>Status:</gray> <white>{ready_state}</white>"
      - "<gray>Requirements:</gray> <white>{requirement_count}</white>"
      - "<gray>Rewards:</gray> <white>{reward_count}</white>"
      - "<gray>Progress:</gray> <white>{progress_percent}%</white>"
  requirements:
    name: "<gold>Requirements</gold>"
    lore:
      - "<gray>Entries:</gray> <white>{requirement_count}</white>"
      - "<gray>Progress:</gray> <white>{progress_percent}%</white>"
      - "<yellow>Click to view saved turn-ins and remaining goals.</yellow>"
  rewards:
    name: "<gold>Rewards</gold>"
    lore:
      - "<gray>Rewards:</gray> <white>{reward_count}</white>"
      - "<yellow>Click to preview the founding rewards.</yellow>"
  create:
    name: "<gold>Start Town</gold>"
    ready:
      lore:
        - "<green>All creation requirements are complete.</green>"
        - "<yellow>Click to choose your town name.</yellow>"
    progress:
      lore:
        - "<gray>Progress:</gray> <white>{progress_percent}%</white>"
        - "<yellow>Click to review the remaining requirements.</yellow>"
    unavailable:
      lore:
        - "<gray>Town creation is unavailable right now.</gray>"
    locked:
      lore:
        - "<gray>Leave your current town before creating a new one.</gray>"
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the Town Hub.</gray>"
  missing:
    name: "<red>Creation Missing</red>"
    lore:
      - "<gray>Town creation could not be loaded right now.</gray>"

town_creation_shared:
  messages:
    contribution_saved: "<green>Saved a contribution of <white>{contributed_amount}</white><green> toward town creation.</green>"
    not_enough_resources: "<red>You do not have enough resources to contribute right now.</red>"
    requirement_complete: "<green>One town creation requirement is now complete.</green>"
    ready_to_create: "<green>All town creation requirements are complete. You can now start your town.</green>"
    invalid_target: "<red>That town creation requirement is unavailable right now.</red>"

town_creation_requirements_ui:
  title: "<gradient:#f59e0b:#fbbf24>Creation Requirements</gradient>"
  summary:
    name: "<gold>Requirement Summary</gold>"
    lore:
      - "<gray>Requirements:</gray> <white>{requirement_count}</white>"
      - "<gray>Progress:</gray> <white>{progress_percent}%</white>"
  entry:
    name: "<gold>{requirement_name}</gold>"
    completed:
      lore:
        - "<gray>{description}</gray>"
        - "<gray>Progress:</gray> <white>{current_amount}</white><gray> / </gray><white>{required_amount}</white>"
        - "<green>Completed.</green>"
    contributable:
      lore:
        - "<gray>{description}</gray>"
        - "<gray>Progress:</gray> <white>{current_amount}</white><gray> / </gray><white>{required_amount}</white>"
        - "<gray>Available now:</gray> <white>{available_amount}</white>"
        - "<gray>Completion:</gray> <white>{progress_percent}%</white>"
        - "<yellow>Click to contribute progress.</yellow>"
    view_only:
      lore:
        - "<gray>{description}</gray>"
        - "<gray>Progress:</gray> <white>{current_amount}</white><gray> / </gray><white>{required_amount}</white>"
        - "<gray>Completion:</gray> <white>{progress_percent}%</white>"
        - "<yellow>This requirement tracks live player progress.</yellow>"
  rewards:
    name: "<gold>Rewards</gold>"
    lore:
      - "<gray>Preview the founding rewards.</gray>"
  hub:
    name: "<gold>Creation Hub</gold>"
    lore:
      - "<gray>Return to the town creation overview.</gray>"
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the previous view.</gray>"
  empty:
    name: "<gray>Empty Slot</gray>"
    lore:
      - "<gray>No requirement is assigned to this slot.</gray>"
  missing:
    name: "<red>Requirements Missing</red>"
    lore:
      - "<gray>This creation requirement list could not be loaded.</gray>"

town_creation_rewards_ui:
  title: "<gradient:#38bdf8:#60a5fa>Creation Rewards</gradient>"
  summary:
    name: "<gold>Creation Rewards</gold>"
    lore:
      - "<gray>Reward count:</gray> <white>{reward_count}</white>"
      - "<yellow>These rewards are granted when the town is founded.</yellow>"
  entry:
    name: "<gold>{reward_name}</gold>"
    lore:
      - "<gray>Type:</gray> <white>{reward_type}</white>"
      - "<gray>{description}</gray>"
  requirements:
    name: "<gold>Requirements</gold>"
    lore:
      - "<gray>Return to the requirement breakdown.</gray>"
  hub:
    name: "<gold>Creation Hub</gold>"
    lore:
      - "<gray>Return to the town creation overview.</gray>"
  return:
    name: "<gold>Back</gold>"
    lore:
      - "<gray>Return to the previous view.</gray>"
  empty:
    name: "<gray>Empty Slot</gray>"
    lore:
      - "<gray>No reward is assigned to this slot.</gray>"
  missing:
    name: "<red>Rewards Missing</red>"
    lore:
      - "<gray>This creation reward list could not be loaded.</gray>"

town_directory_ui:
  title: "<gradient:#38bdf8:#60a5fa>Town Directory</gradient>"
  summary:
    name: "<gold>Server Towns</gold>"
    lore:
      - "<gray>Total towns:</gray> <white>{town_count}</white>"
  entry:
    name: "<aqua>{town_name}</aqua>"
    lore:
      - "<gray>Members:</gray> <white>{member_count}</white>"
      - "<gray>Chunks:</gray> <white>{chunk_count}</white>"
      - "<gray>Town level:</gray> <white>{town_level}</white>"
      - "<gray>Archetype:</gray> <white>{archetype}</white>"
      - "<yellow>Click to inspect this town.</yellow>"
  empty:
    name: "<red>No Towns</red>"
    lore:
      - "<gray>No towns have been founded yet.</gray>"

town_invites_ui:
  title: "<gradient:#f59e0b:#fbbf24>Town Invites</gradient>"
  summary:
    name: "<gold>Invite Inbox</gold>"
    lore:
      - "<gray>Pending invites:</gray> <white>{invite_count}</white>"
      - "<yellow>Click an invite to accept it.</yellow>"
