    unavailable:
      name: "<gradient:#ef4444:#f87171>⚠ Claim Map Unavailable</gradient>"
      lore:
        - "<gradient:#64748b:#94a3b8>Town data could not be loaded.</gradient>"
    error:
      system_unavailable: "<gradient:#ef4444:#f87171>⚠ Claim services are unavailable.</gradient>"
      town_unavailable: "<gradient:#ef4444:#f87171>⚠ Town data is unavailable for chunk claims.</gradient>"
      no_permission: "<gradient:#ef4444:#f87171>⚠ You need %permission% to open chunk claims.</gradient>"
