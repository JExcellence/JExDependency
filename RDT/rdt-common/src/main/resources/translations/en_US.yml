prefix: "<gradient:#0ea5e9:#38bdf8>[RDT]</gradient> "

prt:
  spawn:
    unavailable: "<red>Your town spawn is unavailable right now.</red>"
  bank:
    no_town: "<red>You must belong to a town to use the remote town bank.</red>"
    no_permission: "<red>You do not have permission to access your town bank.</red>"
    locked: "<yellow>Your town has not unlocked remote bank access yet.</yellow>"
    location_required: "<yellow>You must stand in one of your town's claimed chunks to open the full bank remotely.</yellow>"
    cache_unavailable: "<red>Your town cache is not available for remote deposits right now.</red>"

town_spawn:
  transfer_requested: "<yellow>Sending you to the town spawn server <white>{target_server}</white><yellow>.</yellow>"
  started: "<yellow>Town spawn warmup started. Teleporting in <white>{seconds}</white><yellow> seconds.</yellow>"
  teleported: "<green>Teleported to <white>{town}</white><green>.</green>"

town_boss_bar:
  territory:
    wilderness: "<gray>Wilderness</gray> <dark_gray>|</dark_gray> <white>{chunk_x}, {chunk_z}</white>"
    claimed: "<gradient:#22c55e:#84cc16>{town_name}</gradient> <dark_gray>|</dark_gray> <white>{chunk_x}, {chunk_z}</white>"
  nexus:
    title: "<gradient:#22c55e:#84cc16>{town_name}</gradient> <dark_gray>|</dark_gray> <red>{current_health}</red><gray>/</gray><white>{max_health} HP</white> <dark_gray>|</dark_gray> <aqua>{defense} DEF</aqua> <dark_gray>|</dark_gray> <yellow>Nexus Lv {nexus_level}</yellow>"

nexus_block:
  name: "<gradient:#22c55e:#84cc16>[Nexus]</gradient> <white>{town}</white>"
  lore:
    - "<gray>Place this block to found your town.</gray>"
    - "<gray>Town:</gray> <white>{town}</white>"

chunk_block:
  name: "<gradient:#f59e0b:#fbbf24>[Chunk Block]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this in the assigned chunk to claim it.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"

fuel_tank:
  name: "<gradient:#ef4444:#f97316>[Fuel Tank]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this chest inside its Security chunk.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
    - "<yellow>Only configured fuel items can be stored here.</yellow>"
  place:
    denied: "<red>You do not have permission to place Security fuel tanks.</red>"
    failed: "<red>That fuel tank could not be placed here.</red>"
    invalid_location: "<red>The fuel tank must be inside its Security chunk and within the configured radius of the chunk block.</red>"
    double_chest: "<red>Fuel tanks cannot form double chests.</red>"
    success: "<green>Fuel tank placed for this Security chunk.</green>"
    warning: "<yellow>Security features will not work until fuel is supplied.</yellow>"
  break:
    denied: "<red>Placed fuel tanks must be picked up from the Security chunk view.</red>"
  inventory:
    only_fuel: "<red>Only configured fuel items can be placed in the fuel tank.</red>"

seed_box:
  name: "<gradient:#84cc16:#22c55e>[Seed Box]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this chest inside its Farm chunk.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
    - "<yellow>Only configured seed items can be stored here.</yellow>"
  place:
    denied: "<red>You do not have permission to place Farm seed boxes.</red>"
    failed: "<red>That seed box could not be placed here.</red>"
    invalid_location: "<red>The seed box must be inside its Farm chunk and within the configured radius of the chunk block.</red>"
    double_chest: "<red>Seed boxes cannot form double chests.</red>"
    success: "<green>Seed box placed for this Farm chunk.</green>"
    warning: "<yellow>Only configured seed items can be stored here, and pickup is handled through the Farm chunk view.</yellow>"
  break:
    denied: "<red>Placed seed boxes must be picked up from the Farm chunk view.</red>"
  inventory:
    only_seeds: "<red>Only configured seed items can be placed in the seed box.</red>"

cache_chest:
  name: "<gradient:#f59e0b:#fbbf24>[Cache Chest]</gradient> <white>{town_name}</white>"
  lore:
    - "<gray>Place this chest inside an eligible Bank plot for <white>{town_name}</white><gray>.</gray>"
    - "<gray>Only one cache chest may exist per town.</gray>"
    - "<yellow>Pick it up from the Bank chunk view or bank menu.</yellow>"
  place:
    denied: "<red>You do not have permission to place your town cache chest.</red>"
    failed: "<red>That cache chest could not be placed here.</red>"
    already_placed: "<yellow>Your town already has a placed cache chest.</yellow>"
    invalid_location: "<red>The cache chest must be inside a level 4+ Bank chunk and within the configured radius of the chunk marker.</red>"
    double_chest: "<red>Cache chests cannot form double chests.</red>"
    success: "<green>Town cache chest placed successfully.</green>"
    warning: "<yellow>This chest uses the shared town-bank lock, so only one player may access it at a time.</yellow>"
  break:
    denied: "<red>Placed cache chests must be picked up from the Bank chunk view or bank menu.</red>"
  access:
    no_permission: "<red>You do not have permission to open this town cache chest.</red>"

salvage_block:
  name: "<gradient:#f59e0b:#fbbf24>[Salvage Block]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this block inside its Armory chunk.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
    - "<yellow>Right-click it with supported gear to salvage base materials.</yellow>"
  place:
    denied: "<red>You do not have permission to place Armory salvage blocks.</red>"
    failed: "<red>That salvage block could not be placed here.</red>"
    invalid_location: "<red>The salvage block must be inside its Armory chunk and within the configured radius of the chunk block.</red>"
    success: "<green>Salvage block placed for this Armory chunk.</green>"
    warning: "<yellow>Use direct block breaking to recover it later.</yellow>"
  break:
    denied: "<red>You do not have permission to recover this salvage block.</red>"
    success: "<green>Recovered the salvage block and returned the bound item.</green>"
    failed: "<red>The salvage block could not be recovered right now.</red>"

repair_block:
  name: "<gradient:#d1d5db:#f3f4f6>[Repair Block]</gradient> <white>{chunk_x}, {chunk_z}</white>"
  lore:
    - "<gray>Place this block inside its Armory chunk.</gray>"
    - "<gray>World:</gray> <white>{world}</white>"
    - "<gray>Chunk:</gray> <white>{chunk_x}, {chunk_z}</white>"
    - "<yellow>Right-click it with supported gear to repair using base materials.</yellow>"
  place:
    denied: "<red>You do not have permission to place Armory repair blocks.</red>"
    failed: "<red>That repair block could not be placed here.</red>"
    invalid_location: "<red>The repair block must be inside its Armory chunk and within the configured radius of the chunk block.</red>"
    success: "<green>Repair block placed for this Armory chunk.</green>"
    warning: "<yellow>Use direct block breaking to recover it later.</yellow>"
  break:
    denied: "<red>You do not have permission to recover this repair block.</red>"
    success: "<green>Recovered the repair block and returned the bound item.</green>"
    failed: "<red>The repair block could not be recovered right now.</red>"

block_listener:
  nexus:
    pickup:
      unsupported: "<red>The active town nexus cannot be picked up yet.</red>"
    place:
      denied: "<red>You cannot place a nexus that does not belong to you.</red>"
      failed: "<red>Town creation failed. Make sure the chunk is unclaimed and your town data is valid.</red>"
      success: "<green>Town <white>{town_name}</white><green> has been founded.</green>"
    open:
      denied: "<red>Only members of this town can access its nexus.</red>"
      failed: "<red>Unable to validate nexus governance access. Return to the nexus and try again.</red>"
  chunk:
    pickup:
      denied: "<red>You do not have permission to pick up this chunk marker.</red>"
      failed: "<red>That chunk could not be unclaimed.</red>"
      success: "<green>Returned the chunk block for <white>{chunk_x}, {chunk_z}</white><green>.</green>"
    place:
      denied: "<red>You do not have permission to place town chunk markers.</red>"
      failed: "<red>That chunk claim could not be finalized here.</red>"
      success: "<green>Claimed chunk <white>{chunk_x}, {chunk_z}</white><green>.</green>"
      next_step: "<yellow>Right-click the chunk marker to choose a specialty like <white>Farm</white><yellow> or <white>Security</white><yellow>.</yellow>"

town_protection_listener:
  break:
    denied: "<red>You cannot break blocks in this town.</red>"
  place:
    denied: "<red>You cannot place blocks in this town.</red>"
  interact:
    denied: "<red>You cannot use that here.</red>"

