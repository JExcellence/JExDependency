# Configurable Bank chunk progression levels.
# Add, remove, or reorder numeric level keys as desired.
# The highest numeric key becomes the Bank max level.
levels:
  1:
    requirements: {}
    rewards: {}
  2:
    requirements:
      vault_upgrade:
        type: "CURRENCY"
        currency: "vault"
        amount: 1000.0
        consumable: true
        description: "Bank funding contribution"
      reserve_materials:
        type: "ITEM"
        requiredItems:
          - type: "GOLD_INGOT"
            amount: 32
        consumeOnComplete: true
        exactMatch: false
        description: "Bank reserve materials"
    rewards:
      vault_bonus:
        type: "CURRENCY"
        currencyId: "vault"
        amount: 150.0
        description: "Bank treasury rebate"
      town_broadcast:
        type: "COMMAND"
        command: "rt broadcast {town_uuid} <aqua>{town_name}</aqua> <yellow>upgraded Bank chunk <white>{chunk_x}, {chunk_z}</white> to level <white>{target_level}</white><yellow>!</yellow>"
        executeAsPlayer: false
