# Nation creation stays separate from active nation progression.
# `formation.levels` controls the pre-formation flow.
# `progression.levels` controls active nation upgrades after a nation forms.
# Requirement and reward entry names are stable IDs used for saved progress and UI.
# Active nation command rewards can use placeholders such as {nation_uuid}, {nation_name},
# {capital_town_uuid}, {capital_town_name}, and {member_count}.
formation:
  levels:
    1:
      requirements:
        nation_charter_funding:
          type: "CURRENCY"
          currency: "vault"
          amount: 10000.0
          consumable: true
          description: "Nation charter funding"
        alliance_treaties:
          type: "ITEM"
          item:
            material: "PAPER"
            amount: 16
          exactMatch: false
          description: "Alliance treaty paperwork"
      rewards:
        nation_formed_broadcast:
          type: "COMMAND"
          command: "say Nation {nation_name} has formed under the capital of {capital_town_name}."
          executeAsPlayer: false
          description: "Broadcast the nation founding announcement"

progression:
  levels:
    1:
      requirements: {}
      rewards: {}
    2:
      requirements:
        nation_treasury:
          type: "CURRENCY"
          currency: "vault"
          amount: 5000.0
          consumable: true
          description: "Nation treasury funding"
        founding_records:
          type: "ITEM"
          requiredItems:
            - type: "BOOK"
              amount: 12
          consumeOnComplete: true
          exactMatch: false
          description: "Founding record archive"
      rewards:
        vault_bonus:
          type: "CURRENCY"
          currencyId: "vault"
          amount: 750.0
          description: "Nation treasury rebate"
        nation_broadcast:
          type: "COMMAND"
          command: "rt broadcast {capital_town_uuid} <gradient:#38bdf8:#22c55e>{nation_name}</gradient> <yellow>advanced to nation level <white>{target_level}</white><yellow>!</yellow>"
          executeAsPlayer: false
