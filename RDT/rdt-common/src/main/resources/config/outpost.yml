# Configurable Outpost chunk progression levels.
# Add, remove, or reorder numeric level keys as desired.
# The highest numeric key becomes the Outpost max level.
levels:
  1:
    requirements: {}
    rewards: {}
  2:
    requirements:
      vault_upgrade:
        type: "CURRENCY"
        currency: "vault"
        amount: 1000.0
        consumable: true
        description: "Outpost funding contribution"
      navigation_tools:
        type: "ITEM"
        requiredItems:
          - type: "COMPASS"
            amount: 8
        consumeOnComplete: true
        exactMatch: false
        description: "Outpost navigation tools"
    rewards:
      vault_bonus:
        type: "CURRENCY"
        currencyId: "vault"
        amount: 150.0
        description: "Outpost treasury rebate"
      town_broadcast:
        type: "COMMAND"
        command: "rt broadcast {town_uuid} <aqua>{town_name}</aqua> <yellow>upgraded Outpost chunk <white>{chunk_x}, {chunk_z}</white> to level <white>{target_level}</white><yellow>!</yellow>"
        executeAsPlayer: false
