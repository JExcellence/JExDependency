# Configurable Nexus progression levels.
# Add, remove, or reorder numeric level keys as desired.
# Each level key represents the target Nexus level reached after successful level-up.
# Requirement and reward entry names (for example `vault_upgrade`) are stable IDs used for progress tracking and UI.
# `description` is the player-facing label shown in upgrade previews.
# Currency requirements use `currency`, `amount`, and `consumable`.
# Currency rewards use `currencyId` and deposit into the town bank.
# Item rewards can use `item.material` and `item.amount` if you add them later.
# Command rewards can use placeholders such as {town_uuid}, {town_name}, and {target_level}.
# `executeAsPlayer: false` runs the command from console instead of as the player.
levels:
  1:
    combat:
      max_health: 1000.0
      defense: 0.0
    requirements:
      town_charter:
        type: "CURRENCY"
        currency: "vault"
        amount: 1000.0
        consumable: true
        description: "Town charter funding"
    rewards:
      town_broadcast:
        type: "COMMAND"
        command: "rt broadcast {town_uuid} <gradient:#22c55e:#84cc16>{town_name}</gradient> <yellow>has been founded and claimed its first Nexus!</yellow>"
        executeAsPlayer: false
  2:
    combat:
      max_health: 1250.0
      defense: 2.0
    requirements:
      vault_upgrade:
        type: "CURRENCY"
        currency: "vault"
        amount: 2500.0
        consumable: true
        description: "Vault funding contribution"
    rewards:
      vault_bonus:
        type: "CURRENCY"
        currencyId: "vault"
        amount: 500.0
        description: "Town vault bonus"
      town_broadcast:
        type: "COMMAND"
        command: "rt broadcast {town_uuid} <gradient:#22c55e:#84cc16>{town_name}</gradient> <yellow>advanced its Nexus to level <white>{target_level}</white><yellow>!</yellow>"
        executeAsPlayer: false
