# Configurable Nexus progression levels.
# Add, remove, or reorder numeric level keys as desired.
# Each level key represents the target Nexus level reached after successful level-up.
levels:
  1:
    requirements:
      town_charter:
        type: "CURRENCY"
        currency: "vault"
        amount: 1000.0
        consumable: true
        description: "Town charter funding"
    rewards:
      town_broadcast:
        type: "COMMAND"
        command: "rt broadcast {town_uuid} <gradient:#22c55e:#84cc16>{town_name}</gradient> <yellow>has been founded and claimed its first Nexus!</yellow>"
