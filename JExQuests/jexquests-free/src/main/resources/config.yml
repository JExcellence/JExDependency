# JExQuests — Free edition defaults. Ships to plugins/JExQuests/config.yml
# on first run and is NOT overwritten on upgrade.

# ── Server identity ────────────────────────────────────────────────────────
# Free-form tag stamped into every exported player snapshot and every
# statistics record delivered to JExCore. Helps receivers tell which shard
# a snapshot came from when migrating or reconciling across servers.
# Leave blank on single-shard deployments.
server:
  id: ""

# ── Systems ────────────────────────────────────────────────────────────────
# Toggle individual gameplay subsystems. Disabled subsystems do not register
# commands, listeners, or views — their YAML data files are ignored.
systems:
  quests: true
  ranks: true
  bounties: true
  perks: true
  machines: true

# ── Telemetry ──────────────────────────────────────────────────────────────
# When JExCore is installed and its StatisticsDelivery service is available,
# JExQuests forwards gameplay events (quest completion, rank promotion,
# bounty claim, perk activation) into the delivery queue.
telemetry:
  forward-to-jexcore: true

# ── Economy ────────────────────────────────────────────────────────────────
# When JExEconomy is installed, reward payouts resolve through its
# EconomyProvider. Without it, economy rewards are no-op.
economy:
  default-currency: "coins"
