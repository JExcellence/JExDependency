# ─── JExQuests 1.0 ─ English (US) ────────────────────────────────────────────
# MiniMessage format. {placeholder} substitution (NOT %name%). One line per
# chat message. Nested click/hover tags parsed recursively after substitution.
#
# Gradient palette:
#   gold   #fde047 → #f59e0b
#   green  #86efac → #16a34a
#   red    #fca5a5 → #dc2626
#   blue   #93c5fd → #2563eb
#   cyan   #a5f3fc → #06b6d4
#   purple #d8b4fe → #9333ea
#
# Conventions:
#   success:  "<gradient:#86efac:#16a34a>✔</gradient> ..."
#   error:    "<gradient:#fca5a5:#dc2626>✘</gradient> ..."
#   warn:     "<gradient:#fca5a5:#dc2626>⚠</gradient> ..."
#   kv-sep:   "<dark_gray>»</dark_gray>"
#   prompt:   "<gradient:#a5f3fc:#06b6d4>▸ Click to X</gradient>"
#   header:   "<dark_gray>━━━━ <gradient:#fde047:#f59e0b>Title</gradient> ━━━━"

prefix: "<gradient:#fde047:#f59e0b>JExQuests</gradient> <dark_gray>»</dark_gray> "

# ── View chrome defaults ─────────────────────────────────────────────────────
# Every BaseView and PaginatedView falls back to these keys when its own
# namespace doesn't override them. The callers always resolve scalars
# (title / back / previous / next / loading) or a single {name, lore} pair
# (page.name + page.lore), so the shapes here match exactly.
_defaults:
  title: "<gradient:#fde047:#f59e0b>JExQuests</gradient>"
  back: "<gradient:#93c5fd:#2563eb>◂ Back</gradient>"
  previous: "<gradient:#a5f3fc:#06b6d4>◂ Previous page</gradient>"
  next: "<gradient:#a5f3fc:#06b6d4>Next page ▸</gradient>"
  loading: "<gradient:#fde047:#f59e0b>Loading…</gradient>"
  page:
    name: "<gradient:#fde047:#f59e0b>Page {current_page}<dark_gray>/</dark_gray>{max_page}</gradient>"
    lore: |-
      <gray>Page <white>{current_page}</white> of <white>{max_page}</white>.

      <gradient:#a5f3fc:#06b6d4>▸ Use the arrows to navigate</gradient>

# ── Generic ───────────────────────────────────────────────────────────────────

error:
  no-permission: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>You don't have permission."
  player-only: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is player-only."
  console-only: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is console-only."
  player-not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Player <white>{player}</white> not found."
  invalid-amount: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Invalid amount. Must be a positive number."
  invalid-argument: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Invalid argument <white>{value}</white> for <white>{name}</white>."
  missing-argument: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Missing argument <white>{name}</white>."
  unknown: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>An unexpected error occurred: <white>{error}</white>"
  system-disabled: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>The <white>{system}</white> system is disabled in config.yml."

success:
  generic: "<gradient:#86efac:#16a34a>✔</gradient> <gray>{message}"

warn:
  generic: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>{message}"

# ── Built-in JExCommand keys ──────────────────────────────────────────────────

jexcommand:
  error:
    no-permission: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Missing permission <white>{permission}</white>."
    player-only: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is player-only."
    console-only: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>This command is console-only."
    invalid-argument: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Invalid argument <white>{value}</white> for <white>{name}</white>."
    missing-argument: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Missing argument <white>{name}</white>."
  usage: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Usage: <white>{usage}</white>"

# ── Core plugin commands (/jexquests) ────────────────────────────────────────

jexquests:
  header: "<dark_gray>━━━━ <gradient:#fde047:#f59e0b>JExQuests</gradient> ━━━━"
  info:
    line: "<gray>JExQuests <white>{edition}</white> <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{version}</gradient>"
  reload:
    starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Reloading configuration..."
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Reload complete (<white>{duration}</white> ms)."
    failed: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Reload failed: <white>{error}</white>"
  status:
    line: "<gray>systems <dark_gray>»</dark_gray> quests=<white>{quests}</white> ranks=<white>{ranks}</white> bounties=<white>{bounties}</white> perks=<white>{perks}</white> machines=<white>{machines}</white>"
    enabled-tag: "<gradient:#86efac:#16a34a>on</gradient>"
    disabled-tag: "<gradient:#fca5a5:#dc2626>off</gradient>"
  export:
    starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Exporting <white>{player}</white> state…"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Exported <white>{player}</white> → <white>{path}</white>"
    failed: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Export failed: <white>{error}</white>"
  export-all:
    starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Bulk-exporting every tracked player…"
    summary: "<gradient:#fde047:#f59e0b>⚙</gradient> <gray>Batch complete: <green>{success}</green>/<white>{total}</white> ok, <red>{failed}</red> failed <dark_gray>»</dark_gray> <white>{path}</white>"
    failure: "  <dark_gray>•</dark_gray> <red>{line}"
    truncated: "  <dark_gray>…<white>{remaining}</white> more failure(s) suppressed"
    failed: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Bulk export aborted: <white>{error}</white>"
  import-all:
    starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Bulk-importing from <white>{path}</white>…"
    summary: "<gradient:#fde047:#f59e0b>⚙</gradient> <gray>Batch complete: <green>{success}</green>/<white>{total}</white> ok, <red>{failed}</red> failed <dark_gray>»</dark_gray> <white>{path}</white>"
    failure: "  <dark_gray>•</dark_gray> <red>{line}"
    truncated: "  <dark_gray>…<white>{remaining}</white> more failure(s) suppressed"
    failed: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Bulk import aborted: <white>{error}</white>"
  import:
    starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Importing snapshot from <white>{path}</white>…"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Imported <white>{uuid}</white> from <white>{path}</white>"
    failed: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Import failed: <white>{error}</white>"
    dry-run:
      starting: "<gradient:#a5f3fc:#06b6d4>▸</gradient> <gray>Previewing import from <white>{path}</white>…"
      summary: "<gradient:#fde047:#f59e0b>⚙</gradient> <gray>{player} <dark_gray>(<white>{uuid}</white>)</dark_gray> <dark_gray>»</dark_gray> <green>+{created}</green> <yellow>~{updated}</yellow> <gray>={unchanged}</gray>"
      noop: "<gradient:#86efac:#16a34a>✔</gradient> <gray>No changes — snapshot matches live state."
      change: "  <dark_gray>•</dark_gray> <gray>{change}"
      truncated: "  <dark_gray>…<white>{remaining}</white> more change(s) suppressed"

# ── Quests (/quest, /quests) ──────────────────────────────────────────────────

quest:
  header: "<dark_gray>━━━━ <gradient:#fde047:#f59e0b>Quests</gradient> ━━━━"
  usage: "<gray>Usage: <white>/quest <list|info|accept|abandon|track|progress> [quest]</white>"
  none-active: "<gray>You have no active quests."
  info:
    summary: |-
      <gray>Quest: <gradient:#fde047:#f59e0b>{quest}</gradient>
      <gray>Category: <white>{category}</white>
      <gray>Difficulty: <white>{difficulty}</white>
      <gray>Repeatable: <white>{repeatable}</white>
      <gray>Rewards: <white>{rewards}</white>
      <gray>Requirements: <white>{requirements}</white>
    no-tasks: "<gray>This quest has no tasks."
    task: "  <dark_gray>•</dark_gray> <white>{task}</white> <dark_gray>»</dark_gray> <white>{progress}</white><dark_gray>/</dark_gray><white>{target}</white> (<white>{percent}</white>%)"
  tracking-set: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Now tracking <gradient:#fde047:#f59e0b>{quest}</gradient>."
  tracking-cleared: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Tracking cleared."
  not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Quest <white>{quest}</white> does not exist."
  locked: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>Quest <white>{quest}</white> is locked. Requirements: <gray>{requirements}</gray>"
  already-active: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>You already have <white>{quest}</white> active."
  already-completed: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>You already completed <white>{quest}</white>."
  sidebar:
    enabled: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Quest sidebar <white>enabled</white>."
    disabled: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Quest sidebar <white>disabled</white>."
  accepted: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Accepted <gradient:#fde047:#f59e0b>{quest}</gradient>."
  abandoned: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Abandoned <gradient:#fde047:#f59e0b>{quest}</gradient>."
  completed: "<gradient:#86efac:#16a34a>★</gradient> <gradient:#fde047:#f59e0b>{quest}</gradient> <gray>complete! Rewards: <white>{rewards}</white>"
  progress-line: "<gray>{objective} <dark_gray>»</dark_gray> <white>{current}</white><dark_gray>/</dark_gray><white>{target}</white> <gray>({percent}%)"
  progress-header: "<dark_gray>━━━━ <gradient:#fde047:#f59e0b>{quest}</gradient> ━━━━"
  objective:
    kill: "<gray>Kill <white>{target}</white>"
    break: "<gray>Break <white>{target}</white>"
    place: "<gray>Place <white>{target}</white>"
    craft: "<gray>Craft <white>{target}</white>"
    collect: "<gray>Collect <white>{target}</white>"
    fish: "<gray>Catch <white>{target}</white>"
    trade: "<gray>Trade with <white>{target}</white>"
    enchant: "<gray>Enchant an <white>{target}</white>"
    explore: "<gray>Discover <white>{target}</white>"
    interact: "<gray>Interact with <white>{target}</white>"
    tame: "<gray>Tame a <white>{target}</white>"
    breed: "<gray>Breed <white>{target}</white>"
    custom: "<gray>{description}"
  category:
    baker: "<gradient:#fde047:#f59e0b>Baker</gradient>"
    builder: "<gradient:#a5f3fc:#06b6d4>Builder</gradient>"
    building: "<gradient:#a5f3fc:#06b6d4>Construction</gradient>"
    challenge: "<gradient:#d8b4fe:#9333ea>Challenge</gradient>"
    combat: "<gradient:#fca5a5:#dc2626>Combat</gradient>"
    daily: "<gradient:#fde047:#f59e0b>Daily</gradient>"
    enchanter: "<gradient:#d8b4fe:#9333ea>Enchanter</gradient>"
    explorer: "<gradient:#93c5fd:#2563eb>Explorer</gradient>"
    farmer: "<gradient:#86efac:#16a34a>Farmer</gradient>"
    hunter: "<gradient:#fca5a5:#dc2626>Hunter</gradient>"
    miner: "<gradient:#fde047:#f59e0b>Miner</gradient>"
    mining: "<gradient:#fde047:#f59e0b>Mining</gradient>"
    trader: "<gradient:#86efac:#16a34a>Trader</gradient>"
    tutorial: "<gradient:#93c5fd:#2563eb>Tutorial</gradient>"
  list:
    empty: "<gray>No quests in this category."
    entry: "<gray>· <gradient:#fde047:#f59e0b>{quest}</gradient> <dark_gray>»</dark_gray> {status} <gray>· {category}"
    status-available: "<gradient:#a5f3fc:#06b6d4>available</gradient>"
    status-active: "<gradient:#86efac:#16a34a>active</gradient>"
    status-completed: "<gradient:#d8b4fe:#9333ea>done</gradient>"
    status-locked: "<gradient:#fca5a5:#dc2626>locked</gradient>"
  reward:
    xp: "<gradient:#86efac:#16a34a>+{amount} XP</gradient>"
    currency: "<gradient:#fde047:#f59e0b>+{amount} {currency}</gradient>"
    item: "<gradient:#93c5fd:#2563eb>{amount}x {item}</gradient>"
    command: "<gradient:#d8b4fe:#9333ea>reward script</gradient>"

# ── Quest GUI (/quests) ──────────────────────────────────────────────────────

quest-view:
  title: "<gradient:#fde047:#f59e0b>Quests</gradient>"
  detail-title: "<gradient:#fde047:#f59e0b>{quest}</gradient>"
  empty-slot: "<gray>(empty)"
  accept:
    name: "<gradient:#86efac:#16a34a>Accept</gradient>"
    lore: |-
      <gray>Start <gradient:#fde047:#f59e0b>{quest}</gradient>.

      <gradient:#a5f3fc:#06b6d4>▸ Click to accept</gradient>
  abandon:
    name: "<gradient:#fca5a5:#dc2626>Abandon</gradient>"
    lore: |-
      <gray>Drop <gradient:#fde047:#f59e0b>{quest}</gradient>. Progress lost.

      <gradient:#a5f3fc:#06b6d4>▸ Click to abandon</gradient>
  track:
    name: "<gradient:#a5f3fc:#06b6d4>Track</gradient>"
    lore: |-
      <gray>Pin this quest to your sidebar.

      <gradient:#a5f3fc:#06b6d4>▸ Click to track</gradient>
  back:
    name: "<gradient:#93c5fd:#2563eb>Back</gradient>"
    lore: |-
      <gray>Return to the previous menu.

      <gradient:#a5f3fc:#06b6d4>▸ Click to go back</gradient>
  page:
    next:
      name: "<gradient:#a5f3fc:#06b6d4>Next page</gradient>"
      lore: |-
        <gray>Page <white>{current}</white><dark_gray>/</dark_gray><white>{total}</white>.

        <gradient:#a5f3fc:#06b6d4>▸ Click to go forward</gradient>
    prev:
      name: "<gradient:#a5f3fc:#06b6d4>Previous page</gradient>"
      lore: |-
        <gray>Page <white>{current}</white><dark_gray>/</dark_gray><white>{total}</white>.

        <gradient:#a5f3fc:#06b6d4>▸ Click to go back</gradient>
    fallback: "<gray>Page <white>{current}</white><dark_gray>/</dark_gray><white>{total}</white>"

sidebar:
  title: "<gradient:#fde047:#f59e0b>Quests</gradient>"
  tracked-header: "<dark_gray>» <gradient:#fde047:#f59e0b>Tracking</gradient>"
  tracked-line: "<gray>{objective}: <white>{current}</white><dark_gray>/</dark_gray><white>{target}</white>"
  no-tracking: "<gray>(nothing tracked)"

# ── Ranks (/rank, /ranks) ────────────────────────────────────────────────────

rank:
  header: "<dark_gray>━━━━ <gradient:#fde047:#f59e0b>Ranks</gradient> ━━━━"
  usage: "<gray>Usage: <white>/rank <info|promote|path|top></white>"
  current: "<gray>Your rank: <gradient:#fde047:#f59e0b>{rank}</gradient> <dark_gray>»</dark_gray> path <gradient:#a5f3fc:#06b6d4>{path}</gradient>"
  current-of: "<gray><white>{player}</white>'s rank: <gradient:#fde047:#f59e0b>{rank}</gradient>"
  promoted: "<gradient:#86efac:#16a34a>★</gradient> <gray>Promoted to <gradient:#fde047:#f59e0b>{rank}</gradient>! Rewards: <white>{rewards}</white>"
  demoted: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>Demoted to <gradient:#fde047:#f59e0b>{rank}</gradient>."
  max-reached: "<gradient:#d8b4fe:#9333ea>★</gradient> <gray>You are at the highest rank on this path."
  requirements-missing: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>Cannot promote yet. Missing: <gray>{requirements}</gray>"
  path-switched: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Switched to path <gradient:#a5f3fc:#06b6d4>{path}</gradient>."
  path-selected: "<gradient:#86efac:#16a34a>★</gradient> <gray>Joined path <gradient:#a5f3fc:#06b6d4>{path}</gradient> at rank <gradient:#fde047:#f59e0b>{rank}</gradient>!"
  path-already-active: "<gradient:#fde047:#f59e0b>ℹ</gradient> <gray>Path <gradient:#a5f3fc:#06b6d4>{path}</gradient> is already your active path."
  path-cooldown: "<gradient:#fca5a5:#dc2626>⏱</gradient> <yellow>Cannot switch paths yet — <white>{seconds}</white>s cooldown remaining."
  path-switch-locked: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Path <white>{path}</white> disallows switching away."
  path-locked: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Path <white>{path}</white> is locked: <gray>{reason}</gray>"
  path-not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Path <white>{path}</white> does not exist."
  not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Rank <white>{rank}</white> does not exist."
  info:
    no-path: "<gradient:#fde047:#f59e0b>ℹ</gradient> <gray><white>{player}</white> hasn't selected a rank path yet. Run <white>/rank</white> to browse."
    not-enrolled: "<gradient:#fde047:#f59e0b>ℹ</gradient> <gray><white>{player}</white> has never enrolled in <gradient:#a5f3fc:#06b6d4>{path}</gradient>."
    summary: |-
      <gray>Player: <white>{player}</white>
      <gray>Path: <gradient:#a5f3fc:#06b6d4>{path}</gradient>
      <gray>Rank: <gradient:#fde047:#f59e0b>{rank}</gradient>
      <gray>Progress: <white>{progress}</white>%
      <gray>Tree completed: <white>{completed}</white>
    at-end: "<gradient:#d8b4fe:#9333ea>★</gradient> <gray>You are at the highest rank on this path."
    next-option: |-
      <gradient:#a5f3fc:#06b6d4>▸ Next option:</gradient> <gradient:#fde047:#f59e0b>{rank}</gradient>
      <gray>  Requires: <white>{requirements}</white>
      <gray>  Rewards: <white>{rewards}</white>
  top-entry: "<gray>#{position} <gradient:#fde047:#f59e0b>{player}</gradient> <dark_gray>»</dark_gray> <white>{rank}</white> <gray>· {path}"
  top-empty: "<gray>No ranked players yet."

rank-view:
  title: "<gradient:#fde047:#f59e0b>Ranks</gradient>"
  path-title: "<gradient:#a5f3fc:#06b6d4>{path}</gradient>"
  hierarchy-title: "<gradient:#fde047:#f59e0b>Rank paths</gradient>"
  rank-node:
    current:
      name: "<gradient:#86efac:#16a34a>{rank}</gradient> <dark_gray>»</dark_gray> <white>current</white>"
    unlocked:
      name: "<gradient:#fde047:#f59e0b>{rank}</gradient>"
    locked:
      name: "<gradient:#fca5a5:#dc2626>{rank}</gradient> <dark_gray>»</dark_gray> <gray>locked</gray>"
    lore:
      line: "<gray>{description}"
      requirements: "<gray>Requirements: <white>{requirements}</white>"
      rewards: "<gray>Rewards: <white>{rewards}</white>"
      action: "<gradient:#a5f3fc:#06b6d4>▸ Click to view path</gradient>"

# ── Bounties (/bounty, /bounties) ────────────────────────────────────────────

bounty:
  header: "<dark_gray>━━━━ <gradient:#fca5a5:#dc2626>Bounties</gradient> ━━━━"
  usage: "<gray>Usage: <white>/bounty <list|place|claim|cancel> [player] [amount]</white>"
  list-empty: "<gray>No bounties are currently active."
  list-entry: "<gray>· <gradient:#fca5a5:#dc2626>{target}</gradient> <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{amount}</gradient> <gray>posted by <white>{issuer}</white>"
  placed: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Placed <gradient:#fde047:#f59e0b>{amount}</gradient> bounty on <gradient:#fca5a5:#dc2626>{target}</gradient>."
  insufficient-funds: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Insufficient funds. Need <gold>{required}</gold>, have <gold>{balance}</gold>."
  claim:
    announced: "<gradient:#fca5a5:#dc2626>☠</gradient> <gray><white>{killer}</white> claimed <gradient:#fde047:#f59e0b>{amount}</gradient> on <gradient:#fca5a5:#dc2626>{target}</gradient>!"
    payout: "<gradient:#86efac:#16a34a>✔</gradient> <gray>You received <gradient:#fde047:#f59e0b>{amount}</gradient>."
  cancelled: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Bounty on <gradient:#fca5a5:#dc2626>{target}</gradient> cancelled. Refunded <gradient:#fde047:#f59e0b>{amount}</gradient>."
  self-ban: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>You can't place a bounty on yourself."
  not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>No active bounty on <white>{target}</white>."
  min-amount: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>Minimum bounty amount is <white>{min}</white>."
  max-amount: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>Maximum bounty amount is <white>{max}</white>."

bounty-view:
  title: "<gradient:#fca5a5:#dc2626>Bounties</gradient>"
  entry:
    name: "<gradient:#fca5a5:#dc2626>{target}</gradient>"
    lore: |-
      <gray>Posted by <white>{issuer}</white>. Reward <gradient:#fde047:#f59e0b>{amount}</gradient>.

      <gradient:#a5f3fc:#06b6d4>▸ Click to inspect</gradient>

# ── Perks (/perks, /perkadmin) ───────────────────────────────────────────────

perk:
  header: "<dark_gray>━━━━ <gradient:#d8b4fe:#9333ea>Perks</gradient> ━━━━"
  usage: "<gray>Usage: <white>/perks <list|toggle|info> [perk]</white>"
  none-owned: "<gray>You have no perks unlocked."
  activated: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Activated <gradient:#d8b4fe:#9333ea>{perk}</gradient>."
  deactivated: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Deactivated <gradient:#d8b4fe:#9333ea>{perk}</gradient>."
  not-unlocked: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow>You have not unlocked <white>{perk}</white>."
  not-found: "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Perk <white>{perk}</white> does not exist."
  on-cooldown: "<gradient:#fca5a5:#dc2626>⚠</gradient> <yellow><white>{perk}</white> is on cooldown for <white>{time}</white>."
  info-line: "<gray>{perk} <dark_gray>»</dark_gray> {description}"
  admin:
    usage: "<gray>Usage: <white>/perkadmin <grant|revoke|reload> <player> <perk></white>"
    granted: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Granted <gradient:#d8b4fe:#9333ea>{perk}</gradient> to <white>{player}</white>."
    revoked: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Revoked <gradient:#d8b4fe:#9333ea>{perk}</gradient> from <white>{player}</white>."
    reloaded: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Perk registry reloaded (<white>{count}</white> perks)."

perk-view:
  title: "<gradient:#d8b4fe:#9333ea>Perks</gradient>"
  tile:
    enabled:
      name: "<gradient:#86efac:#16a34a>{perk}</gradient>"
    disabled:
      name: "<gradient:#fca5a5:#dc2626>{perk}</gradient>"
    locked:
