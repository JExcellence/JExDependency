# Haste — mining speed perk. Paired with the miner chain; unlock cost
# matches the mid-tier currency economy.

identifier: haste
category: utility
displayName: "<gradient:#fde047:#f59e0b>Quickened Strike</gradient>"
description: "Permanent Haste I — break blocks faster."
kind: PASSIVE
cooldownSeconds: 0
enabled: true

icon:
  material: GOLDEN_PICKAXE
  enchanted: true

requirement:
