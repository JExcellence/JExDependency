# Hibernate Configuration for JExOneblock
# Database connection settings

# H2 Database (default - file-based)
hibernate.connection.driver_class=org.h2.Driver
hibernate.connection.url=jdbc:h2:file:./plugins/JExOneblock/database/oneblock;MODE=MySQL;AUTO_SERVER=TRUE
hibernate.connection.username=sa
hibernate.connection.password=
hibernate.dialect=org.hibernate.dialect.H2Dialect

# MySQL Configuration (uncomment to use)
#hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
#hibernate.connection.url=jdbc:mysql://localhost:3306/jexoneblock?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#hibernate.connection.username=root
#hibernate.connection.password=password
#hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection pool settings
hibernate.hikari.minimumIdle=2
hibernate.hikari.maximumPoolSize=10
hibernate.hikari.idleTimeout=30000
hibernate.hikari.connectionTimeout=30000

# Hibernate settings
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.use_sql_comments=false

# Performance settings
hibernate.jdbc.batch_size=25
hibernate.order_inserts=true
hibernate.order_updates=true
hibernate.jdbc.batch_versioned_data=true
