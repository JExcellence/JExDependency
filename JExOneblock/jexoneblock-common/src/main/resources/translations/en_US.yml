    header: "<red><bold> Ban Details: {player}</bold></red>"
    info: "<yellow>Reason:</yellow> <gray>{reason}</gray> <gray>|</gray> <yellow>Banned:</yellow> <gray>{banned_at}</gray>"
  unban:
    confirm:
      header: "<yellow><bold> Confirm Unban: {player}</bold></yellow>"
      details: "<yellow>Banned for:</yellow> <gray>{reason}</gray> <yellow>on</yellow> <gray>{banned_at}</gray>"
      prompt: "<yellow>Type 'confirm' to unban this player</yellow>"
