# OneBlock Effects Configuration
# Modern MiniMessage format with full customization support

# Global effect settings
enabled: true
enableParticles: true
enableSounds: true
enableAnimations: true
globalVolumeMultiplier: 1.0
globalParticleMultiplier: 1.0

# Block break effects
enableBlockBreakEffects: true
minRarityForEffects: 3  # RARE and above (1=COMMON, 2=UNCOMMON, 3=RARE, etc.)
enableProgressionPreview: true

# Chest opening effects
enableChestEffects: true
minRarityForChestEffects: 3  # RARE and above

# Entity spawn effects
enableEntitySpawnEffects: true
minRarityForEntityEffects: 3  # RARE and above

# Per-rarity effect configuration
rarityEffects:
  COMMON:
    enabled: false  # No effects for common
    sound: "BLOCK_NOTE_BLOCK_PLING"
    soundPitch: 1.0
    soundVolume: 1.0
    particle: "HAPPY_VILLAGER"
    particleCount: 10
    particleSpread: 0.3
    colorCode: "<white>"
    
  UNCOMMON:
    enabled: false  # No effects for uncommon
    sound: "BLOCK_NOTE_BLOCK_BELL"
    soundPitch: 1.2
    soundVolume: 1.0
    particle: "BUBBLE"
    particleCount: 20
    particleSpread: 0.4
    colorCode: "<green>"
    
  RARE:
    enabled: true
    sound: "BLOCK_NOTE_BLOCK_CHIME"
    soundPitch: 1.4
    soundVolume: 1.0
    particle: "WITCH"
    particleCount: 30
    particleSpread: 0.5
