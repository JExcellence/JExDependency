  title: "<gradient:#22c55e:#14b8a6>[Ply] Speler- en groepsbediening</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Opslagbeheertoolkit</gradient>"
    lore:
      - "<gray>Bewerk maximale opslagruimte en kortingen voor spelers en groepen.</gray>"
      - "<gray>Opslagruimten forceren/resetten of alle open RDR-weergaven sluiten.</gray>"
      - "<yellow>Vereist:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Speleroverschrijvingen</gradient>"
      lore:
        - "<gray>Blader door online spelers en geconfigureerde overschrijvingsdoelen.</gray>"
        - "<gray>Bewerk de maximale opslagruimte en kortingswaarden per speler.</gray>"
        - "<yellow>Klik om speleroverschrijvingen te openen.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Groepsoverschrijvingen</gradient>"
      lore:
        - "<gray>Selecteer een LuckPerms-groep en stel overschrijvingswaarden in.</gray>"
        - "<gray>Handig voor op toestemming gebaseerde ranglijsten.</gray>"
        - "<yellow>Klik om groepsoverschrijvingen te openen.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Opslag geforceerd leegmaken</gradient>"
      lore:
        - "<gray>Wist alle iteminhoud uit een geselecteerde opslag.</gray>"
        - "<gray>Behoudt vertrouwde instellingen, schulden en sneltoetswaarden.</gray>"
        - "<yellow>Klik om een ​​opslag te kiezen.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Forceer reset opslag</gradient>"
      lore:
        - "<gray>Reset een geselecteerde opslag naar een schone staat.</gray>"
        - "<gray>Wist items, schulden, vertrouwde toegang en sneltoets.</gray>"
        - "<yellow>Klik om een ​​opslag te kiezen.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Forceer het sluiten van alle RDR-weergaven</gradient>"
      lore:
        - "<gray>Sluit alle momenteel geopende RDR-menu's.</gray>"
        - "<gray>Handig na configuratiewijzigingen of noodacties.</gray>"
        - "<yellow>Klik om alle RDR-weergaven geforceerd te sluiten.</yellow>"
