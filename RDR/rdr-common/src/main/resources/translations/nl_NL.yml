      - "<gray>u bereikt de geconfigureerde limiet.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Vraag] Winkelvereisten</gradient>"
    lore:
      - "<gray>Geconfigureerde vereisten:</gray><white>{requirement_count}</white>"
      - "<gray>Huidige aantal vereisten:</gray><white>{requirements}</white>"
      - "<gray>Status:</gray><white>{availability}</white>"
      - "<yellow>Klik om elk vereisteniveau in detail te bekijken.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Geen]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Klaar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In behandeling]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Opslagruimte kopen</gradient>"
      lore:
        - "<gray>Geconfigureerde vereisten:</gray><white>{requirement_count}</white>"
        - "<gray>Huidige vereisten:</gray><white>{requirements}</white>"
        - "<gray>Eigen opslag:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klik om te kopen wanneer aan alle vereisten is voldaan.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Vereisten in behandeling</gradient>"
      lore:
        - "<gray>Geconfigureerde vereisten:</gray><white>{requirement_count}</white>"
        - "<gray>Huidige vereisten:</gray><white>{requirements}</white>"
        - "<gray>Eigen opslag:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Voldoe aan de overige vereisten voordat u aanschaft.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Opslaglimiet bereikt</gradient>"
      lore:
        - "<gray>Eigen opslag:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Je kunt niet meer opslagruimte kopen</gray>"
        - "<gray>totdat de mondiale limiet wordt verhoogd.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Vereisten offline</gradient>"
      lore:
        - "<gray>Een of meer geconfigureerde winkelvereisten</gray>"
        - "<gray>kan niet worden opgelost op deze server.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profiel ontbreekt</gradient>"
      lore:
        - "<gray>UwRDRprofiel kon niet worden geladen,</gray>"
        - "<gray>dus aankopen worden tijdelijk geblokkeerd.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Gekocht<white>{storage_key}</white><gray>. Verbruikte vereisten:</gray><white>{requirements}</white><gray>. Eigen opslag:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Je voldoet momenteel niet aan<white>{requirement}</white><gray>. Winkelvereisten:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>De winkelvereiste<white>{requirement}</white><gray>is momenteel niet beschikbaar of ongeldig.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Er zijn momenteel geen geconfigureerde winkelvereisten beschikbaar voor opslagaankopen.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Je hebt de opslaglimiet van<white>{max_storages}</white><gray>bereikt. Eigen opslag:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>UwRDRprofiel kan niet worden geladen, dus opslagaankopen zijn niet beschikbaar.</gray>"

