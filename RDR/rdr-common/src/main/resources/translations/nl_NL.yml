    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Spelerbediening</gradient>"
      lore:
        - "<gray>Bewerk de limieten voor spelers/groepen, kortingen en opslagcapaciteit.</gray>"
        - "<gray>Open override-editors en acties voor noodbeheer.</gray>"
        - "<yellow>Klik om de spelerbediening te openen.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Opslagconfiguratie</gradient>"
      lore:
        - "<gray>Bewerk waarden uit</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Getypte instellingen worden geopend in een bijpassende glas-in-lood-aambeeldeditor.</gray>"
        - "<yellow>Klik om de configuratiebesturingselementen te openen.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-integraties</gradient>"
      lore:
        - "<gray>Beheer tools voor vaardigheden, banen, valuta en PlaceholderAPI.</gray>"
        - "<gray>Open integratiespecifieke beheerdersopties.</gray>"
        - "<yellow>Klik om integratiebeheer te openen.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Bekijk de verzamelde handelsbelastingsaldi per valuta.</gray>"
        - "<gray>Trek server-banksaldi op naar uw beheerder account.</gray>"
        - "<yellow>Klik om de controles op de handelsbelastingbank te openen.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valutabeheerder</gradient>"
      lore:
        - "<gray>Bekijk gedetecteerde valuta's uit Vault en JExEconomy.</gray>"
        - "<gray>Maak de standaard</gray> <white>raindrops</white> <gray>munt wanneer dat nodig is.</gray>"
        - "<yellow>Klik om valutacontroles te openen.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Vaardigheid] Vaardigheidsvereisten</gradient>"
      lore:
        - "<gray>Bekijk ondersteunde vaardigheidsplug-ins en detectiestatus.</gray>"
        - "<gray>Pas standaardvaardigheidsvereisten toe op alle opslagaankoopniveaus.</gray>"
        - "<yellow>Klik om de vaardigheidsvereisten te openen.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Taak] Taakvereisten</gradient>"
      lore:
        - "<gray>Bekijk ondersteunde taakplug-ins en detectiestatus.</gray>"
        - "<gray>Standaardtaakvereisten toepassen op alle opslagaankooplagen.</gray>"
        - "<yellow>Klik om de functievereisten te openen.</yellow>"
