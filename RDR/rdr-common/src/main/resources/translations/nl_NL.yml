      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Klaar</gradient>"
      lore:
        - "<gray>De standaardvaluta bestaat al.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Standaardvaluta gemaakt:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Kan valuta niet maken:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Valuta bestaat al:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>U kunt deze knop niet gebruiken tenzij JExEconomy beschikbaar is.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Geen valuta gedetecteerd</gradient>"
      lore:
        - "<gray>Er zijn geen Vault- of JExEconomy-valuta's gedetecteerd.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Beheerderstoegang vereist</gradient>"
      lore:
        - "<gray>U heeft geen toestemming om deze valutaweergave te gebruiken.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>U heeft geen toestemming om valuta's te beheren.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Opslagconfiguratie</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Configuratie-instellingen</white>"
    lore:
      - "<gray>Bewerkbare instellingen gedetecteerd:</gray> <white>{setting_count}</white>"
      - "<gray>Klik op een item hieronder om de waarde ervan te bewerken een aambeeld.</gray>"
      - "<yellow>Wijzigingen worden rechtstreeks naar de winkel geschreven config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Pad:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Huidige waarde:</gray> <white>{current_value}</white>"
      - "<yellow>Klik om deze instelling te bewerken.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Geheel getal]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Lang]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dubbele]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Lijst]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Snaar]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Niet bewerkbaar Instellingen</white>"
      lore:
        - "<gray>Er zijn geen bewerkbare scalaire/lijstconfiguratie-instellingen gevonden.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Beheerderstoegang vereist</white>"
      lore:
        - "<gray>Je hebt geen toestemming om deze configuratieweergave te gebruiken.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Config Editing Locked</white>"
      lore:
        - "<gray>Deze editie staat geen bewerkingen in de runtime-configuratie toe.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je hebt geen toestemming om de configuratie-instellingen te bewerken.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Config-bewerking is vergrendeld in deze editie.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Bijgewerkt <white>{config_path}</white><gray> naar <white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Bewerken {config_path}"
  input:
    lore:
      - "<gray>Pad:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Huidige waarde:</gray> <white>{current_value}</white>"
      - "<yellow>Voer de nieuwe waarde in en bevestig.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Ongeldige invoer voor type <white>{value_type}</white><gray>. Invoer:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Opslagruimte</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Opslagcapaciteit</gradient>"
    lore:
      - "<gray>Eigen opslag:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale opslagruimte:</gray><white>{max_storages}</white>"
