    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Beheerderstoegang vereist</gradient>"
      lore:
        - "<gray>U heeft geen toestemming om dit menu te gebruiken.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je hebt geen toestemming om de beheeropties voor spelers/groepen te gebruiken.</gray>"
