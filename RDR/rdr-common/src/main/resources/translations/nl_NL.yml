prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Opslagstatistieken</gradient>"
  items: "<gray>Totaal aantal artikelen:</gray><white>{total_items}</white>"
  available_slots: "<gray>Beschikbare slots:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Verkregen opslagcapaciteit:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Max. opslagruimte:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Opslaghub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Opslagoverzicht</gradient>"
    lore:
      - "<gray>Eigen opslag:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale opslagruimte:</gray><white>{max_storages}</white>"
      - "<gray>Uw kluisnetwerk blijft bestaan</gray>"
      - "<gray>en klaar voor gebruik op meerdere servers.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Opslagruimten bekijken</gradient>"
    lore:
      - "<gray>Eigen opslag:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale opslagruimte:</gray><white>{max_storages}</white>"
      - "<yellow>Klik om door uw opslaglijst te bladeren.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Opslagruimte</gradient>"
    lore:
      - "<gray>Eigen opslag:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale opslagruimte:</gray><white>{max_storages}</white>"
      - "<yellow>Klik om nog een opslagruimte aan te schaffen.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Opslagbeheerder</gradient>"
    lore:
      - "<gray>Open bevoorrechte RDR beheerdersopties.</gray>"
      - "<gray>Beheer valutaproviders en standaardinstellingen.</gray>"
      - "<yellow>Vereist:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Opslagcontrole</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Beheerderspaneel</gradient>"
    lore:
      - "<gray>Beheer geprivilegieerde opslagsystemen vanaf één plek.</gray>"
      - "<gray>Gebruik dit paneel om configuratiewaarden en valutaondersteuning te bewerken.</gray>"
      - "<yellow>Vereist:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Opslagconfiguratie</gradient>"
      lore:
        - "<gray>Waarden bewerken van</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Elke bewerkbare instelling kan worden gewijzigd via een aambeeldprompt.</gray>"
        - "<yellow>Klik om configuratiecontroles te openen.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valutabeheerder</gradient>"
      lore:
        - "<gray>Controleer gedetecteerde valuta's van Vault en JExEconomy.</gray>"
        - "<gray>Maak de standaard</gray> <white>raindrops</white> <gray>munt wanneer dat nodig is.</gray>"
        - "<yellow>Klik om valutacontroles te openen.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Beheerderstoegang vereist</gradient>"
      lore:
        - "<gray>U heeft geen toestemming om dit beheerdersdashboard te gebruiken.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Valutabeheerder</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Valutaaanbieders</gradient>"
    lore:
      - "<gray>Gedetecteerde valuta:</gray> <white>{currency_count}</white>"
      - "<gray>Vault beschikbaar:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy beschikbaar:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Gebruik de kristallen knop om de standaardvaluta te creëren.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Aanbieder:</gray> <white>{provider}</white>"
      - "<gray>Symbool:</gray> <white>{symbol}</white>"
      - "<gray>Voorvoegsel:</gray> <white>{prefix}</white>"
      - "<gray>Achtervoegsel:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Creëren {currency_id}</gradient>"
      lore:
        - "<gray>Creëer de standaardvaluta RDR in JExEconomy.</gray>"
        - "<yellow>Klik om {currency_id} aan te maken.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Vereist</gradient>"
      lore:
        - "<gray>U kunt geen standaardvaluta maken zonder JExEconomy.</gray>"
        - "<gray>Installeer en schakel eerst JExEconomy in.</gray>"
