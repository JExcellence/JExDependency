      name: "<gradient:#22c55e:#86efac>[+] {plugin_name}</gradient>"
    missing:
      name: "<gradient:#ef4444:#f87171>[X] {plugin_name}</gradient>"
    lore:
      - "<gray>Integration id:</gray> <white>{integration_id}</white>"
