      - "<yellow>A server restart is required after applying changes.</yellow>"
  plugin_entry:
    status:
      detected: "<gradient:#22c55e:#86efac>Detected</gradient>"
      missing: "<gradient:#ef4444:#f87171>Missing</gradient>"
