      - "<gray>Default skill:</gray> <white>{default_skill}</white>"
      - "<gray>Level Range Applied:</gray> <white>{level_range}</white>"
      - "<yellow>Click to add this requirement set to config/config.yml.</yellow>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] No Skill Bridges</gradient>"
      lore:
        - "<gray>No supported skill bridge entries are available.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this skill view.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X] Config Editing Locked</gradient>"
      lore:
        - "<gray>This edition does not allow runtime config edits.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to manage skill requirements.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Config editing is locked in this edition.</gray>"
    applied: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Applied default skill requirement for <white>{plugin_name}</white> <gray>(id:</gray> <white>{integration_id}</white><gray>, skill:</gray> <white>{default_skill}</white><gray>, range:</gray> <white>{level_range}</white><gray>) to <white>{updated_tiers}</white> <gray>storage purchase tier(s).</gray>"
    restart_required: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <gray>Restart the server for requirement changes to take effect.</gray>"
    apply_failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Failed to apply default requirements for <white>{plugin_name}</white><gray>.</gray>"
  decoration:
    border:
      name: " "

