prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Storage Stats</gradient>"
  items: "<gray>Total items:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Available slots:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Storages obtained:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Max storages:</gray> <white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Storage Summary</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<gray>Your vault network is persisted</gray>"
      - "<gray>and ready for cross-server use.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] View Storages</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<yellow>Click to browse your storage list.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Storage Store</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<yellow>Click to purchase another storage.</yellow>"
  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Storage Admin</gradient>"
    lore:
      - "<gray>Open privileged RDR admin controls.</gray>"
      - "<gray>Manage currency providers and defaults.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Storage Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin Panel</gradient>"
    lore:
      - "<gray>Manage privileged storage systems from one place.</gray>"
      - "<gray>Use this panel to edit config values and open integration controls.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Edit values from</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Typed settings open in a matching stained-glass anvil editor.</gray>"
        - "<yellow>Click to open config controls.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin Integrations</gradient>"
      lore:
        - "<gray>Manage skill, job, currency, and PlaceholderAPI tools.</gray>"
        - "<gray>Open integration-specific admin controls.</gray>"
        - "<yellow>Click to open integration management.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Currency Manager</gradient>"
      lore:
        - "<gray>Review detected currencies from Vault and JExEconomy.</gray>"
        - "<gray>Create the default</gray> <white>raindrops</white> <gray>currency when needed.</gray>"
        - "<yellow>Click to open currency controls.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skill Requirements</gradient>"
      lore:
        - "<gray>Review supported skill plugins and detection state.</gray>"
        - "<gray>Apply default skill requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open skill requirement controls.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Job Requirements</gradient>"
      lore:
        - "<gray>Review supported job plugins and detection state.</gray>"
        - "<gray>Apply default job requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open job requirement controls.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this admin panel.</gray>"

plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>[Int] Plugin Integrations</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Integration Hub</gradient>"
    lore:
      - "<gray>Centralized integration controls for storage requirements.</gray>"
      - "<gray>Open currency, skills, jobs, and PlaceholderAPI actions.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Currency Manager</gradient>"
      lore:
        - "<gray>Review detected currencies from Vault and JExEconomy.</gray>"
        - "<gray>Create the default</gray> <white>raindrops</white> <gray>currency when needed.</gray>"
        - "<yellow>Click to open currency controls.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skill Requirements</gradient>"
      lore:
        - "<gray>Review supported skill plugins and detection state.</gray>"
        - "<gray>Apply default skill requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open skill requirement controls.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Job Requirements</gradient>"
      lore:
        - "<gray>Review supported job plugins and detection state.</gray>"
        - "<gray>Apply default job requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open job requirement controls.</yellow>"
    placeholder_api:
      name: "<gradient:#38bdf8:#60a5fa>[PAPI] PlaceholderAPI</gradient>"
      lore:
        - "<gray>Detect PlaceholderAPI support and manage expansions.</gray>"
        - "<gray>Install the</gray> <white>Player</white> <gray>expansion and reload PlaceholderAPI.</gray>"
        - "<yellow>Click to open PlaceholderAPI tools.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this integration panel.</gray>"

placeholder_api_ui:
  title: "<gradient:#38bdf8:#60a5fa>[PAPI] PlaceholderAPI Tools</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] PlaceholderAPI Integration</gradient>"
    lore:
      - "<gray>PlaceholderAPI supported:</gray> <white>{supported}</white>"
      - "<gray>Target expansion:</gray> <white>{expansion_name}</white>"
      - "<yellow>Install the expansion and reload PlaceholderAPI from this panel.</yellow>"
  detection:
    supported:
      name: "<gradient:#10b981:#34d399>[OK] PlaceholderAPI Detected</gradient>"
      lore:
        - "<gray>PlaceholderAPI is available and enabled.</gray>"
    missing:
      name: "<gradient:#ef4444:#f87171>[X] PlaceholderAPI Missing</gradient>"
      lore:
        - "<gray>Install and enable PlaceholderAPI to use this action.</gray>"
  action:
    install:
      name: "<gradient:#10b981:#34d399>[+] Install {expansion_name} Expansion</gradient>"
      lore:
        - "<gray>Runs:</gray> <white>papi ecloud download {expansion_name}</white>"
        - "<gray>Then runs:</gray> <white>papi reload</white>"
        - "<yellow>Click to execute both PlaceholderAPI commands.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] PlaceholderAPI Required</gradient>"
      lore:
        - "<gray>This action is unavailable until PlaceholderAPI is installed.</gray>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use PlaceholderAPI admin tools.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to manage PlaceholderAPI integrations.</gray>"
    unsupported_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>PlaceholderAPI is not available on this server.</gray>"
    download_failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Failed to dispatch expansion download for <white>{expansion_name}</white><gray>.</gray>"
    reload_failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Expansion download completed, but PlaceholderAPI reload failed.</gray>"
    completed: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Installed <white>{expansion_name}</white> expansion and reloaded PlaceholderAPI.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Currency Manager</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Currency Providers</gradient>"
    lore:
      - "<gray>Detected currencies:</gray> <white>{currency_count}</white>"
      - "<gray>Vault available:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy available:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Use the crystal button to create the default currency.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Provider:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Prefix:</gray> <white>{prefix}</white>"
      - "<gray>Suffix:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Create {currency_id}</gradient>"
      lore:
        - "<gray>Create the default RDR currency in JExEconomy.</gray>"
        - "<yellow>Click to create {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Required</gradient>"
      lore:
        - "<gray>You cannot create default currency without JExEconomy.</gray>"
        - "<gray>Install and enable JExEconomy first.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Ready</gradient>"
      lore:
        - "<gray>The default currency already exists.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Created default currency:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Failed to create currency:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Currency already exists:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You cannot use this button unless JExEconomy is available.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] No Currencies Detected</gradient>"
      lore:
        - "<gray>No Vault or JExEconomy currencies were detected.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this currency view.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to manage currencies.</gray>"
  decoration:
    border:
      name: " "

storage_admin_skills_ui:
  title: "<gradient:#22c55e:#86efac>[Skill] Requirement Integrations</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Supported Skill Plugins</gradient>"
    lore:
      - "<gray>Supported bridges:</gray> <white>{supported_count}</white>"
      - "<gray>Detected now:</gray> <white>{detected_count}</white>"
