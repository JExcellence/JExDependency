      - "<gray>管理货币提供商和默认值。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[管理员] 存储控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[信息] RDR 管理面板</gradient>"
    lore:
      - "<gray>从一处管理特权存储系统。</gray>"
      - "<gray>使用此面板可以编辑配置值并打开集成控件。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[层] 玩家控制</gradient>"
      lore:
        - "<gray>编辑玩家/组限制、折扣和存储力控制。</gray>"
        - "<gray>打开覆盖编辑器和紧急管理操作。</gray>"
        - "<yellow>单击可打开播放器控件。</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 存储配置</gradient>"
      lore:
        - "<gray>从</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>编辑值 在匹配的彩色玻璃砧编辑器中打开键入的设置。</gray>"
        - "<yellow>单击可打开配置控件。</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] 插件集成</gradient>"
      lore:
        - "<gray>管理技能、工作、货币和 PlaceholderAPI 工具。</gray>"
        - "<gray>打开集成特定的管理控件。</gray>"
        - "<yellow>单击打开集成管理。</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 货币管理器</gradient>"
      lore:
        - "<gray>查看从 Vault 和 JExEconomy 检测到的货币。</gray>"
        - "<gray>在需要时创建默认的</gray> <white>raindrops</white> <gray>货币。</gray>"
        - "<yellow>单击可打开货币控制。</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[技能] 技能要求</gradient>"
      lore:
        - "<gray>查看支持的技能插件和检测状态。</gray>"
        - "<gray>将默认技能要求应用于所有存储购买层。</gray>"
        - "<yellow>单击可打开技能要求控件。</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[作业] 作业要求</gradient>"
      lore:
        - "<gray>查看支持的作业插件和检测状态。</gray>"
        - "<gray>将默认作业要求应用于所有存储购买层。</gray>"
        - "<yellow>单击可打开作业要求控制。</yellow>"
