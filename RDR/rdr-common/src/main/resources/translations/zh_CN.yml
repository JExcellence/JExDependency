      pending: "<gradient:#f59e0b:#fbbf24>[待处理]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[不可用]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>现已准备就绪。</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>存储<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>的进度"
