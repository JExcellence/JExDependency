      name: "<gradient:#10b981:#34d399>[OK] {currency_id} 准备好</gradient>"
      lore:
        - "<gray>默认货币已存在。</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>创建默认货币：</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>创建货币失败：</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>货币已存在：</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>除非 JExEconomy 可用，否则您无法使用此按钮。</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] 未检测到货币</gradient>"
      lore:
        - "<gray>未检测到 Vault 或 JExEconomy 货币。</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理员访问权限</gradient>"
      lore:
        - "<gray>您无权使用此货币视图。</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您没有管理货币的权限。</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] 存储配置</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[信息]</gradient> <white>配置设置</white>"
    lore:
      - "<gray>编辑值，检测到可编辑设置：</gray> <white>{setting_count}</white>"
      - "<gray>单击下面的任何条目以编辑其值铁砧。</gray>"
      - "<yellow>更改直接写入config/config.yml。</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[放]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>路径：</gray> <white>{config_path}</white>"
      - "<gray>类型：</gray> <white>{value_type}</white>"
      - "<gray>当前值：</gray> <white>{current_value}</white>"
      - "<yellow>单击以编辑此设置。</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[布尔值]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[整数]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[长的]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[双倍的]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[列表]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[细绳]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>不可编辑设置</white>"
      lore:
        - "<gray>找不到可编辑的标量/列表配置设置。</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>需要管理员访问权限</white>"
      lore:
        - "<gray>您无权使用此配置视图。</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>配置编辑已锁定</white>"
      lore:
        - "<gray>此版本不允许运行时配置编辑。</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您无权编辑配置设置。</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>配置编辑在此版本中被锁定。</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>更新<white>{config_path}</white><gray> 到<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "编辑{config_path}"
  input:
    lore:
      - "<gray>路径：</gray> <white>{config_path}</white>"
      - "<gray>类型：</gray> <white>{value_type}</white>"
      - "<gray>当前值：</gray> <white>{current_value}</white>"
      - "<yellow>输入新值并确认。</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>类型的输入无效<white>{value_type}</white><gray>。输入：</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 存储存储</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[信息] 存储容量</gradient>"
    lore:
      - "<gray>拥有的存储：</gray><white>{owned_storages}</white>"
      - "<gray>最大存储量：</gray><white>{max_storages}</white>"
      - "<gray>购买额外的保管库空间，直到</gray>"
      - "<gray>您达到配置的上限。</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[要求] 存储要求</gradient>"
    lore:
      - "<gray>配置要求：</gray><white>{requirement_count}</white>"
      - "<gray>当前要求计数：</gray><white>{requirements}</white>"
      - "<gray>状态：</gray><white>{availability}</white>"
      - "<yellow>单击可详细检查每个需求层。</yellow>"
    none: "<gradient:#ef4444:#f87171>[无]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[就绪]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待处理]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[离线]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] 购买存储</gradient>"
      lore:
        - "<gray>配置要求：</gray><white>{requirement_count}</white>"
        - "<gray>当前要求：</gray><white>{requirements}</white>"
        - "<gray>拥有的存储：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>满足所有要求后点击购买。</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] 要求待定</gradient>"
      lore:
        - "<gray>配置要求：</gray><white>{requirement_count}</white>"
        - "<gray>当前要求：</gray><white>{requirements}</white>"
        - "<gray>拥有的存储：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>购买前满足其余要求。</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] 已达到存储限制</gradient>"
      lore:
        - "<gray>拥有的存储：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>您无法购买更多存储空间</gray>"
        - "<gray>直到全球上限提高。</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] 离线要求</gradient>"
      lore:
        - "<gray>一个或多个配置的存储要求</gray>"
        - "<gray>无法在此服务器上解析。</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] 配置文件丢失</gradient>"
      lore:
        - "<gray>您的RDR配置文件无法加载，</gray>"
        - "<gray>因此购买暂时被阻止。</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>已购买<white>{storage_key}</white><gray>。消耗的要求：</gray><white>{requirements}</white><gray>。拥有的存储：</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您当前不符合<white>{requirement}</white><gray>。存储要求：</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>存储要求<white>{requirement}</white><gray>目前不可用或无效。</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>目前没有可用于存储购买的已配置商店要求。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您已达到<white>{max_storages}</white><gray>的存储限制。拥有的存储：</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>您的RDR配置文件无法加载，因此无法购买存储空间。</gray>"

