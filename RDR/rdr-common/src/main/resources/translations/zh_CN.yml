  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] 存储管理员</gradient>"
    lore:
      - "<gray>打开特权 RDR 管理控件。</gray>"
      - "<gray>管理货币提供商和默认值。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] 存储控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR 管理面板</gradient>"
    lore:
      - "<gray>从一处管理特权存储系统。</gray>"
      - "<gray>使用此面板可编辑配置值和货币支持。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 存储配置</gradient>"
      lore:
        - "<gray>从</gray> <white>配置/config.yml</white><gray>.</gray>"
        - "<gray>每个可编辑设置都可以通过铁砧提示进行更改。</gray>"
        - "<yellow>单击以打开配置控件。</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 货币经理</gradient>"
      lore:
        - "<gray>检查从 Vault 和 JExEconomy 检测到的货币。</gray>"
        - "<gray>创建默认值</gray> <white>raindrops</white> <gray>需要时使用货币。</gray>"
        - "<yellow>单击可打开货币控制。</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理员访问权限</gradient>"
      lore:
        - "<gray>您无权使用此管理面板。</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] 货币经理</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] 货币供应商</gradient>"
