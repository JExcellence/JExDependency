  title: "<gradient:#22c55e:#14b8a6>[Ply] 播放器和组控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] 存储管理工具包</gradient>"
    lore:
      - "<gray>编辑玩家和团体的最大存储空间和折扣。</gray>"
      - "<gray>强制清空/重置存储或关闭所有打开的 RDR 视图。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] 玩家覆盖</gradient>"
      lore:
        - "<gray>浏览在线玩家并配置覆盖目标。</gray>"
        - "<gray>编辑每个玩家的最大存储空间和折扣值。</gray>"
        - "<yellow>单击可打开播放器覆盖。</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] 组覆盖</gradient>"
      lore:
        - "<gray>选择一个 LuckPerms 组并设置覆盖值。</gray>"
        - "<gray>对于基于权限的等级非常有用。</gray>"
        - "<yellow>单击可打开组覆盖。</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] 强制清空存储</gradient>"
      lore:
        - "<gray>清除选定存储中的所有项目内容。</gray>"
        - "<gray>保留可信设置、债务和热键值。</gray>"
        - "<yellow>单击以选择存储。</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] 强制重置存储</gradient>"
      lore:
        - "<gray>将选定的存储重置为干净状态。</gray>"
        - "<gray>清除项目、债务、可信访问和热键。</gray>"
        - "<yellow>单击以选择存储。</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] 强制关闭所有 RDR 视图</gradient>"
      lore:
        - "<gray>关闭所有当前打开的 RDR 菜单。</gray>"
        - "<gray>在配置更改或紧急操作后有用。</gray>"
        - "<yellow>单击可强制关闭所有 RDR 视图。</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理员访问权限</gradient>"
      lore:
        - "<gray>您没有使用此菜单的权限。</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您无权使用玩家/组管理控件。</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>强制关闭<白色>{closed_views}</white> open RDR view(s).</gray>"

