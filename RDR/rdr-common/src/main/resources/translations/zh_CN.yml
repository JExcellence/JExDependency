    unlimited: "<gradient:#22c55e:#86efac>[无限]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] 查看存储</gradient>"
    lore:
      - "<gray>拥有的存储：</gray><white>{owned_storages}</white>"
      - "<gray>最大存储量：</gray><white>{max_storages}</white>"
      - "<yellow>单击以浏览您的存储列表。</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] 存储存储</gradient>"
    lore:
      - "<gray>拥有的存储：</gray><white>{owned_storages}</white>"
      - "<gray>最大存储量：</gray><white>{max_storages}</white>"
