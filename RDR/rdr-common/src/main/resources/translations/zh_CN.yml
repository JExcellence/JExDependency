  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>提供商：</gray> <white>{provider}</white>"
      - "<gray>象征：</gray> <white>{symbol}</white>"
      - "<gray>前缀：</gray> <white>{prefix}</white>"
      - "<gray>后缀：</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] 创造 {currency_id}</gradient>"
      lore:
        - "<gray>在 JExEconomy 中创建默认的 RDR 货币。</gray>"
        - "<yellow>单击以创建 {currency_id}。</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy 必需</gradient>"
      lore:
        - "<gray>如果没有 JExEconomy 则无法创建默认货币。</gray>"
