    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Public]</gradient> <gray>{player} لم يعد لديه مخزن</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient> <gray>{player} الآن يمكن إيداعه في هذا المخزن.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient> <gray>{player} يمكن الآن إيداع وسحب من هذا التخزين.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>فقط مالك المخزن يمكنه تغيير الدخول الموثوق به</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] المالك فقط</gradient>"
      lore:
        - "<gray>يمكنك مشاهدة هذا التخزين، ولكن فقط</gray>"
        - "<gray>يمكن للمالك أن يغير الدخول الموثوق به</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] سرقة</gradient>"
      lore:
        - "<gray>هذا المخزن لا يمكن تحميله</gray>"
        - "<gray>لإدارة الدخول الموثوقة</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>ولا يمكن تحميل هذا التخزين لإدارة الدخول الموثوقة.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Free] أماكن مغلقة</gradient>"
      lore:
        - "<gray>تغيرات الوصول المثق بها معوقة</gray>"
        - "<gray>في <white>RDR Free</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] لا مؤسسات لللاعبين</gradient>"
      lore:
        - "<gray>لا يوجد لاعبون معروفون آخرون</gray>"
        - "<gray>لإسناد وصول موثوق.</gray>"

storage_view:
