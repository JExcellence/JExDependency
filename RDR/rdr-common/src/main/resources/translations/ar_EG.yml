      - "<gray>مالك:</gray> <white>{owner_name}</white>"
      - "<gray>Associates:</gray> <white>{associate_count}</white>"
      - "<gray>الثقة:</gray> <white>{trusted_count}</white>"
      - "<yellow>اضغط على اللاعب للوصول إلى دورة.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Public] {player}</gradient>"
      lore:
        - "<gray>الحالة:</gray> <white>الجمهور</white>"
        - "<gray>لا إيداع أو سحب الوصول.</gray>"
        - "<yellow>انقروا للترويج لشركائهم</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associate] {player}</gradient>"
      lore:
        - "<gray>الحالة:</gray> <white>Associate</white>"
        - "<gray>يمكن إيداعه ولكن لا يمكن سحبه.</gray>"
        - "<yellow>قم بالترويج للثقة</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Trusted] {player}</gradient>"
      lore:
        - "<gray>الحالة:</gray> <white>الثقة</white>"
        - "<gray>يمكن إيداع وسحب الأشياء.</gray>"
        - "<yellow>اضغط على الناس</yellow>"
