        - "<gray>المتطلبات التي تم تكوينها:</gray><white>{requirement_count}</white>"
        - "<gray>المتطلبات الحالية:</gray><white>{requirements}</white>"
        - "<gray>المخازن المملوكة:</gray><white>{owned_storages}/{max_storages}</white>"
