prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] إحصائيات التخزين</gradient>"
  items: "<gray>إجمالي العناصر:</gray><white>{total_items}</white>"
  available_slots: "<gray>الفتحات المتاحة:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>المخازن التي تم الحصول عليها:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>الحد الأقصى للسعة التخزينية:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[غير محدود]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] مركز التخزين</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] ملخص التخزين</gradient>"
    lore:
      - "<gray>المخازن المملوكة:</gray><white>{owned_storages}</white>"
      - "<gray>الحد الأقصى للسعة التخزينية:</gray><white>{max_storages}</white>"
      - "<gray>شبكة المخزن الخاصة بك مستمرة</gray>"
      - "<gray>وجاهز للاستخدام عبر الخادم.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[غير محدود]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] عرض المخازن</gradient>"
    lore:
      - "<gray>المخازن المملوكة:</gray><white>{owned_storages}</white>"
      - "<gray>الحد الأقصى للسعة التخزينية:</gray><white>{max_storages}</white>"
      - "<yellow>انقر لتصفح قائمة التخزين الخاصة بك.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] مخزن التخزين</gradient>"
    lore:
      - "<gray>المخازن المملوكة:</gray><white>{owned_storages}</white>"
      - "<gray>الحد الأقصى للسعة التخزينية:</gray><white>{max_storages}</white>"
      - "<yellow>انقر لشراء مساحة تخزين أخرى.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] مسؤول التخزين</gradient>"
    lore:
      - "<gray>افتح عناصر تحكم المشرف RDR المميزة.</gray>"
      - "<gray>إدارة موفري العملات والافتراضيات.</gray>"
      - "<yellow>يتطلب:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[المسؤول] التحكم في التخزين</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[معلومات] لوحة إدارة RDR</gradient>"
    lore:
      - "<gray>إدارة أنظمة التخزين المميزة من مكان واحد.</gray>"
      - "<gray>استخدم هذه اللوحة لتحرير قيم التكوين وفتح عناصر التحكم في التكامل.</gray>"
      - "<yellow>يتطلب:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] عناصر التحكم في المشغل</gradient>"
      lore:
        - "<gray>تحرير حدود اللاعب/المجموعة والخصومات وعناصر التحكم في قوة التخزين.</gray>"
        - "<gray>محررات التجاوز المفتوحة وإجراءات إدارة الطوارئ.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في المشغل.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] تكوين التخزين</gradient>"
      lore:
        - "<gray>تحرير القيم من</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>يتم فتح الإعدادات المكتوبة في محرر سندان من الزجاج الملون المطابق.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في التكوين.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[كثافة العمليات] تكامل البرنامج المساعد</gradient>"
      lore:
        - "<gray>إدارة أدوات المهارات والوظيفة والعملة وPlaceholderAPI.</gray>"
        - "<gray>افتح عناصر التحكم الإدارية الخاصة بالتكامل.</gray>"
        - "<yellow>انقر لفتح إدارة التكامل.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[الضريبة] بنك الخادم التجاري</gradient>"
      lore:
        - "<gray>مراجعة أرصدة الضرائب التجارية المجمعة حسب العملة.</gray>"
        - "<gray>سحب أرصدة بنك الخادم إلى حساب المشرف الخاص بك.</gray>"
        - "<yellow>انقر لفتح ضوابط بنك الضرائب التجارية.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[الكير] مدير العملة</gradient>"
      lore:
        - "<gray>قم بمراجعة العملات المكتشفة من Vault وJExEconomy.</gray>"
        - "<gray>قم بإنشاء الافتراضي</gray> <white>raindrops</white> <gray>العملة عند الحاجة.</gray>"
        - "<yellow>انقر لفتح ضوابط العملة.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[المهارة] متطلبات المهارة</gradient>"
      lore:
        - "<gray>قم بمراجعة المكونات الإضافية للمهارات المدعومة وحالة الكشف.</gray>"
        - "<gray>قم بتطبيق متطلبات المهارات الافتراضية على جميع مستويات شراء التخزين.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في متطلبات المهارة.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[الوظيفة] متطلبات الوظيفة</gradient>"
      lore:
        - "<gray>قم بمراجعة المكونات الإضافية للمهمة المدعومة وحالة الكشف.</gray>"
        - "<gray>تطبيق متطلبات الوظيفة الافتراضية على كافة طبقات شراء التخزين.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في متطلبات الوظيفة.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] مطلوب وصول المسؤول</gradient>"
      lore:
        - "<gray>ليس لديك إذن لاستخدام لوحة الإدارة هذه.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] عناصر تحكم المشغل والمجموعة</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[معلومات] مجموعة أدوات إدارة التخزين</gradient>"
    lore:
      - "<gray>تحرير الحد الأقصى للمخازن والخصومات للاعبين والمجموعات.</gray>"
      - "<gray>فرض استنزاف/إعادة ضبط المخازن أو إغلاق كافة طرق عرض RDR المفتوحة.</gray>"
      - "<yellow>يتطلب:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] تجاوزات اللاعب</gradient>"
      lore:
        - "<gray>تصفح اللاعبين عبر الإنترنت وأهداف التجاوز التي تم تكوينها.</gray>"
        - "<gray>قم بتحرير الحد الأقصى من المخازن وقيم الخصم لكل لاعب.</gray>"
        - "<yellow>انقر لفتح تجاوزات اللاعب.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] تجاوزات المجموعة</gradient>"
      lore:
        - "<gray>حدد مجموعة LuckPerms وقم بتعيين قيم التجاوز.</gray>"
        - "<gray>مفيد لمستويات التصنيف القائمة على الأذونات.</gray>"
        - "<yellow>انقر لفتح تجاوزات المجموعة.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] تخزين الصرف القسري</gradient>"
      lore:
        - "<gray>يمسح كافة محتويات العنصر من وحدة التخزين المحددة.</gray>"
        - "<gray>يحتفظ بالإعدادات الموثوقة والديون وقيم مفاتيح التشغيل السريع.</gray>"
        - "<yellow>انقر لاختيار مساحة تخزين.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] فرض إعادة تعيين وحدة التخزين</gradient>"
      lore:
        - "<gray>يعيد تعيين وحدة تخزين محددة إلى حالة نظيفة.</gray>"
        - "<gray>يمسح العناصر والديون والوصول الموثوق به ومفتاح التشغيل السريع.</gray>"
        - "<yellow>انقر لاختيار مساحة تخزين.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] فرض إغلاق كافة طرق عرض RDR</gradient>"
      lore:
        - "<gray>لإغلاق كافة قوائم RDR المفتوحة حاليًا.</gray>"
        - "<gray>مفيد بعد تغييرات التكوين أو إجراءات الطوارئ.</gray>"
        - "<yellow>انقر لفرض إغلاق كافة طرق عرض RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] مطلوب وصول المسؤول</gradient>"
      lore:
        - "<gray>ليس لديك الإذن باستخدام هذه القائمة.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>ليس لديك إذن لاستخدام عناصر تحكم مسؤول المشغل/المجموعة.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>مغلق بالقوة <أبيض>{closed_views}</white> open RDR view(s).</gray>"

