    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>لا تتوفر متطلبات المتجر التي تم تكوينها لعمليات شراء التخزين في الوقت الحالي.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>لقد وصلت إلى حد التخزين وهو<white>{max_storages}</white><gray>. المخازن المملوكة:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>تعذر تحميل ملفك الشخصيRDR، لذا فإن مشتريات التخزين غير متاحة.</gray>"

