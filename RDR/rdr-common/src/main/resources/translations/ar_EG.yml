      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] مؤمن عليه</gradient>"
    lore:
      - "<gray>فقط مالك المخزن يستطيع أن يدير</gray>"
      - "<gray>الدخول الموثوق به لهذا المخزن</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Hotkey Locked</gradient>"
