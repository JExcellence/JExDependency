    name: "<gradient:#a78bfa:#c4b5fd>[Admin] مسؤول التخزين</gradient>"
    lore:
      - "<gray>افتح عناصر تحكم المشرف RDR المميزة.</gray>"
      - "<gray>إدارة موفري العملات والافتراضيات.</gray>"
      - "<yellow>يتطلب:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] التحكم في التخزين</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR لوحة الإدارة</gradient>"
    lore:
      - "<gray>إدارة أنظمة التخزين المميزة من مكان واحد.</gray>"
      - "<gray>استخدم هذه اللوحة لتحرير قيم الإعدادات ودعم العملات.</gray>"
      - "<yellow>يتطلب:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] إعدادات التخزين</gradient>"
      lore:
        - "<gray>تحرير القيم من</gray> <white>التكوين/config.yml</white><gray>.</gray>"
        - "<gray>يمكن تغيير كل إعداد قابل للتحرير من خلال مطالبة السندان.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في التكوين.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] مدير العملة</gradient>"
      lore:
        - "<gray>راجع العملات المكتشفة من Vault وJExEconomy.</gray>"
        - "<gray>قم بإنشاء الافتراضي</gray> <white>raindrops</white> <gray>العملة عند الحاجة.</gray>"
        - "<yellow>انقر لفتح ضوابط العملة.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] مطلوب وصول المسؤول</gradient>"
      lore:
        - "<gray>ليس لديك إذن لاستخدام لوحة الإدارة هذه.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] مدير العملة</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] مزودي العملة</gradient>"
    lore:
      - "<gray>العملات المكتشفة:</gray> <white>{currency_count}</white>"
      - "<gray>Vault متاح:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy متاح:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>استخدم الزر البلوري لإنشاء العملة الافتراضية.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>مزود:</gray> <white>{provider}</white>"
      - "<gray>رمز:</gray> <white>{symbol}</white>"
      - "<gray>بادئة:</gray> <white>{prefix}</white>"
      - "<gray>لاحقة:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] يخلق {currency_id}</gradient>"
      lore:
        - "<gray>قم بإنشاء العملة الافتراضية RDR في JExEconomy.</gray>"
        - "<yellow>انقر لإنشاء {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy مطلوب</gradient>"
      lore:
        - "<gray>لا يمكنك إنشاء عملة افتراضية بدون JExEconomy.</gray>"
        - "<gray>قم بتثبيت وتمكين JExEconomy أولاً.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} مستعد</gradient>"
      lore:
        - "<gray>العملة الافتراضية موجودة بالفعل.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>العملة الافتراضية التي تم إنشاؤها:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>فشل في إنشاء العملة:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>العملة موجودة بالفعل:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>لا يمكنك استخدام هذا الزر إلا إذا كان JExEconomy متاحًا.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] لم يتم اكتشاف أي عملات</gradient>"
      lore:
        - "<gray>لم يتم اكتشاف أي عملات Vault أو JExEconomy.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] مطلوب وصول المسؤول</gradient>"
      lore:
        - "<gray>ليس لديك إذن لاستخدام طريقة عرض العملة هذه.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>ليس لديك إذن لإدارة العملات.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] إعدادات التخزين</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[معلومات]</gradient> <white>إعدادات التكوين</white>"
    lore:
      - "<gray>تم اكتشاف إعدادات التحرير:</gray> <white>{setting_count}</white>"
      - "<gray>انقر فوق أي إدخال أدناه لتحرير قيمته في سندان.</gray>"
      - "<yellow>التغييرات تتم كتابتها مباشرة إلى config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[تعيين]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>المسار:</gray> <white>{config_path}</white>"
      - "<gray>النوع:</gray> <white>{value_type}</white>"
      - "<gray>القيمة الحالية:</gray> <white>{current_value}</white>"
      - "<yellow>انقر لتحرير هذا الإعداد.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[عدد صحيح]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[طويل]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[مزدوج]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[قائمة]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[خيط]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>لم يتم العثور على إعدادات قابلة للتحرير</white>"
      lore:
        - "<gray>لم يتم العثور على إعدادات تكوين الحجم/القائمة القابلة للتحرير.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>يلزم وصول المسؤول</white>"
      lore:
        - "<gray>ليس لديك إذن لاستخدام عرض التكوين هذا.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>تم قفل تحرير التكوين</white>"
      lore:
        - "<gray>لا يسمح هذا الإصدار بتعديلات تكوين وقت التشغيل.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>ليس لديك إذن لتحرير إعدادات التكوين.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>تحرير التكوين مقفل في هذا الإصدار.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>محدث <white>{config_path}</white><gray> إلى <white>{updated_value}</white><gray>.</gray>"

