  input:
    lore:
      - "<gray>パス:</gray> <white>{config_path}</white>"
      - "<gray>タイプ:</gray> <white>{value_type}</white>"
      - "<gray>現在の値:</gray> <white>{current_value}</white>"
      - "<yellow>新しい値を入力して確認してください。</yellow>"
