      name: "<gradient:#10b981:#34d399>[OK] {currency_id} 準備ができて</gradient>"
      lore:
        - "<gray>デフォルトの通貨はすでに存在します。</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>作成されたデフォルト通貨:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>通貨の作成に失敗しました:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>通貨はすでに存在します:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>JExEconomy が使用できない場合、このボタンは使用できません。</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] 通貨が検出されませんでした</gradient>"
      lore:
        - "<gray>Vault または JExEconomy 通貨は検出されませんでした。</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 管理者アクセスが必要です</gradient>"
      lore:
        - "<gray>この通貨ビューを使用する権限がありません。</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>通貨を管理する権限がありません。</gray>"
