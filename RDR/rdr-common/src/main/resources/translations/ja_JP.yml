      name: "<gradient:#f59e0b:#fbbf24>[税金] 貿易サーバー銀行</gradient>"
      lore:
        - "<gray>徴収された貿易税残高を通貨ごとに確認します。</gray>"
        - "<gray>サーバー銀行の残高を管理者に引き出します アカウント。</gray>"
        - "<yellow>クリックして営業税銀行コントロールを開きます。</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 通貨マネージャー</gradient>"
      lore:
        - "<gray>Vault および JExEconomy から検出された通貨を確認します。</gray>"
        - "<gray>デフォルトを作成する</gray> <white>raindrops</white> <gray>必要なときに通貨を使用します。</gray>"
        - "<yellow>クリックして通貨コントロールを開きます。</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>【スキル】スキル要件</gradient>"
      lore:
        - "<gray>サポートされているスキル プラグインと検出状態を確認します。</gray>"
        - "<gray>デフォルトのスキル要件をすべてのストレージ購入層に適用します。</gray>"
        - "<yellow>クリックしてスキル要件コントロールを開きます。</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>【職種】 職種要件</gradient>"
      lore:
        - "<gray>サポートされているジョブ プラグインと検出状態を確認します。</gray>"
        - "<gray>デフォルトのジョブ要件をすべてのストレージ購入層に適用します。</gray>"
        - "<yellow>クリックしてジョブ要件コントロールを開きます。</yellow>"
