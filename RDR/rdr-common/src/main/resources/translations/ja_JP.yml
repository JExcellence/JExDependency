storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[管理者] ストレージ制御</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[情報] RDR 管理パネル</gradient>"
    lore:
      - "<gray>特権ストレージ システムを 1 か所から管理します。</gray>"
      - "<gray>このパネルを使用して構成値を編集し、統合コントロールを開きます。</gray>"
      - "<yellow>必要：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[プライ] プレーヤーのコントロール</gradient>"
      lore:
        - "<gray>プレーヤー/グループの制限、割引、および保管力の制御を編集します。</gray>"
        - "<gray>オーバーライド エディターと緊急管理アクションを開きます。</gray>"
        - "<yellow>クリックしてプレーヤー コントロールを開きます。</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] ストレージ構成</gradient>"
      lore:
        - "<gray>値を編​​集する</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>入力した設定は、対応するステンドグラスのアンビル エディターで開きます。</gray>"
        - "<yellow>クリックして構成コントロールを開きます。</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] プラグインの統合</gradient>"
      lore:
        - "<gray>スキル、ジョブ、通貨、および PlaceholderAPI ツールを管理します。</gray>"
        - "<gray>統合固有の管理コントロールを開きます。</gray>"
        - "<yellow>クリックして統合管理を開きます。</yellow>"
