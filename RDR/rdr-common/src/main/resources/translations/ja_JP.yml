      name: "<gradient:#ef4444:#f87171>[X] JExEconomy 必須</gradient>"
      lore:
        - "<gray>JExEconomy がないとデフォルト通貨を作成できません。</gray>"
        - "<gray>まず JExEconomy をインストールして有効にします。</gray>"
