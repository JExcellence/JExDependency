    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] ストレージ設定</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[情報]</gradient> <white>構成設定</white>"
    lore:
      - "<gray>検出された編集可能な設定:</gray> <white>{setting_count}</white>"
      - "<gray>値を編集するには下のいずれかのエントリをクリックしてください</gray>"
      - "<yellow>変更はに直接書き込まれます。 config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[セット]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>パス:</gray> <white>{config_path}</white>"
      - "<gray>タイプ:</gray> <white>{value_type}</white>"
      - "<gray>現在の値:</gray> <white>{current_value}</white>"
      - "<yellow>クリックしてこの設定を編集します。</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[ブール値]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[整数]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[長さ]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[ダブル]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[リスト]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[弦]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>編集不可設定</white>"
      lore:
        - "<gray>編集可能なスカラー/リスト構成設定が見つかりませんでした。</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[×]</gradient> <white>管理者アクセスが必要</white>"
      lore:
        - "<gray>この構成ビューを使用する権限がありません。</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[×]</gradient> <white>構成編集はロックされています</white>"
      lore:
        - "<gray>このエディションではランタイム設定の編集ができません。</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>構成設定を編集する権限がありません。</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>このエディションでは構成編集がロックされています。</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>更新 <white>{config_path}</white><gray> を <white>{updated_value}</white><gray>.</gray>"

