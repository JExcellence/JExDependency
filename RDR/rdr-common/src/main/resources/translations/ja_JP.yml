      - "<gray>構成された要件:</gray><white>{requirement_count}</white>"
      - "<gray>現在の要件数:</gray><white>{requirements}</white>"
      - "<gray>ステータス:</gray><white>{availability}</white>"
      - "<yellow>クリックして各要件層を詳しく調べます。</yellow>"
    none: "<gradient:#ef4444:#f87171>[なし]</gradient>"
