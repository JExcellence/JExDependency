    lore:
      - "<gray>検出された通貨:</gray> <white>{currency_count}</white>"
      - "<gray>Vault が利用可能:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy が利用可能:</gray> <white>{jexeconomy_available}</white>"
