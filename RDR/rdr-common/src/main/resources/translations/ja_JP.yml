      name: "<gradient:#10b981:#34d399>[+] 作成する {currency_id}</gradient>"
      lore:
        - "<gray>JExEconomy にデフォルトの RDR 通貨を作成します。</gray>"
        - "<yellow>クリックして {currency_id} を作成します。</yellow>"
