storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] ストレージ制御</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR 管理パネル</gradient>"
    lore:
      - "<gray>特権ストレージ システムを 1 か所から管理します。</gray>"
      - "<gray>このパネルで設定値と通貨サポートを編集できます。</gray>"
      - "<yellow>必要：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] ストレージ設定</gradient>"
      lore:
        - "<gray>値の編集</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>すべての編集可能な設定は、金床プロンプトから変更できます。</gray>"
        - "<yellow>クリックして構成コントロールを開きます。</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 通貨マネージャー</gradient>"
      lore:
        - "<gray>Vault および JExEconomy から検出された通貨を確認します。</gray>"
        - "<gray>デフォルトを作成する</gray> <white>raindrops</white> <gray>必要なときに通貨を使用します。</gray>"
        - "<yellow>クリックして通貨コントロールを開きます。</yellow>"
