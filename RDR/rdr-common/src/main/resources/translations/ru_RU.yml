prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Статистика хранилища</gradient>"
  items: "<gray>Всего элементов:</gray><white>{total_items}</white>"
  available_slots: "<gray>Доступные слоты:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Получено хранилище:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Максимальное количество памяти:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Концентратор хранения</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Хранилище] Сводка хранилища</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<gray>Ваша сеть хранилища сохраняется</gray>"
      - "<gray>и готов к межсерверному использованию.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Просмотр хранилищ</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<yellow>Нажмите, чтобы просмотреть список хранилищ.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Хранилище хранения</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<yellow>Нажмите, чтобы приобрести другое хранилище.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Администратор хранилища</gradient>"
    lore:
      - "<gray>Откройте привилегированные элементы управления администратора RDR.</gray>"
      - "<gray>Управляйте поставщиками валют и значениями по умолчанию.</gray>"
      - "<yellow>Требует:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Контроль хранения</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Панель администратора</gradient>"
    lore:
      - "<gray>Управляйте привилегированными системами хранения из одного места.</gray>"
      - "<gray>Используйте эту панель для редактирования значений конфигурации и поддержки валют.</gray>"
      - "<yellow>Требует:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Настройка Хранилища</gradient>"
      lore:
        - "<gray>Изменить значения из</gray> <white>конфигурация/config.yml</white><gray>.</gray>"
        - "<gray>Каждый редактируемый параметр можно изменить с помощью наковальни.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления конфигурацией.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Валютный менеджер</gradient>"
      lore:
        - "<gray>Просмотрите обнаруженные валюты из Vault и JExEconomy.</gray>"
        - "<gray>Создайте значение по умолчанию</gray> <white>raindrops</white> <gray>валюту при необходимости.</gray>"
        - "<yellow>Нажмите, чтобы открыть валютный контроль.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Требуется доступ администратора</gradient>"
      lore:
        - "<gray>У вас нет разрешения на использование этой панели администратора.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Валютный менеджер</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Поставщики валюты</gradient>"
    lore:
      - "<gray>Обнаруженные валюты:</gray> <white>{currency_count}</white>"
      - "<gray>Vault доступно:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy доступен:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Используйте кнопку кристалла, чтобы создать валюту по умолчанию.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Провайдер:</gray> <white>{provider}</white>"
      - "<gray>Символ:</gray> <white>{symbol}</white>"
      - "<gray>Префикс:</gray> <white>{prefix}</white>"
      - "<gray>Суффикс:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Создавать {currency_id}</gradient>"
      lore:
        - "<gray>Создайте валюту RDR по умолчанию в JExEconomy.</gray>"
        - "<yellow>Нажмите, чтобы создать {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Обязательно</gradient>"
      lore:
        - "<gray>Вы не можете создать валюту по умолчанию без JExEconomy.</gray>"
        - "<gray>Сначала установите и включите JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Готовый</gradient>"
      lore:
        - "<gray>Валюта по умолчанию уже существует.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Созданная валюта по умолчанию:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Не удалось создать валюту:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Валюта уже существует:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Вы не можете использовать эту кнопку, если JExEconomy не доступен.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Валюты не обнаружены</gradient>"
      lore:
        - "<gray>Валюты Vault или JExEconomy не обнаружены.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Требуется доступ администратора</gradient>"
      lore:
        - "<gray>У вас нет разрешения на использование этого представления валюты.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>У вас нет разрешения на управление валютами.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Настройка Хранилища</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Информация]</gradient> <white>Настройки конфигурации</white>"
    lore:
      - "<gray>Обнаружены редактируемые настройки:</gray> <white>{setting_count}</white>"
      - "<gray>Нажмите любую запись ниже, чтобы изменить ее значение на наковальне.</gray>"
      - "<yellow>Изменения записываются непосредственно в config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Набор]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Путь:</gray> <white>{config_path}</white>"
      - "<gray>Тип:</gray> <white>{value_type}</white>"
      - "<gray>Текущее значение:</gray> <white>{current_value}</white>"
      - "<yellow>Нажмите, чтобы изменить этот параметр.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Целое число]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Длинный]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Двойной]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Список]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Нить]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Нет редактируемых настроек</white>"
      lore:
        - "<gray>Не найдено редактируемых скалярных/списочных настроек конфигурации.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[Х]</gradient> <white>Требуется доступ администратора</white>"
      lore:
        - "<gray>У вас нет разрешения на использование этого представления конфигурации.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[Х]</gradient> <white>Редактирование конфигурации заблокировано</white>"
      lore:
        - "<gray>Эта версия не позволяет редактировать конфигурацию во время выполнения.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray>У вас нет разрешения на редактирование настроек конфигурации.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray>Редактирование конфигурации заблокировано в этой версии.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Обновлено <white>{config_path}</white><gray> до <white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
