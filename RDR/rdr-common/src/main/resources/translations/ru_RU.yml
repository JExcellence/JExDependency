    status:
      online: "<gradient:#22c55e:#86efac>[Онлайн]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Не в сети]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Наследовать]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Неограниченно]</gradient>"
