      lore:
        - "<gray>Не найдены онлайн-игроки или сохраненные переопределения игроков.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Требуется доступ администратора</gradient>"
      lore:
        - "<gray>У вас недостаточно прав для просмотра переопределений проигрывателя.</gray>"

