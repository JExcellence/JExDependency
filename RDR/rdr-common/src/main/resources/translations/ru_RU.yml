prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Статистика хранилища</gradient>"
  items: "<gray>Всего элементов:</gray><white>{total_items}</white>"
  available_slots: "<gray>Доступные слоты:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Получено хранилище:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Максимальное количество памяти:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Без ограничений]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Концентратор хранения</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Хранилище] Сводка хранилища</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<gray>Ваша сеть хранилища сохраняется</gray>"
      - "<gray>и готов к межсерверному использованию.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Без ограничений]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Просмотр хранилищ</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<yellow>Нажмите, чтобы просмотреть список хранилищ.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Хранилище хранения</gradient>"
    lore:
      - "<gray>Собственные хранилища:</gray><white>{owned_storages}</white>"
      - "<gray>Максимальный объем памяти:</gray><white>{max_storages}</white>"
      - "<yellow>Нажмите, чтобы приобрести другое хранилище.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Администратор хранилища</gradient>"
    lore:
      - "<gray>Откройте привилегированные элементы управления администратора RDR.</gray>"
      - "<gray>Управляйте поставщиками валют и значениями по умолчанию.</gray>"
      - "<yellow>Требует:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Администратор] Управление хранилищем</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Информация] Панель администратора RDR</gradient>"
    lore:
      - "<gray>Управляйте привилегированными системами хранения из одного места.</gray>"
      - "<gray>Используйте эту панель для редактирования значений конфигурации и открытия элементов управления интеграцией.</gray>"
      - "<yellow>Требуется:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Элементы управления игроком</gradient>"
      lore:
        - "<gray>Редактирование лимитов игроков/групп, скидок и элементов управления объемом хранилища.</gray>"
        - "<gray>Открытие редакторов переопределения и действий по управлению чрезвычайными ситуациями.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления проигрывателем.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Конфигурация хранилища.</gradient>"
      lore:
        - "<gray>Редактировать значения из</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Введенные настройки открываются в соответствующем редакторе с витражной наковальней.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления конфигурацией.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Интеграция плагинов</gradient>"
      lore:
        - "<gray>Управление навыками, работой, валютой и инструментами PlaceholderAPI.</gray>"
        - "<gray>Откройте административные элементы управления, относящиеся к интеграции.</gray>"
        - "<yellow>Нажмите, чтобы открыть управление интеграцией.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Менеджер валют</gradient>"
      lore:
        - "<gray>Просмотр обнаруженных валют из Vault и JExEconomy.</gray>"
        - "<gray>При необходимости создайте валюту</gray> <white>raindrops</white> <gray>по умолчанию.</gray>"
        - "<yellow>Нажмите, чтобы открыть валютный контроль.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Навык] Требования к навыкам</gradient>"
      lore:
        - "<gray>Просмотрите поддерживаемые плагины навыков и состояние обнаружения.</gray>"
        - "<gray>Примените требования к навыкам по умолчанию ко всем уровням приобретения хранилища.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления требованиями к навыкам.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Задание] Требования к заданию</gradient>"
      lore:
        - "<gray>Просмотрите поддерживаемые плагины заданий и состояние обнаружения.</gray>"
        - "<gray>Примените требования к заданиям по умолчанию ко всем уровням приобретения хранилища.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления требованиями к вакансии.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Требуется доступ администратора</gradient>"
      lore:
        - "<gray>У вас нет разрешения на использование этой панели администратора.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Элементы управления игроком и группой</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Информация] Набор инструментов администратора хранилища</gradient>"
    lore:
      - "<gray>Редактирование максимального объема хранилища и скидок для игроков и групп.</gray>"
      - "<gray>Принудительно опустошите/сбросьте хранилища или закройте все открытые представления RDR.</gray>"
      - "<yellow>Требуется:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Переопределение игрока</gradient>"
      lore:
        - "<gray>Просмотр онлайн-игроков и настроенных целей переопределения.</gray>"
        - "<gray>Редактировать максимальное количество хранилищ для каждого игрока и значения скидок.</gray>"
        - "<yellow>Нажмите, чтобы открыть настройки игрока.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Переопределения группы</gradient>"
      lore:
        - "<gray>Выберите группу LuckPerms и установите значения переопределения.</gray>"
        - "<gray>Полезно для уровней ранга на основе разрешений.</gray>"
        - "<yellow>Нажмите, чтобы открыть переопределения группы.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Принудительное удаление хранилища</gradient>"
      lore:
        - "<gray>Удаляет все содержимое элемента из выбранного хранилища.</gray>"
        - "<gray>Сохраняет доверенные настройки, долг и значения горячих клавиш.</gray>"
        - "<yellow>Нажмите, чтобы выбрать хранилище.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Принудительный сброс хранилища</gradient>"
      lore:
        - "<gray>Сбрасывает выбранное хранилище в чистое состояние.</gray>"
        - "<gray>Очищает предметы, долги, доверенный доступ и горячие клавиши.</gray>"
        - "<yellow>Нажмите, чтобы выбрать хранилище.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Принудительно закрыть все представления RDR.</gradient>"
      lore:
        - "<gray>Закрывает все открытые в данный момент меню RDR.</gray>"
        - "<gray>Полезно после изменения конфигурации или экстренных действий.</gray>"
        - "<yellow>Нажмите, чтобы принудительно закрыть все представления RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Требуется доступ администратора</gradient>"
      lore:
        - "<gray>У вас нет разрешения на использование этого меню.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>У вас нет разрешения на использование элементов управления администратором игрока/группы.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Принудительное закрытие <белый>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Выбор цели переопределения игрока</gradient>"
  summary:
