    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Sağlayıcı:</gray> <white>{provider}</white>"
      - "<gray>Sembol:</gray> <white>{symbol}</white>"
      - "<gray>Önek:</gray> <white>{prefix}</white>"
      - "<gray>Sonek:</gray> <white>{suffix}</white>"
