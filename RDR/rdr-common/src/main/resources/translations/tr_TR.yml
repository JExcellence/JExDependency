      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Varsayılan para birimi oluşturuldu:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Para birimi oluşturulamadı:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Para birimi zaten mevcut:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>JExEconomy mevcut olmadığı sürece bu düğmeyi kullanamazsınız.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Hiçbir Para Birimi Algılanmadı</gradient>"
      lore:
        - "<gray>Hiçbir Vault veya JExEconomy para birimi algılanmadı.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Yönetici Erişimi Gerekli</gradient>"
      lore:
        - "<gray>Bu para birimi görünümünü kullanma izniniz yok.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Para birimlerini yönetme izniniz yok.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Depolama Yapilandirmasi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bilgi]</gradient> <white>Yapılandırma Ayarları</white>"
    lore:
      - "<gray>Düzenlenebilir ayarlar algılandı:</gray> <white>{setting_count}</white>"
      - "<gray>Aşağıdaki herhangi bir girişe tıklayın değerini bir örs içinde düzenlemek için.</gray>"
      - "<yellow>Değişiklikler yazılır doğrudan config/config.yml'ye.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Ayarlamak]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Path:</gray> <white>{config_path}</white>"
      - "<gray>Tür:</gray> <white>{value_type}</white>"
      - "<gray>Mevcut değer:</gray> <white>{current_value}</white>"
      - "<yellow>Bu ayarı düzenlemek için tıklayın.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Tamsayı]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Uzun]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Çift]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Liste]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Sicim]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Düzenlenebilir Ayar Yok</white>"
      lore:
        - "<gray>Düzenlenebilir skaler/liste yapılandırma ayarı bulunamadı.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Yönetici Erişimi Gerekli</white>"
      lore:
        - "<gray>Bu yapılandırma görünümünü kullanma izniniz yok.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Yapılandırma Düzenleme Kilitli</white>"
      lore:
        - "<gray>Bu sürüm, çalışma zamanı yapılandırma düzenlemelerine izin vermiyor.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Yapılandırma ayarlarını düzenleme izniniz yok.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bu sürümde yapılandırma düzenleme kilitlidir.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Güncellendi <white>{config_path}</white><gray>ile<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
