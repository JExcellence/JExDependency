    create:
      name: "<gradient:#10b981:#34d399>[+] Yaratmak {currency_id}</gradient>"
      lore:
        - "<gray>JExEconomy içinde varsayılan RDR para birimini oluşturun.</gray>"
        - "<yellow>{currency_id} oluşturmak için tıklayın.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Gerekli</gradient>"
      lore:
        - "<gray>JExEconomy olmadan varsayılan para birimi oluşturamazsınız.</gray>"
        - "<gray>Önce JExEconomy'i kurun ve etkinleştirin.</gray>"
