storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Depolama Kontrolü</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Yönetici Paneli</gradient>"
    lore:
      - "<gray>Ayrıcalıklı depolama sistemlerini tek yerden yönetin.</gray>"
      - "<gray>Yapilandirma degerlerini ve para birimi destegini duzenlemek icin bu paneli kullanin.</gray>"
      - "<yellow>Gereklilikler:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Depolama Yapilandirmasi</gradient>"
      lore:
        - "<gray>Değerleri düzenle</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Her düzenlenebilir ayar, bir örs istemi aracılığıyla değiştirilebilir.</gray>"
        - "<yellow>Yapılandırma kontrollerini açmak için tıklayın.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Döviz Yöneticisi</gradient>"
      lore:
        - "<gray>Vault ve JExEconomy'den tespit edilen para birimlerini inceleyin.</gray>"
        - "<gray>Varsayılanı oluştur</gray> <white>raindrops</white> <gray>gerektiğinde para birimi.</gray>"
        - "<yellow>Para birimi kontrollerini açmak için tıklayın.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Yönetici Erişimi Gerekli</gradient>"
      lore:
        - "<gray>Bu yönetici panelini kullanma izniniz yok.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Döviz Yöneticisi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Döviz Sağlayıcıları</gradient>"
    lore:
      - "<gray>Algılanan para birimleri:</gray> <white>{currency_count}</white>"
      - "<gray>Vault mevcut:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy mevcut:</gray> <white>{jexeconomy_available}</white>"
