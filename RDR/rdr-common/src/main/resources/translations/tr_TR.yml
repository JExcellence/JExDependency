prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Depolama İstatistikleri</gradient>"
  items: "<gray>Toplam öğe:</gray><white>{total_items}</white>"
  available_slots: "<gray>Kullanılabilir yuvalar:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Elde edilen depolar:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksimum depolama:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Sınırsız]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Depolama Merkezi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Depolama Özeti</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimum depolama:</gray><white>{max_storages}</white>"
      - "<gray>Kasa ağınız kalıcı</gray>"
      - "<gray>ve sunucular arası kullanıma hazır.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Sınırsız]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Depolamaları Görüntüle</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimum depolama:</gray><white>{max_storages}</white>"
      - "<yellow>Depolama listenize göz atmak için tıklayın.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Depolama Mağazası</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimum depolama:</gray><white>{max_storages}</white>"
      - "<yellow>Başka bir depolama alanı satın almak için tıklayın.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Depolama Yöneticisi</gradient>"
    lore:
      - "<gray>Ayrıcalıklı RDR yönetici kontrollerini açın.</gray>"
      - "<gray>Para birimi sağlayıcılarını ve varsayılanları yönetin.</gray>"
      - "<yellow>Gereklilikler:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Yönetici] Depolama Denetimi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bilgi] RDR Yönetici Paneli</gradient>"
    lore:
      - "<gray>Ayrıcalıklı depolama sistemlerini tek yerden yönetin.</gray>"
      - "<gray>Yapılandırma değerlerini düzenlemek ve entegrasyon kontrollerini açmak için bu paneli kullanın.</gray>"
      - "<yellow>Gerektirir:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Kat] Oyuncu Kontrolleri</gradient>"
      lore:
        - "<gray>Oyuncu/grup limitlerini, indirimleri ve depolama gücü kontrollerini düzenleyin.</gray>"
        - "<gray>Geçersiz kılma düzenleyicilerini ve acil durum yönetimi eylemlerini açın.</gray>"
        - "<yellow>Oynatıcı kontrollerini açmak için tıklayın.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Depolama Yapılandırması</gradient>"
      lore:
        - "<gray>Eşleşen bir vitray örs düzenleyicide açılan</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Yazılan ayarlardan değerleri düzenleyin.</gray>"
        - "<yellow>Yapılandırma kontrollerini açmak için tıklayın.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Eklenti Entegrasyonları</gradient>"
      lore:
        - "<gray>Beceri, iş, para birimi ve PlaceholderAPI araçlarını yönetin.</gray>"
        - "<gray>Entegrasyona özel yönetici kontrollerini açın.</gray>"
        - "<yellow>Entegrasyon yönetimini açmak için tıklayın.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Vergi] Ticaret Sunucusu Bankası</gradient>"
      lore:
        - "<gray>Toplanan ticari vergi bakiyelerini para birimine göre inceleyin.</gray>"
        - "<gray>Sunucu-banka bakiyelerini yöneticinize çekin account.</gray>"
        - "<yellow>Ticaret vergisi bankası kontrollerini açmak için tıklayın.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Para Birimi Yöneticisi</gradient>"
      lore:
        - "<gray>İnceleme, Vault ve JExEconomy'den gelen para birimlerini tespit etti.</gray>"
        - "<gray>Gerektiğinde varsayılan</gray> <white>raindrops</white> <gray>para birimini oluşturun.</gray>"
        - "<yellow>Para birimi kontrollerini açmak için tıklayın.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Beceri] Beceri Gereksinimleri</gradient>"
      lore:
        - "<gray>Desteklenen beceri eklentilerini ve algılama durumunu inceleyin.</gray>"
        - "<gray>Varsayılan beceri gereksinimlerini tüm depolama satın alma katmanlarına uygulayın.</gray>"
        - "<yellow>Beceri gereksinimi kontrollerini açmak için tıklayın.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[İş] İş Gereksinimleri</gradient>"
      lore:
        - "<gray>Desteklenen iş eklentilerini ve algılama durumunu inceleyin.</gray>"
        - "<gray>Varsayılan iş gereksinimlerini tüm depolama satın alma katmanlarına uygulayın.</gray>"
        - "<yellow>İş gereksinimi kontrollerini açmak için tıklayın.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Yönetici Erişimi Gerekli</gradient>"
      lore:
        - "<gray>Bu yönetici panelini kullanma izniniz yok.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Kat] Oyuncu ve Grup Kontrolleri</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bilgi] Depolama Yöneticisi Araç Seti</gradient>"
    lore:
      - "<gray>Oyuncular ve gruplar için maksimum depolama ve indirimleri düzenleyin.</gray>"
      - "<gray>Depolamaları zorla boşaltın/sıfırlayın veya tüm açık RDR görünümlerini kapatın.</gray>"
      - "<yellow>Gerektirir:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Oyuncunun Geçersiz Kılması</gradient>"
      lore:
        - "<gray>Çevrimiçi oynatıcılara göz atın ve geçersiz kılma hedeflerini yapılandırın.</gray>"
        - "<gray>Oyuncu başına maksimum depolamayı ve indirim değerlerini düzenleyin.</gray>"
        - "<yellow>Oynatıcı geçersiz kılmalarını açmak için tıklayın.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Grup Geçersiz Kılmaları</gradient>"
      lore:
        - "<gray>Bir LuckPerms grubu seçin ve geçersiz kılma değerlerini ayarlayın.</gray>"
        - "<gray>İzne dayalı sıralama katmanları için kullanışlıdır.</gray>"
        - "<yellow>Grup geçersiz kılmalarını açmak için tıklayın.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Depolamayı Zorla</gradient>"
      lore:
        - "<gray>Seçilen bir depodaki tüm öğe içeriğini temizler.</gray>"
        - "<gray>Güvenilir ayarları, borcu ve kısayol tuşu değerlerini korur.</gray>"
        - "<yellow>Bir depolama alanı seçmek için tıklayın.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Depolamayı Sıfırlamaya Zorla</gradient>"
      lore:
        - "<gray>Seçilen bir depolamayı temiz duruma sıfırlar.</gray>"
        - "<gray>Öğeleri, borcu, güvenilir erişimi ve kısayol tuşunu temizler.</gray>"
        - "<yellow>Bir depolama alanı seçmek için tıklayın.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Tüm RDR Görünümlerini Kapatmaya Zorla</gradient>"
      lore:
        - "<gray>Şu anda açık olan tüm RDR menülerini kapatır.</gray>"
        - "<gray>Yapılandırma değişikliklerinden veya acil durum eylemlerinden sonra kullanışlıdır.</gray>"
        - "<yellow>Tüm RDR görünümlerini kapatmaya zorlamak için tıklayın.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Yönetici Erişimi Gerekli</gradient>"
      lore:
        - "<gray>Bu menüyü kullanma izniniz yok.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Oyuncu/grup yönetici kontrollerini kullanma izniniz yok.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Zorla kapatılmış <beyaz>{closed_views}</white> open RDR view(s).</gray>"

