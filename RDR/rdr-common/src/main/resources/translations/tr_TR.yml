prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Depolama İstatistikleri</gradient>"
  items: "<gray>Toplam öğe sayısı:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Kullanılabilir yuvalar:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Elde edilen depolar:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Maksimum depolama alanı:</gray> <white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Depolama Merkezi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Kasa] Depolama Özeti</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimum depolama alanı:</gray> <white>{max_storages}</white>"
      - "<gray>Kasa ağınız kalıcı</gray>"
      - "<gray>ve sunucular arası kullanıma hazır.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Depolama Alanlarını Görüntüle</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimum depolama alanı:</gray> <white>{max_storages}</white>"
      - "<yellow>Depolama listenize göz atmak için tıklayın.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Depolama Mağazası</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimum depolama alanı:</gray> <white>{max_storages}</white>"
      - "<yellow>Başka bir depolama alanı satın almak için tıklayın.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Depolama Mağazası</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Bilgi] Depolama Kapasitesi</gradient>"
    lore:
      - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimum depolama alanı:</gray> <white>{max_storages}</white>"
      - "<gray></gray> tarihine kadar ek kasa alanı satın alın"
      - "<gray>yapılandırılan sınıra ulaştınız.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Mağaza Gereksinimleri</gradient>"
    lore:
      - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
      - "<gray>Mevcut gereksinim sayısı:</gray> <white>{requirements}</white>"
      - "<gray>Durum:</gray> <white>{availability}</white>"
      - "<yellow>Her gereksinim katmanını ayrıntılı olarak incelemek için tıklayın.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Yok]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Hazır]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Beklemede]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Çevrimdışı]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Depolama Alanı Satın Alın</gradient>"
      lore:
        - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
        - "<gray>Mevcut gereksinimler:</gray> <white>{requirements}</white>"
        - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Tüm gereksinimler karşılandığında satın almak için tıklayın.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Gereksinimler Bekleniyor</gradient>"
      lore:
        - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
        - "<gray>Mevcut gereksinimler:</gray> <white>{requirements}</white>"
        - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Satın almadan önce kalan gereksinimleri karşılayın.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Depolama Sınırına Ulaşıldı</gradient>"
      lore:
        - "<gray>Sahip olunan depolar:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<gray>Daha fazla depolama alanı satın alamazsınız</gray>"
        - "<gray>küresel sınır yükseltilinceye kadar.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Çevrimdışı Gereksinimler</gradient>"
      lore:
        - "<gray>Bir veya daha fazla yapılandırılmış mağaza gereksinimi</gray>"
        - "<gray>bu sunucuda çözümlenemiyor.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profil Eksik</gradient>"
      lore:
        - "<gray>RDR profiliniz yüklenemedi,</gray>"
        - "<gray>so satın alma işlemleri geçici olarak engellendi.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Satın Alındı ​​<white>{storage_key}</white><gray>. Tüketilen gereksinimler:</gray> <white>{requirements}</white><gray>. Sahip olunan depolar:</gray> <white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Şu anda <white>{requirement}</white><gray> ile tanışmıyorsunuz. Mağaza gereksinimleri:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Mağaza gereksinimi <white>{requirement}</white><gray> şu anda kullanılamıyor veya geçersiz.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Şu anda depolama satın alımları için yapılandırılmış mağaza gereksinimi yok.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{max_storages}</white><gray> depolama sınırına ulaştınız. Sahip olunan depolar:</gray> <white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDR profiliniz yüklenemedi, bu nedenle depolama alanı satın alınamıyor.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Satın Al {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Bilgi] Gereksinim Tarayıcısı</gradient>"
    lore:
      - "<gray>Satın alma katmanı:</gray> <white>{purchase_number}</white>"
      - "<gray>Depolama kilidini açar:</gray> <white>{storage_number}</white>"
      - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
      - "<gray>Şu anda karşılaşıldığı yer:</gray> <white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Ücretsiz] Gereksinim Yok</gradient>"
    lore:
      - "<gray>Bu satın alma katmanının yapılandırılmış gereksinimleri yok.</gray>"
      - "<yellow>Bu depolama alanını ekstra çekler olmadan satın alabilirsiniz.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Gereksinim] {requirement_name}</gradient>"
    lore:
      - "<gray>Anahtar:</gray> <white>{requirement_key}</white>"
      - "<gray>Tür:</gray> <white>{requirement_type}</white>"
      - "<gray>Durum:</gray> <white>{status}</white>"
      - "<gray>İlerleme:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Özet:</gray> <white>{summary}</white>"
      - "<yellow>Banka ilerlemesine ilişkin öğe veya para birimi gereksinimlerine sağ tıklayın.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Ayrıntılı Kontroller</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Beklemede]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Mevcut değil]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> artık hazır.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray><white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient> için depolanan ilerleme"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray><white>{requirement}</white><gray>.</gray> için eşleşen öğe veya para birimi mevcut değildi"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> bankalı ilerlemeyi desteklemez.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> şu anda kullanılamıyor.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDR profiliniz yüklenemedi, dolayısıyla ilerleme durumu kaydedilemedi.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Kasa] Depolama Alanlarınız</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bilgi] Depolama Kapasitesi</gradient>"
