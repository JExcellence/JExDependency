prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Opbevaring</gradient>"
  items: "<gray>I alt:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Tilgængelige slots:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Opnåede overskud:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Maks. lagre:</gray> <white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Opbevaring Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Lageroversigt</gradient>"
    lore:
      - "<gray>Ejes lagre:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimalt lager:</gray> <white>{max_storages}</white>"
      - "<gray>Din boks netværk er vedblevet</gray>"
      - "<gray>og klar til brug på tværs af serveren.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Vis historik</gradient>"
    lore:
      - "<gray>Ejes lagre:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimalt lager:</gray> <white>{max_storages}</white>"
      - "<yellow>Klik for at gennemse din lagerliste.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Opbevaring</gradient>"
    lore:
      - "<gray>Ejes lagre:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimalt lager:</gray> <white>{max_storages}</white>"
      - "<yellow>Klik for at købe en anden lagerplads.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Opbevaring</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Lagerkapacitet</gradient>"
    lore:
      - "<gray>Ejes lagre:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimalt lager:</gray> <white>{max_storages}</white>"
      - "<gray>Køb ekstra plads i boksen indtil</gray>"
      - "<gray>du når den konfigurerede kasket.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Lagerkrav</gradient>"
    lore:
      - "<gray>Konfigurationer:</gray> <white>{requirement_count}</white>"
      - "<gray>Nuværende krav tæller:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klik for at inspicere hvert krav niveau i detaljer.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ingen]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Klar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[afventende]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Køb lager</gradient>"
      lore:
        - "<gray>Konfigurationer:</gray> <white>{requirement_count}</white>"
        - "<gray>Nuværende krav:</gray> <white>{requirements}</white>"
        - "<gray>Ejes lagre:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klik for at købe når alle krav er opfyldt.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Krav, der ikke er opfyldt</gradient>"
      lore:
        - "<gray>Konfigurationer:</gray> <white>{requirement_count}</white>"
        - "<gray>Nuværende krav:</gray> <white>{requirements}</white>"
        - "<gray>Ejes lagre:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>opfylde de resterende krav, før du køber.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Lagergrænse nået</gradient>"
      lore:
        - "<gray>Ejes lagre:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<gray>Du kan ikke købe flere lagre</gray>"
        - "<gray>indtil den globale hætte er hævet.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Krav til offline</gradient>"
      lore:
        - "<gray>Et eller flere krav til konfigureret lager</gray>"
        - "<gray>kan ikke løses på denne server.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profil mangler</gradient>"
      lore:
        - "<gray>din RDR profilen kunne ikke indlæses</gray>"
        - "<gray>så køb er midlertidigt blokeret.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Købt <white>{storage_key}</white><gray>. Forbrug:</gray> <white>{requirements}</white><gray>. Ejes lagre:</gray> <white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du møder ikke i øjeblikket <white>{requirement}</white><gray>. Krav til opbevaring:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Lagerkrav <white>{requirement}</white><gray> er utilgængelig eller ugyldig lige nu.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Ingen konfigurerede butikskrav er tilgængelige for opbevaring køb lige nu.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har nået opbevaringsgrænsen for <white>{max_storages}</white><gray>. Ejes lagre:</gray> <white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>din RDR profilen kunne ikke indlæses, så lagerkøb er ikke tilgængelige.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Køb {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Krav browser</gradient>"
    lore:
      - "<gray>Købsniveau:</gray> <white>{purchase_number}</white>"
      - "<gray>Lås op:</gray> <white>{storage_number}</white>"
      - "<gray>Konfigurationer:</gray> <white>{requirement_count}</white>"
      - "<gray>I øjeblikket opfyldt:</gray> <white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[fri] Ingen krav</gradient>"
    lore:
      - "<gray>Dette indkøbsniveau har ingen konfigurerede krav.</gray>"
      - "<yellow>Du kan købe dette lager uden ekstra kontrol.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>Name</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>Name</gradient>"
    filled: "<gradient:#10b981:#34d399>Name</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req] {requirement_name}</gradient>"
    lore:
      - "<gray>Nøgle:</gray> <white>{requirement_key}</white>"
      - "<gray>Type:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Fremskridt:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Oversigt:</gray> <white>{summary}</white>"
      - "<yellow>Højre-klik element eller valutakrav til bank fremskridt.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>Yderligere kontroller</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[afventende]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Utilgængelig]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>Name</gradient> <gray><white>{requirement}</white><gray> er nu klar.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>Name</gradient> <gray>Gemt fremskridt for <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>Name</gradient> <gray>Ingen matchende poster eller valuta var til rådighed for <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> støtter ikke banede fremskridt.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> er utilgængelig lige nu.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>din RDR profilen kunne ikke indlæses, så fremskridt kunne ikke gemmes.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Vault] Dine historier</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Lagerkapacitet</gradient>"
    lore:
      - "<gray>Ejes lagre:</gray> <white>{owned_storages}</white>"
      - "<gray>Maksimalt lager:</gray> <white>{max_storages}</white>"
      - "<gray>Brug denne liste til at gennemgå din</gray>"
      - "<gray>beholder til opbevaring.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Box] {storage_key}</gradient>"
    lore:
      - "<gray>Lagernøgle:</gray> <white>{storage_key}</white>"
      - "<gray>Ejer:</gray> <white>{owner_name}</white>"
      - "<gray>Adgang:</gray> <white>{access_level}</white>"
      - "<gray>Hotkey:</gray> <white>{hotkey_display}</white>"
      - "<gray>Brugte slots:</gray> <white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Tilgængelige slots:</gray> <white>{available_slots}</white>"
      - "<yellow>Denne opbevaring er klar til punkt persistens.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Left- klik for at åbne denne opbevaring.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Højre-klik for at åbne lagerindstillinger.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Ejer]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Offentlig]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Ingen historier fundet</gradient>"
    lore:
      - "<gray>Ingen lagre er i øjeblikket knyttet</gray>"
      - "<gray>til Deres RDR profil.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Profil mangler</gradient>"
    lore:
      - "<gray>din RDR Spillerprofil kunne ikke</gray>"
      - "<gray>være lastet fra vedvarende opbevaring.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#] {storage_key} Indstillinger</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Lagerindstillinger</gradient>"
    lore:
      - "<gray>Lagernøgle:</gray> <white>{storage_key}</white>"
      - "<gray>Ejer:</gray> <white>{owner_name}</white>"
      - "<gray>Din adgang:</gray> <white>{access_level}</white>"
      - "<gray>Hotkey:</gray> <white>{hotkey_display}</white>"
      - "<gray>Associater:</gray> <white>{associate_count}</white>"
      - "<gray>Trusted:</gray> <white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Ejer]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Offentlig]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Gruppe] Trusted Access</gradient>"
    lore:
      - "<gray>Associater:</gray> <white>{associate_count}</white>"
      - "<gray>Trusted:</gray> <white>{trusted_count}</white>"
      - "<yellow>Klik for at administrere hvem der kan indbetale</yellow>"
      - "<yellow>eller få fuld adgang til denne lagerplads.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Opbevaring Hotkey</gradient>"
    lore:
      - "<gray>Aktuel genvejstast:</gray> <white>{hotkey_display}</white>"
      - "<yellow>Klik for at binde hurtig adgang til</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Trusted Locked</gradient>"
    lore:
      - "<gray>Kun lagerejeren kan administrere</gray>"
      - "<gray>betroede adgang til lageret.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Hotkey låst</gradient>"
    lore:
      - "<gray>Kun lagerejeren kan ændre</gray>"
      - "<gray>lagernøgler.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Gratis] Indstillinger låst</gradient>"
    lore:
      - "<gray>Ændringer i lagerindstilling er deaktiveret</gray>"
      - "<gray>er <white>RDR Free</white><gray>.</gray>"
      - "<yellow>Opgrader til Premium for at redigere indstillinger.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Lagring mangler</gradient>"
    lore:
      - "<gray>Denne opbevaring kunne ikke indlæses</gray>"
      - "<gray>til indstillingsvisningen.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Gruppe] {storage_key} Adgang</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] fælles adgang</gradient>"
    lore:
      - "<gray>Lagernøgle:</gray> <white>{storage_key}</white>"
      - "<gray>Ejer:</gray> <white>{owner_name}</white>"
      - "<gray>Associater:</gray> <white>{associate_count}</white>"
      - "<gray>Trusted:</gray> <white>{trusted_count}</white>"
      - "<yellow>Klik på en spiller for at cykle adgang.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Offentlig] {player}</gradient>"
      lore:
        - "<gray>Status:</gray> <white>Offentlig</white>"
        - "<gray>Ingen depositum eller tilbagetrækning af adgang.</gray>"
        - "<yellow>Klik for at fremme til Associate.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associate] {player}</gradient>"
      lore:
        - "<gray>Status:</gray> <white>Associat</white>"
        - "<gray>Kan indbetale, men ikke trække.</gray>"
        - "<yellow>Klik for at fremme til Trusted.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Trusted] {player}</gradient>"
      lore:
        - "<gray>Status:</gray> <white>Trusted</white>"
        - "<gray>Kan indskyde og hæve elementer.</gray>"
        - "<yellow>Klik for at nulstille til Public.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Offentlig]</gradient> <gray>{player} har ikke længere lageradgang.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient> <gray>{player} kan nu deponere i dette lager.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient> <gray>{player} kan nu deponere og trække fra denne opbevaring.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Kun lagerejeren kan ændre betroede adgang.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Ejer kun</gradient>"
      lore:
        - "<gray>Du kan se denne opbevaring, men kun</gray>"
        - "<gray>ejeren kan ændre betroede adgang.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Lagring mangler</gradient>"
      lore:
        - "<gray>Denne opbevaring kunne ikke indlæses</gray>"
        - "<gray>for betroet adgangsstyring.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Denne opbevaring kunne ikke indlæses for betroet adgang management.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Gratis] Indstillinger låst</gradient>"
      lore:
        - "<gray>Ændringer af tillid-adgang er deaktiveret</gray>"
        - "<gray>er <white>RDR Free</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Ingen spillere fundet</gradient>"
      lore:
        - "<gray>Ingen andre kendte spillere er tilgængelige</gray>"
        - "<gray>at tildele betroet adgang.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Box] {storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Lagring mangler</gradient>"
    lore:
      - "<gray>Denne lagerindgang kunne ikke findes</gray>"
      - "<gray>for din vedholdende RDR profil.</gray>"

storage_hotkey_anvil_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#] Bind {storage_key}</gradient>"
  input:
    lore:
      - "<gray>Indtast et tal mellem</gray>"
      - "<white>1</white><gray> og </gray><white>{max_hotkeys}</white><gray> til hurtig adgang.</gray>"
      - "<yellow>Klik på resultatet slot for at gemme genvejstasten.</yellow>"
  error:
    invalid_hotkey: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Brug et tal mellem <white>1</white> og <white>{max_hotkeys}</white><gray>. Input:</gray> <white>{input}</white>"

storage:
  message:
    locked: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>{storage_key} er allerede åben i en anden session.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} kunne ikke åbnes lige nu.</gray>"
    access_denied: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har ikke adgang til <white>{storage_key}</white><gray>.</gray>"
    blacklisted_item: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{item}</white><gray> er globalt sortlistet fra RDR opbevaring.</gray>"
    lease_lost: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Din redigeringssession for {storage_key} udløbet eller flyttet andetsteds. Ændringer blev ikke gemt.</gray>"
    save_failed: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} kunne ikke reddes. Tjek konsollen for detaljer.</gray>"
    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient> <gray>{storage_key} er nu bundet til <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_missing: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Ingen opbevaring er bundet til <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_invalid: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Hotkeys skal være mellem <white>1</white> og <white>{max_hotkeys}</white><gray>.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Opbevaring indstilling edits er deaktiveret i <white>RDR Free</white><gray>.</gray>"
    scoreboard_enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Aktiveret <white>/rr scoreboard</white><gray> sidebar.</gray>"
    scoreboard_disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktiveret <white>/rr scoreboard</white><gray> sidebar.</gray>"
    scoreboard_syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Brug:</gray> <white>/rr scoreboard</white>"

page:
  name: "<gradient:#6b7280:#9ca3af>[Side] %current_page%</gradient>"
  lore:
    - "<gray>Nuværende side:</gray> <white>%current_page%</white>"
    - "<gray>Sider i alt:</gray> <white>%total_pages%</white>"
  fallback: "<gradient:#6b7280:#9ca3af>[Side] %page%</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>[<-] Retur</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik for at gå tilbage</gradient>"
