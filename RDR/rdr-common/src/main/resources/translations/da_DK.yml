prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Lagerstatistik</gradient>"
  items: "<gray>I alt:</gray><white>{total_items}</white>"
  available_slots: "<gray>Tilgængelige slots:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Opbevaring opnået:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Ubegrænset]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Lageroversigt</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<gray>Dit vault-netværk er vedvarende</gray>"
      - "<gray>og klar til brug på tværs af servere.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Ubegrænset]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Se lagre</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<yellow>Klik for at gennemse din lagerliste.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Lagerbutik</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<yellow>Klik for at købe en anden lagerplads.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Lageradmin</gradient>"
    lore:
      - "<gray>Åbn privilegerede RDR-administratorkontroller.</gray>"
      - "<gray>Administrer valutaudbydere og standardindstillinger.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Lagerkontrol</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin Panel</gradient>"
    lore:
      - "<gray>Administrer privilegerede lagersystemer fra ét sted.</gray>"
      - "<gray>Brug dette panel til at redigere konfigurationsværdier og åbne integrationskontroller.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] spillerkontroller</gradient>"
      lore:
        - "<gray>Rediger afspiller-/gruppegrænser, rabatter og lagringskraftkontroller.</gray>"
        - "<gray>Åbn tilsidesætte editorer og nødhåndteringshandlinger.</gray>"
        - "<yellow>Klik for at åbne afspillerens kontroller.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Rediger værdier fra</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Indtastede indstillinger åbnes i en matchende ambolt-editor af farvet glas.</gray>"
        - "<yellow>Klik for at åbne konfigurationskontroller.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-integrationer</gradient>"
      lore:
        - "<gray>Administrer færdigheder, job, valuta og PlaceholderAPI-værktøjer.</gray>"
        - "<gray>Åbn integrationsspecifikke administratorkontroller.</gray>"
        - "<yellow>Klik for at åbne integrationsstyring.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valutaadministrator</gradient>"
      lore:
        - "<gray>Gennemgå registrerede valutaer fra Vault og JExEconomy.</gray>"
        - "<gray>Opret standarden</gray> <white>raindrops</white> <gray>valuta efter behov.</gray>"
        - "<yellow>Klik for at åbne valutakontrol.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Færdighedskrav</gradient>"
      lore:
        - "<gray>Gennemgå understøttede færdighedsplugins og detektionstilstand.</gray>"
        - "<gray>Anvend standardkrav til færdigheder på alle lagerkøbsniveauer.</gray>"
        - "<yellow>Klik for at åbne kontrolelementer for færdighedskrav.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Jobkrav</gradient>"
      lore:
        - "<gray>Gennemgå understøttede jobplugins og registreringstilstand.</gray>"
        - "<gray>Anvend standardjobkrav på alle lagerkøbsniveauer.</gray>"
        - "<yellow>Klik for at åbne kontrolelementer for jobkrav.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Adminadgang påkrævet</gradient>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge dette administratorpanel.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Spiller- og gruppekontrol</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Storage Admin Toolkit</gradient>"
    lore:
      - "<gray>Rediger maks. lagerplads og rabatter for spillere og grupper.</gray>"
      - "<gray>Tving dræn/nulstil lager eller luk alle åbne RDR-visninger.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Player Tilsidesætter</gradient>"
      lore:
        - "<gray>Gennemse online-spillere og konfigurerede tilsidesættelsesmål.</gray>"
        - "<gray>Rediger maks. lagerplads pr. spiller og rabatværdier.</gray>"
        - "<yellow>Klik for at åbne afspillertilsidesættelser.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Gruppetilsidesættelser</gradient>"
      lore:
        - "<gray>Vælg en LuckPerms-gruppe og indstil tilsidesættelsesværdier.</gray>"
        - "<gray>Nyttig til tilladelsesbaserede rangtier.</gray>"
        - "<yellow>Klik for at åbne gruppetilsidesættelser.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Tving drænopbevaring</gradient>"
      lore:
        - "<gray>Rydder alt elementindhold fra et valgt lager.</gray>"
        - "<gray>Bevarer pålidelige indstillinger, gæld og genvejstastværdier.</gray>"
        - "<yellow>Klik for at vælge et lager.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Tvungen nulstilling af lager</gradient>"
      lore:
        - "<gray>Nulstiller et valgt lager til en ren tilstand.</gray>"
        - "<gray>Rydder elementer, gæld, betroet adgang og genvejstast.</gray>"
        - "<yellow>Klik for at vælge et lager.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Tving lukke alle RDR-visninger</gradient>"
      lore:
        - "<gray>Lukker alle aktuelt åbne RDR-menuer.</gray>"
        - "<gray>Nyttig efter konfigurationsændringer eller nødhandlinger.</gray>"
        - "<yellow>Klik for at tvinge alle RDR-visninger til at lukke.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Admin Admin påkrævet</gradient>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge denne menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har ikke tilladelse til at bruge afspiller-/gruppeadministratorkontroller.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Tvangslukket <hvid>{closed_views}</white> open RDR view(s).</gray>"

