      - "<gray>Oversigt:</gray><white>{summary}</white>"
      - "<yellow>Højreklik på vare- eller valutakrav for at bankfremskridt.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detaljerede kontroller</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Afventer]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Utilgængelig]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>er nu klar.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>Gemte fremskridt for<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Ingen matchende varer eller valuta var tilgængelige for<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>understøtter ikke bankfremgang.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>er ikke tilgængelig lige nu.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>DinRDRprofil kunne ikke indlæses, så fremskridt kunne ikke gemmes.</gray>"

