prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Lagerstatistik</gradient>"
  items: "<gray>I alt:</gray><white>{total_items}</white>"
  available_slots: "<gray>Tilgængelige slots:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Opbevaring opnået:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Lageroversigt</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<gray>Dit vault-netværk er vedvarende</gray>"
      - "<gray>og klar til brug på tværs af servere.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Se lagre</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<yellow>Klik for at gennemse din lagerliste.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Lagerbutik</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<yellow>Klik for at købe en anden lagerplads.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Lageradmin</gradient>"
    lore:
      - "<gray>Åbn privilegerede RDR-administratorkontroller.</gray>"
      - "<gray>Administrer valutaudbydere og standardindstillinger.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Opbevaringskontrol</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin Panel</gradient>"
    lore:
      - "<gray>Administrer privilegerede lagersystemer fra ét sted.</gray>"
      - "<gray>Brug dette panel til at redigere konfigurationsvaerdier og valutaunderstoettelse.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Lagerkonfiguration</gradient>"
      lore:
        - "<gray>Rediger værdier fra</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Alle redigerbare indstillinger kan ændres via en ambolt-prompt.</gray>"
        - "<yellow>Klik for at åbne konfigurationskontroller.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valutaadministrator</gradient>"
      lore:
        - "<gray>Gennemgå registrerede valutaer fra Vault og JExEconomy.</gray>"
        - "<gray>Opret standarden</gray> <white>raindrops</white> <gray>valuta efter behov.</gray>"
        - "<yellow>Klik for at åbne valutakontrol.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Adgang påkrævet</gradient>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge dette administratorpanel.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Valutaadministrator</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Valutaudbydere</gradient>"
    lore:
      - "<gray>Registrerede valutaer:</gray> <white>{currency_count}</white>"
      - "<gray>Vault tilgængelig:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy tilgængelig:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Brug krystalknappen til at oprette standardvalutaen.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Udbyder:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Præfiks:</gray> <white>{prefix}</white>"
      - "<gray>Suffiks:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Skabe {currency_id}</gradient>"
      lore:
        - "<gray>Opret standardvalutaen RDR i JExEconomy.</gray>"
        - "<yellow>Klik for at oprette {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Påkrævet</gradient>"
      lore:
        - "<gray>Du kan ikke oprette standardvaluta uden JExEconomy.</gray>"
        - "<gray>Installer og aktiver JExEconomy først.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Parat</gradient>"
      lore:
        - "<gray>Standardvalutaen findes allerede.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Oprettet standardvaluta:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Kunne ikke oprette valuta:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Valuta eksisterer allerede:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du kan ikke bruge denne knap, medmindre JExEconomy er tilgængelig.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Ingen valutaer fundet</gradient>"
      lore:
        - "<gray>Der blev ikke fundet nogen Vault eller JExEconomy valutaer.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Adgang påkrævet</gradient>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge denne valutavisning.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har ikke tilladelse til at administrere valutaer.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Lagerkonfiguration</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Konfigurationsindstillinger</white>"
    lore:
      - "<gray>Redigerbare indstillinger fundet:</gray> <white>{setting_count}</white>"
      - "<gray>Klik på en indgang nedenfor for at redigere dens værdi i en ambolt.</gray>"
      - "<yellow>Ændringer skrives direkte til config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Sæt]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Sti:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Nuværende værdi:</gray> <white>{current_value}</white>"
      - "<yellow>Klik for at redigere denne indstilling.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolesk]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Heltal]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Lang]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dobbelt]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Liste]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Snor]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Ingen redigerbare indstillinger</white>"
      lore:
        - "<gray>Der blev ikke fundet nogen redigerbare skalar-/listekonfigurationsindstillinger.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Adgang påkrævet</white>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge denne konfigurationsvisning.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Konfigurationsredigering låst</white>"
      lore:
        - "<gray>Denne udgave tillader ikke redigeringer af runtime-konfigurationer.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har ikke tilladelse til at redigere konfigurationsindstillinger.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Konfigurationsredigering er låst i denne udgave.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Opdateret<white>{config_path}</white><gray>til<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Redigere{config_path}"
  input:
    lore:
      - "<gray>Sti:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Nuværende værdi:</gray> <white>{current_value}</white>"
      - "<yellow>Indtast den nye værdi og bekræft.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Ugyldig input for type<white>{value_type}</white><gray>. Input:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Lagerbutik</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Lagerkapacitet</gradient>"
    lore:
      - "<gray>Ejede lager:</gray><white>{owned_storages}</white>"
      - "<gray>Maksimal lagerplads:</gray><white>{max_storages}</white>"
      - "<gray>Køb ekstra boksplads indtil</gray>"
      - "<gray>du når det konfigurerede loft.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Butikskrav</gradient>"
    lore:
      - "<gray>Konfigurerede krav:</gray><white>{requirement_count}</white>"
      - "<gray>Aktuelt behovsantal:</gray><white>{requirements}</white>"
      - "<gray>Status:</gray><white>{availability}</white>"
      - "<yellow>Klik for at inspicere hvert kravniveau i detaljer.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ingen]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Klar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Afventer]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Køb lager</gradient>"
      lore:
        - "<gray>Konfigurerede krav:</gray><white>{requirement_count}</white>"
        - "<gray>Nuværende krav:</gray><white>{requirements}</white>"
        - "<gray>Ejede lager:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klik for at købe, når alle krav er opfyldt.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Krav afventer</gradient>"
      lore:
        - "<gray>Konfigurerede krav:</gray><white>{requirement_count}</white>"
        - "<gray>Nuværende krav:</gray><white>{requirements}</white>"
        - "<gray>Ejede lager:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Opfyld de resterende krav før køb.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Lagergrænse nået</gradient>"
      lore:
        - "<gray>Ejede lager:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Du kan ikke købe flere lagerpladser</gray>"
        - "<gray>indtil det globale loft er hævet.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Krav offline</gradient>"
      lore:
        - "<gray>Et eller flere konfigurerede butikskrav</gray>"
        - "<gray>kan ikke løses på denne server.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profil mangler</gradient>"
      lore:
        - "<gray>DinRDRprofil kunne ikke indlæses,</gray>"
        - "<gray>så køb er midlertidigt blokeret.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Købt<white>{storage_key}</white><gray>. Forbrugte krav:</gray><white>{requirements}</white><gray>. Ejede lager:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Du opfylder i øjeblikket ikke<white>{requirement}</white><gray>. Butikskrav:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Butikskravet<white>{requirement}</white><gray>er ikke tilgængeligt eller ugyldigt lige nu.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Ingen konfigurerede butikskrav er tilgængelige for lagerkøb lige nu.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Du har nået lagergrænsen på<white>{max_storages}</white><gray>. Ejede lager:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>DinRDRprofil kunne ikke indlæses, så lagerkøb er ikke tilgængelige.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Køb{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Krav Browser</gradient>"
    lore:
