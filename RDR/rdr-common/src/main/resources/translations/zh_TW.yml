      name: "<gradient:#10b981:#34d399>[OK] {currency_id} 準備好</gradient>"
      lore:
        - "<gray>預設貨幣已存在。</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>創建預設貨幣：</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>創造貨幣失敗：</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>貨幣已存在：</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>除非 JExEconomy 可用，否則您無法使用此按鈕。</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] 未偵測到貨幣</gradient>"
      lore:
        - "<gray>未偵測到 Vault 或 JExEconomy 貨幣。</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理員存取權限</gradient>"
      lore:
        - "<gray>您無權使用此貨幣視圖。</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您沒有管理貨幣的權限。</gray>"
  decoration:
    border:
      name: " "

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 儲存儲存</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[資訊] 儲存容量</gradient>"
    lore:
      - "<gray>擁有的儲存：</gray><white>{owned_storages}</white>"
      - "<gray>最大儲存量：</gray><white>{max_storages}</white>"
      - "<gray>購買額外的保管庫空間，直到</gray>"
      - "<gray>您達到配置的上限。</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[需求] 儲存需求</gradient>"
    lore:
      - "<gray>配置需求：</gray><white>{requirement_count}</white>"
      - "<gray>目前要求計數：</gray><white>{requirements}</white>"
      - "<gray>狀態：</gray><white>{availability}</white>"
      - "<yellow>點選可詳細檢查每個需求層。</yellow>"
    none: "<gradient:#ef4444:#f87171>[無]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[就緒]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待處理]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[離線]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] 購買儲存</gradient>"
      lore:
        - "<gray>配置需求：</gray><white>{requirement_count}</white>"
        - "<gray>目前需求：</gray><white>{requirements}</white>"
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>滿足所有要求後點選購買。</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] 要求待定</gradient>"
      lore:
        - "<gray>配置需求：</gray><white>{requirement_count}</white>"
        - "<gray>目前需求：</gray><white>{requirements}</white>"
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>購買前滿足其餘要求。</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] 已達到儲存限制</gradient>"
      lore:
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>您無法購買更多儲存空間</gray>"
        - "<gray>直到全球上限提高。</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] 離線需求</gradient>"
      lore:
        - "<gray>一個或多個配置的儲存需求</gray>"
        - "<gray>無法在此伺服器上解析。</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] 設定檔遺失</gradient>"
      lore:
        - "<gray>您的RDR設定檔無法載入，</gray>"
        - "<gray>因此購買暫時被阻止。</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>已購買<white>{storage_key}</white><gray>。消耗的需求：</gray><white>{requirements}</white><gray>。擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您目前不符合<white>{requirement}</white><gray>。儲存需求：</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>儲存需求<white>{requirement}</white><gray>目前無法使用或無效。</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>目前沒有可用於儲存購買的已配置商店要求。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您已達到<white>{max_storages}</white><gray>的儲存限制。擁有的儲存：</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>您的RDR設定檔無法載入，因此無法購買儲存空間。</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[需求] 購買{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[資訊] 要求瀏覽器</gradient>"
    lore:
      - "<gray>購買等級：</gray><white>{purchase_number}</white>"
      - "<gray>解鎖儲存：</gray><white>{storage_number}</white>"
      - "<gray>配置需求：</gray><white>{requirement_count}</white>"
      - "<gray>目前滿足：</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[免費] 無需求</gradient>"
    lore:
      - "<gray>此購買層沒有配置要求。</gray>"
      - "<yellow>您無需額外檢查即可購買此儲存。</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[要求]{requirement_name}</gradient>"
    lore:
      - "<gray>鍵：</gray><white>{requirement_key}</white>"
      - "<gray>類型：</gray><white>{requirement_type}</white>"
      - "<gray>狀態：</gray><white>{status}</white>"
      - "<gray>進度：</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>摘要：</gray><white>{summary}</white>"
      - "<yellow>右鍵點選專案或貨幣要求以儲存進度。</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ 詳細檢查</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[遇見]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待處理]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[不可用]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>現已準備就緒。</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>儲存<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>的進度"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>沒有可用於<white>{requirement}</white><gray>.</gray>的匹配物品或貨幣"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>不支援儲存進度。</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>目前無法使用。</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>您的RDR設定檔無法載入，因此無法儲存進度。</gray>"

