    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient> <gray>{storage_key} 現在綁定到 <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_missing: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>沒有儲存綁定 <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_invalid: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>熱鍵必須介於 <white>1</white> 和 <white>{max_hotkeys}</white><gray>.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>儲存設定編輯已停用 <white>RDR Free</white><gray>.</gray>"
    scoreboard_enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>啟用了 <white>/rr scoreboard</white><gray> 側邊欄。</gray>"
    scoreboard_disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>禁用了 <white>/rr scoreboard</white><gray> 側邊欄。</gray>"
    scoreboard_syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>用法：</gray> <white>/rr scoreboard</white>"

page:
