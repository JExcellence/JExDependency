  available_slots: "<gray>可用插槽：</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>所獲得的儲存：</gray><white>{owned_storages}</white>"
  max_storages: "<gray>最大儲存：</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] 儲存集線器</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[保管庫] 儲存摘要</gradient>"
    lore:
