prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] 儲存統計</gradient>"
  items: "<gray>總項目：</gray><white>{total_items}</white>"
  available_slots: "<gray>可用插槽：</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>所獲得的儲存：</gray><white>{owned_storages}</white>"
  max_storages: "<gray>最大儲存：</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] 儲存集線器</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[保管庫] 儲存摘要</gradient>"
    lore:
      - "<gray>擁有的儲存：</gray><white>{owned_storages}</white>"
      - "<gray>最大儲存量：</gray><white>{max_storages}</white>"
      - "<gray>您的保管庫網路已保留</gray>"
      - "<gray>並準備好跨伺服器使用.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] 查看儲存體</gradient>"
    lore:
      - "<gray>擁有的儲存：</gray><white>{owned_storages}</white>"
      - "<gray>最大儲存量：</gray><white>{max_storages}</white>"
      - "<yellow>點擊以瀏覽您的儲存清單。</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] 儲存儲存</gradient>"
    lore:
      - "<gray>擁有的儲存：</gray><white>{owned_storages}</white>"
      - "<gray>最大儲存量：</gray><white>{max_storages}</white>"
      - "<yellow>點擊購買另一個儲存。</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] 儲存管理員</gradient>"
    lore:
      - "<gray>開啟特權 RDR 管理控制項。</gray>"
      - "<gray>管理貨幣提供者和預設值。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] 儲存控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR 管理面板</gradient>"
    lore:
      - "<gray>從一處管理特權儲存系統。</gray>"
      - "<gray>使用此面板可編輯設定值與貨幣支援。</gray>"
      - "<yellow>要求：</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 儲存設定</gradient>"
      lore:
        - "<gray>編輯值來自</gray> <white>配置/config.yml</white><gray>.</gray>"
        - "<gray>每個可編輯設定都可以透過鐵砧提示進行變更。 </gray>"
        - "<yellow>點選以開啟設定控制項。 </yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 貨幣經理</gradient>"
      lore:
        - "<gray>檢查從 Vault 和 JExEconomy 偵測到的貨幣。</gray>"
        - "<gray>建立預設值</gray> <white>raindrops</white> <gray>需要時使用貨幣。</gray>"
        - "<yellow>點選可開啟貨幣控制。</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理員存取權限</gradient>"
      lore:
        - "<gray>您無權使用此管理面板。</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] 貨幣經理</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] 貨幣供應商</gradient>"
    lore:
      - "<gray>偵測到的貨幣：</gray> <white>{currency_count}</white>"
      - "<gray>Vault 可用：</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy 可用：</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>使用水晶按鈕創建預設貨幣。</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>提供者：</gray> <white>{provider}</white>"
      - "<gray>象徵：</gray> <white>{symbol}</white>"
      - "<gray>前綴：</gray> <white>{prefix}</white>"
      - "<gray>後綴：</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] 創造 {currency_id}</gradient>"
      lore:
        - "<gray>在 JExEconomy 中建立預設的 RDR 貨幣。</gray>"
        - "<yellow>按一下以建立 {currency_id}。</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy 必需</gradient>"
      lore:
        - "<gray>如果沒有 JExEconomy 則無法建立預設貨幣。</gray>"
        - "<gray>首先安裝並啟用 JExEconomy。</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} 準備好</gradient>"
      lore:
        - "<gray>預設貨幣已存在。</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>創建預設貨幣：</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>創造貨幣失敗：</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>貨幣已存在：</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>除非 JExEconomy 可用，否則您無法使用此按鈕。</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] 未偵測到貨幣</gradient>"
      lore:
        - "<gray>未偵測到 Vault 或 JExEconomy 貨幣。</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理員存取權限</gradient>"
      lore:
        - "<gray>您無權使用此貨幣視圖。</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您沒有管理貨幣的權限。</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] 儲存設定</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[資訊]</gradient> <white>配置設定</white>"
    lore:
      - "<gray>偵測到可編輯設定：</gray> <white>{setting_count}</white>"
      - "<gray>點擊下面的任何條目以編輯其值鐵砧。 </gray>"
      - "<yellow>更改直接寫入config/config.yml。 </yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[放]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>小路：</gray> <white>{config_path}</white>"
      - "<gray>類型：</gray> <white>{value_type}</white>"
      - "<gray>目前值：</gray> <white>{current_value}</white>"
      - "<yellow>點擊以編輯此設定。 </yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[布林值]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[整數]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[長的]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[雙倍的]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[列表]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[細繩]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>沒有可編輯的設置</white>"
      lore:
        - "<gray>找不到可編輯的標量/清單配置設定。</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>需要管理員存取權限</white>"
      lore:
        - "<gray>您無權使用此配置視圖。</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>配置編輯已鎖定</white>"
      lore:
        - "<gray>此版本不允許執行時期配置編輯。 </gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您無權編輯配置設定。</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>此版本中配置編輯被鎖定。</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>已更新<white>{config_path}</white><gray>到<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "編輯{config_path}"
  input:
    lore:
      - "<gray>小路：</gray> <white>{config_path}</white>"
      - "<gray>類型：</gray> <white>{value_type}</white>"
      - "<gray>目前值：</gray> <white>{current_value}</white>"
      - "<yellow>輸入新值並確認。 </yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>輸入的類型無效<white>{value_type}</white><gray>。輸入：</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 儲存儲存</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[資訊] 儲存容量</gradient>"
    lore:
      - "<gray>擁有的儲存：</gray><white>{owned_storages}</white>"
      - "<gray>最大儲存量：</gray><white>{max_storages}</white>"
      - "<gray>購買額外的保管庫空間，直到</gray>"
      - "<gray>您達到配置的上限。</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[需求] 儲存需求</gradient>"
    lore:
      - "<gray>配置需求：</gray><white>{requirement_count}</white>"
      - "<gray>目前要求計數：</gray><white>{requirements}</white>"
      - "<gray>狀態：</gray><white>{availability}</white>"
      - "<yellow>點選可詳細檢查每個需求層。</yellow>"
    none: "<gradient:#ef4444:#f87171>[無]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[就緒]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待處理]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[離線]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] 購買儲存</gradient>"
      lore:
        - "<gray>配置需求：</gray><white>{requirement_count}</white>"
        - "<gray>目前需求：</gray><white>{requirements}</white>"
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>滿足所有要求後點選購買。</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] 要求待定</gradient>"
      lore:
        - "<gray>配置需求：</gray><white>{requirement_count}</white>"
        - "<gray>目前需求：</gray><white>{requirements}</white>"
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>購買前滿足其餘要求。</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] 已達到儲存限制</gradient>"
      lore:
        - "<gray>擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>您無法購買更多儲存空間</gray>"
        - "<gray>直到全球上限提高。</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] 離線需求</gradient>"
      lore:
        - "<gray>一個或多個配置的儲存需求</gray>"
        - "<gray>無法在此伺服器上解析。</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] 設定檔遺失</gradient>"
      lore:
        - "<gray>您的RDR設定檔無法載入，</gray>"
        - "<gray>因此購買暫時被阻止。</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>已購買<white>{storage_key}</white><gray>。消耗的需求：</gray><white>{requirements}</white><gray>。擁有的儲存：</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您目前不符合<white>{requirement}</white><gray>。儲存需求：</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>儲存需求<white>{requirement}</white><gray>目前無法使用或無效。</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>目前沒有可用於儲存購買的已配置商店要求。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>您已達到<white>{max_storages}</white><gray>的儲存限制。擁有的儲存：</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>您的RDR設定檔無法載入，因此無法購買儲存空間。</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[需求] 購買{purchase_number}</gradient>"
