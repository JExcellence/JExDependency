    locked:
      name: "<gradient:#ef4444:#f87171>[X] 需要管理員存取權限</gradient>"
      lore:
        - "<gray>您無權使用此管理面板。</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] 貨幣經理</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] 貨幣供應商</gradient>"
    lore:
      - "<gray>偵測到的貨幣：</gray> <white>{currency_count}</white>"
      - "<gray>Vault 可用：</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy 可用：</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>使用水晶按鈕創建預設貨幣。</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>提供者：</gray> <white>{provider}</white>"
      - "<gray>象徵：</gray> <white>{symbol}</white>"
      - "<gray>前綴：</gray> <white>{prefix}</white>"
      - "<gray>後綴：</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] 創造 {currency_id}</gradient>"
      lore:
        - "<gray>在 JExEconomy 中建立預設的 RDR 貨幣。</gray>"
        - "<yellow>按一下以建立 {currency_id}。</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy 必需</gradient>"
      lore:
        - "<gray>如果沒有 JExEconomy 則無法建立預設貨幣。</gray>"
        - "<gray>首先安裝並啟用 JExEconomy。</gray>"
