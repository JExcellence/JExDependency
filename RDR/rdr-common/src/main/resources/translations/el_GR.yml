    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχετε άδεια να επεξεργαστείτε παρακάμψεις ομάδας.</gray>"
    group_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Επιλέξτε πρώτα μια ομάδα πριν επεξεργαστείτε τις τιμές. Ομάδα</gray>"
    group_unknown: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><λευκό>{group_name}</white> is not a detected LuckPerms group.</gray>"
    group_selected: "<gradient:#38bdf8:#60a5fa>[=]</gradient> <gray>Επιλεγμένη ομάδα LuckPerms <λευκό>{group_name}</white> <gray>από <λευκό>{group_count}</white> detected group(s).</gray>"
    luckperms_groups_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν εντοπίστηκαν ομάδες LuckPerms από διαδικτυακούς παίκτες αυτήν τη στιγμή.</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>δεν είναι διαθέσιμη αυτήν τη στιγμή.</gray>"
    group_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Διαγράφηκαν παρακάμψεις για ομάδα <λευκό>{group_name}</white><gray>.</gray>"

