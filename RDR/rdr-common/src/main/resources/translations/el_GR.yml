      - "<gray>Πραγματικά μέγιστοι αποθηκευτικοί χώροι:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Έκπτωση παράκαμψης:</gray> <white>{override_discount}</white>"
      - "<gray>Πραγματική έκπτωση:</gray> <white>{effective_discount}</white>"
    inherit: "<gradient:#6b7280:#9ca3af>[Κληρονόμηση]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Απεριόριστο]</gradient>"
  actions:
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Μέγ.] Μέγιστες αποθηκευτικοί χώροι</gradient>"
      lore:
        - "<gray>Παράκαμψη μέγιστων αποθηκευτικών χώρων:</gray> <white>{override_max_storages}</white>"
        - "<gray>Πραγματικά μέγιστοι αποθηκευτικοί χώροι:</gray> <white>{effective_max_storages}</white>"
