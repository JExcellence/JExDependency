    inherit: "<gradient:#6b7280:#9ca3af>[Κληρονόμηση]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Απεριόριστο]</gradient>"
  actions:
    select_group:
      name: "<gradient:#38bdf8:#60a5fa>[Ετικέτα] Επιλογή ομάδας</gradient>"
      lore:
        - "<gray>Τρέχουσα ομάδα:</gray> <white>{group_name}</white>"
        - "<gray>Εντοπίστηκαν ομάδες LuckPerms:</gray> <white>{group_count}</white>"
        - "<yellow>Αριστερό κλικ για την επόμενη ομάδα, δεξί κλικ για την προηγούμενη.</yellow>"
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Μέγ] Ομάδα Μέγιστες Αποθηκευτικοί χώροι</gradient>"
      lore:
        - "<gray>Παράκαμψη μέγιστων αποθηκευτικών χώρων:</gray> <white>{override_max_storages}</white>"
        - "<yellow>Κάντε κλικ για να επεξεργαστείτε μέγιστους αποθηκευτικούς χώρους για αυτήν την ομάδα.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Ομαδική Έκπτωση</gradient>"
      lore:
        - "<gray>Έκπτωση παράκαμψης:</gray> <white>{override_discount}</white>"
        - "<yellow>Κάντε κλικ για να επεξεργαστείτε την έκπτωση για αυτήν την ομάδα.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Εκκαθάριση παρακάμψεων ομάδας</gradient>"
      lore:
        - "<gray>Καταργεί τις παρακάμψεις μέγιστου αποθηκευτικού χώρου και έκπτωσης για αυτήν την ομάδα.</gray>"
        - "<yellow>Κάντε κλικ για να καταργήσετε αυτήν την παράκαμψη ομάδας.</yellow>"
  feedback:
