    save_failed: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} δεν μπόρεσε να σωθεί. Ελέγξτε την κονσόλα για λεπτομέρειες.</gray>"
    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient> <gray>{storage_key} Τώρα είναι βέβαιο ότι <white>/rr {hotkey}</white><gray>.</gray>"
