  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Key:</gray><white>{requirement_key}</white>"
      - "<gray>Τύπος:</gray><white>{requirement_type}</white>"
      - "<gray>Κατάσταση:</gray><white>{status}</white>"
      - "<gray>Πρόοδος:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Σύνοψη:</gray><white>{summary}</white>"
      - "<yellow>Κάντε δεξί κλικ στο στοιχείο ή στις απαιτήσεις νομίσματος για την πρόοδο της τράπεζας.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Λεπτομερείς Έλεγχοι</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Σε εκκρεμότητα]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Μη διαθέσιμο]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> είναι τώρα έτοιμο.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Αποθηκεύτηκε πρόοδος για <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Δεν υπήρχαν διαθέσιμα στοιχεία ή νόμισμα που να ταιριάζουν για<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>δεν υποστηρίζει τραπεζική πρόοδο.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>δεν είναι διαθέσιμο αυτή τη στιγμή.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Δεν ήταν δυνατή η φόρτωση του προφίλ σαςRDR, επομένως δεν ήταν δυνατή η αποθήκευση της προόδου.</gray>"

