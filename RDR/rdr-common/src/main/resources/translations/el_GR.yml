prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Στατιστικά αποθήκευσης</gradient>"
  items: "<gray>Σύνολο στοιχείων:</gray><white>{total_items}</white>"
  available_slots: "<gray>Διαθέσιμες υποδοχές:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Αποθηκευτικοί χώροι που ελήφθησαν:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Περίληψη αποθήκευσης</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<gray>Το δίκτυό σας στο θησαυροφυλάκιο παραμένει</gray>"
      - "<gray>και έτοιμο για χρήση μεταξύ διακομιστών.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Προβολή αποθηκευτικών χώρων</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<yellow>Κάντε κλικ για να περιηγηθείτε στη λίστα αποθηκευτικού χώρου σας.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Κατάστημα αποθήκευσης</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<yellow>Κάντε κλικ για να αγοράσετε άλλο χώρο αποθήκευσης.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Διαχειριστής αποθήκευσης</gradient>"
    lore:
      - "<gray>Ανοίξτε τα προνομιακά RDR στοιχεία ελέγχου διαχειριστή.</gray>"
      - "<gray>Διαχείριση παρόχων νομισμάτων και προεπιλογών.</gray>"
      - "<yellow>Απαιτεί:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Έλεγχος αποθήκευσης</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Πίνακας διαχειριστή</gradient>"
    lore:
      - "<gray>Διαχειριστείτε προνομιακά συστήματα αποθήκευσης από ένα μέρος.</gray>"
      - "<gray>Χρησιμοποιήστε αυτό το πλαίσιο για να διαμορφώσετε την υποστήριξη νομισμάτων.</gray>"
      - "<yellow>Απαιτεί:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Υπεύθυνος νομισμάτων</gradient>"
      lore:
        - "<gray>Ελέγξτε τα νομίσματα που εντοπίστηκαν από Vault και JExEconomy.</gray>"
        - "<gray>Δημιουργήστε την προεπιλογή</gray> <white>raindrops</white> <gray>νόμισμα όταν χρειάζεται.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου νομισμάτων.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Απαιτείται πρόσβαση διαχειριστή</gradient>"
      lore:
        - "<gray>Δεν έχετε άδεια χρήσης αυτού του πίνακα διαχείρισης.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Υπεύθυνος νομισμάτων</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Πάροχοι νομισμάτων</gradient>"
    lore:
      - "<gray>Εντοπίστηκαν νομίσματα:</gray> <white>{currency_count}</white>"
      - "<gray>Vault διαθέσιμο:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy διαθέσιμο:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Χρησιμοποιήστε το κουμπί κρυστάλλου για να δημιουργήσετε το προεπιλεγμένο νόμισμα.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Προμηθευτής:</gray> <white>{provider}</white>"
      - "<gray>Σύμβολο:</gray> <white>{symbol}</white>"
      - "<gray>Πρόθεμα:</gray> <white>{prefix}</white>"
      - "<gray>Κατάληξη:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Δημιουργώ {currency_id}</gradient>"
      lore:
        - "<gray>Δημιουργήστε το προεπιλεγμένο νόμισμα RDR σε JExEconomy.</gray>"
        - "<yellow>Κάντε κλικ για να δημιουργήσετε {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Απαιτείται</gradient>"
      lore:
        - "<gray>Δεν μπορείτε να δημιουργήσετε προεπιλεγμένο νόμισμα χωρίς JExEconomy.</gray>"
        - "<gray>Εγκαταστήστε και ενεργοποιήστε πρώτα το JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Ετοιμος</gradient>"
      lore:
        - "<gray>Το προεπιλεγμένο νόμισμα υπάρχει ήδη.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Δημιουργήθηκε προεπιλεγμένο νόμισμα:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Αποτυχία δημιουργίας νομίσματος:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Το νόμισμα υπάρχει ήδη:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν μπορείτε να χρησιμοποιήσετε αυτό το κουμπί εκτός εάν είναι διαθέσιμο το JExEconomy.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Δεν εντοπίστηκαν νομίσματα</gradient>"
      lore:
        - "<gray>Δεν εντοπίστηκαν νομίσματα Vault ή JExEconomy.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Απαιτείται πρόσβαση διαχειριστή</gradient>"
      lore:
        - "<gray>Δεν έχετε άδεια χρήσης αυτής της προβολής νομίσματος.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχετε άδεια διαχείρισης νομισμάτων.</gray>"
  decoration:
    border:
      name: " "

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Κατάστημα αποθήκευσης</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Πληροφορίες] Χωρητικότητα αποθήκευσης</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<gray>Αγοράστε επιπλέον χώρο στο θησαυροφυλάκιο μέχρι</gray>"
      - "<gray>φτάνετε στο διαμορφωμένο όριο.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Απαιτήσεις καταστήματος</gradient>"
    lore:
      - "<gray>Διαμορφωμένες απαιτήσεις:</gray><white>{requirement_count}</white>"
      - "<gray>Αριθμός τρεχουσών απαιτήσεων:</gray><white>{requirements}</white>"
      - "<gray>Κατάσταση:</gray><white>{availability}</white>"
      - "<yellow>Κάντε κλικ για να επιθεωρήσετε λεπτομερώς κάθε επίπεδο απαίτησης.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Κανένα]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Έτοιμος]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Σε εκκρεμότητα]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Εκτός σύνδεσης]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Αγορά αποθηκευτικού χώρου</gradient>"
      lore:
        - "<gray>Διαμορφωμένες απαιτήσεις:</gray><white>{requirement_count}</white>"
        - "<gray>Τρέχουσες απαιτήσεις:</gray><white>{requirements}</white>"
        - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Κάντε κλικ για αγορά όταν πληρούνται όλες οι απαιτήσεις.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Απαιτήσεις σε εκκρεμότητα</gradient>"
      lore:
        - "<gray>Διαμορφωμένες απαιτήσεις:</gray><white>{requirement_count}</white>"
        - "<gray>Τρέχουσες απαιτήσεις:</gray><white>{requirements}</white>"
        - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Ικανοποιήστε τις υπόλοιπες απαιτήσεις πριν από την αγορά.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Συμπληρώθηκε το όριο αποθήκευσης</gradient>"
      lore:
        - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Δεν μπορείτε να αγοράσετε περισσότερους αποθηκευτικούς χώρους</gray>"
        - "<gray>μέχρι να αυξηθεί το παγκόσμιο ανώτατο όριο.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Απαιτήσεις εκτός σύνδεσης</gradient>"
      lore:
        - "<gray>Μία ή περισσότερες διαμορφωμένες απαιτήσεις καταστήματος</gray>"
        - "<gray>δεν μπορεί να επιλυθεί σε αυτόν τον διακομιστή.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Λείπει το προφίλ</gradient>"
      lore:
        - "<gray>Δεν ήταν δυνατή η φόρτωση του προφίλ σαςRDR,</gray>"
        - "<gray>άρα οι αγορές είναι προσωρινά αποκλεισμένες.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Αγόρασε<white>{storage_key}</white><gray>. Απαιτήσεις που καταναλώθηκαν:</gray><white>{requirements}</white><gray>. Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Δεν συναντάτε αυτήν τη στιγμή<white>{requirement}</white><gray>. Απαιτήσεις καταστήματος:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Η απαίτηση καταστήματος<white>{requirement}</white><gray>δεν είναι διαθέσιμη ή δεν είναι έγκυρη αυτήν τη στιγμή.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Δεν υπάρχουν διαμορφωμένες απαιτήσεις καταστήματος διαθέσιμες για αγορές αποθηκευτικού χώρου αυτήν τη στιγμή.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Έχετε συμπληρώσει το όριο αποθήκευσης των<white>{max_storages}</white><gray>. Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Δεν ήταν δυνατή η φόρτωση του προφίλ σαςRDR, επομένως οι αγορές αποθηκευτικού χώρου δεν είναι διαθέσιμες.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Αγορά{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Πληροφορίες] Απαιτήσεις Πρόγραμμα περιήγησης</gradient>"
    lore:
      - "<gray>Purchase level:</gray><white>{purchase_number}</white>"
