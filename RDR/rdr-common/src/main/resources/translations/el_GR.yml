    discount:
      name: "<gradient:#22c55e:#86efac>[%] Έκπτωση καταστήματος</gradient>"
      lore:
        - "<gray>Έκπτωση παράκαμψης:</gray> <white>{override_discount}</white>"
        - "<gray>Πραγματική έκπτωση:</gray> <white>{effective_discount}</white>"
        - "<yellow>Κάντε κλικ για να επεξεργαστείτε το ποσοστό έκπτωσης.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Εκκαθάριση παρακάμψεων προγράμματος αναπαραγωγής</gradient>"
      lore:
        - "<gray>Καταργεί όλες τις παρακάμψεις μέγιστης αποθήκευσης και έκπτωσης.</gray>"
        - "<yellow>Κάντε κλικ για να διαγράψετε τις παρακάμψεις αυτού του προγράμματος αναπαραγωγής.</yellow>"
  feedback:
