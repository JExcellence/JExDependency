    unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} Δεν μπορούσε να ανοιχτεί τώρα.</gray>"
    access_denied: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχετε πρόσβαση σε <white>{storage_key}</white><gray>.</gray>"
    blacklisted_item: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{item}</white><gray> είναι παγκοσμίως μαύρη λίστα από RDR αποθήκευση.</gray>"
