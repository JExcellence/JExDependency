    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχετε άδεια να επεξεργαστείτε τις παρακάμψεις του προγράμματος αναπαραγωγής.</gray>"
    player_missing:
      name: "<gradient:#ef4444:#f87171>[X] Ο στόχος παίκτη λείπει</gradient>"
      lore:
        - "<gray>Δεν παρέχεται στόχος παίκτη για αυτόν τον επεξεργαστή.</gray>"
    player_missing_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχει επιλεγεί στόχος παίκτη. Η υπηρεσία ρυθμίσεων αναπαραγωγής/ομάδας</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>δεν είναι διαθέσιμη αυτήν τη στιγμή.</gray>"
    player_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Διαγράφηκαν όλες οι παρακάμψεις για <white>{player_name}</white> <gray>(</gray><white>{player_uuid}</white><gray>).</gray>"

storage_admin_group_edit_ui:
  title: "<gradient:#38bdf8:#60a5fa>[G] Επεξεργασία ομάδας {group_name}</gradient>"
  summary:
