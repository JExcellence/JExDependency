prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Στατιστικά αποθήκευσης</gradient>"
  items: "<gray>Σύνολο στοιχείων:</gray><white>{total_items}</white>"
  available_slots: "<gray>Διαθέσιμες υποδοχές:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Αποθηκευτικοί χώροι που ελήφθησαν:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Απεριόριστος]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Περίληψη αποθήκευσης</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<gray>Το δίκτυό σας στο θησαυροφυλάκιο παραμένει</gray>"
      - "<gray>και έτοιμο για χρήση μεταξύ διακομιστών.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Απεριόριστος]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Προβολή αποθηκευτικών χώρων</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<yellow>Κάντε κλικ για να περιηγηθείτε στη λίστα αποθηκευτικού χώρου σας.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Κατάστημα αποθήκευσης</gradient>"
    lore:
      - "<gray>Ιδιόκτητοι χώροι αποθήκευσης:</gray><white>{owned_storages}</white>"
      - "<gray>Μέγιστες αποθήκες:</gray><white>{max_storages}</white>"
      - "<yellow>Κάντε κλικ για να αγοράσετε άλλο χώρο αποθήκευσης.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Διαχειριστής αποθήκευσης</gradient>"
    lore:
      - "<gray>Ανοίξτε τα προνομιακά RDR στοιχεία ελέγχου διαχειριστή.</gray>"
      - "<gray>Διαχείριση παρόχων νομισμάτων και προεπιλογών.</gray>"
      - "<yellow>Απαιτεί:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Διαχειριστής] Έλεγχος αποθήκευσης</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Πληροφορίες] Πίνακας διαχειριστή RDR</gradient>"
    lore:
      - "<gray>Διαχειριστείτε προνομιακά συστήματα αποθήκευσης από ένα μέρος.</gray>"
      - "<gray>Χρησιμοποιήστε αυτό το πλαίσιο για να επεξεργαστείτε τις τιμές διαμόρφωσης και να ανοίξετε τα στοιχεία ελέγχου ενοποίησης.</gray>"
      - "<yellow>Απαιτεί:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Χειριστήρια αναπαραγωγής</gradient>"
      lore:
        - "<gray>Επεξεργαστείτε τα όρια, τις εκπτώσεις και τα στοιχεία ελέγχου δύναμης αποθήκευσης αναπαραγωγής/ομάδας.</gray>"
        - "<gray>Ανοίξτε τους επεξεργαστές παράκαμψης και τις ενέργειες διαχείρισης έκτακτης ανάγκης.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου του προγράμματος αναπαραγωγής.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Διαμόρφωση αποθήκευσης</gradient>"
      lore:
        - "<gray>Επεξεργασία τιμών από</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Οι πληκτρολογημένες ρυθμίσεις ανοίγουν σε ένα αντίστοιχο πρόγραμμα επεξεργασίας άκμονα από βιτρό.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου διαμόρφωσης.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Ενσωματώσεις προσθηκών</gradient>"
      lore:
        - "<gray>Διαχειριστείτε τα εργαλεία δεξιοτήτων, εργασίας, νομίσματος και PlaceholderAPI.</gray>"
        - "<gray>Ανοίξτε τα στοιχεία ελέγχου διαχειριστή για συγκεκριμένη ενσωμάτωση.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τη διαχείριση ενοποίησης.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Υπεύθυνος νομίσματος</gradient>"
      lore:
        - "<gray>Ελέγξτε τα νομίσματα που εντοπίστηκαν από το Vault και το JExEconomy.</gray>"
        - "<gray>Δημιουργήστε την προεπιλογή</gray> <white>raindrops</white> <gray>νόμισμα όταν χρειάζεται.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου νομισμάτων.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Ικανότητα] Απαιτήσεις δεξιοτήτων</gradient>"
      lore:
        - "<gray>Ελέγξτε τις υποστηριζόμενες προσθήκες δεξιοτήτων και την κατάσταση ανίχνευσης.</gray>"
        - "<gray>Εφαρμόστε προεπιλεγμένες απαιτήσεις δεξιοτήτων σε όλα τα επίπεδα αγοράς αποθήκευσης.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου απαιτήσεων δεξιοτήτων.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Εργασία] Απαιτήσεις εργασίας</gradient>"
      lore:
        - "<gray>Ελέγξτε τις υποστηριζόμενες προσθήκες εργασίας και την κατάσταση ανίχνευσης.</gray>"
        - "<gray>Εφαρμόστε τις προεπιλεγμένες απαιτήσεις εργασιών σε όλα τα επίπεδα αγοράς αποθήκευσης.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τα στοιχεία ελέγχου απαιτήσεων εργασίας.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Απαιτείται πρόσβαση διαχειριστή</gradient>"
      lore:
        - "<gray>Δεν έχετε άδεια χρήσης αυτού του πίνακα διαχείρισης.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Χειριστήρια αναπαραγωγής & ομάδας</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Πληροφορίες] Αποθήκευση Εργαλειοθήκη διαχειριστή</gradient>"
    lore:
      - "<gray>Επεξεργαστείτε μέγιστους αποθηκευτικούς χώρους και εκπτώσεις για παίκτες και ομάδες.</gray>"
      - "<gray>Αναγκαστική αποστράγγιση/επαναφορά αποθηκευτικών χώρων ή κλείσιμο όλων των ανοιχτών προβολών RDR. Το</gray>"
      - "<yellow>Απαιτεί:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Παράκαμψη παίκτη</gradient>"
      lore:
        - "<gray>Περιηγηθείτε σε διαδικτυακούς παίκτες και διαμορφωμένους στόχους παράκαμψης.</gray>"
        - "<gray>Επεξεργαστείτε τους μέγιστους αποθηκευτικούς χώρους και τις τιμές έκπτωσης ανά παίκτη.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τις παρακάμψεις του προγράμματος αναπαραγωγής.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Παράκαμψη ομάδας</gradient>"
      lore:
        - "<gray>Επιλέξτε μια ομάδα LuckPerms και ορίστε τιμές παράκαμψης.</gray>"
        - "<gray>Χρήσιμο για επίπεδα κατάταξης βάσει αδειών.</gray>"
        - "<yellow>Κάντε κλικ για να ανοίξετε τις παρακάμψεις ομάδας.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Force Drain Storage</gradient>"
      lore:
        - "<gray>Διαγράφει όλα τα περιεχόμενα των αντικειμένων από έναν επιλεγμένο χώρο αποθήκευσης.</gray>"
        - "<gray>Διατηρεί αξιόπιστες ρυθμίσεις, τιμές χρέους και πλήκτρα πρόσβασης.</gray>"
        - "<yellow>Κάντε κλικ για να επιλέξετε χώρο αποθήκευσης.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Αναγκαστική επαναφορά αποθήκευσης</gradient>"
      lore:
        - "<gray>Επαναφέρει έναν επιλεγμένο χώρο αποθήκευσης σε καθαρή κατάσταση.</gray>"
        - "<gray>Διαγράφει στοιχεία, χρέη, αξιόπιστη πρόσβαση και πλήκτρο πρόσβασης.</gray>"
        - "<yellow>Κάντε κλικ για να επιλέξετε χώρο αποθήκευσης.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Αναγκαστικό κλείσιμο όλων των προβολών RDR</gradient>"
      lore:
        - "<gray>Κλείνει όλα τα ανοιχτά μενού RDR.</gray>"
        - "<gray>Χρήσιμο μετά από αλλαγές διαμόρφωσης ή ενέργειες έκτακτης ανάγκης.</gray>"
        - "<yellow>Κάντε κλικ για να κλείσετε αναγκαστικά όλες τις προβολές RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Απαιτείται πρόσβαση διαχειριστή</gradient>"
      lore:
        - "<gray>Δεν έχετε άδεια να χρησιμοποιήσετε αυτό το μενού.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν έχετε άδεια χρήσης των στοιχείων ελέγχου διαχειριστή του προγράμματος αναπαραγωγής/ομάδας.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Αναγκαστικά κλειστό <λευκό>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Επιλέξτε Παράκαμψη στόχου παίκτη</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Πληροφορίες] Στόχοι παράκαμψης παίκτη</gradient>"
    lore:
      - "<gray>Παρακολουθούμενοι παίκτες:</gray> <white>{tracked_players}</white>"
      - "<gray>Διαμορφωμένες παρακάμψεις:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Κάντε κλικ σε ένα πρόγραμμα αναπαραγωγής παρακάτω για να επεξεργαστείτε παρακάμψεις.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Παράκαμψη μέγιστων αποθηκευτικών χώρων:</gray> <white>{override_max_storages}</white>"
      - "<gray>Πραγματικά μέγιστοι αποθηκευτικοί χώροι:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Έκπτωση παράκαμψης:</gray> <white>{override_discount}</white>"
      - "<gray>Πραγματική έκπτωση:</gray> <white>{effective_discount}</white>"
      - "<yellow>Κάντε κλικ για να επεξεργαστείτε αυτό το προφίλ παράκαμψης παίκτη.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[Διαδικτυακός]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Εκτός σύνδεσης]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Κληρονόμηση]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Απεριόριστο]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Δεν βρέθηκαν παίκτες</gradient>"
      lore:
        - "<gray>Δεν βρέθηκαν διαδικτυακοί παίκτες ή αποθηκευμένες παρακάμψεις παίκτη.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Απαιτείται πρόσβαση διαχειριστή</gradient>"
      lore:
        - "<gray>Δεν έχετε άδεια να περιηγηθείτε σε παρακάμψεις προγράμματος αναπαραγωγής.</gray>"

storage_admin_player_edit_ui:
