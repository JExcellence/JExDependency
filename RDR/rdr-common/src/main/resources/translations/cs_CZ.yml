prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiky úložiště</gradient>"
  items: "<gray>Položky celkem:</gray><white>{total_items}</white>"
  available_slots: "<gray>Dostupné sloty:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Získaná úložiště:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Max úložiště:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Neomezený]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Přehled úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<gray>Vaše síť trezoru je trvalá</gray>"
      - "<gray>a připraven k použití mezi servery.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Neomezený]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Zobrazit úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknutím můžete procházet seznam úložiště.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknutím zakoupíte další úložiště.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Správce úložiště</gradient>"
    lore:
      - "<gray>Otevřete privilegované ovládací prvky správce RDR.</gray>"
      - "<gray>Spravujte poskytovatele měn a výchozí hodnoty.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Řízení úložiště</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informace] Panel správce RDR</gradient>"
    lore:
      - "<gray>Spravujte privilegované úložné systémy z jednoho místa.</gray>"
      - "<gray>Pomocí tohoto panelu můžete upravit hodnoty konfigurace a otevřít ovládací prvky integrace.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Ovládací prvky přehrávače</gradient>"
      lore:
        - "<gray>Upravte limity hráčů/skupin, slevy a ovládací prvky síly úložiště.</gray>"
        - "<gray>Otevřete editory přepisů a akce nouzového řízení.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky přehrávače.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Konfigurace úložiště</gradient>"
      lore:
        - "<gray>Upravit hodnoty z</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Zadaná nastavení se otevřou v odpovídajícím editoru kovadliny z barevného skla.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky konfigurace.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integrace pluginů</gradient>"
      lore:
        - "<gray>Spravujte dovednosti, práci, měnu a nástroje PlaceholderAPI.</gray>"
        - "<gray>Otevřete ovládací prvky pro správu specifické pro integraci.</gray>"
        - "<yellow>Kliknutím otevřete správu integrace.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Zkontrolujte shromážděné zůstatky obchodní daně podle měny.</gray>"
        - "<gray>Vyberte zůstatky na serveru a bance na svůj účet správce.</gray>"
        - "<yellow>Kliknutím otevřete bankovní kontroly obchodní daně.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Měnový manažer</gradient>"
      lore:
        - "<gray>Zkontrolujte zjištěné měny ze služby Vault a JExEconomy.</gray>"
        - "<gray>Vytvořte výchozí</gray> <white>raindrops</white> <gray>měny v případě potřeby.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky měny.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Dovednosti] Požadavky na dovednosti</gradient>"
      lore:
        - "<gray>Zkontrolujte podporované pluginy dovedností a stav detekce.</gray>"
        - "<gray>Použijte výchozí požadavky na dovednosti na všechny úrovně nákupu úložiště.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky požadavků na dovednosti.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Požadavky na zaměstnání</gradient>"
      lore:
        - "<gray>Zkontrolujte podporované pluginy úloh a stav detekce.</gray>"
        - "<gray>Použít výchozí požadavky úlohy na všechny úrovně nákupu úložiště.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky požadavků na úlohu.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Je vyžadován přístup správce</gradient>"
      lore:
        - "<gray>Nemáte oprávnění používat tento panel administrátora.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Ovládání přehrávače a skupiny</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Sada nástrojů pro správu úložiště</gradient>"
    lore:
      - "<gray>Upravte maximální úložiště a slevy pro hráče a skupiny.</gray>"
      - "<gray>Vynucené vyprázdnění/resetování úložišť nebo uzavření všech otevřených zobrazení RDR.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Přepisy přehrávače</gradient>"
      lore:
        - "<gray>Prohlížejte online hráče a nakonfigurované přepisovací cíle.</gray>"
        - "<gray>Upravte maximální úložiště pro hráče a hodnoty slev.</gray>"
        - "<yellow>Kliknutím otevřete přepisy přehrávače.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Přepsání skupiny</gradient>"
      lore:
        - "<gray>Vyberte skupinu LuckPerms a nastavte hodnoty přepsání.</gray>"
        - "<gray>Užitečné pro úrovně hodnocení založené na oprávněních.</gray>"
        - "<yellow>Klepnutím otevřete přepsání skupiny.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Vynutit vyprázdnění úložiště</gradient>"
      lore:
        - "<gray>Vymaže veškerý obsah položky z vybraného úložiště.</gray>"
        - "<gray>Uchovává důvěryhodná nastavení, dluhy a hodnoty klávesových zkratek.</gray>"
        - "<yellow>Klepnutím vyberte úložiště.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Vynutit reset úložiště</gradient>"
      lore:
        - "<gray>Resetuje vybrané úložiště do čistého stavu.</gray>"
        - "<gray>Vymaže položky, dluhy, důvěryhodný přístup a klávesovou zkratku.</gray>"
        - "<yellow>Klepnutím vyberte úložiště.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Vynutit uzavření všech zobrazení RDR</gradient>"
      lore:
        - "<gray>Zavře všechny aktuálně otevřené nabídky RDR.</gray>"
        - "<gray>Užitečné po změnách konfigurace nebo nouzových akcích.</gray>"
        - "<yellow>Kliknutím vynutíte uzavření všech pohledů RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Je vyžadován přístup správce</gradient>"
      lore:
        - "<gray>K použití této nabídky nemáte oprávnění.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nemáte oprávnění používat ovládací prvky správce přehrávače/skupiny.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Vynuceně zavřeno <bílá>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
