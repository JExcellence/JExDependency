prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiky úložiště</gradient>"
  items: "<gray>Položky celkem:</gray><white>{total_items}</white>"
  available_slots: "<gray>Dostupné sloty:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Získaná úložiště:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Max úložiště:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Přehled úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<gray>Vaše síť trezoru je trvalá</gray>"
      - "<gray>a připraven k použití mezi servery.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Zobrazit úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknutím můžete procházet seznam úložiště.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknutím zakoupíte další úložiště.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Správce úložiště</gradient>"
    lore:
      - "<gray>Otevřete privilegované ovládací prvky správce RDR.</gray>"
      - "<gray>Spravujte poskytovatele měn a výchozí hodnoty.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Řízení úložiště</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR panel administrátora</gradient>"
    lore:
      - "<gray>Spravujte privilegované úložné systémy z jednoho místa.</gray>"
      - "<gray>Pouzij tento panel k uprave hodnot konfigurace a podpory men.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Konfigurace Uloziste</gradient>"
      lore:
        - "<gray>Upravit hodnoty z</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Každé upravitelné nastavení lze změnit pomocí výzvy kovadliny.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky konfigurace.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Měnový manažer</gradient>"
      lore:
        - "<gray>Zkontrolujte zjištěné měny z Vault a JExEconomy.</gray>"
        - "<gray>Vytvořte výchozí</gray> <white>raindrops</white> <gray>měny v případě potřeby.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky měny.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Je vyžadován přístup správce</gradient>"
      lore:
        - "<gray>Nemáte oprávnění používat tento panel administrátora.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Měnový manažer</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Poskytovatelé měn</gradient>"
    lore:
      - "<gray>Zjištěné měny:</gray> <white>{currency_count}</white>"
      - "<gray>Vault k dispozici:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy k dispozici:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Pomocí krystalového tlačítka vytvořte výchozí měnu.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Poskytovatel:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Předpona:</gray> <white>{prefix}</white>"
      - "<gray>Přípona:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Vytvořit {currency_id}</gradient>"
      lore:
        - "<gray>Vytvořte výchozí měnu RDR v JExEconomy.</gray>"
        - "<yellow>Kliknutím vytvoříte {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Povinné</gradient>"
      lore:
        - "<gray>Výchozí měnu nelze vytvořit bez JExEconomy.</gray>"
        - "<gray>Nejprve nainstalujte a povolte JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Připraveno</gradient>"
      lore:
        - "<gray>Výchozí měna již existuje.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Vytvořená výchozí měna:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nepodařilo se vytvořit měnu:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Měna již existuje:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Toto tlačítko nemůžete použít, pokud není k dispozici JExEconomy.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Nebyly zjištěny žádné měny</gradient>"
      lore:
        - "<gray>Nebyly zjištěny žádné měny Vault nebo JExEconomy.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Je vyžadován přístup správce</gradient>"
      lore:
        - "<gray>K použití tohoto zobrazení měny nemáte oprávnění.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nemáte oprávnění ke správě měn.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Konfigurace Uloziste</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informace]</gradient> <white>Nastavení konfigurace</white>"
    lore:
      - "<gray>Zjištěna upravitelná nastavení:</gray> <white>{setting_count}</white>"
      - "<gray>Kliknutím na libovolnou položku níže upravíte její hodnotu v kovadlině.</gray>"
      - "<yellow>Změny se zapisují přímo do config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Soubor]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Cesta:</gray> <white>{config_path}</white>"
      - "<gray>Typ:</gray> <white>{value_type}</white>"
      - "<gray>Aktuální hodnota:</gray> <white>{current_value}</white>"
      - "<yellow>Kliknutím upravíte toto nastavení.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Celé číslo]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Dlouho]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dvojnásobek]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Seznam]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[řetězec]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Žádná upravitelná nastavení</white>"
      lore:
        - "<gray>Nebyla nalezena žádná upravitelná nastavení skalární/seznamové konfigurace.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Je vyžadován přístup správce</white>"
      lore:
        - "<gray>K použití tohoto konfiguračního zobrazení nemáte oprávnění.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Úprava konfigurace uzamčena</white>"
      lore:
        - "<gray>Tato edice neumožňuje úpravy konfigurace za běhu.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nemáte oprávnění upravovat nastavení konfigurace.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Úpravy konfigurací jsou v tomto vydání uzamčeny.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Aktualizováno<white>{config_path}</white><gray>na<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Upravit{config_path}"
  input:
    lore:
      - "<gray>Cesta:</gray> <white>{config_path}</white>"
      - "<gray>Typ:</gray> <white>{value_type}</white>"
      - "<gray>Aktuální hodnota:</gray> <white>{current_value}</white>"
      - "<yellow>Zadejte novou hodnotu a potvrďte.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Neplatný vstup pro typ<white>{value_type}</white><gray>. Vstup:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] úložiště</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Kapacita úložiště</gradient>"
    lore:
      - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}</white>"
      - "<gray>Maximální úložiště:</gray><white>{max_storages}</white>"
      - "<gray>Kupte si další úložný prostor do</gray>"
      - "<gray>dosáhnete nastaveného limitu.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Požadavky na obchod</gradient>"
    lore:
      - "<gray>Konfigurované požadavky:</gray><white>{requirement_count}</white>"
      - "<gray>Aktuální počet požadavků:</gray><white>{requirements}</white>"
      - "<gray>Status:</gray><white>{availability}</white>"
      - "<yellow>Kliknutím si podrobně prohlédnete každou úroveň požadavků.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Žádné]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Připraveno]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Čeká]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Koupit úložiště</gradient>"
      lore:
        - "<gray>Konfigurované požadavky:</gray><white>{requirement_count}</white>"
        - "<gray>Aktuální požadavky:</gray><white>{requirements}</white>"
        - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klikněte pro nákup, když jsou splněny všechny požadavky.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Nevyřízené požadavky</gradient>"
      lore:
        - "<gray>Konfigurované požadavky:</gray><white>{requirement_count}</white>"
        - "<gray>Aktuální požadavky:</gray><white>{requirements}</white>"
        - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Před nákupem splňte zbývající požadavky.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Dosažen limit úložiště</gradient>"
      lore:
        - "<gray>Vlastněná úložiště:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Nemůžete zakoupit další úložiště</gray>"
        - "<gray>dokud nebude zvýšen globální strop.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Požadavky offline</gradient>"
      lore:
        - "<gray>Jeden nebo více nakonfigurovaných požadavků na obchod</gray>"
        - "<gray>nelze na tomto serveru vyřešit.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Chybí profil</gradient>"
      lore:
        - "<gray>Váš profilRDRnelze načíst,</gray>"
        - "<gray>takže nákupy jsou dočasně blokovány.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Zakoupeno<white>{storage_key}</white><gray>. Spotřebované požadavky:</gray><white>{requirements}</white><gray>. Vlastní úložiště:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>V současné době nesplňujete<white>{requirement}</white><gray>. Požadavky na obchod:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Požadavek obchodu<white>{requirement}</white><gray>je momentálně nedostupný nebo neplatný.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Pro nákupy úložiště nejsou momentálně k dispozici žádné nakonfigurované požadavky na úložiště.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Dosáhli jste limitu úložiště<white>{max_storages}</white><gray>. Vlastní úložiště:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Váš profilRDRnelze načíst, takže nákupy úložiště nejsou dostupné.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Požadavek] Koupit{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Prohlížeč požadavku</gradient>"
    lore:
      - "<gray>Úroveň nákupu:</gray><white>{purchase_number}</white>"
      - "<gray>Odemkne úložiště:</gray><white>{storage_number}</white>"
      - "<gray>Konfigurované požadavky:</gray><white>{requirement_count}</white>"
      - "<gray>Aktuálně splněno:</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Zdarma] Žádné požadavky</gradient>"
    lore:
      - "<gray>Tato úroveň nákupu nemá žádné nakonfigurované požadavky.</gray>"
      - "<yellow>Toto úložiště můžete zakoupit bez dalších kontrol.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Požadavek]{requirement_name}</gradient>"
    lore:
      - "<gray>Klíč:</gray><white>{requirement_key}</white>"
      - "<gray>Typ:</gray><white>{requirement_type}</white>"
      - "<gray>Status:</gray><white>{status}</white>"
      - "<gray>Pokrok:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Shrnutí:</gray><white>{summary}</white>"
      - "<yellow>Klikněte pravým tlačítkem na požadavky na položku nebo měnu, abyste mohli postupovat v bance.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Podrobné kontroly</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Splněno]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Čeká]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nedostupné]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> je nyní připraveno.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Uložen postup pro <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Pro <white>{requirement}</white><gray> nebyly dostupné žádné odpovídající položky ani měna.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>nepodporuje ukládaný postup.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>je právě nedostupné.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Váš profilRDRnelze načíst, takže nelze uložit postup.</gray>"

storage_player_ui:
