      name: "<gradient:#38bdf8:#60a5fa>[Max] Memorie massime</gradient>"
      lore:
        - "<gray>Sostituisci memorie massime:</gray> <white>{override_max_storages}</white>"
        - "<gray>Memorie massime effettive:</gray> <white>{effective_max_storages}</white>"
        - "<yellow>Fai clic per modificare le memorie massime.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Sconto negozio</gradient>"
