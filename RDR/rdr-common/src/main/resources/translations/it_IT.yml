        - "<gray>Gruppi LuckPerms rilevati:</gray> <white>{group_count}</white>"
        - "<yellow>Fare clic con il pulsante sinistro del mouse per il gruppo successivo, fare clic con il pulsante destro del mouse per quello precedente.</yellow>"
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Memorie massime del gruppo</gradient>"
