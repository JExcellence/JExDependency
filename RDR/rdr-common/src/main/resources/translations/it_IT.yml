prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiche archiviazione</gradient>"
  items: "<gray>Articoli totali:</gray><white>{total_items}</white>"
  available_slots: "<gray>Slot disponibili:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Memorie ottenute:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Memorie massime:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Illimitato]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Hub di archiviazione</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>Riepilogo archiviazione [Vault]</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<gray>La tua rete del vault è persistente</gray>"
      - "<gray>e pronto per l'utilizzo su più server.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Illimitato]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Visualizza archivi</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<yellow>Fai clic per sfogliare l'elenco di archiviazione.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Negozio di archiviazione</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<yellow>Fai clic per acquistare un altro spazio di archiviazione.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Amministrazione dell'archiviazione</gradient>"
    lore:
      - "<gray>Apri i controlli di amministrazione privilegiati RDR.</gray>"
      - "<gray>Gestisci i fornitori di valuta e le impostazioni predefinite.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Controllo storage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Pannello di amministrazione RDR</gradient>"
    lore:
      - "<gray>Gestisci i sistemi di storage privilegiati da un'unica posizione.</gray>"
      - "<gray>Utilizzare questo pannello per modificare i valori di configurazione e aprire i controlli di integrazione.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Controlli giocatore</gradient>"
      lore:
        - "<gray>Modifica i limiti del giocatore/gruppo, gli sconti e i controlli della forza di stoccaggio.</gray>"
        - "<gray>Apri editor di override e azioni di gestione delle emergenze.</gray>"
        - "<yellow>Fai clic per aprire i controlli del lettore.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Configurazione archiviazione</gradient>"
      lore:
        - "<gray>Modifica i valori da</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Le impostazioni digitate si aprono in un editor di incudini di vetro colorato corrispondente.</gray>"
        - "<yellow>Fare clic per aprire i controlli di configurazione.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integrazioni plug-in</gradient>"
      lore:
        - "<gray>Gestisci competenze, lavoro, valuta e strumenti PlaceholderAPI.</gray>"
        - "<gray>Apri i controlli di amministrazione specifici dell'integrazione.</gray>"
        - "<yellow>Fare clic per aprire la gestione dell'integrazione.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Imposte] Banca del server commerciale</gradient>"
      lore:
        - "<gray>Rivedi i saldi delle imposte commerciali raccolti in base alla valuta.</gray>"
        - "<gray>Preleva i saldi della banca del server al tuo amministratore account.</gray>"
        - "<yellow>Fai clic per aprire i controlli della banca delle imposte commerciali.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gestore valuta</gradient>"
      lore:
        - "<gray>Esamina le valute rilevate da Vault e JExEconomy.</gray>"
        - "<gray>Crea la valuta</gray> <white>raindrops</white> <gray>predefinita quando necessario.</gray>"
        - "<yellow>Fare clic per aprire i controlli valutari.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Competenze] Requisiti delle competenze</gradient>"
      lore:
        - "<gray>Esamina i plug-in delle competenze supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti di competenza predefiniti a tutti i livelli di acquisto dello spazio di archiviazione.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti di competenza.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Lavoro] Requisiti del lavoro</gradient>"
      lore:
        - "<gray>Esaminare i plug-in del lavoro supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti di lavoro predefiniti a tutti i livelli di acquisto dello spazio di archiviazione.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti del lavoro.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Accesso amministratore richiesto</gradient>"
      lore:
        - "<gray>Non disponi dell'autorizzazione per utilizzare questo pannello di amministrazione.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Controlli giocatore e gruppo</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Toolkit di amministrazione archiviazione</gradient>"
    lore:
      - "<gray>Modifica gli archivi massimi e gli sconti per giocatori e gruppi.</gray>"
      - "<gray>Forza lo svuotamento/reimpostazione degli archivi o la chiusura di tutte le visualizzazioni RDR aperte.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Il giocatore sostituisce</gradient>"
      lore:
        - "<gray>Sfoglia i giocatori online e i target di sostituzione configurati.</gray>"
        - "<gray>Modifica lo spazio di archiviazione massimo per giocatore e i valori di sconto.</gray>"
        - "<yellow>Fai clic per aprire le sostituzioni del giocatore.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Sostituzioni gruppo</gradient>"
      lore:
        - "<gray>Selezionare un gruppo LuckPerms e impostare i valori di sostituzione.</gray>"
        - "<gray>Utile per livelli di rango basati su autorizzazioni.</gray>"
        - "<yellow>Fare clic per aprire le sostituzioni del gruppo.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Forza lo svuotamento della memoria</gradient>"
      lore:
        - "<gray>Cancella tutto il contenuto dell'elemento da una memoria selezionata.</gray>"
        - "<gray>Mantiene impostazioni attendibili, debito e valori dei tasti di scelta rapida.</gray>"
        - "<yellow>Fare clic per scegliere un archivio.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Forza il ripristino della memoria</gradient>"
      lore:
        - "<gray>Ripristina la memoria selezionata a uno stato pulito.</gray>"
        - "<gray>Cancella elementi, debito, accesso attendibile e tasti di scelta rapida.</gray>"
        - "<yellow>Fare clic per scegliere un archivio.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Forza la chiusura di tutte le visualizzazioni RDR</gradient>"
      lore:
        - "<gray>Chiude tutti i menu RDR attualmente aperti.</gray>"
        - "<gray>Utile dopo modifiche alla configurazione o azioni di emergenza.</gray>"
        - "<yellow>Fare clic per forzare la chiusura di tutte le visualizzazioni RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accesso amministratore richiesto</gradient>"
      lore:
        - "<gray>Non disponi dell'autorizzazione per utilizzare questo menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Non hai l'autorizzazione per utilizzare i controlli di amministrazione del giocatore/gruppo.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Chiusura forzata <bianco>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Seleziona target override giocatore</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Obiettivi override giocatore</gradient>"
    lore:
      - "<gray>Giocatori monitorati:</gray> <white>{tracked_players}</white>"
      - "<gray>Override configurate:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Fai clic su un giocatore qui sotto per modificare le sostituzioni.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Sostituisci memorie massime:</gray> <white>{override_max_storages}</white>"
      - "<gray>Memorie massime effettive:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Sostituisci sconto:</gray> <white>{override_discount}</white>"
      - "<gray>Sconto effettivo:</gray> <white>{effective_discount}</white>"
      - "<yellow>Fai clic per modificare questo profilo di sostituzione del giocatore.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[Online]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Offline]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Eredita]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Illimitato]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Nessun giocatore trovato</gradient>"
      lore:
        - "<gray>Non è stato trovato alcun giocatore online o sostituzione del giocatore memorizzato.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accesso amministratore richiesto</gradient>"
      lore:
        - "<gray>Non hai il permesso di sfogliare le sostituzioni del lettore.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Modifica {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Riepilogo override giocatore</gradient>"
