prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiche archiviazione</gradient>"
  items: "<gray>Articoli totali:</gray><white>{total_items}</white>"
  available_slots: "<gray>Slot disponibili:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Memorie ottenute:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Memorie massime:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Hub di archiviazione</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>Riepilogo archiviazione [Vault]</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<gray>La tua rete del vault è persistente</gray>"
      - "<gray>e pronto per l'utilizzo su più server.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Visualizza archivi</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<yellow>Fai clic per sfogliare l'elenco di archiviazione.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Negozio di archiviazione</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<yellow>Fai clic per acquistare un altro spazio di archiviazione.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Amministrazione dell'archiviazione</gradient>"
    lore:
      - "<gray>Apri i controlli di amministrazione privilegiati RDR.</gray>"
      - "<gray>Gestisci i fornitori di valuta e le impostazioni predefinite.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Controllo dell'archiviazione</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Pannello di amministrazione</gradient>"
    lore:
      - "<gray>Gestisci i sistemi di storage privilegiati da un'unica posizione.</gray>"
      - "<gray>Utilizza questo pannello per configurare il supporto valutario.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gestore valutario</gradient>"
      lore:
        - "<gray>Esamina le valute rilevate da Vault e JExEconomy.</gray>"
        - "<gray>Crea il valore predefinito</gray> <white>raindrops</white> <gray>valuta quando necessario.</gray>"
        - "<yellow>Fare clic per aprire i controlli valutari.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] È richiesto l'accesso amministrativo</gradient>"
      lore:
        - "<gray>Non hai l'autorizzazione per utilizzare questo pannello di amministrazione.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Gestore valutario</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Fornitori di valuta</gradient>"
    lore:
      - "<gray>Valute rilevate:</gray> <white>{currency_count}</white>"
      - "<gray>Vault disponibili:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy disponibile:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Utilizza il pulsante di cristallo per creare la valuta predefinita.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Fornitore:</gray> <white>{provider}</white>"
      - "<gray>Simbolo:</gray> <white>{symbol}</white>"
      - "<gray>Prefisso:</gray> <white>{prefix}</white>"
      - "<gray>Suffisso:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Creare {currency_id}</gradient>"
      lore:
        - "<gray>Crea la valuta RDR predefinita in JExEconomy.</gray>"
        - "<yellow>Fai clic per creare {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Obbligatorio</gradient>"
      lore:
        - "<gray>Non puoi creare una valuta predefinita senza JExEconomy.</gray>"
        - "<gray>Installa e abilita prima JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Pronto</gradient>"
      lore:
        - "<gray>La valuta predefinita esiste già.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Valuta predefinita creata:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Impossibile creare la valuta:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>La valuta esiste già:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Non puoi utilizzare questo pulsante a meno che JExEconomy non sia disponibile.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Nessuna valuta rilevata</gradient>"
      lore:
        - "<gray>Non è stata rilevata alcuna valuta Vault o JExEconomy.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] È richiesto l'accesso amministrativo</gradient>"
      lore:
        - "<gray>Non hai l'autorizzazione per utilizzare questa visualizzazione della valuta.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Non hai l'autorizzazione per gestire le valute.</gray>"
  decoration:
    border:
      name: " "

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Negozio di archiviazione</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Informazioni] Capacità di archiviazione</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<gray>Acquista spazio aggiuntivo nel caveau fino al</gray>"
      - "<gray>raggiungi il limite configurato.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisiti del negozio</gradient>"
    lore:
      - "<gray>Requisiti configurati:</gray><white>{requirement_count}</white>"
      - "<gray>Conteggio fabbisogno attuale:</gray><white>{requirements}</white>"
      - "<gray>Stato:</gray><white>{availability}</white>"
      - "<yellow>Fai clic per esaminare ogni livello di requisiti in dettaglio.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Nessuno]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Pronto]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In sospeso]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Acquista spazio di archiviazione</gradient>"
      lore:
        - "<gray>Requisiti configurati:</gray><white>{requirement_count}</white>"
        - "<gray>Requisiti attuali:</gray><white>{requirements}</white>"
        - "<gray>Archivi di proprietà:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Fai clic per acquistare quando tutti i requisiti sono soddisfatti.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Requisiti in sospeso</gradient>"
      lore:
        - "<gray>Requisiti configurati:</gray><white>{requirement_count}</white>"
        - "<gray>Requisiti attuali:</gray><white>{requirements}</white>"
        - "<gray>Archivi di proprietà:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Soddisfa i requisiti rimanenti prima dell'acquisto.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Limite di archiviazione raggiunto</gradient>"
      lore:
        - "<gray>Archivi di proprietà:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Non puoi acquistare ulteriori spazi di archiviazione</gray>"
        - "<gray>fino all'aumento del limite globale.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Requisiti offline</gradient>"
      lore:
        - "<gray>Uno o più requisiti del negozio configurati</gray>"
        - "<gray>non può essere risolto su questo server.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profilo mancante</gradient>"
      lore:
        - "<gray>Il tuo profiloRDRnon può essere caricato,</gray>"
        - "<gray>quindi gli acquisti sono temporaneamente bloccati.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Acquistato<white>{storage_key}</white><gray>. Fabbisogno consumato:</gray><white>{requirements}</white><gray>. Depositi di proprietà:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Al momento non incontri<white>{requirement}</white><gray>. Requisiti del negozio:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Il requisito del negozio<white>{requirement}</white><gray>non è disponibile o non è valido al momento.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Al momento non sono disponibili requisiti di negozio configurati per gli acquisti di spazio di archiviazione.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Hai raggiunto il limite di archiviazione di<white>{max_storages}</white><gray>. Depositi di proprietà:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Non è stato possibile caricare il tuo profiloRDR, quindi gli acquisti di spazio di archiviazione non sono disponibili.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Richiesta] Acquisto{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Informazioni] Requisito Browser</gradient>"
    lore:
      - "<gray>Livello di acquisto:</gray><white>{purchase_number}</white>"
      - "<gray>Sblocca spazio di archiviazione:</gray><white>{storage_number}</white>"
      - "<gray>Requisiti configurati:</gray><white>{requirement_count}</white>"
      - "<gray>Attualmente incontrato:</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratuito] Nessun requisito</gradient>"
    lore:
      - "<gray>Questo livello di acquisto non ha requisiti configurati.</gray>"
      - "<yellow>Puoi acquistare questo spazio di archiviazione senza controlli aggiuntivi.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Richiesta]{requirement_name}</gradient>"
    lore:
      - "<gray>Tasto:</gray><white>{requirement_key}</white>"
      - "<gray>Tipo:</gray><white>{requirement_type}</white>"
      - "<gray>Stato:</gray><white>{status}</white>"
      - "<gray>Avanzamento:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Riepilogo:</gray><white>{summary}</white>"
      - "<yellow>Fai clic con il pulsante destro del mouse sull'elemento o sui requisiti di valuta per procedere con l'operazione bancaria.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Controlli dettagliati</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Incontrato]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In sospeso]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Non disponibile]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>è ora pronto.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>Avanzamento memorizzato per<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Non erano disponibili articoli o valute corrispondenti per<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>non supporta i progressi accumulati.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>non è disponibile al momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Non è stato possibile caricare il tuo profiloRDR, quindi i progressi non possono essere salvati.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Vault] I tuoi archivi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Capacità di archiviazione</gradient>"
    lore:
      - "<gray>Archivi di proprietà:</gray><white>{owned_storages}</white>"
      - "<gray>Memorie massime:</gray><white>{max_storages}</white>"
      - "<gray>Utilizza questo elenco per rivedere il tuo</gray>"
      - "<gray>contenitori di archiviazione persistenti.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Casella]{storage_key}</gradient>"
    lore:
      - "<gray>Chiave di archiviazione:</gray><white>{storage_key}</white>"
      - "<gray>Proprietario:</gray><white>{owner_name}</white>"
      - "<gray>Accesso:</gray><white>{access_level}</white>"
      - "<gray>Tasto di scelta rapida:</gray><white>{hotkey_display}</white>"
      - "<gray>Slot utilizzati:</gray><white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Slot disponibili:</gray><white>{available_slots}</white>"
      - "<yellow>Questo spazio di archiviazione è pronto per la persistenza dell'elemento.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Fare clic con il pulsante sinistro del mouse per aprire questo archivio.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Fare clic con il pulsante destro del mouse per aprire le impostazioni di archiviazione.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Proprietario]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Pubblico]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associato]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Affidabile]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Nessun archivio trovato</gradient>"
    lore:
      - "<gray>Nessun archivio attualmente collegato</gray>"
      - "<gray>al tuo profiloRDR.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Profilo mancante</gradient>"
    lore:
      - "<gray>Il tuo profilo giocatoreRDRnon può</gray>"
      - "<gray>essere caricato dall'archivio persistente.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#]{storage_key}Impostazioni</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Impostazioni di archiviazione</gradient>"
    lore:
      - "<gray>Chiave di archiviazione:</gray><white>{storage_key}</white>"
      - "<gray>Proprietario:</gray><white>{owner_name}</white>"
      - "<gray>Il tuo accesso:</gray><white>{access_level}</white>"
      - "<gray>Tasto di scelta rapida:</gray><white>{hotkey_display}</white>"
      - "<gray>Associati:</gray><white>{associate_count}</white>"
      - "<gray>Affidabile:</gray><white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Proprietario]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Pubblico]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associato]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Affidabile]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Gruppo] Accesso attendibile</gradient>"
    lore:
      - "<gray>Associati:</gray><white>{associate_count}</white>"
      - "<gray>Affidabile:</gray><white>{trusted_count}</white>"
      - "<yellow>Fai clic per gestire chi può depositare</yellow>"
      - "<yellow>o accedi completamente a questo spazio di archiviazione.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Tasto di scelta rapida archiviazione</gradient>"
    lore:
      - "<gray>Tasto di scelta rapida corrente:</gray><white>{hotkey_display}</white>"
      - "<yellow>Fai clic per associare l'accesso rapido per</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Attendibile bloccato</gradient>"
    lore:
      - "<gray>Solo il proprietario dello spazio di archiviazione può gestire</gray>"
      - "<gray>accesso attendibile per questo archivio.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Tasto di scelta rapida bloccato</gradient>"
    lore:
      - "<gray>Solo il proprietario dello spazio di archiviazione può cambiare</gray>"
      - "<gray>tasti di scelta rapida di archiviazione.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Libero] Impostazioni bloccate</gradient>"
    lore:
      - "<gray>Le modifiche alle impostazioni di archiviazione sono disabilitate</gray>"
      - "<gray>in<white>RDRGratuito</white><gray>.</gray>"
      - "<yellow>Aggiorna a Premium per modificare le impostazioni.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Memoria mancante</gradient>"
    lore:
      - "<gray>Impossibile caricare questo spazio di archiviazione</gray>"
      - "<gray>per la visualizzazione delle impostazioni.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Gruppo]{storage_key}Accesso</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni] Accesso condiviso</gradient>"
    lore:
      - "<gray>Chiave di archiviazione:</gray><white>{storage_key}</white>"
      - "<gray>Proprietario:</gray><white>{owner_name}</white>"
      - "<gray>Associati:</gray><white>{associate_count}</white>"
      - "<gray>Affidabile:</gray><white>{trusted_count}</white>"
      - "<yellow>Fai clic su un giocatore per accedere ciclicamente.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Pubblico]{player}</gradient>"
      lore:
        - "<gray>Stato:</gray><white>Pubblico</white>"
        - "<gray>Nessun deposito o ritiro dell'accesso.</gray>"
        - "<yellow>Fai clic per promuovere ad Associato.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associato]{player}</gradient>"
      lore:
        - "<gray>Stato:</gray><white>Associato</white>"
        - "<gray>Può depositare ma non può prelevare.</gray>"
        - "<yellow>Fai clic per promuovere a Trusted.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Affidabile]{player}</gradient>"
      lore:
        - "<gray>Stato:</gray><white>Affidabile</white>"
        - "<gray>Può depositare e prelevare oggetti.</gray>"
        - "<yellow>Fai clic per reimpostare su Pubblico.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Pubblico]</gradient><gray>{player}non ha più accesso allo spazio di archiviazione.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associato]</gradient><gray>{player}ora può depositare in questo archivio.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient><gray>{player}ora può depositare e prelevare da questo archivio.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Solo il proprietario dell'archivio può modificare l'accesso attendibile.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Solo proprietario</gradient>"
      lore:
        - "<gray>Puoi visualizzare questo spazio di archiviazione, ma solo</gray>"
        - "<gray>il proprietario può modificare l'accesso attendibile.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Memoria mancante</gradient>"
      lore:
        - "<gray>Impossibile caricare questo spazio di archiviazione</gray>"
        - "<gray>per la gestione degli accessi attendibili.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Impossibile caricare questo archivio per la gestione degli accessi attendibili.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Libero] Impostazioni bloccate</gradient>"
      lore:
        - "<gray>Le modifiche all'accesso attendibile sono disabilitate</gray>"
        - "<gray>in<white>RDRGratuito</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Nessun giocatore trovato</gradient>"
      lore:
        - "<gray>Non sono disponibili altri giocatori conosciuti</gray>"
        - "<gray>per assegnare l'accesso attendibile.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Casella]{storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Memoria mancante</gradient>"
    lore:
      - "<gray>Impossibile trovare questa voce di archiviazione</gray>"
      - "<gray>per il tuo profiloRDRpersistente.</gray>"

storage_hotkey_anvil_ui:
