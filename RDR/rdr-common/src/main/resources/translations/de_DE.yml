        - "<gray>Eine oder mehrere konfigurierte Store-Anforderungen</gray>"
        - "<gray>kann auf diesem Server nicht aufgelöst werden.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profil fehlt</gradient>"
      lore:
        - "<gray>IhrRDRProfil konnte nicht geladen werden,</gray>"
        - "<gray>Käufe werden daher vorübergehend blockiert.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Gekauft<white>{storage_key}</white><gray>. Verbrauchte Anforderungen:</gray><white>{requirements}</white><gray>. Eigene Speicher:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Sie erfüllen derzeit nicht<white>{requirement}</white><gray>. Store-Anforderungen:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Die Store-Anforderung<white>{requirement}</white><gray>ist derzeit nicht verfügbar oder ungültig.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Für Speicherkäufe sind derzeit keine konfigurierten Store-Anforderungen verfügbar.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Sie haben das Speicherlimit von<white>{max_storages}</white><gray>erreicht. Eigene Speicher:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>IhrRDR-Profil konnte nicht geladen werden, daher sind keine Speicherkäufe verfügbar.</gray>"

