  lore:
    - "<gray>Aktuelle Seite:</gray> <white>%current_page%</white>"
    - "<gray>Seiten insgesamt:</gray> <white>%total_pages%</white>"
  fallback: "<gradient:#6b7280:#9ca3af>[Page] %page%</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>[<-] Zurück</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicken Sie zurück</gradient>"
