      - "<gray>Sie erreichen die konfigurierte Obergrenze.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Store-Anforderungen</gradient>"
    lore:
      - "<gray>Konfigurierte Anforderungen:</gray><white>{requirement_count}</white>"
      - "<gray>Aktuelle Anforderungsanzahl:</gray><white>{requirements}</white>"
      - "<gray>Status:</gray><white>{availability}</white>"
      - "<yellow>Klicken Sie, um jede Anforderungsstufe im Detail zu überprüfen.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Keine]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Bereit]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Ausstehend]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Speicher kaufen</gradient>"
      lore:
        - "<gray>Konfigurierte Anforderungen:</gray><white>{requirement_count}</white>"
        - "<gray>Aktuelle Anforderungen:</gray><white>{requirements}</white>"
        - "<gray>Eigene Speicher:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klicken Sie zum Kaufen, wenn alle Anforderungen erfüllt sind.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Anforderungen ausstehend</gradient>"
      lore:
        - "<gray>Konfigurierte Anforderungen:</gray><white>{requirement_count}</white>"
        - "<gray>Aktuelle Anforderungen:</gray><white>{requirements}</white>"
        - "<gray>Eigene Speicher:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Erfüllen Sie vor dem Kauf die restlichen Anforderungen.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Speicherlimit erreicht</gradient>"
      lore:
        - "<gray>Eigene Speicher:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Sie können keinen weiteren Speicher kaufen</gray>"
        - "<gray>bis die globale Obergrenze angehoben wird.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Anforderungen Offline</gradient>"
