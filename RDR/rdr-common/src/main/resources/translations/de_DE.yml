prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Speicherstatistiken</gradient>"
  items: "<gray>Gesamtposten:</gray><white>{total_items}</white>"
  available_slots: "<gray>Verfügbare Slots:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Erhaltene Speicher:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Max. Speicher:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Speicher-Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Speicherzusammenfassung</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<gray>Ihr Tresornetzwerk ist persistent</gray>"
      - "<gray>und bereit für den serverübergreifenden Einsatz.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Speicher anzeigen</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<yellow>Klicken Sie hier, um Ihre Speicherliste zu durchsuchen.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Speicherspeicher</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<yellow>Klicken Sie hier, um einen weiteren Speicher zu erwerben.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Speicheradministrator</gradient>"
    lore:
      - "<gray>Öffnen Sie privilegierte RDR-Administratorsteuerelemente.</gray>"
      - "<gray>Verwalten Sie Währungsanbieter und -standards.</gray>"
      - "<yellow>Erfordert:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Speicherkontrolle</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin-Panel</gradient>"
    lore:
      - "<gray>Verwalten Sie privilegierte Speichersysteme von einem Ort aus.</gray>"
      - "<gray>Nutze dieses Panel, um Konfigurationswerte und Waehrungsunterstuetzung zu bearbeiten.</gray>"
      - "<yellow>Erfordert:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Speicher-Konfiguration</gradient>"
      lore:
        - "<gray>Werte bearbeiten aus</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Jede editierbare Einstellung kann über eine Amboss-Eingabeaufforderung geändert werden.</gray>"
        - "<yellow>Klicken, um Konfigurationskontrollen zu öffnen.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Währungsmanager</gradient>"
      lore:
        - "<gray>Überprüfen Sie die erkannten Währungen von Vault und JExEconomy.</gray>"
        - "<gray>Erstellen Sie die Standardeinstellung</gray> <white>raindrops</white> <gray>Währung bei Bedarf.</gray>"
        - "<yellow>Klicken Sie hier, um die Währungskontrolle zu öffnen.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Administratorzugriff erforderlich</gradient>"
      lore:
        - "<gray>Sie haben keine Berechtigung, dieses Admin-Panel zu verwenden.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Währungsmanager</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Währungsanbieter</gradient>"
    lore:
      - "<gray>Erkannte Währungen:</gray> <white>{currency_count}</white>"
      - "<gray>Vault verfügbar:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy verfügbar:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Verwenden Sie die Kristallschaltfläche, um die Standardwährung zu erstellen.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Anbieter:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Präfix:</gray> <white>{prefix}</white>"
      - "<gray>Suffix:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Erstellen {currency_id}</gradient>"
      lore:
        - "<gray>Erstellen Sie die Standardwährung RDR in JExEconomy.</gray>"
        - "<yellow>Klicken Sie, um {currency_id} zu erstellen.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Erforderlich</gradient>"
      lore:
        - "<gray>Ohne JExEconomy können Sie keine Standardwährung erstellen.</gray>"
        - "<gray>Installieren und aktivieren Sie zuerst JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Bereit</gradient>"
      lore:
        - "<gray>Die Standardwährung existiert bereits.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Standardwährung erstellt:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Währung konnte nicht erstellt werden:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Währung existiert bereits:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie können diese Schaltfläche nur verwenden, wenn JExEconomy verfügbar ist.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Keine Währungen erkannt</gradient>"
      lore:
        - "<gray>Es wurden keine Vault- oder JExEconomy-Währungen erkannt.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Administratorzugriff erforderlich</gradient>"
      lore:
        - "<gray>Sie sind nicht berechtigt, diese Währungsansicht zu verwenden.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben keine Berechtigung zum Verwalten von Währungen.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Speicher-Konfiguration</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Konfigurationseinstellungen</white>"
    lore:
      - "<gray>Bearbeitbare Einstellungen erkannt:</gray> <white>{setting_count}</white>"
      - "<gray>Klicken Sie auf einen beliebigen Eintrag unten, um seinen Wert in einem zu bearbeiten Amboss.</gray>"
      - "<yellow>Änderungen werden direkt geschrieben config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Pfad:</gray> <white>{config_path}</white>"
      - "<gray>Typ:</gray> <white>{value_type}</white>"
      - "<gray>Aktueller Wert:</gray> <white>{current_value}</white>"
      - "<yellow>Klicken Sie, um diese Einstellung zu bearbeiten.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Integer]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Long]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Double]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Liste]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[String]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Keine bearbeitbaren Einstellungen</white>"
      lore:
        - "<gray>Es wurden keine bearbeitbaren Skalar-/Listenkonfigurationseinstellungen gefunden.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratorzugriff erforderlich</white>"
      lore:
        - "<gray>Sie haben keine Berechtigung, diese Konfigurationsansicht zu verwenden.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Config-Bearbeitung gesperrt</white>"
      lore:
        - "<gray>Diese Edition erlaubt keine Änderungen an der Laufzeitkonfiguration.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben keine Berechtigung, Konfigurationseinstellungen zu bearbeiten.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Die Konfigurationsbearbeitung ist in dieser Edition gesperrt.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Aktualisiert <white>{config_path}</white><gray> bis <white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Bearbeiten {config_path}"
  input:
    lore:
      - "<gray>Pfad:</gray> <white>{config_path}</white>"
      - "<gray>Typ:</gray> <white>{value_type}</white>"
      - "<gray>Aktueller Wert:</gray> <white>{current_value}</white>"
      - "<yellow>Geben Sie den neuen Wert ein und bestätigen Sie.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Ungültige Eingabe für Typ <white>{value_type}</white><gray>. Eingabe:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Speicherspeicher</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Speicherkapazität</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
