      - "<yellow>Klicken Sie auf den Ergebnis-Slot, um den Hotkey zu speichern.</yellow>"
  error:
    invalid_hotkey: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Verwenden Sie eine Nummer zwischen <white>1</white> und <white>{max_hotkeys}</white><gray>. Eingabe:</gray> <white>{input}</white>"

storage:
  message:
    locked: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>{storage_key} ist bereits in einer anderen Sitzung geöffnet.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} konnte nicht sofort geöffnet werden.</gray>"
    access_denied: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben keinen Zugang zu <white>{storage_key}</white><gray>.</gray>"
    blacklisted_item: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{item}</white><gray> ist global schwarzlistet aus RDR Lagerung.</gray>"
    lease_lost: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Ihre Bearbeitungssitzung für {storage_key} abgelaufen oder anderweitig bewegt. Änderungen wurden nicht gerettet.</gray>"
    save_failed: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} konnte nicht gerettet werden. Überprüfen Sie die Konsole für Details.</gray>"
    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient> <gray>{storage_key} ist nun gebunden <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_missing: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Keine Speicherung ist an <white>/rr {hotkey}</white><gray>.</gray>"
    hotkey_invalid: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Hotkeys müssen zwischen <white>1</white> und <white>{max_hotkeys}</white><gray>.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Die Einstellungen für die Speichereinstellung sind deaktiviert <white>RDR Free</white><gray>.</gray>"
    scoreboard_enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Ermöglicht die <white>/rr scoreboard</white><gray> Seitenleiste.</gray>"
    scoreboard_disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktiviert die <white>/rr scoreboard</white><gray> Seitenleiste.</gray>"
    scoreboard_syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Verwendung:</gray> <white>/rr scoreboard</white>"

page:
