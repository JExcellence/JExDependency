prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Speicherstatistiken</gradient>"
  items: "<gray>Gesamtposten:</gray><white>{total_items}</white>"
  available_slots: "<gray>Verfügbare Slots:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Erhaltene Speicher:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Max. Speicher:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Unbegrenzt]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Speicher-Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Speicherzusammenfassung</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<gray>Ihr Tresornetzwerk ist persistent</gray>"
      - "<gray>und bereit für den serverübergreifenden Einsatz.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Unbegrenzt]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Speicher anzeigen</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<yellow>Klicken Sie hier, um Ihre Speicherliste zu durchsuchen.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Speicherspeicher</gradient>"
    lore:
      - "<gray>Eigene Speicher:</gray><white>{owned_storages}</white>"
      - "<gray>Maximale Speicherkapazität:</gray><white>{max_storages}</white>"
      - "<yellow>Klicken Sie hier, um einen weiteren Speicher zu erwerben.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Speicheradministrator</gradient>"
    lore:
      - "<gray>Öffnen Sie privilegierte RDR-Administratorsteuerelemente.</gray>"
      - "<gray>Verwalten Sie Währungsanbieter und -standards.</gray>"
      - "<yellow>Erfordert:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Speicherkontrolle</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR-Admin-Panel</gradient>"
    lore:
      - "<gray>Verwalten Sie privilegierte Speichersysteme von einem Ort aus.</gray>"
      - "<gray>Verwenden Sie dieses Bedienfeld, um Konfigurationswerte zu bearbeiten und Integrationssteuerelemente zu öffnen.</gray>"
      - "<yellow>Erfordert:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Spielerkontrollen</gradient>"
      lore:
        - "<gray>Bearbeiten Sie Spieler-/Gruppenlimits, Rabatte und Lagerkräftekontrollen.</gray>"
        - "<gray>Öffnen Sie Override-Editoren und Notfallverwaltungsaktionen.</gray>"
        - "<yellow>Klicken Sie hier, um die Player-Steuerung zu öffnen.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Speicherkonfiguration</gradient>"
      lore:
        - "<gray>Werte bearbeiten von</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Eingegebene Einstellungen werden in einem passenden Buntglas-Amboss-Editor geöffnet.</gray>"
        - "<yellow>Klicken Sie hier, um die Konfigurationssteuerelemente zu öffnen.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-Integrationen</gradient>"
      lore:
        - "<gray>Verwalten Sie Fähigkeiten, Jobs, Währungen und PlaceholderAPI-Tools.</gray>"
        - "<gray>Öffnen Sie Integrationsspezifische Admin-Steuerelemente.</gray>"
        - "<yellow>Klicken Sie hier, um die Integrationsverwaltung zu öffnen.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Überprüfen Sie die gesammelten Gewerbesteuerguthaben nach Währung.</gray>"
        - "<gray>Überweisen Sie Serverbankguthaben an Ihren Administrator Konto.</gray>"
        - "<yellow>Klicken Sie hier, um die Steuerelemente der Gewerbesteuerbank zu öffnen.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Währungsmanager</gradient>"
      lore:
        - "<gray>Überprüfen Sie erkannte Währungen aus Vault und JExEconomy.</gray>"
        - "<gray>Erstellen Sie die Standardeinstellung</gray> <white>raindrops</white> <gray>Währung bei Bedarf.</gray>"
        - "<yellow>Klicken Sie hier, um die Währungskontrolle zu öffnen.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Fertigkeit] Fertigkeitsanforderungen</gradient>"
      lore:
        - "<gray>Überprüfen Sie die unterstützten Skill-Plugins und den Erkennungsstatus.</gray>"
        - "<gray>Wenden Sie Standardkompetenzanforderungen auf alle Speicherkaufstufen an.</gray>"
        - "<yellow>Klicken Sie hier, um die Steuerelemente für die Qualifikationsanforderungen zu öffnen.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Jobanforderungen</gradient>"
      lore:
        - "<gray>Überprüfen Sie die unterstützten Job-Plugins und den Erkennungsstatus.</gray>"
        - "<gray>Wenden Sie Standardjobanforderungen auf alle Speicherkaufebenen an.</gray>"
        - "<yellow>Klicken Sie hier, um die Jobanforderungskontrollen zu öffnen.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Administratorzugriff erforderlich</gradient>"
      lore:
        - "<gray>Sie haben keine Berechtigung, dieses Admin-Panel zu verwenden.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Spieler- und Gruppensteuerung</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Storage Admin Toolkit</gradient>"
    lore:
      - "<gray>Bearbeiten Sie maximale Speicher und Rabatte für Spieler und Gruppen.</gray>"
      - "<gray>Erzwingen Sie das Entleeren/Zurücksetzen von Speicher oder das Schließen aller geöffneten RDR-Ansichten.</gray>"
      - "<yellow>Erfordert:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Spielerüberschreibungen</gradient>"
      lore:
        - "<gray>Durchsuchen Sie Online-Spieler und konfigurierte Überschreibungsziele.</gray>"
        - "<gray>Bearbeiten Sie die maximalen Speicherkapazitäten und Rabattwerte pro Spieler.</gray>"
        - "<yellow>Klicken Sie hier, um Spielerüberschreibungen zu öffnen.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Gruppenüberschreibungen</gradient>"
      lore:
        - "<gray>Wählen Sie eine LuckPerms-Gruppe aus und legen Sie Überschreibungswerte fest.</gray>"
        - "<gray>Nützlich für berechtigungsbasierte Rangstufen.</gray>"
        - "<yellow>Klicken Sie hier, um Gruppenüberschreibungen zu öffnen.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Speicher entleeren erzwingen</gradient>"
      lore:
        - "<gray>Löscht alle Artikelinhalte aus einem ausgewählten Speicher.</gray>"
        - "<gray>Behält vertrauenswürdige Einstellungen, Schulden und Hotkey-Werte bei.</gray>"
        - "<yellow>Klicken Sie hier, um einen Speicher auszuwählen.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Zurücksetzen des Speichers erzwingen</gradient>"
      lore:
        - "<gray>Setzt einen ausgewählten Speicher in einen sauberen Zustand zurück.</gray>"
        - "<gray>Löscht Elemente, Schulden, vertrauenswürdigen Zugriff und Hotkey.</gray>"
        - "<yellow>Klicken Sie hier, um einen Speicher auszuwählen.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Schließen aller RDR-Ansichten erzwingen</gradient>"
      lore:
        - "<gray>Schließt alle derzeit geöffneten RDR-Menüs.</gray>"
        - "<gray>Nützlich nach Konfigurationsänderungen oder Notfallmaßnahmen.</gray>"
        - "<yellow>Klicken Sie hier, um das Schließen aller RDR-Ansichten zu erzwingen.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Administratorzugriff erforderlich</gradient>"
      lore:
        - "<gray>Sie haben keine Berechtigung, dieses Menü zu verwenden.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben keine Berechtigung, die Spieler-/Gruppenadministratorsteuerung zu verwenden.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Zwangsgeschlossen <white>{closed_views}</white> open RDR view(s).</gray>"

