      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Bắt buộc</gradient>"
      lore:
        - "<gray>Bạn không thể tạo loại tiền mặc định mà không có JExEconomy.</gray>"
        - "<gray>Trước tiên hãy cài đặt và kích hoạt JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Sẵn sàng</gradient>"
      lore:
        - "<gray>Đơn vị tiền tệ mặc định đã tồn tại.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Đã tạo loại tiền tệ mặc định:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Không thể tạo tiền tệ:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Tiền tệ đã tồn tại:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn không thể sử dụng nút này trừ khi có JExEconomy.</gray>"
