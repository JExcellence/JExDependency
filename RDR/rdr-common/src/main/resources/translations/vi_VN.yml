prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Thống kê lưu trữ</gradient>"
  items: "<gray>Tổng số mặt hàng:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Khe cắm có sẵn:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Kho thu được:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Trung tâm lưu trữ</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Tóm tắt bộ nhớ</gradient>"
    lore:
      - "<gray>Kho sở hữu:</gray> <white>{owned_storages}</white>"
      - "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"
      - "<gray>Mạng vault của bạn vẫn tồn tại</gray>"
      - "<gray>và sẵn sàng để sử dụng trên nhiều máy chủ.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Xem kho lưu trữ</gradient>"
    lore:
      - "<gray>Kho sở hữu:</gray> <white>{owned_storages}</white>"
      - "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"
      - "<yellow>Bấm để duyệt danh sách lưu trữ của bạn.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Cửa hàng lưu trữ</gradient>"
    lore:
      - "<gray>Kho sở hữu:</gray> <white>{owned_storages}</white>"
      - "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"
      - "<yellow>Nhấp để mua bộ nhớ khác.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Cửa hàng lưu trữ</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Thông tin] Dung lượng lưu trữ</gradient>"
    lore:
      - "<gray>Kho sở hữu:</gray> <white>{owned_storages}</white>"
      - "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"
      - "<gray>Mua thêm không gian kho tiền cho đến khi</gray>"
      - "<gray>bạn đạt đến giới hạn được định cấu hình.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Yêu cầu] Yêu cầu về cửa hàng</gradient>"
    lore:
      - "<gray>Yêu cầu cấu hình:</gray> <white>{requirement_count}</white>"
      - "<gray>Số lượng yêu cầu hiện tại:</gray> <white>{requirements}</white>"
      - "<gray>Trạng thái:</gray> <white>{availability}</white>"
      - "<yellow>Nhấp để kiểm tra chi tiết từng cấp yêu cầu.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Không có]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Sẵn sàng]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Chưa giải quyết]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ngoại tuyến]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Mua dung lượng</gradient>"
      lore:
        - "<gray>Yêu cầu cấu hình:</gray> <white>{requirement_count}</white>"
        - "<gray>Yêu cầu hiện tại:</gray> <white>{requirements}</white>"
        - "<gray>Kho sở hữu:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Bấm để mua khi mọi yêu cầu được đáp ứng.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Yêu cầu đang chờ xử lý</gradient>"
      lore:
        - "<gray>Yêu cầu cấu hình:</gray> <white>{requirement_count}</white>"
        - "<gray>Yêu cầu hiện tại:</gray> <white>{requirements}</white>"
        - "<gray>Kho sở hữu:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Đáp ứng các yêu cầu còn lại trước khi mua.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Đã đạt đến giới hạn dung lượng</gradient>"
      lore:
        - "<gray>Kho sở hữu:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<gray>Bạn không thể mua thêm dung lượng</gray>"
        - "<gray>cho đến khi giới hạn toàn cầu được nâng lên.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Yêu cầu ngoại tuyến</gradient>"
      lore:
        - "<gray>Một hoặc nhiều yêu cầu về cửa hàng đã được định cấu hình</gray>"
        - "<gray>không thể được giải quyết trên máy chủ này.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Thiếu hồ sơ</gradient>"
      lore:
        - "<gray>Của bạn RDR không thể tải hồ sơ,</gray>"
        - "<gray>vì vậy việc mua hàng tạm thời bị chặn.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Đã mua <white>{storage_key}</white><gray>. Yêu cầu tiêu thụ:</gray> <white>{requirements}</white><gray>. Kho sở hữu:</gray> <white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Hiện tại bạn không gặp <white>{requirement}</white><gray>. Yêu cầu của cửa hàng:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Yêu cầu cửa hàng <white>{requirement}</white><gray> hiện không có sẵn hoặc không hợp lệ.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Hiện không có yêu cầu nào về cửa hàng đã được định cấu hình để mua dung lượng lưu trữ.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn đã đạt đến giới hạn lưu trữ là <white>{max_storages}</white><gray>. Kho sở hữu:</gray> <white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Của bạn RDR không thể tải hồ sơ nên không thể mua dung lượng lưu trữ.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Yêu cầu] Mua hàng {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Thông tin] Trình duyệt yêu cầu</gradient>"
    lore:
      - "<gray>Cấp mua hàng:</gray> <white>{purchase_number}</white>"
      - "<gray>Mở khóa lưu trữ:</gray> <white>{storage_number}</white>"
      - "<gray>Yêu cầu cấu hình:</gray> <white>{requirement_count}</white>"
      - "<gray>Hiện đã đáp ứng:</gray> <white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Miễn phí] Không yêu cầu</gradient>"
    lore:
      - "<gray>Cấp mua hàng này không có yêu cầu cấu hình.</gray>"
      - "<yellow>Bạn có thể mua bộ nhớ này mà không cần kiểm tra thêm.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Yêu cầu] {requirement_name}</gradient>"
    lore:
      - "<gray>Chìa khóa:</gray> <white>{requirement_key}</white>"
      - "<gray>Kiểu:</gray> <white>{requirement_type}</white>"
      - "<gray>Trạng thái:</gray> <white>{status}</white>"
      - "<gray>Tiến triển:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Bản tóm tắt:</gray> <white>{summary}</white>"
      - "<yellow>Nhấp chuột phải vào mục hoặc yêu cầu tiền tệ để tiến hành ngân hàng.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Kiểm tra chi tiết</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Đã gặp]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Chưa giải quyết]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Không có sẵn]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> bây giờ đã sẵn sàng.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Tiến trình được lưu trữ cho <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Không có mặt hàng hoặc đơn vị tiền tệ phù hợp nào có sẵn cho <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> không hỗ trợ tiến độ ngân hàng.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> hiện không có sẵn.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Của bạn RDR không thể tải hồ sơ nên không thể lưu tiến trình.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Vault] Kho lưu trữ của bạn</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Thông tin] Dung lượng lưu trữ</gradient>"
    lore:
      - "<gray>Kho sở hữu:</gray> <white>{owned_storages}</white>"
      - "<gray>Dung lượng lưu trữ tối đa:</gray> <white>{max_storages}</white>"
      - "<gray>Sử dụng danh sách này để xem xét</gray>"
      - "<gray>container lưu trữ bền vững.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Hộp] {storage_key}</gradient>"
    lore:
      - "<gray>Khóa lưu trữ:</gray> <white>{storage_key}</white>"
      - "<gray>Người sở hữu:</gray> <white>{owner_name}</white>"
      - "<gray>Truy cập:</gray> <white>{access_level}</white>"
      - "<gray>Phím nóng:</gray> <white>{hotkey_display}</white>"
      - "<gray>Khe cắm đã qua sử dụng:</gray> <white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Khe cắm có sẵn:</gray> <white>{available_slots}</white>"
      - "<yellow>Bộ lưu trữ này đã sẵn sàng cho sự tồn tại của vật phẩm.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Nhấp chuột trái để mở kho lưu trữ này.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Nhấp chuột phải để mở cài đặt lưu trữ.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Người sở hữu]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Công cộng]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Kết hợp]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Đáng tin cậy]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Không tìm thấy kho lưu trữ nào</gradient>"
    lore:
      - "<gray>Hiện tại không có kho lưu trữ nào được đính kèm</gray>"
      - "<gray>đến của bạn RDR hồ sơ.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Thiếu hồ sơ</gradient>"
    lore:
      - "<gray>Của bạn RDR hồ sơ người chơi không thể</gray>"
      - "<gray>được tải từ bộ lưu trữ liên tục.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#] {storage_key} Cài đặt</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Thông tin] Cài đặt bộ nhớ</gradient>"
    lore:
      - "<gray>Khóa lưu trữ:</gray> <white>{storage_key}</white>"
      - "<gray>Người sở hữu:</gray> <white>{owner_name}</white>"
      - "<gray>Quyền truy cập của bạn:</gray> <white>{access_level}</white>"
      - "<gray>Phím nóng:</gray> <white>{hotkey_display}</white>"
      - "<gray>Cộng sự:</gray> <white>{associate_count}</white>"
      - "<gray>đáng tin cậy:</gray> <white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Người sở hữu]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Công cộng]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Kết hợp]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Đáng tin cậy]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Nhóm] Truy cập đáng tin cậy</gradient>"
    lore:
      - "<gray>Cộng sự:</gray> <white>{associate_count}</white>"
      - "<gray>đáng tin cậy:</gray> <white>{trusted_count}</white>"
      - "<yellow>Nhấp để quản lý ai có thể gửi tiền</yellow>"
      - "<yellow>hoặc truy cập đầy đủ vào bộ lưu trữ này.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Phím nóng lưu trữ</gradient>"
    lore:
      - "<gray>Phím nóng hiện tại:</gray> <white>{hotkey_display}</white>"
      - "<yellow>Nhấn vào đây để liên kết truy cập nhanh cho</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Đã khóa đáng tin cậy</gradient>"
    lore:
      - "<gray>Chỉ chủ sở hữu bộ nhớ mới có thể quản lý</gray>"
      - "<gray>quyền truy cập đáng tin cậy cho bộ lưu trữ này.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Đã khóa phím nóng</gradient>"
    lore:
      - "<gray>Chỉ chủ sở hữu bộ nhớ mới có thể thay đổi</gray>"
      - "<gray>phím nóng lưu trữ.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Miễn phí] Đã khóa cài đặt</gradient>"
    lore:
      - "<gray>Thay đổi cài đặt bộ nhớ bị tắt</gray>"
      - "<gray>TRONG <white>RDR Free</white><gray>.</gray>"
      - "<yellow>Nâng cấp lên Premium để chỉnh sửa cài đặt.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Thiếu bộ nhớ</gradient>"
    lore:
      - "<gray>Không thể tải bộ nhớ này</gray>"
      - "<gray>cho chế độ xem cài đặt.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Nhóm] {storage_key} Truy cập</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Thông tin] Quyền truy cập được chia sẻ</gradient>"
    lore:
      - "<gray>Khóa lưu trữ:</gray> <white>{storage_key}</white>"
      - "<gray>Người sở hữu:</gray> <white>{owner_name}</white>"
      - "<gray>Cộng sự:</gray> <white>{associate_count}</white>"
      - "<gray>đáng tin cậy:</gray> <white>{trusted_count}</white>"
      - "<yellow>Nhấp vào một người chơi để truy cập theo chu kỳ.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Công cộng] {player}</gradient>"
      lore:
        - "<gray>Trạng thái:</gray> <white>Công cộng</white>"
        - "<gray>Không có quyền gửi tiền hoặc rút tiền.</gray>"
        - "<yellow>Nhấp để thăng cấp lên Cộng tác viên.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Kết hợp] {player}</gradient>"
      lore:
        - "<gray>Trạng thái:</gray> <white>Kết hợp</white>"
        - "<gray>Có thể gửi tiền nhưng không thể rút tiền.</gray>"
        - "<yellow>Nhấp để quảng bá lên Tin cậy.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Đáng tin cậy] {player}</gradient>"
      lore:
        - "<gray>Trạng thái:</gray> <white>đáng tin cậy</white>"
        - "<gray>Có thể gửi và rút các mặt hàng.</gray>"
        - "<yellow>Nhấp để đặt lại về Công khai.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Công cộng]</gradient> <gray>{player} không còn quyền truy cập vào bộ nhớ.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Kết hợp]</gradient> <gray>{player} bây giờ có thể gửi vào kho lưu trữ này.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Đáng tin cậy]</gradient> <gray>{player} bây giờ có thể gửi và rút tiền từ kho lưu trữ này.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Chỉ chủ sở hữu bộ nhớ mới có thể thay đổi quyền truy cập đáng tin cậy.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Chỉ dành cho chủ sở hữu</gradient>"
      lore:
        - "<gray>Bạn có thể xem bộ nhớ này, nhưng chỉ</gray>"
        - "<gray>chủ sở hữu có thể thay đổi quyền truy cập đáng tin cậy.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Thiếu bộ nhớ</gradient>"
      lore:
        - "<gray>Không thể tải bộ nhớ này</gray>"
        - "<gray>để quản lý truy cập đáng tin cậy.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Không thể tải bộ lưu trữ này để quản lý quyền truy cập đáng tin cậy.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Miễn phí] Đã khóa cài đặt</gradient>"
      lore:
        - "<gray>Các thay đổi về quyền truy cập đáng tin cậy đã bị vô hiệu hóa</gray>"
        - "<gray>TRONG <white>RDR Free</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Không tìm thấy người chơi</gradient>"
      lore:
        - "<gray>Không có người chơi được biết đến khác có sẵn</gray>"
        - "<gray>để chỉ định quyền truy cập đáng tin cậy.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Hộp] {storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Thiếu bộ nhớ</gradient>"
    lore:
