    empty:
      name: "<gradient:#ef4444:#f87171>[X] Không phát hiện thấy loại tiền tệ nào</gradient>"
      lore:
        - "<gray>Không phát hiện thấy loại tiền tệ Vault hoặc JExEconomy nào.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Yêu cầu quyền truy cập của quản trị viên</gradient>"
      lore:
        - "<gray>Bạn không được phép sử dụng chế độ xem tiền tệ này.</gray>"
