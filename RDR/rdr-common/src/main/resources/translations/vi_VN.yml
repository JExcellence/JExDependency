    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Cau Hinh Kho Luu Tru</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Thông tin]</gradient> <white>Cài đặt cấu hình</white>"
    lore:
      - "<gray>Đã phát hiện cài đặt có thể chỉnh sửa:</gray> <white>{setting_count}</white>"
      - "<gray>Nhấp vào bất kỳ mục nào bên dưới để chỉnh sửa giá trị của nó trong một anvil.</gray>"
      - "<yellow>Các thay đổi được ghi trực tiếp vào config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Bộ]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Đường dẫn:</gray> <white>{config_path}</white>"
      - "<gray>Loại:</gray> <white>{value_type}</white>"
      - "<gray>Giá trị hiện tại:</gray> <white>{current_value}</white>"
      - "<yellow>Nhấp để chỉnh sửa cài đặt này.</yellow>"
