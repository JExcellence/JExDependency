    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Số nguyên]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Dài]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Gấp đôi]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Danh sách]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Sợi dây]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Không có thể chỉnh sửa Cài đặt</white>"
      lore:
        - "<gray>Không tìm thấy cài đặt cấu hình vô hướng/danh sách có thể chỉnh sửa.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Yêu cầu quyền truy cập của quản trị viên</white>"
      lore:
        - "<gray>Bạn không có quyền sử dụng chế độ xem cấu hình này.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Chỉnh sửa cấu hình Đã khóa</white>"
      lore:
        - "<gray>Phiên bản này không cho phép chỉnh sửa cấu hình thời gian chạy.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn không có quyền chỉnh sửa cài đặt cấu hình.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Việc chỉnh sửa cấu hình bị khóa trong phiên bản này.</gray>"
