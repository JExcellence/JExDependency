storage:
  message:
    locked: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>{storage_key} đã được mở trong một phiên khác.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>{storage_key} không thể mở được ngay bây giờ.</gray>"
    access_denied: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn không có quyền truy cập vào <white>{storage_key}</white><gray>.</gray>"
    blacklisted_item: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{item}</white><gray> bị đưa vào danh sách đen toàn cầu từ RDR kho.</gray>"
