prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Estadísticas de almacenamiento</gradient>"
  items: "<gray>Total de artículos:</gray><white>{total_items}</white>"
  available_slots: "<gray>Ranuras disponibles:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Almacenamiento obtenido:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Centro de almacenamiento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bóveda] Resumen de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Su red de bóveda es persistente</gray>"
      - "<gray>y listo para uso entre servidores.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Ver almacenamientos</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Haga clic para explorar su lista de almacenamiento.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Almacén de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Haga clic para comprar otro almacenamiento.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrador de almacenamiento</gradient>"
    lore:
      - "<gray>Abra controles de administración privilegiados RDR.</gray>"
      - "<gray>Administrar proveedores de divisas y valores predeterminados.</gray>"
      - "<yellow>Requiere:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Administrador] Control de almacenamiento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Información] Panel de administración de RDR</gradient>"
    lore:
      - "<gray>Administre sistemas de almacenamiento privilegiados desde un solo lugar.</gray>"
      - "<gray>Utilice este panel para editar valores de configuración y abrir controles de integración.</gray>"
      - "<yellow>Requiere:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Controles del jugador</gradient>"
      lore:
        - "<gray>Edite límites de jugadores/grupos, descuentos y controles de fuerza de almacenamiento.</gray>"
        - "<gray>Abrir editores de anulación y acciones de gestión de emergencias.</gray>"
        - "<yellow>Haz clic para abrir los controles del reproductor.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuración de almacenamiento</gradient>"
      lore:
        - "<gray>Editar valores de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Las configuraciones escritas se abren en un editor de yunque de vidrieras a juego.</gray>"
        - "<yellow>Haga clic para abrir los controles de configuración.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Ent] Integraciones de complementos</gradient>"
      lore:
        - "<gray>Administre herramientas de habilidades, trabajos, divisas y PlaceholderAPI.</gray>"
        - "<gray>Abra controles de administración específicos de la integración.</gray>"
        - "<yellow>Haga clic para abrir la gestión de integración.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Revisar los saldos de impuestos comerciales recaudados por moneda.</gray>"
        - "<gray>Retirar los saldos del banco servidor a su administrador cuenta.</gray>"
        - "<yellow>Haga clic para abrir los controles del banco de impuestos comerciales.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Administrador de divisas</gradient>"
      lore:
        - "<gray>Revise las monedas detectadas de Vault y JExEconomy.</gray>"
        - "<gray>Crear el predeterminado</gray> <white>raindrops</white> <gray>moneda cuando sea necesario.</gray>"
        - "<yellow>Haga clic para abrir los controles de divisas.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Habilidad] Requisitos de habilidad</gradient>"
      lore:
        - "<gray>Revise los complementos de habilidades admitidos y el estado de detección.</gray>"
        - "<gray>Aplique requisitos de habilidades predeterminados a todos los niveles de compra de almacenamiento.</gray>"
        - "<yellow>Haga clic para abrir los controles de requisitos de habilidades.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Trabajo] Requisitos del trabajo</gradient>"
      lore:
        - "<gray>Revise los complementos de trabajo compatibles y el estado de detección.</gray>"
        - "<gray>Aplique requisitos de trabajo predeterminados a todos los niveles de compra de almacenamiento.</gray>"
        - "<yellow>Haga clic para abrir los controles de requisitos laborales.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Se requiere acceso de administrador</gradient>"
      lore:
        - "<gray>No tienes permiso para utilizar este panel de administración.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Controles de jugadores y grupos</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Kit de herramientas de administración de almacenamiento</gradient>"
    lore:
      - "<gray>Edite almacenamientos máximos y descuentos para jugadores y grupos.</gray>"
      - "<gray>Drene/restablezca los almacenamientos o cierre todas las vistas RDR abiertas.</gray>"
      - "<yellow>Requiere:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Anulaciones de jugadores</gradient>"
      lore:
        - "<gray>Explore reproductores en línea y objetivos de anulación configurados.</gray>"
        - "<gray>Edite el almacenamiento máximo por jugador y los valores de descuento.</gray>"
        - "<yellow>Haga clic para abrir las anulaciones del reproductor.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Anulaciones de grupo</gradient>"
      lore:
        - "<gray>Seleccione un grupo LuckPerms y establezca valores de anulación.</gray>"
        - "<gray>Útil para niveles de clasificación basados ​​en permisos.</gray>"
        - "<yellow>Haga clic para abrir anulaciones de grupo.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Forzar drenaje de almacenamiento</gradient>"
      lore:
        - "<gray>Borra todo el contenido del elemento de un almacenamiento seleccionado.</gray>"
        - "<gray>Mantiene configuraciones confiables, deuda y valores de teclas de acceso rápido.</gray>"
        - "<yellow>Haga clic para elegir un almacenamiento.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Forzar reinicio de almacenamiento</gradient>"
      lore:
        - "<gray>Restablece un almacenamiento seleccionado a un estado limpio.</gray>"
        - "<gray>Borra elementos, deudas, acceso confiable y teclas de acceso rápido.</gray>"
        - "<yellow>Haga clic para elegir un almacenamiento.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Forzar cierre de todas las vistas RDR</gradient>"
      lore:
        - "<gray>Cierra todos los menús RDR actualmente abiertos.</gray>"
        - "<gray>Útil después de cambios de configuración o acciones de emergencia.</gray>"
        - "<yellow>Haga clic para forzar el cierre de todas las vistas RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Se requiere acceso de administrador</gradient>"
      lore:
        - "<gray>No tiene permiso para usar este menú.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>No tienes permiso para usar los controles de administración del reproductor/grupo.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Forzado cerrado <blanco>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Seleccionar objetivo de anulación de jugador</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Objetivos de anulación de jugador</gradient>"
    lore:
      - "<gray>Jugadores rastreados:</gray> <white>{tracked_players}</white>"
      - "<gray>Anulaciones configuradas:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Haga clic en un jugador a continuación para editar anulaciones.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Anular almacenamientos máximos:</gray> <white>{override_max_storages}</white>"
      - "<gray>Almacenamientos máximos efectivos:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Anular descuento:</gray> <white>{override_discount}</white>"
      - "<gray>Descuento efectivo:</gray> <white>{effective_discount}</white>"
      - "<yellow>Haga clic para editar este perfil de anulación de reproductor.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[En línea]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Fuera de línea]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Heredar]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] No se encontraron jugadores</gradient>"
      lore:
        - "<gray>No se encontraron jugadores en línea ni anulaciones de jugadores almacenados.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Se requiere acceso de administrador</gradient>"
      lore:
        - "<gray>No tienes permiso para buscar anulaciones de reproductores.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Editar {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Resumen de anulación del reproductor</gradient>"
    lore:
      - "<gray>Reproductor:</gray> <white>{player_name}</white>"
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Anular almacenamientos máximos:</gray> <white>{override_max_storages}</white>"
      - "<gray>Almacenamientos máximos efectivos:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Anular descuento:</gray> <white>{override_discount}</white>"
      - "<gray>Descuento efectivo:</gray> <white>{effective_discount}</white>"
    inherit: "<gradient:#6b7280:#9ca3af>[Heredar]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  actions:
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Almacenamiento máximo</gradient>"
      lore:
        - "<gray>Anular almacenamientos máximos:</gray> <white>{override_max_storages}</white>"
        - "<gray>Almacenamientos máximos efectivos:</gray> <white>{effective_max_storages}</white>"
        - "<yellow>Haga clic para editar el almacenamiento máximo.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Descuento de tienda</gradient>"
      lore:
        - "<gray>Anular descuento:</gray> <white>{override_discount}</white>"
        - "<gray>Descuento efectivo:</gray> <white>{effective_discount}</white>"
        - "<yellow>Haga clic para editar el porcentaje de descuento.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Borrar anulaciones de reproductor</gradient>"
      lore:
        - "<gray>Elimina todas las anulaciones de descuento y almacenamiento máximo.</gray>"
        - "<yellow>Haga clic para borrar las anulaciones de este reproductor.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Se requiere acceso de administrador</gradient>"
      lore:
        - "<gray>No tienes permiso para editar anulaciones de reproductores.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>No tienes permiso para editar anulaciones de reproductores.</gray>"
    player_missing:
      name: "<gradient:#ef4444:#f87171>[X] Falta el objetivo del jugador</gradient>"
      lore:
        - "<gray>No se proporcionó ningún objetivo de jugador para este editor.</gray>"
    player_missing_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>No se ha seleccionado ningún objetivo de jugador. El servicio de configuración de grupo/reproductor</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>no está disponible en este momento.</gray>"
    player_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Se borraron todas las anulaciones para <blanco>{player_name}</white> <gray>(</gray><white>{player_uuid}</white><gray>).</gray>"

storage_admin_group_edit_ui:
  title: "<gradient:#38bdf8:#60a5fa>[G] Editar grupo {group_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Resumen de anulación de grupo</gradient>"
