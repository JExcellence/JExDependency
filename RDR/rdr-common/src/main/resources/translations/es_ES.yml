  entry:
    name: "<gradient:#38bdf8:#60a5fa>[Almacenamiento]</gradient> <white>{owner}</white> <gray>- {storage_key}</gray>"
    lore:
      - "<gray>Propietario:</gray> <white>{owner}</white>"
      - "<gray>Clave de almacenamiento:</gray> <white>{storage_key}</white>"
      - "<gray>ID de almacenamiento:</gray> <white>{storage_id}</white>"
