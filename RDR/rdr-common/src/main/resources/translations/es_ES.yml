    storage_missing_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Ese almacenamiento ya no existe:</gray> <white>{storage_key}</white><gray>.</gray>"
    drained: "<gradient:#f59e0b:#fbbf24>[Drenar]</gradient> <gray>Drenado forzado <blanco>{owner}</white>'s storage <white>{storage_key}</white><gray>. Vistas cerradas:</gray> <white>{closed_views}</white><gray>.</gray>"
    reset: "<gradient:#ef4444:#f87171>[Restablecer]</gradient> <gray>Forzar reinicio <blanco>{owner}</white>'s storage <white>{storage_key}</white><gray>. Vistas cerradas:</gray> <white>{closed_views}</white><gray>.</gray>"

