      - "<gray>Acción:</gray> <white>{action}</white>"
      - "<yellow>Haga clic para continuar.</yellow>"
    action:
      force_drain: "<gradient:#f59e0b:#fbbf24>[Drenar]</gradient>"
      force_reset: "<gradient:#ef4444:#f87171>[Restablecer]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] No se encontraron almacenamientos</gradient>"
      lore:
        - "<gray>No hay registros de almacenamiento disponibles actualmente.</gray>"
    access_denied:
