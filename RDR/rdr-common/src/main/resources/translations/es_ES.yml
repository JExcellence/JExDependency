prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Estadísticas de almacenamiento</gradient>"
  items: "<gray>Total de artículos:</gray><white>{total_items}</white>"
  available_slots: "<gray>Ranuras disponibles:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Almacenamiento obtenido:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Centro de almacenamiento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bóveda] Resumen de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Su red de bóveda es persistente</gray>"
      - "<gray>y listo para uso entre servidores.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Ver almacenamientos</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Haga clic para explorar su lista de almacenamiento.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Almacén de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Haga clic para comprar otro almacenamiento.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Almacén de almacenamiento</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Información] Capacidad de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Compre espacio de bóveda adicional hasta</gray>"
      - "<gray>llegas al límite configurado.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisitos de almacenamiento</gradient>"
    lore:
      - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
      - "<gray>Recuento de requisitos actuales:</gray><white>{requirements}</white>"
      - "<gray>Estado:</gray><white>{availability}</white>"
      - "<yellow>Haga clic para inspeccionar cada nivel de requisitos en detalle.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ninguno]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Listo]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendiente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Sin conexión]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Comprar Almacenamiento</gradient>"
      lore:
        - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
        - "<gray>Requisitos actuales:</gray><white>{requirements}</white>"
        - "<gray>Almacenamiento propio:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Haga clic para comprar cuando se cumplan todos los requisitos.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Requisitos Pendientes</gradient>"
      lore:
        - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
        - "<gray>Requisitos actuales:</gray><white>{requirements}</white>"
        - "<gray>Almacenamiento propio:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Cumplir con los requisitos restantes antes de comprar.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Límite de almacenamiento alcanzado</gradient>"
      lore:
        - "<gray>Almacenamiento propio:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>No puedes comprar más almacenamientos</gray>"
        - "<gray>hasta que se aumente el límite global.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Requisitos Sin conexión</gradient>"
      lore:
        - "<gray>Uno o más requisitos de tienda configurados</gray>"
        - "<gray>no se puede resolver en este servidor.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Falta perfil</gradient>"
      lore:
        - "<gray>Su perfilRDRno se pudo cargar,</gray>"
        - "<gray>por lo que las compras están bloqueadas temporalmente.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Comprado<white>{storage_key}</white><gray>. Requisitos consumidos:</gray><white>{requirements}</white><gray>. Almacenamientos propios:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Actualmente no cumple con<white>{requirement}</white><gray>. Requisitos de la tienda:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>El requisito de tienda<white>{requirement}</white><gray>no está disponible o no es válido en este momento.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>No hay requisitos de tienda configurados disponibles para compras de almacenamiento en este momento.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Ha alcanzado el límite de almacenamiento de<white>{max_storages}</white><gray>. Almacenamientos propios:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Su perfilRDRno se pudo cargar, por lo que las compras de almacenamiento no están disponibles.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Solicitud] Compra{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Información] Explorador de requisitos</gradient>"
    lore:
      - "<gray>Nivel de compra:</gray><white>{purchase_number}</white>"
      - "<gray>Desbloquea el almacenamiento:</gray><white>{storage_number}</white>"
      - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
      - "<gray>Actualmente cumplido:</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] Sin requisitos</gradient>"
    lore:
      - "<gray>Este nivel de compra no tiene requisitos configurados.</gray>"
      - "<yellow>Puedes comprar este almacenamiento sin controles adicionales.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Solicitud]{requirement_name}</gradient>"
    lore:
      - "<gray>Clave:</gray><white>{requirement_key}</white>"
      - "<gray>Tipo:</gray><white>{requirement_type}</white>"
      - "<gray>Estado:</gray><white>{status}</white>"
      - "<gray>Progreso:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Resumen:</gray><white>{summary}</white>"
      - "<yellow>Haga clic con el botón derecho en los requisitos de artículo o moneda para realizar el progreso bancario.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Comprobaciones detalladas</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Cumplió]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendiente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[No disponible]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>ya está listo.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>Progreso almacenado para<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>No había artículos ni moneda coincidentes disponibles para<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>no admite progreso bancario.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>no está disponible en este momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Su perfilRDRno se pudo cargar, por lo que no se pudo guardar el progreso.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Bóveda] Sus almacenes</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Información] Capacidad de almacenamiento</gradient>"
    lore:
      - "<gray>Almacenamiento propio:</gray><white>{owned_storages}</white>"
      - "<gray>Almacenamiento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Utilice esta lista para revisar su</gray>"
      - "<gray>contenedores de almacenamiento persistente.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Cuadro]{storage_key}</gradient>"
    lore:
      - "<gray>Clave de almacenamiento:</gray><white>{storage_key}</white>"
      - "<gray>Propietario:</gray><white>{owner_name}</white>"
      - "<gray>Acceso:</gray><white>{access_level}</white>"
      - "<gray>Tecla de acceso rápido:</gray><white>{hotkey_display}</white>"
      - "<gray>Ranuras utilizadas:</gray><white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Ranuras disponibles:</gray><white>{available_slots}</white>"
      - "<yellow>Este almacenamiento está listo para la persistencia del elemento.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Haga clic izquierdo para abrir este almacenamiento.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Haga clic derecho para abrir la configuración de almacenamiento.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Propietario]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Público]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Asociado]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Confiable]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] No se encontraron almacenamientos</gradient>"
    lore:
      - "<gray>No hay almacenamientos adjuntos actualmente</gray>"
      - "<gray>a tu perfilRDR.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Falta perfil</gradient>"
    lore:
      - "<gray>Tu perfil de jugadorRDRno pudo</gray>"
      - "<gray>cargarse desde el almacenamiento persistente.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#]{storage_key}Configuración</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Información] Configuración de almacenamiento</gradient>"
    lore:
      - "<gray>Clave de almacenamiento:</gray><white>{storage_key}</white>"
      - "<gray>Propietario:</gray><white>{owner_name}</white>"
      - "<gray>Su acceso:</gray><white>{access_level}</white>"
      - "<gray>Tecla de acceso rápido:</gray><white>{hotkey_display}</white>"
      - "<gray>Asociados:</gray><white>{associate_count}</white>"
      - "<gray>Confiable:</gray><white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Propietario]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Público]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Asociado]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Confiable]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Grupo] Acceso confiable</gradient>"
    lore:
      - "<gray>Asociados:</gray><white>{associate_count}</white>"
      - "<gray>Confiable:</gray><white>{trusted_count}</white>"
      - "<yellow>Haga clic para administrar quién puede depositar</yellow>"
      - "<yellow>o acceder completamente a este almacenamiento.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Tecla de acceso rápido de almacenamiento</gradient>"
    lore:
      - "<gray>Tecla de acceso rápido actual:</gray><white>{hotkey_display}</white>"
      - "<yellow>Haga clic para vincular el acceso rápido a</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Confiable bloqueado</gradient>"
    lore:
      - "<gray>Solo el propietario del almacenamiento puede administrar</gray>"
      - "<gray>acceso confiable para este almacenamiento.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Tecla de acceso rápido bloqueada</gradient>"
    lore:
      - "<gray>Solo el propietario del almacenamiento puede cambiar</gray>"
      - "<gray>teclas de acceso rápido de almacenamiento.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>Configuración [gratuita] bloqueada</gradient>"
    lore:
      - "<gray>Los cambios en la configuración de almacenamiento están deshabilitados</gray>"
      - "<gray>en<white>RDRGratis</white><gray>.</gray>"
      - "<yellow>Actualice a Premium para editar la configuración.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Falta almacenamiento</gradient>"
    lore:
      - "<gray>Este almacenamiento no se pudo cargar</gray>"
      - "<gray>para la vista de configuración.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Grupo]{storage_key}Acceso</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Información] Acceso compartido</gradient>"
    lore:
      - "<gray>Clave de almacenamiento:</gray><white>{storage_key}</white>"
      - "<gray>Propietario:</gray><white>{owner_name}</white>"
      - "<gray>Asociados:</gray><white>{associate_count}</white>"
      - "<gray>Confiable:</gray><white>{trusted_count}</white>"
      - "<yellow>Haga clic en un reproductor para acceder al ciclo.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Público]{player}</gradient>"
      lore:
        - "<gray>Estado:</gray><white>Público</white>"
        - "<gray>Sin acceso a depósitos o retiros.</gray>"
        - "<yellow>Haga clic para ascender a Asociado.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Asociado]{player}</gradient>"
      lore:
        - "<gray>Estado:</gray><white>Asociado</white>"
        - "<gray>Puede depositar pero no retirar.</gray>"
        - "<yellow>Haga clic para ascender a Confiable.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Confiable]{player}</gradient>"
      lore:
        - "<gray>Estado:</gray><white>Confiable</white>"
        - "<gray>Puede depositar y retirar artículos.</gray>"
        - "<yellow>Haga clic para restablecer a Público.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Público]</gradient><gray>{player}ya no tiene acceso al almacenamiento.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Asociado]</gradient><gray>{player}ahora puede depositar en este almacenamiento.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Confiable]</gradient><gray>{player}ahora puede depositar y retirar de este almacenamiento.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Solo el propietario del almacenamiento puede cambiar el acceso confiable.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Solo propietario</gradient>"
      lore:
        - "<gray>Puedes ver este almacenamiento, pero solo</gray>"
        - "<gray>el propietario puede cambiar el acceso confiable.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Falta almacenamiento</gradient>"
      lore:
        - "<gray>Este almacenamiento no se pudo cargar</gray>"
        - "<gray>para gestión de acceso confiable.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Este almacenamiento no se pudo cargar para la administración de acceso confiable.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>Configuración [gratuita] bloqueada</gradient>"
      lore:
        - "<gray>Los cambios de acceso confiable están deshabilitados</gray>"
        - "<gray>en<white>RDRGratis</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] No se encontraron jugadores</gradient>"
      lore:
        - "<gray>No hay otros jugadores conocidos disponibles</gray>"
        - "<gray>para asignar acceso confiable.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Cuadro]{storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Falta almacenamiento</gradient>"
    lore:
      - "<gray>No se pudo encontrar esta entrada de almacenamiento</gray>"
      - "<gray>para su perfilRDRpersistente.</gray>"

storage_hotkey_anvil_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#] Enlazar{storage_key}</gradient>"
  input:
    lore:
      - "<gray>Ingrese un número entre</gray>"
      - "<white>1</white><gray>y</gray><white>{max_hotkeys}</white><gray>para acceso rápido.</gray>"
      - "<yellow>Haga clic en el espacio de resultados para guardar la tecla de acceso rápido.</yellow>"
  error:
    invalid_hotkey: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Utilice un número entre<white>1</white>y<white>{max_hotkeys}</white><gray>. Entrada:</gray><white>{input}</white>"

storage:
  message:
    locked: "<gradient:#ef4444:#f87171>[X]</gradient><gray>{storage_key}ya está abierto en otra sesión.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>{storage_key}no se pudo abrir en este momento.</gray>"
    access_denied: "<gradient:#ef4444:#f87171>[X]</gradient><gray>No tienes acceso a<white>{storage_key}</white><gray>.</gray>"
    blacklisted_item: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{item}</white><gray>está en la lista negra global del almacenamientoRDR.</gray>"
    lease_lost: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Su sesión de edición para{storage_key}expiró o se movió a otro lugar. Los cambios no se guardaron.</gray>"
    save_failed: "<gradient:#ef4444:#f87171>[!]</gradient><gray>{storage_key}no se pudo guardar. Consulte la consola para obtener más detalles.</gray>"
    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient><gray>{storage_key}ahora está vinculado a<white>/rr{hotkey}</white><gray>.</gray>"
    hotkey_missing: "<gradient:#ef4444:#f87171>[X]</gradient><gray>No hay almacenamiento vinculado a<white>/rr{hotkey}</white><gray>.</gray>"
    hotkey_invalid: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Las teclas de acceso rápido deben estar entre<white>1</white>y<white>{max_hotkeys}</white><gray>.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Las ediciones de la configuración de almacenamiento están deshabilitadas en<white>RDRGratis</white><gray>.</gray>"
    scoreboard_enabled: "<gradient:#10b981:#34d399>[+]</gradient><gray>Habilitó la barra lateral<white>/rrmarcador</white><gray>.</gray>"
    scoreboard_disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient><gray>Deshabilitó la barra lateral<white>/rr</white><gray>.</gray>"
    scoreboard_syntax: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Uso:</gray><white>/rrmarcador</white>"

page:
  name: "<gradient:#6b7280:#9ca3af>[Página]%current_page%</gradient>"
  lore:
    - "<gray>Página actual:</gray><white>%current_page%</white>"
    - "<gray>Total de páginas:</gray><white>%total_pages%</white>"
  fallback: "<gradient:#6b7280:#9ca3af>[Página]%page%</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>[<-] Return</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haga clic para regresar</gradient>"
