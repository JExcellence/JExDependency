      - "<gray>Anular descuento:</gray> <white>{override_discount}</white>"
    none: "<gradient:#6b7280:#9ca3af>[Ninguno]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Heredar]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  actions:
    select_group:
      name: "<gradient:#38bdf8:#60a5fa>[Etiqueta] Seleccionar grupo</gradient>"
      lore:
        - "<gray>Grupo actual:</gray> <white>{group_name}</white>"
        - "<gray>Grupos LuckPerms detectados:</gray> <white>{group_count}</white>"
        - "<yellow>Haga clic izquierdo para el siguiente grupo, haga clic derecho para el anterior.</yellow>"
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Almacenamiento máximo del grupo</gradient>"
      lore:
        - "<gray>Anular almacenamientos máximos:</gray> <white>{override_max_storages}</white>"
        - "<yellow>Haga clic para editar el almacenamiento máximo para este grupo.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Descuento grupal</gradient>"
      lore:
        - "<gray>Anular descuento:</gray> <white>{override_discount}</white>"
        - "<yellow>Haga clic para editar el descuento para este grupo.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Borrar anulaciones de grupo</gradient>"
      lore:
        - "<gray>Elimina las anulaciones de descuento y almacenamiento máximo para este grupo.</gray>"
        - "<yellow>Haga clic para borrar la anulación de este grupo.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Se requiere acceso de administrador</gradient>"
      lore:
        - "<gray>No tiene permiso para editar anulaciones de grupos.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>No tiene permiso para editar anulaciones de grupos.</gray>"
    group_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Seleccione un grupo primero antes de editar valores.</gray>"
    group_unknown: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Grupo <blanco>{group_name}</white> is not a detected LuckPerms group.</gray>"
    group_selected: "<gradient:#38bdf8:#60a5fa>[=]</gradient> <gray>Grupo LuckPerms seleccionado <blanco>{group_name}</white> <gray>de <blanco>{group_count}</white> detected group(s).</gray>"
    luckperms_groups_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>No se detectaron grupos LuckPerms de jugadores en línea en este momento.</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>no está disponible en este momento.</gray>"
    group_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Se borraron las anulaciones para el grupo <blanco>{group_name}</white><gray>.</gray>"

storage_admin_storage_control_ui:
  title: "<gradient:#f59e0b:#f97316>[Almacenamiento] {action_mode}</gradient>"
  mode:
