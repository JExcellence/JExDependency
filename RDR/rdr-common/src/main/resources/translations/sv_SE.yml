      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Redigera värden från</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Angivna inställningar öppnas i en matchande städredigerare av målat glas.</gray>"
        - "<yellow>Klicka för att öppna konfigurationskontroller.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-integrationer</gradient>"
      lore:
        - "<gray>Hantera skicklighet, jobb, valuta och PlaceholderAPI-verktyg.</gray>"
        - "<gray>Öppna integrationsspecifika administratörskontroller.</gray>"
        - "<yellow>Klicka för att öppna integrationshantering.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valutahanterare</gradient>"
      lore:
        - "<gray>Granska upptäckta valutor från Vault och JExEconomy.</gray>"
        - "<gray>Skapa standardvalutan för</gray> <white>raindrops</white> <gray>när det behövs.</gray>"
        - "<yellow>Klicka för att öppna valutakontroller.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skicklighetskrav</gradient>"
      lore:
        - "<gray>Granska färdighetsplugin som stöds och upptäcktstillstånd.</gray>"
        - "<gray>Tillämpa standardkunskapskrav på alla lagerinköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för kompetenskrav.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Jobb] Jobbkrav</gradient>"
      lore:
        - "<gray>Granska stödda jobbplugin-program och detekteringstillstånd.</gray>"
        - "<gray>Tillämpa standardjobbkrav på alla lagerinköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för jobbkrav.</yellow>"
