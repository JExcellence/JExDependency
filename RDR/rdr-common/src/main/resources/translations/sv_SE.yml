storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Lagringskontroll</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin Panel</gradient>"
    lore:
      - "<gray>Hantera privilegierade lagringssystem från ett ställe.</gray>"
      - "<gray>Använd denna panel för att redigera konfigurationsvärden och öppna integrationskontroller.</gray>"
      - "<yellow>Kräver:</yellow> <white>raindroprdr.command.admin</white>"
