    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Spelarkontroller</gradient>"
      lore:
        - "<gray>Redigera spelar-/gruppgränser, rabatter och kontroller för lagringskraft.</gray>"
        - "<gray>Öppna åsidosättningsredigerare och nödhanteringsåtgärder.</gray>"
        - "<yellow>Klicka för att öppna spelarkontrollerna.</yellow>"
