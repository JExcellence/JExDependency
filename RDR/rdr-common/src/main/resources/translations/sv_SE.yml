      lore:
        - "<gray>Du har inte behörighet att använda denna adminpanel.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Spelar- och gruppkontroller</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Storage Admin Toolkit</gradient>"
    lore:
      - "<gray>Redigera maximala lagringsutrymmen och rabatter för spelare och grupper.</gray>"
      - "<gray>Tvinga tömning/återställ lagringar eller stäng alla öppna RDR-vyer.</gray>"
      - "<yellow>Kräver:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Spelaren åsidosätter</gradient>"
      lore:
        - "<gray>Bläddra online-spelare och konfigurerade åsidosättande mål.</gray>"
        - "<gray>Redigera max lagringsutrymme och rabattvärden per spelare.</gray>"
        - "<yellow>Klicka för att öppna spelaröverstyrningar.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Gruppöverstyrningar</gradient>"
      lore:
        - "<gray>Välj en LuckPerms-grupp och ställ in åsidosättningsvärden.</gray>"
        - "<gray>Användbar för behörighetsbaserade rangnivåer.</gray>"
        - "<yellow>Klicka för att öppna gruppöverstyrningar.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Forcerad tömningslagring</gradient>"
      lore:
        - "<gray>Rensar allt objektinnehåll från en vald lagring.</gray>"
        - "<gray>Behåller pålitliga inställningar, skulder och snabbtangentvärden.</gray>"
        - "<yellow>Klicka för att välja en lagring.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Force Reset Storage</gradient>"
      lore:
        - "<gray>Återställer en vald lagring till ett rent tillstånd.</gray>"
        - "<gray>Rensar objekt, skulder, betrodd åtkomst och snabbtangent.</gray>"
        - "<yellow>Klicka för att välja en lagring.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Tvinga stängning av alla RDR-vyer</gradient>"
      lore:
        - "<gray>Stänger alla för närvarande öppna RDR-menyer.</gray>"
        - "<gray>Användbar efter konfigurationsändringar eller nödåtgärder.</gray>"
        - "<yellow>Klicka för att tvinga stänga alla RDR-vyer.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Adminåtkomst krävs</gradient>"
      lore:
        - "<gray>Du har inte behörighet att använda den här menyn.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har inte behörighet att använda spelar-/gruppadministratörskontroller.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Tvångsstängd <vit>{closed_views}</white> open RDR view(s).</gray>"

