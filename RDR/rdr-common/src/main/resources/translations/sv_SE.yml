      - "<gray>Ägda lagringar:</gray><white>{owned_storages}</white>"
      - "<gray>Maximala lagringsutrymmen:</gray><white>{max_storages}</white>"
      - "<yellow>Klicka för att bläddra i din lagringslista.</yellow>"
