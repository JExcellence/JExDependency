prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] 스토리지 통계</gradient>"
  items: "<gray>총 항목:</gray><white>{total_items}</white>"
  available_slots: "<gray>사용 가능한 슬롯:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>획득한 스토리지:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>최대 저장 용량:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] 스토리지 허브</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] 스토리지 요약</gradient>"
    lore:
      - "<gray>소유 스토리지:</gray><white>{owned_storages}</white>"
      - "<gray>최대 저장 공간:</gray><white>{max_storages}</white>"
      - "<gray>Vault 네트워크가 지속됩니다</gray>"
      - "<gray>서버 간 사용이 준비되었습니다.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] 저장소 보기</gradient>"
    lore:
      - "<gray>소유 스토리지:</gray><white>{owned_storages}</white>"
      - "<gray>최대 저장 공간:</gray><white>{max_storages}</white>"
      - "<yellow>저장소 목록을 찾아보려면 클릭하세요.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] 저장소 저장소</gradient>"
    lore:
      - "<gray>소유 스토리지:</gray><white>{owned_storages}</white>"
      - "<gray>최대 저장 공간:</gray><white>{max_storages}</white>"
      - "<yellow>다른 스토리지를 구입하려면 클릭하세요.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] 스토리지 관리자</gradient>"
    lore:
      - "<gray>권한 있는 RDR 관리자 제어를 엽니다.</gray>"
      - "<gray>통화 공급자 및 기본값을 관리합니다.</gray>"
      - "<yellow>요구사항:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] 스토리지 제어</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR 관리자 패널</gradient>"
    lore:
      - "<gray>한 곳에서 권한 있는 스토리지 시스템을 관리하세요.</gray>"
      - "<gray>이 패널에서 설정 값과 통화 지원을 수정하세요.</gray>"
      - "<yellow>요구사항:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 저장소 설정</gradient>"
      lore:
        - "<gray></gray> <white>구성/config.yml</white><gray>.</gray>"
        - "<gray>모든 편집 가능한 설정은 앤빌 프롬프트를 통해 변경할 수 있습니다.</gray>"
        - "<yellow>구성 제어를 열려면 클릭하십시오.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 통화 관리자</gradient>"
      lore:
        - "<gray>Vault 및 JExEconomy에서 감지된 통화를 검토합니다.</gray>"
        - "<gray>기본값 만들기</gray> <white>raindrops</white> <gray>필요할 때 통화.</gray>"
        - "<yellow>통화 제어를 열려면 클릭하세요.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 관리자 액세스가 필요합니다</gradient>"
      lore:
        - "<gray>이 관리자 패널을 사용할 권한이 없습니다.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] 통화 관리자</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] 통화 제공업체</gradient>"
    lore:
      - "<gray>감지된 통화:</gray> <white>{currency_count}</white>"
      - "<gray>Vault 사용 가능:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy 사용 가능:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>크리스탈 버튼을 사용하여 기본 통화를 생성하세요.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>공급자:</gray> <white>{provider}</white>"
      - "<gray>상징:</gray> <white>{symbol}</white>"
      - "<gray>접두사:</gray> <white>{prefix}</white>"
      - "<gray>접미사:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] 만들다 {currency_id}</gradient>"
      lore:
        - "<gray>JExEconomy에 기본 RDR 통화를 생성합니다.</gray>"
        - "<yellow>{currency_id}을(를) 생성하려면 클릭하세요.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy 필수</gradient>"
      lore:
        - "<gray>JExEconomy 없이는 기본 통화를 생성할 수 없습니다.</gray>"
        - "<gray>먼저 JExEconomy를 설치하고 활성화하세요.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} 준비가 된</gradient>"
      lore:
        - "<gray>기본 통화가 이미 존재합니다.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>생성된 기본 통화:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>통화 생성 실패:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>통화가 이미 존재합니다:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>JExEconomy를 사용할 수 없으면 이 버튼을 사용할 수 없습니다.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] 감지된 통화가 없습니다.</gradient>"
      lore:
        - "<gray>Vault 또는 JExEconomy 통화가 감지되지 않았습니다.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 관리자 액세스가 필요합니다</gradient>"
      lore:
        - "<gray>이 통화 보기를 사용할 권한이 없습니다.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>통화를 관리할 권한이 없습니다.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] 저장소 설정</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[정보]</gradient> <white>구성 설정</white>"
    lore:
      - "<gray>에서 값 수정 편집 가능한 설정이 감지되었습니다:</gray> <white>{setting_count}</white>"
      - "<gray>아래 항목을 클릭하여 값을 편집하십시오. 모루.</gray>"
      - "<yellow>변경 사항은 다음에 직접 기록됩니다. config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[세트]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>경로:</gray> <white>{config_path}</white>"
      - "<gray>유형:</gray> <white>{value_type}</white>"
      - "<gray>현재 가치:</gray> <white>{current_value}</white>"
      - "<yellow>이 설정을 편집하려면 클릭하세요.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[정수]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[긴]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[더블]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[목록]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[끈]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>편집 가능 없음 설정</white>"
      lore:
        - "<gray>편집 가능한 스칼라/목록 구성 설정을 찾을 수 없습니다.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[엑스]</gradient> <white>관리자 액세스 필요</white>"
      lore:
        - "<gray>이 구성 보기를 사용할 권한이 없습니다.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[엑스]</gradient> <white>구성 편집 잠김</white>"
      lore:
        - "<gray>이 버전은 런타임 구성 편집을 허용하지 않습니다.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>구성 설정을 편집할 수 있는 권한이 없습니다.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>구성 편집은 이 버전에서 잠겨 있습니다.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>업데이트됨 <white>{config_path}</white><gray> ~ <white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "{config_path}"
  input:
    lore:
      - "<gray>경로:</gray> <white>{config_path}</white>"
      - "<gray>유형:</gray> <white>{value_type}</white>"
      - "<gray>현재 가치:</gray> <white>{current_value}</white>"
      - "<yellow>새 값을 입력하고 확인하십시오.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>유형 <white>{value_type}</white><gray>. 입력:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 저장소 저장소</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[정보] 저장 용량</gradient>"
    lore:
      - "<gray>소유 스토리지:</gray><white>{owned_storages}</white>"
      - "<gray>최대 저장 공간:</gray><white>{max_storages}</white>"
      - "<gray></gray>까지 추가 저장소 공간 구입"
      - "<gray>구성된 한도에 도달했습니다.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[요구] 저장소 요구 사항</gradient>"
