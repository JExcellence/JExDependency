      - "<gray>상태:</gray><white>{availability}</white>"
      - "<yellow>각 요구 사항 계층을 자세히 검사하려면 클릭하세요.</yellow>"
    none: "<gradient:#ef4444:#f87171>[없음]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[준비]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[보류 중]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[오프라인]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] 스토리지 구매</gradient>"
      lore:
        - "<gray>구성된 요구 사항:</gray><white>{requirement_count}</white>"
        - "<gray>현재 요구 사항:</gray><white>{requirements}</white>"
        - "<gray>소유 스토리지:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>모든 요구사항이 충족되면 구매하려면 클릭하세요.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] 요구 사항 보류 중</gradient>"
      lore:
        - "<gray>구성된 요구 사항:</gray><white>{requirement_count}</white>"
        - "<gray>현재 요구 사항:</gray><white>{requirements}</white>"
        - "<gray>소유 스토리지:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>구매하기 전에 나머지 요구 사항을 충족하십시오.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] 저장 용량 한도 도달</gradient>"
      lore:
        - "<gray>소유 스토리지:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>추가 스토리지를 구매할 수 없습니다</gray>"
        - "<gray>글로벌 한도가 높아질 때까지.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] 오프라인 요구 사항</gradient>"
      lore:
        - "<gray>하나 이상의 구성된 저장소 요구 사항</gray>"
        - "<gray>은(는) 이 서버에서 확인할 수 없습니다.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] 프로필 누락</gradient>"
      lore:
        - "<gray>귀하의RDR프로필을 로드할 수 없습니다.</gray>"
        - "<gray>그래서 구매가 일시적으로 차단되었습니다.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>구매됨<white>{storage_key}</white><gray>. 사용된 요구 사항:</gray><white>{requirements}</white><gray>. 소유 스토리지:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>귀하는 현재<white>{requirement}</white><gray>을 충족하지 않습니다. 매장 요구 사항:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>스토어 요구 사항<white>{requirement}</white><gray>은 현재 사용할 수 없거나 유효하지 않습니다.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>지금은 스토리지 구매에 사용할 수 있는 구성된 스토어 요구 사항이 없습니다.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>저장 용량 한도인<white>{max_storages}</white><gray>에 도달했습니다. 소유 스토리지:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>귀하의RDR프로필을 로드할 수 없어 스토리지 구매를 사용할 수 없습니다.</gray>"

storage_store_requirements_ui:
