    name: "<gradient:#a78bfa:#c4b5fd>[Admin] 스토리지 관리자</gradient>"
    lore:
      - "<gray>권한 있는 RDR 관리자 제어를 엽니다.</gray>"
      - "<gray>통화 공급자 및 기본값을 관리합니다.</gray>"
      - "<yellow>요구사항:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] 스토리지 제어</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[정보] RDR 관리 패널</gradient>"
    lore:
      - "<gray>한 곳에서 권한 있는 스토리지 시스템을 관리합니다.</gray>"
      - "<gray>이 패널을 사용하여 구성 값을 편집하고 통합 컨트롤을 엽니다.</gray>"
      - "<yellow>요구 사항:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] 플레이어 제어</gradient>"
      lore:
        - "<gray>플레이어/그룹 제한, 할인 및 저장력 제어를 편집합니다.</gray>"
        - "<gray>재정의 편집기 및 긴급 관리 작업을 엽니다.</gray>"
        - "<yellow>플레이어 컨트롤을 열려면 클릭하세요.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 스토리지 구성</gradient>"
      lore:
        - "<gray>다음에서 값 편집</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>일치하는 스테인드 글라스 앤빌 편집기에서 입력된 설정이 열립니다.</gray>"
        - "<yellow>구성 컨트롤을 열려면 클릭하세요.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] 플러그인 통합</gradient>"
      lore:
        - "<gray>기술, 직업, 통화 및 PlaceholderAPI 도구를 관리합니다.</gray>"
        - "<gray>통합 관련 관리 제어를 엽니다.</gray>"
        - "<yellow>통합 관리를 열려면 클릭하세요.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[세금] Trade Server Bank</gradient>"
      lore:
        - "<gray>통화별로 징수된 무역세 잔액을 검토합니다.</gray>"
        - "<gray>서버-은행 잔액을 관리자에게 인출합니다. 계정.</gray>"
        - "<yellow>무역세 은행 컨트롤을 열려면 클릭하세요.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] 통화 관리자</gradient>"
      lore:
        - "<gray>Vault 및 JExEconomy에서 감지된 통화를 검토합니다.</gray>"
        - "<gray>필요한 경우 기본</gray> <white>raindrops</white> <gray>통화를 생성합니다.</gray>"
        - "<yellow>통화 제어를 열려면 클릭하세요.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[스킬] 스킬 요구 사항</gradient>"
      lore:
        - "<gray>지원되는 스킬 플러그인 및 감지 상태를 검토합니다.</gray>"
        - "<gray>모든 스토리지 구매 계층에 기본 기술 요구 사항을 적용합니다.</gray>"
        - "<yellow>기술 요구 사항 컨트롤을 열려면 클릭하세요.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] 작업 요구 사항</gradient>"
      lore:
        - "<gray>지원되는 작업 플러그인 및 감지 상태를 검토합니다.</gray>"
        - "<gray>모든 스토리지 구매 계층에 기본 작업 요구 사항을 적용합니다.</gray>"
        - "<yellow>직무 요구사항 통제를 열려면 클릭하세요.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] 관리자 액세스 필요</gradient>"
      lore:
        - "<gray>이 관리자 패널을 사용할 권한이 없습니다.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] 플레이어 및 그룹 컨트롤</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[정보] 저장소 관리 도구 키트</gradient>"
    lore:
      - "<gray>플레이어 및 그룹에 대한 최대 저장소 및 할인을 편집합니다.</gray>"
      - "<gray>스토리지를 강제로 비우거나 재설정하거나 열려 있는 모든 RDR 보기를 닫습니다.</gray>"
      - "<yellow>요구 사항:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] 플레이어 재정의</gradient>"
      lore:
        - "<gray>온라인 플레이어와 구성된 재정의 대상을 검색합니다.</gray>"
        - "<gray>플레이어당 최대 저장 공간 및 할인 값을 편집합니다.</gray>"
        - "<yellow>플레이어 재정의를 열려면 클릭하세요.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] 그룹 재정의</gradient>"
      lore:
        - "<gray>LuckPerms 그룹을 선택하고 재정의 값을 설정합니다.</gray>"
        - "<gray>권한 기반 순위 계층에 유용합니다.</gray>"
        - "<yellow>그룹 재정의를 열려면 클릭하세요.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] 저장소 강제 배수</gradient>"
      lore:
        - "<gray>선택한 저장소에서 모든 항목 내용을 지웁니다.</gray>"
        - "<gray>신뢰할 수 있는 설정, 부채 및 단축키 값을 유지합니다.</gray>"
        - "<yellow>스토리지를 선택하려면 클릭하세요.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] 저장소 강제 재설정</gradient>"
      lore:
        - "<gray>선택한 저장소를 깨끗한 상태로 재설정합니다.</gray>"
        - "<gray>항목, 부채, 신뢰할 수 있는 액세스 및 단축키를 지웁니다.</gray>"
        - "<yellow>스토리지를 선택하려면 클릭하세요.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] 모든 RDR 보기 강제 닫기</gradient>"
      lore:
        - "<gray>현재 열려 있는 모든 RDR 메뉴를 닫습니다.</gray>"
        - "<gray>구성 변경 또는 긴급 조치 후에 유용합니다.</gray>"
        - "<yellow>모든 RDR 보기를 강제로 닫으려면 클릭하세요.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] 관리자 접근 필요</gradient>"
      lore:
        - "<gray>이 메뉴를 사용할 수 있는 권한이 없습니다.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>플레이어/그룹 관리자 컨트롤을 사용할 권한이 없습니다.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>강제 종료 <white>{closed_views}</white> open RDR view(s).</gray>"

