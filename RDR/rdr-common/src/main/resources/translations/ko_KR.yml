    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray><white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>에 대해 저장된 진행률"
