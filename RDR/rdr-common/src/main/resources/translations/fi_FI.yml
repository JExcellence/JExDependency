    locked:
      name: "<gradient:#ef4444:#f87171>[X] Järjestelmänvalvojan käyttöoikeudet vaaditaan</gradient>"
      lore:
        - "<gray>Sinulla ei ole lupaa käyttää tätä hallintapaneelia.</gray>"

