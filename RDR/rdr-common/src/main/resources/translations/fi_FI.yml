prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Tallennustilastot</gradient>"
  items: "<gray>Tuotteita yhteensä:</gray><white>{total_items}</white>"
  available_slots: "<gray>Saatavilla olevat paikat:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Hankitut tallennustilat:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksimaalinen tallennustila:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Tallennuskeskus</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Holvi] Tallennusyhteenveto</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<gray>Holviverkkosi on säilynyt</gray>"
      - "<gray>ja valmis palvelinten väliseen käyttöön.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Näytä tallennustilat</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<yellow>Selaa tallennusluetteloa napsauttamalla.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Tallennusmyymälä</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<yellow>Osta toinen tallennustila napsauttamalla.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Tallennusmyymälä</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Tiedot] Tallennuskapasiteetti</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<gray>Osta lisää varastotilaa</gray>asti"
      - "<gray>saavutat määritetyn rajan.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Kaupan vaatimukset</gradient>"
    lore:
      - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
      - "<gray>Nykyinen tarvemäärä:</gray><white>{requirements}</white>"
      - "<gray>Tila:</gray><white>{availability}</white>"
      - "<yellow>Tarkista jokainen vaatimustaso napsauttamalla tätä.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ei mitään]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Valmis]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Osta tallennustila</gradient>"
      lore:
        - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray><white>{requirements}</white>"
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klikkaa ostaaksesi, kun kaikki vaatimukset täyttyvät.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Vaatimukset vireillä</gradient>"
      lore:
        - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray><white>{requirements}</white>"
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Täytä loput vaatimukset ennen ostamista.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Tallennusraja saavutettu</gradient>"
      lore:
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Et voi ostaa lisää tallennustilaa</gray>"
        - "<gray>kunnes yleistä ylärajaa nostetaan.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Vaatimukset offline-tilassa</gradient>"
      lore:
        - "<gray>Yksi tai useampi määritetty myymälävaatimus</gray>"
        - "<gray>ei voida ratkaista tällä palvelimella.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profiili puuttuu</gradient>"
      lore:
        - "<gray>RDR-profiiliasi ei voitu ladata,</gray>"
        - "<gray>joten ostot estetään väliaikaisesti.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Ostettu<white>{storage_key}</white><gray>. Kulutetut vaatimukset:</gray><white>{requirements}</white><gray>. Otetut tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Et tällä hetkellä täytä<white>{requirement}</white><gray>. Kaupan vaatimukset:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Myymälävaatimus<white>{requirement}</white><gray>ei ole saatavilla tai on virheellinen juuri nyt.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Määritettyjä kauppavaatimuksia ei ole tällä hetkellä saatavilla tallennustilaosteille.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Olet saavuttanut tallennusrajan<white>{max_storages}</white><gray>. Otetut tallennustilat:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>ProfiiliasiRDRei voitu ladata, joten tallennustilan ostot eivät ole käytettävissä.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Osta{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Tiedot] Vaatimusselain</gradient>"
    lore:
      - "<gray>Ostotaso:</gray><white>{purchase_number}</white>"
      - "<gray>Avaa tallennustilan lukituksen:</gray><white>{storage_number}</white>"
      - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
      - "<gray>Tämänhetkinen:</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Ilmainen] Ei vaatimuksia</gradient>"
    lore:
      - "<gray>Tällä ostotasolla ei ole määritettyjä vaatimuksia.</gray>"
      - "<yellow>Voit ostaa tämän tallennustilan ilman ylimääräisiä shekkejä.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Avain:</gray><white>{requirement_key}</white>"
      - "<gray>Tyyppi:</gray><white>{requirement_type}</white>"
      - "<gray>Tila:</gray><white>{status}</white>"
      - "<gray>Edistyminen:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Yhteenveto:</gray><white>{summary}</white>"
      - "<yellow>Napsauta hiiren kakkospainikkeella tuotetta tai valuuttavaatimuksia pankin edistymiseen.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Yksityiskohtaiset tarkastukset</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ei saatavilla]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> on nyt valmis.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Tallennettu edistyminen kohteelle <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Yhtään vastaavaa tuotetta tai valuuttaa ei ollut saatavilla<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>ei tue pankkisiirtoa.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>ei ole saatavilla juuri nyt.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>ProfiiliasiRDRei voitu ladata, joten edistymistä ei voitu tallentaa.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Holvi] Tallennuksesi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Tiedot] Tallennuskapasiteetti</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<gray>Käytä tätä luetteloa tarkistaaksesi</gray>"
      - "<gray>pysyvät säilytyssäiliöt.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Laatikko]{storage_key}</gradient>"
    lore:
      - "<gray>Tallennusavain:</gray><white>{storage_key}</white>"
      - "<gray>Omistaja:</gray><white>{owner_name}</white>"
      - "<gray>Pääsy:</gray><white>{access_level}</white>"
      - "<gray>Pikanäppäin:</gray><white>{hotkey_display}</white>"
      - "<gray>Käytetyt paikat:</gray><white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Saatavilla olevat paikat:</gray><white>{available_slots}</white>"
      - "<yellow>Tämä tallennustila on valmis kohteiden säilymistä varten.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Napsauta hiiren kakkospainikkeella avataksesi tämän tallennustilan.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Napsauta hiiren kakkospainikkeella avataksesi tallennusasetukset.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Omistaja]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Julkinen]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Luotettu]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Tallennustilaa ei löytynyt</gradient>"
    lore:
      - "<gray>Tallennustilaa ei ole tällä hetkellä liitetty</gray>"
      - "<gray>profiiliisiRDR.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Profiili puuttuu</gradient>"
    lore:
      - "<gray>PelaajaprofiilisiRDRei voinut</gray>"
      - "<gray>ladataan pysyvästä tallennustilasta.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#]{storage_key}Asetukset</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Tiedot] Tallennusasetukset</gradient>"
    lore:
      - "<gray>Tallennusavain:</gray><white>{storage_key}</white>"
      - "<gray>Omistaja:</gray><white>{owner_name}</white>"
      - "<gray>Käyttöoikeutesi:</gray><white>{access_level}</white>"
      - "<gray>Pikanäppäin:</gray><white>{hotkey_display}</white>"
      - "<gray>Associates:</gray><white>{associate_count}</white>"
      - "<gray>Luotettu:</gray><white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Omistaja]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Julkinen]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Luotettu]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Ryhmä] Luotettu käyttöoikeus</gradient>"
    lore:
      - "<gray>Associates:</gray><white>{associate_count}</white>"
      - "<gray>Luotettu:</gray><white>{trusted_count}</white>"
      - "<yellow>Klikkaa hallitaksesi kuka voi tallettaa</yellow>"
      - "<yellow>tai käytä tätä tallennustilaa kokonaan.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Tallennuksen pikanäppäin</gradient>"
    lore:
      - "<gray>Nykyinen pikanäppäin:</gray><white>{hotkey_display}</white>"
      - "<yellow>Klikkaa sitoaksesi nopean pääsyn kohteelle</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Luotettu lukittu</gradient>"
    lore:
      - "<gray>Vain tallennustilan omistaja voi hallita</gray>"
      - "<gray>tämän tallennustilan luotettu käyttöoikeus.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Pikanäppäin lukittu</gradient>"
    lore:
      - "<gray>Vain tallennustilan omistaja voi muuttaa</gray>"
      - "<gray>tallennuspikanäppäimet.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Ilmainen] Asetukset lukittu</gradient>"
    lore:
      - "<gray>Tallennusasetusten muutokset on poistettu käytöstä</gray>"
      - "<gray>in<white>RDRIlmainen</white><gray>.</gray>"
      - "<yellow>Päivitä Premiumiin muokataksesi asetuksia.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] tallennustila puuttuu</gradient>"
    lore:
      - "<gray>Tätä tallennustilaa ei voitu ladata</gray>"
      - "<gray>asetusnäkymään.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Ryhmä]{storage_key}Pääsy</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Tiedot] Jaettu käyttöoikeus</gradient>"
    lore:
      - "<gray>Tallennusavain:</gray><white>{storage_key}</white>"
      - "<gray>Omistaja:</gray><white>{owner_name}</white>"
      - "<gray>Associates:</gray><white>{associate_count}</white>"
      - "<gray>Luotettu:</gray><white>{trusted_count}</white>"
      - "<yellow>Klikkaa soitinta siirtyäksesi sisään.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Julkinen]{player}</gradient>"
      lore:
        - "<gray>Tila:</gray><white>Julkinen</white>"
        - "<gray>Ei talletus- tai kotiutusoikeutta.</gray>"
        - "<yellow>Ylennä kumppaniksi napsauttamalla.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associate]{player}</gradient>"
      lore:
        - "<gray>Tila:</gray><white>Associate</white>"
        - "<gray>Voi tallettaa, mutta ei nostaa.</gray>"
        - "<yellow>Ylennä luotetuksi napsauttamalla.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Luotettu]{player}</gradient>"
      lore:
        - "<gray>Tila:</gray><white>Luotettu</white>"
        - "<gray>Voi tallettaa ja nostaa kohteita.</gray>"
        - "<yellow>Palauta Julkinen napsauttamalla.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Julkinen]</gradient><gray>{player}ei voi enää käyttää tallennustilaa.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associate]</gradient><gray>{player}voi nyt tallettaa tähän tallennustilaan.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Luotettu]</gradient><gray>{player}voi nyt tallettaa ja nostaa tästä tallennustilasta.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Vain tallennustilan omistaja voi muuttaa luotettua käyttöoikeutta.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Vain omistaja</gradient>"
      lore:
        - "<gray>Voit tarkastella tätä tallennustilaa, mutta vain</gray>"
        - "<gray>omistaja voi muuttaa luotettua käyttöoikeutta.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] tallennustila puuttuu</gradient>"
      lore:
        - "<gray>Tätä tallennustilaa ei voitu ladata</gray>"
        - "<gray>luotetun käyttöoikeuksien hallintaan.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Tätä tallennustilaa ei voitu ladata luotettavaa käyttöoikeuksien hallintaa varten.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Ilmainen] Asetukset lukittu</gradient>"
      lore:
        - "<gray>Luotetun pääsyn muutokset on poistettu käytöstä</gray>"
        - "<gray>in<white>RDRIlmainen</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Pelaajia ei löytynyt</gradient>"
      lore:
        - "<gray>Muita tunnettuja pelaajia ei ole saatavilla</gray>"
        - "<gray>luotetun käyttöoikeuden määrittämiseksi.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Laatikko]{storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] tallennustila puuttuu</gradient>"
    lore:
      - "<gray>Tätä tallennustietoa ei löytynyt</gray>"
      - "<gray>pidennetylleRDR-profiilillesi.</gray>"

