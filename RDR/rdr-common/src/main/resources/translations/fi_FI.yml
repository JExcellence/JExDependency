  fallback: "<gradient:#6b7280:#9ca3af>[Sivu]%page%</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>[<-] Return</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Palaa takaisin napsauttamalla</gradient>"
