      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Muokkaa arvoja kohteesta</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Kirjoitetut asetukset avautuvat vastaavassa lasimaalausalasineditorissa.</gray>"
        - "<yellow>Napsauta avataksesi konfigurointiohjaimet.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin Integrations</gradient>"
      lore:
        - "<gray>Hallitse taitoja, töitä, valuuttaa ja PlaceholderAPI-työkaluja.</gray>"
        - "<gray>Avaa integraatiokohtaiset järjestelmänvalvojan ohjaimet.</gray>"
        - "<yellow>Napsauta avataksesi integroinnin hallinnan.</yellow>"
