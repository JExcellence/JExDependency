      lore:
        - "<gray>Tila:</gray> <white>Associate</white>"
        - "<gray>Voit tallettaa, mutta et voi vetäytyä.</gray>"
        - "<yellow>Klikkaa edistää luotettava.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Luotettu] {player}</gradient>"
      lore:
        - "<gray>Tila:</gray> <white>Luotettu</white>"
        - "<gray>Voit tallettaa ja peruuttaa kohteita.</gray>"
        - "<yellow>Klikkaa nollata julkisesti.</yellow>"
