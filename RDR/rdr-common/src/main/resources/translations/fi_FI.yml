  title: "<gradient:#22c55e:#14b8a6>[Ply] Player & Group Controls</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Storage Admin Toolkit</gradient>"
    lore:
      - "<gray>Muokkaa maksimitallennustilaa ja alennuksia pelaajille ja ryhmille.</gray>"
      - "<gray>Pakota varastojen tyhjennys/nollaus tai sulje kaikki avoimet RDR-näkymät.</gray>"
      - "<yellow>Vaatii:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Player Overrides</gradient>"
      lore:
        - "<gray>Selaa online-pelaajia ja määritettyjä ohituskohteita.</gray>"
        - "<gray>Muokkaa pelaajakohtaista enimmäistallennustilaa ja alennusarvoja.</gray>"
        - "<yellow>Napsauta avataksesi soittimen ohitukset.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Ryhmän ohitukset</gradient>"
      lore:
        - "<gray>Valitse LuckPerms-ryhmä ja aseta ohitusarvot.</gray>"
        - "<gray>Hyödyllinen lupaperusteisille sijoitustasoille.</gray>"
        - "<yellow>Napsauta avataksesi ryhmän ohitukset.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Force Drain Storage</gradient>"
      lore:
        - "<gray>Tyhjentää kaiken sisällön valitusta tallennustilasta.</gray>"
        - "<gray>Säilyttää luotetut asetukset, velat ja pikanäppäinarvot.</gray>"
        - "<yellow>Valitse tallennustila napsauttamalla.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Pakota tallennustilan nollaus</gradient>"
      lore:
        - "<gray>Palauttaa valitun tallennustilan puhtaaseen tilaan.</gray>"
        - "<gray>Tyhjentää kohteet, velat, luotetut käyttöoikeudet ja pikanäppäimet.</gray>"
        - "<yellow>Valitse tallennustila napsauttamalla.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Pakota sulkemaan kaikki RDR-näkymät</gradient>"
      lore:
        - "<gray>Sulkee kaikki avoinna olevat RDR-valikot.</gray>"
        - "<gray>Hyödyllinen asetusten muutosten tai hätätoimenpiteiden jälkeen.</gray>"
        - "<yellow>Napsauta sulkeaksesi kaikki RDR-näkymät.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Järjestelmänvalvojan käyttöoikeudet vaaditaan</gradient>"
      lore:
        - "<gray>Sinulla ei ole lupaa käyttää tätä valikkoa.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sinulla ei ole lupaa käyttää pelaajan/ryhmän järjestelmänvalvojan ohjaimia.</gray>"
