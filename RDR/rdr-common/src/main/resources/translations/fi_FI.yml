prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Varastointitilastot</gradient>"
  items: "<gray>Erät yhteensä:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Käytettävissä olevat lähtö- ja saapumisajat:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Saadut varastot:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Varastohuvila</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Holvi] Varaston yhteenveto</gradient>"
    lore:
      - "<gray>Omistetut varastot:</gray> <white>{owned_storages}</white>"
      - "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"
      - "<gray>Holviverkkosi on säilynyt.</gray>"
      - "<gray>ja valmis ristipalvelijoihin.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Näytä muistit</gradient>"
    lore:
      - "<gray>Omistetut varastot:</gray> <white>{owned_storages}</white>"
      - "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"
      - "<yellow>Klikkaa selataksesi tallennuslistaasi.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Varasto</gradient>"
    lore:
      - "<gray>Omistetut varastot:</gray> <white>{owned_storages}</white>"
      - "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"
      - "<yellow>Klikkaa ostaa toinen varastointi.</yellow>"

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Varasto</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Varastokapasiteetti</gradient>"
    lore:
      - "<gray>Omistetut varastot:</gray> <white>{owned_storages}</white>"
      - "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"
      - "<gray>Osta lisää holvitilaa kunnes</gray>"
      - "<gray>Pääset asetettuun korkkiin.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Varastovaatimukset</gradient>"
    lore:
      - "<gray>Asetetut vaatimukset:</gray> <white>{requirement_count}</white>"
      - "<gray>Tämänhetkinen vaatimusluku:</gray> <white>{requirements}</white>"
      - "<gray>Tila:</gray> <white>{availability}</white>"
      - "<yellow>Napsauta tarkastaaksesi kaikki vaatimukset.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ei mitään]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Valmiina]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>-Ei.</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Osta tallennus</gradient>"
      lore:
        - "<gray>Asetetut vaatimukset:</gray> <white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray> <white>{requirements}</white>"
        - "<gray>Omistetut varastot:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klikkaa ostaa kun jokainen vaatimus täyttyy.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Vaatimukset</gradient>"
      lore:
        - "<gray>Asetetut vaatimukset:</gray> <white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray> <white>{requirements}</white>"
        - "<gray>Omistetut varastot:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Täytä loput vaatimukset ennen ostamista.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Tallennusraja saavutettu</gradient>"
      lore:
        - "<gray>Omistetut varastot:</gray> <white>{owned_storages}/{max_storages}</white>"
        - "<gray>Et voi ostaa lisää varastoja</gray>"
        - "<gray>kunnes yleinen yläraja nostetaan.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Offline-vaatimukset</gradient>"
      lore:
        - "<gray>Yksi tai useampi määritetty varastovaatimus</gray>"
        - "<gray>ei voida ratkaista tällä palvelimella.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profiili puuttuu</gradient>"
      lore:
        - "<gray>Sinun RDR profiilia ei voitu ladata,</gray>"
        - "<gray>joten ostot ovat tilapäisesti estetty.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Ostettu <white>{storage_key}</white><gray>. Kulutetut vaatimukset:</gray> <white>{requirements}</white><gray>. Omistetut varastot:</gray> <white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Et tapaa tällä hetkellä <white>{requirement}</white><gray>. Varastointivaatimukset:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Varaston vaatimus <white>{requirement}</white><gray> Se ei ole käytettävissä tai virheellinen juuri nyt.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Varaston ostoihin ei ole asetettu vaatimuksia juuri nyt.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Olet saavuttanut säilytysrajan <white>{max_storages}</white><gray>. Omistetut varastot:</gray> <white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Sinun RDR profiilia ei voitu ladata, joten varastointiostoksia ei ole saatavilla.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Osto {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] vaatimusselain</gradient>"
    lore:
      - "<gray>Hankintataso:</gray> <white>{purchase_number}</white>"
      - "<gray>Avaa tallennus:</gray> <white>{storage_number}</white>"
      - "<gray>Asetetut vaatimukset:</gray> <white>{requirement_count}</white>"
      - "<gray>Nykyinen kokous:</gray> <white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Vapaa] Ei vaatimuksia</gradient>"
    lore:
      - "<gray>Tällä ostotasolla ei ole konfiguroituja vaatimuksia.</gray>"
      - "<yellow>Voit ostaa tämän varaston ilman ylimääräisiä tarkastuksia.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>...</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>...</gradient>"
    filled: "<gradient:#10b981:#34d399></gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req] {requirement_name}</gradient>"
    lore:
      - "<gray>Avain:</gray> <white>{requirement_key}</white>"
      - "<gray>Tyyppi:</gray> <white>{requirement_type}</white>"
      - "<gray>Tila:</gray> <white>{status}</white>"
      - "<gray>Edistyminen:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Yhteenveto:</gray> <white>{summary}</white>"
      - "<yellow>Oikean napsautuksen kohde tai valuuttavaatimukset pankin edistymistä.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>Yksityiskohtaiset tarkastukset</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>-Ei.</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ei saatavilla]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399></gradient> <gray><white>{requirement}</white><gray> Se on nyt valmis.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>...</gradient> <gray>Tallennettu edistyminen <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>...</gradient> <gray>Vastaavaa erää tai valuuttaa ei ollut saatavilla <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> ei tue pankin edistymistä.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> Hän ei ole käytettävissä juuri nyt.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Sinun RDR profiilia ei voitu ladata, joten edistystä ei voitu tallentaa.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>Varastot</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Varastokapasiteetti</gradient>"
    lore:
      - "<gray>Omistetut varastot:</gray> <white>{owned_storages}</white>"
      - "<gray>Enimmäisvarastot:</gray> <white>{max_storages}</white>"
