    lease_lost: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Muokkausistuntosi kohteelle{storage_key}on vanhentunut tai siirretty muualle. Muutoksia ei tallennettu.</gray>"
    save_failed: "<gradient:#ef4444:#f87171>[!]</gradient><gray>{storage_key}ei voitu tallentaa. Katso lisätietoja konsolista.</gray>"
    hotkey_saved: "<gradient:#10b981:#34d399>[#]</gradient><gray>{storage_key}on nyt sidottu<white>/rr{hotkey}</white><gray>.</gray>"
    hotkey_missing: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Tallennustilaa ei ole sidottu<white>/rr{hotkey}</white><gray>.</gray>"
    hotkey_invalid: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Pikanäppäinten on oltava välillä <white>1</white> ja <white>{max_hotkeys}</white><gray>.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Tallennusasetusten muokkaukset on poistettu käytöstä<white>RDRFree</white><gray>.</gray>"
    scoreboard_enabled: "<gradient:#10b981:#34d399>[+]</gradient><gray>Otti käyttöön<white>/rr-tulostaulun</white><gray>-sivupalkin.</gray>"
    scoreboard_disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient><gray>poistettu<white>/rrtulostaulu</white><gray>sivupalkki.</gray>"
    scoreboard_syntax: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Käyttö:</gray><white>/rrtulostaulu</white>"

page:
