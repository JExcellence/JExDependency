    lore:
      - "<gray>Avain:</gray><white>{requirement_key}</white>"
      - "<gray>Tyyppi:</gray><white>{requirement_type}</white>"
      - "<gray>Tila:</gray><white>{status}</white>"
      - "<gray>Edistyminen:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Yhteenveto:</gray><white>{summary}</white>"
      - "<yellow>Napsauta hiiren kakkospainikkeella tuotetta tai valuuttavaatimuksia pankin edistymiseen.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Yksityiskohtaiset tarkastukset</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ei saatavilla]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> on nyt valmis.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Tallennettu edistyminen kohteelle <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Yhtään vastaavaa tuotetta tai valuuttaa ei ollut saatavilla<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>ei tue pankkisiirtoa.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>ei ole saatavilla juuri nyt.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>ProfiiliasiRDRei voitu ladata, joten edistymistä ei voitu tallentaa.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Holvi] Tallennuksesi</gradient>"
  summary:
