  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Player Controls</gradient>"
      lore:
        - "<gray>Muokkaa pelaajien/ryhmien rajoja, alennuksia ja tallennusvoiman säätimiä.</gray>"
        - "<gray>Avaa ohituseditorit ja hätätilanteiden hallintatoiminnot.</gray>"
        - "<yellow>Napsauta avataksesi soittimen ohjaimet.</yellow>"
