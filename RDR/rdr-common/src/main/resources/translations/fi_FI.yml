    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Varasto puuttuu</gradient>"
      lore:
        - "<gray>Tätä varastointia ei voitu ladata</gray>"
        - "<gray>Luotettu pääsy hallinta.</gray>"
