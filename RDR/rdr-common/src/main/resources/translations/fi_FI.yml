      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Tarkista kerätyt kauppaveron saldot valuutoittain.</gray>"
        - "<gray>Poista palvelin-pankkisaldot järjestelmänvalvojan tilillesi.</gray>"
        - "<yellow>Avaa kauppaveropankkien valvonta napsauttamalla.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Valuutta] Valuuttapäällikkö</gradient>"
      lore:
        - "<gray>Tarkista havaitut valuutat Holvista ja JExEconomystä.</gray>"
        - "<gray>Luo oletusarvo</gray> <white>raindrops</white> <gray>valuuttaa tarvittaessa.</gray>"
        - "<yellow>Napsauta avataksesi valuuttasäätimet.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Taito] Taitovaatimukset</gradient>"
      lore:
        - "<gray>Tarkista tuetut taitolaajennukset ja tunnistustila.</gray>"
        - "<gray>Käytä oletustaitovaatimuksia kaikille tallennustilan ostotasoille.</gray>"
        - "<yellow>Napsauta avataksesi taitovaatimusten säätimet.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Työ] Työn vaatimukset</gradient>"
      lore:
        - "<gray>Tarkista tuetut työlaajennukset ja tunnistuksen tila.</gray>"
        - "<gray>Käytä oletustyön vaatimuksia kaikille tallennustilan ostotasoille.</gray>"
        - "<yellow>Napsauta avataksesi työvaatimusten hallintalaitteet.</yellow>"
