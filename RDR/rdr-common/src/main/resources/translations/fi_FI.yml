    access:
      owner: "<gradient:#10b981:#34d399>[Outner]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Julkinen]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Assosiaatio]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Luotettu]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Ei varastoja</gradient>"
    lore:
      - "<gray>Tällä hetkellä ei ole liitettyjä varastoja</gray>"
