      associate: "<gradient:#f59e0b:#fbbf24>[Assosiaatio]</gradient> <gray>{player} voi nyt tallettaa tähän varastoon.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Luotettu]</gradient> <gray>{player} voi nyt tallettaa ja vetäytyä tästä varastosta.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vain varaston omistaja voi vaihtaa luotettavan pääsyn.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Vain omistaja</gradient>"
      lore:
        - "<gray>Voit nähdä tämän varaston, mutta vain</gray>"
