    unlimited: "<gradient:#22c55e:#86efac>[Rajoittamaton]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Näytä tallennustilat</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<yellow>Selaa tallennusluetteloa napsauttamalla.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Tallennusmyymälä</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
