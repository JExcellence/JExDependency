      - "<gray>Lätkä:</gray> <white>{hotkey_display}</white>"
      - "<gray>Kumppanit:</gray> <white>{associate_count}</white>"
      - "<gray>Luotettu:</gray> <white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Outner]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Julkinen]</gradient>"
