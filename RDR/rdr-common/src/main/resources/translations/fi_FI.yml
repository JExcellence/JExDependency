prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Tallennustilastot</gradient>"
  items: "<gray>Tuotteita yhteensä:</gray><white>{total_items}</white>"
  available_slots: "<gray>Saatavilla olevat paikat:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Hankitut tallennustilat:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksimaalinen tallennustila:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Tallennuskeskus</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Holvi] Tallennusyhteenveto</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<gray>Holviverkkosi on säilynyt</gray>"
      - "<gray>ja valmis palvelinten väliseen käyttöön.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Näytä tallennustilat</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<yellow>Selaa tallennusluetteloa napsauttamalla.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Tallennusmyymälä</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<yellow>Osta toinen tallennustila napsauttamalla.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Tallennuksen järjestelmänvalvoja</gradient>"
    lore:
      - "<gray>Avaa etuoikeutetut RDR järjestelmänvalvojan ohjaimet.</gray>"
      - "<gray>Hallitse valuutantarjoajia ja oletusasetuksia.</gray>"
      - "<yellow>Vaatii:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Varastoinnin ohjaus</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Hallintapaneeli</gradient>"
    lore:
      - "<gray>Hallitse etuoikeutettuja tallennusjärjestelmiä yhdestä paikasta.</gray>"
      - "<gray>Kayta tata paneelia muokataksesi asetusarvoja ja valuuttatukea.</gray>"
      - "<yellow>Vaatii:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Tallennusasetukset</gradient>"
      lore:
        - "<gray>Muokkaa arvoja kohteesta</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Jokaista muokattavaa asetusta voidaan muuttaa alasinkehotteen avulla.</gray>"
        - "<yellow>Napsauta avataksesi konfigurointiohjaimet.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Valuuttapäällikkö</gradient>"
      lore:
        - "<gray>Tarkista havaitut valuutat kaupoista Vault ja JExEconomy.</gray>"
        - "<gray>Luo oletusarvo</gray> <white>raindrops</white> <gray>valuuttaa tarvittaessa.</gray>"
        - "<yellow>Napsauta avataksesi valuuttasäätimet.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Järjestelmänvalvojan käyttöoikeudet vaaditaan</gradient>"
      lore:
        - "<gray>Sinulla ei ole lupaa käyttää tätä hallintapaneelia.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Valuuttapäällikkö</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Valuutantarjoajat</gradient>"
    lore:
      - "<gray>Havaitut valuutat:</gray> <white>{currency_count}</white>"
      - "<gray>Vault saatavilla:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy saatavilla:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Käytä kristallipainiketta luodaksesi oletusvaluutta.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Palveluntarjoaja:</gray> <white>{provider}</white>"
      - "<gray>Symboli:</gray> <white>{symbol}</white>"
      - "<gray>Etuliite:</gray> <white>{prefix}</white>"
      - "<gray>Suffiksi:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Luoda {currency_id}</gradient>"
      lore:
        - "<gray>Luo oletusvaluutta RDR valuuttana JExEconomy.</gray>"
        - "<yellow>Luo {currency_id} klikkaamalla.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Pakollinen</gradient>"
      lore:
        - "<gray>Et voi luoda oletusvaluuttaa ilman JExEconomy.</gray>"
        - "<gray>Asenna ja ota käyttöön JExEconomy ensin.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Valmis</gradient>"
      lore:
        - "<gray>Oletusvaluutta on jo olemassa.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Luotu oletusvaluutta:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Valuutan luominen epäonnistui:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Valuutta on jo olemassa:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Et voi käyttää tätä painiketta, ellei JExEconomy ole käytettävissä.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Valuuttoja ei havaittu</gradient>"
      lore:
        - "<gray>Valuuttoja Vault tai JExEconomy ei havaittu.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Järjestelmänvalvojan käyttöoikeudet vaaditaan</gradient>"
      lore:
        - "<gray>Sinulla ei ole lupaa käyttää tätä valuuttanäkymää.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sinulla ei ole oikeutta hallita valuuttoja.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Tallennusasetukset</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Tiedot]</gradient> <white>Määritysasetukset</white>"
    lore:
      - "<gray>Muokattavat asetukset havaittu:</gray> <white>{setting_count}</white>"
      - "<gray>Napsauta mitä tahansa alla olevaa merkintää muokataksesi sen arvoa alasimessa.</gray>"
      - "<yellow>Muutokset kirjoitetaan suoraan tiedostoon config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Sarja]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Polku:</gray> <white>{config_path}</white>"
      - "<gray>Tyyppi:</gray> <white>{value_type}</white>"
      - "<gray>Nykyinen arvo:</gray> <white>{current_value}</white>"
      - "<yellow>Napsauta muokataksesi tätä asetusta.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Kokonaisluku]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[pitkä]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Kaksinkertainen]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Lista]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[merkkijono]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Ei muokattavia asetuksia</white>"
      lore:
        - "<gray>Muokattavia skalaari-/luetteloasetusasetuksia ei löytynyt.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Järjestelmänvalvojan käyttöoikeudet vaaditaan</white>"
      lore:
        - "<gray>Sinulla ei ole lupaa käyttää tätä asetusnäkymää.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Asetusten muokkaus lukittu</white>"
      lore:
        - "<gray>Tämä versio ei salli ajonaikaisten asetusten muokkauksia.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sinulla ei ole oikeutta muokata määritysasetuksia.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Määritysten muokkaus on lukittu tässä versiossa.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Päivitetty<white>{config_path}</white><gray>to<white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Muokata{config_path}"
  input:
    lore:
      - "<gray>Polku:</gray> <white>{config_path}</white>"
      - "<gray>Tyyppi:</gray> <white>{value_type}</white>"
      - "<gray>Nykyinen arvo:</gray> <white>{current_value}</white>"
      - "<yellow>Syötä uusi arvo ja vahvista.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Virheellinen syöte tyypille<white>{value_type}</white><gray>. Syöte:</gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Tallennusmyymälä</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Tiedot] Tallennuskapasiteetti</gradient>"
    lore:
      - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}</white>"
      - "<gray>Tallennustilojen enimmäismäärä:</gray><white>{max_storages}</white>"
      - "<gray>Osta lisää varastotilaa</gray>asti"
      - "<gray>saavutat määritetyn rajan.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Kaupan vaatimukset</gradient>"
    lore:
      - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
      - "<gray>Nykyinen tarvemäärä:</gray><white>{requirements}</white>"
      - "<gray>Tila:</gray><white>{availability}</white>"
      - "<yellow>Tarkista jokainen vaatimustaso napsauttamalla tätä.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Ei mitään]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Valmis]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Osta tallennustila</gradient>"
      lore:
        - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray><white>{requirements}</white>"
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Klikkaa ostaaksesi, kun kaikki vaatimukset täyttyvät.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Vaatimukset vireillä</gradient>"
      lore:
        - "<gray>Määritetyt vaatimukset:</gray><white>{requirement_count}</white>"
        - "<gray>Nykyiset vaatimukset:</gray><white>{requirements}</white>"
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Täytä loput vaatimukset ennen ostamista.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Tallennusraja saavutettu</gradient>"
      lore:
        - "<gray>Omistat tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Et voi ostaa lisää tallennustilaa</gray>"
        - "<gray>kunnes yleistä ylärajaa nostetaan.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Vaatimukset offline-tilassa</gradient>"
      lore:
        - "<gray>Yksi tai useampi määritetty myymälävaatimus</gray>"
        - "<gray>ei voida ratkaista tällä palvelimella.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profiili puuttuu</gradient>"
      lore:
        - "<gray>RDR-profiiliasi ei voitu ladata,</gray>"
        - "<gray>joten ostot estetään väliaikaisesti.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Ostettu<white>{storage_key}</white><gray>. Kulutetut vaatimukset:</gray><white>{requirements}</white><gray>. Otetut tallennustilat:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Et tällä hetkellä täytä<white>{requirement}</white><gray>. Kaupan vaatimukset:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Myymälävaatimus<white>{requirement}</white><gray>ei ole saatavilla tai on virheellinen juuri nyt.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Määritettyjä kauppavaatimuksia ei ole tällä hetkellä saatavilla tallennustilaosteille.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Olet saavuttanut tallennusrajan<white>{max_storages}</white><gray>. Otetut tallennustilat:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>ProfiiliasiRDRei voitu ladata, joten tallennustilan ostot eivät ole käytettävissä.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Osta{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Tiedot] Vaatimusselain</gradient>"
