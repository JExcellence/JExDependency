    admin_opened: "<gradient:#a78bfa:#c4b5fd>[Admin]</gradient> <gray>Abriu o painel de controle administrativo RDR.</gray>"
    config_edit_disabled: "<gradient:#ef4444:#f87171>[X]</gradient><gray>As edições de configuração de armazenamento estão desativadas em<white>RDRLivre</white><gray>.</gray>"
