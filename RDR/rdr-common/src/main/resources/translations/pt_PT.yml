        - "<gray>Nenhum alvo do jogador foi fornecido para este editor.</gray>"
    player_missing_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nenhum jogador alvo foi selecionado.</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>O serviço de configurações de jogador/grupo não está disponível no momento.</gray>"
    player_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Todas as substituições foram apagadas para <branco>{player_name}</white> <gray>(</gray><white>{player_uuid}</white><gray>).</gray>"

storage_admin_group_edit_ui:
