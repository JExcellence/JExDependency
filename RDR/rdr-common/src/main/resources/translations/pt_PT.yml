prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Estatísticas de armazenamento</gradient>"
  items: "<gray>Total de itens:</gray><white>{total_items}</white>"
  available_slots: "<gray>Slots disponíveis:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Armazenamentos obtidos:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Hub de armazenamento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Resumo de armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Sua rede de cofre é persistente</gray>"
      - "<gray>e pronto para uso entre servidores.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Ver armazenamentos</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Clique para navegar na sua lista de armazenamento.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Clique para comprar outro armazenamento.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrador de armazenamento</gradient>"
    lore:
      - "<gray>Abra controles de administração RDR privilegiados.</gray>"
      - "<gray>Gerencie provedores de moeda e padrões.</gray>"
      - "<yellow>Requer:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Controle de armazenamento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Painel de administração RDR</gradient>"
    lore:
      - "<gray>Gerencie sistemas de armazenamento privilegiados em um só lugar.</gray>"
      - "<gray>Use este painel para editar valores de configuração e abrir controles de integração.</gray>"
      - "<yellow>Requer:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Controles do jogador</gradient>"
      lore:
        - "<gray>Edite limites de jogadores/grupos, descontos e controles de força de armazenamento.</gray>"
        - "<gray>Abra editores de substituição e ações de gerenciamento de emergência.</gray>"
        - "<yellow>Clique para abrir os controles do player.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuração de armazenamento</gradient>"
      lore:
        - "<gray>Edite valores de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>As configurações digitadas são abertas em um editor de bigorna de vitral correspondente.</gray>"
        - "<yellow>Clique para abrir os controles de configuração.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integrações de plug-ins</gradient>"
      lore:
        - "<gray>Gerencie ferramentas de habilidade, trabalho, moeda e PlaceholderAPI.</gray>"
        - "<gray>Abra controles administrativos específicos de integração.</gray>"
        - "<yellow>Clique para abrir o gerenciamento de integração.</yellow>"
    trade_bank:
      name: "<gradient:#f59e0b:#fbbf24>[Tax] Trade Server Bank</gradient>"
      lore:
        - "<gray>Revisar saldos de impostos comerciais recolhidos por moeda.</gray>"
        - "<gray>Retirar saldos de servidor-banco para o seu administrador conta.</gray>"
        - "<yellow>Clique para abrir os controlos do banco fiscal comercial.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gerenciador de moeda</gradient>"
      lore:
        - "<gray>Revise as moedas detectadas no Vault e JExEconomy.</gray>"
        - "<gray>Crie a moeda padrão</gray> <white>raindrops</white> <gray>quando necessário.</gray>"
        - "<yellow>Clique para abrir os controles de moeda.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Habilidade] Requisitos de habilidade</gradient>"
      lore:
        - "<gray>Revise os plug-ins de habilidade suportados e o estado de detecção.</gray>"
        - "<gray>Aplique requisitos de habilidade padrão a todos os níveis de compra de armazenamento.</gray>"
        - "<yellow>Clique para abrir os controles de requisitos de habilidade.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Trabalho] Requisitos do Trabalho</gradient>"
      lore:
        - "<gray>Revise os plug-ins de trabalho suportados e o estado de detecção.</gray>"
        - "<gray>Aplicar requisitos de tarefa padrão a todas as camadas de compra de armazenamento.</gray>"
        - "<yellow>Clique para abrir controles de requisitos de tarefa.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para usar este painel de administração.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Controles de jogadores e grupos</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Kit de ferramentas de administração de armazenamento</gradient>"
    lore:
      - "<gray>Edite armazenamento máximo e descontos para jogadores e grupos.</gray>"
      - "<gray>Force a drenagem/redefinição de armazenamentos ou feche todas as visualizações RDR abertas.</gray>"
      - "<yellow>Requer:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Substituição de jogadores</gradient>"
      lore:
        - "<gray>Procure jogadores online e alvos de substituição configurados.</gray>"
        - "<gray>Edite o armazenamento máximo por jogador e os valores de desconto.</gray>"
        - "<yellow>Clique para abrir as substituições do jogador.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Substituições de grupo</gradient>"
      lore:
        - "<gray>Selecione um grupo LuckPerms e defina valores de substituição.</gray>"
        - "<gray>Útil para níveis de classificação baseados em permissão.</gray>"
        - "<yellow>Clique para abrir substituições de grupo.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Forçar drenagem de armazenamento</gradient>"
      lore:
        - "<gray>Limpa todo o conteúdo do item de um armazenamento selecionado.</gray>"
        - "<gray>Mantém configurações confiáveis, dívida e valores de teclas de atalho.</gray>"
        - "<yellow>Clique para escolher um armazenamento.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Forçar reinicialização de armazenamento</gradient>"
      lore:
        - "<gray>Redefine um armazenamento selecionado para um estado limpo.</gray>"
        - "<gray>Limpa itens, dívidas, acesso confiável e tecla de atalho.</gray>"
        - "<yellow>Clique para escolher um armazenamento.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Forçar fechamento de todas as visualizações RDR</gradient>"
      lore:
        - "<gray>Fecha todos os menus RDR atualmente abertos.</gray>"
        - "<gray>Útil após alterações de configuração ou ações de emergência.</gray>"
        - "<yellow>Clique para forçar o fechamento de todas as visualizações RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para usar este menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não tem permissão para usar controles de administração de jogador/grupo.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Fechado à força <branco>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Selecionar alvo de substituição de jogador</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Alvos de substituição de jogador</gradient>"
    lore:
      - "<gray>Jogadores rastreados:</gray> <white>{tracked_players}</white>"
      - "<gray>Substituições configuradas:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Clique em um jogador abaixo para editar substituições.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Armazenamento máximo de substituição:</gray> <white>{override_max_storages}</white>"
      - "<gray>Armazenamento máximo efetivo:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Desconto de substituição:</gray> <white>{override_discount}</white>"
      - "<gray>Desconto efetivo:</gray> <white>{effective_discount}</white>"
      - "<yellow>Clique para editar este perfil de substituição de jogador.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[Online]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Offline]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Herdar]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Nenhum jogador encontrado</gradient>"
      lore:
        - "<gray>Nenhum jogador online ou substituições de jogador armazenadas foram encontradas.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para procurar substituições de jogadores.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Editar {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Resumo de substituição do player</gradient>"
    lore:
      - "<gray>Player:</gray> <white>{player_name}</white>"
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Armazenamento máximo de substituição:</gray> <white>{override_max_storages}</white>"
      - "<gray>Armazenamento máximo efetivo:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Desconto de substituição:</gray> <white>{override_discount}</white>"
      - "<gray>Desconto efetivo:</gray> <white>{effective_discount}</white>"
    inherit: "<gradient:#6b7280:#9ca3af>[Herdar]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Ilimitado]</gradient>"
  actions:
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Máximo de armazenamentos</gradient>"
      lore:
        - "<gray>Armazenamento máximo de substituição:</gray> <white>{override_max_storages}</white>"
        - "<gray>Armazenamento máximo efetivo:</gray> <white>{effective_max_storages}</white>"
        - "<yellow>Clique para editar o máximo de armazenamentos.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Desconto da loja</gradient>"
      lore:
        - "<gray>Desconto de substituição:</gray> <white>{override_discount}</white>"
        - "<gray>Desconto efetivo:</gray> <white>{effective_discount}</white>"
        - "<yellow>Clique para editar a porcentagem de desconto.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Limpar substituições de jogador</gradient>"
      lore:
        - "<gray>Remove todas as substituições de armazenamento máximo e desconto.</gray>"
        - "<yellow>Clique para limpar as substituições deste jogador.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para editar substituições de jogadores.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não tem permissão para editar substituições de jogadores.</gray>"
    player_missing:
      name: "<gradient:#ef4444:#f87171>[X] Alvo do jogador ausente</gradient>"
