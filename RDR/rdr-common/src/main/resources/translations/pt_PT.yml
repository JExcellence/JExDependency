prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Estatísticas de armazenamento</gradient>"
  items: "<gray>Total de itens:</gray><white>{total_items}</white>"
  available_slots: "<gray>Slots disponíveis:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Armazenamentos obtidos:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Hub de armazenamento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Resumo de armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Sua rede de cofre é persistente</gray>"
      - "<gray>e pronto para uso entre servidores.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Ver armazenamentos</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Clique para navegar na sua lista de armazenamento.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<yellow>Clique para comprar outro armazenamento.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrador de armazenamento</gradient>"
    lore:
      - "<gray>Abra controles de administração RDR privilegiados.</gray>"
      - "<gray>Gerencie provedores de moeda e padrões.</gray>"
      - "<yellow>Requer:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Controle de armazenamento</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Painel de administração</gradient>"
    lore:
      - "<gray>Gerencie sistemas de armazenamento privilegiados em um só lugar.</gray>"
      - "<gray>Use este painel para configurar o suporte monetário.</gray>"
      - "<yellow>Requer:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gerenciador de moeda</gradient>"
      lore:
        - "<gray>Revise as moedas detectadas de Vault e JExEconomy.</gray>"
        - "<gray>Crie o padrão</gray> <white>raindrops</white> <gray>moeda quando necessário.</gray>"
        - "<yellow>Clique para abrir os controles de moeda.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para usar este painel de administração.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Gerenciador de moeda</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Provedores de moeda</gradient>"
    lore:
      - "<gray>Moedas detectadas:</gray> <white>{currency_count}</white>"
      - "<gray>Vault disponível:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy disponível:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Use o botão de cristal para criar a moeda padrão.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Provedor:</gray> <white>{provider}</white>"
      - "<gray>Símbolo:</gray> <white>{symbol}</white>"
      - "<gray>Prefixo:</gray> <white>{prefix}</white>"
      - "<gray>Sufixo:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Criar {currency_id}</gradient>"
      lore:
        - "<gray>Crie a moeda padrão RDR em JExEconomy.</gray>"
        - "<yellow>Clique para criar {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Obrigatório</gradient>"
      lore:
        - "<gray>Você não pode criar moeda padrão sem JExEconomy.</gray>"
        - "<gray>Instale e habilite JExEconomy primeiro.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Preparar</gradient>"
      lore:
        - "<gray>A moeda padrão já existe.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Moeda padrão criada:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Falha ao criar moeda:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>A moeda já existe:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não pode usar este botão a menos que JExEconomy esteja disponível.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Nenhuma moeda detectada</gradient>"
      lore:
        - "<gray>Nenhuma moeda Vault ou JExEconomy foi detectada.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Acesso de administrador necessário</gradient>"
      lore:
        - "<gray>Você não tem permissão para usar esta visualização de moeda.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não tem permissão para gerenciar moedas.</gray>"
  decoration:
    border:
      name: " "

storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Armazenamento</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Informações] Capacidade de armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Compre espaço adicional no cofre até</gray>"
      - "<gray>você atinge o limite configurado.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisitos de armazenamento</gradient>"
    lore:
      - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
      - "<gray>Contagem de requisitos atuais:</gray><white>{requirements}</white>"
      - "<gray>Status:</gray><white>{availability}</white>"
      - "<yellow>Clique para inspecionar cada nível de requisito detalhadamente.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Nenhum]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Pronto]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Off-line]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Comprar armazenamento</gradient>"
      lore:
        - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
        - "<gray>Requisitos atuais:</gray><white>{requirements}</white>"
        - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Clique para comprar quando todos os requisitos forem atendidos.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Requisitos pendentes</gradient>"
      lore:
        - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
        - "<gray>Requisitos atuais:</gray><white>{requirements}</white>"
        - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Atenda aos requisitos restantes antes de comprar.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Limite de armazenamento atingido</gradient>"
      lore:
        - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Você não pode comprar mais armazenamentos</gray>"
        - "<gray>até que o limite global seja aumentado.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Requisitos off-line</gradient>"
      lore:
        - "<gray>Um ou mais requisitos de armazenamento configurados</gray>"
        - "<gray>não pode ser resolvido neste servidor.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Perfil ausente</gradient>"
      lore:
        - "<gray>Seu perfilRDRnão pôde ser carregado,</gray>"
        - "<gray>portanto, as compras ficam temporariamente bloqueadas.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Comprado<white>{storage_key}</white><gray>. Requisitos consumidos:</gray><white>{requirements}</white><gray>. Armazenamentos próprios:</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Você não atende atualmente<white>{requirement}</white><gray>. Requisitos da loja:</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>O requisito da loja<white>{requirement}</white><gray>está indisponível ou é inválido no momento.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Nenhum requisito de armazenamento configurado está disponível para compras de armazenamento no momento.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Você atingiu o limite de armazenamento de<white>{max_storages}</white><gray>. Armazenamentos próprios:</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Seu perfilRDRnão pôde ser carregado, portanto, as compras de armazenamento não estão disponíveis.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Requerido] Compra{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Informações] Navegador de requisitos</gradient>"
    lore:
      - "<gray>Nível de compra:</gray><white>{purchase_number}</white>"
      - "<gray>Desbloqueia armazenamento:</gray><white>{storage_number}</white>"
      - "<gray>Requisitos configurados:</gray><white>{requirement_count}</white>"
      - "<gray>Atualmente atendido:</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratuito] Sem requisitos</gradient>"
    lore:
      - "<gray>Este nível de compra não tem requisitos configurados.</gray>"
      - "<yellow>Você pode comprar este armazenamento sem verificações extras.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Requerido]{requirement_name}</gradient>"
    lore:
      - "<gray>Chave:</gray><white>{requirement_key}</white>"
      - "<gray>Tipo:</gray><white>{requirement_type}</white>"
      - "<gray>Status:</gray><white>{status}</white>"
      - "<gray>Progresso:</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Resumo:</gray><white>{summary}</white>"
      - "<yellow>Clique com o botão direito no item ou nos requisitos de moeda para o progresso do banco.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Verificações detalhadas</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Conheceu]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Indisponível]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>agora está pronto.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>Progresso armazenado para<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient><gray>Nenhum item ou moeda correspondente estava disponível para<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>não suporta progresso armazenado.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>não está disponível no momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Seu perfilRDRnão pôde ser carregado, portanto o progresso não pôde ser salvo.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cofre] Seus armazenamentos</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informações] Capacidade de armazenamento</gradient>"
    lore:
      - "<gray>Armazenamentos próprios:</gray><white>{owned_storages}</white>"
      - "<gray>Armazenamento máximo:</gray><white>{max_storages}</white>"
      - "<gray>Use esta lista para revisar seu</gray>"
      - "<gray>contêineres de armazenamento persistentes.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Caixa]{storage_key}</gradient>"
    lore:
      - "<gray>Chave de armazenamento:</gray><white>{storage_key}</white>"
      - "<gray>Proprietário:</gray><white>{owner_name}</white>"
      - "<gray>Acesso:</gray><white>{access_level}</white>"
      - "<gray>Tecla de atalho:</gray><white>{hotkey_display}</white>"
      - "<gray>Slots usados:</gray><white>{stored_slots}/{inventory_size}</white>"
      - "<gray>Slots disponíveis:</gray><white>{available_slots}</white>"
      - "<yellow>Este armazenamento está pronto para persistência de item.</yellow>"
      - "<gradient:#38bdf8:#60a5fa>[>>] Clique com o botão esquerdo para abrir este armazenamento.</gradient>"
      - "<gradient:#f59e0b:#fbbf24>[#] Clique com o botão direito para abrir as configurações de armazenamento.</gradient>"
    access:
      owner: "<gradient:#10b981:#34d399>[Proprietário]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Público]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associado]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Confiável]</gradient>"
  empty:
    name: "<gradient:#ef4444:#f87171>[X] Nenhum armazenamento encontrado</gradient>"
    lore:
      - "<gray>Nenhum armazenamento está conectado no momento</gray>"
      - "<gray>para o seu perfilRDR.</gray>"
  missing:
    name: "<gradient:#ef4444:#f87171>[!] Perfil ausente</gradient>"
    lore:
      - "<gray>Seu perfil de jogadorRDRnão pôde</gray>"
      - "<gray>ser carregado do armazenamento persistente.</gray>"

storage_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>[#]{storage_key}Configurações</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informações] Configurações de armazenamento</gradient>"
    lore:
      - "<gray>Chave de armazenamento:</gray><white>{storage_key}</white>"
      - "<gray>Proprietário:</gray><white>{owner_name}</white>"
      - "<gray>Seu acesso:</gray><white>{access_level}</white>"
      - "<gray>Tecla de atalho:</gray><white>{hotkey_display}</white>"
      - "<gray>Associados:</gray><white>{associate_count}</white>"
      - "<gray>Confiável:</gray><white>{trusted_count}</white>"
    access:
      owner: "<gradient:#10b981:#34d399>[Proprietário]</gradient>"
      public: "<gradient:#6b7280:#9ca3af>[Público]</gradient>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associado]</gradient>"
      trusted: "<gradient:#10b981:#34d399>[Confiável]</gradient>"
  trusted:
    name: "<gradient:#10b981:#34d399>[Grupo] Acesso confiável</gradient>"
    lore:
      - "<gray>Associados:</gray><white>{associate_count}</white>"
      - "<gray>Confiável:</gray><white>{trusted_count}</white>"
      - "<yellow>Clique para gerenciar quem pode depositar</yellow>"
      - "<yellow>ou acesse totalmente este armazenamento.</yellow>"
  hotkey:
    name: "<gradient:#f59e0b:#fbbf24>[#] Tecla de atalho de armazenamento</gradient>"
    lore:
      - "<gray>Tecla de atalho atual:</gray><white>{hotkey_display}</white>"
      - "<yellow>Clique para vincular o acesso rápido a</yellow>"
      - "<yellow><white>/rr &lt;hotkey&gt;</white><yellow>.</yellow>"
  trusted_locked:
    name: "<gradient:#ef4444:#f87171>[X] Confiável bloqueado</gradient>"
    lore:
      - "<gray>Somente o proprietário do armazenamento pode gerenciar</gray>"
      - "<gray>acesso confiável para este armazenamento.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Tecla de atalho bloqueada</gradient>"
    lore:
      - "<gray>Somente o proprietário do armazenamento pode alterar</gray>"
      - "<gray>teclas de atalho de armazenamento.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Grátis] Configurações bloqueadas</gradient>"
    lore:
      - "<gray>As alterações nas configurações de armazenamento estão desativadas</gray>"
      - "<gray>em<white>RDRGrátis</white><gray>.</gray>"
      - "<yellow>Atualize para Premium para editar as configurações.</yellow>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Armazenamento ausente</gradient>"
    lore:
      - "<gray>Este armazenamento não pôde ser carregado</gray>"
      - "<gray>para a visualização de configurações.</gray>"

storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Grupo]{storage_key}Acesso</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informações] Acesso compartilhado</gradient>"
    lore:
      - "<gray>Chave de armazenamento:</gray><white>{storage_key}</white>"
      - "<gray>Proprietário:</gray><white>{owner_name}</white>"
      - "<gray>Associados:</gray><white>{associate_count}</white>"
      - "<gray>Confiável:</gray><white>{trusted_count}</white>"
      - "<yellow>Clique em um jogador para acessar o ciclo.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Público]{player}</gradient>"
      lore:
        - "<gray>Status:</gray><white>Público</white>"
        - "<gray>Sem acesso para depósito ou retirada.</gray>"
        - "<yellow>Clique para promover para Associado.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associado]{player}</gradient>"
      lore:
        - "<gray>Status:</gray><white>Associado</white>"
        - "<gray>Pode depositar, mas não pode sacar.</gray>"
        - "<yellow>Clique para promover para confiável.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Confiável]{player}</gradient>"
      lore:
        - "<gray>Status:</gray><white>Confiável</white>"
        - "<gray>Pode depositar e retirar itens.</gray>"
        - "<yellow>Clique para redefinir para Público.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Público]</gradient><gray>{player}não tem mais acesso ao armazenamento.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associado]</gradient><gray>{player}agora pode depositar neste armazenamento.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Confiável]</gradient><gray>{player}agora pode depositar e retirar deste armazenamento.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Somente o proprietário do armazenamento pode alterar o acesso confiável.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Somente proprietário</gradient>"
      lore:
        - "<gray>Você pode visualizar este armazenamento, mas apenas</gray>"
        - "<gray>o proprietário pode alterar o acesso confiável.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Armazenamento ausente</gradient>"
      lore:
        - "<gray>Este armazenamento não pôde ser carregado</gray>"
        - "<gray>para gerenciamento de acesso confiável.</gray>"
      message: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Este armazenamento não pôde ser carregado para gerenciamento de acesso confiável.</gray>"
    edition_locked:
      name: "<gradient:#ef4444:#f87171>[Grátis] Configurações bloqueadas</gradient>"
      lore:
        - "<gray>Alterações de acesso confiável estão desativadas</gray>"
        - "<gray>em<white>RDRGrátis</white><gray>.</gray>"
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Nenhum jogador encontrado</gradient>"
      lore:
        - "<gray>Nenhum outro jogador conhecido está disponível</gray>"
        - "<gray>para atribuir acesso confiável.</gray>"

storage_view:
  title: "<gradient:#38bdf8:#60a5fa>[Caixa]{storage_key}</gradient>"
  missing:
    name: "<gradient:#ef4444:#f87171>[X] Armazenamento ausente</gradient>"
    lore:
      - "<gray>Esta entrada de armazenamento não foi encontrada</gray>"
      - "<gray>para seu perfilRDRpersistente.</gray>"

