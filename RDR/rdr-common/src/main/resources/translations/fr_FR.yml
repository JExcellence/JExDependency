    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Stockages maximum du groupe</gradient>"
      lore:
        - "<gray>Remplacer les stockages maximum :</gray> <white>{override_max_storages}</white>"
        - "<yellow>Cliquez pour modifier les stockages maximum pour ce groupe.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Remise de groupe</gradient>"
      lore:
        - "<gray>Remise de remplacement :</gray> <white>{override_discount}</white>"
        - "<yellow>Cliquez pour modifier la remise pour ce groupe.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Effacer les remplacements de groupe</gradient>"
