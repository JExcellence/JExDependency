    action:
      force_drain: "<gradient:#f59e0b:#fbbf24>[Drain]</gradient>"
      force_reset: "<gradient:#ef4444:#f87171>[Reset]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Aucun stockage trouvé</gradient>"
      lore:
        - "<gray>Aucun enregistrement de stockage n'est actuellement disponible.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
