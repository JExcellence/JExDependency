    reset: "<gradient:#ef4444:#f87171>[Reset]</gradient> <gray>Réinitialisation forcée <blanc>{owner}</white>'s storage <white>{storage_key}</white><gray>vidangé de force. Vues fermées :</gray> <white>{closed_views}</white><gray>.</gray>"

