prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiques de stockage</gradient>"
  items: "<gray>Total des éléments :</gray><white>{total_items}</white>"
  available_slots: "<gray>Emplacements disponibles :</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Stockages obtenus :</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Stockages maximum :</gray><white>{max_storages}</white>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Concentrateur de stockage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Résumé du stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<gray>Votre réseau de coffre-fort est persistant</gray>"
      - "<gray>et prêt pour une utilisation inter-serveurs.</gray>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Afficher les stockages</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<yellow>Cliquez pour parcourir votre liste de stockage.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Magasin de stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<yellow>Cliquez pour acheter un autre espace de stockage.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrateur de stockage</gradient>"
    lore:
      - "<gray>Ouvrez les contrôles d’administration privilégiés RDR.</gray>"
      - "<gray>Gérez les fournisseurs de devises et les valeurs par défaut.</gray>"
      - "<yellow>Nécessite :</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Contrôle du stockage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Panneau d'administration RDR</gradient>"
    lore:
      - "<gray>Gérez les systèmes de stockage privilégiés à partir d’un seul endroit.</gray>"
      - "<gray>Utilisez ce panneau pour modifier les valeurs de configuration et la prise en charge des devises.</gray>"
      - "<yellow>Nécessite :</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuration du Stockage</gradient>"
      lore:
        - "<gray>Modifier les valeurs de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Chaque paramètre modifiable peut être modifié via une invite d'enclume.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de configuration.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gestionnaire de devises</gradient>"
      lore:
        - "<gray>Examinez les devises détectées dans Vault et JExEconomy.</gray>"
        - "<gray>Créer la valeur par défaut</gray> <white>raindrops</white> <gray>monnaie en cas de besoin.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de devises.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser ce panneau d'administration.</gray>"

storage_admin_currency_ui:
  title: "<gradient:#10b981:#34d399>[Cur] Gestionnaire de devises</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Fournisseurs de devises</gradient>"
    lore:
      - "<gray>Devises détectées :</gray> <white>{currency_count}</white>"
      - "<gray>Vault disponible :</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy disponible :</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Utilisez le bouton cristal pour créer la devise par défaut.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur] {currency_id}</gradient>"
    lore:
      - "<gray>Fournisseur:</gray> <white>{provider}</white>"
      - "<gray>Symbole:</gray> <white>{symbol}</white>"
      - "<gray>Préfixe:</gray> <white>{prefix}</white>"
      - "<gray>Suffixe:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+] Créer {currency_id}</gradient>"
      lore:
        - "<gray>Créez la devise RDR par défaut dans JExEconomy.</gray>"
        - "<yellow>Cliquez pour créer {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X] JExEconomy Obligatoire</gradient>"
      lore:
        - "<gray>Vous ne pouvez pas créer de devise par défaut sans JExEconomy.</gray>"
        - "<gray>Installez et activez d'abord JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#10b981:#34d399>[OK] {currency_id} Prêt</gradient>"
      lore:
        - "<gray>La devise par défaut existe déjà.</gray>"
    messages:
      created: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Devise par défaut créée :</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Échec de la création de la devise :</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>La devise existe déjà :</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous ne pouvez pas utiliser ce bouton à moins que JExEconomy ne soit disponible.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X] Aucune devise détectée</gradient>"
      lore:
        - "<gray>Aucune devise Vault ou JExEconomy n'a été détectée.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser cette vue monétaire.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous n'êtes pas autorisé à gérer les devises.</gray>"
  decoration:
    border:
      name: " "

storage_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuration du Stockage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Paramètres de configuration</white>"
    lore:
      - "<gray>Paramètres modifiables détectés :</gray> <white>{setting_count}</white>"
      - "<gray>Cliquez sur n'importe quelle entrée ci-dessous pour modifier sa valeur dans un anvil.</gray>"
      - "<yellow>Les modifications sont écrites directement dans config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Chemin :</gray> <white>{config_path}</white>"
      - "<gray>Type :</gray> <white>{value_type}</white>"
      - "<gray>Valeur actuelle :</gray> <white>{current_value}</white>"
      - "<yellow>Cliquez pour modifier ce paramètre.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Booléen]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Integer]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Long]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Double]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[List]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[String]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Aucun paramètre modifiable</white>"
      lore:
        - "<gray>Aucun paramètre de configuration scalaire/liste modifiable n'a été trouvé.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Accès administrateur requis</white>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser cette vue de configuration.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Modification de la configuration verrouillée</white>"
      lore:
        - "<gray>Cette édition n'autorise pas les modifications de la configuration d'exécution.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous n'êtes pas autorisé à modifier les paramètres de configuration.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>La modification de la configuration est verrouillée dans cette édition.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Mise à jour <white>{config_path}</white><gray> à <white>{updated_value}</white><gray>.</gray>"

storage_config_value_anvil_ui:
  title: "Modifier {config_path}"
  input:
    lore:
      - "<gray>Chemin :</gray> <white>{config_path}</white>"
      - "<gray>Type :</gray> <white>{value_type}</white>"
      - "<gray>Valeur actuelle :</gray> <white>{current_value}</white>"
      - "<yellow>Entrez la nouvelle valeur et confirmez.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Entrée non valide pour le type <white>{value_type}</white><gray>. Entrée : </gray> <white>{input}</white>"


storage_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Magasin de stockage</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Capacité de stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<gray>Achetez de l'espace de coffre-fort supplémentaire jusqu'au</gray>"
      - "<gray>vous atteignez le plafond configuré.</gray>"
  cost:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Exigences du magasin</gradient>"
    lore:
      - "<gray>Exigences configurées :</gray><white>{requirement_count}</white>"
      - "<gray>Nombre de besoins actuels :</gray><white>{requirements}</white>"
      - "<gray>Statut :</gray><white>{availability}</white>"
      - "<yellow>Cliquez pour inspecter chaque niveau d'exigence en détail.</yellow>"
    none: "<gradient:#ef4444:#f87171>[Aucun]</gradient>"
    availability:
      available: "<gradient:#10b981:#34d399>[Prêt]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[En attente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Hors ligne]</gradient>"
  purchase:
    available:
      name: "<gradient:#10b981:#34d399>[+] Acheter du stockage</gradient>"
      lore:
        - "<gray>Exigences configurées :</gray><white>{requirement_count}</white>"
        - "<gray>Exigences actuelles :</gray><white>{requirements}</white>"
        - "<gray>Stockages détenus :</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Cliquez pour acheter lorsque toutes les exigences sont remplies.</yellow>"
    pending:
      name: "<gradient:#f59e0b:#fbbf24>[...] Exigences en attente</gradient>"
      lore:
        - "<gray>Exigences configurées :</gray><white>{requirement_count}</white>"
        - "<gray>Exigences actuelles :</gray><white>{requirements}</white>"
        - "<gray>Stockages détenus :</gray><white>{owned_storages}/{max_storages}</white>"
        - "<yellow>Répondez aux exigences restantes avant d'acheter.</yellow>"
    limit_reached:
      name: "<gradient:#ef4444:#f87171>[X] Limite de stockage atteinte</gradient>"
      lore:
        - "<gray>Stockages détenus :</gray><white>{owned_storages}/{max_storages}</white>"
        - "<gray>Vous ne pouvez pas acheter d'espaces de stockage supplémentaires</gray>"
        - "<gray>jusqu'à ce que le plafond global soit augmenté.</gray>"
    no_requirements:
      name: "<gradient:#ef4444:#f87171>[!] Exigences hors ligne</gradient>"
      lore:
        - "<gray>Une ou plusieurs exigences de magasin configurées</gray>"
        - "<gray>ne peut pas être résolu sur ce serveur.</gray>"
    profile_missing:
      name: "<gradient:#ef4444:#f87171>[!] Profil manquant</gradient>"
      lore:
        - "<gray>Votre profilRDRn'a pas pu être chargé,</gray>"
        - "<gray>les achats sont donc temporairement bloqués.</gray>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient><gray>Acheté<white>{storage_key}</white><gray>. Exigences consommées :</gray><white>{requirements}</white><gray>. Stockages détenus :</gray><white>{owned_storages}/{max_storages}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Vous ne rencontrez pas actuellement<white>{requirement}</white><gray>. Exigences du magasin :</gray><white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient><gray>L'exigence du magasin<white>{requirement}</white><gray>n'est pas disponible ou n'est pas valide pour le moment.</gray>"
    no_requirements: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Aucune exigence de magasin configurée n'est disponible pour les achats de stockage pour le moment.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Vous avez atteint la limite de stockage de<white>{max_storages}</white><gray>. Stockages détenus :</gray><white>{owned_storages}</white>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Votre profilRDRn'a pas pu être chargé, les achats de stockage ne sont donc pas disponibles.</gray>"

storage_store_requirements_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Achat{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[Info] Navigateur d'exigences</gradient>"
    lore:
      - "<gray>Niveau d'achat :</gray><white>{purchase_number}</white>"
      - "<gray>Déverrouille le stockage :</gray><white>{storage_number}</white>"
      - "<gray>Exigences configurées :</gray><white>{requirement_count}</white>"
      - "<gray>Actuellement atteint :</gray><white>{met_count}</white>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratuit] Aucune exigence</gradient>"
    lore:
      - "<gray>Ce niveau d'achat n'a aucune exigence configurée.</gray>"
      - "<yellow>Vous pouvez acheter ce stockage sans chèques supplémentaires.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Requête]{requirement_name}</gradient>"
    lore:
      - "<gray>Clé :</gray><white>{requirement_key}</white>"
      - "<gray>Type :</gray><white>{requirement_type}</white>"
      - "<gray>Statut :</gray><white>{status}</white>"
      - "<gray>Progression :</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Résumé :</gray><white>{summary}</white>"
      - "<yellow>Cliquez avec le bouton droit sur les exigences en matière d'objet ou de devise pour mettre en banque la progression.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Vérifications détaillées</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[En attente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Indisponible]</gradient>"
  feedback:
    complete: "<gradient:#10b981:#34d399>█</gradient><gray><white>{requirement}</white><gray>est maintenant prêt.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient><gray>Progression stockée pour<white>{requirement}</white><gray>.</gray>{progress_bar}<gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>°</gradient><gray>Aucun article ou devise correspondant n'était disponible pour<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>ne prend pas en charge la progression en banque.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient><gray><white>{requirement}</white><gray>n'est pas disponible pour le moment.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient><gray>Votre profilRDRn'a pas pu être chargé, la progression n'a donc pas pu être enregistrée.</gray>"

storage_player_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Vault] Vos stockages</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Capacité de stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<gray>Utilisez cette liste pour vérifier votre</gray>"
      - "<gray>conteneurs de stockage persistants.</gray>"
  entry:
    name: "<gradient:#10b981:#34d399>[Boîte]{storage_key}</gradient>"
    lore:
      - "<gray>Clé de stockage :</gray><white>{storage_key}</white>"
      - "<gray>Propriétaire :</gray><white>{owner_name}</white>"
      - "<gray>Accès :</gray><white>{access_level}</white>"
      - "<gray>Touche de raccourci :</gray><white>{hotkey_display}</white>"
