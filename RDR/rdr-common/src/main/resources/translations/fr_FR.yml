    player_missing_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Aucune cible de joueur n'est sélectionnée. Le service de paramètres du lecteur/groupe</gray>"
    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>n'est pas disponible pour le moment.</gray>"
    player_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Effacement de tous les remplacements pour <white>{player_name}</white> <gray>(</gray><white>{player_uuid}</white><gray>).</gray>"

storage_admin_group_edit_ui:
