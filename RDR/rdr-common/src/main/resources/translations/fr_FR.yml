prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statistiques de stockage</gradient>"
  items: "<gray>Total des éléments :</gray><white>{total_items}</white>"
  available_slots: "<gray>Emplacements disponibles :</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Stockages obtenus :</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Illimité]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Concentrateur de stockage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Résumé du stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<gray>Votre réseau de coffre-fort est persistant</gray>"
      - "<gray>et prêt pour une utilisation inter-serveurs.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Illimité]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Afficher les stockages</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<yellow>Cliquez pour parcourir votre liste de stockage.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Magasin de stockage</gradient>"
    lore:
      - "<gray>Stockages détenus :</gray><white>{owned_storages}</white>"
      - "<gray>Stockages maximum :</gray><white>{max_storages}</white>"
      - "<yellow>Cliquez pour acheter un autre espace de stockage.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrateur de stockage</gradient>"
    lore:
      - "<gray>Ouvrez les contrôles d’administration privilégiés RDR.</gray>"
      - "<gray>Gérez les fournisseurs de devises et les valeurs par défaut.</gray>"
      - "<yellow>Nécessite :</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Contrôle du stockage</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Panneau d'administration RDR</gradient>"
    lore:
      - "<gray>Gérez les systèmes de stockage privilégiés à partir d'un seul endroit.</gray>"
      - "<gray>Utilisez ce panneau pour modifier les valeurs de configuration et ouvrir les contrôles d'intégration.</gray>"
      - "<yellow>Nécessite :</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Contrôles des joueurs</gradient>"
      lore:
        - "<gray>Modifiez les limites des joueurs/groupes, les remises et les contrôles de force de stockage.</gray>"
        - "<gray>Ouvrir les éditeurs de remplacement et les actions de gestion des urgences.</gray>"
        - "<yellow>Cliquez pour ouvrir les commandes du lecteur.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Modifier les valeurs de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Les paramètres saisis s'ouvrent dans un éditeur d'enclume de vitrail correspondant.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de configuration.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Intégrations de plugins</gradient>"
      lore:
        - "<gray>Gérez les outils de compétences, d'emplois, de devises et PlaceholderAPI.</gray>"
        - "<gray>Ouvrez les contrôles d'administration spécifiques à l'intégration.</gray>"
        - "<yellow>Cliquez pour ouvrir la gestion de l'intégration.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Gestionnaire de devises</gradient>"
      lore:
        - "<gray>Examinez les devises détectées dans Vault et JExEconomy.</gray>"
        - "<gray>Créez la devise</gray> <white>raindrops</white> <gray>par défaut si nécessaire.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de devises.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Compétence] Exigences de compétences</gradient>"
      lore:
        - "<gray>Examinez les plugins de compétences pris en charge et l'état de détection.</gray>"
        - "<gray>Appliquer les compétences requises par défaut à tous les niveaux d'achat de stockage.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles des compétences requises.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Travail] Exigences du travail</gradient>"
      lore:
        - "<gray>Examinez les plug-ins de travail pris en charge et l'état de détection.</gray>"
        - "<gray>Appliquer les exigences de tâche par défaut à tous les niveaux d'achat de stockage.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles des exigences de travail.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser ce panneau d'administration.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Contrôles des joueurs et des groupes</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Boîte à outils d'administration du stockage</gradient>"
    lore:
      - "<gray>Modifiez les stockages maximum et les réductions pour les joueurs et les groupes.</gray>"
      - "<gray>Forcez la vidange/réinitialisation des stockages ou fermez toutes les vues RDR ouvertes.</gray>"
      - "<yellow>Nécessite :</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Remplacements de joueurs</gradient>"
      lore:
        - "<gray>Parcourez les joueurs en ligne et les cibles de remplacement configurées.</gray>"
        - "<gray>Modifiez les stockages maximum par joueur et les valeurs de remise.</gray>"
        - "<yellow>Cliquez pour ouvrir les remplacements de joueur.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Remplacements de groupe</gradient>"
      lore:
        - "<gray>Sélectionnez un groupe LuckPerms et définissez des valeurs de remplacement.</gray>"
        - "<gray>Utile pour les niveaux de classement basés sur les autorisations.</gray>"
        - "<yellow>Cliquez pour ouvrir les remplacements de groupe.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Forcer la vidange du stockage</gradient>"
      lore:
        - "<gray>Efface tout le contenu des éléments d'un stockage sélectionné.</gray>"
        - "<gray>Conserve les paramètres de confiance, la dette et les valeurs des raccourcis clavier.</gray>"
        - "<yellow>Cliquez pour choisir un stockage.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Forcer la réinitialisation du stockage</gradient>"
      lore:
        - "<gray>Réinitialise un stockage sélectionné à un état propre.</gray>"
        - "<gray>Efface les éléments, les dettes, les accès approuvés et les raccourcis clavier.</gray>"
        - "<yellow>Cliquez pour choisir un stockage.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Forcer la fermeture de toutes les vues RDR</gradient>"
      lore:
        - "<gray>Ferme tous les menus RDR actuellement ouverts.</gray>"
        - "<gray>Utile après des changements de configuration ou des actions d'urgence.</gray>"
        - "<yellow>Cliquez pour forcer la fermeture de toutes les vues RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser ce menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous n'êtes pas autorisé à utiliser les contrôles d'administration des joueurs/groupes.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Fermeture forcée <blanc>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Sélectionner la cible de remplacement du joueur</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Cibles de remplacement du joueur</gradient>"
    lore:
      - "<gray>Joueurs suivis :</gray> <white>{tracked_players}</white>"
      - "<gray>Remplacements configurés :</gray> <white>{configured_overrides}</white>"
      - "<yellow>Cliquez sur un joueur ci-dessous pour modifier les remplacements.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID :</gray> <white>{player_uuid}</white>"
      - "<gray>Remplacer les stockages maximum :</gray> <white>{override_max_storages}</white>"
      - "<gray>Stockages maximum effectifs :</gray> <white>{effective_max_storages}</white>"
      - "<gray>Remise de remplacement :</gray> <white>{override_discount}</white>"
      - "<gray>Remise effective :</gray> <white>{effective_discount}</white>"
      - "<yellow>Cliquez pour modifier le profil de remplacement de ce joueur.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[En ligne]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Hors ligne]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Hériter]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Illimité]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Aucun joueur trouvé</gradient>"
      lore:
        - "<gray>Aucun joueur en ligne ou remplacement de joueur stocké n'a été trouvé.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à parcourir les remplacements de joueurs.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Modifier {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Résumé du remplacement du joueur</gradient>"
    lore:
      - "<gray>Lecteur :</gray> <white>{player_name}</white>"
      - "<gray>UUID :</gray> <white>{player_uuid}</white>"
      - "<gray>Remplacer les stockages maximum :</gray> <white>{override_max_storages}</white>"
      - "<gray>Stockages maximum effectifs :</gray> <white>{effective_max_storages}</white>"
      - "<gray>Remise de remplacement :</gray> <white>{override_discount}</white>"
      - "<gray>Remise effective :</gray> <white>{effective_discount}</white>"
    inherit: "<gradient:#6b7280:#9ca3af>[Hériter]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Illimité]</gradient>"
  actions:
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Stockages maximum</gradient>"
      lore:
        - "<gray>Remplacer les stockages maximum :</gray> <white>{override_max_storages}</white>"
        - "<gray>Stockages maximum effectifs :</gray> <white>{effective_max_storages}</white>"
        - "<yellow>Cliquez pour modifier les stockages maximum.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Remise en magasin</gradient>"
      lore:
        - "<gray>Remise de remplacement :</gray> <white>{override_discount}</white>"
        - "<gray>Remise effective :</gray> <white>{effective_discount}</white>"
        - "<yellow>Cliquez pour modifier le pourcentage de remise.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Effacer les remplacements du lecteur</gradient>"
      lore:
        - "<gray>Supprime tous les remplacements de stockage maximum et de remise.</gray>"
        - "<yellow>Cliquez pour effacer les remplacements de ce joueur.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Accès administrateur requis</gradient>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à modifier les remplacements de joueurs.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous n'êtes pas autorisé à modifier les remplacements de joueurs.</gray>"
    player_missing:
      name: "<gradient:#ef4444:#f87171>[X] Cible de joueur manquante</gradient>"
