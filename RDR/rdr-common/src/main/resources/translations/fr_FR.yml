storage_trusted_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Groupe]{storage_key}Accès</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Accès partagé</gradient>"
    lore:
      - "<gray>Clé de stockage :</gray><white>{storage_key}</white>"
      - "<gray>Propriétaire :</gray><white>{owner_name}</white>"
      - "<gray>Associés :</gray><white>{associate_count}</white>"
      - "<gray>Trusted :</gray><white>{trusted_count}</white>"
      - "<yellow>Cliquez sur un joueur pour y accéder.</yellow>"
  entry:
    public:
      name: "<gradient:#9ca3af:#d1d5db>[Public]{player}</gradient>"
      lore:
        - "<gray>Statut :</gray><white>Public</white>"
        - "<gray>Aucun dépôt ni retrait d'accès.</gray>"
        - "<yellow>Cliquez pour devenir associé.</yellow>"
    associate:
      name: "<gradient:#f59e0b:#fbbf24>[Associé]{player}</gradient>"
      lore:
        - "<gray>Statut :</gray><white>Associé</white>"
        - "<gray>Peut déposer mais ne peut pas retirer.</gray>"
        - "<yellow>Cliquez pour passer au statut Trusted.</yellow>"
    trusted:
      name: "<gradient:#10b981:#34d399>[Confiable]{player}</gradient>"
      lore:
        - "<gray>Statut :</gray><white>Trusted</white>"
        - "<gray>Peut déposer et retirer des articles.</gray>"
        - "<yellow>Cliquez pour réinitialiser à Public.</yellow>"
  feedback:
    updated:
      public: "<gradient:#9ca3af:#d1d5db>[Public]</gradient><gray>{player}n'a plus accès au stockage.</gray>"
      associate: "<gradient:#f59e0b:#fbbf24>[Associé]</gradient><gray>{player}peut désormais effectuer un dépôt dans ce stockage.</gray>"
      trusted: "<gradient:#10b981:#34d399>[Trusted]</gradient><gray>{player}peut désormais déposer et retirer de ce stockage.</gray>"
    not_owner: "<gradient:#ef4444:#f87171>[X]</gradient><gray>Seul le propriétaire du stockage peut modifier l'accès approuvé.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Propriétaire uniquement</gradient>"
      lore:
        - "<gray>Vous pouvez afficher ce stockage, mais uniquement</gray>"
        - "<gray>le propriétaire peut modifier l'accès approuvé.</gray>"
    storage_missing:
      name: "<gradient:#ef4444:#f87171>[X] Stockage manquant</gradient>"
      lore:
        - "<gray>Ce stockage n'a pas pu être chargé</gray>"
        - "<gray>pour la gestion des accès approuvés.</gray>"
