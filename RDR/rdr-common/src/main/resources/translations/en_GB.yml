prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Storage Stats</gradient>"
  items: "<gray>Total items:</gray> <white>{total_items}</white>"
  available_slots: "<gray>Available slots:</gray> <white>{available_slots}</white>"
  storages_obtained: "<gray>Storages obtained:</gray> <white>{owned_storages}</white>"
  max_storages: "<gray>Max storages:</gray> <white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Unlimited]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Storage Hub</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Vault] Storage Summary</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<gray>Your vault network is persisted</gray>"
      - "<gray>and ready for cross-server use.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Unlimited]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] View Storages</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<yellow>Click to browse your storage list.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Storage Store</gradient>"
    lore:
      - "<gray>Owned storages:</gray> <white>{owned_storages}</white>"
      - "<gray>Maximum storages:</gray> <white>{max_storages}</white>"
      - "<yellow>Click to purchase another storage.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Storage Admin</gradient>"
    lore:
      - "<gray>Open privileged RDR admin controls.</gray>"
      - "<gray>Manage currency providers and defaults.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Storage Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] RDR Admin Panel</gradient>"
    lore:
      - "<gray>Manage privileged storage systems from one place.</gray>"
      - "<gray>Use this panel to edit config values and open integration controls.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Player Controls</gradient>"
      lore:
        - "<gray>Edit player/group limits, discounts, and storage force controls.</gray>"
        - "<gray>Open override editors and emergency management actions.</gray>"
        - "<yellow>Click to open player controls.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Storage Config</gradient>"
      lore:
        - "<gray>Edit values from</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Typed settings open in a matching stained-glass anvil editor.</gray>"
        - "<yellow>Click to open config controls.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin Integrations</gradient>"
      lore:
        - "<gray>Manage skill, job, currency, and PlaceholderAPI tools.</gray>"
        - "<gray>Open integration-specific admin controls.</gray>"
        - "<yellow>Click to open integration management.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Currency Manager</gradient>"
      lore:
        - "<gray>Review detected currencies from Vault and JExEconomy.</gray>"
        - "<gray>Create the default</gray> <white>raindrops</white> <gray>currency when needed.</gray>"
        - "<yellow>Click to open currency controls.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skill Requirements</gradient>"
      lore:
        - "<gray>Review supported skill plugins and detection state.</gray>"
        - "<gray>Apply default skill requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open skill requirement controls.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Job Requirements</gradient>"
      lore:
        - "<gray>Review supported job plugins and detection state.</gray>"
        - "<gray>Apply default job requirements to all storage purchase tiers.</gray>"
        - "<yellow>Click to open job requirement controls.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this admin panel.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Player & Group Controls</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Storage Admin Toolkit</gradient>"
    lore:
      - "<gray>Edit max storages and discounts for players and groups.</gray>"
      - "<gray>Force-drain/reset storages or close all open RDR views.</gray>"
      - "<yellow>Requires:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Player Overrides</gradient>"
      lore:
        - "<gray>Browse online players and configured override targets.</gray>"
        - "<gray>Edit per-player max storages and discount values.</gray>"
        - "<yellow>Click to open player overrides.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Group Overrides</gradient>"
      lore:
        - "<gray>Select a LuckPerms group and set override values.</gray>"
        - "<gray>Useful for permission-based rank tiers.</gray>"
        - "<yellow>Click to open group overrides.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Force Drain Storage</gradient>"
      lore:
        - "<gray>Clears all item contents from a selected storage.</gray>"
        - "<gray>Keeps trusted settings, debt, and hotkey values.</gray>"
        - "<yellow>Click to choose a storage.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Force Reset Storage</gradient>"
      lore:
        - "<gray>Resets a selected storage to a clean state.</gray>"
        - "<gray>Clears items, debt, trusted access, and hotkey.</gray>"
        - "<yellow>Click to choose a storage.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Force Close All RDR Views</gradient>"
      lore:
        - "<gray>Closes all currently open RDR menus.</gray>"
        - "<gray>Useful after config changes or emergency actions.</gray>"
        - "<yellow>Click to force close all RDR views.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to use this menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to use player/group admin controls.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Force-closed <white>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Select Player Override Target</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Player Override Targets</gradient>"
    lore:
      - "<gray>Tracked players:</gray> <white>{tracked_players}</white>"
      - "<gray>Configured overrides:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Click a player below to edit overrides.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Override max storages:</gray> <white>{override_max_storages}</white>"
      - "<gray>Effective max storages:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Override discount:</gray> <white>{override_discount}</white>"
      - "<gray>Effective discount:</gray> <white>{effective_discount}</white>"
      - "<yellow>Click to edit this player override profile.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[Online]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Offline]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Inherit]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Unlimited]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] No Players Found</gradient>"
      lore:
        - "<gray>No online players or stored player overrides were found.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to browse player overrides.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Edit {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Player Override Summary</gradient>"
