    player_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Cleared all overrides for <white>{player_name}</white> <gray>(</gray><white>{player_uuid}</white><gray>).</gray>"

storage_admin_group_edit_ui:
