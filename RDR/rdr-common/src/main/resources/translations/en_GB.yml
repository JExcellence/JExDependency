  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Admin Access Required</gradient>"
      lore:
        - "<gray>You do not have permission to edit player overrides.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to edit player overrides.</gray>"
    player_missing:
      name: "<gradient:#ef4444:#f87171>[X] Player Target Missing</gradient>"
