      name: "<gradient:#ef4444:#f87171>[X] Wymagany dostęp administratora</gradient>"
      lore:
        - "<gray>Nie masz uprawnień do edytowania zastąpień graczy.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nie masz uprawnień do edytowania zastąpień graczy.</gray>"
    player_missing:
