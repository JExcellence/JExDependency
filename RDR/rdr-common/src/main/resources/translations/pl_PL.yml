    drained: "<gradient:#f59e0b:#fbbf24>[Opróżnij]</gradient> <gray>Z drenażem wymuszonym <biały>{owner}</white>'s storage <white>{storage_key}</white><gray>. Zamknięte widoki:</gray> <white>{closed_views}</white><gray>.</gray>"
    reset: "<gradient:#ef4444:#f87171>[Resetuj]</gradient> <gray>Wymuszony reset <biały>{owner}</white>'s storage <white>{storage_key}</white><gray>. Zamknięte widoki:</gray> <white>{closed_views}</white><gray>.</gray>"

