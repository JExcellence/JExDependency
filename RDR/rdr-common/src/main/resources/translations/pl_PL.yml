      name: "<gradient:#38bdf8:#60a5fa>[Maks.] Maksymalna liczba magazynów</gradient>"
      lore:
        - "<gray>Zastąp maksymalne magazyny:</gray> <white>{override_max_storages}</white>"
        - "<gray>Efektywne maksymalne magazyny:</gray> <white>{effective_max_storages}</white>"
        - "<yellow>Kliknij, aby edytować maksymalną liczbę magazynów.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Rabat sklepowy</gradient>"
