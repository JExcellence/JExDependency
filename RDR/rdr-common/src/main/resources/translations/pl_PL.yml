    lore:
      - "<gray>Tylko właściciel magazynu może zarządzać</gray>"
      - "<gray>zaufany dostęp do tego magazynu.</gray>"
  hotkey_locked:
    name: "<gradient:#ef4444:#f87171>[X] Klawisz skrótu zablokowany</gradient>"
    lore:
      - "<gray>Tylko właściciel magazynu może zmienić</gray>"
      - "<gray>skróty klawiszowe pamięci.</gray>"
  edition_locked:
    name: "<gradient:#ef4444:#f87171>[Bezpłatny] Ustawienia zablokowane</gradient>"
    lore:
      - "<gray>Zmiany ustawień przechowywania są wyłączone</gray>"
      - "<gray>w<white>RDRBezpłatny</white><gray>.</gray>"
