      - "<gray>Zastąp rabat:</gray> <white>{override_discount}</white>"
    none: "<gradient:#6b7280:#9ca3af>[Brak]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Dziedzicz]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Nieograniczony]</gradient>"
  actions:
    select_group:
      name: "<gradient:#38bdf8:#60a5fa>[Tag] Wybierz grupę</gradient>"
      lore:
        - "<gray>Bieżąca grupa:</gray> <white>{group_name}</white>"
        - "<gray>Wykryta grupa LuckPerms:</gray> <white>{group_count}</white>"
        - "<yellow>Kliknij lewym przyciskiem myszy, aby przejść do następnej grupy, kliknij prawym przyciskiem myszy, aby przejść do poprzedniej.</yellow>"
    maximum_storages:
      name: "<gradient:#38bdf8:#60a5fa>[Max] Grupa Maksymalna liczba magazynów</gradient>"
      lore:
        - "<gray>Zastąp maksymalne magazyny:</gray> <white>{override_max_storages}</white>"
        - "<yellow>Kliknij, aby edytować maksymalną liczbę magazynów dla tej grupy.</yellow>"
    discount:
      name: "<gradient:#22c55e:#86efac>[%] Rabat grupowy</gradient>"
      lore:
        - "<gray>Zastąp rabat:</gray> <white>{override_discount}</white>"
        - "<yellow>Kliknij, aby edytować rabat dla tej grupy.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Usuń nadpisania grupy</gradient>"
      lore:
