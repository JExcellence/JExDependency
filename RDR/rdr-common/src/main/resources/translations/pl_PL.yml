prefix: "<gradient:#38bdf8:#60a5fa>[RDR]</gradient> "

scoreboard_sidebar:
  title: "<gradient:#f59e0b:#fbbf24>[RDR] Statystyki przechowywania</gradient>"
  items: "<gray>Łączna liczba pozycji:</gray><white>{total_items}</white>"
  available_slots: "<gray>Dostępne sloty:</gray><white>{available_slots}</white>"
  storages_obtained: "<gray>Uzyskane magazyny:</gray><white>{owned_storages}</white>"
  max_storages: "<gray>Maksymalna pojemność:</gray><white>{max_storages}</white>"
  unlimited: "<gradient:#22c55e:#86efac>[Nieograniczony]</gradient>"

storage_overview_ui:
  title: "<gradient:#38bdf8:#60a5fa>[*] Koncentrator pamięci masowej</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Sejf] Podsumowanie przechowywania</gradient>"
    lore:
      - "<gray>Posiadane magazyny:</gray><white>{owned_storages}</white>"
      - "<gray>Maksymalna liczba magazynów:</gray><white>{max_storages}</white>"
      - "<gray>Twoja sieć skarbca jest utrwalona</gray>"
      - "<gray>i gotowy do użytku na wielu serwerach.</gray>"
    unlimited: "<gradient:#22c55e:#86efac>[Nieograniczony]</gradient>"
  open:
    name: "<gradient:#10b981:#34d399>[>>] Wyświetl magazyny</gradient>"
    lore:
      - "<gray>Posiadane magazyny:</gray><white>{owned_storages}</white>"
      - "<gray>Maksymalna liczba magazynów:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknij, aby przeglądać listę magazynów.</yellow>"
  store:
    name: "<gradient:#f59e0b:#fbbf24>[$] Magazyn</gradient>"
    lore:
      - "<gray>Posiadane magazyny:</gray><white>{owned_storages}</white>"
      - "<gray>Maksymalna liczba magazynów:</gray><white>{max_storages}</white>"
      - "<yellow>Kliknij, aby kupić kolejną pamięć.</yellow>"

  admin:
    name: "<gradient:#a78bfa:#c4b5fd>[Admin] Administrator pamięci masowej</gradient>"
    lore:
      - "<gray>Otwórz uprzywilejowane opcje administratora RDR.</gray>"
      - "<gray>Zarządzaj dostawcami walut i ustawieniami domyślnymi.</gray>"
      - "<yellow>Wymaga:</yellow> <white>raindroprdr.command.admin</white>"

storage_admin_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Admin] Kontrola pamięci masowej</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informacje] Panel administracyjny RDR</gradient>"
    lore:
      - "<gray>Zarządzaj uprzywilejowanymi systemami pamięci masowej z jednego miejsca.</gray>"
      - "<gray>Ten panel służy do edycji wartości konfiguracyjnych i otwierania elementów sterujących integracją.</gray>"
      - "<yellow>Wymaga:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Kontrola gracza</gradient>"
      lore:
        - "<gray>Edytuj limity gracza/grupy, rabaty i kontrolę siły przechowywania.</gray>"
        - "<gray>Otwórz edytory zastępowania i akcje zarządzania awaryjnego.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące odtwarzacza.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Konfiguracja przechowywania</gradient>"
      lore:
        - "<gray>Edycja wartości z</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Wpisane ustawienia otwierają się w odpowiednim edytorze kowadeł witrażowych.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące konfiguracją.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integracja wtyczek</gradient>"
      lore:
        - "<gray>Zarządzaj umiejętnościami, stanowiskami pracy, walutą i narzędziami PlaceholderAPI.</gray>"
        - "<gray>Otwarta kontrola administracyjna specyficzna dla integracji.</gray>"
        - "<yellow>Kliknij, aby otworzyć zarządzanie integracją.</yellow>"
    currency:
      name: "<gradient:#10b981:#34d399>[Cur] Menedżer walut</gradient>"
      lore:
        - "<gray>Przejrzyj wykryte waluty z Vault i JExEconomy.</gray>"
        - "<gray>Utwórz domyślny</gray> <white>raindrops</white> <gray>walutę, jeśli zajdzie taka potrzeba.</gray>"
        - "<yellow>Kliknij, aby otworzyć kontrolę walut.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Umiejętność] Wymagania dotyczące umiejętności</gradient>"
      lore:
        - "<gray>Przejrzyj obsługiwane wtyczki umiejętności i stan wykrywania.</gray>"
        - "<gray>Zastosuj domyślne wymagania dotyczące umiejętności do wszystkich poziomów zakupu przestrzeni dyskowej.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące wymaganiami umiejętności.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Praca] Wymagania stanowiska</gradient>"
      lore:
        - "<gray>Przejrzyj obsługiwane wtyczki zadań i stan wykrywania.</gray>"
        - "<gray>Zastosuj domyślne wymagania dotyczące zadań do wszystkich poziomów zakupu pamięci masowej.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące wymaganiami stanowiska.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X] Wymagany dostęp administratora</gradient>"
      lore:
        - "<gray>Nie masz uprawnień do korzystania z tego panelu administracyjnego.</gray>"

storage_admin_player_ui:
  title: "<gradient:#22c55e:#14b8a6>[Ply] Sterowanie graczami i grupami</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info] Zestaw narzędzi administratora pamięci</gradient>"
    lore:
      - "<gray>Edytuj maksymalne miejsca i zniżki dla graczy i grup.</gray>"
      - "<gray>Wymuś opróżnienie/resetowanie magazynów lub zamknij wszystkie otwarte widoki RDR.</gray>"
      - "<yellow>Wymaga:</yellow> <white>raindroprdr.command.admin</white>"
  actions:
    player_overrides:
      name: "<gradient:#22c55e:#86efac>[P] Zastąpienie gracza</gradient>"
      lore:
        - "<gray>Przeglądaj graczy online i skonfigurowane cele zastąpienia.</gray>"
        - "<gray>Edytuj maksymalne magazyny i wartości rabatów na gracza.</gray>"
        - "<yellow>Kliknij, aby otworzyć zmiany gracza.</yellow>"
    group_overrides:
      name: "<gradient:#38bdf8:#60a5fa>[G] Przesłonięcia grupowe</gradient>"
      lore:
        - "<gray>Wybierz grupę LuckPerms i ustaw wartości przesłonięć.</gray>"
        - "<gray>Przydatne w przypadku poziomów rang opartych na uprawnieniach.</gray>"
        - "<yellow>Kliknij, aby otworzyć nadpisania grupowe.</yellow>"
    force_drain_storage:
      name: "<gradient:#f59e0b:#fbbf24>[D] Wymuś opróżnienie magazynu</gradient>"
      lore:
        - "<gray>Usuwa całą zawartość elementu z wybranego magazynu.</gray>"
        - "<gray>Zachowuje zaufane ustawienia, zadłużenie i wartości klawiszy skrótu.</gray>"
        - "<yellow>Kliknij, aby wybrać magazyn.</yellow>"
    force_reset_storage:
      name: "<gradient:#ef4444:#f87171>[R] Wymuś resetowanie pamięci</gradient>"
      lore:
        - "<gray>Resetuje wybraną pamięć do stanu czystego.</gray>"
        - "<gray>Czyści przedmioty, długi, zaufany dostęp i klawisz skrótu.</gray>"
        - "<yellow>Kliknij, aby wybrać magazyn.</yellow>"
    force_close_all_views:
      name: "<gradient:#ef4444:#f97316>[!] Wymuś zamknięcie wszystkich widoków RDR</gradient>"
      lore:
        - "<gray>Zamyka wszystkie aktualnie otwarte menu RDR.</gray>"
        - "<gray>Przydatne po zmianach konfiguracji lub działaniach awaryjnych.</gray>"
        - "<yellow>Kliknij, aby wymusić zamknięcie wszystkich widoków RDR.</yellow>"
  feedback:
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Wymagany dostęp administratora</gradient>"
      lore:
        - "<gray>Nie masz uprawnień, aby korzystać z tego menu.</gray>"
    access_denied_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Nie masz uprawnień do korzystania z elementów sterujących administratora gracza/grupy.</gray>"
    force_close_all_views: "<gradient:#f59e0b:#f97316>[!]</gradient> <gray>Zamknięte na siłę <biały>{closed_views}</white> open RDR view(s).</gray>"

storage_admin_player_select_ui:
  title: "<gradient:#22c55e:#86efac>[P] Wybierz cel zmiany gracza</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informacje] Cele zmiany gracza</gradient>"
    lore:
      - "<gray>Śledzeni gracze:</gray> <white>{tracked_players}</white>"
      - "<gray>Skonfigurowane zmiany:</gray> <white>{configured_overrides}</white>"
      - "<yellow>Kliknij gracza poniżej, aby edytować zmiany.</yellow>"
  entry:
    name: "<gradient:#38bdf8:#60a5fa>[P]</gradient> <white>{player_name}</white> <gray>{status}</gray>"
    lore:
      - "<gray>UUID:</gray> <white>{player_uuid}</white>"
      - "<gray>Zastąp maksymalne magazyny:</gray> <white>{override_max_storages}</white>"
      - "<gray>Efektywne maksymalne magazyny:</gray> <white>{effective_max_storages}</white>"
      - "<gray>Zastąp rabat:</gray> <white>{override_discount}</white>"
      - "<gray>Efektywny rabat:</gray> <white>{effective_discount}</white>"
      - "<yellow>Kliknij, aby edytować profil zastąpienia tego gracza.</yellow>"
    status:
      online: "<gradient:#22c55e:#86efac>[Online]</gradient>"
      offline: "<gradient:#6b7280:#9ca3af>[Offline]</gradient>"
    inherit: "<gradient:#6b7280:#9ca3af>[Dziedzicz]</gradient>"
    unlimited: "<gradient:#22c55e:#86efac>[Nieograniczony]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~] Nie znaleziono graczy</gradient>"
      lore:
        - "<gray>Nie znaleziono graczy online ani zapisanych zastąpień graczy.</gray>"
    access_denied:
      name: "<gradient:#ef4444:#f87171>[X] Wymagany dostęp administratora</gradient>"
      lore:
        - "<gray>Nie masz uprawnień do przeglądania zastąpień graczy.</gray>"

storage_admin_player_edit_ui:
  title: "<gradient:#22c55e:#86efac>[P] Edytuj {player_name}</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informacje] Podsumowanie zmiany gracza</gradient>"
    lore:
