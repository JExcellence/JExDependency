    settings_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Usługa ustawień gracza/grupy jest obecnie niedostępna.</gray>"
    group_cleared: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Wyczyszczono nadpisania dla grupy <biały>{group_name}</white><gray>.</gray>"

storage_admin_storage_control_ui:
