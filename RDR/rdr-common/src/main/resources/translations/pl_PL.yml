        - "<gray>Zastąp rabat:</gray> <white>{override_discount}</white>"
        - "<gray>Efektywny rabat:</gray> <white>{effective_discount}</white>"
        - "<yellow>Kliknij, aby edytować procent rabatu.</yellow>"
    clear:
      name: "<gradient:#ef4444:#f87171>[X] Wyczyść nadpisania graczy</gradient>"
      lore:
        - "<gray>Usuwa wszystkie nadpisania maksymalnego miejsca i rabatów.</gray>"
        - "<yellow>Kliknij, aby wyczyścić zmiany dokonane przez tego gracza.</yellow>"
  feedback:
