commands:
  homeadmin:
    name: 'homeadmin'
    description: 'Administrative home management commands'
    aliases:
      - hadmin
      - adminhome
    usage: 'homeadmin <sethome|delhome|home> <player> <name>'
    argumentUsages:
      1$: 'lut["prefix"] & "&7/" & alias & " &c<sethome|delhome|home> <player> <name>"'
      2$: 'lut["prefix"] & "&7/" & alias & " " & args[0] & " &c<player> <name>"'
      3$: 'lut["prefix"] & "&7/" & alias & " " & args[0] & " " & args[1] & " &c<name>"'
    errorMessages:
      malformedEnum$: |
        lut["prefix"] & "&7The value &c" & value & " &7is not valid"
      playerNotOnline$: 'lut["prefix"] & "&7The player &c" & value & " &7is &cnot online"'
      playerUnknown$: 'lut["prefix"] & "&7The player &c" & value & " &7has &cnot played &7on this server before"'
      internalError$: 'lut["prefix"] & "&4An internal error occurred"'
      notAConsole$: 'lut["prefix"] & "&cYou can only execute this command in the console"'
      notAPlayer$: 'lut["prefix"] & "&7This command can only be executed as a &cplayer"'
    permissions:
      missingMessage$: 'lut["prefix"] & "&7You lack the permission: &c" & permission'
      nodes:
        adminSethome: 'jexhome.admin.sethome'
        adminDelhome: 'jexhome.admin.delhome'
        adminHome: 'jexhome.admin.home'

lut:
  prefix: '&8[&dJExHome&8] &7'
