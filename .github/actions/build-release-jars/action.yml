name: "Build Release Jars"
description: "Sets up Java and Gradle, builds project jars in required order, and stages release artifacts for one module."

inputs:
  java-version:
    description: "Java version to use"
    required: false
    default: "21"
  target-module:
    description: "Module to build and stage (RCore, RDQ, RDR, RDS, or RDT)"
    required: true
  jeconfig-repository:
    description: "Owner/repository for JEConfig"
    required: false
    default: "Antimatter-Zone/JEConfig"
  jeconfig-repo-ref:
    description: "Branch, tag, or commit to use from JEConfig repository"
    required: false
    default: "main"
  jeconfig-token:
    description: "Token with read access to the JEConfig repository"
    required: false
    default: ""

outputs:
  artifacts-dir:
    description: "Directory containing the staged release jars"
    value: ${{ steps.stage-release-artifacts.outputs.artifacts-dir }}

runs:
  using: "composite"
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Check out JEConfig (with token)
      if: ${{ inputs.jeconfig-token != '' }}
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.jeconfig-repository }}
        ref: ${{ inputs.jeconfig-repo-ref }}
        token: ${{ inputs.jeconfig-token }}
        path: .external/JEConfig
        persist-credentials: false

    - name: Check out JEConfig (without token)
      if: ${{ inputs.jeconfig-token == '' }}
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.jeconfig-repository }}
        ref: ${{ inputs.jeconfig-repo-ref }}
        path: .external/JEConfig
        persist-credentials: false

    - name: Publish JEConfig artifacts to Maven Local
      shell: pwsh
      run: |
        $checkoutDir = "$env:GITHUB_WORKSPACE\.external\JEConfig"

        if (-not (Test-Path $checkoutDir)) {
          throw "JEConfig checkout directory was not created: $checkoutDir"
        }

        Push-Location $checkoutDir
        try {
          .\gradlew.bat --no-daemon publishToMavenLocal
          if ($LASTEXITCODE -ne 0) {
            throw "Gradle task failed: publishToMavenLocal (JEConfig)"
          }
        } finally {
          Pop-Location
        }

    - name: Validate target module version properties
      shell: pwsh
      run: |
        $targetModule = "${{ inputs.target-module }}"
        $normalizedTargetModule = $targetModule.Trim().ToUpperInvariant()
        $versionPrefix = switch ($normalizedTargetModule) {
          "RCORE" { "rcore" }
          "RDQ" { "rdq" }
          "RDR" { "rdr" }
          "RDS" { "rds" }
          "RDT" { "rdt" }
          default { throw "Unsupported target-module: $targetModule" }
        }

        $propertiesFile = Join-Path $env:GITHUB_WORKSPACE "gradle.properties"
        if (-not (Test-Path $propertiesFile)) {
          throw "Missing gradle.properties at $propertiesFile"
        }

        $lines = Get-Content -Path $propertiesFile
        $fields = @("major", "minor", "patch", "stage", "build")

        foreach ($field in $fields) {
          $key = "$versionPrefix.version.$field"
          $line = $lines | Where-Object { $_ -match "^\s*$([regex]::Escape($key))\s*=" } | Select-Object -Last 1

          if (-not $line) {
            throw "Missing required version property: $key. The release would fall back to an undefined version."
          }

          $value = ($line -split "=", 2)[1].Trim()
          if ([string]::IsNullOrWhiteSpace($value) -or $value.Equals("undefined", [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Invalid version property $key='$value'. Undefined fallback versions are not allowed for releases."
          }
        }

    - name: Build and publish internal modules in required order
      shell: pwsh
      run: |
        $targetModule = "${{ inputs.target-module }}"
        $normalizedTargetModule = $targetModule.Trim().ToUpperInvariant()

        $tasks = @(
          "clean"
          ":JExDependency:clean"
          ":JExDependency:build"
          ":JExDependency:publishToMavenLocal"
          ":JExCommand:clean"
          ":JExCommand:build"
          ":JExCommand:publishToMavenLocal"
          ":JExTranslate:clean"
          ":JExTranslate:build"
          ":JExTranslate:publishToMavenLocal"
          ":RPlatform:clean"
          ":RPlatform:build"
          ":RPlatform:publishToMavenLocal"
          ":JExEconomy:clean"
          ":JExEconomy:build"
          ":JExEconomy:publishLocal"
          ":JExEconomy:publishMavenPublicationToMavenLocal"
        )

        $targetTasks = switch ($normalizedTargetModule) {
          "RCORE" { @(":RCore:clean", ":RCore:build", ":RCore:publishLocal") }
          "RDQ" { @(":RCore:clean", ":RCore:build", ":RCore:publishLocal", ":RDQ:clean", ":RDQ:buildAll") }
          "RDR" { @(":RCore:clean", ":RCore:build", ":RCore:publishLocal", ":RDR:clean", ":RDR:buildAll") }
          "RDS" { @(":RCore:clean", ":RCore:build", ":RCore:publishLocal", ":RDS:clean", ":RDS:buildAll") }
          "RDT" { @(":RCore:clean", ":RCore:build", ":RCore:publishLocal", ":RDT:clean", ":RDT:buildAll") }
          default { throw "Unsupported target-module: $targetModule" }
        }

        foreach ($task in $tasks + $targetTasks) {
          Write-Host "Running Gradle task: $task"
          .\gradlew.bat --no-daemon $task
          if ($LASTEXITCODE -ne 0) {
            throw "Gradle task failed: $task"
          }
        }

    - name: Stage release artifacts
      id: stage-release-artifacts
      shell: pwsh
      run: |
        $workspace = $env:GITHUB_WORKSPACE
        $targetModule = "${{ inputs.target-module }}"
        $normalizedTargetModule = $targetModule.Trim().ToUpperInvariant()
        $artifactsDirRelative = "release-artifacts"
        $artifactsDir = Join-Path $workspace $artifactsDirRelative

        if (Test-Path $artifactsDir) {
          Remove-Item -Path $artifactsDir -Recurse -Force
        }
        New-Item -Path $artifactsDir -ItemType Directory -Force | Out-Null

        $targets = switch ($normalizedTargetModule) {
          "RCORE" { @(@{ name = "RCore"; pattern = "RCore/build/libs/RCore-*.jar" }) }
          "RDQ" {
            @(
              @{ name = "RDQ Free"; pattern = "RDQ/rdq-free/build/libs/RDQ-*-Free.jar" }
              @{ name = "RDQ Premium"; pattern = "RDQ/rdq-premium/build/libs/RDQ-*-Premium.jar" }
            )
          }
          "RDR" {
            @(
              @{ name = "RDR Free"; pattern = "RDR/rdr-free/build/libs/RDR-*-Free.jar" }
              @{ name = "RDR Premium"; pattern = "RDR/rdr-premium/build/libs/RDR-*-Premium.jar" }
            )
          }
          "RDS" {
            @(
              @{ name = "RDS Free"; pattern = "RDS/rds-free/build/libs/RDS-*-Free.jar" }
              @{ name = "RDS Premium"; pattern = "RDS/rds-premium/build/libs/RDS-*-Premium.jar" }
            )
          }
          "RDT" {
            @(
              @{ name = "RDT Free"; pattern = "RDT/rdt-free/build/libs/RDT-*-Free.jar" }
              @{ name = "RDT Premium"; pattern = "RDT/rdt-premium/build/libs/RDT-*-Premium.jar" }
            )
          }
          default { throw "Unsupported target-module: $targetModule" }
        }

        # Ensure a single hashtable target (e.g., RCORE) is treated as one item, not a map with Count=2 keys.
        $targets = @($targets)

        foreach ($target in $targets) {
          $matchPath = Join-Path $workspace $target.pattern
          $matches = @(
            Get-ChildItem -Path $matchPath -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch "(?i)sources|javadoc" }
          )

          if ($matches.Count -ne 1) {
            Write-Host "Expected exactly one jar for $($target.name), found $($matches.Count)."
            if ($matches.Count -gt 0) {
              $matches | ForEach-Object { Write-Host " - $($_.FullName)" }
            } else {
              Write-Host "Pattern used: $($target.pattern)"
            }
            throw "Release artifact resolution failed for $($target.name)."
          }

          $jar = $matches[0]
          Copy-Item -Path $jar.FullName -Destination (Join-Path $artifactsDir $jar.Name) -Force
          Write-Host "Staged $($target.name): $($jar.Name)"
        }

        $artifactCount = @(Get-ChildItem -Path $artifactsDir -File -Filter "*.jar").Count
        if ($artifactCount -ne $targets.Count) {
          throw "Expected $($targets.Count) release jars for $targetModule, found $artifactCount."
        }

        "artifacts-dir=$artifactsDirRelative" >> $env:GITHUB_OUTPUT
