name: "Run Java Tests"
description: "Sets up Java/Gradle, publishes required local artifacts in build-all order, and runs tests."

inputs:
  java-version:
    description: "Java version to use"
    required: false
    default: "21"
  jeconfig-repository:
    description: "Owner/repository for JEConfig"
    required: false
    default: "Antimatter-Zone/JEConfig"
  jeconfig-repo-ref:
    description: "Branch, tag, or commit to use from JEConfig repository"
    required: false
    default: "main"
  jeconfig-token:
    description: "Token with read access to the JEConfig repository"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Check out JEConfig (with token)
      if: ${{ inputs.jeconfig-token != '' }}
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.jeconfig-repository }}
        ref: ${{ inputs.jeconfig-repo-ref }}
        token: ${{ inputs.jeconfig-token }}
        path: .external/JEConfig
        persist-credentials: false

    - name: Check out JEConfig (without token)
      if: ${{ inputs.jeconfig-token == '' }}
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.jeconfig-repository }}
        ref: ${{ inputs.jeconfig-repo-ref }}
        path: .external/JEConfig
        persist-credentials: false

    - name: Publish JEConfig artifacts to Maven Local
      shell: pwsh
      run: |
        $checkoutDir = "$env:GITHUB_WORKSPACE\.external\JEConfig"

        if (-not (Test-Path $checkoutDir)) {
          throw "JEConfig checkout directory was not created: $checkoutDir"
        }

        Push-Location $checkoutDir
        try {
          .\gradlew.bat --no-daemon publishToMavenLocal
          if ($LASTEXITCODE -ne 0) {
            throw "Gradle task failed: publishToMavenLocal (JEConfig)"
          }
        } finally {
          Pop-Location
        }

    - name: Build and publish internal modules in required order
      shell: pwsh
      run: |
        $tasks = @(
          "clean"
          ":JExDependency:publishToMavenLocal"
          ":JExCommand:publishToMavenLocal"
          ":JExTranslate:publishToMavenLocal"
          ":RPlatform:publishToMavenLocal"
          ":JExEconomy:publishLocal"
          ":RCore:publishLocal"
          ":RDQ:buildAll"
          ":RDR:buildAll"
          ":RDS:buildAll"
          ":RDT:buildAll"
        )

        foreach ($task in $tasks) {
          Write-Host "Running Gradle task: $task"
          .\gradlew.bat --no-daemon $task
          if ($LASTEXITCODE -ne 0) {
            throw "Gradle task failed: $task"
          }
        }

    - name: Run tests
      shell: pwsh
      run: .\gradlew.bat --no-daemon test
