name: CI Java Tests

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: java-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-tests:
    name: Gradle Test (Java 21)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate commit counter and build number sync
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

          ./gradlew --no-daemon validateCommitCounter syncBuildNumbersFromCommitCounter

          git diff --exit-code -- gradle.properties || {
            echo "gradle.properties is out of sync. Run './gradlew validateCommitCounter syncBuildNumbersFromCommitCounter' locally and commit the updated gradle.properties." >&2
            exit 1
          }

      - name: Run Java test suite
        uses: ./.github/actions/run-java-tests
        with:
          java-version: "21"
          jeconfig-token: ${{ secrets.JECONFIG_READ_TOKEN || github.token }}
