name: CI Java Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: java-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-tests:
    name: Gradle Test (Java 21)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate commit counter and build number sync
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          .\gradlew.bat --no-daemon validateCommitCounter syncBuildNumbersFromCommitCounter
          if ($LASTEXITCODE -ne 0) {
            throw "Commit counter/build number validation failed."
          }

          git diff --exit-code -- gradle.properties
          if ($LASTEXITCODE -ne 0) {
            throw "gradle.properties is out of sync. Run 'gradlew.bat validateCommitCounter syncBuildNumbersFromCommitCounter' locally and commit the updated gradle.properties."
          }

      - name: Run Java test suite
        uses: ./.github/actions/run-java-tests
        with:
          java-version: "21"
          jeconfig-token: ${{ secrets.JECONFIG_READ_TOKEN || github.token }}
