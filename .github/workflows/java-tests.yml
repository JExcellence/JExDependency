name: CI Java Tests

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: java-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-tests:
    name: Gradle Test (Java 21)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Java test suite
        uses: ./.github/actions/run-java-tests
        with:
          java-version: "21"
          jeconfig-token: ${{ secrets.JECONFIG_READ_TOKEN || github.token }}
