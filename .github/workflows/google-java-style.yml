name: Verify Google Java Style

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: google-java-style-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-google-java-style:
    name: Google Java Style (Java 21)
    runs-on:
      - self-hosted
      - Linux
      - X64
      - RDC
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Google Java style
        uses: ./.github/actions/verify-google-java-style
        with:
          java-version: "21"
          jeconfig-token: ${{ secrets.JECONFIG_READ_TOKEN || github.token }}
