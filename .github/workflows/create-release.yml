name: Create Release

on:
  push:
    paths:
      - gradle.properties

concurrency:
  group: create-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version-changes:
    name: Detect Version Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has-changes: ${{ steps.detect.outputs.has-changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed module versions
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "${before_sha}" == "${zero_sha}" ]]; then
            if git rev-parse "${after_sha}^" >/dev/null 2>&1; then
              diff_text="$(git diff --unified=0 "${after_sha}^" "${after_sha}" -- gradle.properties || true)"
            else
              diff_text="$(git show --unified=0 "${after_sha}" -- gradle.properties || true)"
            fi
          else
            if git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              diff_text="$(git diff --unified=0 "${before_sha}" "${after_sha}" -- gradle.properties || true)"
            elif git rev-parse "${after_sha}^" >/dev/null 2>&1; then
              diff_text="$(git diff --unified=0 "${after_sha}^" "${after_sha}" -- gradle.properties || true)"
            else
              diff_text="$(git show --unified=0 "${after_sha}" -- gradle.properties || true)"
            fi
          fi

          version_diff="$(printf '%s\n' "${diff_text}" | grep -E '^[+-](rcore|rdq|rdr|rds|rdt)\.version\.(major|minor|patch|stage|build)=' || true)"

          if [[ -z "${version_diff}" ]]; then
            echo "No module version keys changed in gradle.properties."
            echo "has-changes=false" >> "${GITHUB_OUTPUT}"
            echo "matrix=[]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          get_prop() {
            local key="$1"
            local value
            value="$(grep -E "^${key}=" gradle.properties | tail -n 1 | cut -d'=' -f2- | tr -d '\r')"
            if [[ -z "${value}" ]]; then
              echo "Missing expected property: ${key}" >&2
              exit 1
            fi
            printf '%s' "${value}"
          }

          changed_prefixes=()
          for prefix in rcore rdq rdr rds rdt; do
            if printf '%s\n' "${version_diff}" | grep -qE "^[+-]${prefix}\.version\.(major|minor|patch|stage|build)="; then
              changed_prefixes+=("${prefix}")
            fi
          done

          if [[ ${#changed_prefixes[@]} -eq 0 ]]; then
            echo "No tracked module version keys changed in gradle.properties."
            echo "has-changes=false" >> "${GITHUB_OUTPUT}"
            echo "matrix=[]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          matrix='[]'
          for prefix in "${changed_prefixes[@]}"; do
            major="$(get_prop "${prefix}.version.major")"
            minor="$(get_prop "${prefix}.version.minor")"
            patch="$(get_prop "${prefix}.version.patch")"
            stage="$(get_prop "${prefix}.version.stage")"
            build="$(get_prop "${prefix}.version.build")"
            version="${major}.${minor}.${patch}-${stage}-Build-${build}"
            normalized_version="$(printf '%s' "${version}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9.-' '-')"

            case "${prefix}" in
              rcore) module="RCore" ;;
              rdq) module="RDQ" ;;
              rdr) module="RDR" ;;
              rds) module="RDS" ;;
              rdt) module="RDT" ;;
              *) echo "Unsupported module prefix: ${prefix}" >&2; exit 1 ;;
            esac

            tag="${prefix}-${normalized_version}"
            release_name="${module} ${version}"
            matrix="$(jq -c \
              --arg module "${module}" \
              --arg tag "${tag}" \
              --arg release_name "${release_name}" \
              '. + [{module: $module, tag: $tag, release_name: $release_name}]' <<< "${matrix}")"
          done

          echo "Changed modules matrix: ${matrix}"
          echo "has-changes=true" >> "${GITHUB_OUTPUT}"
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  create-release:
    name: Build And Publish Module Release
    needs: detect-version-changes
    if: ${{ needs.detect-version-changes.outputs.has-changes == 'true' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-version-changes.outputs.matrix) }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build release jars for changed module
        id: build-release
        uses: ./.github/actions/build-release-jars
        with:
          java-version: "21"
          target-module: ${{ matrix.module }}
          jeconfig-token: ${{ secrets.JECONFIG_READ_TOKEN || github.token }}

      - name: Upload jars to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars-${{ matrix.module }}-${{ matrix.tag }}
          path: ${{ steps.build-release.outputs.artifacts-dir }}/*.jar
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ matrix.release_name }}
          generate_release_notes: true
          files: |
            ${{ steps.build-release.outputs.artifacts-dir }}/*.jar
          fail_on_unmatched_files: true
