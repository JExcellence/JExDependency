# Rank System Translation Keys (English - US)
# Generated for RDQ Rank Views

rank_main_ui:
  title: "Rank Trees"
  tree_item:
    name: "<gold>{tree_name}"
    lore:
      - "<gray>{description}"
      - ""
      - "<yellow>Ranks: <white>{rank_count}"
      - "<yellow>Max Tier: <white>{max_tier}"
      - ""
      - "<green>Click to view ranks"
  close_button:
    name: "<red>Close"
    lore:
      - "<gray>Click to close this menu"

rank_tree_ui:
  title: "<gold>{tree_name}"
  rank_item:
    name: "{unlocked_status} <gold>{rank_name}"
    lore:
      - "<gray>{description}"
      - ""
      - "<yellow>Tier: <white>{tier}"
      - "<yellow>Requirements: <white>{requirement_count}"
      - ""
      - "{unlock_status}"

rank_detail_ui:
  title: "<gold>{rank_name}"
  rank_info:
    name: "<gold>{rank_name}"
    lore:
      - "<gray>{description}"
      - ""
      - "<yellow>Tier: <white>{tier}"
      - "<yellow>Weight: <white>{weight}"
      - "<yellow>Group: <white>{group}"
  requirement:
    statistic:
      name: "<yellow>Statistic Requirement"
      lore:
        - "<gray>Statistic: <white>{stat}"
        - "<gray>Amount: <white>{amount}"
    permission:
      name: "<yellow>Permission Requirement"
      lore:
        - "<gray>Permission: <white>{permission}"
    previous_rank:
      name: "<yellow>Previous Rank Requirement"
      lore:
        - "<gray>Required Rank: <white>{rank_id}"
    currency:
      name: "<yellow>Currency Requirement"
      lore:
        - "<gray>Currency: <white>{currency}"
        - "<gray>Amount: <white>{amount}"
    item:
      name: "<yellow>Item Requirement"
      lore:
        - "<gray>Item: <white>{material}"
        - "<gray>Amount: <white>{amount}"
    level:
      name: "<yellow>Level Requirement"
      lore:
        - "<gray>Level: <white>{level}"
    playtime:
      name: "<yellow>Playtime Requirement"
      lore:
        - "<gray>Playtime: <white>{playtime}"
  unlock_button:
    name: "<green>Unlock Rank"
    lore:
      - "<gray>Click to unlock this rank"
      - "<gray>if you meet all requirements."
  unlock_success: "<green>Rank unlocked!"
  unlock_failed: "<red>Cannot unlock rank. Check requirements."
  unlock_error: "<red>Error unlocking rank: {error}"

rank_progress_ui:
  title: "Your Rank Progress"
  progress_item:
    name: "<gold>{tree_name}"
    lore:
      - "<gray>Current: <white>{current_rank}"
      - "<gray>Tier: <white>{tier}"
      - ""
      - "<yellow>Next Rank: <white>{next_rank}"
      - "<yellow>Requirements: <white>{requirement_count}"
      - ""
      - "<green>Click to view tree"
    max_rank:
      lore:
        - "<gray>Current: <white>{current_rank}"
        - "<gray>Tier: <white>{tier}"
        - ""
        - "<green>✓ Max rank reached!"
        - ""
        - "<green>Click to view tree"
  no_progress:
    name: "<red>No Active Rank Paths"
    lore:
      - "<gray>You haven't started any rank paths yet."
      - ""
      - "<yellow>Click 'Back' to browse rank trees"
