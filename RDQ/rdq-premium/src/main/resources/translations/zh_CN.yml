# RDQ Simplified Chinese Translations
# RaindropQuests 插件简体中文翻译

prefix: "<gold>[RDQ]</gold> "

rdq:
  error:
    not_initialized: "<red>RDQ 正在初始化中，请稍候...</red>"
    unknown_subcommand: "<red>未知子命令。使用 /rdq help 查看可用命令。</red>"
    reload_failed: "<red>重载失败: {error}</red>"
  success:
    reloaded: "<green>RDQ 配置重载成功！</green>"

error:
  not_found: "<red>未找到 {type}: {id}</red>"
  insufficient_funds: "<red>资金不足！需要: {required}，可用: {available}</red>"
  on_cooldown: "<red>冷却中！剩余 {remaining}。</red>"
  requirements_not_met: "<red>未满足要求: {missing}</red>"
  self_targeting: "<red>不能选择自己！</red>"
  already_exists: "<red>{type} 已存在: {id}</red>"
  expired: "<red>{type} 已过期: {id}</red>"
  not_unlocked: "<red>{type} 未解锁: {id}</red>"
  permission_denied: "<red>权限不足: {permission}</red>"
  invalid_state: "<red>无效状态: {message}</red>"
  invalid_amount: "<red>无效金额！必须在 {min} 和 {max} 之间。</red>"
  no_permission: "<red>你没有权限执行此操作。</red>"
  player_only: "<red>此命令只能由玩家使用。</red>"

rank:
  error:
    unknown_subcommand: "<red>未知等级子命令。</red>"
    player_not_found: "<red>未找到玩家: {playerName}</red>"
    grant_failed: "<red>授予等级失败。</red>"
    reload_failed: "<red>重载等级失败: {error}</red>"
  success:
    rank_granted: "<green>已将等级 {rankName} 授予 {playerName}！</green>"
    rank_revoked: "<yellow>已从 {playerName} 撤销等级 {rankName}。</yellow>"
    reloaded: "<green>等级配置已重载！</green>"
    rank_unlocked: "<green>恭喜！你已解锁等级 {rankName}！</green>"
  opening_view: "<gray>正在打开等级视图...</gray>"
  no_progress: "<yellow>你还没有开始任何等级路径。</yellow>"
  progress_header: "<yellow>你的等级进度:</yellow>"
  progress_entry: "<gray>• {tree}: <white>{rank}</white></gray>"
  trees_header: "<yellow>可用等级树:</yellow>"
  tree_entry: "<gray>• {id} <dark_gray>({ranks} 个等级)</dark_gray></gray>"
  admin:
    usage: "<yellow>用法: /rank admin <grant|revoke|reload></yellow>"
    unknown: "<red>未知管理员命令。</red>"
    grant:
      usage: "<yellow>用法: /rank admin grant <玩家> <等级></yellow>"
    revoke:
      usage: "<yellow>用法: /rank admin revoke <玩家> <等级></yellow>"
  help: |
    <yellow>等级命令:</yellow>
    <gray>/rank</gray> - 打开等级菜单
    <gray>/rank view</gray> - 查看等级树
    <gray>/rank progress</gray> - 查看进度
    <gray>/rank admin</gray> - 管理员命令
  notification:
    title: "<gold>等级解锁！</gold>"
    subtitle: "<yellow>{rankName}</yellow>"
    actionbar: "<green>你已解锁 {rankName}！</green>"

bounty:
  error:
    unknown_subcommand: "<red>未知悬赏子命令。</red>"
    player_not_found: "<red>未找到玩家: {playerName}</red>"
    self_target: "<red>不能对自己悬赏！</red>"
    invalid_amount: "<red>无效金额。请输入有效数字。</red>"
    invalid_id: "<red>无效悬赏 ID。</red>"
    create_failed: "<red>创建悬赏失败: {error}</red>"
    cancel_failed: "<red>取消悬赏失败。</red>"
  success:
    bounty_created: "<green>已对 {targetName} 悬赏 {amount}！</green>"
    bounty_cancelled: "<yellow>悬赏已取消。资金已退还。</yellow>"
    bounty_removed: "<green>管理员已移除悬赏。</green>"
    bounty_claimed: "<green>你获得了 {amount} 的悬赏！</green>"
    reloaded: "<green>悬赏配置已重载！</green>"
  create:
    usage: "<yellow>用法: /bounty create <玩家> <金额></yellow>"
  cancel:
    usage: "<yellow>用法: /bounty cancel <悬赏ID></yellow>"
  list:
    empty: "<yellow>没有活跃的悬赏。</yellow>"
    header: "<yellow>活跃悬赏 ({count}):</yellow>"
    entry: "<gray>• <white>{target}</white> - {amount} <dark_gray>(由 {placer} 发布)</dark_gray></gray>"
  leaderboard:
    header: "<yellow>赏金猎人排行榜:</yellow>"
    entry: "<gray>{rank}. <white>{player}</white> - {kills} 击杀, 获得 {earned}</gray>"
  my:
    header: "<yellow>你的悬赏:</yellow>"
    placed_header: "<gray>你发布的悬赏:</gray>"
    placed_entry: "<gray>• <white>{target}</white> - {amount}</gray>"
    targeted_header: "<gray>针对你的悬赏:</gray>"
    targeted_entry: "<gray>• {amount} <dark_gray>(由 {placer} 发布)</dark_gray></gray>"
  admin:
    usage: "<yellow>用法: /bounty admin <remove|reload></yellow>"
    unknown: "<red>未知管理员命令。</red>"
    remove:
      usage: "<yellow>用法: /bounty admin remove <悬赏ID></yellow>"
  help: |
    <yellow>悬赏命令:</yellow>
    <gray>/bounty</gray> - 查看活跃悬赏
    <gray>/bounty create <玩家> <金额></gray> - 创建悬赏
    <gray>/bounty cancel <ID></gray> - 取消悬赏
    <gray>/bounty leaderboard</gray> - 查看排行榜
    <gray>/bounty my</gray> - 查看你的悬赏
  announcement:
    created: "<yellow>{placer} 对 {target} 悬赏了 {amount}！</yellow>"
    claimed: "<green>{hunter} 获得了 {target} 的悬赏 {amount}！</green>"
    expired: "<gray>{target} 的悬赏已过期。</gray>"

perk:
  error:
    unknown_subcommand: "<red>未知特权子命令。</red>"
    player_not_found: "<red>未找到玩家: {playerName}</red>"
    perk_not_found: "<red>未找到特权: {perkId}</red>"
    perk_on_cooldown: "<red>此特权正在冷却中！剩余 {remaining}。</red>"
    perk_not_active: "<red>此特权当前未激活。</red>"
    activate_failed: "<red>激活特权失败: {error}</red>"
    grant_failed: "<red>授予特权失败。</red>"
    reload_failed: "<red>重载特权失败: {error}</red>"
  success:
    perk_activated: "<green>特权 {perkName} 已激活！</green>"
    perk_deactivated: "<yellow>特权 {perkName} 已停用。</yellow>"
    perk_granted: "<green>已将特权 {perkName} 授予 {playerName}！</green>"
    perk_revoked: "<yellow>已从 {playerName} 撤销特权 {perkName}。</yellow>"
    perk_unlocked: "<green>你已解锁特权 {perkName}！</green>"
    reloaded: "<green>特权配置已重载！</green>"
  activate:
    usage: "<yellow>用法: /perk activate <特权ID></yellow>"
  deactivate:
    usage: "<yellow>用法: /perk deactivate <特权ID></yellow>"
  info:
    usage: "<yellow>用法: /perk info <特权ID></yellow>"
    header: "<yellow>特权信息: {id}</yellow>"
    details: "<gray>类别: {category} | 冷却: {cooldown}秒 | 持续: {duration}秒</gray>"
  list:
    empty: "<yellow>没有可用的特权。</yellow>"
    header: "<yellow>可用特权 ({count}):</yellow>"
    entry: "<gray>• <white>{id}</white> <dark_gray>({category})</dark_gray></gray>"
  admin:
    usage: "<yellow>用法: /perk admin <grant|revoke|reload></yellow>"
    unknown: "<red>未知管理员命令。</red>"
    grant:
      usage: "<yellow>用法: /perk admin grant <玩家> <特权></yellow>"
    revoke:
      usage: "<yellow>用法: /perk admin revoke <玩家> <特权></yellow>"
  help: |
    <yellow>特权命令:</yellow>
    <gray>/perk</gray> - 查看可用特权
    <gray>/perk activate <特权></gray> - 激活特权
    <gray>/perk deactivate <特权></gray> - 停用特权
    <gray>/perk info <特权></gray> - 查看详情

gui:
  common:
