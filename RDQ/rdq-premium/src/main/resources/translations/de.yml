# RDQ Premium Übersetzungsdatei - Deutsch
# MiniMessage Format mit Farbverläufen und Styling
# Platzhalter verwenden %platzhalter% Format

# Kopfgeld Listener Nachrichten
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du hast ein aktives Kopfgeld auf deinem Kopf!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Kopfgeld Wert:</gradient> <gradient:#10b981:#34d399>%bounty_value%€</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Läuft ab am:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Beauftragt von:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 KOPFGELD EINGELÖST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du hast erfolgreich das Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Dein Anteil:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Jemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>hat das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% Spieler</gradient> <gradient:#a855f7:#c084fc>haben das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"

# Kopfgeld Hauptmenü
bounty_main_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Kopfgeld System</gradient>"
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Kopfgeld Erstellen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um ein neues Kopfgeld</gradient>"
      - "<gradient:#6b7280:#9ca3af>auf einen anderen Spieler zu setzen</gradient>"
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Kopfgelder Anzeigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Alle aktiven Kopfgelder anzeigen</gradient>"
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Meine Kopfgelder</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Von dir erstellte Kopfgelder anzeigen</gradient>"
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Bestenliste</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top Kopfgeldjäger</gradient>"

# Kopfgeld Erstellung
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Kopfgeld Erstellen</gradient>"
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Ziel: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um ein anderes Ziel zu wählen</gradient>"
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Belohnungen (%count%)</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um Belohnungen hinzuzufügen/zu ändern</gradient>"
  currency_rewards:
    name: "<gradient:#f59e0b:#fbbf24>💎 Währungsbelohnungen (%count%)</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um Währungsbelohnungen hinzuzufügen</gradient>"
  confirm:
    name: "<gradient:#10b981:#34d399>✅ Kopfgeld Erstellen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um das Kopfgeld zu erstellen</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Abbrechen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um die Erstellung abzubrechen</gradient>"
  errors:
    no_target: "<gradient:#ef4444:#f87171>❌ Bitte wähle zuerst ein Ziel!</gradient>"
    no_rewards: "<gradient:#ef4444:#f87171>❌ Bitte füge mindestens eine Belohnung hinzu!</gradient>"
    creation_failed: "<gradient:#ef4444:#f87171>❌ Kopfgeld konnte nicht erstellt werden. Versuche es erneut.</gradient>"
  success:
    created: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich erstellt!</gradient>"

# Kopfgeld Belohnungen
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Kopfgeld Belohnungen</gradient>"
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Keine Belohnungen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Füge Gegenstände hinzu um Belohnungen zu erstellen</gradient>"
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Gegenstand Hinzufügen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Platziere Gegenstände hier als Belohnungen</gradient>"
      - "<gradient:#6b7280:#9ca3af>Rechtsklick um Gegenstände zu entfernen</gradient>"
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Kopfgeld Belohnung</gradient>"
      - "<gradient:#6b7280:#9ca3af>Dieser Gegenstand wird demjenigen gegeben</gradient>"
      - "<gradient:#6b7280:#9ca3af>der das Kopfgeld einlöst</gradient>"
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Keine neuen Gegenstände wurden hinzugefügt!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Einige Gegenstände wurden fallen gelassen da dein Inventar voll war!</gradient>"

# Kopfgeld Spieler Info
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>👤 Spieler Kopfgeld Info</gradient>"
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Zielspieler Informationen</gradient>"
  bounty_value:
    name: "<gradient:#10b981:#34d399>💰 Gesamtwert</gradient>"
    lore:
      - "<gradient:#10b981:#34d399>%bounty_value%€</gradient>"
  rewards:
    name: "<gradient:#a855f7:#c084fc>🎁 Belohnungen Anzeigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um alle Belohnungen zu sehen</gradient>"
  claim_bounty:
    name: "<gradient:#ef4444:#f87171>⚔ Kopfgeld Einlösen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Besiege diesen Spieler um</gradient>"
      - "<gradient:#6b7280:#9ca3af>das Kopfgeld einzulösen</gradient>"

# Kopfgeld Übersicht
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Aktive Kopfgelder</gradient>"
  no_bounties:
    name: "<gradient:#6b7280:#9ca3af>📭 Keine Aktiven Kopfgelder</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Es gibt derzeit keine</gradient>"
      - "<gradient:#6b7280:#9ca3af>aktiven Kopfgelder</gradient>"

# Spieler Auswahl
paginated_player_ui:
  title: "<gradient:#a855f7:#c084fc>👥 Spieler Auswählen</gradient>"
  search:
    name: "<gradient:#3b82f6:#60a5fa>🔍 Spieler Suchen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um nach einem Spieler zu suchen</gradient>"
  player_item:
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um diesen Spieler auszuwählen</gradient>"

# Admin Ansichten
admin_overview_ui:
  title: "<gradient:#ef4444:#f87171>⚙ Admin Übersicht</gradient>"

admin_permissions_ui:
  title: "<gradient:#ef4444:#f87171>🔐 Admin Berechtigungen</gradient>"

# Bestätigung
confirmation_ui:
  title: "<gradient:#f59e0b:#fbbf24>❓ Aktion Bestätigen</gradient>"
  confirm:
    name: "<gradient:#10b981:#34d399>✅ Bestätigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um diese Aktion zu bestätigen</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Abbrechen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um diese Aktion abzubrechen</gradient>"

# Allgemeine UI Elemente
ui:
  back:
    name: "<gradient:#6b7280:#9ca3af>← Zurück</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Zum vorherigen Menü zurückkehren</gradient>"
  next_page:
    name: "<gradient:#3b82f6:#60a5fa>→ Nächste Seite</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Zur nächsten Seite gehen</gradient>"
  previous_page:
    name: "<gradient:#3b82f6:#60a5fa>← Vorherige Seite</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Zur vorherigen Seite gehen</gradient>"
  close:
    name: "<gradient:#ef4444:#f87171>✖ Schließen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Dieses Menü schließen</gradient>"

# Fehlermeldungen
errors:
  permission_denied: "<gradient:#ef4444:#f87171>❌ Du hast keine Berechtigung dafür!</gradient>"
  player_not_found: "<gradient:#ef4444:#f87171>❌ Spieler nicht gefunden!</gradient>"
  bounty_not_found: "<gradient:#ef4444:#f87171>❌ Kopfgeld nicht gefunden!</gradient>"
  insufficient_funds: "<gradient:#ef4444:#f87171>❌ Unzureichende Mittel!</gradient>"
  max_bounties_reached: "<gradient:#ef4444:#f87171>❌ Du hast die maximale Anzahl an Kopfgeldern erreicht!</gradient>"
  cannot_target_self: "<gradient:#ef4444:#f87171>❌ Du kannst kein Kopfgeld auf dich selbst setzen!</gradient>"
  target_has_bounty: "<gradient:#ef4444:#f87171>❌ Dieser Spieler hat bereits ein Kopfgeld!</gradient>"

# Erfolgsmeldungen
success:
  bounty_created: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich erstellt!</gradient>"
  bounty_updated: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich aktualisiert!</gradient>"
  bounty_deleted: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich gelöscht!</gradient>"
  reward_added: "<gradient:#10b981:#34d399>✅ Belohnung erfolgreich hinzugefügt!</gradient>"

# Prefix
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "