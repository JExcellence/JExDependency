    success: "<gradient:#10b981:#34d399>✅ Nagroda pomyślnie utworzona dla</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Błąd przetwarzania nagrody:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Aktualizowanie nagrody...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Rozpoczęto postęp dla rangi</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Wyświetlanie wymagań dla</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Wymagania niekompletne dla</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% ukończone)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Wymaganie niekompletne:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
