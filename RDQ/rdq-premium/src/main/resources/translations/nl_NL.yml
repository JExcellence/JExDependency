# RDQ Vertaalbestand - Nederlands
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Er staat een premie op je hoofd!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Premie Waarde:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Verloopt:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Opdrachtgever:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 PREMIE GECLAIMD! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Je hebt de premie op</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>succesvol geclaimd!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Jouw deel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Iemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>heeft de premie op</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>geclaimd!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spelers</gradient> <gradient:#a855f7:#c084fc>hebben de premie op</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>geclaimd!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Premie succesvol aangemaakt voor</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Fout bij verwerken premie:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Premie wordt bijgewerkt...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Voortgang gestart voor rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Vereisten bekijken voor</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Vereisten onvolledig voor</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% voltooid)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Vereiste onvolledig:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>heeft geen vereisten!</gradient>"

rank_click:
