    rank_path_selected: "<gradient:#10b981:#34d399>✅ Chemin de rangs sélectionné:</gradient> <gradient:#f59e0b:#fbbf24>%rank_path%</gradient> <gradient:#6b7280:#9ca3af>(Rang de départ: %rank%)</gradient>"
    rank_path_selection_failed: "<gradient:#ef4444:#f87171>❌ Échec de la sélection du chemin de rangs!</gradient>"
    rank_path_reactivated: "<gradient:#10b981:#34d399>✅ Chemin de rangs réactivé:</gradient> <gradient:#f59e0b:#fbbf24>%rank_path%</gradient>"
