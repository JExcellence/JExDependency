  help: "<gradient:#a855f7:#c084fc>📖 Aide RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Ouvrir le menu principal</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Voir les rangs</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Voir les primes</gradient>"

