# RDQ Premium Übersetzungsdatei - Deutsch (Deutschland)
# MiniMessage Format mit Farbverläufen und Styling
# Platzhalter verwenden %platzhalter% Format

# Kopfgeld Listener Nachrichten
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du hast ein aktives Kopfgeld auf deinem Kopf!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Kopfgeld Wert:</gradient> <gradient:#10b981:#34d399>%bounty_value%€</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Läuft ab am:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Beauftragt von:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 KOPFGELD EINGELÖST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du hast erfolgreich das Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Dein Anteil:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Jemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>hat das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% Spieler</gradient> <gradient:#a855f7:#c084fc>haben das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"

# Kopfgeld Hauptmenü
bounty_main_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Kopfgeld System</gradient>"
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Kopfgeld Erstellen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um ein neues Kopfgeld</gradient>"
      - "<gradient:#6b7280:#9ca3af>auf einen anderen Spieler zu setzen</gradient>"
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Kopfgelder Anzeigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Alle aktiven Kopfgelder anzeigen</gradient>"
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Meine Kopfgelder</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Von dir erstellte Kopfgelder anzeigen</gradient>"
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Bestenliste</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top Kopfgeldjäger</gradient>"

# Prefix
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "