requirements:
  statistic: "{amount}x {statistic}"
  permission: "Permission: {permission}"
  rank: "Rank: {rank}"
  currency: "{amount} {currency}"
  item: "{amount}x {item}"
  level: "Level {level}"

time:
  seconds: "{value}s"
  minutes: "{value}m"
  hours: "{value}h"
  days: "{value}d"
