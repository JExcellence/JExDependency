# RDQ Premium Translation File - English (UK)
# MiniMessage format with gradients and styling
# Placeholders use %placeholder% format

# Bounty Listener Messages
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>You have an active bounty on your head!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Bounty Value:</gradient> <gradient:#10b981:#34d399>£%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expires at:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissioned by:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BOUNTY CLAIMED! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>You successfully claimed the bounty on</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Your share:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Someone</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>has claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% players</gradient> <gradient:#a855f7:#c084fc>have claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Bounty Main View
bounty_main_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Bounty System</gradient>"
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Create Bounty</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to create a new bounty</gradient>"
      - "<gradient:#6b7280:#9ca3af>on another player</gradient>"
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 View Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View all active bounties</gradient>"
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 My Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View bounties you've created</gradient>"
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Leaderboard</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top bounty hunters</gradient>"

# Prefix
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "