  vampire: "Vampire"

rank_trees:
  warrior:
    name: "Warrior"
    description: "The path of strength and combat."
  cleric:
    name: "Cleric"
    description: "The path of healing and support."
  mage:
    name: "Mage"
    description: "The path of magic and wisdom."
  rogue:
    name: "Rogue"
    description: "The path of stealth and agility."
  merchant:
    name: "Merchant"
    description: "The path of trade and wealth."
  ranger:
    name: "Ranger"
