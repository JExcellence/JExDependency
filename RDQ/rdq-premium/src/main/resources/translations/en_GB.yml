  speed: "Speed Boost"
  strength: "Strength"
  resistance: "Resistance"
  regeneration: "Regeneration"
  night_vision: "Night Vision"
  fire_resistance: "Fire Resistance"
  water_breathing: "Water Breathing"
  jump_boost: "Jump Boost"
  haste: "Haste"
  luck: "Luck"
  fly: "Flight"
  double_experience: "Double XP"
