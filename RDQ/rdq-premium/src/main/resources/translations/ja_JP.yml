# RDQ Premium 翻訳ファイル - 日本語
# MiniMessage形式、グラデーションとスタイル付き
# プレースホルダーは %placeholder% 形式を使用

# 賞金リスナーメッセージ
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>あなたの頭にアクティブな賞金がかかっています！</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 賞金額：</gradient> <gradient:#10b981:#34d399>%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 期限：</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 依頼者：</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 賞金獲得！🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>あなたは</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>あなたの取り分：</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>誰か</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>が</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% 人のプレイヤー</gradient> <gradient:#a855f7:#c084fc>が</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"

# 賞金メインビュー
bounty_main_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 賞金システム</gradient>"
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 賞金作成</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックして新しい賞金を</gradient>"
      - "<gradient:#6b7280:#9ca3af>他のプレイヤーにかける</gradient>"
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 賞金表示</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>すべてのアクティブな賞金を表示</gradient>"
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 私の賞金</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>あなたが作成した賞金を表示</gradient>"
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 リーダーボード</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>トップ賞金ハンター</gradient>"

# プレフィックス
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "