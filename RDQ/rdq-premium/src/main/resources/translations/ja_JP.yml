    lore:
      - "<gradient:#6b7280:#9ca3af>ターゲット:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>依頼者:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>作成日:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>クリックで詳細を表示</gradient>"

bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 懸賞金作成 - %target_name%</gradient>"
  select_target:
    title: "<gradient:#a855f7:#c084fc>🎯 ターゲット選択</gradient>"
    name: "<gradient:#f59e0b:#fbbf24>🎯 ターゲット: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックでプレイヤーを選択</gradient>"
      - "<gradient:#6b7280:#9ca3af>現在: %target_name%</gradient>"
  confirm:
    no_player_selected: "<gradient:#ef4444:#f87171>❌ プレイヤーが選択されていません！</gradient>"
    no_rewards_selected: "<gradient:#ef4444:#f87171>❌ 報酬が追加されていません！</gradient>"
    confirmation: "<gradient:#f59e0b:#fbbf24>⏳</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient> <gradient:#f59e0b:#fbbf24>への懸賞金を作成中...</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ エラー:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>への懸賞金が作成されました！</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>📦 アイテムが返却されました！</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 戻る</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックで戻る</gradient>"
  previous:
