# RDQ Premium Translation File - English (US)
# MiniMessage format with gradients and styling
# Placeholders use %placeholder% format

# Bounty Listener Messages
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>You have an active bounty on your head!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Bounty Value:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expires at:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissioned by:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BOUNTY CLAIMED! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>You successfully claimed the bounty on</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Your share:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Someone</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>has claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% players</gradient> <gradient:#a855f7:#c084fc>have claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Bounty Main View
bounty_main_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Bounty System</gradient>"
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Create Bounty</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to create a new bounty</gradient>"
      - "<gradient:#6b7280:#9ca3af>on another player</gradient>"
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 View Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View all active bounties</gradient>"
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 My Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View bounties you've created</gradient>"
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Leaderboard</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top bounty hunters</gradient>"

# Bounty Creation View
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Create Bounty</gradient>"
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Target: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to select a different target</gradient>"
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Rewards (%count%)</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to add/modify rewards</gradient>"
  currency_rewards:
    name: "<gradient:#f59e0b:#fbbf24>💎 Currency Rewards (%count%)</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to add currency rewards</gradient>"
  confirm:
    name: "<gradient:#10b981:#34d399>✅ Create Bounty</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to create the bounty</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Cancel</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to cancel creation</gradient>"
  errors:
    no_target: "<gradient:#ef4444:#f87171>❌ Please select a target first!</gradient>"
    no_rewards: "<gradient:#ef4444:#f87171>❌ Please add at least one reward!</gradient>"
    creation_failed: "<gradient:#ef4444:#f87171>❌ Failed to create bounty. Please try again.</gradient>"
  success:
    created: "<gradient:#10b981:#34d399>✅ Bounty created successfully!</gradient>"

# Bounty Reward View
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Bounty Rewards</gradient>"
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 No Rewards</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Add items to create rewards</gradient>"
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Add Item</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Place items here to add as rewards</gradient>"
      - "<gradient:#6b7280:#9ca3af>Right-click to remove items</gradient>"
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Bounty Reward</gradient>"
      - "<gradient:#6b7280:#9ca3af>This item will be given to</gradient>"
      - "<gradient:#6b7280:#9ca3af>whoever claims the bounty</gradient>"
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ No new items were added!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Some items were dropped as your inventory was full!</gradient>"

# Prefix
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "