# RDQ 번역 파일 - 한국어
# MiniMessage 형식 (그라데이션 및 스타일링)
# 플레이스홀더는 %placeholder% 형식 사용

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>당신에게 현상금이 걸려있습니다!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 현상금:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 만료:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 의뢰인:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 현상금 획득! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc></gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>당신의 몫:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>누군가</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>님이</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count%명의 플레이어</gradient> <gradient:#a855f7:#c084fc>가</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>에 대한 현상금이 생성되었습니다!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 현상금 처리 실패:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ 현상금 업데이트 중...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ 랭크</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#10b981:#34d399>진행 시작</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#3b82f6:#60a5fa>요구사항 보기</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#f59e0b:#fbbf24>요구사항 미완료</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% 완료)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ 요구사항 미완료:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>에는 요구사항이 없습니다!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 미리보기 모드:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#10b981:#34d399>보유 중</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 잠김:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- 선행 조건을 먼저 완료하세요</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms가 설치되지 않았습니다!</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests 도움말</gradient>\n<gradient:#6b7280:#9ca3af>/rq - 메인 메뉴 열기</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - 랭크 보기</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - 현상금 보기</gradient>"

main_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎮 RaindropQuests</gradient>"
  admin_overview:
    name: "<gradient:#ef4444:#f87171>⚙ 관리자 패널</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>관리 도구 및 설정 옵션에</gradient>"
      - "<gradient:#6b7280:#9ca3af>접근합니다</gradient>"
  bounty_overview:
    name: "<gradient:#f59e0b:#fbbf24>🎯 현상금</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>현상금 보기 및 관리</gradient>"
      - "<gradient:#6b7280:#9ca3af>보상을 위해 플레이어를 사냥하세요!</gradient>"
  perk_overview:
    name: "<gradient:#10b981:#34d399>✨ 특전</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>사용 가능한 특전 및</gradient>"
      - "<gradient:#6b7280:#9ca3af>특수 능력 보기</gradient>"
  quest_overview:
    name: "<gradient:#3b82f6:#60a5fa>📜 퀘스트</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>사용 가능한 퀘스트 보기</gradient>"
      - "<gradient:#6b7280:#9ca3af>진행 상황 추적</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ 랭크</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>랭크 진행 상황 보기</gradient>"
      - "<gradient:#6b7280:#9ca3af>새로운 능력 잠금 해제</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ 랭크 시스템</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 랭크 트리</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>사용 가능한 랭크 트리 탐색</gradient>"
      - "<gradient:#6b7280:#9ca3af>당신의 길을 선택하세요</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 돌아가기</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 돌아가기</gradient>"
  previous:
    name: "<gradient:#3b82f6:#60a5fa>⬅️ 이전</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>이전 페이지</gradient>"
  next:
    name: "<gradient:#3b82f6:#60a5fa>➡️ 다음</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>다음 페이지</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ 취소</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>작업 취소</gradient>"
