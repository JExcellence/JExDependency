# RDQ File di Traduzione - Italiano
# Formato MiniMessage con gradienti e stili
# I segnaposto usano il formato %placeholder%

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Hai una taglia attiva sulla tua testa!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valore Taglia:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Scade:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissionato da:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 TAGLIA RISCOSSA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Hai riscosso con successo la taglia su</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>La tua parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Qualcuno</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>ha riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% giocatori</gradient> <gradient:#a855f7:#c084fc>hanno riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Taglia creata con successo per</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Errore nell'elaborazione della taglia:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Aggiornamento taglia in corso...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progressione iniziata per il grado</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Visualizzazione requisiti per</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisiti incompleti per</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% completato)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisito incompleto:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>non ha requisiti!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Modalità anteprima:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Possiedi</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Bloccato:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Completa prima i prerequisiti</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms non è installato!</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 Aiuto RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Apri menu principale</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Visualizza gradi</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Visualizza taglie</gradient>"

main_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎮 RaindropQuests</gradient>"
  admin_overview:
    name: "<gradient:#ef4444:#f87171>⚙ Pannello Admin</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Accedi agli strumenti di amministrazione</gradient>"
      - "<gradient:#6b7280:#9ca3af>e opzioni di configurazione</gradient>"
  bounty_overview:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Taglie</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza e gestisci le taglie</gradient>"
      - "<gradient:#6b7280:#9ca3af>Caccia giocatori per ricompense!</gradient>"
  perk_overview:
    name: "<gradient:#10b981:#34d399>✨ Vantaggi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza vantaggi disponibili</gradient>"
      - "<gradient:#6b7280:#9ca3af>e abilità speciali</gradient>"
  quest_overview:
    name: "<gradient:#3b82f6:#60a5fa>📜 Missioni</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza missioni disponibili</gradient>"
      - "<gradient:#6b7280:#9ca3af>e traccia i tuoi progressi</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ Gradi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza progressione gradi</gradient>"
      - "<gradient:#6b7280:#9ca3af>e sblocca nuove abilità</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ Sistema Gradi</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 Alberi dei Gradi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Esplora gli alberi dei gradi disponibili</gradient>"
      - "<gradient:#6b7280:#9ca3af>e scegli il tuo percorso</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Indietro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per tornare indietro</gradient>"
  previous:
    name: "<gradient:#3b82f6:#60a5fa>⬅️ Precedente</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Pagina precedente</gradient>"
  next:
    name: "<gradient:#3b82f6:#60a5fa>➡️ Successivo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Pagina successiva</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Annulla</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Annulla azione</gradient>"
