# RDQ Übersetzungsdatei - Deutsch (Deutschland)
# MiniMessage Format mit Farbverläufen und Styling
# Platzhalter verwenden %placeholder% Format

# ============================================
# GLOBALES PRÄFIX
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# KOPFGELD-LISTENER NACHRICHTEN
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du hast ein aktives Kopfgeld auf deinem Kopf!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Kopfgeld-Wert:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Läuft ab:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Auftraggeber:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 KOPFGELD EINGEFORDERT! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du hast das Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>erfolgreich eingefordert!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Dein Anteil:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Jemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>hat das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingefordert!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% Spieler</gradient> <gradient:#a855f7:#c084fc>haben das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingefordert!</gradient>"

# ============================================
# KOPFGELD-ERSTELLUNG NACHRICHTEN
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich erstellt für</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Kopfgeld-Verarbeitung fehlgeschlagen:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Kopfgeld wird aktualisiert...</gradient>"

# ============================================
# RANG-FORTSCHRITT NACHRICHTEN
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Fortschritt für Rang gestartet</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Anforderungen anzeigen für</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Anforderungen unvollständig für</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% abgeschlossen)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Anforderung unvollständig:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
