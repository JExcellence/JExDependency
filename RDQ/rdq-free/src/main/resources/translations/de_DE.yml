    locked.required:
      - "<gradient:#6b7280:#9ca3af>Schließe zuerst %minimum_rank_paths_to_be_absolved_needed% Rang-Bäume ab</gradient>"
    pre_requisites: "<gradient:#f59e0b:#fbbf24>Voraussetzungen:</gradient>"
