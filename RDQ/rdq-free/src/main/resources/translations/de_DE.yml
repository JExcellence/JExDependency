# ============================================
# RANG-KLICK NACHRICHTEN
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Vorschau-Modus:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Du besitzt</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Gesperrt:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Erfülle zuerst die Voraussetzungen</gradient>"

# ============================================
# RQ BEFEHL NACHRICHTEN
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms ist nicht installiert!</gradient> <gradient:#6b7280:#9ca3af>Diese Funktion benötigt LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hilfe</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Hauptmenü öffnen</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Ränge anzeigen</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Kopfgelder anzeigen</gradient>"

