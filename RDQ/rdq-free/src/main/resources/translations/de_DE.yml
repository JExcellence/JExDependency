    rank_path_starting_rank_not_found: "<gradient:#ef4444:#f87171>❌ Startrang für diesen Pfad nicht gefunden!</gradient>"
    rank_path_selected: "<gradient:#10b981:#34d399>✅ Rang-Pfad ausgewählt:</gradient> <gradient:#f59e0b:#fbbf24>%rank_path%</gradient> <gradient:#6b7280:#9ca3af>(Startrang: %rank%)</gradient>"
    rank_path_selection_failed: "<gradient:#ef4444:#f87171>❌ Rang-Pfad Auswahl fehlgeschlagen!</gradient>"
