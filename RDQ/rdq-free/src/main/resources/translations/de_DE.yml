    rank_path_reactivation_failed: "<gradient:#ef4444:#f87171>❌ Rang-Pfad Reaktivierung fehlgeschlagen!</gradient>"
    rank_tree_creation_coming_soon: "<gradient:#f59e0b:#fbbf24>⏳ Rang-Baum Erstellung kommt bald!</gradient>"


