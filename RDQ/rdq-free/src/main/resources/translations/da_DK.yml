  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjælp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Åbn hovedmenuen</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Vis ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Vis dusører</gradient>"

