# ============================================
# QUEST DETAIL VIEW I18N KEYS
# ============================================
view:
  quest:
    detail:
      title: "<gradient:#3b82f6:#60a5fa>Quest Details</gradient>"
      
      # Quest info section
      error:
        quest_not_found: "<red>Quest not found</red>"
      
      difficulty:
        trivial: "<gray>Difficulty: Trivial</gray>"
        easy: "<green>Difficulty: Easy</green>"
        medium: "<yellow>Difficulty: Medium</yellow>"
        hard: "<gold>Difficulty: Hard</gold>"
        legendary: "<gradient:#f59e0b:#ef4444>Difficulty: Legendary</gradient>"
      
      info:
        repeatable: "<aqua>✓ Repeatable Quest</aqua>"
        cooldown: "<gray>Cooldown: {time}</gray>"
        time_limit: "<yellow>⏱ Time Limit: {time}</yellow>"
        prerequisites: "<gray>Prerequisites: {count} quest(s)</gray>"
      
      # Requirements section
      requirement:
        met: "<green>✓ Requirement Met</green>"
        not_met: "<red>✗ Not Met</red>"
        progress: "<yellow>Progress: {progress}%</yellow>"
      
      # Tasks section
      task:
        not_started: "<gray>Not started</gray>"
        difficulty: "<gray>Difficulty: {difficulty}</gray>"
        optional: "<aqua>Optional Task</aqua>"
        progress_bar: "<yellow>{current}/{required}</yellow>"
        progress_percentage: "<gray>Progress: {percentage}%</gray>"
        completed: "<green>✓ Completed</green>"
        remaining: "<yellow>Remaining: {remaining}</yellow>"
      
      # Rewards section
      reward:
        value: "<gold>Value: {value} coins</gold>"
      
      # Action buttons
      items:
        start:
          name: "<green>▶ Start Quest</green>"
          lore:
            - "<gray>Click to start this quest</gray>"
        abandon:
          name: "<red>✗ Abandon Quest</red>"
          lore:
            - "<gray>Click to abandon this quest</gray>"
            - "<red>Progress will be lost!</red>"
        on_cooldown:
          name: "<yellow>⏱ On Cooldown</yellow>"
          lore:
            - "<gray>Time remaining: {time}</gray>"
        cannot_start:
          name: "<red>✗ Cannot Start</red>"
          lore:
            - "<gray>Requirements not met</gray>"
      
      # Notifications
      notification:
        started: "<green>Quest started: {quest}</green>"
        abandoned: "<yellow>Quest abandoned: {quest}</yellow>"
      
      # Errors
      error:
        general: "<red>An error occurred</red>"
        already_active: "<red>This quest is already active</red>"
        max_active: "<red>Maximum active quests reached ({max})</red>"
        requirements_not_met: "<red>Requirements not met</red>"
        prerequisites_not_met: "<red>Prerequisites not completed</red>"
        on_cooldown: "<yellow>Quest on cooldown: {time}</yellow>"
        quest_not_found: "<red>Quest not found: {quest}</red>"
        not_active: "<red>This quest is not active</red>"

