# Fabricator Configuration - Advanced Server Example
# High cost, fast operation, extensive upgrades
# Designed for end-game content with economy integration

fabricator:
  enabled: true
  permission: "rdq.machine.fabricator"
  
  # Complex multi-block structure
  structure:
    core-block: DROPPER
    required-blocks:
      - type: HOPPER
        relative-positions:
          - {x: 0, y: -1, z: 0}   # Below
          - {x: 1, y: 0, z: 0}    # East
          - {x: -1, y: 0, z: 0}   # West
          - {x: 0, y: 0, z: -1}   # North
      - type: CHEST
        relative-positions:
          - {x: 0, y: 0, z: 1}    # South (output)
      - type: IRON_BLOCK
        relative-positions:
          - {x: 1, y: -1, z: 0}   # Below East
          - {x: -1, y: -1, z: 0}  # Below West
  
  # Expensive blueprint with currency
  blueprint:
    requirements:
      composite:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 50000.0
          items:
            type: "item"
            required-items:
              diamond:
                material: DIAMOND
                amount: 32
              redstone-block:
                material: REDSTONE_BLOCK
                amount: 8
              netherite:
                material: NETHERITE_INGOT
                amount: 2
  
  # Fast crafting
  crafting:
    base-cooldown-ticks: 60  # 3 seconds per craft
    recipe-grid-size: 3
    max-output-stack-size: 64
  
  # Advanced fuel system
  fuel:
    enabled: true
    base-consumption: 8  # Lower consumption
    fuel-types:
      coal:
        material: COAL
        energy-value: 100
      charcoal:
        material: CHARCOAL
        energy-value: 100
      coal-block:
        material: COAL_BLOCK
        energy-value: 900
      lava-bucket:
        material: LAVA_BUCKET
        energy-value: 2000
      blaze-rod:
        material: BLAZE_ROD
        energy-value: 150
      blaze-powder:
        material: BLAZE_POWDER
        energy-value: 75
  
  # Extensive upgrade system
