# Fabricator Machine Configuration
# Settings specific to the Fabricator automated crafting machine

# Enable Fabricator machine type
enabled: true

# Permission required to use Fabricator machines
permission: "rdq.machine.fabricator"

# Multi-block structure definition
structure:
  # Core block type (the main machine block)
  core-block: DROPPER
  
  # Required blocks with relative positions from core block
  required-blocks:
    - type: HOPPER
      relative-positions:
        - {x: 0, y: -1, z: 0}   # Below core
        - {x: 1, y: 0, z: 0}    # East
        - {x: -1, y: 0, z: 0}   # West
    - type: CHEST
      relative-positions:
        - {x: 0, y: 0, z: 1}    # South (output)

# Blueprint requirements for constructing a Fabricator
blueprint:
  requirements:
    currency:
      type: "currency"
      currency-type: "vault"
      currency-amount: 10000.0
    items:
      type: "item"
      required-items:
        diamond:
          material: DIAMOND
          amount: 16
        redstone:
          material: REDSTONE_BLOCK
          amount: 4

# Crafting configuration
crafting:
  # Base cooldown in ticks between crafts (100 ticks = 5 seconds)
  base-cooldown-ticks: 100
  # Recipe grid size (3 = 3x3 crafting grid)
  recipe-grid-size: 3
  # Maximum output stack size
  max-output-stack-size: 64

# Fuel system configuration
fuel:
  # Enable fuel requirement for crafting
  enabled: true
  # Base fuel consumption per craft operation
  base-consumption: 10
  
  # Fuel types and their energy values
  fuel-types:
    coal:
      material: COAL
      energy-value: 100
    coal-block:
      material: COAL_BLOCK
      energy-value: 900
    lava-bucket:
      material: LAVA_BUCKET
      energy-value: 2000

# Upgrade system configuration
upgrades:
  # Speed upgrade - reduces crafting cooldown
  speed:
    # Maximum upgrade level
    max-level: 5
    # Effect per level (0.10 = 10% faster per level)
    effect-per-level: 0.10
    # Requirements for each level
    requirements:
      level-1:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 5000.0
          items:
            type: "item"
            required-items:
              redstone:
                material: REDSTONE
                amount: 32
      level-2:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 7500.0
          items:
            type: "item"
            required-items:
              redstone:
                material: REDSTONE
                amount: 64
      level-3:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 10000.0
          items:
            type: "item"
            required-items:
              redstone:
                material: REDSTONE_BLOCK
                amount: 16
      level-4:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 15000.0
          items:
            type: "item"
            required-items:
              redstone:
                material: REDSTONE_BLOCK
                amount: 32
      level-5:
        type: "composite"
        operator: "AND"
        sub-requirements:
          currency:
            type: "currency"
            currency-type: "vault"
            currency-amount: 25000.0
          items:
            type: "item"
            required-items:
              redstone:
                material: REDSTONE_BLOCK
                amount: 64
  
  # Efficiency upgrade - chance to not consume fuel
  efficiency:
    max-level: 5
    # Effect per level (0.15 = 15% chance to not consume fuel per level)
    effect-per-level: 0.15
    requirements:
      level-1:
        type: "item"
        required-items:
          diamond:
            material: DIAMOND
            amount: 8
      level-2:
        type: "item"
        required-items:
          diamond:
            material: DIAMOND
            amount: 16
      level-3:
        type: "item"
        required-items:
          diamond:
            material: DIAMOND
            amount: 32
      level-4:
        type: "item"
        required-items:
          diamond:
            material: DIAMOND_BLOCK
            amount: 8
      level-5:
        type: "item"
        required-items:
          diamond:
            material: DIAMOND_BLOCK
            amount: 16
  
  # Bonus output upgrade - chance for double output
  bonus-output:
    max-level: 3
    # Effect per level (0.10 = 10% chance for double output per level)
    effect-per-level: 0.10
    requirements:
      level-1:
        type: "item"
        required-items:
          emerald:
            material: EMERALD
            amount: 16
      level-2:
        type: "item"
        required-items:
          emerald:
            material: EMERALD
            amount: 32
      level-3:
        type: "item"
        required-items:
          emerald:
            material: EMERALD_BLOCK
            amount: 16
  
  # Fuel reduction upgrade - reduces fuel consumption
  fuel-reduction:
    max-level: 5
    # Effect per level (0.10 = 10% less fuel consumption per level)
    effect-per-level: 0.10
    requirements:
      level-1:
        type: "item"
        required-items:
          gold-ingot:
            material: GOLD_INGOT
            amount: 16
      level-2:
        type: "item"
        required-items:
          gold-ingot:
            material: GOLD_INGOT
            amount: 32
      level-3:
        type: "item"
        required-items:
          gold-ingot:
            material: GOLD_BLOCK
            amount: 8
      level-4:
        type: "item"
        required-items:
          gold-ingot:
            material: GOLD_BLOCK
            amount: 16
      level-5:
        type: "item"
        required-items:
          gold-ingot:
            material: GOLD_BLOCK
            amount: 32
