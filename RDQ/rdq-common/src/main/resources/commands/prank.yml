commands:
  prank:
    name: 'prank'
    description: 'View and manage rank progression'
    aliases:
      - rank
      - ranks
      - rankup
    usage: '/prank [view|progress|trees|admin] [args...]'
    errorMessages:
      unknownSubcommand$: 'lut["prefix"] & "&cUnknown subcommand. Use /prank help for available commands."'
      noPermission$: 'lut["prefix"] & "&cYou do not have permission to use this command."'
      playerOnly$: 'lut["prefix"] & "&cThis command can only be used by players."'
      rankNotFound$: 'lut["prefix"] & "&cRank not found: " & rankId'
      treeNotFound$: 'lut["prefix"] & "&cRank tree not found: " & treeId'
      playerNotFound$: 'lut["prefix"] & "&cPlayer not found: " & playerName'
      requirementsNotMet$: 'lut["prefix"] & "&cYou do not meet the requirements for this rank."'
      alreadyUnlocked$: 'lut["prefix"] & "&cYou have already unlocked this rank."'
    successMessages:
      rankUnlocked$: 'lut["prefix"] & "&aYou have unlocked the rank: &e" & rankName'
      rankGranted$: 'lut["prefix"] & "&aGranted rank &e" & rankName & " &ato &f" & playerName'
      rankRevoked$: 'lut["prefix"] & "&aRevoked rank &e" & rankName & " &afrom &f" & playerName'
      reloaded$: 'lut["prefix"] & "&aRank configuration reloaded!"'
    permissions:
      missingMessage$: 'lut["prefix"] & "&cYou lack the permission: " & permission'
      nodes:
        use: 'rdq.rank.use'
        view: 'rdq.rank.view'
        progress: 'rdq.rank.progress'
        admin: 'rdq.rank.admin'
        grant: 'rdq.rank.admin.grant'
        revoke: 'rdq.rank.admin.revoke'
        reload: 'rdq.rank.admin.reload'

lut:
  prefix: '&8[&6RDQ&8] &7'
