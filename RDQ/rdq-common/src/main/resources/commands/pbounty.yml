commands:
  pbounty:
    name: 'pbounty'
    description: 'Place and manage bounties on players'
    aliases:
      - bounty
      - bounties
      - hunt
    usage: '/pbounty [create|list|claim|cancel|leaderboard|admin] [args...]'
    errorMessages:
      unknownSubcommand$: 'lut["prefix"] & "&cUnknown subcommand. Use /bounty help for available commands."'
      noPermission$: 'lut["prefix"] & "&cYou do not have permission to use this command."'
      playerOnly$: 'lut["prefix"] & "&cThis command can only be used by players."'
      playerNotFound$: 'lut["prefix"] & "&cPlayer not found: " & playerName'
      selfTarget$: 'lut["prefix"] & "&cYou cannot place a bounty on yourself!"'
      insufficientFunds$: 'lut["prefix"] & "&cInsufficient funds. Required: &e" & required & "&c, Available: &e" & available'
      invalidAmount$: 'lut["prefix"] & "&cInvalid amount. Must be between &e" & min & " &cand &e" & max'
      bountyNotFound$: 'lut["prefix"] & "&cBounty not found."'
      notYourBounty$: 'lut["prefix"] & "&cYou can only cancel your own bounties."'
      noBountiesOnTarget$: 'lut["prefix"] & "&cNo active bounties on this player."'
      bountyExpired$: 'lut["prefix"] & "&cThis bounty has expired."'
    successMessages:
      bountyCreated$: 'lut["prefix"] & "&aPlaced a bounty of &e" & amount & " &aon &f" & targetName'
      bountyClaimed$: 'lut["prefix"] & "&aYou claimed a bounty worth &e" & reward & " &afor killing &f" & targetName'
      bountyCancelled$: 'lut["prefix"] & "&aBounty cancelled. Refunded: &e" & refund'
      bountyRemoved$: 'lut["prefix"] & "&aRemoved bounty on &f" & targetName'
    permissions:
      missingMessage$: 'lut["prefix"] & "&cYou lack the permission: " & permission'
      nodes:
        use: 'rdq.bounty.use'
        create: 'rdq.bounty.create'
        list: 'rdq.bounty.list'
        cancel: 'rdq.bounty.cancel'
        leaderboard: 'rdq.bounty.leaderboard'
        admin: 'rdq.bounty.admin'
        remove: 'rdq.bounty.admin.remove'
        reload: 'rdq.bounty.admin.reload'

lut:
  prefix: '&8[&6RDQ&8] &7'
