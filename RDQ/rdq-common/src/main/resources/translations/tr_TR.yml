    requirement_completed: "<gradient:#10b981:#34d399>✅ Gereksinim tamamlandı!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 Tüm gereksinimler tamamlandı! Artık rütbeyi alabilirsin!</gradient>"
    not_ready: "<gradient:#f59e0b:#fbbf24>⚠ Bu gereksinim henüz tamamlanmaya hazır değil.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ Bu gereksinim zaten tamamlandı.</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🎉 Tebrikler! %rank_name% rütbesini aldın!</gradient>"
