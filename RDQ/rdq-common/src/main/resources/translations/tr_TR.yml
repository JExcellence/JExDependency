      - "<gradient:#6b7280:#9ca3af>Tüm gereksinimleri tamamla</gradient>"
      - "<gradient:#6b7280:#9ca3af>bu rütbeyi açmak için</gradient>"
  overall_progress:
    name: "<gradient:#3b82f6:#60a5fa>📊 Genel İlerleme</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>İlerleme:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Tamamlanan:</gradient> <gradient:#f59e0b:#fbbf24>%completed%/%total%</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Rütbeyi Al</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Rütbeyi almak için tıkla!</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Kilitli</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Tüm gereksinimleri tamamla</gradient>"
        - "<gradient:#6b7280:#9ca3af>bu rütbeyi açmak için</gradient>"
