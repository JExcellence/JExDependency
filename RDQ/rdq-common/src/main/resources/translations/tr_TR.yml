    name: "<gradient:#10b981:#34d399>🏹 Korucu</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Okçuluk ve iz sürme sanatında ustalaşın</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Savaşçı</gradient>"
