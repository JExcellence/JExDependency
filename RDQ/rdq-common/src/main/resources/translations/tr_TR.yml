    error: "<gradient:#ef4444:#f87171>❌ Ödül işleme hatası:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Ödül güncelleniyor...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Rütbe için ilerleme başladı</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
