    remaining: "<gradient:#ef4444:#f87171>Kalan Süre:</gradient> <gradient:#f59e0b:#fbbf24>%hours%s %minutes%d</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Oyun süresi gereksinimi karşılandı!</gradient>"
  summary:
    requirement_type: "<gradient:#6b7280:#9ca3af>Tür:</gradient> <gradient:#f59e0b:#fbbf24>%type%</gradient>"
    progress_percentage: "<gradient:#3b82f6:#60a5fa>İlerleme:</gradient> <gradient:#10b981:#34d399>%completion_progress_percentage%</gradient>"
