# RDQ Çeviri Dosyası - Türkçe (Türkiye)
# MiniMessage formatı gradyanlar ve stil ile
# Yer tutucular %placeholder% formatını kullanır

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
