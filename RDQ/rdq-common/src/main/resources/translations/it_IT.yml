# File di traduzione RDQ - inglese (Stati Uniti)
# Formato MiniMessage con sfumature e stili
# I segnaposto utilizzano il formato %placeholder%.

# ============================================
# PREFISSO GLOBALE
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# TASTI DI LIVELLO RADICE (utilizzati dalle chiamate dirette I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Nessuna Ricompensa</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Aggiungi oggetti per creare ricompense</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Aggiungi Oggetto</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Posiziona oggetti qui per aggiungerli come ricompense</gradient>"
    - "<gradient:#6b7280:#9ca3af>Fare clic con il pulsante sinistro del mouse per posizionare l'oggetto</gradient>"
    - "<gradient:#6b7280:#9ca3af>Fare clic con il tasto destro per rimuovere l'elemento</gradient>"

# ============================================
# NOMI E DESCRIZIONI VISUALIZZATE DELL'ALBERO DEI RANCHI
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del tiro con l'arco e del tracciamento</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa tutt'uno con la natura</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Guerriero</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del combattimento</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa un combattente leggendario</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mago</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Sfrutta il potere della magia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa un maestro degli arcani</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Ladro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia furtività e astuzia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Colpisci dall'ombra</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Chierico</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Canalizza il potere divino</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cura e proteggi i tuoi alleati</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Mercante</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del commercio</gradient>"
      - "<gradient:#6b7280:#9ca3af>Costruisci la tua fortuna</gradient>"

# ============================================
# CLASSIFICA NOMI E DESCRIZIONI VISUALIZZATE
# ============================================
rank:

  # ============================================
  # MESSAGGI DI CLASSIFICA
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 SALITA LA CLASSIFICA!</gradient> <gradient:#6b7280:#9ca3af>Hai completato tutti i requisiti per</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Utilizza il menu del grado per richiedere il tuo aggiornamento del grado!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Senza rango</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Seleziona un percorso di classificazione per iniziare</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Senza rango</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Rango predefinito</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nessun rango selezionato</gradient>"
  # Gradi dell'albero dei ranger
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹Cacciatore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Un inseguitore alle prime armi che impara le vie della natura selvaggia</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯Arciere</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Abile con l'arco, letale a distanza</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍Tracciatore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Esperto nel trovare e inseguire la preda</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Tiratore scelto</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Sparatutto di precisione con precisione mortale</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Esploratore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro esploratore di terre inesplorate</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Cecchino</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Tiratore scelto, un colpo, un'uccisione</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Signore della foresta</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro della natura selvaggia, tutt'uno con la natura</gradient>"
  # Ranghi dell'albero del guerriero
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Reclutare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Un nuovo guerriero che inizia il suo viaggio</gradient>"
        - "<gradient:#6b7280:#9ca3af>Impara le basi del combattimento</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Soldato</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Addestrato nell'arte del combattimento</gradient>"
        - "<gradient:#6b7280:#9ca3af>Pronti per la battaglia</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veterano</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guerriero agguerrito</gradient>"
        - "<gradient:#6b7280:#9ca3af>Scegli il tuo percorso di specializzazione</gradient>"
    # Ramo di specializzazione 1: Berserker (offensivo)
    berserker:
      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Sentiero della Furia</gradient>"
        - "<gradient:#6b7280:#9ca3af>Scatena attacchi devastanti</gradient>"
        - "<gradient:#6b7280:#9ca3af>Sacrificare la difesa per la potenza pura</gradient>"
    # Ramo di specializzazione 2: Guardiano (difensivo)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Custode</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Sentiero di protezione</gradient>"
        - "<gradient:#6b7280:#9ca3af>Diventa uno scudo indistruttibile</gradient>"
        - "<gradient:#6b7280:#9ca3af>Proteggi i tuoi alleati a tutti i costi</gradient>"
    # Ramo di specializzazione 3: Gladiatore (bilanciato)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiatore</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Sentiero della Gloria</gradient>"
        - "<gradient:#6b7280:#9ca3af>Maestro del combattimento nell'arena</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bilanciare attacco e difesa</gradient>"
    # Classifiche finali
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Signore della Guerra della Furia</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Berserker definitivo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Forza di distruzione inarrestabile</gradient>"
        - "<gradient:#6b7280:#9ca3af>La paura incarnata sul campo di battaglia</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Signore della Guerra dello Scudo</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Guardiano supremo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Oggetto immobile, eterno protettore</gradient>"
        - "<gradient:#6b7280:#9ca3af>Nessuno passerà mentre sei in piedi</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Signore della guerra dell'Arena</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Gladiatore supremo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Campione dei campioni</gradient>"
        - "<gradient:#6b7280:#9ca3af>Leggenda dell'arena</gradient>"
    # Ranghi legacy (per compatibilità con le versioni precedenti)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Cavaliere</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Onorevole guerriero del regno</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Campione</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Combattente leggendario, temuto da tutti</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Signore della guerra</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro della guerra, comandante degli eserciti</gradient>"
  # Gradi dell'albero magico
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Apprendista</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Imparare le basi della magia</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Esperto</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Crescere nel potere magico</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Mago</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro delle arti arcane</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨Arcimago</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro supremo di tutta la magia</gradient>"
  # Ranghi degli alberi canaglia
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Borseggiatore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dita veloci, fuga più rapida</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Ladro</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro della furtività e del furto</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Esploratore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Occhi e orecchie dell'ombra</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Assassino</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Killer silenzioso, morte nell'ombra</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 Infiltratore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Esperto nell'entrare e uscire senza essere scoperto</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Lama d'ombra</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guerriero mortale della notte</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Maestro delle spie</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Titolare delle reti informatiche</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡Maestro dell'Ombra</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Uno con l'oscurità stessa</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Maestro dell'Ombra</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Sovrano supremo di tutte le ombre</gradient>"
  # Ranghi dell'albero del chierico
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Accolito</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Servo devoto del divino</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Devoto</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Fedele seguace del sentiero divino</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Sacerdote</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guaritore e protettore dei fedeli</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Guaritore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro delle arti restaurative</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Vescovo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Leader dei fedeli</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Oracolo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Veggente di visioni divine</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Sommo Sacerdote</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Voce suprema del divino</gradient>"
  # Ranghi dell'albero del commerciante
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰Venditore ambulante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vendere merci per strada</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 Commerciante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Commerciante affermato con contatti</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 Venditore</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Venditore esperto di merci</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 Artefice</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Artigiano di belle merci</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰 Alchimista</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro di pozioni ed elisir</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 Commerciante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Imprenditore di successo</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰Maestro Artigiano</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Artigiano supremo del regno</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 Principe Mercante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Royalty del commercio</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 Magnate</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maestro del commercio e degli scambi</gradient>"
    guild_master:
      name: "<gradient:#ef4444:#f87171>💰Maestro della Gilda</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Leader della gilda dei mercanti</gradient>"

# ============================================
# MESSAGGI DEGLI ASCOLTATORI BOUNTY
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Hai una taglia attiva sulla tua testa!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valore Taglia:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Scade:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissionato da:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 TAGLIA RISCOSSA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Hai riscosso con successo la taglia su</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>La tua parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Qualcuno</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>ha riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% giocatori</gradient> <gradient:#a855f7:#c084fc>hanno riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# MESSAGGI DI CREAZIONE DI TAGLIE
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Taglia creata con successo per</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Elaborazione taglia fallita:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Elaborazione taglia...</gradient>"

# ============================================
# MESSAGGI DI PROGRESSIONE DEL RANGO
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progressione iniziata per il grado</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Visualizzazione requisiti per</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisiti incompleti per</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% completato)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisito incompleto:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>non ha requisiti!</gradient>"

# ============================================
# MESSAGGI DI CLASSIFICAZIONE CLIC
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Modalità anteprima:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Possiedi</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Bloccato:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Completa prima i prerequisiti</gradient>"

# ============================================
# MESSAGGI DI COMANDO RQ
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms non è installato!</gradient> <gradient:#6b7280:#9ca3af>Questa funzione richiede LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 Aiuto RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Apri menu principale</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Visualizza gradi</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Visualizza taglie</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Attiva/disattiva la barra laterale dei vantaggi</gradient>"
  scoreboard:
    syntax: "<gradient:#f59e0b:#fbbf24>⚠ Uso:</gradient> <gradient:#6b7280:#9ca3af>/rq scoreboard perks</gradient>"
    enabled: "<gradient:#10b981:#34d399>✦ Barra laterale dei vantaggi abilitata.</gradient>"
    disabled: "<gradient:#ef4444:#f87171>✦ Barra laterale dei vantaggi disabilitata.</gradient>"

scoreboard_sidebar:
  perks:
    title: "<dark_aqua>[RDQ]</dark_aqua> <white>Vantaggi</white>"
    active_summary: "<gray>Attivi:</gray> <aqua>%active_perks%/%max_active_perks%</aqua>"
    owned_summary: "<gray>Posseduti:</gray> <gold>%acquired_perks%</gold><gray>/</gray><light_purple>%total_perks%</light_purple>"
    no_active: "<red>Nessun vantaggio attivo</red>"
    active_entry: "<white>%perk_name%</white> <gray>(%usage_count%)</gray>"
    more_active: "<gray>+%remaining_perks% in più</gray>"

