    name: "<gradient:#10b981:#34d399>Rimborso della pozione</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Possibilità di recuperare la tua pozione dopo averla bevuta</gradient>"
  
  # Messaggi di vantaggio
  messages:
    # Sblocca/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨ Vantaggio sbloccato!</gradient> <gradient:#6b7280:#9ca3af>Hai sbloccato</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
