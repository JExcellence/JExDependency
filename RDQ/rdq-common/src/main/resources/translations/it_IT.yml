# File di traduzione RDQ - inglese (Stati Uniti)
# Formato MiniMessage con sfumature e stili
# I segnaposto utilizzano il formato %placeholder%.

# ============================================
# PREFISSO GLOBALE
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# TASTI DI LIVELLO RADICE (utilizzati dalle chiamate dirette I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Nessuna Ricompensa</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Aggiungi oggetti per creare ricompense</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Aggiungi Oggetto</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Posiziona oggetti qui per aggiungerli come ricompense</gradient>"
    - "<gradient:#6b7280:#9ca3af>Fare clic con il pulsante sinistro del mouse per posizionare l'oggetto</gradient>"
    - "<gradient:#6b7280:#9ca3af>Fare clic con il tasto destro per rimuovere l'elemento</gradient>"

# ============================================
# NOMI E DESCRIZIONI VISUALIZZATE DELL'ALBERO DEI RANCHI
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del tiro con l'arco e del tracciamento</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa tutt'uno con la natura</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Guerriero</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del combattimento</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa un combattente leggendario</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mago</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Sfrutta il potere della magia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Diventa un maestro degli arcani</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Ladro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia furtività e astuzia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Colpisci dall'ombra</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Chierico</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Canalizza il potere divino</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cura e proteggi i tuoi alleati</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Mercante</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Padroneggia l'arte del commercio</gradient>"
      - "<gradient:#6b7280:#9ca3af>Costruisci la tua fortuna</gradient>"

