# RDQ Common File di Traduzione - Italiano
# Formato MiniMessage con gradienti e stile
# I segnaposto usano il formato %placeholder%

# Messaggi del Listener delle Taglie
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Hai una taglia attiva sulla tua testa!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valore della Taglia:</gradient> <gradient:#10b981:#34d399>€%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Scade alle:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissionata da:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 TAGLIA RISCOSSA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Hai riscosso con successo la taglia su</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>La tua parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Qualcuno</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>ha riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% giocatori</gradient> <gradient:#a855f7:#c084fc>hanno riscosso la taglia su</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Messaggi di Conferma Creazione Taglia
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Taglia creata con successo su</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Errore nella creazione della taglia:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Interfaccia Panoramica Taglie (Menu Principale e Panoramica)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Sistema Taglie</gradient>"
  
  # Pulsanti del menu principale
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Crea Taglia</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per creare una nuova taglia</gradient>"
      - "<gradient:#6b7280:#9ca3af>su un altro giocatore</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Visualizza Taglie</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza tutte le taglie attive</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Le Mie Taglie</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visualizza le taglie che hai creato</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Classifica</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Migliori cacciatori di taglie</gradient>"
  
  # Voci dell'elenco taglie
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Taglia su</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Obiettivo:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Commissionario:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Creata:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Clicca per vedere i dettagli</gradient>"

# Interfaccia Creazione Taglia
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Crea Taglia</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Seleziona Obiettivo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per scegliere un giocatore</gradient>"
      - "<gradient:#6b7280:#9ca3af>su cui mettere una taglia</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Aggiungi Ricompense</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Clicca per aggiungere oggetti</gradient>"
      - "<gradient:#6b7280:#9ca3af>come ricompense</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Seleziona prima un obiettivo!</gradient>"
  
  add_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Aggiungi Valuta</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per aggiungere ricompense</gradient>"
      - "<gradient:#6b7280:#9ca3af>in valuta per la taglia</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Seleziona prima un obiettivo!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Crea Taglia</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per creare la taglia</gradient>"
      - "<gradient:#6b7280:#9ca3af>con le ricompense selezionate</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Taglia creata con successo su</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Interfaccia Informazioni Giocatore Taglia
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Taglia su</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Obiettivo di questa taglia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clicca per vedere le info del giocatore</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Visualizza Ricompense</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clicca per vedere tutte le ricompense</gradient>"
      - "<gradient:#6b7280:#9ca3af>per riscuotere questa taglia</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Elimina Taglia</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Attenzione: Questa azione</gradient>"
      - "<gradient:#ef4444:#f87171>non può essere annullata!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Clicca per eliminare questa taglia</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Taglia su</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>è stata eliminata!</gradient>"

# Interfaccia Ricompensa Taglia
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Ricompense Taglia</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Nessuna Ricompensa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Aggiungi oggetti per creare</gradient>"
      - "<gradient:#6b7280:#9ca3af>ricompense per questa taglia</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Aggiungi Oggetto</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Posiziona oggetti qui per aggiungerli come ricompense</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clic destro per rimuovere oggetti</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Obiettivo: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Questa taglia è posta su</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Ricompensa Taglia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Questo oggetto sarà dato a</gradient>"
      - "<gradient:#6b7280:#9ca3af>chi riscuote la taglia</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Nessun nuovo oggetto è stato aggiunto!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Alcuni oggetti sono stati lasciati cadere perché il tuo inventario era pieno!</gradient>"

# Prefisso
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "#
 Componenti UI della Piattaforma
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Paginazione
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Pagina %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Pagina corrente:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Pagine totali:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Pagina %direction%</gradient>"

