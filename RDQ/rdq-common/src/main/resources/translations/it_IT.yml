      failed: "<gradient:#ef4444:#f87171>Impossibile sbloccare il vantaggio. Per favore riprova.</gradient>"
      error: "<gradient:#ef4444:#f87171>Si è verificato un errore durante lo sblocco del vantaggio.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Non soddisfi i requisiti per sbloccare questo vantaggio!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Vantaggio abilitato:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Impossibile abilitare il vantaggio:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Hai raggiunto il numero massimo di vantaggi abilitati (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Vantaggio per disabili:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Impossibile disattivare il vantaggio:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
    
