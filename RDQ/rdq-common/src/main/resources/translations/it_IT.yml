# Puls
ante Seleziona Obiettivo
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Seleziona Obiettivo: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Clicca per scegliere un giocatore</gradient>"
    - "<gradient:#6b7280:#9ca3af>su cui mettere una taglia</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Obiettivo attuale: %target_name%</gradient>"

# Pulsante Conferma Taglia
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ Crea Taglia</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Clicca per creare la taglia</gradient>"
    - "<gradient:#6b7280:#9ca3af>con le ricompense selezionate</gradient>"

# Messaggi di Conferma
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ Nessun giocatore selezionato!</gradient> <gradient:#6b7280:#9ca3af>Per favore seleziona prima un obiettivo.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Nessuna ricompensa aggiunta!</gradient> <gradient:#6b7280:#9ca3af>Per favore aggiungi prima alcune ricompense.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Creando taglia su</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Errore:</gradient> <gradient:#6b7280:#9ca3af>Impossibile trovare il giocatore obiettivo %target_name%</gradient>"

# Messaggio Rimborso Oggetti
left_overs: "<gradient:#f59e0b:#fbbf24>📦 Oggetti restituiti!</gradient> <gradient:#6b7280:#9ca3af>Alcuni oggetti sono stati lasciati cadere a terra.</gradient>"