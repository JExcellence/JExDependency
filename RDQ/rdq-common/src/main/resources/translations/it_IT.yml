    name: "<gradient:#a855f7:#c084fc>Amplificatore di pozioni</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Possibilità di potenziare gli effetti della pozione quando consumata</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Durata della pozione</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Possibilità di estendere la durata della pozione quando viene consumata</gradient>"
