      ready: "<gradient:#10b981:#34d399>Il vantaggio è pronto per l'uso!</gradient>"
    
    # Trigger di effetti
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ Pozione potenziata!</gradient> <gradient:#6b7280:#9ca3af>Effetti amplificati</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Durata della pozione estesa!</gradient> <gradient:#6b7280:#9ca3af>Dura più a lungo</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Pozione salvata!</gradient> <gradient:#6b7280:#9ca3af>Restituito all'inventario</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Pesca attiva più veloce!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% XP di pesca!</gradient>"
  
