# RDQ Översättningsfil - Svenska (Sverige)
# MiniMessage format med gradienter och styling
# Platshållare använder %placeholder% format

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Inga Belöningar</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Lägg till föremål för att skapa belöningar</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Lägg till Föremål</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placera föremål här som belöningar</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra konsten att skjuta med båge och spåra</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Krigare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra stridskonstens</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnyttja magiens kraft</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Skurk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra smygande och list</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Präst</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalisera gudomlig kraft</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handlare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra handelns konst</gradient>"

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv belöning på ditt huvud!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Belöningsvärde:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Går ut:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Beställare:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BELÖNING HÄMTAD! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du har hämtat belöningen på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Någon</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har hämtat belöningen på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spelare</gradient> <gradient:#a855f7:#c084fc>har hämtat belöningen på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Belöning skapad för</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Fel vid bearbetning av belöning:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Bearbetar belöning...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progression startad för rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Visar krav för</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ofullständiga för</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% klart)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ofullständigt:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har inga krav!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Förhandsgranskningsläge:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Du äger</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Låst:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Slutför förutsättningarna först</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms är inte installerat!</gradient> <gradient:#6b7280:#9ca3af>Denna funktion kräver LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjälp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Öppna huvudmeny</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Visa ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Visa belöningar</gradient>"

