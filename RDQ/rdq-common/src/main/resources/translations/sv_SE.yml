      lore:
        - "<gradient:#6b7280:#9ca3af>Helare och beskyddare av de troende</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Healer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Master of restorative arts</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Biskop</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ledare för de troende</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Oracle</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Seare av gudomliga visioner</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Överstepräst</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Det gudomligas högsta röst</gradient>"
  # Köpmansträd rankas
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Handlare</gradient>"
