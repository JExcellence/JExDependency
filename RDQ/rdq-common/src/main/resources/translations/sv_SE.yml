# RDQ-översättningsfil - engelska (USA)
# MiniMessage-format med övertoningar och styling
# Platshållare använder formatet %placeholder%

# ============================================
# GLOBAL PREFIX
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROTNIVÅNycklar (används av direkta I18n.Builder-anrop)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Inga Belöningar</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Lägg till föremål för att skapa belöningar</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Lägg till Föremål</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placera föremål här som belöningar</gradient>"
    - "<gradient:#6b7280:#9ca3af>Vänsterklicka för att placera objektet</gradient>"
    - "<gradient:#6b7280:#9ca3af>Högerklicka för att ta bort objektet</gradient>"

# ============================================
# RANK TREE VISNING NAMN OCH BESKRIVNINGAR
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra konsten att skjuta med båge och spåra</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli ett med naturen</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Krigare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra stridskonstens</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli en legendarisk fighter</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnyttja magiens kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli en mästare på det mystiska</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Skurk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra smygande och list</gradient>"
      - "<gradient:#6b7280:#9ca3af>Slå från skuggorna</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Präst</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalisera gudomlig kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Läka och skydda dina allierade</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handlare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra handelns konst</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bygg din förmögenhet</gradient>"

# ============================================
# RANK DISPLAY NAMN OCH BESKRIVNINGAR
# ============================================
rank:

  # ============================================
  # RANK MEDDELANDEN
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 RANK UPP!</gradient> <gradient:#6b7280:#9ca3af>Du har uppfyllt alla krav för</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Använd rankningsmenyn för att göra anspråk på din rankuppgradering!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Orankad</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Välj en rankningsväg för att börja</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Orankad</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Standardrankning</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ingen rang har valts</gradient>"
  # Ranger Tree Ranks
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Jägare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En nybörjarspårare som lär sig naturens vägar</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Archer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Skicklig med bågen, dödlig på avstånd</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Tracker</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Expert på att hitta och följa byten</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Skötare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Precisionsskytt med dödlig precision</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Pathfinder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mästarutforskare av okända länder</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Prickskytt</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Elitskytt, ett skott en död</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Skogsherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vildmarkens mästare, ett med naturen</gradient>"
  # Krigarträdet rankas
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Rekrytera</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En ny krigare börjar sin resa</gradient>"
        - "<gradient:#6b7280:#9ca3af>Lär dig grunderna i strid</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Soldat</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Utbildad i stridskonsten</gradient>"
        - "<gradient:#6b7280:#9ca3af>Redo för strid</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veteran</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Stridhärdad krigare</gradient>"
        - "<gradient:#6b7280:#9ca3af>Välj din specialiseringsväg</gradient>"
    # Specialisering gren 1: Berserker (offensiv)
    berserker:
      name: "<gradient:#ef4444:#f87171>Bärsärk</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Path of Fury</gradient>"
        - "<gradient:#6b7280:#9ca3af>Släpp loss förödande attacker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Offra försvar för rå kraft</gradient>"
    # Specialisering Branch 2: Guardian (Defensiv)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Väktare</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Skyddsväg</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bli en okrossbar sköld</gradient>"
        - "<gradient:#6b7280:#9ca3af>Skydda dina allierade till varje pris</gradient>"
    # Specialisering Branch 3: Gladiator (Balanserad)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiator</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Härlighetens väg</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mästare i arenastrid</gradient>"
        - "<gradient:#6b7280:#9ca3af>Balansera anfall och försvar</gradient>"
    # Slutliga rangordningar
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Warlord of Fury</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ultimate Berserker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ostoppbar förstörelsekraft</gradient>"
        - "<gradient:#6b7280:#9ca3af>Rädsla inkarnerar på slagfältet</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Sköldens krigsherre</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ultimate Guardian</gradient>"
        - "<gradient:#6b7280:#9ca3af>Orörligt föremål, evigt beskyddare</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ingen ska passera medan du står</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Arenans krigsherre</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Den ultimata gladiatorn</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mästarnas mästare</gradient>"
        - "<gradient:#6b7280:#9ca3af>Legenden om arenan</gradient>"
    # Äldre rangordningar (för bakåtkompatibilitet)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Riddare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ärade krigare av riket</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Mästare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendarisk fighter, fruktad av alla</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Krigsherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Krigsmästare, befälhavare för arméer</gradient>"
  # Mage Tree Ranks
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Lärling</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Lär dig grunderna i magi</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adept</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Växer i magisk kraft</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Trollkarl</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mästare i mystiska konster</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Archmage</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Supreme mästare över all magi</gradient>"
  # Rogue Tree Ranks
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Ficktjuv</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Snabba fingrar, snabbare flykt</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Tjuv</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mästare på smyg och stöld</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Scout</gradient>"
