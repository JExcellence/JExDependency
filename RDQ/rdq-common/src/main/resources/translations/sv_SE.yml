    lore:
      - "<gradient:#6b7280:#9ca3af>Visa tillgängliga uppdrag</gradient>"
      - "<gradient:#6b7280:#9ca3af>och spåra din framsteg</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visa rangprogression</gradient>"
      - "<gradient:#6b7280:#9ca3af>och lås upp nya förmågor</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ Rangsystem</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 Rangträd</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bläddra bland tillgängliga rangträd</gradient>"
      - "<gradient:#6b7280:#9ca3af>och välj din väg</gradient>"

