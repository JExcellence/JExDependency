        - "<gradient:#6b7280:#9ca3af>Kontrollör av informationsnätverk</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Skuggmästare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ett med själva mörkret</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Skuggmästare</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Den högsta härskaren över alla skuggor</gradient>"
