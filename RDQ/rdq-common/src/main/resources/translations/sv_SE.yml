# RDQ Översättningsfil - Svenska (Sverige)
# MiniMessage format med gradienter och styling
# Platshållare använder %placeholder% format

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Inga Belöningar</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Lägg till föremål för att skapa belöningar</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Lägg till Föremål</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placera föremål här som belöningar</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra konsten att skjuta med båge och spåra</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Krigare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra stridskonstens</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnyttja magiens kraft</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Skurk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra smygande och list</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Präst</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalisera gudomlig kraft</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handlare</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bemästra handelns konst</gradient>"

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv belöning på ditt huvud!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Belöningsvärde:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Går ut:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Beställare:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BELÖNING HÄMTAD! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du har hämtat belöningen på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Någon</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har hämtat belöningen på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spelare</gradient> <gradient:#a855f7:#c084fc>har hämtat belöningen på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Belöning skapad för</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Fel vid bearbetning av belöning:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Bearbetar belöning...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progression startad för rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Visar krav för</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ofullständiga för</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% klart)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ofullständigt:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har inga krav!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Förhandsgranskningsläge:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Du äger</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Låst:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Slutför förutsättningarna först</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms är inte installerat!</gradient> <gradient:#6b7280:#9ca3af>Denna funktion kräver LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjälp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Öppna huvudmeny</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Visa ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Visa belöningar</gradient>"

main_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎮 RaindropQuests</gradient>"
  admin_overview:
    name: "<gradient:#ef4444:#f87171>⚙ Admin Panel</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Åtkomst till administrationsverktyg</gradient>"
      - "<gradient:#6b7280:#9ca3af>och konfigurationsalternativ</gradient>"
  bounty_overview:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Belöningar</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visa och hantera belöningar</gradient>"
      - "<gradient:#6b7280:#9ca3af>Jaga spelare för priser!</gradient>"
  perk_overview:
    name: "<gradient:#10b981:#34d399>✨ Förmåner</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visa tillgängliga förmåner</gradient>"
      - "<gradient:#6b7280:#9ca3af>och speciella förmågor</gradient>"
  quest_overview:
    name: "<gradient:#3b82f6:#60a5fa>📜 Uppdrag</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visa tillgängliga uppdrag</gradient>"
      - "<gradient:#6b7280:#9ca3af>och spåra din framsteg</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Visa rangprogression</gradient>"
      - "<gradient:#6b7280:#9ca3af>och lås upp nya förmågor</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ Rangsystem</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 Rangträd</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bläddra bland tillgängliga rangträd</gradient>"
      - "<gradient:#6b7280:#9ca3af>och välj din väg</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Tillbaka</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att gå tillbaka</gradient>"
  proceed:
    name: "<gradient:#10b981:#34d399>➡️ Fortsätt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att fortsätta</gradient>"
  previous:
    name: "<gradient:#3b82f6:#60a5fa>⬅️ Föregående</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Föregående sida</gradient>"
  next:
    name: "<gradient:#3b82f6:#60a5fa>➡️ Nästa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Nästa sida</gradient>"
  up:
    name: "<gradient:#a855f7:#c084fc>⬆️ Upp</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Gå upp</gradient>"
  down:
    name: "<gradient:#a855f7:#c084fc>⬇️ Ner</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Gå ner</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Avbryt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Avbryt åtgärd</gradient>"

error:
  premium_required: "<gradient:#ef4444:#f87171>❌ Premium Krävs!</gradient> <gradient:#6b7280:#9ca3af>Funktionen</gradient> <gradient:#f59e0b:#fbbf24>%feature%</gradient> <gradient:#6b7280:#9ca3af>kräver premium-versionen.</gradient>"
  processing_failed: "<gradient:#ef4444:#f87171>❌ Bearbetning misslyckades:</gradient> <gradient:#6b7280:#9ca3af>%input%</gradient>"

abstract_anvil_ui:
  title: "<gradient:#a855f7:#c084fc>✏️ Ange Värde</gradient>"
  input:
    name: "<gradient:#f59e0b:#fbbf24>✏️ Ange Värde</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Skriv din inmatning ovan</gradient>"
      - "<gradient:#6b7280:#9ca3af>och klicka för att bekräfta</gradient>"
  error:
    processing_failed: "<gradient:#ef4444:#f87171>❌ Kunde inte bearbeta inmatning:</gradient> <gradient:#6b7280:#9ca3af>%input%</gradient>"

confirmation_ui:
  title: "<gradient:#a855f7:#c084fc>⚠️ Bekräfta Åtgärd</gradient>"
  confirm:
    name: "<gradient:#10b981:#34d399>✅ Bekräfta</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att bekräfta</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Avbryt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att avbryta</gradient>"

paginated_player_ui:
  title: "<gradient:#a855f7:#c084fc>👥 Välj Spelare</gradient>"
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

page:
  name: "<gradient:#6b7280:#9ca3af>📄 Sida %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Nuvarande sida:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Totalt sidor:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Sida %direction%</gradient>"


# ============================================
# RANG KRAV DETALJ UI
# ============================================
rank_requirement_detail_ui:
  title: "<gradient:#a855f7:#c084fc>📋 Kravdetaljer</gradient>"
  back:
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att gå tillbaka</gradient>"
  submit:
    missing_items: "<gradient:#ef4444:#f87171>❌ Du har inte alla nödvändiga föremål!</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Föremål skickade!</gradient>"
    failed: "<gradient:#ef4444:#f87171>❌ Misslyckades att skicka. Försök igen.</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Ett fel uppstod vid skickning.</gradient>"
    already_completed: "<gradient:#f59e0b:#fbbf24>⚠ Detta krav är redan uppfyllt!</gradient>"
  experience:
    current_level: "<gradient:#6b7280:#9ca3af>Din Nivå:</gradient> <gradient:#10b981:#34d399>%current%</gradient>"
    required_level: "<gradient:#6b7280:#9ca3af>Krävd Nivå:</gradient> <gradient:#f59e0b:#fbbf24>%required%</gradient>"
    levels_needed: "<gradient:#ef4444:#f87171>Nivåer Saknas:</gradient> <gradient:#f59e0b:#fbbf24>%needed%</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Nivåkrav uppfyllt!</gradient>"
  playtime:
    current: "<gradient:#6b7280:#9ca3af>Din Speltid:</gradient> <gradient:#10b981:#34d399>%hours%t %minutes%m</gradient>"
    required: "<gradient:#6b7280:#9ca3af>Krävd Speltid:</gradient> <gradient:#f59e0b:#fbbf24>%hours%t %minutes%m</gradient>"
    remaining: "<gradient:#ef4444:#f87171>Återstående Tid:</gradient> <gradient:#f59e0b:#fbbf24>%hours%t %minutes%m</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Speltidskrav uppfyllt!</gradient>"
  summary:
    requirement_type: "<gradient:#6b7280:#9ca3af>Typ:</gradient> <gradient:#f59e0b:#fbbf24>%type%</gradient>"
    progress_percentage: "<gradient:#3b82f6:#60a5fa>Framsteg:</gradient> <gradient:#10b981:#34d399>%completion_progress_percentage%</gradient>"
    completion_status: "<gradient:#6b7280:#9ca3af>Status:</gradient> <gradient:#f59e0b:#fbbf24>%completion_status%</gradient>"
    requirement_summary:
      name: "<gradient:#a855f7:#c084fc>📊 Kravsammanfattning</gradient>"
    requirement_tip:
      name: "<gradient:#f59e0b:#fbbf24>💡 Tips</gradient>"
  requirement_tip:
    currency:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Tjäna den nödvändiga valutan</gradient>"
    experience_level:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Få erfarenhetsnivåer</gradient>"
    playtime:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Spela på servern</gradient>"
    other:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Uppfyll kravet</gradient>"

# ============================================
# RANG KRAV RESA UI
# ============================================
rank_requirements_journey_ui:
  title: "<gradient:#a855f7:#c084fc>🗺 %rank_name% Krav</gradient>"
  rank_info:
    name: "<gradient:#f59e0b:#fbbf24>⚔ %rank_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Uppfyll alla krav</gradient>"
      - "<gradient:#6b7280:#9ca3af>för att låsa upp denna rang</gradient>"
  overall_progress:
    name: "<gradient:#3b82f6:#60a5fa>📊 Totalt Framsteg</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Framsteg:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Slutfört:</gradient> <gradient:#f59e0b:#fbbf24>%completed%/%total%</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Hämta Rang</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicka för att hämta rangen!</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Låst</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Uppfyll alla krav</gradient>"
        - "<gradient:#6b7280:#9ca3af>för att låsa upp denna rang</gradient>"
  messages:
    preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Förhandsgranskningsläge - Åtgärder inaktiverade</gradient>"
    requirement_completed: "<gradient:#10b981:#34d399>✅ Krav uppfyllt!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 Alla krav uppfyllda! Du kan nu hämta rangen!</gradient>"
    not_ready: "<gradient:#f59e0b:#fbbf24>⚠ Detta krav är inte redo att slutföras ännu.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ Detta krav är redan uppfyllt.</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🎉 Grattis! Du har fått rangen %rank_name%!</gradient>"
