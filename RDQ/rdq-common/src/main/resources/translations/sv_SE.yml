  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjälp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Öppna huvudmenyn</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Visa ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Visa belöningar</gradient>"

