    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Acoliet</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Toegewijde dienaar van het goddelijke</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Liefhebber</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Trouwe volger van het goddelijke pad</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Priester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Genezer en beschermer van de gelovigen</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Genezer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Meester van restauratieve kunsten</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Bisschop</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Leider van de gelovigen</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Orakel</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ziener van goddelijke visioenen</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Hogepriester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Allerhoogste stem van het goddelijke</gradient>"
  # Handelaarsboomrangen
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Venter</gradient>"
