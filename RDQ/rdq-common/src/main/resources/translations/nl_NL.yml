    close: "<red>Sluiten</red>"
    next_page: "<yellow>Volgende Pagina →</yellow>"
    previous_page: "<yellow>← Vorige Pagina</yellow>"
    page_info: "<gray>Pagina {current}/{total}</gray>"
    loading: "<gray>Laden...</gray>"
    confirm: "<green>Bevestigen</green>"
    cancel: "<red>Annuleren</red>"

