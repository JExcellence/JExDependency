# ============================================
# PERK-VERTALINGEN
# ============================================
perk:
  # Visserijvoordelen
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Sneller vissen</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Vang sneller vis met verbeterde vistarieven</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>XP-boost voor vissen</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Verdien bonus-XP bij het vangen van vis</gradient>"
  
  # Drankvoordelen
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Drankversterker</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Kans om de effecten van drankjes te versterken wanneer ze worden geconsumeerd</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Duur van het drankje</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Kans om de duur van het drankje te verlengen wanneer het wordt geconsumeerd</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Terugbetaling van drankjes</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Kans om je drankje terug te krijgen nadat je het hebt gedronken</gradient>"
  
  # Perk-berichten
  messages:
    # Ontgrendelen/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨ Voordeel ontgrendeld!</gradient> <gradient:#6b7280:#9ca3af>Je hebt ontgrendeld</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>Perk succesvol ontgrendeld en ingeschakeld:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Kan het voordeel niet ontgrendelen. Probeer het opnieuw.</gradient>"
      error: "<gradient:#ef4444:#f87171>Er is een fout opgetreden bij het ontgrendelen van het voordeel.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Je voldoet niet aan de vereisten om dit voordeel te ontgrendelen!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Ingeschakeld voordeel:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Kan voordeel niet inschakelen:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Je hebt het maximale aantal ingeschakelde speciale voordelen bereikt (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Voordeel voor gehandicapten:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Kan voordeel niet uitschakelen:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
    
    # Afkoelen
    cooldown:
      active: "<gradient:#ef4444:#f87171>Dit voordeel heeft een cooldown-periode</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
      ready: "<gradient:#10b981:#34d399>Perk is klaar voor gebruik!</gradient>"
    
    # Effecttriggers
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ Drankje verbeterd!</gradient> <gradient:#6b7280:#9ca3af>Effecten versterkt</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Duur van de toverdrank verlengd!</gradient> <gradient:#6b7280:#9ca3af>Gaat langer mee</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Drankje opgeslagen!</gradient> <gradient:#6b7280:#9ca3af>Terug naar de inventaris</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Sneller vissen actief!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% Vissen XP!</gradient>"
  
  # UI-elementen
  ui:
    header:
      type_label: "<gray>Type: <white>%type%</white></gray>"
      category_label: "<gray>Categorie: <white>%category%</white></gray>"
    
    requirements:
      no_requirements: "<green>Geen vereisten</green>"
      no_requirements_lore: "<gray>Voor dit voordeel gelden geen ontgrendelingsvereisten</gray>"
    
    rewards:
      title: "<gold>Ontgrendel beloning</gold>"
      no_rewards: "<gray>Geen ontgrendelbeloningen</gray>"
      no_rewards_lore: "<gray>Dit voordeel heeft geen ontgrendelingsbeloningen</gray>"
      type_label: "<gray>Type: <white>%type%</white></gray>"
      value_label: "<gray>Waarde: <gold>%value%</gold></gray>"
    
    status:
      title: "<white>Perk-status</white>"
      locked: "<red>✖ Vergrendeld</red>"
      locked_hint: "<gray>Voltooi de vereisten om te ontgrendelen</gray>"
      active: "<green>✓ Actief</green>"
      enabled: "<yellow>○ Ingeschakeld</yellow>"
      disabled: "<gray>○ Uitgeschakeld</gray>"
      enabled_count: "<gray>Ingeschakelde voordelen: <white>%count%/%max%</white></gray>"
      cooldown_label: "<gray>Afkoeling: <gold>%time%</gold></gray>"
      activations_label: "<gray>Activeringen: <white>%count%</white></gray>"
    
    buttons:
      unlock:
        title: "<white>Ontgrendel Perk</white>"
        hint: "<green>Klik om dit voordeel te ontgrendelen!</green>"
      enable:
        title: "<white>Schakel voordeel in</white>"
        hint: "<green>Klik om dit voordeel in te schakelen</green>"
        limit_reached: "<red>Maximaal ingeschakelde voordelen bereikt</red>"
      disable:
        title: "<white>Schakel voordeel uit</white>"
        hint: "<yellow>Klik om dit voordeel uit te schakelen</yellow>"
  
  # Bestaande voordelen (ter referentie - voeg toe als deze ontbreken)
  fly:
    name: "<gradient:#3b82f6:#60a5fa>Vlucht</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Verkrijg het vermogen om te vliegen</gradient>"
  glow:
    name: "<gradient:#f59e0b:#fbbf24>Gloed</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Breng een stralend effect op jezelf aan</gradient>"
  haste:
    name: "<gradient:#10b981:#34d399>Haast</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Mijn en graaf sneller</gradient>"
  jump_boost:
    name: "<gradient:#a855f7:#c084fc>Springboost</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Spring hoger dan normaal</gradient>"
  keep_experience:
    name: "<gradient:#10b981:#34d399>Ervaring behouden</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Behoud je XP als je sterft</gradient>"
  keep_inventory:
    name: "<gradient:#3b82f6:#60a5fa>Houd voorraad bij</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Bewaar uw spullen als u overlijdt</gradient>"
  night_vision:
