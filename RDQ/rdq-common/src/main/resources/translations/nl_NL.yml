# RDQ Common Vertaalbestand - Nederlands
# MiniMessage formaat met gradiënten en styling
# Placeholders gebruiken %placeholder% formaat

# Beloning Listener Berichten
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Je hebt een actieve beloning op je hoofd!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Beloningswaarde:</gradient> <gradient:#10b981:#34d399>€%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Verloopt om:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Opdrachtgever:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BELONING OPGEËIST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Je hebt succesvol de beloning op</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>opgeëist!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Jouw aandeel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Iemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>heeft de beloning op</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>opgeëist!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spelers</gradient> <gradient:#a855f7:#c084fc>hebben de beloning op</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>opgeëist!</gradient>"

# Beloning Creatie Bevestigingsberichten
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Beloning succesvol aangemaakt voor</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Fout bij het aanmaken van beloning:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Beloning Overzicht UI (Hoofdmenu & Overzicht)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Beloningssysteem</gradient>"
  
  # Hoofdmenu knoppen
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Beloning Maken</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik om een nieuwe beloning</gradient>"
      - "<gradient:#6b7280:#9ca3af>op een andere speler te zetten</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Beloningen Bekijken</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bekijk alle actieve beloningen</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Mijn Beloningen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bekijk beloningen die je hebt gemaakt</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Ranglijst</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top beloningsjagers</gradient>"
  
  # Beloning lijst items
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Beloning op</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Doelwit:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Opdrachtgever:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Gemaakt:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Klik om details te bekijken</gradient>"

# Beloning Creatie UI
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Beloning Maken</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Doelwit Selecteren</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik om een speler te kiezen</gradient>"
      - "<gradient:#6b7280:#9ca3af>om een beloning op te zetten</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Beloningen Toevoegen</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Klik om items toe te voegen</gradient>"
      - "<gradient:#6b7280:#9ca3af>als beloningen</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Selecteer eerst een doelwit!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Beloning Maken</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik om de beloning te maken</gradient>"
      - "<gradient:#6b7280:#9ca3af>met de geselecteerde beloningen</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Beloning succesvol gemaakt op</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Beloning Speler Info UI
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Beloning op</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Doelwit van deze beloning</gradient>"
      - "<gradient:#6b7280:#9ca3af>Klik om speler info te bekijken</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Beloningen Bekijken</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik om alle beloningen te zien</gradient>"
      - "<gradient:#6b7280:#9ca3af>voor het opeisen van deze beloning</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Beloning Verwijderen</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Waarschuwing: Deze actie</gradient>"
      - "<gradient:#ef4444:#f87171>kan niet ongedaan worden gemaakt!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Klik om deze beloning te verwijderen</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Beloning op</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>is verwijderd!</gradient>"

# Beloning Beloning UI
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Beloning Beloningen</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Geen Beloningen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Voeg items toe om beloningen</gradient>"
      - "<gradient:#6b7280:#9ca3af>voor deze beloning te maken</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Item Toevoegen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Plaats items hier om ze als beloningen toe te voegen</gradient>"
      - "<gradient:#6b7280:#9ca3af>Rechtermuisklik om items te verwijderen</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Doelwit: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Deze beloning is geplaatst op</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Beloning Beloning</gradient>"
      - "<gradient:#6b7280:#9ca3af>Dit item wordt gegeven aan</gradient>"
      - "<gradient:#6b7280:#9ca3af>degene die de beloning opeist</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Geen nieuwe items toegevoegd!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Sommige items zijn gevallen omdat je inventaris vol was!</gradient>"

# Voorvoegsel
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  add_cu
rrencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Valuta Toevoegen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klik om valuta beloningen</gradient>"
      - "<gradient:#6b7280:#9ca3af>voor de beloning toe te voegen</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Selecteer eerst een doelwit!</gradient>"

# Platform UI Componenten
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Paginering
page:
