        - "<gradient:#6b7280:#9ca3af>Expert in het ongemerkt in- en uitstappen</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Schaduwblad</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dodelijke krijger van de nacht</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Spymaster</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Beheerder van informatienetwerken</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Schaduwmeester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Eén met de duisternis zelf</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Schaduwmeester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Opperheerser van alle schaduwen</gradient>"
  # Cleric Tree-rangen
