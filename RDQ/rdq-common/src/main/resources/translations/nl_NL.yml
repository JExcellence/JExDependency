# RDQ-vertaalbestand - Engels (VS)
# MiniMessage-formaat met verlopen en styling
# Tijdelijke aanduidingen gebruiken de indeling %placeholder%

# ============================================
# GLOBAAL VOORVOEGSEL
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROOT-NIVEAUTOETSEN (gebruikt door directe I18n.Builder-oproepen)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Geen Beloningen</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Voeg items toe om beloningen te maken</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Item Toevoegen</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Plaats items hier als beloningen</gradient>"
    - "<gradient:#6b7280:#9ca3af>Klik met de linkermuisknop om het item te plaatsen</gradient>"
    - "<gradient:#6b7280:#9ca3af>Klik met de rechtermuisknop om het item te verwijderen</gradient>"

# ============================================
# RANG BOOM WEERGAVENAMEN & BESCHRIJVINGEN
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Beheers de kunst van boogschieten</gradient>"
      - "<gradient:#6b7280:#9ca3af>Word één met de natuur</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Krijger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Beheers de kunst van het gevecht</gradient>"
      - "<gradient:#6b7280:#9ca3af>Word een legendarische vechter</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiër</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Benut de kracht van magie</gradient>"
      - "<gradient:#6b7280:#9ca3af>Word een meester van het geheimzinnige</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Schurk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Beheers stealth en sluwheid</gradient>"
      - "<gradient:#6b7280:#9ca3af>Sla toe vanuit de schaduw</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Geestelijke</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliseer goddelijke kracht</gradient>"
      - "<gradient:#6b7280:#9ca3af>Genees en bescherm je bondgenoten</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelaar</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Beheers de kunst van de handel</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bouw uw fortuin op</gradient>"

# ============================================
# RANG WEERGAVENAMEN & BESCHRIJVINGEN
# ============================================
rank:

  # ============================================
  # Rangschik berichten
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 Rang omhoog!</gradient> <gradient:#6b7280:#9ca3af>Je hebt aan alle vereisten voldaan voor</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Gebruik het rangmenu om je rangupgrade te claimen!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Niet gerangschikt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Selecteer een rangschikkingspad om te beginnen</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Niet gerangschikt</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Standaardrang</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Geen rang geselecteerd</gradient>"
  # Ranger Tree-rangen
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹Jager</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Een beginnende tracker die de wegen van het wild leert</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Boogschutter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vaardig met de boog, dodelijk op afstand</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍Tracker</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Expert in het vinden en volgen van prooien</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯Schutter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Precisieschieter met dodelijke nauwkeurigheid</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Pathfinder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Meesterverkenner van onbekende landen</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯Sluipschutter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Elite scherpschutter, één schot één moord</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Bosheer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Meester van de wildernis, één met de natuur</gradient>"
  # Krijgersboomrangen
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Werven</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Een nieuwe krijger die aan hun reis begint</gradient>"
        - "<gradient:#6b7280:#9ca3af>Leer de basisprincipes van vechten</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Soldaat</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Getraind in de kunst van het vechten</gradient>"
        - "<gradient:#6b7280:#9ca3af>Klaar voor de strijd</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veteraan</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Door de strijd geharde krijger</gradient>"
        - "<gradient:#6b7280:#9ca3af>Kies uw specialisatiepad</gradient>"
    # Specialisatie Tak 1: Berserker (offensief)
    berserker:
      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Pad van woede</gradient>"
        - "<gradient:#6b7280:#9ca3af>Voer verwoestende aanvallen uit</gradient>"
        - "<gradient:#6b7280:#9ca3af>Offer verdediging op voor brute kracht</gradient>"
    # Specialisatie Tak 2: Guardian (Defensief)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Voogd</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Pad van bescherming</gradient>"
        - "<gradient:#6b7280:#9ca3af>Word een onbreekbaar schild</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bescherm je bondgenoten ten koste van alles</gradient>"
    # Specialisatie Tak 3: Gladiator (Evenwichtig)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiator</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Pad van glorie</gradient>"
        - "<gradient:#6b7280:#9ca3af>Meester van arenagevechten</gradient>"
        - "<gradient:#6b7280:#9ca3af>Breng aanval en verdediging in balans</gradient>"
    # Laatste rangen
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Krijgsheer van woede</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ultieme Berserker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Onstuitbare kracht van vernietiging</gradient>"
        - "<gradient:#6b7280:#9ca3af>Angst incarneert op het slagveld</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Krijgsheer van het Schild</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ultieme bewaker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Onroerend voorwerp, eeuwige beschermer</gradient>"
        - "<gradient:#6b7280:#9ca3af>Niemand zal voorbijgaan terwijl je staat</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Krijgsheer van de Arena</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ultieme gladiator</gradient>"
        - "<gradient:#6b7280:#9ca3af>Kampioen der kampioenen</gradient>"
        - "<gradient:#6b7280:#9ca3af>Legende van de arena</gradient>"
    # Legacy-rangen (voor achterwaartse compatibiliteit)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Ridder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Eervolle krijger van het rijk</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Kampioen</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendarische vechter, gevreesd door iedereen</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Krijgsheer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Oorlogsmeester, bevelhebber van legers</gradient>"
  # Mage Tree-rangen
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Leerling</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Het leren van de basisprincipes van magie</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adept</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Groeien in magische kracht</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Tovenaar</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Meester van geheimzinnige kunsten</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨Archmagiër</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Oppermeester van alle magie</gradient>"
  # Rogue Tree-rangen
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Zakkenroller</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Snelle vingers, snellere ontsnapping</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Dief</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Meester van stealth en diefstal</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Verkenner</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ogen en oren van de schaduwen</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Moordenaar</gradient>"
