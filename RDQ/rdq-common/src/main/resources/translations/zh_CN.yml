# RDQ Common 翻译文件 - 简体中文
# MiniMessage格式，带有渐变和样式
# 占位符使用 %placeholder% 格式

# 悬赏监听器消息
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>你的头上有一个活跃的悬赏！</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 悬赏金额:</gradient> <gradient:#10b981:#34d399>¥%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 到期时间:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 委托人:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 悬赏已领取！🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>你成功领取了</gradient><gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>的悬赏！</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>你的份额:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>某人</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>领取了</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>的悬赏！</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count%名玩家</gradient> <gradient:#a855f7:#c084fc>领取了</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>的悬赏！</gradient>"

# 悬赏创建确认消息
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ 成功创建悬赏</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>！</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 创建悬赏失败:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# 悬赏概览界面（主菜单和概览）
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 悬赏系统</gradient>"
  
  # 主菜单按钮
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 创建悬赏</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>点击创建新的悬赏</gradient>"
      - "<gradient:#6b7280:#9ca3af>针对其他玩家</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 查看悬赏</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>查看所有活跃的悬赏</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 我的悬赏</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>查看你创建的悬赏</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 排行榜</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>顶级悬赏猎人</gradient>"
  
  # 悬赏列表条目
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 对</gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>的悬赏</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>目标:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>委托人:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>创建时间:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>点击查看详情</gradient>"

# 悬赏创建界面
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 创建悬赏</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 选择目标</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>点击选择一个玩家</gradient>"
      - "<gradient:#6b7280:#9ca3af>来设置悬赏</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 添加奖励</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>点击添加物品</gradient>"
      - "<gradient:#6b7280:#9ca3af>作为奖励</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 请先选择目标！</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ 创建悬赏</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>点击创建悬赏</gradient>"
      - "<gradient:#6b7280:#9ca3af>使用选定的奖励</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ 成功对</gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>创建悬赏！</gradient>"

# 悬赏玩家信息界面
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 对</gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>的悬赏</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>此悬赏的目标</gradient>"
      - "<gradient:#6b7280:#9ca3af>点击查看玩家信息</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 查看奖励</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>点击查看领取此悬赏</gradient>"
      - "<gradient:#6b7280:#9ca3af>的所有奖励</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 删除悬赏</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ 警告：此操作</gradient>"
      - "<gradient:#ef4444:#f87171>无法撤销！</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>点击删除此悬赏</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ 对</gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>的悬赏已被删除！</gradient>"

# 悬赏奖励界面
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 悬赏奖励</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 无奖励</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>添加物品来为此悬赏</gradient>"
      - "<gradient:#6b7280:#9ca3af>创建奖励</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ 添加物品</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>将物品放在这里以添加为奖励</gradient>"
      - "<gradient:#6b7280:#9ca3af>右键点击移除物品</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 目标: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>此悬赏设置在</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#6b7280:#9ca3af>身上</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 悬赏奖励</gradient>"
      - "<gradient:#6b7280:#9ca3af>此物品将给予</gradient>"
      - "<gradient:#6b7280:#9ca3af>领取悬赏的人</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ 没有添加新物品！</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ 由于你的背包已满，一些物品被丢弃了！</gradient>"

# 前缀
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  add_cu
rrencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 添加货币</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>点击为悬赏添加</gradient>"
      - "<gradient:#6b7280:#9ca3af>货币奖励</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 请先选择目标！</gradient>"

# 平台UI组件
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# 分页
page:
