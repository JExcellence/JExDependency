    rank_path_reactivation_failed: "<gradient:#ef4444:#f87171>❌ 重新激活等级路径失败！</gradient>"
    rank_tree_creation_coming_soon: "<gradient:#f59e0b:#fbbf24>⏳ 等级树创建即将推出！</gradient>"

