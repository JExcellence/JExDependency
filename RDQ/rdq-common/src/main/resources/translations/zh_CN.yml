# RDQ 翻译文件 - 英语（美国）
# 具有渐变和样式的 MiniMessage 格式
# 占位符使用%placeholder%格式

# ============================================
# 全球前缀
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# 根级密钥（由直接 I18n.Builder 调用使用）
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦没有奖励</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>添加项目以创建奖励</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ 添加项目</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>将项目放置在此处以添加为奖励</gradient>"
    - "<gradient:#6b7280:#9ca3af>左键单击放置物品</gradient>"
    - "<gradient:#6b7280:#9ca3af>右键单击以删除项目</gradient>"

