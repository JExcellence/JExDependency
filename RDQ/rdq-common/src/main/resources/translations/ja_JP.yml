      name: "<gradient:#a855f7:#c084fc>📊 概要</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>プラグインの合計:</gradient> <gradient:#f59e0b:#fbbf24>%total_plugins%</gradient>"
        - "<gradient:#6b7280:#9ca3af>プラグインを選択して権限を表示します</gradient>"
