      name: "<gradient:#6b7280:#9ca3af>選択なし</gradient>"
  status:
    selected_plugin:
      name: "<gradient:#a855f7:#c084fc>📊 選択済み: %plugin_name%</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>プラグイン:</gradient> <gradient:#f59e0b:#fbbf24>%plugin_name%</gradient>"
        - "<gradient:#6b7280:#9ca3af>権限:</gradient> <gradient:#10b981:#34d399>%permission_count%</gradient>"
        - "<gradient:#6b7280:#9ca3af>プラグインの合計:</gradient> <gradient:#3b82f6:#60a5fa>%total_plugins%</gradient>"
