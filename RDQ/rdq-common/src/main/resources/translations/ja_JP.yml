# ============================================
# 報奨金リスナーのメッセージ
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>あなたにはアクティブな賞金がかかっています!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 懸賞金:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 有効期限:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 委託者:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 報奨金を請求しました! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>無事に賞金を受け取りました</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>あなたのシェア:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>誰か</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を請求​​しました</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% 選手</gradient> <gradient:#a855f7:#c084fc>～の賞金を請求​​しました</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# 報奨金作成メッセージ
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ 報奨金が正常に作成されました</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 報奨金の処理に失敗しました:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ 報奨金を処理しています...</gradient>"

# ============================================
# ランク進行メッセージ
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ ランクアップを開始しました</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 閲覧要件</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ 要件が不完全です</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%％ 完了）</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ 要件が不完全:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>要件はありません!</gradient>"

# ============================================
# ランククリックメッセージ
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 プレビューモード:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ あなたが所有しています</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 ロックされています:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- まず前提条件を満たしてください</gradient>"

# ============================================
# RQコマンドメッセージ
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms がインストールされていません!</gradient> <gradient:#6b7280:#9ca3af>この機能には LuckPerms が必要です。</gradient>"
