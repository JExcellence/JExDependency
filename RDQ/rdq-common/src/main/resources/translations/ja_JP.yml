      name: "<gradient:#6b7280:#9ca3af>空の</gradient>"
  actions:
    assign_selected:
      name: "<gradient:#10b981:#34d399>✅ 割り当てる %plugin_name% 権限</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>すべての権限を次から割り当てます</gradient>"
        - "<gradient:#f59e0b:#fbbf24>%plugin_name%</gradient>"
        - "<gradient:#6b7280:#9ca3af>(%permission_count% 許可)</gradient>"
