# RDQ Common 翻訳ファイル - 日本語
# MiniMessageフォーマット（グラデーションとスタイル付き）
# プレースホルダーは %placeholder% 形式を使用

# 賞金リスナーメッセージ
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>あなたの頭にアクティブな賞金がかかっています！</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 賞金額:</gradient> <gradient:#10b981:#34d399>¥%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 期限:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 依頼者:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 賞金獲得！🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>あなたは</gradient><gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>あなたの取り分:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>誰か</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>が</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count%人のプレイヤー</gradient> <gradient:#a855f7:#c084fc>が</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>の賞金を獲得しました！</gradient>"

# 賞金作成確認メッセージ
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ 賞金の作成が成功しました</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>！</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 賞金の作成に失敗しました:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# 賞金概要UI（メインメニューと概要）
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 賞金システム</gradient>"
  
  # メインメニューボタン
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 賞金作成</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックして新しい賞金を</gradient>"
      - "<gradient:#6b7280:#9ca3af>他のプレイヤーにかける</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 賞金表示</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>すべてのアクティブな賞金を表示</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 私の賞金</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>あなたが作成した賞金を表示</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 リーダーボード</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>トップ賞金ハンター</gradient>"
  
  # 賞金リストエントリ
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>への賞金</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>ターゲット:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>依頼者:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>作成日:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>クリックして詳細を表示</gradient>"

# 賞金作成UI
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 賞金作成</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 ターゲット選択</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックして賞金をかける</gradient>"
      - "<gradient:#6b7280:#9ca3af>プレイヤーを選択</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 報酬追加</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>クリックしてアイテムを</gradient>"
      - "<gradient:#6b7280:#9ca3af>報酬として追加</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 最初にターゲットを選択してください！</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ 賞金作成</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックして選択した報酬で</gradient>"
      - "<gradient:#6b7280:#9ca3af>賞金を作成</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>への賞金を作成しました！</gradient>"

# 賞金プレイヤー情報UI
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>への賞金</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>この賞金のターゲット</gradient>"
      - "<gradient:#6b7280:#9ca3af>クリックしてプレイヤー情報を表示</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 報酬表示</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックしてこの賞金の</gradient>"
      - "<gradient:#6b7280:#9ca3af>すべての報酬を表示</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 賞金削除</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ 警告：この操作は</gradient>"
      - "<gradient:#ef4444:#f87171>元に戻せません！</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>クリックしてこの賞金を削除</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>への賞金を削除しました！</gradient>"

# 賞金報酬UI
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 賞金報酬</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 報酬なし</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>アイテムを追加してこの賞金の</gradient>"
      - "<gradient:#6b7280:#9ca3af>報酬を作成</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ アイテム追加</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>ここにアイテムを置いて報酬として追加</gradient>"
      - "<gradient:#6b7280:#9ca3af>右クリックでアイテムを削除</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 ターゲット: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>この賞金は</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#6b7280:#9ca3af>にかけられています</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 賞金報酬</gradient>"
      - "<gradient:#6b7280:#9ca3af>このアイテムは賞金を</gradient>"
      - "<gradient:#6b7280:#9ca3af>獲得した人に与えられます</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ 新しいアイテムが追加されませんでした！</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ インベントリが満杯だったため、いくつかのアイテムがドロップされました！</gradient>"

# プレフィックス
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  add_
currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 通貨追加</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックして通貨報酬を</gradient>"
      - "<gradient:#6b7280:#9ca3af>賞金に追加</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 最初にターゲットを選択してください！</gradient>"

# プラットフォームUIコンポーネント
paginated_player_ui:
