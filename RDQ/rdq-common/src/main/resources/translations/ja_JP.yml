# RDQ 翻訳ファイル - 英語 (米国)
# グラデーションとスタイルを備えた MiniMessage 形式
# プレースホルダーは %placeholder% 形式を使用します

# ============================================
# グローバルプレフィックス
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROOT LEVEL KEYS (I18n.Builder の直接呼び出しで使用)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 報酬なし</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>アイテムを追加して報酬を作成する</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ アイテムの追加</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>報酬として追加するアイテムをここに配置します</gradient>"
    - "<gradient:#6b7280:#9ca3af>左クリックしてアイテムを配置します</gradient>"
    - "<gradient:#6b7280:#9ca3af>右クリックして項目を削除します</gradient>"

# ============================================
# ランクツリーの表示名と説明
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹レンジャー</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>アーチェリーと追跡の技術をマスターする</gradient>"
      - "<gradient:#6b7280:#9ca3af>自然と一体になる</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ 戦士</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>戦闘術をマスターする</gradient>"
      - "<gradient:#6b7280:#9ca3af>伝説の戦士になろう</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨メイジ</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>魔法の力を利用する</gradient>"
      - "<gradient:#6b7280:#9ca3af>秘術のマスターになろう</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 ローグ</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>ステルスと狡猾さをマスターする</gradient>"
      - "<gradient:#6b7280:#9ca3af>影からの攻撃</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝クレリック</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>神の力を伝える</gradient>"
      - "<gradient:#6b7280:#9ca3af>味方を癒して守る</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 販売者</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>貿易の技術をマスターする</gradient>"
      - "<gradient:#6b7280:#9ca3af>財産を築く</gradient>"

# ============================================
# ランクの表示名と説明
# ============================================
rank:

  # ============================================
  # ランクメッセージ
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉ランクアップ！</gradient> <gradient:#6b7280:#9ca3af>すべての要件を満たしました</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>ランクメニューを使用してランクアップグレードを申請してください！</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>ランクなし</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>開始するランクパスを選択してください</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>ランクなし</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>デフォルトランク</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>ランクが選択されていません</gradient>"
  # レンジャーツリーのランク
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹ハンター</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>野生のやり方を学ぶ初心者トラッカー</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 アーチャー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>弓の扱いに優れ、遠距離では致命的</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 トラッカー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>獲物を見つけて追いかける専門家</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 射手</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>致命的な精度を備えた精密射撃者</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 パスファインダー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>未知の土地のマスター探検家</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 スナイパー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>エリート射手、一撃一殺</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 森の主</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>自然と一体となる荒野の主</gradient>"
  # 戦士のツリーランク
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>リクルート</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>旅を始める新たな戦士</gradient>"
        - "<gradient:#6b7280:#9ca3af>戦闘の基本を学ぶ</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>兵士</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>戦闘術の訓練を受けた</gradient>"
        - "<gradient:#6b7280:#9ca3af>戦闘準備完了</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>ベテラン</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>百戦錬磨の戦士</gradient>"
        - "<gradient:#6b7280:#9ca3af>専門分野のパスを選択してください</gradient>"
    # 専門分野 1: バーサーカー (攻撃的)
    berserker:
      name: "<gradient:#ef4444:#f87171>バーサーカー</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>怒りの道</gradient>"
        - "<gradient:#6b7280:#9ca3af>破壊的な攻撃を繰り出す</gradient>"
        - "<gradient:#6b7280:#9ca3af>防御を犠牲にして生の力を得る</gradient>"
    # 専門分野 2: ガーディアン (防御)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>ガーディアン</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>保護の道</gradient>"
        - "<gradient:#6b7280:#9ca3af>砕けない盾となれ</gradient>"
        - "<gradient:#6b7280:#9ca3af>いかなる犠牲を払ってでも味方を守る</gradient>"
    # 専門分野 3: グラディエーター (バランス型)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>剣闘士</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>栄光の道</gradient>"
        - "<gradient:#6b7280:#9ca3af>アリーナ戦闘の達人</gradient>"
        - "<gradient:#6b7280:#9ca3af>攻守のバランスを整える</gradient>"
    # 最終順位
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>怒りの将軍</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>究極のバーサーカー</gradient>"
        - "<gradient:#6b7280:#9ca3af>止まらない破壊力</gradient>"
        - "<gradient:#6b7280:#9ca3af>戦場で具現化する恐怖</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>盾の戦士</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>アルティメットガーディアン</gradient>"
        - "<gradient:#6b7280:#9ca3af>不動の物、永遠の守護者</gradient>"
        - "<gradient:#6b7280:#9ca3af>あなたが立っている間は誰も通りません</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>アリーナの将軍</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>究極の剣闘士</gradient>"
        - "<gradient:#6b7280:#9ca3af>チャンピオンの中のチャンピオン</gradient>"
        - "<gradient:#6b7280:#9ca3af>闘技場の伝説</gradient>"
    # レガシー ランク (下位互換性のため)
