      name: "<gradient:#f59e0b:#fbbf24>騎士</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>王国の名誉ある戦士</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>チャンピオン</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>誰もが恐れる伝説の戦士</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>将軍</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>戦争の達人、軍隊の指揮官</gradient>"
  # メイジツリーのランク
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨見習い</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>魔法の基礎を学ぶ</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨達人</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>魔力の成長</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ウィザード</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>秘術の達人</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨アークメイジ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>あらゆる魔法の至高の達人</gradient>"
  # ローグツリーのランク
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 スリ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>素早い指で素早く脱出</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡泥棒</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>ステルスと窃盗の達人</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 スカウト</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>影の目と耳</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡暗殺者</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>サイレントキラー、影からの死</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 侵入者</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>気づかれずに出入りする専門家</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 シャドウブレード</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>夜の致命的な戦士</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 スパイマスター</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>情報ネットワークのコントローラー</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 シャドウマスター</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>闇そのものと一つになる</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 シャドウマスター</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>全ての影の至高の支配者</gradient>"
  # クレリックのツリーランク
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ アコライト</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>神の献身的な僕</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ 信者</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>神の道の忠実な信者</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ 司祭</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>信者の治癒者および保護者</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ ヒーラー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>修復芸術のマスター</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ビショップ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>信者のリーダー</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝オラクル</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>神聖なビジョンの先見者</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝大祭司</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>至高の神の声</gradient>"
  # マーチャントツリーのランク
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰行商人</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>路上で商品を販売する</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 トレーダー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>コネクションのある老舗商人</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 ベンダー</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>熟練した商品販売者</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 工匠</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>高級品の製作者</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰錬金術師</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>ポーションとエリクサーの達人</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 販売者</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>成功したビジネスオーナー</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰 マスタークラフター</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>王国の最高の職人</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 商人の王子</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>商業ロイヤルティ</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 タイクーン</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>商業および貿易のマスター</gradient>"
    guild_master:
