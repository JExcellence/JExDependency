    max_rank_trees: "<gradient:#ef4444:#f87171>❌ 無料バージョンの制限:</gradient> <gradient:#6b7280:#9ca3af>完了することしかできません</gradient> <gradient:#f59e0b:#fbbf24>1ランクツリー</gradient><gradient:#6b7280:#9ca3af>。無制限にプレミアムにアップグレードしてください!</gradient>"
