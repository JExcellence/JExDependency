    name: "<gradient:#10b981:#34d399>✅ 割り当てる %plugin_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>選択したプラグインからすべての権限を割り当てます</gradient>"
  assign_all_permissions:
    name: "<gradient:#10b981:#34d399>✅ すべての権限を割り当てる</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>すべての権限を割り当てる</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%total_plugins%</gradient> <gradient:#6b7280:#9ca3af>プラグイン</gradient>"
  feedback:
    data_refreshed: "<gradient:#10b981:#34d399>✅ データが更新されました!</gradient>"
    permissions_assigned:
      plugin_all: "<gradient:#10b981:#34d399>✅ 割り当て済み</gradient> <gradient:#f59e0b:#fbbf24>%permission_count%</gradient> <gradient:#10b981:#34d399>からの許可</gradient> <gradient:#a855f7:#c084fc>%plugin_name%</gradient>"
  plugin_selected: "<gradient:#3b82f6:#60a5fa>📦 選択済み:</gradient> <gradient:#f59e0b:#fbbf24>%plugin_name%</gradient>"
  plugin_permissions_assigned: "<gradient:#10b981:#34d399>✅ 割り当て済み</gradient> <gradient:#f59e0b:#fbbf24>%permission_count%</gradient> <gradient:#10b981:#34d399>からの許可</gradient> <gradient:#a855f7:#c084fc>%plugin_name%</gradient>"
  single_permission_assigned: "<gradient:#10b981:#34d399>✅ 割り当て:</gradient> <gradient:#f59e0b:#fbbf24>%permission%</gradient> <gradient:#6b7280:#9ca3af>から</gradient> <gradient:#a855f7:#c084fc>%plugin_name%</gradient>"
  selection_cleared: "<gradient:#6b7280:#9ca3af>選択がクリアされました</gradient>"
  selected_plugin_all_assigned: "<gradient:#10b981:#34d399>✅ から割り当てられたすべての権限</gradient> <gradient:#a855f7:#c084fc>%plugin_name%</gradient>"

