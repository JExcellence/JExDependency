      name: " "
    border:
      name: " "
  clear_selection:
    name: "<gradient:#ef4444:#f87171>❌ 選択をクリア</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>クリックしてプラグインの選択を解除します</gradient>"
