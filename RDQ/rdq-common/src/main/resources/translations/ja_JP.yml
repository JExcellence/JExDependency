    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# ページネーション
page:
  name: "<gradient:#6b7280:#9ca3af>📄 ページ %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>現在のページ:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
