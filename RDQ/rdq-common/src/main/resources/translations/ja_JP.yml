ット選択ボタン
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 ターゲット選択: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>クリックしてプレイヤーを選択</gradient>"
    - "<gradient:#6b7280:#9ca3af>賞金をかける対象を選ぶ</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>現在のターゲット: %target_name%</gradient>"

# 賞金確認ボタン
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ 賞金を作成</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>クリックして賞金を作成</gradient>"
    - "<gradient:#6b7280:#9ca3af>選択した報酬で</gradient>"

# 確認メッセージ
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ プレイヤーが選択されていません！</gradient> <gradient:#6b7280:#9ca3af>まずターゲットを選択してください。</gradient>"
