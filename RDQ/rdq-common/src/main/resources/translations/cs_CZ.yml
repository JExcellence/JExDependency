      name: "<gradient:#3b82f6:#60a5fa>Strážce</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Cesta ochrany</gradient>"
        - "<gradient:#6b7280:#9ca3af>Staňte se nerozbitným štítem</gradient>"
        - "<gradient:#6b7280:#9ca3af>Chraňte své spojence za každou cenu</gradient>"
    # Specializace Větev 3: Gladiátor (vyvážený)
