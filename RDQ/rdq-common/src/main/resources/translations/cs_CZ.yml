      name: "<gradient:#a855f7:#c084fc>Gladiátor</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Path of Glory</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mistr boje v aréně</gradient>"
        - "<gradient:#6b7280:#9ca3af>Vyvážení útoku a obrany</gradient>"
    # Konečné pořadí
