      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Path of Fury</gradient>"
        - "<gradient:#6b7280:#9ca3af>Rozpoutat zničující útoky</gradient>"
        - "<gradient:#6b7280:#9ca3af>Obětujte obranu za hrubou sílu</gradient>"
    # Specializační větev 2: Strážce (defenzivní)
