  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Režim náhledu:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Vlastníte </gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Uzamčeno:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Nejprve splňte předpoklady</gradient>"

# ============================================
# PŘÍKAZOVÉ ZPRÁVY RQ
# ============================================
rq:
