    disabled: "<gradient:#ef4444:#f87171>✦ Postranní panel perků vypnut.</gradient>"

scoreboard_sidebar:
  perks:
    title: "<dark_aqua>[RDQ]</dark_aqua> <white>Perky</white>"
    active_summary: "<gray>Aktivní:</gray> <aqua>%active_perks%/%max_active_perks%</aqua>"
    owned_summary: "<gray>Vlastněné:</gray> <gold>%acquired_perks%</gold><gray>/</gray><light_purple>%total_perks%</light_purple>"
    no_active: "<red>Žádné aktivní perky</red>"
    active_entry: "<white>%perk_name%</white> <gray>(%usage_count%)</gray>"
    more_active: "<gray>+%remaining_perks% dalších</gray>"

