  help: "<gradient:#a855f7:#c084fc>📖 Nápověda RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Otevřít hlavní nabídku</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Zobrazit hodnosti</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Zobrazit odměny</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Přepnout postranní panel perků</gradient>"
