      name: "<gradient:#f59e0b:#fbbf24>Rytíř</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Čestný válečník říše</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Šampion</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendární bojovník, kterého se všichni bojí</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Vojevůdce</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistr války, velitel armád</gradient>"
  # Hodnosti Mage Tree
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Učeň</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Naučení se základům magie</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adept</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Růst v magické síle</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Průvodce</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistr tajemných umění</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Arcimág</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nejvyšší mistr veškeré magie</gradient>"
  # Tulák Tree Rans
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Kapsář</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Rychlé prsty, rychlejší únik</gradient>"
    thief:
