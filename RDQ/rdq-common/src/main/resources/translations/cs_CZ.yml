# ============================================
# BOUNTY LISTENER Messages
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Máte aktivní odměnu na vaší hlavě!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Hodnota odměny:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Platnost vyprší:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Zadavatel:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 ODMĚNA NÁROČNÁ! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Úspěšně jste získali odměnu dne</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Váš podíl:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Někdo</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>vyžádal si odměnu dne</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% hráči</gradient> <gradient:#a855f7:#c084fc>vyžádali si odměnu dne</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# ZPRÁVY O VYTVOŘENÍ BOUNTY
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Odměna byla úspěšně vytvořena pro </gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Nepodařilo se zpracovat odměnu:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Zpracování odměny...</gradient>"

# ============================================
# ZPRÁVY O POSTUPU POŘADÍ
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Zahájen postup pro hodnost</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Požadavky na zobrazení pro </gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Požadavky pro</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>nejsou kompletní (%completion_percent%% splněno)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Neúplný požadavek:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>nemá žádné požadavky!</gradient>"

# ============================================
# HODNOTIT KLIKNUTÍ ZPRÁV
# ============================================
