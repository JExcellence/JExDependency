# Překladový soubor RDQ - čeština (Česká republika)
# Formát MiniMessage s přechody a stylingem
# Zástupné symboly používají formát %placeholder%

# ============================================
# GLOBÁLNÍ PŘEDPONA
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# KLÍČE NA KOŘENOVÉ ÚROVNI (používané přímými voláními I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Žádné odměny</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Přidáním položek vytvoříte odměny</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Přidat položku</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Sem umístěte položky, které chcete přidat jako odměny</gradient>"
    - "<gradient:#6b7280:#9ca3af>Kliknutím levým tlačítkem umístíte položku</gradient>"
    - "<gradient:#6b7280:#9ca3af>Kliknutím pravým tlačítkem odeberete položku</gradient>"

# ============================================
# ZOBRAZOVANÁ JMÉNA A POPISY STROMŮ HODNOSTÍ
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Hraničář</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ovládněte umění lukostřelby a stopování</gradient>"
      - "<gradient:#6b7280:#9ca3af>Staňte se jedním s přírodou</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Válečník</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ovládněte umění boje</gradient>"
      - "<gradient:#6b7280:#9ca3af>Staňte se legendárním bojovníkem</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mág</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ovládněte sílu magie</gradient>"
      - "<gradient:#6b7280:#9ca3af>Staňte se mistrem tajemna</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Tulák</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ovládněte tajnost a mazanost</gradient>"
      - "<gradient:#6b7280:#9ca3af>Úder ze stínů</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Klerik</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Veďte božskou sílu</gradient>"
      - "<gradient:#6b7280:#9ca3af>Uzdravujte a chraňte své spojence</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Obchodník</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ovládněte umění obchodu</gradient>"
      - "<gradient:#6b7280:#9ca3af>Vybudujte si své bohatství</gradient>"

# ============================================
# ZOBRAZOVANÁ JMÉNA A POPISY HODNOSTÍ
# ============================================
rank:

  # ============================================
  # ZPRÁVY HODNOSTÍ
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 POVÝŠENÍ!</gradient> <gradient:#6b7280:#9ca3af>Splnili jste všechny požadavky pro</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Použijte nabídku hodností k vyzvednutí povýšení!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Bez hodnosti</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Začněte výběrem hodnostní cesty</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Bez hodnosti</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Výchozí hodnost</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Není vybrána žádná hodnost</gradient>"
  # Hodnosti stromu hraničáře
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Lovec</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Začátečník, který se učí způsoby divočiny</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Lučištník</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Zručný s lukem, smrtící na dálku</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Stopař</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Odborník na hledání a sledování kořisti</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Střelec</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Přesná střílečka se smrtící přesností</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Průzkumník</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistr průzkumník nezmapovaných zemí</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Odstřelovač</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Elitní střelec, jeden výstřel jeden zabití</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Pán lesa</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistr divočiny, jeden s přírodou</gradient>"
  # Pořadí válečníků
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Rekrut</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nový válečník na začátku své cesty</gradient>"
        - "<gradient:#6b7280:#9ca3af>Naučte se základy boje</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Voják</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vycvičen v umění boje</gradient>"
        - "<gradient:#6b7280:#9ca3af>Připraveno k bitvě</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veterán</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bojím zocelený válečník</gradient>"
        - "<gradient:#6b7280:#9ca3af>Vyberte si cestu specializace</gradient>"
    # Specializace větev 1: Berserker (ofenzivní)
