      name: "<gradient:#ef4444:#f87171>Vojevůdce zuřivosti</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ultimate Berserker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Nezastavitelná síla ničení</gradient>"
        - "<gradient:#6b7280:#9ca3af>Strach vtělený na bojišti</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Vojevůdce štítu</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ultimate Strážce</gradient>"
        - "<gradient:#6b7280:#9ca3af>Nehybný předmět, věčný ochránce</gradient>"
        - "<gradient:#6b7280:#9ca3af>Žádný neprojde, dokud budete stát</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Vojevůdce arény</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ultimate Gladiátor</gradient>"
        - "<gradient:#6b7280:#9ca3af>Šampion šampionů</gradient>"
        - "<gradient:#6b7280:#9ca3af>Legenda arény</gradient>"
    # Starší hodnosti (pro zpětnou kompatibilitu)
