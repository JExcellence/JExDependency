        name: <white>%task_name%</white>
        lore:
        - <gray>%task_description%</gray>
        - ''
        - '<dark_gray>진전: <white>%current%/%required%</white></dark_gray>'
        - '<dark_gray>상태: %status%</dark_gray>'
