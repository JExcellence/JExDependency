    unlock:
      notification: "<gradient:#10b981:#34d399>✨ 특전 잠금 해제!</gradient> <gradient:#6b7280:#9ca3af>잠금을 해제했습니다.</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>특전을 성공적으로 잠금 해제하고 활성화했습니다.</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>혜택을 잠금 해제하지 못했습니다. 다시 시도해 주세요.</gradient>"
      error: "<gradient:#ef4444:#f87171>혜택을 잠금 해제하는 중에 오류가 발생했습니다.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>이 혜택을 잠금 해제하기 위한 요구 사항을 충족하지 않습니다!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>활성화된 특전:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>혜택을 활성화하지 못했습니다:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
