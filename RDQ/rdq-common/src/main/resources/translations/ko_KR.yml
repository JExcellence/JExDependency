      cooldown_label: "<gray>쿨다운: <gold>%time%</gold></gray>"
      activations_label: "<gray>활성화: <white>%count%</white></gray>"
    buttons:
      unlock:
        title: "<white>특전 잠금 해제</white>"
        hint: "<green>이 혜택을 잠금 해제하려면 클릭하세요!</green>"
      enable:
        title: "<white>혜택 활성화</white>"
        hint: "<green>이 혜택을 활성화하려면 클릭하세요.</green>"
        limit_reached: "<red>활성화된 최대 혜택에 도달했습니다.</red>"
      disable:
        title: "<white>특전 비활성화</white>"
        hint: "<yellow>이 혜택을 비활성화하려면 클릭하세요.</yellow>"

  # 기존 혜택(참고용 - 누락된 경우 추가)
  fly:
    name: "<gradient:#3b82f6:#60a5fa>비행</gradient>"
    description: "<gradient:#6b7280:#9ca3af>비행 능력을 얻습니다.</gradient>"
  glow:
    name: "<gradient:#f59e0b:#fbbf24>불타는 듯한 빛깔</gradient>"
    description: "<gradient:#6b7280:#9ca3af>자신에게 빛나는 효과 적용</gradient>"
  haste:
    name: "<gradient:#10b981:#34d399>서두름</gradient>"
    description: "<gradient:#6b7280:#9ca3af>더 빠르게 채굴하고 발굴하세요</gradient>"
  jump_boost:
    name: "<gradient:#a855f7:#c084fc>점프 부스트</gradient>"
    description: "<gradient:#6b7280:#9ca3af>평소보다 더 높이 점프하세요</gradient>"
  keep_experience:
    name: "<gradient:#10b981:#34d399>경험을 유지</gradient>"
    description: "<gradient:#6b7280:#9ca3af>죽어도 XP를 유지하세요</gradient>"
  keep_inventory:
    name: "<gradient:#3b82f6:#60a5fa>재고 유지</gradient>"
    description: "<gradient:#6b7280:#9ca3af>죽을 때 물건을 보관하세요</gradient>"
  night_vision:
    name: "<gradient:#f59e0b:#fbbf24>나이트 비전</gradient>"
    description: "<gradient:#6b7280:#9ca3af>어둠 속에서도 선명하게 보이세요</gradient>"
  no_fall_damage:
