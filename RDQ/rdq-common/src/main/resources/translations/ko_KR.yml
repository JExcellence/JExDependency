    description: "<gradient:#6b7280:#9ca3af>절대 배고프지 않아</gradient>"
  speed:
    name: "<gradient:#3b82f6:#60a5fa>속도</gradient>"
    description: "<gradient:#6b7280:#9ca3af>평소보다 빠르게 이동</gradient>"
  strength:
    name: "<gradient:#ef4444:#f87171>힘</gradient>"
    description: "<gradient:#6b7280:#9ca3af>전투에서 더 많은 피해를 입힙니다.</gradient>"
  fire_resistance:
    name: "<gradient:#ef4444:#f87171>내화성</gradient>"
    description: "<gradient:#6b7280:#9ca3af>화재 및 용암 피해에 면역</gradient>"
  double_experience:
    name: "<gradient:#a855f7:#c084fc>경험치 2배</gradient>"
    description: "<gradient:#6b7280:#9ca3af>모든 소스에서 두 배의 XP 획득</gradient>"
  critical_strike:
    name: "<gradient:#ef4444:#f87171>치명타</gradient>"
    description: "<gradient:#6b7280:#9ca3af>치명타 피해를 입힐 확률</gradient>"
  combat_heal:
    name: "<gradient:#10b981:#34d399>전투 치유</gradient>"
    description: "<gradient:#6b7280:#9ca3af>적에게 피해를 줄 때 치유</gradient>"
quest:
  zombie_slayer:
    name: <gradient:#ef4444:#f87171>좀비 슬레이어</gradient>
    description: 좀비를 처치하고 드롭을 수집하여 전투 능력을 증명하세요.
    task:
      kill_zombies:
        name: <white>좀비 처치</white>
        description: '죽이다 %amount% 좀비'
      collect_flesh:
        name: <white>썩은 살점 수집</white>
        description: '모으다 %amount% 패배한 좀비의 썩은 살점'
  master_miner:
    name: <gradient:#6b7280:#9ca3af>마스터 마이너</gradient>
    description: 제한 시간 내에 다양한 광석을 채굴하여 마스터 마이너가 되세요
    task:
      mine_coal:
        name: <white>광산 석탄</white>
        description: 내 거 %amount% 석탄 광석 블록
      mine_iron:
        name: <white>광산 철</white>
        description: 내 거 %amount% 철광석 블록
      mine_diamond:
        name: <white>광산 다이아몬드</white>
        description: 내 거 %amount% 다이아몬드 광석 블록
  builders_dream:
    name: <gradient:#f59e0b:#fbbf24>빌더의 꿈</gradient>
    description: 당신의 건축 기술을 보여주기 위해 순차적인 단계에 따라 건물을 건설하세요
    task:
      foundation:
