# RDQ 번역 파일 - 영어(미국)
# 그라데이션과 스타일이 포함된 MiniMessage 형식
# 자리 표시자는 %placeholder% 형식을 사용합니다.

# ============================================
# 전역 접두사
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# 루트 레벨 키(직접 I18n.Builder 호출에 사용됨)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 보상 없음</gradient>"
  lore:
  - "<gradient:#6b7280:#9ca3af>아이템을 추가하여 보상 생성</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ 아이템 추가</gradient>"
  lore:
  - "<gradient:#6b7280:#9ca3af>여기에 아이템을 놓아 보상으로 추가</gradient>"
  - "<gradient:#6b7280:#9ca3af>아이템을 배치하려면 마우스 왼쪽 버튼을 클릭하세요.</gradient>"
  - "<gradient:#6b7280:#9ca3af>항목을 제거하려면 마우스 오른쪽 버튼을 클릭하세요.</gradient>"

# ============================================
# 순위 트리 표시 이름 및 설명
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 레인저</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>궁술과 추적의 기술을 마스터</gradient>"
    - "<gradient:#6b7280:#9ca3af>자연과 하나가 되다</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ 전사</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>전투의 기술을 마스터</gradient>"
    - "<gradient:#6b7280:#9ca3af>전설적인 파이터가 되어보세요</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ 마법사</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>마법의 힘을 다루다</gradient>"
    - "<gradient:#6b7280:#9ca3af>비전의 달인이 되어보세요</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 도적</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>은신과 교활함을 마스터</gradient>"
    - "<gradient:#6b7280:#9ca3af>그림자로부터의 공격</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ 성직자</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>신성한 힘을 인도</gradient>"
    - "<gradient:#6b7280:#9ca3af>아군을 치유하고 보호하세요</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 상인</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>상업의 기술을 마스터</gradient>"
    - "<gradient:#6b7280:#9ca3af>당신의 재산을 쌓아보세요</gradient>"

# ============================================
# 순위 표시 이름 및 설명
# ============================================
rank:

  # ============================================
  # 순위 메시지
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 순위를 올리세요!</gradient> <gradient:#6b7280:#9ca3af>다음 요구 사항을 모두 충족했습니다.</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>순위 메뉴를 사용하여 순위 업그레이드를 요청하세요!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>무랭크</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>시작하려면 순위 경로를 선택하세요.</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>무랭크</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>기본 랭크</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>선택된 랭크가 없습니다</gradient>"
  # 레인저 트리 순위
  ranger:
    scout:
      name: <gradient:#22c55e:#86efac>🏹 트레일 스카우트</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 발굽 자국과 바람의 변화를 읽습니다.</gradient>
      - <gradient:#10b981:#34d399>➤ Tier I • 자연 입문자</gradient>
    hunter:
      name: <gradient:#16a34a:#4ade80>🏹 야생의 사냥꾼</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 인내심 있게 먹이를 추적합니다.</gradient>
      - <gradient:#10b981:#34d399>➤ Tier II • 와일드 추격</gradient>
    tracker:
      name: <gradient:#0ea5e9:#38bdf8>🏹 표지판 추적기</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 어떤 폭풍도 지울 수 없는 길을 따라갑니다.</gradient>
      - <gradient:#3b82f6:#60a5fa>➤ Tier III • 향후 경로 선택</gradient>
    warden_primal:
      name: <gradient:#14b8a6:#2dd4bf>🛡 짐승의 감시자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 왕국의 정점에 있는 생물과 유대를 맺습니다.</gradient>
      - <gradient:#14b8a6:#2dd4bf>➤ Tier IV • 기본 분기</gradient>
    warden_storm:
      name: <gradient:#2563eb:#60a5fa>⚡ 폭풍 감시자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 천둥과 비를 통해서도 진정한 불이 일어납니다.</gradient>
      - <gradient:#2563eb:#60a5fa>➤ 4단계 • 폭풍 가지</gradient>
    warden_wild:
      name: <gradient:#16a34a:#84cc16>❤️ 야생의 감시자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 신성한 국경과 숨겨진 공터를 보호합니다.</gradient>
      - <gradient:#16a34a:#84cc16>➤ Tier IV • 와일드 브랜치</gradient>
    beastmaster_primal:
      name: <gradient:#7c3aed:#c084fc>😘 비스트마스터 프라이멀</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 전설의 짐승들에게 두려움 없이 명령을 내립니다.</gradient>
      - <gradient:#7c3aed:#c084fc>➤ 5단계 • 최종 순위</gradient>
    beastmaster_storm:
      name: <gradient:#1d4ed8:#3b82f6>😘 비스트마스터 스톰</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 모든 볼트가 끊임없는 발리슛을 유도합니다.</gradient>
      - <gradient:#1d4ed8:#3b82f6>➤ 5단계 • 최종 순위</gradient>
    beastmaster_wild:
      name: <gradient:#15803d:#22c55e>😘 비스트마스터 와일드</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 자연 그 자체가 당신의 부름에 응답하기 위해 일어납니다.</gradient>
      - <gradient:#15803d:#22c55e>➤ 5단계 • 최종 순위</gradient>
  warrior:
    recruit:
      name: <gradient:#6b7280:#9ca3af>⚔ 모집</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 검증되지 않은 결의를 지닌 신선한 칼날입니다.</gradient>
      - <gradient:#94a3b8:#cbd5e1>➤ Tier I • 훈련장</gradient>
    soldier:
      name: <gradient:#3b82f6:#60a5fa>⚔ 군인</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 훈련과 최전선 임무를 통해 단련되었습니다.</gradient>
      - <gradient:#3b82f6:#60a5fa>➤ Tier II • 현장 규율</gradient>
    veteran:
      name: <gradient:#f59e0b:#fbbf24>⚔ 베테랑</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 전투 상처는 당신이 얻은 지혜를 나타냅니다.</gradient>
      - <gradient:#f59e0b:#fbbf24>➤ Tier III • 경로 선택</gradient>
    berserker:
      name: <gradient:#ef4444:#f87171>🔥 버서커</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 파괴적인 공격을 위해 방어를 선택합니다.</gradient>
      - <gradient:#ef4444:#f87171>➤ 4단계 • 퓨리 브랜치</gradient>
    guardian:
      name: <gradient:#2563eb:#60a5fa>🛡 수호자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 남들이 부러지는 곳에도 굳건히 서 있습니다.</gradient>
      - <gradient:#2563eb:#60a5fa>➤ Tier IV • 실드 브랜치</gradient>
    gladiator:
      name: <gradient:#a855f7:#c084fc>🏟 검투사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 마스터는 균형 잡힌 경기장 전쟁을 벌입니다.</gradient>
      - <gradient:#a855f7:#c084fc>➤ 4단계 • 아레나 지점</gradient>
    warlord_fury:
      name: <gradient:#dc2626:#fb7185>⭐ 분노의 전쟁군주</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 멈출 수 없는 파괴의 엔진.</gradient>
      - <gradient:#dc2626:#fb7185>➤ 5단계 • 최종 순위</gradient>
    warlord_shield:
      name: <gradient:#1d4ed8:#60a5fa>⭐ 방패의 전쟁군주</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 삶과 파멸 사이의 마지막 벽.</gradient>
      - <gradient:#1d4ed8:#60a5fa>➤ 5단계 • 최종 순위</gradient>
    warlord_arena:
      name: <gradient:#7c3aed:#c084fc>😘 아레나의 전쟁군주</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 모든 콜로세움의 챔피언으로 선정되었습니다.</gradient>
      - <gradient:#7c3aed:#c084fc>➤ 5단계 • 최종 순위</gradient>
  mage:
    apprentice:
      name: <gradient:#a855f7:#d8b4fe>✨ 견습생</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 신비한 힘의 불꽃이 깨어납니다.</gradient>
      - <gradient:#a855f7:#d8b4fe>➤ Tier I • 비전 기초</gradient>
    adept:
      name: <gradient:#3b82f6:#93c5fd>✨ 능숙하다</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 통제되고 집중된 주문을 엮습니다.</gradient>
      - <gradient:#3b82f6:#93c5fd>➤ Tier II • 비전 연습</gradient>
    wizard:
      name: <gradient:#f59e0b:#fde68a>✨ 마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 복잡한 패턴의 마법을 구사합니다.</gradient>
      - <gradient:#f59e0b:#fde68a>➤ Tier III • 교리를 선택하세요</gradient>
    sorcerer_arcane:
      name: <gradient:#8b5cf6:#c4b5fd>🔮 아르카나의 마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 순수한 힘을 우아한 힘으로 정제합니다.</gradient>
      - <gradient:#8b5cf6:#c4b5fd>➤ 4단계 • 비전 가지</gradient>
    sorcerer_spell:
      name: <gradient:#d946ef:#f0abfc>📜 주문의 마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 그리모어 제어 및 정밀도를 확장합니다.</gradient>
      - <gradient:#d946ef:#f0abfc>➤ Tier IV • 주문 계열</gradient>
    sorcerer_void:
      name: <gradient:#1d4ed8:#60a5fa>🌌 공허의 마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 당신의 의지에 따라 심연의 에너지를 구부립니다.</gradient>
      - <gradient:#1d4ed8:#60a5fa>➤ Tier IV • 공허 지점</gradient>
    archmage_arcane:
      name: <gradient:#7c3aed:#c084fc>😘 아르카나의 대마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 순수한 비전 힘의 최고 건축가.</gradient>
      - <gradient:#7c3aed:#c084fc>➤ 5단계 • 최종 순위</gradient>
    archmage_spell:
      name: <gradient:#d946ef:#f5d0fe>😘 주문의 대마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 모든 주문은 즉시 응답됩니다.</gradient>
      - <gradient:#d946ef:#f5d0fe>➤ 5단계 • 최종 순위</gradient>
    archmage_void:
      name: <gradient:#1e3a8a:#60a5fa>😘 공허의 대마법사</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 세계 사이의 가장자리를 지배합니다.</gradient>
      - <gradient:#1e3a8a:#60a5fa>➤ 5단계 • 최종 순위</gradient>
  rogue:
    pickpocket:
      name: <gradient:#6b7280:#9ca3af>🗡 소매치기</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 타이밍, 잘못된 방향 및 속도를 배웁니다.</gradient>
      - <gradient:#94a3b8:#cbd5e1>➤ Tier I • 스트리트크래프트</gradient>
    thief:
      name: <gradient:#3b82f6:#93c5fd>🗡 도둑</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 자물쇠와 감시선을 통과하여 미끄러집니다.</gradient>
      - <gradient:#3b82f6:#93c5fd>➤ Tier II • 자동 입장</gradient>
    assassin:
      name: <gradient:#ef4444:#f87171>🗡 암살자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 한 번 공격을 가하면 흔적도 없이 사라집니다.</gradient>
      - <gradient:#ef4444:#f87171>➤ Tier III • 방법 선택</gradient>
    shadow_stealth:
      name: <gradient:#0ea5e9:#67e8f9>🌒 스텔스의 그림자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 마스터의 움직임은 눈으로 따라갈 수 없습니다.</gradient>
      - <gradient:#0ea5e9:#67e8f9>➤ Tier IV • 스텔스 브랜치</gradient>
    shadow_night:
      name: <gradient:#7c3aed:#c4b5fd>🌘 밤의 그림자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 어둠을 치명적인 이점으로 바꿉니다.</gradient>
      - <gradient:#7c3aed:#c4b5fd>➤ Tier IV • 야간 분기</gradient>
    shadow_sabotage:
      name: <gradient:#f97316:#fb923c>💣 사보타주의 그림자</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 적들이 반응하기 전에 계획을 해체합니다.</gradient>
      - <gradient:#f97316:#fb923c>➤ Tier IV • 사보타주 지점</gradient>
    phantom_stealth:
      name: <gradient:#14b8a6:#5eead4>⭐ 스텔스의 유령</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 불가촉천민의 도시신화가 된다.</gradient>
      - <gradient:#14b8a6:#5eead4>➤ 5단계 • 최종 순위</gradient>
    phantom_night:
      name: <gradient:#9333ea:#e9d5ff>😘 밤의 유령</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 자정 시간을 완전히 소유합니다.</gradient>
      - <gradient:#9333ea:#e9d5ff>➤ 5단계 • 최종 순위</gradient>
    phantom_sabotage:
      name: <gradient:#ea580c:#fdba74>😘 사보타지의 유령</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 전투가 시작되기도 전에 종료됩니다.</gradient>
      - <gradient:#ea580c:#fdba74>➤ 5단계 • 최종 순위</gradient>
  cleric:
    acolyte:
      name: <gradient:#f59e0b:#fde68a>✝ 수행사제</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 신성한 봉사의 길을 시작합니다.</gradient>
      - <gradient:#f59e0b:#fde68a>➤ Tier I • 헌신</gradient>
