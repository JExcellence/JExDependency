    disable:
      success: "<gradient:#f59e0b:#fbbf24>장애인 특전:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>혜택을 비활성화하지 못했습니다:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"

    # 쿨다운
    cooldown:
      active: "<gradient:#ef4444:#f87171>이 특전은 다음 기간 동안 재사용 가능합니다.</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
