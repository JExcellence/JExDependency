# RDQ 번역 파일 - 영어(미국)
# 그라데이션과 스타일이 포함된 MiniMessage 형식
# 자리 표시자는 %placeholder% 형식을 사용합니다.

# ============================================
# 전역 접두사
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# 루트 레벨 키(직접 I18n.Builder 호출에 사용됨)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 보상 없음</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>아이템을 추가하여 보상 생성</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ 아이템 추가</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>여기에 아이템을 놓아 보상으로 추가</gradient>"
    - "<gradient:#6b7280:#9ca3af>아이템을 배치하려면 마우스 왼쪽 버튼을 클릭하세요.</gradient>"
    - "<gradient:#6b7280:#9ca3af>항목을 제거하려면 마우스 오른쪽 버튼을 클릭하세요.</gradient>"

# ============================================
# 순위 트리 표시 이름 및 설명
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 레인저</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>궁술과 추적의 기술을 마스터</gradient>"
      - "<gradient:#6b7280:#9ca3af>자연과 하나가 되다</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ 전사</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>전투의 기술을 마스터</gradient>"
      - "<gradient:#6b7280:#9ca3af>전설적인 파이터가 되어보세요</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ 마법사</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>마법의 힘을 다루다</gradient>"
      - "<gradient:#6b7280:#9ca3af>비전의 달인이 되어보세요</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 도적</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>은신과 교활함을 마스터</gradient>"
      - "<gradient:#6b7280:#9ca3af>그림자로부터의 공격</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ 성직자</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>신성한 힘을 인도</gradient>"
      - "<gradient:#6b7280:#9ca3af>아군을 치유하고 보호하세요</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 상인</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>상업의 기술을 마스터</gradient>"
      - "<gradient:#6b7280:#9ca3af>당신의 재산을 쌓아보세요</gradient>"

# ============================================
# 순위 표시 이름 및 설명
# ============================================
rank:

  # ============================================
  # 순위 메시지
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 순위를 올리세요!</gradient> <gradient:#6b7280:#9ca3af>다음 요구 사항을 모두 충족했습니다.</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>순위 메뉴를 사용하여 순위 업그레이드를 요청하세요!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>무랭크</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>시작하려면 순위 경로를 선택하세요.</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>무랭크</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>기본 랭크</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>선택된 랭크가 없습니다</gradient>"
  # 레인저 트리 순위
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 헌터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>야생의 길을 배우는 초보 추적자</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 궁수</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>활에 능숙하며 원거리에서 치명적입니다.</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 추적기</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>먹이를 찾아 추적하는 전문가</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 사수</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>치명적인 정확도를 갖춘 정밀 슈팅 게임</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 패스파인더</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>미지의 땅을 탐험하는 마스터 탐험가</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 스나이퍼</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>엘리트 사수 원샷원킬</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 숲의 군주</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>자연과 하나되는 황야의 주인</gradient>"
  # 워리어 트리 순위
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>모집</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>여행을 시작하는 새로운 전사</gradient>"
        - "<gradient:#6b7280:#9ca3af>전투의 기본을 익히세요</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>군인</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>전투 기술을 훈련받았습니다.</gradient>"
        - "<gradient:#6b7280:#9ca3af>전투 준비 완료</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>재향 군인</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>전투로 단련된 전사</gradient>"
        - "<gradient:#6b7280:#9ca3af>전문화 과정을 선택하세요</gradient>"
    # 전문화 계열 1: 광전사(공격형)
    berserker:
      name: "<gradient:#ef4444:#f87171>맹렬한</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>분노의 길</gradient>"
        - "<gradient:#6b7280:#9ca3af>파괴적인 공격을 펼치세요</gradient>"
        - "<gradient:#6b7280:#9ca3af>원시 전력을 위해 방어를 희생합니다.</gradient>"
    # 전문화 부문 2: Guardian(방어)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>보호자</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>보호의 길</gradient>"
        - "<gradient:#6b7280:#9ca3af>깨지지 않는 방패가 되어주세요</gradient>"
        - "<gradient:#6b7280:#9ca3af>어떤 희생을 치르더라도 동맹국을 보호하세요</gradient>"
    # 전문화 계열 3: 검투사(균형)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>검투사</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>영광의 길</gradient>"
        - "<gradient:#6b7280:#9ca3af>경기장 전투의 달인</gradient>"
        - "<gradient:#6b7280:#9ca3af>공격과 방어의 균형</gradient>"
    # 최종 순위
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>분노의 전쟁군주</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>궁극의 버서커</gradient>"
        - "<gradient:#6b7280:#9ca3af>멈출 수 없는 파괴의 힘</gradient>"
        - "<gradient:#6b7280:#9ca3af>전장에서 구현되는 공포</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>방패의 전쟁군주</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>얼티밋 가디언</gradient>"
        - "<gradient:#6b7280:#9ca3af>움직일 수 없는 물건, 영원한 수호자</gradient>"
        - "<gradient:#6b7280:#9ca3af>당신이 서있는 동안에는 누구도 지나가지 못할 것입니다</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>아레나의 전쟁군주</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>궁극의 검투사</gradient>"
        - "<gradient:#6b7280:#9ca3af>챔피언 중의 챔피언</gradient>"
        - "<gradient:#6b7280:#9ca3af>경기장의 전설</gradient>"
    # 레거시 순위(이전 버전과의 호환성을 위해)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>기사</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>왕국의 명예로운 전사</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>챔피언</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>모두가 두려워하는 전설적인 전사</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>장군</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>전쟁의 달인, 군대의 사령관</gradient>"
  # 마법사 나무 순위
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ 견습생</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>마법의 기초를 익히다</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ 능숙하다</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>마법의 힘으로 성장</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ 마법사</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>비전술의 대가</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ 대마법사</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>모든 마법의 최고 마스터</gradient>"
  # 로그 트리 순위
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 소매치기</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>빠른 손가락, 더 빠른 탈출</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 도둑</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>은신과 절도의 달인</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 스카우트</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>그림자의 눈과 귀</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 암살자</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>침묵의 살인자, 그림자로부터의 죽음</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 침입자</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>들키지 않고 들어오고 나가는 전문가</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 섀도우블레이드</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>밤의 치명적인 전사</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 스파이마스터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>정보 네트워크 컨트롤러</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 섀도우 마스터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>어둠 그 자체와 하나</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 섀도우마스터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>모든 그림자의 최고 통치자</gradient>"
  # 성직자 계통도 순위
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ 수행사제</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>신의 헌신적인 종</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ 신봉자</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>신성한 길을 충실히 따르는 사람</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ 신부</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>신자들의 치유자요 보호자</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ 힐러</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>복원 예술 석사</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ 비숍</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>충실한 지도자</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ 오라클</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>신성한 비전의 선견자</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ 대제사장</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>신의 최고의 목소리</gradient>"
  # 상인 나무 순위
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 행상인</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>길거리에서 물건을 파는 중</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 상인</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>인연이 있는 창업가맹점</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 공급업체</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>숙련된 상품 판매자</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 기술자</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>훌륭한 제품을 만드는 사람</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰 연금술사</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>물약과 비약의 달인</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 판매자</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>성공한 사업주</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰 마스터 크래프터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>왕국의 최고 장인</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 상인왕</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>상업의 로열티</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 타이쿤</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>상업 및 무역 석사</gradient>"
    guild_master:
      name: "<gradient:#ef4444:#f87171>💰 길드 마스터</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>상인 길드의 리더</gradient>"

# ============================================
# 현상금 청취자 메시지
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>당신의 머리에 현상금이 걸려 있습니다!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 현상금 가치:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 만료:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 의뢰인:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 현상금 획득! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc></gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 성공적으로 획득했습니다!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>당신의 몫:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>누군가</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>이(가)</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count%명의 플레이어</gradient> <gradient:#a855f7:#c084fc>가</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"

# ============================================
# 바운티 생성 메시지
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>에 대한 현상금이 성공적으로 생성되었습니다!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 현상금 처리 실패:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ 현상금 처리 중...</gradient>"

# ============================================
# 순위 진행 메시지
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ 랭크 진행 시작:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
