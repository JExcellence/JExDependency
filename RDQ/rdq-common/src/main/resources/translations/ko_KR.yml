    # 효과 트리거
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ 강화된 물약!</gradient> <gradient:#6b7280:#9ca3af>증폭된 효과</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ 포션 지속시간이 연장되었습니다!</gradient> <gradient:#6b7280:#9ca3af>더 오래 지속</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 물약이 저장되었습니다!</gradient> <gradient:#6b7280:#9ca3af>인벤토리로 반환됨</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 더 빠른 낚시 활성!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% 낚시 XP!</gradient>"

  # UI 요소
