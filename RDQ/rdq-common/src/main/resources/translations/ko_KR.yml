# RDQ Common 번역 파일 - 한국어
# MiniMessage 형식 (그라데이션 및 스타일 포함)
# 플레이스홀더는 %placeholder% 형식 사용

# 현상금 리스너 메시지
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>당신의 머리에 현상금이 걸려있습니다!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 현상금 액수:</gradient> <gradient:#10b981:#34d399>₩%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ 만료 시간:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 의뢰인:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 현상금 획득! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>당신은</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>의 현상금을 성공적으로 획득했습니다!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>당신의 몫:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>누군가</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient><gradient:#a855f7:#c084fc>가</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count%명의 플레이어</gradient><gradient:#a855f7:#c084fc>가</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>의 현상금을 획득했습니다!</gradient>"

# 현상금 생성 확인 메시지
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ 현상금이 성공적으로 생성되었습니다</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ 현상금 생성 실패:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# 현상금 개요 UI (메인 메뉴 및 개요)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 현상금 시스템</gradient>"
  
  # 메인 메뉴 버튼
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 현상금 생성</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 다른 플레이어에게</gradient>"
      - "<gradient:#6b7280:#9ca3af>새로운 현상금을 걸기</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 현상금 보기</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>모든 활성 현상금 보기</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 내 현상금</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>당신이 생성한 현상금 보기</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 순위표</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>최고의 현상금 사냥꾼들</gradient>"
  
  # 현상금 목록 항목
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>에 대한 현상금</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>대상:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>의뢰인:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>생성일:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>클릭하여 세부사항 보기</gradient>"

# 현상금 생성 UI
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 현상금 생성</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 대상 선택</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 현상금을 걸</gradient>"
      - "<gradient:#6b7280:#9ca3af>플레이어를 선택하기</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 보상 추가</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>클릭하여 아이템을</gradient>"
      - "<gradient:#6b7280:#9ca3af>보상으로 추가하기</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 먼저 대상을 선택하세요!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ 현상금 생성</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 선택한 보상으로</gradient>"
      - "<gradient:#6b7280:#9ca3af>현상금을 생성하기</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>에 대한 현상금이 성공적으로 생성되었습니다!</gradient>"

# 현상금 플레이어 정보 UI
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>에 대한 현상금</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>이 현상금의 대상</gradient>"
      - "<gradient:#6b7280:#9ca3af>클릭하여 플레이어 정보 보기</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 보상 보기</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 이 현상금을 획득할 때</gradient>"
      - "<gradient:#6b7280:#9ca3af>받을 수 있는 모든 보상 보기</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 현상금 삭제</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ 경고: 이 작업은</gradient>"
      - "<gradient:#ef4444:#f87171>되돌릴 수 없습니다!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>클릭하여 이 현상금을 삭제하기</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ </gradient><gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>에 대한 현상금이 삭제되었습니다!</gradient>"

# 현상금 보상 UI
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 현상금 보상</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 보상 없음</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>아이템을 추가하여 이 현상금의</gradient>"
      - "<gradient:#6b7280:#9ca3af>보상을 생성하세요</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ 아이템 추가</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>여기에 아이템을 놓아 보상으로 추가하세요</gradient>"
      - "<gradient:#6b7280:#9ca3af>우클릭으로 아이템 제거</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 대상: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>이 현상금은</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#6b7280:#9ca3af>에게 걸려있습니다</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 현상금 보상</gradient>"
      - "<gradient:#6b7280:#9ca3af>이 아이템은 현상금을</gradient>"
      - "<gradient:#6b7280:#9ca3af>획득한 사람에게 주어집니다</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ 새로운 아이템이 추가되지 않았습니다!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ 인벤토리가 가득 차서 일부 아이템이 떨어졌습니다!</gradient>"

# 접두사
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  ad
d_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 화폐 추가</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>클릭하여 현상금에</gradient>"
      - "<gradient:#6b7280:#9ca3af>화폐 보상을 추가하기</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ 먼저 대상을 선택하세요!</gradient>"

# 플랫폼 UI 구성요소
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# 페이지네이션
page:
  name: "<gradient:#6b7280:#9ca3af>📄 %current_page%페이지</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>현재 페이지:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>총 페이지:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 %direction% 페이지</gradient>"

