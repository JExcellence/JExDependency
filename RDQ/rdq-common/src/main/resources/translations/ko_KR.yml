    rewards:
      title: "<gold>보상 잠금 해제</gold>"
      no_rewards: "<gray>잠금 해제 보상 없음</gray>"
      no_rewards_lore: "<gray>이 특전에는 잠금 해제 보상이 없습니다.</gray>"
      type_label: "<gray>유형: <white>%type%</white></gray>"
      value_label: "<gray>값: <gold>%value%</gold></gray>"
    status:
      title: "<white>혜택 상태</white>"
