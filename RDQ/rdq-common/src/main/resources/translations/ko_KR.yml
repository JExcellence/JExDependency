        - <gray>퀘스트 세부정보를 보려면 클릭하세요.</gray>
      progress:
        name: <aqua>진행상황 보기</aqua>
        lore:
        - <gray>퀘스트 진행 상황을 보려면 클릭하세요.</gray>
        - ''
        - '<dark_gray>진전: <white>%progress%%</white></dark_gray>'
