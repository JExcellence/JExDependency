      - <gradient:#6b7280:#9ca3af>✦ 큰 압박을 받고 있는 아군을 회복시킵니다.</gradient>
      - <gradient:#10b981:#6ee7b7>➤ Tier II • 복원</gradient>
    priest:
      name: <gradient:#3b82f6:#93c5fd>✝ 신부</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 거룩한 규율로 파티를 인도합니다.</gradient>
      - <gradient:#3b82f6:#93c5fd>➤ Tier III • 소명을 선택하세요</gradient>
    bishop_divine:
      name: <gradient:#8b5cf6:#c4b5fd>⛪ 신성의 주교</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 채널은 복사 권한을 지시합니다.</gradient>
      - <gradient:#8b5cf6:#c4b5fd>➤ Tier IV • 디바인 브랜치</gradient>
    bishop_light:
      name: <gradient:#f59e0b:#fef08a>☀ 빛의 주교</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 신성한 광채로 부패를 눈멀게 합니다.</gradient>
      - <gradient:#f59e0b:#fef08a>➤ 4단계 • 라이트 브랜치</gradient>
    bishop_soul:
      name: <gradient:#06b6d4:#67e8f9>🕊 영혼의 주교</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 삶과 죽음의 문턱을 지킨다.</gradient>
      - <gradient:#06b6d4:#67e8f9>➤ Tier IV • 소울 브랜치</gradient>
    high_priest_divine:
      name: <gradient:#7c3aed:#ddd6fe>🌻 신성의 대제사장</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 혼돈의 중심에서 기적을 선포합니다.</gradient>
      - <gradient:#7c3aed:#ddd6fe>➤ 5단계 • 최종 순위</gradient>
    high_priest_light:
      name: <gradient:#f59e0b:#fef3c7>😘 빛의 대제사장</gradient>
      lore:
      - <gradient:#6b7280:#9ca3af>✦ 흔들리지 않는 새벽에 아군을 목욕시킵니다.</gradient>
