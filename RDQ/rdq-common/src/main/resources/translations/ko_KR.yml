      click_to_start: <green>이 퀘스트를 시작하려면 클릭하세요.</green>
      click_to_view: <yellow>퀘스트 세부정보를 보려면 클릭하세요.</yellow>
      click_to_abandon: <red>이 퀘스트를 포기하려면 클릭하세요.</red>
      already_completed: <green>이미 완료됨</green>
      requirements_not_met: <red>요구사항이 충족되지 않음</red>
      on_cooldown: '<red>쿨타임 시: %time%</red>'
      time_remaining: '<yellow>남은 시간: %time%</yellow>'
      repeatable: <aqua>반복 가능한 퀘스트</aqua>
      one_time: <gray>일회성 퀘스트</gray>
    progress:
      overall: <yellow>전반적인 진행 상황</yellow>
      percentage: '<gray>진전: <white>%progress%%</white></gray>'
      tasks_completed: '<gray>작업: <white>%completed%/%total%</white></gray>'
      time_elapsed: '<gray>경과 시간: <white>%time%</white></gray>'
      time_remaining: '<gray>남은 시간: <white>%time%</white></gray>'
    task:
      progress: '<gray>진전: <white>%current%/%required%</white></gray>'
      completed: <green>완전한</green>
      remaining: '<gray>남은 금액: <white>%remaining%</white></gray>'
      locked: <red>잠김</red>
      sequential: <yellow>이전 작업을 먼저 완료하세요.</yellow>
    rewards:
      header: <yellow>보상</yellow>
      currency: <gold>%amount% %currency%</gold>
      experience: <aqua>%amount% 경험</aqua>
      item: <white>%amount%엑스 %item%</white>
      perk: '<gradient:#a855f7:#c084fc>여과기: %perk%</gradient>'
      quest: '<gradient:#f59e0b:#fbbf24>탐구: %quest%</gradient>'
    requirements:
      header: <yellow>요구사항</yellow>
      level: <aqua>수준 %level%</aqua>
      currency: <gold>%amount% %currency%</gold>
      quest_completion: '<gradient:#f59e0b:#fbbf24>완벽한: %quest%</gradient>'
      rank: '<gradient:#a855f7:#c084fc>계급: %rank%</gradient>'
      permission: '<gray>허가: %permission%</gray>'
