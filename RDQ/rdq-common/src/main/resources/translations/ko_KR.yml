  fish_xp:
    name: "<gradient:#10b981:#34d399>낚시 XP 부스트</gradient>"
    description: "<gradient:#6b7280:#9ca3af>물고기를 잡으면 보너스 XP를 얻습니다</gradient>"

  # 물약 혜택
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>물약 증폭기</gradient>"
    description: "<gradient:#6b7280:#9ca3af>섭취 시 물약 효과를 강화할 확률</gradient>"
  potion_extend:
