# Tệp bản dịch RDQ - Tiếng Việt
# Định dạng MiniMessage với gradient và kiểu dáng
# Trình giữ chỗ dùng định dạng %placeholder%

# ============================================
# TIỀN TỐ TOÀN CỤC
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# CÁC KHÓA CẤP GỐC (dùng bởi các lệnh gọi I18n.Builder trực tiếp)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Không có phần thưởng</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Thêm vật phẩm để tạo phần thưởng</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Thêm vật phẩm</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Đặt vật phẩm vào đây để thêm làm phần thưởng</gradient>"
    - "<gradient:#6b7280:#9ca3af>Nhấp trái để đặt vật phẩm</gradient>"
    - "<gradient:#6b7280:#9ca3af>Nhấp phải để gỡ vật phẩm</gradient>"

# ============================================
# TÊN HIỂN THỊ VÀ MÔ TẢ CÂY CẤP BẬC
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Kiểm lâm</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Làm chủ nghệ thuật bắn cung và truy dấu</gradient>"
      - "<gradient:#6b7280:#9ca3af>Trở nên hòa làm một với thiên nhiên</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Chiến binh</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Làm chủ nghệ thuật chiến đấu</gradient>"
      - "<gradient:#6b7280:#9ca3af>Trở thành chiến binh huyền thoại</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Pháp sư</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vận dụng sức mạnh ma thuật</gradient>"
      - "<gradient:#6b7280:#9ca3af>Trở thành bậc thầy huyền thuật</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Đạo chích</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Làm chủ sự lén lút và mưu mẹo</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ra đòn từ trong bóng tối</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Giáo sĩ</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Triệu hồi sức mạnh thần thánh</gradient>"
      - "<gradient:#6b7280:#9ca3af>Chữa lành và bảo vệ đồng minh</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Thương nhân</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Làm chủ nghệ thuật giao thương</gradient>"
      - "<gradient:#6b7280:#9ca3af>Xây dựng tài sản của bạn</gradient>"

# ============================================
# TÊN HIỂN THỊ VÀ MÔ TẢ CẤP BẬC
# ============================================
rank:

  # ============================================
  # THÔNG BÁO CẤP BẬC
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 THĂNG HẠNG!</gradient> <gradient:#6b7280:#9ca3af>Bạn đã hoàn thành mọi yêu cầu cho</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Hãy dùng menu cấp bậc để nhận nâng cấp cấp bậc của bạn!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Chưa có cấp bậc</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Chọn một nhánh cấp bậc để bắt đầu</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Chưa có cấp bậc</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Cấp bậc mặc định</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chưa chọn cấp bậc nào</gradient>"
  # Các cấp bậc của cây Kiểm lâm
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Thợ săn</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Một người truy dấu mới học cách sinh tồn nơi hoang dã</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Cung thủ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Thuần thục với cung, chí mạng ở tầm xa</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Truy tung giả</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chuyên gia tìm kiếm và bám theo con mồi</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Xạ thủ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Thiện xạ với độ chính xác chết người</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Kẻ mở đường</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nhà thám hiểm bậc thầy của những miền đất chưa được khai phá</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Tay bắn tỉa</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Xạ thủ tinh nhuệ, một phát một mạng</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Chúa tể rừng xanh</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy nơi hoang dã, hòa làm một với thiên nhiên</gradient>"
  # Các cấp bậc của cây Chiến binh
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Tân binh</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Một chiến binh mới bắt đầu hành trình của mình</gradient>"
        - "<gradient:#6b7280:#9ca3af>Học những điều cơ bản của chiến đấu</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Chiến sĩ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Được rèn luyện trong nghệ thuật chiến đấu</gradient>"
        - "<gradient:#6b7280:#9ca3af>Sẵn sàng ra trận</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Cựu binh</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chiến binh dạn dày trận mạc</gradient>"
        - "<gradient:#6b7280:#9ca3af>Chọn con đường chuyên môn hóa của bạn</gradient>"
    # Nhánh chuyên môn 1: Cuồng chiến sĩ (Tấn công)
    berserker:
      name: "<gradient:#ef4444:#f87171>Cuồng chiến sĩ</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Con đường Cuồng Nộ</gradient>"
        - "<gradient:#6b7280:#9ca3af>Tung ra những đòn tấn công tàn khốc</gradient>"
        - "<gradient:#6b7280:#9ca3af>Đánh đổi phòng thủ lấy sức mạnh thuần túy</gradient>"
    # Nhánh chuyên môn 2: Hộ vệ (Phòng thủ)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Hộ vệ</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Con đường Bảo Hộ</gradient>"
        - "<gradient:#6b7280:#9ca3af>Trở thành lá chắn bất khả phá vỡ</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bảo vệ đồng minh bằng mọi giá</gradient>"
    # Nhánh chuyên môn 3: Đấu sĩ (Cân bằng)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Đấu sĩ</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Con đường Vinh Quang</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bậc thầy chiến đấu đấu trường</gradient>"
        - "<gradient:#6b7280:#9ca3af>Cân bằng giữa tấn công và phòng thủ</gradient>"
    # Các cấp bậc cuối
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Chiến chúa Cuồng Nộ</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Cuồng chiến sĩ tối thượng</gradient>"
        - "<gradient:#6b7280:#9ca3af>Sức mạnh hủy diệt không thể ngăn cản</gradient>"
        - "<gradient:#6b7280:#9ca3af>Hiện thân của nỗi sợ trên chiến trường</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Chiến chúa Khiên Thuẫn</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Hộ vệ tối thượng</gradient>"
        - "<gradient:#6b7280:#9ca3af>Vật thể bất động, người bảo hộ vĩnh cửu</gradient>"
        - "<gradient:#6b7280:#9ca3af>Không ai có thể vượt qua khi bạn còn đứng vững</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Chiến chúa Đấu Trường</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Đấu sĩ tối thượng</gradient>"
        - "<gradient:#6b7280:#9ca3af>Nhà vô địch của mọi nhà vô địch</gradient>"
        - "<gradient:#6b7280:#9ca3af>Huyền thoại của đấu trường</gradient>"
    # Các cấp bậc cũ (để tương thích ngược)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Hiệp sĩ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chiến binh danh dự của vương quốc</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Quán quân</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chiến binh huyền thoại, khiến tất cả khiếp sợ</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Chiến chúa</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy chiến tranh, chỉ huy các đạo quân</gradient>"
  # Các cấp bậc của cây Pháp sư
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Học việc</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Học những kiến thức ma thuật cơ bản</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Thành thạo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Đang lớn mạnh về sức mạnh ma thuật</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Phù thủy</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy huyền thuật</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Đại pháp sư</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy tối cao của mọi loại ma thuật</gradient>"
  # Các cấp bậc của cây Đạo chích
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Móc túi</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ngón tay nhanh, tẩu thoát còn nhanh hơn</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Trộm</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy lén lút và trộm cắp</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Trinh sát</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Đôi mắt và đôi tai của bóng tối</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Sát thủ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Kẻ giết người thầm lặng, cái chết từ bóng tối</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 Kẻ thâm nhập</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chuyên gia ra vào mà không bị phát hiện</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Kiếm ảnh</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chiến binh chết chóc của màn đêm</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Trùm gián điệp</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người điều hành các mạng lưới thông tin</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Bậc thầy Bóng Tối</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Hòa làm một với chính bóng tối</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Chúa tể Bóng Tối</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Đấng cai trị tối cao của mọi bóng tối</gradient>"
  # Các cấp bậc của cây Giáo sĩ
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Tập sự</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người hầu tận tâm của thần linh</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Tín đồ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người theo đuổi trung thành con đường thần thánh</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Linh mục</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người chữa lành và bảo hộ của tín hữu</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Người chữa lành</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy nghệ thuật hồi phục</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Giám mục</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người dẫn dắt tín hữu</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Nhà tiên tri</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người nhìn thấy khải tượng thần thánh</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Đại tư tế</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Tiếng nói tối cao của thần linh</gradient>"
  # Các cấp bậc của cây Thương nhân
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Người bán dạo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bán hàng hóa trên đường phố</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 Nhà buôn</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Thương nhân có chỗ đứng và nhiều mối quan hệ</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 Người bán hàng</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người bán hàng lão luyện</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 Nghệ nhân</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người chế tác hàng hóa tinh xảo</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰 Nhà giả kim</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy về thuốc và linh dược</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 Thương nhân</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Chủ doanh nghiệp thành công</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰 Đại nghệ nhân</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nghệ nhân tối cao của vương quốc</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 Ông hoàng thương mại</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Hoàng tộc của giới thương mại</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 Tài phiệt</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Bậc thầy thương mại và giao dịch</gradient>"
    guild_master:
      name: "<gradient:#ef4444:#f87171>💰 Hội chủ Thương hội</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Người đứng đầu thương hội</gradient>"

# ============================================
# THÔNG BÁO CỦA TRÌNH LẮNG NGHE TIỀN TRUY NÃ
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Bạn đang bị treo tiền truy nã!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Giá trị truy nã:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Hết hạn lúc:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Người treo thưởng:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 ĐÃ NHẬN TIỀN TRUY NÃ! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Bạn đã nhận thành công tiền truy nã của</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Phần của bạn:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Một ai đó</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>đã nhận tiền truy nã của</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% người chơi</gradient> <gradient:#a855f7:#c084fc>đã nhận tiền truy nã của</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# THÔNG BÁO TẠO TIỀN TRUY NÃ
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Đã tạo tiền truy nã thành công cho</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Không thể xử lý tiền truy nã:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Đang xử lý tiền truy nã...</gradient>"

# ============================================
# THÔNG BÁO TIẾN TRÌNH CẤP BẬC
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Đã bắt đầu tiến trình cho cấp bậc</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
