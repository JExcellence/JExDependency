# ============================================
perk:
  # Fishing Perks
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Faster Fishing</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Catch fish faster with improved fishing rates</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>Fishing XP Boost</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Gain bonus XP when catching fish</gradient>"
  
  # Potion Perks
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Potion Amplifier</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance to enhance potion effects when consumed</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Potion Duration</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance to extend potion duration when consumed</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Potion Refund</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance to get your potion back after drinking it</gradient>"
  
  # Perk Messages
  messages:
    # Unlock/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨ Perk Unlocked!</gradient> <gradient:#6b7280:#9ca3af>You've unlocked</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>Successfully unlocked and enabled perk:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Failed to unlock perk. Please try again.</gradient>"
      error: "<gradient:#ef4444:#f87171>An error occurred while unlocking the perk.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>You don't meet the requirements to unlock this perk!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Enabled perk:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Failed to enable perk:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>You've reached the maximum number of enabled perks (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Disabled perk:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Failed to disable perk:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
    
    # Cooldown
    cooldown:
      active: "<gradient:#ef4444:#f87171>This perk is on cooldown for</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
      ready: "<gradient:#10b981:#34d399>Perk is ready to use!</gradient>"
    
    # Effect Triggers
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ Potion Enhanced!</gradient> <gradient:#6b7280:#9ca3af>Effects amplified</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Potion Duration Extended!</gradient> <gradient:#6b7280:#9ca3af>Lasts longer</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Potion Saved!</gradient> <gradient:#6b7280:#9ca3af>Returned to inventory</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Faster Fishing Active!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% Fishing XP!</gradient>"
  
  # UI Elements
  ui:
    header:
      type_label: "<gray>Type: <white>%type%</white></gray>"
      category_label: "<gray>Category: <white>%category%</white></gray>"
    
    requirements:
      no_requirements: "<green>No Requirements</green>"
      no_requirements_lore: "<gray>This perk has no unlock requirements</gray>"
    
    rewards:
      title: "<gold>Unlock Reward</gold>"
      no_rewards: "<gray>No Unlock Rewards</gray>"
      no_rewards_lore: "<gray>This perk has no unlock rewards</gray>"
      type_label: "<gray>Type: <white>%type%</white></gray>"
      value_label: "<gray>Value: <gold>%value%</gold></gray>"
    
    status:
      title: "<white>Perk Status</white>"
      locked: "<red>✖ Locked</red>"
      locked_hint: "<gray>Complete requirements to unlock</gray>"
      active: "<green>✓ Active</green>"
      enabled: "<yellow>○ Enabled</yellow>"
      disabled: "<gray>○ Disabled</gray>"
      enabled_count: "<gray>Enabled Perks: <white>%count%/%max%</white></gray>"
      cooldown_label: "<gray>Cooldown: <gold>%time%</gold></gray>"
      activations_label: "<gray>Activations: <white>%count%</white></gray>"
    
    buttons:
      unlock:
