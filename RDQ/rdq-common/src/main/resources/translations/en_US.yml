              - "<gray>Increases crafting speed</gray>"
              - "<gray>Current bonus: +%effect%%</gray>"
              - ""
              - "<yellow>▶ Click to upgrade</yellow>"
          efficiency:
            name: "<gradient:#10b981:#34d399>✨ Efficiency Upgrade</gradient> <white>Level %level%/%max%</white>"
            lore:
              - "<gray>Reduces resource consumption</gray>"
              - "<gray>Current bonus: +%effect%%</gray>"
              - ""
              - "<yellow>▶ Click to upgrade</yellow>"
          fuel-reduction:
            name: "<gradient:#f59e0b:#fbbf24>⛽ Fuel Efficiency</gradient> <white>Level %level%/%max%</white>"
            lore:
              - "<gray>Reduces fuel consumption</gray>"
              - "<gray>Current reduction: -%effect%%</gray>"
              - ""
              - "<yellow>▶ Click to upgrade</yellow>"
          bonus-output:
            name: "<gradient:#10b981:#34d399>💎 Bonus Output</gradient> <white>Level %level%/%max%</white>"
            lore:
              - "<gray>Chance for extra output</gray>"
              - "<gray>Current chance: %effect%%</gray>"
              - ""
              - "<yellow>▶ Click to upgrade</yellow>"
      messages:
        upgrade-success: "<green>✓ Successfully upgraded %upgrade%</green>"
        upgrade-failed: "<red>Failed to upgrade %upgrade%</red>"
    
    recipe:
      title: "<gradient:#f59e0b:#fbbf24>📋 Recipe Configuration</gradient>"
      items:
        recipe-slot:
          locked:
            name: "<gradient:#10b981:#34d399>%item%</gradient>"
          empty:
            name: "<gray>Empty</gray>"
          configure:
            name: "<gradient:#3b82f6:#60a5fa>➕ Place Item</gradient>"
            lore:
              - "<gray>Place an item here to configure</gray>"
              - "<gray>the crafting recipe</gray>"
        set-recipe:
          name: "<gradient:#10b981:#34d399>✓ Set Recipe</gradient>"
          lore:
            - "<gray>Lock in the current recipe</gray>"
            - ""
            - "<yellow>▶ Click to confirm</yellow>"
        clear-recipe:
          name: "<gradient:#ef4444:#f87171>✗ Clear Recipe</gradient>"
          lore:
            - "<gray>Remove the current recipe</gray>"
            - ""
            - "<yellow>▶ Click to clear</yellow>"
        validation:
          name: "<gradient:#3b82f6:#60a5fa>ℹ Recipe Status</gradient>"
          lore:
            - "<gray>Recipe validation status</gray>"
    
    storage:
      title: "<gradient:#3b82f6:#60a5fa>📦 Machine Storage</gradient> <gray>Page %page%/%max_page%</gray>"
      items:
        storage-item:
          name: "<gradient:#f59e0b:#fbbf24>%item%</gradient> <white>x%quantity%</white>"
          lore:
            - "<gray>Stored: %quantity%</gray>"
            - ""
            - "<yellow>▶ Click to withdraw</yellow>"


# ============================================
# MACHINE SYSTEM
# ============================================
view:
  machine:
    # Trust View
    trust:
      title: "<gradient:#3b82f6:#60a5fa>🔒 Machine Trust</gradient>"
      items:
        owner:
          name: "<gradient:#f59e0b:#fbbf24>👑 Owner: %owner%</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>This machine is owned by %owner%</gradient>"
        trusted-player:
          name: "<gradient:#10b981:#34d399>✓ %player%</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Trusted player</gradient>"
          - "<gradient:#ef4444:#f87171>Click to remove</gradient>"
        empty-slot:
          name: "<gradient:#6b7280:#9ca3af>Empty Slot</gradient>"
        add-player:
          name: "<gradient:#10b981:#34d399>➕ Add Trusted Player</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Click to add a player</gradient>"
          - "<gradient:#6b7280:#9ca3af>Enter their name in the sign</gradient>"
      messages:
        invalid-player-name: "<gradient:#ef4444:#f87171>❌ Invalid player name!</gradient>"
        player-not-found: "<gradient:#ef4444:#f87171>❌ Player not found: %player%</gradient>"
        player-added: "<gradient:#10b981:#34d399>✓ Added %player% to trust list</gradient>"
        player-already-trusted: "<gradient:#f59e0b:#fbbf24>⚠ %player% is already trusted</gradient>"
        add-player-prompt: "<gradient:#3b82f6:#60a5fa>Enter player name in the sign</gradient>"
    
    # Storage View
    storage:
      title: "<gradient:#8b5cf6:#a78bfa>📦 Machine Storage - Page %page%/%max_page%</gradient>"
      items:
        storage-item:
          name: "<gradient:#10b981:#34d399>%item% x%quantity%</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Type: %type%</gradient>"
          - "<gradient:#6b7280:#9ca3af>Click to withdraw</gradient>"
        deposit:
          name: "<gradient:#10b981:#34d399>⬇ Deposit Item</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Hold an item and click</gradient>"
          - "<gradient:#6b7280:#9ca3af>to deposit it into storage</gradient>"
        filter:
          all:
            name: "<gradient:#6b7280:#9ca3af>📦 All Items</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Show all storage items</gradient>"
          input:
            name: "<gradient:#3b82f6:#60a5fa>⬇ Input Items</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Show input storage only</gradient>"
          output:
            name: "<gradient:#10b981:#34d399>⬆ Output Items</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Show output storage only</gradient>"
      messages:
        no-item-in-hand: "<gradient:#ef4444:#f87171>❌ Hold an item to deposit!</gradient>"
        item-deposited: "<gradient:#10b981:#34d399>✓ Deposited %amount%x %item%</gradient>"
        storage-full: "<gradient:#ef4444:#f87171>❌ Storage is full!</gradient>"
    
    # Recipe View
    recipe:
      title: "<gradient:#f59e0b:#fbbf24>📋 Machine Recipe</gradient>"
      items:
        recipe-slot:
          locked:
            name: "<gradient:#10b981:#34d399>🔒 %item%</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Recipe is locked</gradient>"
          empty:
            name: "<gradient:#6b7280:#9ca3af>Empty Slot</gradient>"
          configure:
            name: "<gradient:#3b82f6:#60a5fa>➕ Place Item</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Click with an item to place</gradient>"
            - "<gradient:#6b7280:#9ca3af>Click empty-handed to remove</gradient>"
          configured:
            name: "<gradient:#10b981:#34d399>%item%</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Click to remove</gradient>"
        set-recipe:
          name: "<gradient:#10b981:#34d399>✓ Set Recipe</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Lock in the current recipe</gradient>"
        clear-recipe:
          name: "<gradient:#ef4444:#f87171>✗ Clear Recipe</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Remove the current recipe</gradient>"
          - "<gradient:#f59e0b:#fbbf24>Machine must be OFF</gradient>"
        validation:
          valid:
            name: "<gradient:#10b981:#34d399>✓ Recipe Valid</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Recipe is set and ready</gradient>"
          pending:
            name: "<gradient:#f59e0b:#fbbf24>⚠ Configure Recipe</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Place items in the grid</gradient>"
            - "<gradient:#6b7280:#9ca3af>then click Set Recipe</gradient>"
      messages:
        recipe-already-set: "<gradient:#f59e0b:#fbbf24>⚠ Recipe is already set!</gradient>"
        recipe-empty: "<gradient:#ef4444:#f87171>❌ Place items in the grid first!</gradient>"
        recipe-set: "<gradient:#10b981:#34d399>✓ Recipe has been set!</gradient>"
        recipe-invalid: "<gradient:#ef4444:#f87171>❌ Invalid recipe configuration!</gradient>"
        no-recipe-to-clear: "<gradient:#f59e0b:#fbbf24>⚠ No recipe to clear!</gradient>"
        recipe-cleared: "<gradient:#10b981:#34d399>✓ Recipe has been cleared!</gradient>"
        recipe-clear-active: "<gradient:#ef4444:#f87171>❌ Turn off the machine first!</gradient>"
    
    # Upgrade View
    upgrade:
      title: "<gradient:#a855f7:#c084fc>⚡ Machine Upgrades</gradient>"
      items:
        upgrade:
          name: "<gradient:#10b981:#34d399>%type% Upgrade</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Level: %level%/%max_level%</gradient>"
          - "<gradient:#6b7280:#9ca3af>Effect: +%effect%%</gradient>"
          - "<gradient:#10b981:#34d399>Click to upgrade</gradient>"
        maxed:
          name: "<gradient:#f59e0b:#fbbf24>%type% Upgrade (MAX)</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Level: %level%/%max_level%</gradient>"
          - "<gradient:#6b7280:#9ca3af>Effect: +%effect%%</gradient>"
          - "<gradient:#10b981:#34d399>✓ Maxed out!</gradient>"
      messages:
        upgrade-applied: "<gradient:#10b981:#34d399>✓ Upgrade applied!</gradient>"
        upgrade-max: "<gradient:#f59e0b:#fbbf24>⚠ Upgrade is already maxed!</gradient>"
        upgrade-failed: "<gradient:#ef4444:#f87171>❌ Failed to apply upgrade!</gradient>"
    
    # Main View
    main:
      title: "<gradient:#3b82f6:#60a5fa>⚙ Machine Control</gradient>"
      items:
        status:
          name: "<gradient:#10b981:#34d399>Status: %status%</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Click to toggle</gradient>"
        storage:
          name: "<gradient:#8b5cf6:#a78bfa>📦 Storage</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Manage machine storage</gradient>"
        recipe:
          name: "<gradient:#f59e0b:#fbbf24>📋 Recipe</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Configure crafting recipe</gradient>"
        upgrades:
          name: "<gradient:#a855f7:#c084fc>⚡ Upgrades</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Manage machine upgrades</gradient>"
        trust:
          name: "<gradient:#3b82f6:#60a5fa>🔒 Trust</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Manage trusted players</gradient>"

    # Recipe View
    recipe:
      title: "<gradient:#f59e0b:#fbbf24>📋 Machine Recipe</gradient>"
      items:
        recipe-slot:
          configure:
            name: "<gradient:#6b7280:#9ca3af>Empty Slot</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Click with an item to place</gradient>"
            - "<gradient:#6b7280:#9ca3af>Right-click to remove</gradient>"
          locked:
            name: "<gradient:#10b981:#34d399>%item%</gradient>"
            lore:
            - "<gradient:#ef4444:#f87171>🔒 Recipe is locked</gradient>"
            - "<gradient:#6b7280:#9ca3af>Turn off machine to modify</gradient>"
          empty:
            name: "<gradient:#6b7280:#9ca3af>Empty Slot</gradient>"
        set-recipe:
          name: "<gradient:#10b981:#34d399>✅ Set Recipe</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Lock in the current recipe</gradient>"
          - "<gradient:#6b7280:#9ca3af>configuration</gradient>"
        clear-recipe:
          name: "<gradient:#ef4444:#f87171>🗑 Clear Recipe</gradient>"
          lore:
          - "<gradient:#6b7280:#9ca3af>Remove the current recipe</gradient>"
          - "<gradient:#f59e0b:#fbbf24>⚠ Machine must be OFF</gradient>"
        validation:
          valid:
            name: "<gradient:#10b981:#34d399>✅ Recipe Valid</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Recipe is configured</gradient>"
            - "<gradient:#6b7280:#9ca3af>and ready to use</gradient>"
          ready:
            name: "<gradient:#f59e0b:#fbbf24>⚠ Ready to Set</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Click 'Set Recipe' to</gradient>"
            - "<gradient:#6b7280:#9ca3af>lock in your configuration</gradient>"
          pending:
            name: "<gradient:#ef4444:#f87171>❌ No Recipe</gradient>"
            lore:
            - "<gradient:#6b7280:#9ca3af>Place items in the grid</gradient>"
            - "<gradient:#6b7280:#9ca3af>to configure a recipe</gradient>"
      messages:
        recipe-already-set: "<gradient:#f59e0b:#fbbf24>⚠ Recipe is already set!</gradient>"
        recipe-empty: "<gradient:#ef4444:#f87171>❌ Place items in the grid first!</gradient>"
        recipe-set: "<gradient:#10b981:#34d399>✅ Recipe has been set!</gradient>"
        recipe-invalid: "<gradient:#ef4444:#f87171>❌ Invalid recipe configuration!</gradient>"
        no-recipe-to-clear: "<gradient:#f59e0b:#fbbf24>⚠ No recipe to clear!</gradient>"
        recipe-cleared: "<gradient:#10b981:#34d399>✅ Recipe has been cleared!</gradient>"
        recipe-clear-active: "<gradient:#ef4444:#f87171>❌ Turn off the machine first!</gradient>"

        messages:
          structure-invalid: "<gradient:#ef4444:#f87171>❌ Invalid Structure!</gradient> <gradient:#6b7280:#9ca3af>%error%</gradient>"
          no-recipe: "<gradient:#f59e0b:#fbbf24>⚠ No Recipe Set!</gradient> <gradient:#6b7280:#9ca3af>Configure a recipe first</gradient>"
          no-fuel: "<gradient:#ef4444:#f87171>❌ No Fuel!</gradient> <gradient:#6b7280:#9ca3af>Add fuel to the machine</gradient>"
          state-on: "<gradient:#10b981:#34d399>✅ Machine Activated!</gradient>"
          state-off: "<gradient:#f59e0b:#fbbf24>⏸ Machine Deactivated</gradient>"
          toggle-failed: "<gradient:#ef4444:#f87171>❌ Failed to toggle machine state</gradient>"
          toggle-error: "<gradient:#ef4444:#f87171>❌ Error:</gradient> <gradient:#6b7280:#9ca3af>%error%</gradient>"

      # Main View
      main:
        title: "<gradient:#3b82f6:#60a5fa>⚙ Machine Control</gradient>"
        items:
          state:
            on:
              name: "<gradient:#10b981:#34d399>✓ Machine Active</gradient>"
              lore:
              - "<gray>The machine is currently running</gray>"
              - ""
              - "<yellow>▶ Click to turn OFF</yellow>"
            off:
              name: "<gradient:#ef4444:#f87171>✗ Machine Inactive</gradient>"
              lore:
              - "<gray>The machine is currently stopped</gray>"
              - ""
              - "<yellow>▶ Click to turn ON</yellow>"
          type:
            name: "<gradient:#3b82f6:#60a5fa>Machine Type:</gradient> <gradient:#f59e0b:#fbbf24>%type%</gradient>"
            lore:
            - "<gray>This is a %type% machine</gray>"
          fuel:
            name: "<gradient:#f59e0b:#fbbf24>⛽ Fuel Level:</gradient> <white>%current%</white>"
            lore:
            - "<gray>Current fuel: %current%</gray>"
            - ""
            - "<yellow>▶ Click to manage fuel</yellow>"
          recipe:
            set:
              name: "<gradient:#10b981:#34d399>✓ Recipe Configured</gradient>"
              lore:
              - "<gray>Recipe is set and ready</gray>"
              - ""
              - "<yellow>▶ Click to view/modify</yellow>"
            not-set:
              name: "<gradient:#ef4444:#f87171>✗ No Recipe</gradient>"
              lore:
              - "<gray>No recipe configured</gray>"
              - ""
              - "<yellow>▶ Click to configure</yellow>"
          navigation:
            storage:
              name: "<gradient:#3b82f6:#60a5fa>📦 Storage</gradient>"
              lore:
              - "<gray>View and manage machine storage</gray>"
              - ""
              - "<yellow>▶ Click to open</yellow>"
            trust:
              name: "<gradient:#a855f7:#c084fc>👥 Trusted Players</gradient>"
              lore:
              - "<gray>Manage who can access this machine</gray>"
              - "<gray>Trusted players: %count%</gray>"
              - ""
              - "<yellow>▶ Click to manage</yellow>"
            upgrades:
              name: "<gradient:#10b981:#34d399>⬆ Upgrades</gradient>"
              lore:
              - "<gray>View and apply machine upgrades</gray>"
              - ""
              - "<yellow>▶ Click to open</yellow>"

        output:
          name: "<gradient:#10b981:#34d399>➜ Output: %item% x%amount%</gradient>"
          lore:
          - "<gray>This is what the recipe will craft</gray>"
          none:
            name: "<gradient:#6b7280:#9ca3af>➜ No Output</gradient>"
            lore:
            - "<gray>Place items in the grid to see output</gray>"
