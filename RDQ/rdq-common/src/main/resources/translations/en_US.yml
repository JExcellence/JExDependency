# RDQ Common Translation File - English (US)
# MiniMessage format with gradients and styling
# Placeholders use %placeholder% format

# Bounty Listener Messages
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>You have an active bounty on your head!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Bounty Value:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expires at:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commissioned by:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 BOUNTY CLAIMED! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>You successfully claimed the bounty on</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Your share:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Someone</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>has claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% players</gradient> <gradient:#a855f7:#c084fc>have claimed the bounty on</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Bounty Creation Confirmation Messages
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Bounty successfully updated for</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Failed to process bounty:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Processing bounty update...</gradient>"

# Bounty Overview UI (Main Menu & Overview)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Bounty System</gradient>"
  
  # Main menu buttons
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Create Bounty</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to create a new bounty</gradient>"
      - "<gradient:#6b7280:#9ca3af>on another player</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 View Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View all active bounties</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 My Bounties</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>View bounties you've created</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Leaderboard</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top bounty hunters</gradient>"
  
  # Bounty list entries
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Bounty on</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Target:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Commissioner:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Created:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Click to view details</gradient>"

# Bounty Creation UI
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Create Bounty</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Select Target</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to choose a player</gradient>"
      - "<gradient:#6b7280:#9ca3af>to place a bounty on</gradient>"

# Add Items Button
add_items:
  name: "<gradient:#10b981:#34d399>💰 Add Item Rewards</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💰 Add Item Rewards</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Click to add item rewards</gradient>"
    - "<gradient:#6b7280:#9ca3af>Current items:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ Select a target first!</gradient>"
    - "<gradient:#6b7280:#9ca3af>You need to choose a player</gradient>"

# Add Currency Button  
add_currency:
  name: "<gradient:#f59e0b:#fbbf24>💎 Add Currency Rewards</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💎 Add Currency Rewards</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Click to add currency rewards</gradient>"
    - "<gradient:#6b7280:#9ca3af>Current currencies:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ Select a target first!</gradient>"
    - "<gradient:#6b7280:#9ca3af>You need to choose a player</gradient>"

# Confirm Bounty Button
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ Create Bounty</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Click to create the bounty</gradient>"
    - "<gradient:#6b7280:#9ca3af>with the selected rewards</gradient>"

# Select Target Button
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Select Target: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Click to choose a player</gradient>"
    - "<gradient:#6b7280:#9ca3af>to place a bounty on</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Current target: %target_name%</gradient>"

# Confirmation Messages
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ No player selected!</gradient> <gradient:#6b7280:#9ca3af>Please select a target first.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ No rewards added!</gradient> <gradient:#6b7280:#9ca3af>Please add some rewards first.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Creating bounty on</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Error:</gradient> <gradient:#6b7280:#9ca3af>Could not find target player %target_name%</gradient>"

# Item Refund Message
left_overs: "<gradient:#f59e0b:#fbbf24>📦 Items returned!</gradient> <gradient:#6b7280:#9ca3af>Some items were dropped on the ground.</gradient>"
    no_player_selected: "<gradient:#ef4444:#f87171>❌ Please select a target player first!</gradient>"
    no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Please add at least one reward!</gradient>"
    confirmation: "<gradient:#a855f7:#c084fc>Creating bounty on</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>...</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Bounty created successfully on</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Bounty Player Info UI
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Bounty on</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Target of this bounty</gradient>"
      - "<gradient:#6b7280:#9ca3af>Click to view player info</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 View Rewards</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to see all rewards</gradient>"
      - "<gradient:#6b7280:#9ca3af>for claiming this bounty</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Delete Bounty</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Warning: This action</gradient>"
      - "<gradient:#ef4444:#f87171>cannot be undone!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Click to delete this bounty</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Bounty on</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>has been deleted!</gradient>"

# Bounty Reward UI
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Bounty Rewards</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 No Rewards</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Add items to create rewards</gradient>"
      - "<gradient:#6b7280:#9ca3af>for this bounty</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Add Item</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Place items here to add as rewards</gradient>"
      - "<gradient:#6b7280:#9ca3af>Right-click to remove items</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Target: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>This bounty is placed on</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Bounty Reward</gradient>"
      - "<gradient:#6b7280:#9ca3af>This item will be given to</gradient>"
      - "<gradient:#6b7280:#9ca3af>whoever claims the bounty</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ No new items were added!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Some items were dropped as your inventory was full!</gradient>"

# Platform UI Components
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Pagination
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Page %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Current page:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Total pages:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Page %direction%</gradient>"

