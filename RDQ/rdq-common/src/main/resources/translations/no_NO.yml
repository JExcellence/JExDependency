# RDQ Oversettelsesfil - Norsk (Norge)
# MiniMessage format med gradienter og styling
# Plassholdere bruker %placeholder% format

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ingen Belønninger</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Legg til gjenstander for å opprette belønninger</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Legg til Gjenstand</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Plasser gjenstander her som belønninger</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kunsten å skyte med bue og spore</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Kriger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kampens kunst</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnytt magiens kraft</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Kjeltring</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre sniking og list</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Klerk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliser guddommelig kraft</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelsmann</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre handelens kunst</gradient>"

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv dusør på hodet ditt!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Dusørverdi:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Utløper:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Bestiller:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 DUSØR INNLØST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du har innløst dusøren på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Noen</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har innløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spillere</gradient> <gradient:#a855f7:#c084fc>har innløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Dusør opprettet for</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Feil ved behandling av dusør:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Behandler dusør...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progresjon startet for rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Viser krav for</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendige for</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% fullført)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendig:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har ingen krav!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Forhåndsvisningsmodus:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Du eier</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Låst:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Fullfør forutsetningene først</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms er ikke installert!</gradient> <gradient:#6b7280:#9ca3af>Denne funksjonen krever LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjelp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Åpne hovedmeny</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Vis ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Vis dusører</gradient>"

main_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎮 RaindropQuests</gradient>"
  admin_overview:
    name: "<gradient:#ef4444:#f87171>⚙ Admin Panel</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Tilgang til administrasjonsverktøy</gradient>"
      - "<gradient:#6b7280:#9ca3af>og konfigurasjonsalternativer</gradient>"
  bounty_overview:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Dusører</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis og administrer dusører</gradient>"
      - "<gradient:#6b7280:#9ca3af>Jakt på spillere for belønninger!</gradient>"
  perk_overview:
    name: "<gradient:#10b981:#34d399>✨ Fordeler</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis tilgjengelige fordeler</gradient>"
      - "<gradient:#6b7280:#9ca3af>og spesielle evner</gradient>"
  quest_overview:
    name: "<gradient:#3b82f6:#60a5fa>📜 Oppdrag</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis tilgjengelige oppdrag</gradient>"
      - "<gradient:#6b7280:#9ca3af>og spor fremgangen din</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis rangprogresjon</gradient>"
      - "<gradient:#6b7280:#9ca3af>og lås opp nye evner</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ Rangsystem</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 Rangtrær</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bla gjennom tilgjengelige rangtrær</gradient>"
      - "<gradient:#6b7280:#9ca3af>og velg din vei</gradient>"

head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Tilbake</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å gå tilbake</gradient>"
  proceed:
    name: "<gradient:#10b981:#34d399>➡️ Fortsett</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å fortsette</gradient>"
  previous:
    name: "<gradient:#3b82f6:#60a5fa>⬅️ Forrige</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Forrige side</gradient>"
  next:
    name: "<gradient:#3b82f6:#60a5fa>➡️ Neste</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Neste side</gradient>"
  up:
    name: "<gradient:#a855f7:#c084fc>⬆️ Opp</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Gå opp</gradient>"
  down:
    name: "<gradient:#a855f7:#c084fc>⬇️ Ned</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Gå ned</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Avbryt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Avbryt handling</gradient>"

error:
  premium_required: "<gradient:#ef4444:#f87171>❌ Premium Påkrevd!</gradient> <gradient:#6b7280:#9ca3af>Funksjonen</gradient> <gradient:#f59e0b:#fbbf24>%feature%</gradient> <gradient:#6b7280:#9ca3af>krever premium-versjonen.</gradient>"
  processing_failed: "<gradient:#ef4444:#f87171>❌ Behandling mislyktes:</gradient> <gradient:#6b7280:#9ca3af>%input%</gradient>"

abstract_anvil_ui:
  title: "<gradient:#a855f7:#c084fc>✏️ Skriv inn Verdi</gradient>"
  input:
    name: "<gradient:#f59e0b:#fbbf24>✏️ Skriv inn Verdi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Skriv inn over</gradient>"
      - "<gradient:#6b7280:#9ca3af>og klikk for å bekrefte</gradient>"
  error:
    processing_failed: "<gradient:#ef4444:#f87171>❌ Kunne ikke behandle input:</gradient> <gradient:#6b7280:#9ca3af>%input%</gradient>"

confirmation_ui:
  title: "<gradient:#a855f7:#c084fc>⚠️ Bekreft Handling</gradient>"
  confirm:
    name: "<gradient:#10b981:#34d399>✅ Bekreft</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å bekrefte</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Avbryt</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å avbryte</gradient>"

paginated_player_ui:
  title: "<gradient:#a855f7:#c084fc>👥 Velg Spiller</gradient>"
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

page:
  name: "<gradient:#6b7280:#9ca3af>📄 Side %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Nåværende side:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Totalt sider:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Side %direction%</gradient>"


# ============================================
# RANG KRAV DETALJ UI
# ============================================
rank_requirement_detail_ui:
  title: "<gradient:#a855f7:#c084fc>📋 Kravdetaljer</gradient>"
  back:
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å gå tilbake</gradient>"
  submit:
    missing_items: "<gradient:#ef4444:#f87171>❌ Du har ikke alle nødvendige gjenstander!</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Gjenstander sendt!</gradient>"
    failed: "<gradient:#ef4444:#f87171>❌ Sending mislyktes. Prøv igjen.</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ En feil oppstod under sending.</gradient>"
    already_completed: "<gradient:#f59e0b:#fbbf24>⚠ Dette kravet er allerede fullført!</gradient>"
  experience:
    current_level: "<gradient:#6b7280:#9ca3af>Ditt Nivå:</gradient> <gradient:#10b981:#34d399>%current%</gradient>"
    required_level: "<gradient:#6b7280:#9ca3af>Påkrevd Nivå:</gradient> <gradient:#f59e0b:#fbbf24>%required%</gradient>"
    levels_needed: "<gradient:#ef4444:#f87171>Manglende Nivåer:</gradient> <gradient:#f59e0b:#fbbf24>%needed%</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Nivåkrav oppfylt!</gradient>"
  playtime:
    current: "<gradient:#6b7280:#9ca3af>Din Spilletid:</gradient> <gradient:#10b981:#34d399>%hours%t %minutes%m</gradient>"
    required: "<gradient:#6b7280:#9ca3af>Påkrevd Spilletid:</gradient> <gradient:#f59e0b:#fbbf24>%hours%t %minutes%m</gradient>"
    remaining: "<gradient:#ef4444:#f87171>Gjenværende Tid:</gradient> <gradient:#f59e0b:#fbbf24>%hours%t %minutes%m</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Spilletidskrav oppfylt!</gradient>"
  summary:
    requirement_type: "<gradient:#6b7280:#9ca3af>Type:</gradient> <gradient:#f59e0b:#fbbf24>%type%</gradient>"
    progress_percentage: "<gradient:#3b82f6:#60a5fa>Fremgang:</gradient> <gradient:#10b981:#34d399>%completion_progress_percentage%</gradient>"
    completion_status: "<gradient:#6b7280:#9ca3af>Status:</gradient> <gradient:#f59e0b:#fbbf24>%completion_status%</gradient>"
    requirement_summary:
      name: "<gradient:#a855f7:#c084fc>📊 Kravsammendrag</gradient>"
    requirement_tip:
      name: "<gradient:#f59e0b:#fbbf24>💡 Tips</gradient>"
  requirement_tip:
    currency:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Tjen den nødvendige valutaen</gradient>"
    experience_level:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Få erfaringsnivåer</gradient>"
    playtime:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Spill på serveren</gradient>"
    other:
      - "<gradient:#f59e0b:#fbbf24>💡 Tips:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Fullfør kravet</gradient>"

# ============================================
# RANG KRAV REISE UI
# ============================================
rank_requirements_journey_ui:
  title: "<gradient:#a855f7:#c084fc>🗺 %rank_name% Krav</gradient>"
  rank_info:
    name: "<gradient:#f59e0b:#fbbf24>⚔ %rank_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Fullfør alle krav</gradient>"
      - "<gradient:#6b7280:#9ca3af>for å låse opp denne rangen</gradient>"
  overall_progress:
    name: "<gradient:#3b82f6:#60a5fa>📊 Total Fremgang</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Fremgang:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Fullført:</gradient> <gradient:#f59e0b:#fbbf24>%completed%/%total%</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Hent Rang</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klikk for å hente rangen!</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Låst</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Fullfør alle krav</gradient>"
        - "<gradient:#6b7280:#9ca3af>for å låse opp denne rangen</gradient>"
  messages:
    preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Forhåndsvisningsmodus - Handlinger deaktivert</gradient>"
    requirement_completed: "<gradient:#10b981:#34d399>✅ Krav fullført!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 Alle krav fullført! Du kan nå hente rangen!</gradient>"
    not_ready: "<gradient:#f59e0b:#fbbf24>⚠ Dette kravet er ikke klart til å fullføres ennå.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ Dette kravet er allerede fullført.</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🎉 Gratulerer! Du har fått rangen %rank_name%!</gradient>"
