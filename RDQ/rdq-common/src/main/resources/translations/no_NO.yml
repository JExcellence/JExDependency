# RDQ Oversettelsesfil - Norsk
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv dusør på hodet ditt!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Dusørverdi:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Utløper:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Bestiller:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 DUSØR HENTET! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du hentet dusøren på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Noen</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har hentet dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spillere</gradient> <gradient:#a855f7:#c084fc>har hentet dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Dusør opprettet for</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Feil ved behandling av dusør:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Oppdaterer dusør...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progresjon startet for rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Viser krav for</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendige for</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% fullført)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendig:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har ingen krav!</gradient>"

rank_click:
