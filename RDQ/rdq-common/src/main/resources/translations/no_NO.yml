# RDQ Oversettelsesfil - Norsk (Norge)
# MiniMessage format med gradienter og styling
# Plassholdere bruker %placeholder% format

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ingen Belønninger</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Legg til gjenstander for å opprette belønninger</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Legg til Gjenstand</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Plasser gjenstander her som belønninger</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kunsten å skyte med bue og spore</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Kriger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kampens kunst</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnytt magiens kraft</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Kjeltring</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre sniking og list</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Klerk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliser guddommelig kraft</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelsmann</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre handelens kunst</gradient>"

bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv dusør på hodet ditt!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Dusørverdi:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Utløper:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Bestiller:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 DUSØR INNLØST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du har innløst dusøren på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Noen</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har innløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spillere</gradient> <gradient:#a855f7:#c084fc>har innløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Dusør opprettet for</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Feil ved behandling av dusør:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Behandler dusør...</gradient>"

rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progresjon startet for rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Viser krav for</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendige for</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% fullført)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufullstendig:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har ingen krav!</gradient>"

rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Forhåndsvisningsmodus:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Du eier</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Låst:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Fullfør forutsetningene først</gradient>"

rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms er ikke installert!</gradient> <gradient:#6b7280:#9ca3af>Denne funksjonen krever LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjelp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Åpne hovedmeny</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Vis ranger</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Vis dusører</gradient>"

