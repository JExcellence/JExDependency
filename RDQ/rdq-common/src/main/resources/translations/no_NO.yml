    lore:
      - "<gradient:#6b7280:#9ca3af>Vis tilgjengelige fordeler</gradient>"
      - "<gradient:#6b7280:#9ca3af>og spesielle evner</gradient>"
  quest_overview:
    name: "<gradient:#3b82f6:#60a5fa>📜 Oppdrag</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis tilgjengelige oppdrag</gradient>"
      - "<gradient:#6b7280:#9ca3af>og spor fremgangen din</gradient>"
  rank_overview:
    name: "<gradient:#a855f7:#c084fc>⚔ Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vis rangprogresjon</gradient>"
      - "<gradient:#6b7280:#9ca3af>og lås opp nye evner</gradient>"

rank_main_ui:
  title: "<gradient:#a855f7:#c084fc>⚔ Rangsystem</gradient>"
  rank_tree:
    name: "<gradient:#f59e0b:#fbbf24>🌳 Rangtrær</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Bla gjennom tilgjengelige rangtrær</gradient>"
      - "<gradient:#6b7280:#9ca3af>og velg din vei</gradient>"

