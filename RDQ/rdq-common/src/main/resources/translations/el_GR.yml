# ΔΙΕΠΑΦΗ ΕΠΙΣΚΟΠΗΣΗΣ ΠΡΟΝΟΜΙΩΝ
# ============================================
perk_overview_ui:
  title: "<gradient:#a855f7:#c084fc>✨ Προνόμια</gradient>"

# ============================================
# ΔΙΕΠΑΦΗ ΛΕΠΤΟΜΕΡΕΙΩΝ ΠΡΟΝΟΜΙΟΥ
# ============================================
perk_detail_ui:
  title: "<gradient:#a855f7:#c084fc>✨ %perk_name%</gradient>"


# ============================================
# ΜΕΤΑΦΡΑΣΕΙΣ ΠΡΟΝΟΜΙΩΝ
# ============================================
perk:
  # Προνόμια Ψαρέματος
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Ταχύτερο Ψάρεμα</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Πιάστε ψάρια πιο γρήγορα με βελτιωμένα ποσοστά ψαρέματος</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>Ενίσχυση Εμπειρίας Ψαρέματος</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Κερδίστε μπόνους XP όταν πιάνετε ψάρια</gradient>"

  # Προνόμια Φίλτρων
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Ενίσχυση Φίλτρων</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Πιθανότητα να ενισχυθούν τα αποτελέσματα του φίλτρου όταν καταναλώνονται</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Διάρκεια Φίλτρων</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Πιθανότητα παράτασης της διάρκειας του φίλτρου όταν καταναλώνεται</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Επιστροφή Φίλτρου</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Ευκαιρία να πάρετε πίσω το φίλτρο σας αφού το πιείτε</gradient>"

  # Μηνύματα Προνομίων
  messages:
    # Ξεκλείδωμα/Ενεργοποίηση/Απενεργοποίηση
    unlock:
      notification: "<gradient:#10b981:#34d399>✨ Το προνόμιο ξεκλειδώθηκε!</gradient> <gradient:#6b7280:#9ca3af>Ξεκλείδωσες</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>Ξεκλειδώθηκε με επιτυχία και ενεργοποιήθηκε το προνόμιο:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Αποτυχία ξεκλειδώματος προνομίου. Δοκιμάστε ξανά.</gradient>"
      error: "<gradient:#ef4444:#f87171>Παρουσιάστηκε σφάλμα κατά το ξεκλείδωμα του προνομίου.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Δεν πληροίτε τις προϋποθέσεις για να ξεκλειδώσετε αυτό το προνόμιο!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Το προνόμιο ενεργοποιήθηκε:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Αποτυχία ενεργοποίησης προνομίου:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Έχετε συμπληρώσει τον μέγιστο αριθμό των ενεργοποιημένων προνομίων (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Το προνόμιο απενεργοποιήθηκε:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Αποτυχία απενεργοποίησης προνομίου:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"

    # Χρόνος Επαναφόρτισης
    cooldown:
      active: "<gradient:#ef4444:#f87171>Αυτό το προνόμιο βρίσκεται σε χρόνο επαναφόρτισης για</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
      ready: "<gradient:#10b981:#34d399>Το προνόμιο είναι έτοιμο για χρήση!</gradient>"

    # Ενεργοποιήσεις Εφέ
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ Ενισχυμένο φίλτρο!</gradient> <gradient:#6b7280:#9ca3af>Τα εφέ ενισχύθηκαν</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Η διάρκεια του φίλτρου παρατάθηκε!</gradient> <gradient:#6b7280:#9ca3af>Διαρκεί περισσότερο</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Το φίλτρο αποθηκεύτηκε!</gradient> <gradient:#6b7280:#9ca3af>Επιστράφηκε στο απόθεμα</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Το Ταχύτερο Ψάρεμα είναι ενεργό!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% Εμπειρία Ψαρέματος!</gradient>"

  # Στοιχεία Διεπαφής
  ui:
    header:
      type_label: "<gray>Τύπος: <white>%type%</white></gray>"
      category_label: "<gray>Κατηγορία: <white>%category%</white></gray>"
    requirements:
      no_requirements: "<green>Χωρίς Απαιτήσεις</green>"
      no_requirements_lore: "<gray>Αυτό το προνόμιο δεν έχει απαιτήσεις ξεκλειδώματος</gray>"
    rewards:
      title: "<gold>Ξεκλείδωμα Ανταμοιβής</gold>"
      no_rewards: "<gray>Χωρίς ανταμοιβές ξεκλειδώματος</gray>"
      no_rewards_lore: "<gray>Αυτό το προνόμιο δεν έχει ανταμοιβές ξεκλειδώματος</gray>"
      type_label: "<gray>Τύπος: <white>%type%</white></gray>"
      value_label: "<gray>Αξία: <gold>%value%</gold></gray>"
    status:
      title: "<white>Κατάσταση Προνομίου</white>"
      locked: "<red>✖ Κλειδωμένο</red>"
      locked_hint: "<gray>Ολοκληρώστε τις απαιτήσεις για ξεκλείδωμα</gray>"
      active: "<green>✓ Ενεργός</green>"
      enabled: "<yellow>○ Ενεργοποιημένο</yellow>"
      disabled: "<gray>○ Απενεργοποιημένο</gray>"
      enabled_count: "<gray>Ενεργοποιημένα προνόμια: <white>%count%/%max%</white></gray>"
      cooldown_label: "<gray>Επαναφόρτιση: <gold>%time%</gold></gray>"
      activations_label: "<gray>Ενεργοποιήσεις: <white>%count%</white></gray>"
    buttons:
      unlock:
        title: "<white>Ξεκλειδώστε το Προνόμιο</white>"
        hint: "<green>Κάντε κλικ για να ξεκλειδώσετε αυτό το προνόμιο!</green>"
      enable:
        title: "<white>Ενεργοποιήστε το Προνόμιο</white>"
        hint: "<green>Κάντε κλικ για να ενεργοποιήσετε αυτό το προνόμιο</green>"
        limit_reached: "<red>Συμπληρώθηκαν τα μέγιστα ενεργοποιημένα προνόμια</red>"
      disable:
        title: "<white>Απενεργοποιήστε το Προνόμιο</white>"
        hint: "<yellow>Κάντε κλικ για να απενεργοποιήσετε αυτό το προνόμιο</yellow>"

  # Υπάρχοντα προνόμια (για αναφορά - προσθέστε αν λείπουν)
  fly:
    name: "<gradient:#3b82f6:#60a5fa>Πτήση</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Αποκτήστε την ικανότητα να πετάτε</gradient>"
  glow:
    name: "<gradient:#f59e0b:#fbbf24>Λάμψη</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Εφαρμόστε ένα λαμπερό εφέ στον εαυτό σας</gradient>"
  haste:
    name: "<gradient:#10b981:#34d399>Βιασύνη</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Το δικό μου και σκάβω πιο γρήγορα</gradient>"
  jump_boost:
    name: "<gradient:#a855f7:#c084fc>Ενίσχυση Άλματος</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Πήδα ψηλότερα από το κανονικό</gradient>"
  keep_experience:
    name: "<gradient:#10b981:#34d399>Διατήρηση Εμπειρίας</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Κρατήστε το XP σας όταν πεθάνετε</gradient>"
  keep_inventory:
    name: "<gradient:#3b82f6:#60a5fa>Διατήρηση Αποθέματος</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Κρατήστε τα αντικείμενά σας όταν πεθάνετε</gradient>"
  night_vision:
    name: "<gradient:#f59e0b:#fbbf24>Νυχτερινή Όραση</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Δείτε καθαρά στο σκοτάδι</gradient>"
  no_fall_damage:
    name: "<gradient:#10b981:#34d399>Χωρίς Ζημιά από Πτώση</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Μην κάνετε ζημιά από πτώση</gradient>"
  resistance:
    name: "<gradient:#ef4444:#f87171>Αντοχή</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Πάρτε λιγότερη ζημιά από όλες τις πηγές</gradient>"
  saturation:
    name: "<gradient:#f59e0b:#fbbf24>Κορεσμός</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Μην πεινάς ποτέ</gradient>"
  speed:
    name: "<gradient:#3b82f6:#60a5fa>Ταχύτητα</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Κινηθείτε πιο γρήγορα από το κανονικό</gradient>"
  strength:
    name: "<gradient:#ef4444:#f87171>Δύναμη</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Προκαλέστε περισσότερη ζημιά στη μάχη</gradient>"
  fire_resistance:
    name: "<gradient:#ef4444:#f87171>Αντοχή στη Φωτιά</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Ανοσία στη φωτιά και τη λάβα</gradient>"
  double_experience:
    name: "<gradient:#a855f7:#c084fc>Διπλή Εμπειρία</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Αποκτήστε διπλά XP από όλες τις πηγές</gradient>"
  critical_strike:
    name: "<gradient:#ef4444:#f87171>Κρίσιμο Χτύπημα</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Ευκαιρία να προκληθεί κρίσιμη ζημιά</gradient>"
  combat_heal:
    name: "<gradient:#10b981:#34d399>Θεραπεία Μάχης</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Θεραπεύστε όταν προκαλείτε ζημιά σε εχθρούς</gradient>"
