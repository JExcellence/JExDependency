# Plik tłumaczeniowy RDQ — angielski (USA)
# Format MiniMessage z gradientami i stylizacją
# Symbole zastępcze używają formatu %placeholder%.

# ============================================
# GLOBALNY PREFIKS
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# KLUCZE POZIOMU ​​ROOT (używane przez bezpośrednie wywołania I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Brak Nagród</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Dodaj przedmioty, aby utworzyć nagrody</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Dodaj Przedmiot</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Umieść przedmioty tutaj jako nagrody</gradient>"
    - "<gradient:#6b7280:#9ca3af>Kliknij lewym przyciskiem myszy, aby umieścić element</gradient>"
    - "<gradient:#6b7280:#9ca3af>Kliknij prawym przyciskiem myszy, aby usunąć element</gradient>"

# ============================================
# NAZWY I OPISY WYŚWIETLANE W DRZEWIE RANKÓW
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Łowca</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj sztukę łucznictwa i tropienia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Stań się jednością z naturą</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Wojownik</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj sztukę walki</gradient>"
      - "<gradient:#6b7280:#9ca3af>Zostań legendarnym wojownikiem</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mag</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Wykorzystaj moc magii</gradient>"
      - "<gradient:#6b7280:#9ca3af>Zostań mistrzem tajemnic</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Łotrzyk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj skradanie i przebiegłość</gradient>"
      - "<gradient:#6b7280:#9ca3af>Wyjdź z cienia</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Kleryk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalizuj boską moc</gradient>"
      - "<gradient:#6b7280:#9ca3af>Uzdrawiaj i chroń swoich sojuszników</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Kupiec</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj sztukę handlu</gradient>"
      - "<gradient:#6b7280:#9ca3af>Zbuduj swoją fortunę</gradient>"

# ============================================
# WYŚWIETLANE NAZWY I OPISY RANK
# ============================================
rank:

  # ============================================
  # WIADOMOŚCI RANKOWE
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 Awansuj!</gradient> <gradient:#6b7280:#9ca3af>Spełniłeś wszystkie wymagania dotyczące</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Użyj menu rangi, aby ubiegać się o podwyższenie rangi!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Nierankingowe</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Aby rozpocząć, wybierz ścieżkę rangi</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Nierankingowe</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Domyślna ranga</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nie wybrano rangi</gradient>"
  # Rangi Drzewa Strażników
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Łowca</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Początkujący tropiciel poznający zwyczaje dzikiej przyrody</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Łucznik</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Biegły w posługiwaniu się łukiem, zabójczy na dystansie</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Śledzenie</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ekspert w znajdowaniu i podążaniu za zdobyczą</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Strzelec wyborowy</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Precyzyjny strzelec z zabójczą celnością</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Pionier</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistrz eksploracji niezbadanych krain</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Snajper</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Elitarny strzelec wyborowy, jeden strzał, jedno zabójstwo</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Władca Lasu</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Władca dziczy, zjednoczony z naturą</gradient>"
  # Rangi Drzewa Wojowników
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Rekrut</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nowy wojownik rozpoczynający swoją podróż</gradient>"
        - "<gradient:#6b7280:#9ca3af>Naucz się podstaw walki</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Żołnierz</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Wyszkolony w sztuce walki</gradient>"
        - "<gradient:#6b7280:#9ca3af>Gotowy do bitwy</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Weteran</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Zaprawiony w boju wojownik</gradient>"
        - "<gradient:#6b7280:#9ca3af>Wybierz swoją ścieżkę specjalizacji</gradient>"
    # Gałąź specjalizacji 1: Berserker (ofensywa)
