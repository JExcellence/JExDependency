# INTERFEJS PODRÓŻY WYMAGAŃ RANGI
# ============================================
rank_requirements_journey_ui:
  title: "<gradient:#a855f7:#c084fc>🗺 Wymagania %rank_name%</gradient>"
  rank_info:
    name: "<gradient:#f59e0b:#fbbf24>⚔ %rank_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ukończ wszystkie wymagania</gradient>"
      - "<gradient:#6b7280:#9ca3af>aby odblokować tę rangę</gradient>"
  overall_progress:
    name: "<gradient:#3b82f6:#60a5fa>📊 Ogólny Postęp</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Postęp:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ukończone:</gradient> <gradient:#f59e0b:#fbbf24>%completed%/%total%</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Odbierz Rangę</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kliknij aby odebrać rangę!</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Zablokowane</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ukończ wszystkie wymagania</gradient>"
        - "<gradient:#6b7280:#9ca3af>aby odblokować tę rangę</gradient>"
  messages:
    preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Tryb Podglądu - Akcje wyłączone</gradient>"
    requirement_completed: "<gradient:#10b981:#34d399>✅ Wymaganie ukończone!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 Wszystkie wymagania ukończone! Możesz teraz odebrać rangę!</gradient>"
    not_ready: "<gradient:#f59e0b:#fbbf24>⚠ To wymaganie nie jest jeszcze gotowe do ukończenia.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ To wymaganie zostało już ukończone.</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🎉 Gratulacje! Otrzymałeś rangę %rank_name%!</gradient>"
