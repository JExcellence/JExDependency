# RDQ Plik Tłumaczenia - Polski (Polska)
# Format MiniMessage z gradientami i stylizacją
# Symbole zastępcze używają formatu %placeholder%

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Brak Nagród</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Dodaj przedmioty, aby utworzyć nagrody</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Dodaj Przedmiot</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Umieść przedmioty tutaj jako nagrody</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Łowca</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj sztukę łucznictwa i tropienia</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Wojownik</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj sztukę walki</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mag</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Wykorzystaj moc magii</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Łotrzyk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Opanuj skradanie i przebiegłość</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Kleryk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalizuj boską moc</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Kupiec</gradient>"
