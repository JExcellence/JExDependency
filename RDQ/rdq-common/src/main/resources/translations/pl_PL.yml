  no_restrictions: "<gradient:#10b981:#34d399>✅ Premia:</gradient> <gradient:#6b7280:#9ca3af>Nie obowiązują żadne ograniczenia.</gradient>"
  indicator:
    name: "<gradient:#a855f7:#c084fc>⭐ Wersja premium</gradient>"
    lore:
      - "<gradient:#10b981:#34d399>Wszystkie funkcje odblokowane!</gradient>"

# ============================================
# WIDOK SZCZEGÓŁOWY POZYCJI WYMAGANIA (uproszczony)
# ============================================
rank_requirement_item_detail_ui:
  title: "<gradient:#f59e0b:#fbbf24>📦 Wymagania dotyczące przedmiotu</gradient>"
  item:
    have: "<gradient:#10b981:#34d399>✓ Masz ten przedmiot</gradient>"
    missing: "<gradient:#ef4444:#f87171>✗ Brakujący element</gradient>"
    progress: "<gradient:#6b7280:#9ca3af>%current%/%required%</gradient>"
  submit_button:
    enabled:
      name: "<gradient:#10b981:#34d399>📥 Prześlij przedmioty</gradient>"
      lore:
        - ""
        - "<gradient:#10b981:#34d399>Wszystkie elementy gotowe!</gradient>"
        - ""
        - "<gradient:#f59e0b:#fbbf24>▶ Kliknij, aby przesłać</gradient>"
    disabled:
      name: "<gradient:#6b7280:#9ca3af>📥 Prześlij przedmioty</gradient>"
      lore:
        - ""
        - "<gradient:#ef4444:#f87171>Brakuje wymaganych elementów</gradient>"
        - ""
        - "<gradient:#6b7280:#9ca3af>Najpierw zbierz wszystkie przedmioty</gradient>"
  back:
    name: "<gradient:#ef4444:#f87171>← Powrót</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Wróć do wymagań</gradient>"


# ============================================
# TŁUMACZENIA NAGRODY
# ============================================
rank_requirements_journey_ui:

  # ============================================
  # WYMAGANIA RANGI WIDOK PODRÓŻY
  # ============================================
  title: "<gradient:#a855f7:#c084fc>🗺 Wymagania %rank_name%</gradient>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  overall_progress:
    name: "<gradient:#a855f7:#c084fc>📊 Postęp ogólny</gradient>"
    lore:
      - ""
      - "<gradient:#6b7280:#9ca3af>Ukończenie:</gradient> <gradient:#f59e0b:#fbbf24>%percentage%%</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Wymagania:</gradient> <gradient:#10b981:#34d399>%completed%</gradient><gradient:#6b7280:#9ca3af>/</gradient><gradient:#f59e0b:#fbbf24>%total%</gradient>"
  rank_info:
    name: "<gradient:#a855f7:#c084fc>⚔ %rank_name%</gradient>"
    lore:
      - ""
      - "<gradient:#6b7280:#9ca3af>Ukończ wszystkie wymagania</gradient>"
      - "<gradient:#6b7280:#9ca3af>aby odblokować tę rangę!</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Odbierz Rangę</gradient>"
    lore:
      - ""
      - "<gradient:#10b981:#34d399>Wszystkie wymagania spełnione!</gradient>"
      - ""
      - "<gradient:#f59e0b:#fbbf24>▶ Kliknij, aby odebrać swoją rangę</gradient>"
    hidden:
      name: "<gradient:#6b7280:#9ca3af>🔒 Ranga zablokowana</gradient>"
      lore:
        - ""
        - "<gradient:#6b7280:#9ca3af>Spełnij wszystkie wymagania</gradient>"
        - "<gradient:#6b7280:#9ca3af>aby odblokować tę rangę.</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Zablokowane</gradient>"
      lore:
        - ""
        - "<gradient:#6b7280:#9ca3af>Ukończ wszystkie wymagania</gradient>"
        - "<gradient:#6b7280:#9ca3af>aby odblokować tę rangę.</gradient>"
  requirement_card:
    name: "<gradient:#f59e0b:#fbbf24>%name%</gradient>"
    progress_bar: "%bar% <gradient:#6b7280:#9ca3af>%percentage%%</gradient>"
  connection:
    incomplete: " "
    complete: " "
  back:
    name: "<gradient:#ef4444:#f87171>← Powrót</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Wróć do przeglądu rang</gradient>"
  messages:
    requirement_completed: "<gradient:#10b981:#34d399>✅ Wymaganie ukończone!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 Wszystkie wymagania ukończone! Możesz teraz odebrać rangę!</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🏆 Gratulacje! Osiągnąłeś rangę:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
    not_ready: "<gradient:#ef4444:#f87171>❌ To wymaganie nie jest jeszcze gotowe do ukończenia.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ To wymaganie zostało już ukończone.</gradient>"
    preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Tryb Podglądu - Akcje wyłączone</gradient>"

  reward:
    card:
      name: "<gradient:#fbbf24:#fcd34d>%type%</gradient>"
      compact_name: "<gradient:#fbbf24:#fcd34d>%type%</gradient>"
      no_rewards: "<gradient:#6b7280:#9ca3af>Brak nagród</gradient>"
      no_rewards_lore:
        - "<gradient:#6b7280:#9ca3af>Dla tej rangi nie skonfigurowano żadnych nagród</gradient>"
      type_label: "<gray>Typ:</gray> <yellow>%type%</yellow>"
      value_label: "<gray>Wartość:</gray> <gold>%value%</gold>"
    
    # Opisy typów nagród
    currency:
      description: "<gradient:#fbbf24:#fcd34d>Otrzymuj nagrody walutowe</gradient>"
    item:
      description: "<gradient:#10b981:#34d399>Otrzymuj nagrody za przedmioty</gradient>"
    experience:
      description: "<gradient:#a855f7:#c084fc>Otrzymuj punkty doświadczenia</gradient>"
    command:
      description: "<gradient:#ef4444:#f87171>Wykonuj specjalne polecenia</gradient>"
    composite:
      description: "<gradient:#3b82f6:#60a5fa>Łącznie wiele nagród</gradient>"
    choice:
      description: "<gradient:#ec4899:#f472b6>Wybieraj spośród wielu nagród</gradient>"
    permission:
      description: "<gradient:#8b5cf6:#a78bfa>Zdobądź specjalne uprawnienia</gradient>"
    teleport:
      description: "<gradient:#06b6d4:#22d3ee>Teleportuj się do lokalizacji</gradient>"
    particle:
      description: "<gradient:#f97316:#fb923c>Odblokuj efekty cząsteczkowe</gradient>"
    vanishing_chest:
      description: "<gradient:#14b8a6:#2dd4bf>Zdobądź znikającą skrzynię</gradient>"
    
    more: "<gradient:#fbbf24:#fcd34d>+%count% więcej nagród...</gradient>"

  rewards:
    view_all:
      name: "<gradient:#a855f7:#c084fc>📋 Zobacz wszystkie nagrody</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Kliknij, żeby zobaczyć wszystko %count% nagrody</gradient>"
        - "<gradient:#6b7280:#9ca3af>szczegółowo dla tej rangi</gradient>"
      coming_soon: "<gradient:#fbbf24:#fcd34d>Szczegółowy widok nagród już wkrótce!</gradient>"
      empty:
        name: "<gradient:#6b7280:#9ca3af>📋 Brak nagród</gradient>"
        lore:
          - "<gradient:#6b7280:#9ca3af>Ta ranga nie wiąże się z żadnymi nagrodami</gradient>"
        message: "<gradient:#6b7280:#9ca3af>Dla tej rangi nie skonfigurowano żadnych nagród.</gradient>"
    label: "<gradient:#fbbf24:#fcd34d>🎁 Nagrody za rangę</gradient>"
    label_lore:
      - "<gradient:#6b7280:#9ca3af>Otrzymasz %count% nagrody</gradient>"
      - "<gradient:#6b7280:#9ca3af>kiedy zdobędziesz tę rangę</gradient>"

