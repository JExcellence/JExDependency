      name: "<gradient:#a855f7:#c084fc>Gladiator</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ścieżka Chwały</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mistrz walki na arenie</gradient>"
        - "<gradient:#6b7280:#9ca3af>Zrównoważyć atak i obronę</gradient>"
    # Końcowe stopnie
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Władca Furii</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ostateczny Berserker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Niepowstrzymana siła zniszczenia</gradient>"
        - "<gradient:#6b7280:#9ca3af>Strach wcielony na polu bitwy</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Władca Tarczy</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ostateczny Strażnik</gradient>"
        - "<gradient:#6b7280:#9ca3af>Obiekt nieruchomy, wieczny obrońca</gradient>"
        - "<gradient:#6b7280:#9ca3af>Nikt nie przejdzie, gdy będziesz stać</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Władca Areny</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ostateczny Gladiator</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mistrz mistrzów</gradient>"
        - "<gradient:#6b7280:#9ca3af>Legenda areny</gradient>"
    # Starsze rangi (dla kompatybilności wstecznej)
