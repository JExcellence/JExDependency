      error: "<gradient:#ef4444:#f87171>Wystąpił błąd podczas odblokowywania bonusu.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Nie spełniasz wymagań, aby odblokować ten bonus!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Włączony atut:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Nie udało się włączyć bonusu:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
