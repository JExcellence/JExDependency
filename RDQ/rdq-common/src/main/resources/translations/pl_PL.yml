      name: "<gradient:#3b82f6:#60a5fa>Opiekun</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ścieżka Ochrony</gradient>"
        - "<gradient:#6b7280:#9ca3af>Stań się niezniszczalną tarczą</gradient>"
        - "<gradient:#6b7280:#9ca3af>Chroń swoich sojuszników za wszelką cenę</gradient>"
    # Gałąź specjalizacji 3: Gladiator (zrównoważona)
