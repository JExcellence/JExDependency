    required: "<gradient:#6b7280:#9ca3af>Wymagany Czas Gry:</gradient> <gradient:#f59e0b:#fbbf24>%hours%g %minutes%m</gradient>"
    remaining: "<gradient:#ef4444:#f87171>Pozostały Czas:</gradient> <gradient:#f59e0b:#fbbf24>%hours%g %minutes%m</gradient>"
    completed: "<gradient:#10b981:#34d399>✅ Wymaganie czasu gry spełnione!</gradient>"
  summary:
    requirement_type: "<gradient:#6b7280:#9ca3af>Typ:</gradient> <gradient:#f59e0b:#fbbf24>%type%</gradient>"
    progress_percentage: "<gradient:#3b82f6:#60a5fa>Postęp:</gradient> <gradient:#10b981:#34d399>%completion_progress_percentage%</gradient>"
    completion_status: "<gradient:#6b7280:#9ca3af>Status:</gradient> <gradient:#f59e0b:#fbbf24>%completion_status%</gradient>"
    requirement_summary:
      name: "<gradient:#a855f7:#c084fc>📊 Podsumowanie Wymagania</gradient>"
    requirement_tip:
      name: "<gradient:#f59e0b:#fbbf24>💡 Wskazówki</gradient>"
  requirement_tip:
    currency:
      - "<gradient:#f59e0b:#fbbf24>💡 Wskazówka:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Zdobądź wymaganą walutę</gradient>"
    experience_level:
      - "<gradient:#f59e0b:#fbbf24>💡 Wskazówka:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Zdobądź poziomy doświadczenia</gradient>"
    playtime:
      - "<gradient:#f59e0b:#fbbf24>💡 Wskazówka:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Graj na serwerze</gradient>"
    other:
      - "<gradient:#f59e0b:#fbbf24>💡 Wskazówka:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ukończ wymaganie</gradient>"

