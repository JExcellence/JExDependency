      name: "<gradient:#f59e0b:#fbbf24>Rycerz</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Honorowy wojownik królestwa</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Mistrz</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendarny wojownik, którego wszyscy się boją</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Dygnitarz wojskowy</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mistrz wojny, dowódca armii</gradient>"
  # Rangi Drzewa Magów
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Praktykant</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nauka podstaw magii</gradient>"
