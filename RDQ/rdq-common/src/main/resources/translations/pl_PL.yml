perk_overview_ui:
  title: "<gradient:#a855f7:#c084fc>✨ Korzyści</gradient>"

# ============================================
# Interfejs użytkownika SZCZEGÓŁÓW PRODUKTÓW
# ============================================
perk_detail_ui:
  title: "<gradient:#a855f7:#c084fc>✨ %perk_name%</gradient>"


# ============================================
# TŁUMACZENIA PERKU
# ============================================
perk:
  # Korzyści z wędkowania
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Szybsze łowienie</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Łap ryby szybciej dzięki ulepszonym wskaźnikom połowów</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>Zwiększenie PD wędkarstwa</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zdobądź dodatkowe PD podczas łowienia ryb</gradient>"
  
  # Korzyści z eliksirów
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Wzmacniacz eliksirów</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Szansa na wzmocnienie efektów mikstury po spożyciu</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Czas trwania eliksiru</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Szansa na wydłużenie czasu działania mikstury po spożyciu</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Zwrot eliksirów</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Szansa na odzyskanie eliksiru po jego wypiciu</gradient>"
  
  # Wiadomości o korzyściach
  messages:
    # Odblokuj/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨ Profit odblokowany!</gradient> <gradient:#6b7280:#9ca3af>Odblokowałeś</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>Pomyślnie odblokowano i włączono zaletę:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Nie udało się odblokować bonusu. Spróbuj ponownie.</gradient>"
      error: "<gradient:#ef4444:#f87171>Wystąpił błąd podczas odblokowywania bonusu.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Nie spełniasz wymagań, aby odblokować ten bonus!</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Włączony atut:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Nie udało się włączyć bonusu:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Osiągnąłeś maksymalną liczbę włączonych korzyści (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Wyłączony atut:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Nie udało się wyłączyć bonusu:</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
    
    # Czas odnowienia
    cooldown:
      active: "<gradient:#ef4444:#f87171>Ten atut ma czas odnowienia</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
      ready: "<gradient:#10b981:#34d399>Perk jest gotowy do użycia!</gradient>"
    
    # Wyzwalacze efektów
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨ Ulepszona mikstura!</gradient> <gradient:#6b7280:#9ca3af>Efekty wzmocnione</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Wydłużony czas trwania mikstury!</gradient> <gradient:#6b7280:#9ca3af>Trwa dłużej</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Eliksir zapisany!</gradient> <gradient:#6b7280:#9ca3af>Wrócił do inwentarza</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Szybsze wędkowanie aktywne!</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% Wędkarstwo XP!</gradient>"
  
  # Elementy interfejsu użytkownika
  ui:
    header:
      type_label: "<gray>Typ: <white>%type%</white></gray>"
      category_label: "<gray>Kategoria: <white>%category%</white></gray>"
    
    requirements:
      no_requirements: "<green>Brak wymagań</green>"
      no_requirements_lore: "<gray>Ten atut nie wymaga odblokowania</gray>"
    
    rewards:
      title: "<gold>Odblokuj nagrodę</gold>"
      no_rewards: "<gray>Brak nagród za odblokowanie</gray>"
      no_rewards_lore: "<gray>Ten atut nie umożliwia odblokowania nagród</gray>"
      type_label: "<gray>Typ: <white>%type%</white></gray>"
      value_label: "<gray>Wartość: <gold>%value%</gold></gray>"
    
    status:
      title: "<white>Stan korzyści</white>"
      locked: "<red>✖ Zablokowane</red>"
      locked_hint: "<gray>Spełnij wymagania, aby odblokować</gray>"
      active: "<green>✓ Aktywny</green>"
      enabled: "<yellow>○ Włączone</yellow>"
      disabled: "<gray>○ Niepełnosprawni</gray>"
      enabled_count: "<gray>Włączone korzyści: <white>%count%/%max%</white></gray>"
      cooldown_label: "<gray>Czas odnowienia: <gold>%time%</gold></gray>"
      activations_label: "<gray>Aktywacje: <white>%count%</white></gray>"
    
    buttons:
      unlock:
        title: "<white>Odblokuj korzyść</white>"
        hint: "<green>Kliknij, aby odblokować tę zaletę!</green>"
      enable:
        title: "<white>Włącz korzyść</white>"
        hint: "<green>Kliknij, aby włączyć tę zaletę</green>"
        limit_reached: "<red>Osiągnięto maksymalną liczbę włączonych korzyści</red>"
      disable:
        title: "<white>Wyłącz korzyść</white>"
        hint: "<yellow>Kliknij, aby wyłączyć tę zaletę</yellow>"
  
  # Istniejące korzyści (w celach informacyjnych – dodaj, jeśli ich brakuje)
  fly:
    name: "<gradient:#3b82f6:#60a5fa>Lot</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zdobądź umiejętność latania</gradient>"
  glow:
    name: "<gradient:#f59e0b:#fbbf24>Blask</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zastosuj dla siebie efekt blasku</gradient>"
  haste:
    name: "<gradient:#10b981:#34d399>Pośpiech</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Kop i kop szybciej</gradient>"
  jump_boost:
    name: "<gradient:#a855f7:#c084fc>Zwiększenie skoku</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Skacz wyżej niż normalnie</gradient>"
  keep_experience:
    name: "<gradient:#10b981:#34d399>Zachowaj doświadczenie</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zachowaj swoje XP, gdy umrzesz</gradient>"
  keep_inventory:
    name: "<gradient:#3b82f6:#60a5fa>Zachowaj zapasy</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zachowaj swoje przedmioty, gdy umrzesz</gradient>"
  night_vision:
    name: "<gradient:#f59e0b:#fbbf24>Nocna wizja</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Widzieć wyraźnie w ciemności</gradient>"
  no_fall_damage:
    name: "<gradient:#10b981:#34d399>Brak uszkodzeń spowodowanych upadkiem</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Nie odniesiesz obrażeń od upadku</gradient>"
  resistance:
    name: "<gradient:#ef4444:#f87171>Opór</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Otrzymujesz mniej obrażeń ze wszystkich źródeł</gradient>"
  saturation:
    name: "<gradient:#f59e0b:#fbbf24>Nasycenie</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Nigdy nie bądź głodny</gradient>"
  speed:
    name: "<gradient:#3b82f6:#60a5fa>Prędkość</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Poruszaj się szybciej niż zwykle</gradient>"
  strength:
    name: "<gradient:#ef4444:#f87171>Wytrzymałość</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zadawaj większe obrażenia w walce</gradient>"
  fire_resistance:
    name: "<gradient:#ef4444:#f87171>Odporność na ogień</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Odporność na obrażenia od ognia i lawy</gradient>"
  double_experience:
    name: "<gradient:#a855f7:#c084fc>Podwójne doświadczenie</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Zdobądź podwójne PD ze wszystkich źródeł</gradient>"
  critical_strike:
    name: "<gradient:#ef4444:#f87171>Uderzenie krytyczne</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Szansa na zadanie obrażeń krytycznych</gradient>"
  combat_heal:
    name: "<gradient:#10b981:#34d399>Uzdrowienie w walce</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Leczy, gdy zadaje obrażenia wrogom</gradient>"
