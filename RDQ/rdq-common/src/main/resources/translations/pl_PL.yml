      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ścieżka Furii</gradient>"
        - "<gradient:#6b7280:#9ca3af>Uwolnij niszczycielskie ataki</gradient>"
        - "<gradient:#6b7280:#9ca3af>Poświęć obronę na rzecz czystej mocy</gradient>"
    # Gałąź specjalizacji 2: Strażnik (Defensywa)
