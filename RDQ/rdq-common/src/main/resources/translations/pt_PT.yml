# Ficheiro de tradução RDQ - Português (Portugal)
# Formato MiniMessage com gradientes e estilos
# Os marcadores usam o formato %placeholder%

# ============================================
# PREFIXO GLOBAL
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# CHAVES DE NÍVEL RAIZ (utilizadas por chamadas diretas do I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Sem Recompensas</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Adicione itens para criar recompensas</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Adicionar Item</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Coloque itens aqui para adicionar como recompensas</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clique com o botão esquerdo para colocar o item</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clique com o botão direito para remover o item</gradient>"

# ============================================
# NOMES E DESCRIÇÕES DE EXIBIÇÃO DA ÁRVORE DE RANK
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Patrulheiro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domine a arte do arco e rastreamento</gradient>"
      - "<gradient:#6b7280:#9ca3af>Torne-se um com a natureza</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Guerreiro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domine a arte do combate</gradient>"
      - "<gradient:#6b7280:#9ca3af>Torne-se um lutador lendário</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mago</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Aproveite o poder da magia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Torne-se um mestre do arcano</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Ladino</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domine furtividade e astúcia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ataque das sombras</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Clérigo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Canalize o poder divino</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cure e proteja seus aliados</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Mercador</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domine a arte do comércio</gradient>"
      - "<gradient:#6b7280:#9ca3af>Construa sua fortuna</gradient>"

# ============================================
# NOMES E DESCRIÇÕES DE EXIBIÇÃO DE RANK
# ============================================
rank:

  # ============================================
  # MENSAGENS DE RANK
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 SUBIDA DE RANK!</gradient> <gradient:#6b7280:#9ca3af>Concluiu todos os requisitos para</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Use o menu de ranks para receber a promoção!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Sem rank</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Selecione um caminho de rank para começar</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Sem rank</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Rank padrão</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Nenhum rank selecionado</gradient>"
  # Ranks da Árvore Ranger
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Caçador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Um rastreador novato aprendendo os costumes da natureza</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Arqueiro</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Hábil com o arco, mortal à distância</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Rastreador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Especialista em encontrar e seguir presas</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Atirador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Atirador de precisão com precisão mortal</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Desbravador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre explorador de terras desconhecidas</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Atirador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Atirador de elite, um tiro, uma morte</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Senhor da Floresta</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre da natureza selvagem, um com a natureza</gradient>"
  # Ranks da Árvore Guerreira
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Recrutar</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Um novo guerreiro iniciando sua jornada</gradient>"
        - "<gradient:#6b7280:#9ca3af>Aprenda o básico do combate</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Soldado</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Treinado na arte do combate</gradient>"
        - "<gradient:#6b7280:#9ca3af>Pronto para a batalha</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veterano</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guerreiro endurecido pela batalha</gradient>"
        - "<gradient:#6b7280:#9ca3af>Escolha seu caminho de especialização</gradient>"
    # Ramo de Especialização 1: Berserker (Ofensiva)
    berserker:
      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Caminho da Fúria</gradient>"
        - "<gradient:#6b7280:#9ca3af>Desencadeie ataques devastadores</gradient>"
        - "<gradient:#6b7280:#9ca3af>Sacrifique a defesa pelo poder bruto</gradient>"
    # Ramo de Especialização 2: Guardião (Defensivo)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Guardião</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Caminho da Proteção</gradient>"
        - "<gradient:#6b7280:#9ca3af>Torne-se um escudo inquebrável</gradient>"
        - "<gradient:#6b7280:#9ca3af>Proteja seus aliados a todo custo</gradient>"
    # Ramo de Especialização 3: Gladiador (Balanceado)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiador</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Caminho da Glória</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mestre do combate de arena</gradient>"
        - "<gradient:#6b7280:#9ca3af>Equilibre ataque e defesa</gradient>"
    # Ranks finais
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Senhor da Guerra da Fúria</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Berserker Supremo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Força imparável de destruição</gradient>"
        - "<gradient:#6b7280:#9ca3af>Medo encarnado no campo de batalha</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Senhor da Guerra do Escudo</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Guardião Supremo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Objeto imóvel, protetor eterno</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ninguém passará enquanto você estiver</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Senhor da Guerra da Arena</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Gladiador Supremo</gradient>"
        - "<gradient:#6b7280:#9ca3af>Campeão dos campeões</gradient>"
        - "<gradient:#6b7280:#9ca3af>Lenda da arena</gradient>"
    # Ranks legadas (para compatibilidade com versões anteriores)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Cavaleiro</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Honorável guerreiro do reino</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Campeão</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Lutador lendário, temido por todos</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Caudilho</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre da guerra, comandante dos exércitos</gradient>"
  # Ranks da Árvore Mágica
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Aprendiz</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Aprendendo o básico da magia</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adepto</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Crescendo em poder mágico</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Feiticeiro</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre das artes arcanas</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Arquimago</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre supremo de toda magia</gradient>"
  # Ranks de árvores desonestas
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Batedor de carteiras</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dedos rápidos, fuga mais rápida</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Ladrão</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre da furtividade e do roubo</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Escoteiro</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Olhos e ouvidos das sombras</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Assassino</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Assassino silencioso, morte nas sombras</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 Infiltrador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Especialista em entrar e sair sem ser detectado</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Lâmina Sombria</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guerreiro mortal da noite</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Espião Mestre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Controlador de redes de informação</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Mestre das Sombras</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Um com a própria escuridão</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Mestre das Sombras</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Governante supremo de todas as sombras</gradient>"
  # Ranks da árvore do clérigo
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Acólito</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Servo devotado do divino</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Devoto</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Fiel seguidor do caminho divino</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Sacerdote</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Curador e protetor dos fiéis</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Curador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre em artes restaurativas</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Bispo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Líder dos fiéis</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Oráculo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vidente de visões divinas</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Sumo Sacerdote</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Voz suprema do divino</gradient>"
  # Ranks da Árvore Mercante
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Mascate</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vendendo mercadorias na rua</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 Comerciante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Comerciante estabelecido com conexões</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 Fornecedor</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vendedor qualificado de mercadorias</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 Artífice</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Artesão de mercadorias finas</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰 Alquimista</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre de poções e elixires</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 Comerciante</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Empresário de sucesso</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰 Mestre Artesão</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Supremo artesão do reino</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 Príncipe Mercador</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Realeza do comércio</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 Magnata</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mestre em comércio e comércio</gradient>"
    guild_master:
      name: "<gradient:#ef4444:#f87171>💰 Mestre da Guilda</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Líder da guilda mercantil</gradient>"

# ============================================
# MENSAGENS DO OUVINTE DE RECOMPENSAS
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Há uma recompensa ativa pela sua cabeça!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valor da Recompensa:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expira em:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Mandante:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 RECOMPENSA RECEBIDA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Recebeu com sucesso a recompensa por</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>A sua parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Alguém</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>recebeu a recompensa por</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% jogadores</gradient> <gradient:#a855f7:#c084fc>receberam a recompensa por</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# MENSAGENS DE CRIAÇÃO DE RECOMPENSAS
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Recompensa criada com sucesso para</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Falha ao processar recompensa:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Processando recompensa...</gradient>"

# ============================================
# MENSAGENS DE PROGRESSÃO DE RANK
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progressão iniciada para o rank</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Visualizando requisitos para</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisitos incompletos para</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% completo)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Requisito incompleto:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>não tem requisitos!</gradient>"

# ============================================
# MENSAGENS DE CLIQUE DO RANK
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Modo de visualização:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Você possui</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Bloqueado:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Complete os pré-requisitos primeiro</gradient>"

# ============================================
# MENSAGENS DE COMANDO RQ
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms não está instalado!</gradient> <gradient:#6b7280:#9ca3af>Este recurso requer LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 Ajuda RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Abrir menu principal</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Ver ranks</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Ver recompensas</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Alternar a barra lateral de perks</gradient>"
  scoreboard:
    syntax: "<gradient:#f59e0b:#fbbf24>⚠ Utilização:</gradient> <gradient:#6b7280:#9ca3af>/rq scoreboard perks</gradient>"
    enabled: "<gradient:#10b981:#34d399>✦ Barra lateral de perks ativada.</gradient>"
    disabled: "<gradient:#ef4444:#f87171>✦ Barra lateral de perks desativada.</gradient>"

scoreboard_sidebar:
  perks:
    title: "<dark_aqua>[RDQ]</dark_aqua> <white>Perks</white>"
    active_summary: "<gray>Ativos:</gray> <aqua>%active_perks%/%max_active_perks%</aqua>"
    owned_summary: "<gray>Obtidos:</gray> <gold>%acquired_perks%</gold><gray>/</gray><light_purple>%total_perks%</light_purple>"
    no_active: "<red>Nenhum perk ativo</red>"
    active_entry: "<white>%perk_name%</white> <gray>(%usage_count%)</gray>"
    more_active: "<gray>+%remaining_perks% a mais</gray>"

