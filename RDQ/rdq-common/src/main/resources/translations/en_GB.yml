      - "<gradient:#6b7280:#9ca3af>Gain experience levels</gradient>"
    playtime:
      - "<gradient:#f59e0b:#fbbf24>💡 Tip:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Play on the server</gradient>"
    other:
      - "<gradient:#f59e0b:#fbbf24>💡 Tip:</gradient>"
      - "<gradient:#6b7280:#9ca3af>Complete the requirement</gradient>"

