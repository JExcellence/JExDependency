# RDQ Translation File - English (UK)
# MiniMessage format with gradients and styling
# Placeholders use %placeholder% format

prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 No Rewards</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Add items to create rewards</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Add Item</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Place items here to add as rewards</gradient>"

tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Master the art of archery and tracking</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Warrior</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Master the art of combat</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mage</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Harness the power of magic</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Rogue</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Master stealth and cunning</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Cleric</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Channel divine power</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Merchant</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Master the art of trade</gradient>"

