      - "<gradient:#6b7280:#9ca3af>Complete all requirements</gradient>"
      - "<gradient:#6b7280:#9ca3af>to unlock this rank</gradient>"
  overall_progress:
    name: "<gradient:#3b82f6:#60a5fa>📊 Overall Progress</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Progress:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Completed:</gradient> <gradient:#f59e0b:#fbbf24>%completed%/%total%</gradient>"
  claim_button:
    name: "<gradient:#10b981:#34d399>✅ Claim Rank</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to claim the rank!</gradient>"
    locked:
      name: "<gradient:#ef4444:#f87171>🔒 Locked</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Complete all requirements</gradient>"
        - "<gradient:#6b7280:#9ca3af>to unlock this rank</gradient>"
  messages:
    preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Preview Mode - Actions disabled</gradient>"
    requirement_completed: "<gradient:#10b981:#34d399>✅ Requirement completed!</gradient>"
    all_completed: "<gradient:#10b981:#34d399>🎉 All requirements completed! You can now claim the rank!</gradient>"
    not_ready: "<gradient:#f59e0b:#fbbf24>⚠ This requirement is not ready to be completed yet.</gradient>"
    already_completed: "<gradient:#10b981:#34d399>✅ This requirement has already been completed.</gradient>"
    rank_claimed: "<gradient:#10b981:#34d399>🎉 Congratulations! You have obtained the rank %rank_name%!</gradient>"
