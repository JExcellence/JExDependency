    progress_percentage: "<gradient:#3b82f6:#60a5fa>Progress:</gradient> <gradient:#10b981:#34d399>%completion_progress_percentage%</gradient>"
    completion_status: "<gradient:#6b7280:#9ca3af>Status:</gradient> <gradient:#f59e0b:#fbbf24>%completion_status%</gradient>"
