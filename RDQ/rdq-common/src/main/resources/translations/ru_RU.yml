ора Цели
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Выбрать Цель: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы выбрать игрока</gradient>"
    - "<gradient:#6b7280:#9ca3af>для размещения награды</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Текущая цель: %target_name%</gradient>"

# Кнопка Подтверждения Награды
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ Создать Награду</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы создать награду</gradient>"
    - "<gradient:#6b7280:#9ca3af>с выбранными наградами</gradient>"

# Сообщения Подтверждения
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ Игрок не выбран!</gradient> <gradient:#6b7280:#9ca3af>Пожалуйста, сначала выберите цель.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Награды не добавлены!</gradient> <gradient:#6b7280:#9ca3af>Пожалуйста, сначала добавьте награды.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Создание награды для</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Ошибка:</gradient> <gradient:#6b7280:#9ca3af>Не удалось найти целевого игрока %target_name%</gradient>"

# Сообщение о Возврате Предметов
left_overs: "<gradient:#f59e0b:#fbbf24>📦 Предметы возвращены!</gradient> <gradient:#6b7280:#9ca3af>Некоторые предметы были сброшены на землю.</gradient>"