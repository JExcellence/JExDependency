# RDQ Common Файл Перевода - Русский
# Формат MiniMessage с градиентами и стилем
# Заполнители используют формат %placeholder%

# Сообщения Слушателя Наград
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>На вас объявлена награда!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Размер Награды:</gradient> <gradient:#10b981:#34d399>%bounty_value%₽</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Истекает в:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Заказчик:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 НАГРАДА ПОЛУЧЕНА! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Вы успешно получили награду за</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Ваша доля:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Кто-то</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>получил награду за</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% игроков</gradient> <gradient:#a855f7:#c084fc>получили награду за</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Сообщения Подтверждения Создания Награды
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Награда успешно создана для</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Ошибка создания награды:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Интерфейс Обзора Наград (Главное Меню и Обзор)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Система Наград</gradient>"
  
  # Кнопки главного меню
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Создать Награду</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы создать новую награду</gradient>"
      - "<gradient:#6b7280:#9ca3af>на другого игрока</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Просмотр Наград</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Просмотреть все активные награды</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Мои Награды</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Просмотреть награды, которые вы создали</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Таблица Лидеров</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Лучшие охотники за наградами</gradient>"
  
  # Записи списка наград
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Награда за</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Цель:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Заказчик:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Создано:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Нажмите для просмотра деталей</gradient>"

# Интерфейс Создания Награды
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Создать Награду</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Выбрать Цель</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы выбрать игрока</gradient>"
      - "<gradient:#6b7280:#9ca3af>для размещения награды</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Добавить Награды</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы добавить предметы</gradient>"
      - "<gradient:#6b7280:#9ca3af>в качестве наград</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Сначала выберите цель!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Создать Награду</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы создать награду</gradient>"
      - "<gradient:#6b7280:#9ca3af>с выбранными наградами</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Награда успешно создана за</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Интерфейс Информации об Игроке Награды
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Награда за</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Цель этой награды</gradient>"
      - "<gradient:#6b7280:#9ca3af>Нажмите для просмотра информации об игроке</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Просмотр Наград</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы увидеть все награды</gradient>"
      - "<gradient:#6b7280:#9ca3af>за получение этой награды</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Удалить Награду</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Предупреждение: Это действие</gradient>"
      - "<gradient:#ef4444:#f87171>нельзя отменить!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы удалить эту награду</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Награда за</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>была удалена!</gradient>"

# Интерфейс Награды Награды
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Награды Награды</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Нет Наград</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Добавьте предметы, чтобы создать</gradient>"
      - "<gradient:#6b7280:#9ca3af>награды для этой награды</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Добавить Предмет</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Поместите предметы сюда, чтобы добавить их как награды</gradient>"
      - "<gradient:#6b7280:#9ca3af>Правый клик для удаления предметов</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Цель: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Эта награда размещена на</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Награда Награды</gradient>"
      - "<gradient:#6b7280:#9ca3af>Этот предмет будет дан тому</gradient>"
      - "<gradient:#6b7280:#9ca3af>кто получит награду</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Новые предметы не были добавлены!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Некоторые предметы были выброшены, так как ваш инвентарь был полон!</gradient>"

# Префикс
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  
add_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Добавить Валюту</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Нажмите, чтобы добавить валютные</gradient>"
      - "<gradient:#6b7280:#9ca3af>награды для награды</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Сначала выберите цель!</gradient>"

# Компоненты UI Платформы
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Пагинация
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Страница %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Текущая страница:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Всего страниц:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Страница %direction%</gradient>"

# Предметы Головы
head:
