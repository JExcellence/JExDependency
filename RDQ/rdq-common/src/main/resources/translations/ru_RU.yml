    lore:
      - "<gradient:#6b7280:#9ca3af>Следующая страница</gradient>"
  cancel:
    name: "<gradient:#ef4444:#f87171>❌ Отмена</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Отменить действие</gradient>"
