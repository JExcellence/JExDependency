# Файл перевода RDQ — английский (США)
# Формат MiniMessage с градиентами и стилями.
# Заполнители используют формат %placeholder%

# ============================================
# ГЛОБАЛЬНЫЙ ПРЕФИКС
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# КЛЮЧИ КОРНЕВОГО УРОВНЯ (используются при прямых вызовах I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Нет Наград</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Добавьте предметы для создания наград</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Добавить Предмет</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Поместите предметы сюда для добавления как награды</gradient>"
    - "<gradient:#6b7280:#9ca3af>Щелкните левой кнопкой мыши, чтобы разместить предмет</gradient>"
    - "<gradient:#6b7280:#9ca3af>Щелкните правой кнопкой мыши, чтобы удалить элемент</gradient>"

# ============================================
# ДЕРЕВО РАНГОВ ОТОБРАЖАЕМЫЕ НАЗВАНИЯ И ОПИСАНИЯ
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Рейнджер</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Освойте искусство стрельбы из лука и выслеживания</gradient>"
      - "<gradient:#6b7280:#9ca3af>Стать единым целым с природой</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Воин</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Освойте искусство боя</gradient>"
      - "<gradient:#6b7280:#9ca3af>Станьте легендарным бойцом</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Маг</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Овладейте силой магии</gradient>"
      - "<gradient:#6b7280:#9ca3af>Станьте мастером тайной магии</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Разбойник</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Освойте скрытность и хитрость</gradient>"
      - "<gradient:#6b7280:#9ca3af>Удар из тени</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Жрец</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Направьте божественную силу</gradient>"
      - "<gradient:#6b7280:#9ca3af>Исцеляйте и защищайте своих союзников</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Торговец</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Освойте искусство торговли</gradient>"
      - "<gradient:#6b7280:#9ca3af>Построй свое состояние</gradient>"

# ============================================
# РАНГ ОТОБРАЖАЕМЫЕ НАЗВАНИЯ И ОПИСАНИЯ
# ============================================
rank:

  # ============================================
  # Ранговые сообщения
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 ПОВЫШАЙТЕ Ранг!</gradient> <gradient:#6b7280:#9ca3af>Вы выполнили все требования для</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Используйте меню рангов, чтобы получить повышение ранга!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Без рейтинга</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Выберите путь ранга, чтобы начать</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Без рейтинга</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Ранг по умолчанию</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ранг не выбран</gradient>"
  # Ранги дерева рейнджеров
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Охотник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Начинающий следопыт, изучающий жизнь в дикой природе.</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Лучник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Умелое обращение с луком, смертельное на расстоянии</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Трекер</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Эксперт по поиску и преследованию добычи</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Стрелок</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Точный стрелок со смертельной точностью</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Следопыт</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер-исследователь неизведанных земель</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Снайпер</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Элитный стрелок, один выстрел – одно убийство</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲Лесной Лорд</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Хозяин дикой природы, единый с природой</gradient>"
  # Ранги дерева воинов
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Набирать</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Новый воин начинает свой путь</gradient>"
        - "<gradient:#6b7280:#9ca3af>Изучите основы боя</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Солдат</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Обученный искусству боя</gradient>"
        - "<gradient:#6b7280:#9ca3af>Готов к бою</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Ветеран</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Закаленный в боях воин</gradient>"
        - "<gradient:#6b7280:#9ca3af>Выберите путь специализации</gradient>"
    # Ветка специализации 1: Берсерк (Наступление)
    berserker:
      name: "<gradient:#ef4444:#f87171>Берсеркер</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Путь ярости</gradient>"
        - "<gradient:#6b7280:#9ca3af>Наносите сокрушительные удары</gradient>"
        - "<gradient:#6b7280:#9ca3af>Пожертвовать защитой ради грубой силы</gradient>"
    # Ветка специализации 2: Страж (Защита)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Хранитель</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Путь защиты</gradient>"
        - "<gradient:#6b7280:#9ca3af>Станьте нерушимым щитом</gradient>"
        - "<gradient:#6b7280:#9ca3af>Защитите своих союзников любой ценой</gradient>"
    # Ветка специализации 3: Гладиатор (сбалансированный)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Гладиатор</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Путь славы</gradient>"
        - "<gradient:#6b7280:#9ca3af>Мастер боя на арене</gradient>"
        - "<gradient:#6b7280:#9ca3af>Баланс нападения и защиты</gradient>"
    # Итоговые ранги
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Военачальник Ярости</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Абсолютный Берсеркер</gradient>"
        - "<gradient:#6b7280:#9ca3af>Непреодолимая сила разрушения</gradient>"
        - "<gradient:#6b7280:#9ca3af>Страх, воплощенный на поле битвы</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Военачальник Щита</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Абсолютный страж</gradient>"
        - "<gradient:#6b7280:#9ca3af>Недвижимый объект, вечный защитник</gradient>"
        - "<gradient:#6b7280:#9ca3af>Никто не пройдет, пока ты стоишь</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Военачальник Арены</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Абсолютный гладиатор</gradient>"
        - "<gradient:#6b7280:#9ca3af>Чемпион чемпионов</gradient>"
        - "<gradient:#6b7280:#9ca3af>Легенда арены</gradient>"
    # Устаревшие ранги (для обратной совместимости)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Рыцарь</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Почетный воин королевства</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Чемпион</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Легендарный боец, которого все боятся</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>военачальник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер войны, командующий армиями</gradient>"
  # Ранги дерева магов
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Ученик</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Изучение основ магии.</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Адепт</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Рост магической силы</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Волшебник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер тайных искусств</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Архимаг</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Верховный мастер всей магии</gradient>"
  # Ранги разбойного дерева
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Карманник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Быстрые пальцы, быстрый побег</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Вор</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер скрытности и воровства</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Скаут</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Глаза и уши теней</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Убийца</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Тихий убийца, смерть из теней</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 Инфильтратор</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Эксперт по входу и выходу незамеченным</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Теневой клинок</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Смертоносный воин ночи</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Мастер шпионов</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Контроллер информационных сетей</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Мастер теней</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Один с самой тьмой</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡Мастер теней</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Верховный правитель всех теней</gradient>"
  # Древо рангов клириков
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Послушник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Преданный слуга божественного</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Преданный</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Верный последователь божественного пути</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Священник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Целитель и защитник верующих</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Целитель</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер восстановительного искусства</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Епископ</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Лидер верующих</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Оракул</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Провидец божественных видений</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Первосвященник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Высший голос божественного</gradient>"
  # Ранги дерева торговцев
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Коробейник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Продажа товаров на улице</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 Трейдер</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Стабильный продавец со связями</gradient>"
    vendor:
      name: "<gradient:#10b981:#34d399>💰 Продавец</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Квалифицированный продавец товара</gradient>"
    artificer:
      name: "<gradient:#f59e0b:#fbbf24>💰 Ремесленник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер изысканных изделий</gradient>"
    alchemist:
      name: "<gradient:#a855f7:#c084fc>💰 Алхимик</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Мастер зелий и эликсиров</gradient>"
    merchant:
      name: "<gradient:#f59e0b:#fbbf24>💰 Торговец</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Успешный владелец бизнеса</gradient>"
    master_crafter:
      name: "<gradient:#ef4444:#f87171>💰 Мастер-ремесленник</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Верховный мастер королевства</gradient>"
    merchant_prince:
      name: "<gradient:#a855f7:#c084fc>💰 Торговый принц</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Роялти в торговле</gradient>"
    tycoon:
      name: "<gradient:#a855f7:#c084fc>💰 Магнат</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Магистр коммерции и торговли</gradient>"
    guild_master:
      name: "<gradient:#ef4444:#f87171>💰 Мастер гильдии</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Лидер торговой гильдии</gradient>"

# ============================================
# СООБЩЕНИЯ БОНТИ-СЛУШАТЕЛЯ
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>На вашу голову назначена награда!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Сумма Награды:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Истекает:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Заказчик:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 НАГРАДА ПОЛУЧЕНА! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Вы успешно получили награду за</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Ваша доля:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Кто-то</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>получил награду за</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% игроков</gradient> <gradient:#a855f7:#c084fc>получили награду за</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# СООБЩЕНИЯ О СОЗДАНИИ БОНТИ
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Награда успешно создана для</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Ошибка обработки награды:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Обработка награды...</gradient>"

# ============================================
# СООБЩЕНИЯ О ПРОГРЕССЕ РАНГА
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Прогресс начат для ранга</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Просмотр требований для</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Требования не выполнены для</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% выполнено)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Требование не выполнено:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>не имеет требований!</gradient>"

# ============================================
# РАНГОВЫЕ КЛИК-СООБЩЕНИЯ
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Режим предпросмотра:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Вы владеете</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Заблокировано:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Сначала выполните предварительные требования</gradient>"

# ============================================
# КОМАНДНЫЕ СООБЩЕНИЯ RQ
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms не установлен!</gradient> <gradient:#6b7280:#9ca3af>Эта функция требует LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 Помощь RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Открыть главное меню</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Просмотр рангов</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Просмотр наград</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Переключить боковую панель перков</gradient>"
  scoreboard:
    syntax: "<gradient:#f59e0b:#fbbf24>⚠ Использование:</gradient> <gradient:#6b7280:#9ca3af>/rq scoreboard perks</gradient>"
    enabled: "<gradient:#10b981:#34d399>✦ Боковая панель перков включена.</gradient>"
    disabled: "<gradient:#ef4444:#f87171>✦ Боковая панель перков выключена.</gradient>"

scoreboard_sidebar:
  perks:
    title: "<dark_aqua>[RDQ]</dark_aqua> <white>Перки</white>"
    active_summary: "<gray>Активные:</gray> <aqua>%active_perks%/%max_active_perks%</aqua>"
