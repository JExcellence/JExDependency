# RDQ-oversettelsesfil – engelsk (USA)
# MiniMessage-format med gradienter og styling
# Plassholdere bruker %plassholder%-format

# ============================================
# GLOBAL PREFIKS
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROTNIVÅTASTER (brukes av direkte I18n.Builder-anrop)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ingen Belønninger</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Legg til gjenstander for å opprette belønninger</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Legg til Gjenstand</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Plasser gjenstander her som belønninger</gradient>"
    - "<gradient:#6b7280:#9ca3af>Venstreklikk for å plassere elementet</gradient>"
    - "<gradient:#6b7280:#9ca3af>Høyreklikk for å fjerne elementet</gradient>"

# ============================================
# RANK TREE DISPLAY NAVN OG BESKRIVELSER
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kunsten å skyte med bue og spore</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli ett med naturen</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Kriger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre kampens kunst</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli en legendarisk fighter</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Utnytt magiens kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bli en mester i det mystiske</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Kjeltring</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre sniking og list</gradient>"
      - "<gradient:#6b7280:#9ca3af>Slå fra skyggene</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Klerk</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliser guddommelig kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Helbred og beskytt dine allierte</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelsmann</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mestre handelens kunst</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bygg formuen din</gradient>"

# ============================================
# RANK DISPLAY NAVN OG BESKRIVELSER
# ============================================
rank:

  # ============================================
  # RANK MELDINGER
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 RANK OPP!</gradient> <gradient:#6b7280:#9ca3af>Du har fullført alle krav til</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Bruk rangeringsmenyen for å kreve rangoppgraderingen din!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Ikke rangert</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Velg en rangeringsbane for å begynne</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Ikke rangert</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Standardrangering</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ingen rangering er valgt</gradient>"
  # Ranger Tree Ranger
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Jeger</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En nybegynner som lærer naturens veier</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Bueskytter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dyktig med buen, dødelig på avstand</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Tracker</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ekspert på å finne og følge byttedyr</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Skytter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Presisjonsskytespill med dødelig nøyaktighet</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Stifinner</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mesterforsker av ukjente land</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Snikskytter</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Eliteskytter, ett skudd ett drap</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Skogsherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Villmarkens mester, ett med naturen</gradient>"
  # Krigertre rangerer
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>Rekruttere</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En ny kriger begynner sin reise</gradient>"
        - "<gradient:#6b7280:#9ca3af>Lær det grunnleggende om kamp</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>Soldat</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Opplært i kampkunsten</gradient>"
        - "<gradient:#6b7280:#9ca3af>Klar for kamp</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veteran</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Kampherdet kriger</gradient>"
        - "<gradient:#6b7280:#9ca3af>Velg din spesialiseringsvei</gradient>"
    # Spesialisering gren 1: Berserker (offensiv)
    berserker:
      name: "<gradient:#ef4444:#f87171>Berserker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Path of Fury</gradient>"
        - "<gradient:#6b7280:#9ca3af>Slipp løs ødeleggende angrep</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ofre forsvar for rå kraft</gradient>"
    # Spesialisering gren 2: Guardian (defensiv)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Verge</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Veien til beskyttelse</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bli et uknuselig skjold</gradient>"
        - "<gradient:#6b7280:#9ca3af>Beskytt dine allierte for enhver pris</gradient>"
    # Spesialisering gren 3: Gladiator (balansert)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiator</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Path of Glory</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mester i arenakamp</gradient>"
        - "<gradient:#6b7280:#9ca3af>Balanser angrep og forsvar</gradient>"
    # Endelige rangeringer
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Warlord of Fury</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ultimate Berserker</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ustoppelig ødeleggelseskraft</gradient>"
        - "<gradient:#6b7280:#9ca3af>Frykt inkarnerer på slagmarken</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>skjoldets krigsherre</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ultimate Guardian</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ubevegelig gjenstand, evig beskytter</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ingen skal passere mens du står</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Arenaens krigsherre</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ultimate Gladiator</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mesternes mester</gradient>"
        - "<gradient:#6b7280:#9ca3af>Legenden om arenaen</gradient>"
    # Eldre rangeringer (for bakoverkompatibilitet)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>Ridder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ærede kriger av riket</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>Champion</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendarisk jagerfly, fryktet av alle</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>Krigsherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Krigsmester, hærfører</gradient>"
  # Mage Tree rangerer
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Lærling</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Lære det grunnleggende om magi</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adept</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vokser i magisk kraft</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Veiviser</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester i mystiske kunster</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Erkemageri</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Den øverste mester over all magi</gradient>"
  # Rogue Tree rangerer
