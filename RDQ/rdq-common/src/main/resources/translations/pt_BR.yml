    description: "<gradient:#6b7280:#9ca3af>Cure ao causar dano aos inimigos</gradient>"
quest:
  zombie_slayer:
    name: <gradient:#ef4444:#f87171>Matador de Zumbis</gradient>
    description: Derrote zumbis e colete seus itens para provar sua habilidade em combate
    task:
      kill_zombies:
        name: <white>Derrote Zumbis</white>
        description: Matar %amount% zumbis
      collect_flesh:
        name: <white>Colete carne podre</white>
        description: Juntar %amount% carne podre de zumbis derrotados
  master_miner:
    name: <gradient:#6b7280:#9ca3af>Mestre Mineiro</gradient>
    description: Extraia vários minérios dentro do prazo para se tornar um minerador mestre
    task:
      mine_coal:
        name: <white>Carvão mineral</white>
        description: Meu %amount% blocos de minério de carvão
      mine_iron:
        name: <white>Meu Ferro</white>
        description: Meu %amount% blocos de minério de ferro
      mine_diamond:
        name: <white>Meus diamantes</white>
        description: Meu %amount% blocos de minério de diamante
  builders_dream:
    name: <gradient:#f59e0b:#fbbf24>Sonho do Construtor</gradient>
    description: Construa um edifício seguindo as etapas sequenciais para mostrar suas habilidades de construção
    task:
      foundation:
        name: <white>Fundação Leiga</white>
        description: Lugar %amount% blocos de tijolos para a fundação
      walls:
        name: <white>Construir paredes</white>
        description: Lugar %amount% blocos de tábuas de carvalho para as paredes
      windows:
        name: <white>Adicionar janelas</white>
        description: Lugar %amount% blocos de vidro para janelas
      roof:
        name: <white>Telhado Completo</white>
        description: Lugar %amount% blocos de escada de carvalho para o telhado
view:
  quest:
    categories:
      title: <gradient:#f59e0b:#fbbf24>Categorias de missões</gradient>
    list:
      title: <gradient:#f59e0b:#fbbf24>%category% Missões</gradient>
    detail:
      title: '<gradient:#f59e0b:#fbbf24>Busca: %quest%</gradient>'
    active:
      title: <gradient:#f59e0b:#fbbf24>Missões ativas</gradient>
    items:
      back:
        name: <gray>Voltar</gray>
        lore:
        - <gray>Voltar ao menu anterior</gray>
      start:
        name: <green>Iniciar missão</green>
        lore:
        - <gray>Clique para iniciar esta missão</gray>
        - ''
        - <dark_gray>Requisitos:</dark_gray>
        - <dark_gray>- %requirements%</dark_gray>
      abandon:
        name: <red>Abandonar missão</red>
        lore:
        - <gray>Clique para abandonar esta missão</gray>
        - ''
        - '<yellow>Aviso: o progresso será perdido</yellow>'
      info:
        name: <yellow>Informações da missão</yellow>
        lore:
        - <gray>Clique para ver detalhes da missão</gray>
      progress:
        name: <aqua>Ver progresso</aqua>
        lore:
        - <gray>Clique para ver o progresso da missão</gray>
        - ''
        - '<dark_gray>Progresso: <white>%progress%%</white></dark_gray>'
      close:
        name: <gray>Fechar</gray>
        lore:
        - <gray>Fechar este menu</gray>
      quest_item:
        name: <gradient:#f59e0b:#fbbf24>%quest_name%</gradient>
        lore:
        - <gray>%quest_description%</gray>
        - ''
        - '<dark_gray>Dificuldade: %difficulty%</dark_gray>'
        - '<dark_gray>Status: %status%</dark_gray>'
        - '<dark_gray>Tarefas: <white>%task_count%</white></dark_gray>'
        - ''
        - '%action_hint%'
      task_item:
        name: <white>%task_name%</white>
        lore:
        - <gray>%task_description%</gray>
        - ''
        - '<dark_gray>Progresso: <white>%current%/%required%</white></dark_gray>'
        - '<dark_gray>Status: %status%</dark_gray>'
    lore:
      click_to_start: <green>Clique para iniciar esta missão</green>
      click_to_view: <yellow>Clique para ver detalhes da missão</yellow>
      click_to_abandon: <red>Clique para abandonar esta missão</red>
      already_completed: <green>Já concluído</green>
      requirements_not_met: <red>Requisitos não atendidos</red>
      on_cooldown: '<red>No resfriamento: %time%</red>'
      time_remaining: '<yellow>Tempo restante: %time%</yellow>'
      repeatable: <aqua>Missão repetível</aqua>
      one_time: <gray>Missão única</gray>
    progress:
      overall: <yellow>Progresso geral</yellow>
      percentage: '<gray>Progresso: <white>%progress%%</white></gray>'
      tasks_completed: '<gray>Tarefas: <white>%completed%/%total%</white></gray>'
      time_elapsed: '<gray>Tempo decorrido: <white>%time%</white></gray>'
      time_remaining: '<gray>Tempo restante: <white>%time%</white></gray>'
    task:
      progress: '<gray>Progresso: <white>%current%/%required%</white></gray>'
      completed: <green>Concluído</green>
      remaining: '<gray>Restante: <white>%remaining%</white></gray>'
      locked: <red>Bloqueado</red>
      sequential: <yellow>Conclua as tarefas anteriores primeiro</yellow>
    rewards:
      header: <yellow>Recompensas</yellow>
      currency: <gold>%amount% %currency%</gold>
      experience: <aqua>%amount% Experiência</aqua>
      item: <white>%amount%x %item%</white>
      perk: '<gradient:#a855f7:#c084fc>Vantagem: %perk%</gradient>'
      quest: '<gradient:#f59e0b:#fbbf24>Busca: %quest%</gradient>'
    requirements:
      header: <yellow>Requisitos</yellow>
      level: <aqua>Nível %level%</aqua>
      currency: <gold>%amount% %currency%</gold>
      quest_completion: '<gradient:#f59e0b:#fbbf24>Completo: %quest%</gradient>'
      rank: '<gradient:#a855f7:#c084fc>Classificação: %rank%</gradient>'
      permission: '<gray>Permissão: %permission%</gray>'
difficulty:
  trivial: <gradient:#84cc16:#a3e635>Trivial</gradient>
  easy: <gradient:#10b981:#34d399>Fácil</gradient>
  normal: <gradient:#f59e0b:#fbbf24>Normal</gradient>
  hard: <gradient:#ef4444:#f87171>Duro</gradient>
  extreme: <gradient:#a855f7:#c084fc>Extremo</gradient>
