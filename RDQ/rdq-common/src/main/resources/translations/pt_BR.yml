# RDQ Portuguese (Brazil) Translations
# Tradução em português brasileiro para o plugin RaindropQuests

prefix: "<gold>[RDQ]</gold> "

rdq:
  error:
    not_initialized: "<red>RDQ ainda está inicializando. Por favor aguarde...</red>"
    unknown_subcommand: "<red>Subcomando desconhecido. Use /rdq help para comandos disponíveis.</red>"
    reload_failed: "<red>Falha ao recarregar: {error}</red>"
  success:
    reloaded: "<green>Configuração do RDQ recarregada com sucesso!</green>"
  help: |
    <yellow>Comandos RDQ:</yellow>
    <gray>/rdq rank</gray> - Abrir menu de ranks
    <gray>/rdq bounty</gray> - Abrir menu de recompensas
    <gray>/rdq perk</gray> - Abrir menu de vantagens
    <gray>/rdq reload</gray> - Recarregar configuração
  rank:
    opening_gui: "<gray>Abrindo menu de ranks...</gray>"
  bounty:
    opening_gui: "<gray>Abrindo menu de recompensas...</gray>"
  perk:
    opening_gui: "<gray>Abrindo menu de vantagens...</gray>"

error:
  not_found: "<red>{type} não encontrado: {id}</red>"
  insufficient_funds: "<red>Fundos insuficientes! Necessário: {required}, Disponível: {available}</red>"
  on_cooldown: "<red>Em recarga! {remaining} restante.</red>"
  requirements_not_met: "<red>Requisitos não atendidos: {missing}</red>"
  self_targeting: "<red>Você não pode se selecionar!</red>"
  already_exists: "<red>{type} já existe: {id}</red>"
  expired: "<red>{type} expirou: {id}</red>"
  not_unlocked: "<red>{type} não desbloqueado: {id}</red>"
  permission_denied: "<red>Permissão negada: {permission}</red>"
  invalid_state: "<red>Estado inválido: {message}</red>"
  invalid_amount: "<red>Valor inválido! Deve estar entre {min} e {max}.</red>"
  no_permission: "<red>Você não tem permissão para isso.</red>"
  player_only: "<red>Este comando só pode ser usado por jogadores.</red>"

rank:
  error:
    unknown_subcommand: "<red>Subcomando de rank desconhecido. Use /rank help para comandos disponíveis.</red>"
    player_not_found: "<red>Jogador não encontrado: {playerName}</red>"
    grant_failed: "<red>Falha ao conceder rank.</red>"
    reload_failed: "<red>Falha ao recarregar ranks: {error}</red>"
  success:
    rank_granted: "<green>Rank {rankName} concedido a {playerName}!</green>"
    rank_revoked: "<yellow>Rank {rankName} revogado de {playerName}.</yellow>"
    reloaded: "<green>Configuração de ranks recarregada!</green>"
    rank_unlocked: "<green>Parabéns! Você desbloqueou o rank {rankName}!</green>"
  opening_view: "<gray>Abrindo visualização de ranks...</gray>"
  no_progress: "<yellow>Você ainda não começou nenhum caminho de rank.</yellow>"
  progress_header: "<yellow>Seu Progresso de Rank:</yellow>"
  progress_entry: "<gray>• {tree}: <white>{rank}</white></gray>"
  trees_header: "<yellow>Árvores de Rank Disponíveis:</yellow>"
  tree_entry: "<gray>• {id} <dark_gray>({ranks} ranks)</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /rank admin <grant|revoke|reload></yellow>"
    unknown: "<red>Comando admin desconhecido.</red>"
    grant:
      usage: "<yellow>Uso: /rank admin grant <jogador> <rank></yellow>"
    revoke:
      usage: "<yellow>Uso: /rank admin revoke <jogador> <rank></yellow>"
  help: |
    <yellow>Comandos de Rank:</yellow>
    <gray>/rank</gray> - Abrir menu de ranks
    <gray>/rank view</gray> - Ver árvores de rank
    <gray>/rank progress</gray> - Ver seu progresso
    <gray>/rank trees</gray> - Listar árvores disponíveis
    <gray>/rank admin</gray> - Comandos admin
  notification:
    title: "<gold>Rank Desbloqueado!</gold>"
    subtitle: "<yellow>{rankName}</yellow>"
    actionbar: "<green>Você desbloqueou {rankName}!</green>"

bounty:
  error:
    unknown_subcommand: "<red>Subcomando de recompensa desconhecido. Use /bounty help para comandos disponíveis.</red>"
    player_not_found: "<red>Jogador não encontrado: {playerName}</red>"
    self_target: "<red>Você não pode colocar uma recompensa em si mesmo!</red>"
    invalid_amount: "<red>Valor inválido. Por favor insira um número válido.</red>"
    invalid_id: "<red>ID de recompensa inválido.</red>"
    create_failed: "<red>Falha ao criar recompensa: {error}</red>"
    cancel_failed: "<red>Falha ao cancelar recompensa. Você pode não ser o dono.</red>"
  success:
    bounty_created: "<green>Recompensa de {amount} colocada em {targetName}!</green>"
    bounty_cancelled: "<yellow>Recompensa cancelada. Fundos reembolsados.</yellow>"
    bounty_removed: "<green>Recompensa removida pelo admin.</green>"
    bounty_claimed: "<green>Você reivindicou uma recompensa de {amount}!</green>"
    reloaded: "<green>Configuração de recompensas recarregada!</green>"
  create:
    usage: "<yellow>Uso: /bounty create <jogador> <valor></yellow>"
  cancel:
    usage: "<yellow>Uso: /bounty cancel <recompensaId></yellow>"
  list:
    empty: "<yellow>Nenhuma recompensa ativa.</yellow>"
    header: "<yellow>Recompensas Ativas ({count}):</yellow>"
    entry: "<gray>• <white>{target}</white> - {amount} <dark_gray>(por {placer})</dark_gray></gray>"
  leaderboard:
    header: "<yellow>Ranking de Caçadores:</yellow>"
    entry: "<gray>{rank}. <white>{player}</white> - {kills} abates, {earned} ganhos</gray>"
  my:
    header: "<yellow>Suas Recompensas:</yellow>"
    placed_header: "<gray>Recompensas que você colocou:</gray>"
    placed_entry: "<gray>• <white>{target}</white> - {amount}</gray>"
    targeted_header: "<gray>Recompensas em você:</gray>"
    targeted_entry: "<gray>• {amount} <dark_gray>(por {placer})</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /bounty admin <remove|reload></yellow>"
    unknown: "<red>Comando admin desconhecido.</red>"
    remove:
      usage: "<yellow>Uso: /bounty admin remove <recompensaId></yellow>"
  help: |
    <yellow>Comandos de Recompensa:</yellow>
    <gray>/bounty</gray> - Listar recompensas ativas
    <gray>/bounty create <jogador> <valor></gray> - Criar recompensa
    <gray>/bounty cancel <id></gray> - Cancelar sua recompensa
    <gray>/bounty leaderboard</gray> - Ver melhores caçadores
    <gray>/bounty my</gray> - Ver suas recompensas
    <gray>/bounty admin</gray> - Comandos admin
  announcement:
    created: "<yellow>{placer} colocou uma recompensa de {amount} em {target}!</yellow>"
    claimed: "<green>{hunter} reivindicou a recompensa em {target} no valor de {amount}!</green>"
    expired: "<gray>Recompensa em {target} expirou.</gray>"

perk:
  error:
    unknown_subcommand: "<red>Subcomando de vantagem desconhecido. Use /perk help para comandos disponíveis.</red>"
    player_not_found: "<red>Jogador não encontrado: {playerName}</red>"
    perk_not_found: "<red>Vantagem não encontrada: {perkId}</red>"
    perk_on_cooldown: "<red>Esta vantagem está em recarga! {remaining} restante.</red>"
    perk_not_active: "<red>Esta vantagem não está ativa no momento.</red>"
    activate_failed: "<red>Falha ao ativar vantagem: {error}</red>"
    grant_failed: "<red>Falha ao conceder vantagem.</red>"
    reload_failed: "<red>Falha ao recarregar vantagens: {error}</red>"
  success:
    perk_activated: "<green>Vantagem {perkName} ativada!</green>"
    perk_deactivated: "<yellow>Vantagem {perkName} desativada.</yellow>"
    perk_granted: "<green>Vantagem {perkName} concedida a {playerName}!</green>"
    perk_revoked: "<yellow>Vantagem {perkName} revogada de {playerName}.</yellow>"
    perk_unlocked: "<green>Você desbloqueou a vantagem {perkName}!</green>"
    reloaded: "<green>Configuração de vantagens recarregada!</green>"
  activate:
    usage: "<yellow>Uso: /perk activate <perkId></yellow>"
  deactivate:
    usage: "<yellow>Uso: /perk deactivate <perkId></yellow>"
  info:
    usage: "<yellow>Uso: /perk info <perkId></yellow>"
    header: "<yellow>Info da Vantagem: {id}</yellow>"
    details: "<gray>Categoria: {category} | Recarga: {cooldown}s | Duração: {duration}s</gray>"
  list:
    empty: "<yellow>Nenhuma vantagem disponível.</yellow>"
    header: "<yellow>Vantagens Disponíveis ({count}):</yellow>"
    entry: "<gray>• <white>{id}</white> <dark_gray>({category})</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /perk admin <grant|revoke|reload></yellow>"
    unknown: "<red>Comando admin desconhecido.</red>"
    grant:
      usage: "<yellow>Uso: /perk admin grant <jogador> <vantagem></yellow>"
    revoke:
      usage: "<yellow>Uso: /perk admin revoke <jogador> <vantagem></yellow>"
  help: |
    <yellow>Comandos de Vantagem:</yellow>
    <gray>/perk</gray> - Listar vantagens disponíveis
    <gray>/perk activate <vantagem></gray> - Ativar uma vantagem
    <gray>/perk deactivate <vantagem></gray> - Desativar uma vantagem
    <gray>/perk info <vantagem></gray> - Ver detalhes
    <gray>/perk admin</gray> - Comandos admin

gui:
