# RDQ Common Arquivo de Tradução - Português (Brasil)
# Formato MiniMessage com gradientes e estilo
# Marcadores usam formato %placeholder%

# Mensagens do Listener de Recompensas
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Você tem uma recompensa ativa em sua cabeça!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valor da Recompensa:</gradient> <gradient:#10b981:#34d399>R$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expira em:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Comissionado por:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 RECOMPENSA COLETADA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Você coletou com sucesso a recompensa de</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Sua parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Alguém</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>coletou a recompensa de</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% jogadores</gradient> <gradient:#a855f7:#c084fc>coletaram a recompensa de</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Mensagens de Confirmação de Criação de Recompensa
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Recompensa criada com sucesso para</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Erro ao criar recompensa:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Interface de Visão Geral de Recompensas (Menu Principal e Visão Geral)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Sistema de Recompensas</gradient>"
  
  # Botões do menu principal
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Criar Recompensa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clique para criar uma nova recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>em outro jogador</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Ver Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ver todas as recompensas ativas</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Minhas Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ver recompensas que você criou</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Ranking</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Melhores caçadores de recompensas</gradient>"
  
  # Entradas da lista de recompensas
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Recompensa em</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Alvo:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Comissionário:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Criado:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Clique para ver detalhes</gradient>"

# Interface de Criação de Recompensa
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Criar Recompensa</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Selecionar Alvo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clique para escolher um jogador</gradient>"
      - "<gradient:#6b7280:#9ca3af>para colocar uma recompensa</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Adicionar Recompensas</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Clique para adicionar itens</gradient>"
      - "<gradient:#6b7280:#9ca3af>como recompensas</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Selecione um alvo primeiro!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Criar Recompensa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clique para criar a recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>com as recompensas selecionadas</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Recompensa criada com sucesso em</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Interface de Informações do Jogador Recompensa
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Recompensa em</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Alvo desta recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clique para ver informações do jogador</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Ver Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clique para ver todas as recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>por coletar esta recompensa</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Deletar Recompensa</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Aviso: Esta ação</gradient>"
      - "<gradient:#ef4444:#f87171>não pode ser desfeita!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Clique para deletar esta recompensa</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Recompensa em</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>foi deletada!</gradient>"

# Interface de Recompensa de Recompensa
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Recompensas de Recompensa</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Sem Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Adicione itens para criar</gradient>"
      - "<gradient:#6b7280:#9ca3af>recompensas para esta recompensa</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Adicionar Item</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Coloque itens aqui para adicioná-los como recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clique direito para remover itens</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Alvo: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Esta recompensa está colocada em</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Recompensa de Recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>Este item será dado a</gradient>"
      - "<gradient:#6b7280:#9ca3af>quem coletar a recompensa</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Nenhum novo item foi adicionado!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Alguns itens foram derrubados porque seu inventário estava cheio!</gradient>"

# Prefixo
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "  add_curr
encies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Adicionar Moeda</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Clique para adicionar recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>em moeda para a recompensa</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Selecione um alvo primeiro!</gradient>"

# Componentes UI da Plataforma
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Paginação
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Página %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Página atual:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Total de páginas:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Página %direction%</gradient>"

