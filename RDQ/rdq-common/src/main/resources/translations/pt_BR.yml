# Arquivo de tradução RDQ - Inglês (EUA)
# Formato MiniMessage com gradientes e estilos
# Os espaços reservados usam o formato %placeholder%

# ============================================
# PREFIXO GLOBAL
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# CHAVES DE NÍVEL ROOT (usadas por chamadas diretas I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Sem Recompensas</gradient>"
  lore:
  - "<gradient:#6b7280:#9ca3af>Adicione itens para criar recompensas</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Adicionar Item</gradient>"
