# RDQ Common Übersetzungsdatei - Deutsch
# MiniMessage Format mit Farbverläufen und Styling
# Platzhalter verwenden %platzhalter% Format

# Kopfgeld Listener Nachrichten
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du hast ein aktives Kopfgeld auf deinem Kopf!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Kopfgeld Wert:</gradient> <gradient:#10b981:#34d399>%bounty_value%€</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Läuft ab um:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Auftraggeber:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 KOPFGELD EINGELÖST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du hast erfolgreich das Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Dein Anteil:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Jemand</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>hat das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% Spieler</gradient> <gradient:#a855f7:#c084fc>haben das Kopfgeld auf</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient> <gradient:#a855f7:#c084fc>eingelöst!</gradient>"

# Kopfgeld Erstellung Bestätigungsnachrichten
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich aktualisiert für</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Fehler beim Verarbeiten des Kopfgelds:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Kopfgeld wird aktualisiert...</gradient>"

# Gegenstände hinzufügen Button
add_items:
  name: "<gradient:#10b981:#34d399>💰 Gegenstandsbelohnungen hinzufügen</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💰 Gegenstandsbelohnungen hinzufügen</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Klicken um Gegenstandsbelohnungen hinzuzufügen</gradient>"
    - "<gradient:#6b7280:#9ca3af>Aktuelle Gegenstände:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ Wähle zuerst ein Ziel!</gradient>"
    - "<gradient:#6b7280:#9ca3af>Du musst einen Spieler auswählen</gradient>"

# Währung hinzufügen Button  
add_currency:
  name: "<gradient:#f59e0b:#fbbf24>💎 Währungsbelohnungen hinzufügen</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💎 Währungsbelohnungen hinzufügen</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Klicken um Währungsbelohnungen hinzuzufügen</gradient>"
    - "<gradient:#6b7280:#9ca3af>Aktuelle Währungen:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ Wähle zuerst ein Ziel!</gradient>"
    - "<gradient:#6b7280:#9ca3af>Du musst einen Spieler auswählen</gradient>"

# Kopfgeld bestätigen Button
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ Kopfgeld erstellen</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Klicken um das Kopfgeld</gradient>"
    - "<gradient:#6b7280:#9ca3af>mit den gewählten Belohnungen zu erstellen</gradient>"

# Ziel auswählen Button
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Ziel auswählen: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Klicken um einen Spieler</gradient>"
    - "<gradient:#6b7280:#9ca3af>für das Kopfgeld auszuwählen</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Aktuelles Ziel: %target_name%</gradient>"

# Bestätigungsnachrichten
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ Kein Spieler ausgewählt!</gradient> <gradient:#6b7280:#9ca3af>Bitte wähle zuerst ein Ziel aus.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Keine Belohnungen hinzugefügt!</gradient> <gradient:#6b7280:#9ca3af>Bitte füge zuerst Belohnungen hinzu.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Erstelle Kopfgeld auf</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Fehler:</gradient> <gradient:#6b7280:#9ca3af>Zielspieler %target_name% konnte nicht gefunden werden</gradient>"

# Gegenstände zurückgeben Nachricht
left_overs: "<gradient:#f59e0b:#fbbf24>📦 Gegenstände zurückgegeben!</gradient> <gradient:#6b7280:#9ca3af>Einige Gegenstände wurden auf dem Boden fallen gelassen.</gradient>"

# Kopfgeld Übersicht UI (Hauptmenü & Übersicht)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Kopfgeld System</gradient>"
  
  # Hauptmenü Buttons
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Kopfgeld Erstellen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um ein neues Kopfgeld</gradient>"
      - "<gradient:#6b7280:#9ca3af>auf einen anderen Spieler zu setzen</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Kopfgelder Anzeigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Alle aktiven Kopfgelder anzeigen</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Meine Kopfgelder</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Von dir erstellte Kopfgelder anzeigen</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Bestenliste</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Top Kopfgeldjäger</gradient>"
  
  # Kopfgeld Listen Einträge
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ziel:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Auftraggeber:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Erstellt:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Klicke für Details</gradient>"

# Kopfgeld Erstellung UI
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Kopfgeld Erstellen</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Ziel Auswählen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um einen Spieler</gradient>"
      - "<gradient:#6b7280:#9ca3af>für das Kopfgeld auszuwählen</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Belohnungen Hinzufügen</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Klicke um Gegenstände als</gradient>"
      - "<gradient:#6b7280:#9ca3af>Belohnung hinzuzufügen</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Wähle zuerst ein Ziel aus!</gradient>"
  
  add_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Währung Hinzufügen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um Währungsbelohnungen</gradient>"
      - "<gradient:#6b7280:#9ca3af>für das Kopfgeld hinzuzufügen</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Wähle zuerst ein Ziel aus!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Kopfgeld Erstellen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um das Kopfgeld</gradient>"
      - "<gradient:#6b7280:#9ca3af>mit den gewählten Belohnungen zu erstellen</gradient>"
  
  confirm:
    no_player_selected: "<gradient:#ef4444:#f87171>❌ Bitte wähle zuerst einen Zielspieler aus!</gradient>"
    no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Bitte füge mindestens eine Belohnung hinzu!</gradient>"
    confirmation: "<gradient:#a855f7:#c084fc>Erstelle Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#a855f7:#c084fc>...</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ Kopfgeld erfolgreich auf</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>erstellt!</gradient>"

# Kopfgeld Spieler Info UI
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ziel dieses Kopfgeldes</gradient>"
      - "<gradient:#6b7280:#9ca3af>Klicke für Spieler Informationen</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Belohnungen Anzeigen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Klicke um alle Belohnungen</gradient>"
      - "<gradient:#6b7280:#9ca3af>für dieses Kopfgeld zu sehen</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Kopfgeld Löschen</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Warnung: Diese Aktion</gradient>"
      - "<gradient:#ef4444:#f87171>kann nicht rückgängig gemacht werden!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Klicke um dieses Kopfgeld zu löschen</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Kopfgeld auf</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>wurde gelöscht!</gradient>"

# Kopfgeld Belohnung UI
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Kopfgeld Belohnungen</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Keine Belohnungen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Füge Gegenstände hinzu um</gradient>"
      - "<gradient:#6b7280:#9ca3af>Belohnungen für dieses Kopfgeld zu erstellen</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Gegenstand Hinzufügen</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Platziere Gegenstände hier um sie als Belohnung hinzuzufügen</gradient>"
      - "<gradient:#6b7280:#9ca3af>Rechtsklick um Gegenstände zu entfernen</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Ziel: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Dieses Kopfgeld ist auf</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#6b7280:#9ca3af>gesetzt</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Kopfgeld Belohnung</gradient>"
      - "<gradient:#6b7280:#9ca3af>Dieser Gegenstand wird demjenigen gegeben</gradient>"
      - "<gradient:#6b7280:#9ca3af>der das Kopfgeld einlöst</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Keine neuen Gegenstände wurden hinzugefügt!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Einige Gegenstände wurden fallen gelassen da dein Inventar voll war!</gradient>"

# Plattform UI Komponenten
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Paginierung
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Seite %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Aktuelle Seite:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Gesamte Seiten:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Seite %direction%</gradient>"

