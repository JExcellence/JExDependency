    name: "<gradient:#10b981:#34d399>💰 Händler</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Meistere die Kunst des Handels</gradient>"
      - "<gradient:#6b7280:#9ca3af>Baue dein Vermögen auf</gradient>"

