# RDQ-Übersetzungsdatei – Englisch (USA)
# MiniMessage-Format mit Farbverläufen und Stil
# Platzhalter verwenden das %placeholder%-Format

# ============================================
# GLOBALPRÄFIX
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROOT-EBENE-TASTEN (wird von direkten I18n.Builder-Aufrufen verwendet)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Keine Belohnungen</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Füge Gegenstände hinzu, um Belohnungen zu erstellen</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Gegenstand hinzufügen</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Platziere Gegenstände hier als Belohnungen</gradient>"
    - "<gradient:#6b7280:#9ca3af>Linksklick zum Platzieren</gradient>"
    - "<gradient:#6b7280:#9ca3af>Rechtsklick zum Entfernen</gradient>"

# ============================================
# Der Rangbaum zeigt Namen und Beschreibungen an
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Waldläufer</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Meistere die Kunst des Bogenschießens und Spurenlesens</gradient>"
      - "<gradient:#6b7280:#9ca3af>Werde eins mit der Natur</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Krieger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Meistere die Kunst des Kampfes</gradient>"
      - "<gradient:#6b7280:#9ca3af>Werde ein legendärer Kämpfer</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magier</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Nutze die Macht der Magie</gradient>"
      - "<gradient:#6b7280:#9ca3af>Werde ein Meister der Arkanen Künste</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Schurke</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Meistere Heimlichkeit und List</gradient>"
      - "<gradient:#6b7280:#9ca3af>Schlage aus den Schatten zu</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Kleriker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanalisiere göttliche Macht</gradient>"
      - "<gradient:#6b7280:#9ca3af>Heile und beschütze deine Verbündeten</gradient>"
