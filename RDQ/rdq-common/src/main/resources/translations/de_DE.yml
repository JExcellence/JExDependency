# RDQ German (Germany) Translations
# Deutsche Übersetzung für RaindropQuests Plugin

prefix: "<gold>[RDQ]</gold> "

rdq:
  error:
    not_initialized: "<red>RDQ wird noch initialisiert. Bitte warten...</red>"
    unknown_subcommand: "<red>Unbekannter Unterbefehl. Verwende /rdq help für verfügbare Befehle.</red>"
    reload_failed: "<red>Neuladen fehlgeschlagen: {error}</red>"
  success:
    reloaded: "<green>RDQ-Konfiguration erfolgreich neu geladen!</green>"
  help: |
    <yellow>RDQ Befehle:</yellow>
    <gray>/rdq rank</gray> - Rang-Menü öffnen
    <gray>/rdq bounty</gray> - Kopfgeld-Menü öffnen
    <gray>/rdq perk</gray> - Perk-Menü öffnen
    <gray>/rdq reload</gray> - Konfiguration neu laden
  rank:
    opening_gui: "<gray>Öffne Rang-Menü...</gray>"
  bounty:
    opening_gui: "<gray>Öffne Kopfgeld-Menü...</gray>"
  perk:
    opening_gui: "<gray>Öffne Perk-Menü...</gray>"

error:
  not_found: "<red>{type} nicht gefunden: {id}</red>"
  insufficient_funds: "<red>Nicht genug Geld! Benötigt: {required}, Verfügbar: {available}</red>"
  on_cooldown: "<red>Abklingzeit! Noch {remaining} verbleibend.</red>"
  requirements_not_met: "<red>Anforderungen nicht erfüllt: {missing}</red>"
  self_targeting: "<red>Du kannst dich nicht selbst auswählen!</red>"
  already_exists: "<red>{type} existiert bereits: {id}</red>"
  expired: "<red>{type} ist abgelaufen: {id}</red>"
  not_unlocked: "<red>{type} nicht freigeschaltet: {id}</red>"
  permission_denied: "<red>Berechtigung verweigert: {permission}</red>"
  invalid_state: "<red>Ungültiger Zustand: {message}</red>"
  invalid_amount: "<red>Ungültiger Betrag! Muss zwischen {min} und {max} liegen.</red>"
  no_permission: "<red>Du hast keine Berechtigung dafür.</red>"
  player_only: "<red>Dieser Befehl kann nur von Spielern verwendet werden.</red>"

rank:
  error:
    unknown_subcommand: "<red>Unbekannter Rang-Unterbefehl. Verwende /rank help für verfügbare Befehle.</red>"
    player_not_found: "<red>Spieler nicht gefunden: {playerName}</red>"
    grant_failed: "<red>Rang konnte nicht vergeben werden.</red>"
    reload_failed: "<red>Ränge konnten nicht neu geladen werden: {error}</red>"
  success:
    rank_granted: "<green>Rang {rankName} an {playerName} vergeben!</green>"
    rank_revoked: "<yellow>Rang {rankName} von {playerName} entzogen.</yellow>"
    reloaded: "<green>Rang-Konfiguration neu geladen!</green>"
    rank_unlocked: "<green>Herzlichen Glückwunsch! Du hast den Rang {rankName} freigeschaltet!</green>"
  opening_view: "<gray>Öffne Rang-Ansicht...</gray>"
  no_progress: "<yellow>Du hast noch keinen Rang-Pfad begonnen.</yellow>"
  progress_header: "<yellow>Dein Rang-Fortschritt:</yellow>"
  progress_entry: "<gray>• {tree}: <white>{rank}</white></gray>"
  trees_header: "<yellow>Verfügbare Rang-Bäume:</yellow>"
  tree_entry: "<gray>• {id} <dark_gray>({ranks} Ränge)</dark_gray></gray>"
  admin:
    usage: "<yellow>Verwendung: /rank admin <grant|revoke|reload></yellow>"
    unknown: "<red>Unbekannter Admin-Befehl.</red>"
    grant:
      usage: "<yellow>Verwendung: /rank admin grant <spieler> <rang></yellow>"
    revoke:
      usage: "<yellow>Verwendung: /rank admin revoke <spieler> <rang></yellow>"
  help: |
    <yellow>Rang Befehle:</yellow>
    <gray>/rank</gray> - Rang-Menü öffnen
    <gray>/rank view</gray> - Rang-Bäume anzeigen
    <gray>/rank progress</gray> - Fortschritt anzeigen
    <gray>/rank trees</gray> - Verfügbare Bäume auflisten
    <gray>/rank admin</gray> - Admin-Befehle
  notification:
    title: "<gold>Rang Freigeschaltet!</gold>"
    subtitle: "<yellow>{rankName}</yellow>"
    actionbar: "<green>Du hast {rankName} freigeschaltet!</green>"

bounty:
  error:
    unknown_subcommand: "<red>Unbekannter Kopfgeld-Unterbefehl. Verwende /bounty help für verfügbare Befehle.</red>"
    player_not_found: "<red>Spieler nicht gefunden: {playerName}</red>"
    self_target: "<red>Du kannst kein Kopfgeld auf dich selbst setzen!</red>"
    invalid_amount: "<red>Ungültiger Betrag. Bitte gib eine gültige Zahl ein.</red>"
    invalid_id: "<red>Ungültige Kopfgeld-ID.</red>"
    create_failed: "<red>Kopfgeld konnte nicht erstellt werden: {error}</red>"
    cancel_failed: "<red>Kopfgeld konnte nicht storniert werden. Du besitzt dieses Kopfgeld möglicherweise nicht.</red>"
  success:
    bounty_created: "<green>Kopfgeld von {amount} auf {targetName} gesetzt!</green>"
    bounty_cancelled: "<yellow>Kopfgeld storniert. Geld zurückerstattet.</yellow>"
    bounty_removed: "<green>Kopfgeld vom Admin entfernt.</green>"
    bounty_claimed: "<green>Du hast ein Kopfgeld im Wert von {amount} eingefordert!</green>"
    reloaded: "<green>Kopfgeld-Konfiguration neu geladen!</green>"
  create:
    usage: "<yellow>Verwendung: /bounty create <spieler> <betrag></yellow>"
  cancel:
    usage: "<yellow>Verwendung: /bounty cancel <kopfgeldId></yellow>"
  list:
    empty: "<yellow>Keine aktiven Kopfgelder.</yellow>"
    header: "<yellow>Aktive Kopfgelder ({count}):</yellow>"
    entry: "<gray>• <white>{target}</white> - {amount} <dark_gray>(von {placer})</dark_gray></gray>"
  leaderboard:
    header: "<yellow>Kopfgeldjäger-Rangliste:</yellow>"
    entry: "<gray>{rank}. <white>{player}</white> - {kills} Kills, {earned} verdient</gray>"
  my:
    header: "<yellow>Deine Kopfgelder:</yellow>"
    placed_header: "<gray>Von dir gesetzte Kopfgelder:</gray>"
    placed_entry: "<gray>• <white>{target}</white> - {amount}</gray>"
    targeted_header: "<gray>Kopfgelder auf dich:</gray>"
    targeted_entry: "<gray>• {amount} <dark_gray>(von {placer})</dark_gray></gray>"
  admin:
    usage: "<yellow>Verwendung: /bounty admin <remove|reload></yellow>"
    unknown: "<red>Unbekannter Admin-Befehl.</red>"
    remove:
      usage: "<yellow>Verwendung: /bounty admin remove <kopfgeldId></yellow>"
  help: |
    <yellow>Kopfgeld Befehle:</yellow>
    <gray>/bounty</gray> - Aktive Kopfgelder auflisten
    <gray>/bounty create <spieler> <betrag></gray> - Kopfgeld erstellen
    <gray>/bounty cancel <id></gray> - Kopfgeld stornieren
    <gray>/bounty leaderboard</gray> - Top-Jäger anzeigen
    <gray>/bounty my</gray> - Deine Kopfgelder anzeigen
    <gray>/bounty admin</gray> - Admin-Befehle
  announcement:
    created: "<yellow>{placer} hat ein Kopfgeld von {amount} auf {target} gesetzt!</yellow>"
    claimed: "<green>{hunter} hat das Kopfgeld auf {target} im Wert von {amount} eingefordert!</green>"
    expired: "<gray>Kopfgeld auf {target} ist abgelaufen.</gray>"

perk:
  error:
    unknown_subcommand: "<red>Unbekannter Perk-Unterbefehl. Verwende /perk help für verfügbare Befehle.</red>"
    player_not_found: "<red>Spieler nicht gefunden: {playerName}</red>"
    perk_not_found: "<red>Perk nicht gefunden: {perkId}</red>"
    perk_on_cooldown: "<red>Dieser Perk hat Abklingzeit! Noch {remaining} verbleibend.</red>"
    perk_not_active: "<red>Dieser Perk ist derzeit nicht aktiv.</red>"
    activate_failed: "<red>Perk konnte nicht aktiviert werden: {error}</red>"
    grant_failed: "<red>Perk konnte nicht vergeben werden.</red>"
    reload_failed: "<red>Perks konnten nicht neu geladen werden: {error}</red>"
  success:
    perk_activated: "<green>Perk {perkName} aktiviert!</green>"
    perk_deactivated: "<yellow>Perk {perkName} deaktiviert.</yellow>"
    perk_granted: "<green>Perk {perkName} an {playerName} vergeben!</green>"
    perk_revoked: "<yellow>Perk {perkName} von {playerName} entzogen.</yellow>"
    perk_unlocked: "<green>Du hast den Perk {perkName} freigeschaltet!</green>"
    reloaded: "<green>Perk-Konfiguration neu geladen!</green>"
  activate:
    usage: "<yellow>Verwendung: /perk activate <perkId></yellow>"
  deactivate:
    usage: "<yellow>Verwendung: /perk deactivate <perkId></yellow>"
  info:
    usage: "<yellow>Verwendung: /perk info <perkId></yellow>"
    header: "<yellow>Perk Info: {id}</yellow>"
    details: "<gray>Kategorie: {category} | Abklingzeit: {cooldown}s | Dauer: {duration}s</gray>"
  list:
    empty: "<yellow>Keine Perks verfügbar.</yellow>"
    header: "<yellow>Verfügbare Perks ({count}):</yellow>"
    entry: "<gray>• <white>{id}</white> <dark_gray>({category})</dark_gray></gray>"
  admin:
    usage: "<yellow>Verwendung: /perk admin <grant|revoke|reload></yellow>"
    unknown: "<red>Unbekannter Admin-Befehl.</red>"
    grant:
      usage: "<yellow>Verwendung: /perk admin grant <spieler> <perk></yellow>"
    revoke:
      usage: "<yellow>Verwendung: /perk admin revoke <spieler> <perk></yellow>"
  help: |
    <yellow>Perk Befehle:</yellow>
    <gray>/perk</gray> - Verfügbare Perks auflisten
    <gray>/perk activate <perk></gray> - Perk aktivieren
    <gray>/perk deactivate <perk></gray> - Perk deaktivieren
    <gray>/perk info <perk></gray> - Perk-Details anzeigen
    <gray>/perk admin</gray> - Admin-Befehle

