  confirm:
    success: "<gradient:#10b981:#34d399>✅ Palkkio luotiin onnistuneesti kohteelle</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
