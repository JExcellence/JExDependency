# RDQ-käännöstiedosto - englanti (Yhdysvallat)
# MiniMessage-muoto liukuväreillä ja tyyleillä
# Paikkamerkit käyttävät muotoa %placeholder%

# ============================================
# YLEINEN ETULIITE
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# JUURITASON AVAIMET (käytetään suorissa I18n.Builder-kutsuissa)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ei palkkioita</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Lisää esineitä luodaksesi palkintoja</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Lisää esine</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Aseta esineet tähän lisätäksesi ne palkinnoiksi</gradient>"
    - "<gradient:#6b7280:#9ca3af>Aseta esine vasemmalla napsautuksella</gradient>"
    - "<gradient:#6b7280:#9ca3af>Poista esine oikealla napsautuksella</gradient>"

# ============================================
# ARVOPUUN NÄYTTÖNIMET JA KUVAUKSET
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Eränkävijä</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Hallitse jousiammunta ja jäljitys</gradient>"
      - "<gradient:#6b7280:#9ca3af>Tule yhdeksi luonnon kanssa</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Soturi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Hallitse taistelun taito</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ryhdy legendaariseksi taistelijaksi</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Maagi</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Valjasta taikuuden voima</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ryhdy arkaanien mestariksi</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Roisto</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Hallitse hiiviskelyn ja viekkauden taito</gradient>"
      - "<gradient:#6b7280:#9ca3af>Lyö varjoista</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Klerikki</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanavoi jumalallista voimaa</gradient>"
      - "<gradient:#6b7280:#9ca3af>Paranna ja suojele liittolaisiasi</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Kauppias</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Hallitse kaupan taito</gradient>"
      - "<gradient:#6b7280:#9ca3af>Rakenna omaisuutesi</gradient>"

