  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Vaatimukset puutteelliset kohteelle</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% täydellinen)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Vaatimus epätäydellinen:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>ei ole vaatimuksia!</gradient>"

