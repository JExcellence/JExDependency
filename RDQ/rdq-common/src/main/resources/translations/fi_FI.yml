  default:
    name: "<gradient:#6b7280:#9ca3af>Arvoton</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Aloita valitsemalla arvopolku</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Arvoton</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Oletusarvoinen arvo</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Arvoa ei ole valittu</gradient>"
  # Eränkävijä-puun arvot
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Metsästäjä</gradient>"
