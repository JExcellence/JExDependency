# ============================================
# PALKKIOKUULIJAN VIESTIT
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Sinun päällesi on asetettu aktiivinen palkkio!</gradient>"
