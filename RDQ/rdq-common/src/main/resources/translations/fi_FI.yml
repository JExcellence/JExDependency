    expires: "<gradient:#f59e0b:#fbbf24>⏰ Päättyy:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Tilaaja:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 PALKKIO LUNASTETTU! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Lunastit onnistuneesti palkkion kohteesta</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
