      lore:
        - "<gradient:#6b7280:#9ca3af>Leder af handelsgildeet</gradient>"

# ============================================
# BUNTY-LYTTERBESKEDELSER
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Du har en aktiv dusør på dit hoved!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Dusørværdi:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Udløber:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Bestiller:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 DUSØR INDLØST! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Du har indløst dusøren på</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Din andel:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Nogen</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>har indløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% spillere</gradient> <gradient:#a855f7:#c084fc>har indløst dusøren på</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# BUDSKABER OM BUDSKABET TIL BUNTY
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Dusør oprettet for</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
