# RDQ Danish Translations
prefix: "<gold>[RDQ]</gold> "

rdq:
  error:
    not_initialized: "<red>RDQ initialiseres. Vent venligst...</red>"
    unknown_subcommand: "<red>Ukendt underkommando. Brug /rdq help.</red>"
    reload_failed: "<red>Genindlæsning mislykkedes: {error}</red>"
  success:
    reloaded: "<green>RDQ-konfiguration genindlæst!</green>"

error:
  not_found: "<red>{type} ikke fundet: {id}</red>"
  insufficient_funds: "<red>Utilstrækkelige midler! Krævet: {required}, Tilgængelig: {available}</red>"
  on_cooldown: "<red>Nedkøling! {remaining} tilbage.</red>"
  requirements_not_met: "<red>Krav ikke opfyldt: {missing}</red>"
  self_targeting: "<red>Du kan ikke vælge dig selv!</red>"
  already_exists: "<red>{type} eksisterer allerede: {id}</red>"
  expired: "<red>{type} er udløbet: {id}</red>"
  not_unlocked: "<red>{type} ikke låst op: {id}</red>"
  permission_denied: "<red>Tilladelse nægtet: {permission}</red>"
  invalid_state: "<red>Ugyldig tilstand: {message}</red>"
  invalid_amount: "<red>Ugyldigt beløb! Skal være mellem {min} og {max}.</red>"
  no_permission: "<red>Du har ikke tilladelse.</red>"
  player_only: "<red>Denne kommando er kun for spillere.</red>"

rank:
  error:
    unknown_subcommand: "<red>Ukendt rang-underkommando.</red>"
    player_not_found: "<red>Spiller ikke fundet: {playerName}</red>"
    grant_failed: "<red>Kunne ikke give rang.</red>"
    reload_failed: "<red>Kunne ikke genindlæse ranger: {error}</red>"
  success:
    rank_granted: "<green>Rang {rankName} givet til {playerName}!</green>"
    rank_revoked: "<yellow>Rang {rankName} tilbagekaldt fra {playerName}.</yellow>"
    reloaded: "<green>Rang-konfiguration genindlæst!</green>"
    rank_unlocked: "<green>Tillykke! Du låste rang {rankName} op!</green>"
  opening_view: "<gray>Åbner rangvisning...</gray>"
  no_progress: "<yellow>Du har ikke startet nogen rangsti endnu.</yellow>"
  progress_header: "<yellow>Din Rangprogression:</yellow>"
  progress_entry: "<gray>• {tree}: <white>{rank}</white></gray>"
  trees_header: "<yellow>Tilgængelige Rangtræer:</yellow>"
  tree_entry: "<gray>• {id} <dark_gray>({ranks} ranger)</dark_gray></gray>"
  admin:
    usage: "<yellow>Brug: /rank admin <grant|revoke|reload></yellow>"
    unknown: "<red>Ukendt admin-kommando.</red>"
    grant:
      usage: "<yellow>Brug: /rank admin grant <spiller> <rang></yellow>"
    revoke:
      usage: "<yellow>Brug: /rank admin revoke <spiller> <rang></yellow>"
  help: |
    <yellow>Rangkommandoer:</yellow>
    <gray>/rank</gray> - Åbn rangmenu
    <gray>/rank view</gray> - Vis rangtræer
    <gray>/rank progress</gray> - Vis progression
    <gray>/rank admin</gray> - Admin-kommandoer
  notification:
    title: "<gold>Rang Låst Op!</gold>"
    subtitle: "<yellow>{rankName}</yellow>"
    actionbar: "<green>Du låste {rankName} op!</green>"

bounty:
  error:
    unknown_subcommand: "<red>Ukendt dusør-underkommando.</red>"
    player_not_found: "<red>Spiller ikke fundet: {playerName}</red>"
    self_target: "<red>Du kan ikke sætte dusør på dig selv!</red>"
    invalid_amount: "<red>Ugyldigt beløb.</red>"
    invalid_id: "<red>Ugyldigt dusør-ID.</red>"
    create_failed: "<red>Kunne ikke oprette dusør: {error}</red>"
    cancel_failed: "<red>Kunne ikke annullere dusør.</red>"
  success:
    bounty_created: "<green>Dusør på {amount} placeret på {targetName}!</green>"
    bounty_cancelled: "<yellow>Dusør annulleret. Midler refunderet.</yellow>"
    bounty_removed: "<green>Dusør fjernet af admin.</green>"
    bounty_claimed: "<green>Du fik en dusør på {amount}!</green>"
    reloaded: "<green>Dusør-konfiguration genindlæst!</green>"
  create:
    usage: "<yellow>Brug: /bounty create <spiller> <beløb></yellow>"
  cancel:
    usage: "<yellow>Brug: /bounty cancel <dusørId></yellow>"
  list:
    empty: "<yellow>Ingen aktive dusører.</yellow>"
    header: "<yellow>Aktive Dusører ({count}):</yellow>"
    entry: "<gray>• <white>{target}</white> - {amount} <dark_gray>(af {placer})</dark_gray></gray>"
  leaderboard:
    header: "<yellow>Dusørjæger Toppliste:</yellow>"
    entry: "<gray>{rank}. <white>{player}</white> - {kills} drab, {earned} tjent</gray>"
  my:
    header: "<yellow>Dine Dusører:</yellow>"
    placed_header: "<gray>Dusører du har placeret:</gray>"
    placed_entry: "<gray>• <white>{target}</white> - {amount}</gray>"
    targeted_header: "<gray>Dusører på dig:</gray>"
    targeted_entry: "<gray>• {amount} <dark_gray>(af {placer})</dark_gray></gray>"
  admin:
    usage: "<yellow>Brug: /bounty admin <remove|reload></yellow>"
    unknown: "<red>Ukendt admin-kommando.</red>"
    remove:
      usage: "<yellow>Brug: /bounty admin remove <dusørId></yellow>"
  help: |
    <yellow>Dusørkommandoer:</yellow>
    <gray>/bounty</gray> - List aktive dusører
    <gray>/bounty create <spiller> <beløb></gray> - Opret dusør
    <gray>/bounty cancel <id></gray> - Annuller dusør
    <gray>/bounty leaderboard</gray> - Toppliste
    <gray>/bounty my</gray> - Dine dusører
  announcement:
    created: "<yellow>{placer} placerede en dusør på {amount} på {target}!</yellow>"
    claimed: "<green>{hunter} fik dusøren på {target} til en værdi af {amount}!</green>"
    expired: "<gray>Dusør på {target} er udløbet.</gray>"

perk:
  error:
    unknown_subcommand: "<red>Ukendt perk-underkommando.</red>"
    player_not_found: "<red>Spiller ikke fundet: {playerName}</red>"
    perk_not_found: "<red>Perk ikke fundet: {perkId}</red>"
    perk_on_cooldown: "<red>Denne perk er på nedkøling! {remaining} tilbage.</red>"
    perk_not_active: "<red>Denne perk er ikke aktiv.</red>"
    activate_failed: "<red>Kunne ikke aktivere perk: {error}</red>"
    grant_failed: "<red>Kunne ikke give perk.</red>"
    reload_failed: "<red>Kunne ikke genindlæse perks: {error}</red>"
  success:
    perk_activated: "<green>Perk {perkName} aktiveret!</green>"
    perk_deactivated: "<yellow>Perk {perkName} deaktiveret.</yellow>"
    perk_granted: "<green>Perk {perkName} givet til {playerName}!</green>"
    perk_revoked: "<yellow>Perk {perkName} tilbagekaldt fra {playerName}.</yellow>"
    perk_unlocked: "<green>Du låste perk {perkName} op!</green>"
    reloaded: "<green>Perk-konfiguration genindlæst!</green>"
  activate:
    usage: "<yellow>Brug: /perk activate <perkId></yellow>"
  deactivate:
    usage: "<yellow>Brug: /perk deactivate <perkId></yellow>"
  info:
    usage: "<yellow>Brug: /perk info <perkId></yellow>"
    header: "<yellow>Perk Info: {id}</yellow>"
    details: "<gray>Kategori: {category} | Nedkøling: {cooldown}s | Varighed: {duration}s</gray>"
  list:
    empty: "<yellow>Ingen perks tilgængelige.</yellow>"
    header: "<yellow>Tilgængelige Perks ({count}):</yellow>"
    entry: "<gray>• <white>{id}</white> <dark_gray>({category})</dark_gray></gray>"
  admin:
    usage: "<yellow>Brug: /perk admin <grant|revoke|reload></yellow>"
    unknown: "<red>Ukendt admin-kommando.</red>"
    grant:
      usage: "<yellow>Brug: /perk admin grant <spiller> <perk></yellow>"
    revoke:
      usage: "<yellow>Brug: /perk admin revoke <spiller> <perk></yellow>"
  help: |
    <yellow>Perkkommandoer:</yellow>
    <gray>/perk</gray> - List tilgængelige perks
    <gray>/perk activate <perk></gray> - Aktiver perk
    <gray>/perk deactivate <perk></gray> - Deaktiver perk
    <gray>/perk info <perk></gray> - Perkdetaljer

gui:
  common:
    back: "<yellow>← Tilbage</yellow>"
    close: "<red>Luk</red>"
    next_page: "<yellow>Næste Side →</yellow>"
    previous_page: "<yellow>← Forrige Side</yellow>"
    page_info: "<gray>Side {current}/{total}</gray>"
    loading: "<gray>Indlæser...</gray>"
    confirm: "<green>Bekræft</green>"
    cancel: "<red>Annuller</red>"

