  help: "<gradient:#a855f7:#c084fc>📖 RaindropQuests Hjælp</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Åbn hovedmenu</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Vis rangeringer</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Vis dusører</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Skift frynsegode-sidepanelet</gradient>"
