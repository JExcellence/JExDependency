# RDQ Oversættelsesfil - Dansk (Danmark)
# MiniMessage format med gradienter og styling
# Pladsholdere bruger %placeholder% format

# ============================================
# GLOBALT PRÆFIKS
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# ROOT LEVEL KEYS
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ingen Belønninger</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Tilføj genstande for at oprette belønninger</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Tilføj Genstand</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placer genstande her som belønninger</gradient>"
    - "<gradient:#6b7280:#9ca3af>Venstreklik for at placere</gradient>"
    - "<gradient:#6b7280:#9ca3af>Højreklik for at fjerne</gradient>"

# ============================================
# RANG-TRÆ VISNINGSNAVNE & BESKRIVELSER
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at skyde med bue og spore</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv ét med naturen</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Kriger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at kæmpe</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv en legendarisk kriger</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Udnyt magiens kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv en mester i de arkane kunster</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Slyngel</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester snighed og list</gradient>"
      - "<gradient:#6b7280:#9ca3af>Slå til fra skyggerne</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Kleriker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliser guddommelig kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Helbred og beskyt dine allierede</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelsmand</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at handle</gradient>"
      - "<gradient:#6b7280:#9ca3af>Opbyg din formue</gradient>"

