# RDQ-oversættelsesfil - engelsk (US)
# MiniMessage-format med gradienter og styling
# Pladsholdere bruger %placeholder% format

# ============================================
# GLOBALT PRÆFIKS
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# RODNIVEAUTASTER (bruges af direkte I18n.Builder-kald)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Ingen Belønninger</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Tilføj genstande for at oprette belønninger</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Tilføj Genstand</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placer genstande her som belønninger</gradient>"
    - "<gradient:#6b7280:#9ca3af>Venstreklik for at placere</gradient>"
    - "<gradient:#6b7280:#9ca3af>Højreklik for at fjerne</gradient>"

# ============================================
# RANGTRÆ-VISNINGSNAVNE OG BESKRIVELSER
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Ranger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at skyde med bue og spore</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv ét med naturen</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Kriger</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at kæmpe</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv en legendarisk kriger</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Magiker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Udnyt magiens kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Bliv en mester i de arkane kunster</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Slyngel</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester snighed og list</gradient>"
      - "<gradient:#6b7280:#9ca3af>Slå til fra skyggerne</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Kleriker</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Kanaliser guddommelig kraft</gradient>"
      - "<gradient:#6b7280:#9ca3af>Helbred og beskyt dine allierede</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Handelsmand</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mester kunsten at handle</gradient>"
      - "<gradient:#6b7280:#9ca3af>Opbyg din formue</gradient>"

# ============================================
# RANG-VISNINGSNAVNE OG BESKRIVELSER
# ============================================
rank:

  # ============================================
  # RANGMEDDELELSER
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 RANK OP!</gradient> <gradient:#6b7280:#9ca3af>Du har opfyldt alle krav til</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Brug rangmenuen til at gøre krav på din rangopgradering!</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Uden Rang</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Vælg en rangsti for at begynde</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Uden Rang</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Standard Rang</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ingen rang valgt</gradient>"
  # Rangertræ-ranger
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Jæger</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En nybegynder sporfinder der lærer vildmarkens veje</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Bueskytte</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dygtig med buen, dødelig på afstand</gradient>"
    tracker:
      name: "<gradient:#3b82f6:#60a5fa>🔍 Sporfinder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ekspert i at finde og følge bytte</gradient>"
    marksman:
      name: "<gradient:#f59e0b:#fbbf24>🎯 Skytte</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Præcisionsskytte med dødelig nøjagtighed</gradient>"
    pathfinder:
      name: "<gradient:#a855f7:#c084fc>🗺 Stifinder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester-opdagelsesrejsende af ukendte lande</gradient>"
    sniper:
      name: "<gradient:#ef4444:#f87171>🎯 Snigskytte</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Elite skytte, ét skud ét drab</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Skovherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester af vildmarken, ét med naturen</gradient>"
  # Krigertræet rangerer
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>⚔ Rekrut</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>En ny kriger der begynder sin rejse</gradient>"
        - "<gradient:#6b7280:#9ca3af>Lær det grundlæggende i kamp</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>⚔ Soldat</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Trænet i kampens kunst</gradient>"
        - "<gradient:#6b7280:#9ca3af>Klar til kamp</gradient>"
    veteran:
      name: "<gradient:#f59e0b:#fbbf24>Veteran</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Kamphærdet kriger</gradient>"
        - "<gradient:#6b7280:#9ca3af>Vælg din specialiseringsvej</gradient>"
    # Specialisering gren 1: Bersærker (offensiv)
    berserker:
      name: "<gradient:#ef4444:#f87171>Bersærker</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Vredeens vej</gradient>"
        - "<gradient:#6b7280:#9ca3af>Slip ødelæggende angreb løs</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ofre forsvar for rå magt</gradient>"
    # Specialisering gren 2: Guardian (defensiv)
    guardian:
      name: "<gradient:#3b82f6:#60a5fa>Værge</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Beskyttelsens vej</gradient>"
        - "<gradient:#6b7280:#9ca3af>Bliv et ubrydeligt skjold</gradient>"
        - "<gradient:#6b7280:#9ca3af>Beskyt dine allierede for enhver pris</gradient>"
    # Specialisering gren 3: Gladiator (afbalanceret)
    gladiator:
      name: "<gradient:#a855f7:#c084fc>Gladiator</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ærens vej</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mester i arenakamp</gradient>"
        - "<gradient:#6b7280:#9ca3af>Balancer angreb og forsvar</gradient>"
    # Endelige rangeringer
    warlord_fury:
      name: "<gradient:#ef4444:#f87171>Warlord of Fury</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>Ultimativ bersærk</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ustoppelig ødelæggelseskraft</gradient>"
        - "<gradient:#6b7280:#9ca3af>Frygt inkarnerer på slagmarken</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Skjoldets krigsherre</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Ultimativ vogter</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ubevægelig genstand, evig beskytter</gradient>"
        - "<gradient:#6b7280:#9ca3af>Ingen skal passere, mens du står</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Arenaens krigsherre</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Ultimativ gladiator</gradient>"
        - "<gradient:#6b7280:#9ca3af>Mester over mestre</gradient>"
        - "<gradient:#6b7280:#9ca3af>Arenaens legende</gradient>"
    # Ældre ranger (for bagudkompatibilitet)
    knight:
      name: "<gradient:#f59e0b:#fbbf24>⚔ Ridder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ærefuld kriger af riget</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>⚔ Mester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Legendarisk kriger, frygtet af alle</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>⚔ Krigsherre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester af krig, hærfører</gradient>"
  # Mage Træ rangerer
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Lærling</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Lærer det grundlæggende i magi</gradient>"
    adept:
      name: "<gradient:#3b82f6:#60a5fa>✨ Adept</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Vokser i magisk kraft</gradient>"
    wizard:
      name: "<gradient:#f59e0b:#fbbf24>✨ Troldmand</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester af de arkane kunster</gradient>"
    archmage:
      name: "<gradient:#ef4444:#f87171>✨ Ærkemagiker</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Øverste mester af al magi</gradient>"
  # Slyngeltræ-ranger
  rogue:
    pickpocket:
      name: "<gradient:#6b7280:#9ca3af>🗡 Lommetyv</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Hurtige fingre, hurtigere flugt</gradient>"
    thief:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Tyv</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester i snighed og tyveri</gradient>"
    scout:
      name: "<gradient:#10b981:#34d399>🗡 Spejder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Skyggernes øjne og ører</gradient>"
    assassin:
      name: "<gradient:#ef4444:#f87171>🗡 Snigmorder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Stille dræber, død fra skyggerne</gradient>"
    infiltrator:
      name: "<gradient:#a855f7:#c084fc>🗡 Infiltrator</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ekspert i at komme ind og ud uopdaget</gradient>"
    shadowblade:
      name: "<gradient:#6b7280:#9ca3af>🗡 Skyggeblad</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Dødelig kriger af natten</gradient>"
    spymaster:
      name: "<gradient:#3b82f6:#60a5fa>🗡 Spionmester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Kontrollør af informationsnetværk</gradient>"
    shadow_master:
      name: "<gradient:#1f2937:#374151>🗡 Skyggemester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ét med mørket selv</gradient>"
    shadowmaster:
      name: "<gradient:#1f2937:#374151>🗡 Skyggemester</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Øverste hersker af alle skygger</gradient>"
  # Præstetræet rangerer
  cleric:
    acolyte:
      name: "<gradient:#f59e0b:#fbbf24>✝ Akolyt</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Hengiven tjener af det guddommelige</gradient>"
    devotee:
      name: "<gradient:#f59e0b:#fbbf24>✝ Tilhænger</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Trofast følger af den guddommelige vej</gradient>"
    priest:
      name: "<gradient:#10b981:#34d399>✝ Præst</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Helbreder og beskytter af de troende</gradient>"
    healer:
      name: "<gradient:#10b981:#34d399>✝ Helbreder</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Mester af helbredende kunster</gradient>"
    bishop:
      name: "<gradient:#a855f7:#c084fc>✝ Biskop</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Leder af de troende</gradient>"
    oracle:
      name: "<gradient:#3b82f6:#60a5fa>✝ Orakel</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Seer af guddommelige visioner</gradient>"
    high_priest:
      name: "<gradient:#ef4444:#f87171>✝ Ypperstepræst</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Øverste stemme af det guddommelige</gradient>"
  # Købmandstræ rangerer
  merchant:
    peddler:
      name: "<gradient:#6b7280:#9ca3af>💰 Bissekræmmer</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Sælger varer på gaden</gradient>"
    trader:
      name: "<gradient:#3b82f6:#60a5fa>💰 Handlende</gradient>"
