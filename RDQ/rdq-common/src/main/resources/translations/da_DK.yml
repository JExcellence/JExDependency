  processing: "<gradient:#f59e0b:#fbbf24>⏳ Behandler dusør...</gradient>"

# ============================================
# RANGPROGRESSIONSMEDDELELSER
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Fremskridt startet for rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Viser krav for</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufuldstændige for</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% fuldført)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Krav ufuldstændigt:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>har ingen krav!</gradient>"

# ============================================
# RANGKLIK-MEDDELELSER
