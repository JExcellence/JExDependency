      name: "<gradient:#6b7280:#9ca3af>Sin Rango</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Rango Predeterminado</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Ningún rango seleccionado</gradient>"
