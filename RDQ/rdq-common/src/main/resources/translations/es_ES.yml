# RDQ Common Archivo de Traducción - Español
# Formato MiniMessage con gradientes y estilo
# Los marcadores de posición usan formato %placeholder%

# Mensajes del Listener de Recompensas
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>¡Tienes una recompensa activa sobre tu cabeza!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valor de la Recompensa:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expira en:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Comisionado por:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 ¡RECOMPENSA RECLAMADA! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>¡Has reclamado exitosamente la recompensa de</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Tu parte:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Alguien</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>ha reclamado la recompensa de</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% jugadores</gradient> <gradient:#a855f7:#c084fc>han reclamado la recompensa de</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Mensajes de Confirmación de Creación de Recompensa
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Recompensa creada exitosamente en</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Error al crear la recompensa:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Botón Agregar Objetos
add_items:
  name: "<gradient:#10b981:#34d399>💰 Agregar Recompensas de Objetos</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💰 Agregar Recompensas de Objetos</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Clic para agregar recompensas de objetos</gradient>"
    - "<gradient:#6b7280:#9ca3af>Objetos actuales:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ ¡Selecciona un objetivo primero!</gradient>"
    - "<gradient:#6b7280:#9ca3af>Necesitas elegir un jugador</gradient>"

# Botón Agregar Moneda  
add_currency:
  name: "<gradient:#f59e0b:#fbbf24>💎 Agregar Recompensas de Moneda</gradient>"
  name_disabled: "<gradient:#6b7280:#9ca3af>💎 Agregar Recompensas de Moneda</gradient>"
  description:
    - "<gradient:#6b7280:#9ca3af>Clic para agregar recompensas de moneda</gradient>"
    - "<gradient:#6b7280:#9ca3af>Monedas actuales:</gradient> <gradient:#f59e0b:#fbbf24>%count%</gradient>"
  description_disabled:
    - "<gradient:#ef4444:#f87171>❌ ¡Selecciona un objetivo primero!</gradient>"
    - "<gradient:#6b7280:#9ca3af>Necesitas elegir un jugador</gradient>"

# Botón Confirmar Recompensa
confirm_bounty:
  name: "<gradient:#10b981:#34d399>✅ Crear Recompensa</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Clic para crear la recompensa</gradient>"
    - "<gradient:#6b7280:#9ca3af>con las recompensas seleccionadas</gradient>"

# Botón Seleccionar Objetivo
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Seleccionar Objetivo: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Clic para elegir un jugador</gradient>"
    - "<gradient:#6b7280:#9ca3af>para poner una recompensa</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Objetivo actual: %target_name%</gradient>"

# Mensajes de Confirmación
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ ¡Ningún jugador seleccionado!</gradient> <gradient:#6b7280:#9ca3af>Por favor selecciona un objetivo primero.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ ¡No se agregaron recompensas!</gradient> <gradient:#6b7280:#9ca3af>Por favor agrega algunas recompensas primero.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Creando recompensa en</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Error:</gradient> <gradient:#6b7280:#9ca3af>No se pudo encontrar el jugador objetivo %target_name%</gradient>"

# Mensaje de Devolución de Objetos
left_overs: "<gradient:#f59e0b:#fbbf24>📦 ¡Objetos devueltos!</gradient> <gradient:#6b7280:#9ca3af>Algunos objetos fueron soltados en el suelo.</gradient>"

# Interfaz de Vista General de Recompensas (Menú Principal y Vista General)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Sistema de Recompensas</gradient>"
  
  # Botones del menú principal
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Crear Recompensa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haz clic para crear una nueva recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>sobre otro jugador</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Ver Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ver todas las recompensas activas</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Mis Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ver recompensas que has creado</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Tabla de Clasificación</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Mejores cazarrecompensas</gradient>"
  
  # Entradas de la lista de recompensas
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Recompensa sobre</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Objetivo:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Comisionado:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Creado:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Haz clic para ver detalles</gradient>"

# Interfaz de Creación de Recompensas
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Crear Recompensa</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Seleccionar Objetivo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haz clic para elegir un jugador</gradient>"
      - "<gradient:#6b7280:#9ca3af>sobre el cual poner una recompensa</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Agregar Recompensas</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Haz clic para agregar objetos</gradient>"
      - "<gradient:#6b7280:#9ca3af>como recompensas</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ ¡Selecciona un objetivo primero!</gradient>"
  
  add_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Agregar Moneda</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haz clic para agregar recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>de moneda para la recompensa</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ ¡Selecciona un objetivo primero!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Crear Recompensa</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haz clic para crear la recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>con las recompensas seleccionadas</gradient>"
  
  confirm:
    error: "<gradient:#ef4444:#f87171>❌ %error_message%</gradient>"
    success: "<gradient:#10b981:#34d399>✅ ¡Recompensa creada exitosamente sobre</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"

# Interfaz de Información del Jugador Recompensa
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Recompensa sobre</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Objetivo de esta recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>Haz clic para ver información del jugador</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Ver Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Haz clic para ver todas las recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>por reclamar esta recompensa</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Eliminar Recompensa</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Advertencia: Esta acción</gradient>"
      - "<gradient:#ef4444:#f87171>¡no se puede deshacer!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Haz clic para eliminar esta recompensa</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ ¡Recompensa sobre</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>ha sido eliminada!</gradient>"

# Interfaz de Recompensa de Recompensa
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Recompensas de Recompensa</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Sin Recompensas</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Agrega objetos para crear</gradient>"
      - "<gradient:#6b7280:#9ca3af>recompensas para esta recompensa</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Agregar Objeto</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Coloca objetos aquí para agregarlos como recompensas</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clic derecho para quitar objetos</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Objetivo: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Esta recompensa está puesta sobre</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Recompensa de Recompensa</gradient>"
      - "<gradient:#6b7280:#9ca3af>Este objeto será dado a</gradient>"
      - "<gradient:#6b7280:#9ca3af>quien reclame la recompensa</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ ¡No se agregaron nuevos objetos!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ ¡Algunos objetos fueron soltados porque tu inventario estaba lleno!</gradient>"

# Prefijo
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "# Compo
nentes UI de la Plataforma
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Paginación
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Página %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Página actual:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Páginas totales:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Página %direction%</gradient>"

