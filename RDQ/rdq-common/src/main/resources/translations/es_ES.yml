# RDQ Spanish (Spain) Translations
# Traducción al español para el plugin RaindropQuests

prefix: "<gold>[RDQ]</gold> "

rdq:
  error:
    not_initialized: "<red>RDQ se está inicializando. Por favor espera...</red>"
    unknown_subcommand: "<red>Subcomando desconocido. Usa /rdq help para ver los comandos disponibles.</red>"
    reload_failed: "<red>Error al recargar: {error}</red>"
  success:
    reloaded: "<green>¡Configuración de RDQ recargada exitosamente!</green>"
  help: |
    <yellow>Comandos RDQ:</yellow>
    <gray>/rdq rank</gray> - Abrir menú de rangos
    <gray>/rdq bounty</gray> - Abrir menú de recompensas
    <gray>/rdq perk</gray> - Abrir menú de ventajas
    <gray>/rdq reload</gray> - Recargar configuración
  rank:
    opening_gui: "<gray>Abriendo menú de rangos...</gray>"
  bounty:
    opening_gui: "<gray>Abriendo menú de recompensas...</gray>"
  perk:
    opening_gui: "<gray>Abriendo menú de ventajas...</gray>"

error:
  not_found: "<red>{type} no encontrado: {id}</red>"
  insufficient_funds: "<red>¡Fondos insuficientes! Requerido: {required}, Disponible: {available}</red>"
  on_cooldown: "<red>¡En enfriamiento! {remaining} restante.</red>"
  requirements_not_met: "<red>Requisitos no cumplidos: {missing}</red>"
  self_targeting: "<red>¡No puedes seleccionarte a ti mismo!</red>"
  already_exists: "<red>{type} ya existe: {id}</red>"
  expired: "<red>{type} ha expirado: {id}</red>"
  not_unlocked: "<red>{type} no desbloqueado: {id}</red>"
  permission_denied: "<red>Permiso denegado: {permission}</red>"
  invalid_state: "<red>Estado inválido: {message}</red>"
  invalid_amount: "<red>¡Cantidad inválida! Debe estar entre {min} y {max}.</red>"
  no_permission: "<red>No tienes permiso para hacer eso.</red>"
  player_only: "<red>Este comando solo puede ser usado por jugadores.</red>"

rank:
  error:
    unknown_subcommand: "<red>Subcomando de rango desconocido. Usa /rank help para ver los comandos disponibles.</red>"
    player_not_found: "<red>Jugador no encontrado: {playerName}</red>"
    grant_failed: "<red>Error al otorgar el rango.</red>"
    reload_failed: "<red>Error al recargar rangos: {error}</red>"
  success:
    rank_granted: "<green>¡Rango {rankName} otorgado a {playerName}!</green>"
    rank_revoked: "<yellow>Rango {rankName} revocado de {playerName}.</yellow>"
    reloaded: "<green>¡Configuración de rangos recargada!</green>"
    rank_unlocked: "<green>¡Felicidades! ¡Has desbloqueado el rango {rankName}!</green>"
  opening_view: "<gray>Abriendo vista de rangos...</gray>"
  no_progress: "<yellow>Aún no has comenzado ningún camino de rango.</yellow>"
  progress_header: "<yellow>Tu Progreso de Rango:</yellow>"
  progress_entry: "<gray>• {tree}: <white>{rank}</white></gray>"
  trees_header: "<yellow>Árboles de Rango Disponibles:</yellow>"
  tree_entry: "<gray>• {id} <dark_gray>({ranks} rangos)</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /rank admin <grant|revoke|reload></yellow>"
    unknown: "<red>Comando de admin desconocido.</red>"
    grant:
      usage: "<yellow>Uso: /rank admin grant <jugador> <rango></yellow>"
    revoke:
      usage: "<yellow>Uso: /rank admin revoke <jugador> <rango></yellow>"
  help: |
    <yellow>Comandos de Rango:</yellow>
    <gray>/rank</gray> - Abrir menú de rangos
    <gray>/rank view</gray> - Ver árboles de rango
    <gray>/rank progress</gray> - Ver tu progreso
    <gray>/rank trees</gray> - Listar árboles disponibles
    <gray>/rank admin</gray> - Comandos de admin
  notification:
    title: "<gold>¡Rango Desbloqueado!</gold>"
    subtitle: "<yellow>{rankName}</yellow>"
    actionbar: "<green>¡Has desbloqueado {rankName}!</green>"

bounty:
  error:
    unknown_subcommand: "<red>Subcomando de recompensa desconocido. Usa /bounty help para ver los comandos disponibles.</red>"
    player_not_found: "<red>Jugador no encontrado: {playerName}</red>"
    self_target: "<red>¡No puedes poner una recompensa sobre ti mismo!</red>"
    invalid_amount: "<red>Cantidad inválida. Por favor ingresa un número válido.</red>"
    invalid_id: "<red>ID de recompensa inválido.</red>"
    create_failed: "<red>Error al crear recompensa: {error}</red>"
    cancel_failed: "<red>Error al cancelar recompensa. Puede que no seas el dueño.</red>"
  success:
    bounty_created: "<green>¡Recompensa de {amount} puesta sobre {targetName}!</green>"
    bounty_cancelled: "<yellow>Recompensa cancelada. Fondos reembolsados.</yellow>"
    bounty_removed: "<green>Recompensa eliminada por admin.</green>"
    bounty_claimed: "<green>¡Has reclamado una recompensa de {amount}!</green>"
    reloaded: "<green>¡Configuración de recompensas recargada!</green>"
  create:
    usage: "<yellow>Uso: /bounty create <jugador> <cantidad></yellow>"
  cancel:
    usage: "<yellow>Uso: /bounty cancel <recompensaId></yellow>"
  list:
    empty: "<yellow>No hay recompensas activas.</yellow>"
    header: "<yellow>Recompensas Activas ({count}):</yellow>"
    entry: "<gray>• <white>{target}</white> - {amount} <dark_gray>(por {placer})</dark_gray></gray>"
  leaderboard:
    header: "<yellow>Tabla de Cazarrecompensas:</yellow>"
    entry: "<gray>{rank}. <white>{player}</white> - {kills} eliminaciones, {earned} ganados</gray>"
  my:
    header: "<yellow>Tus Recompensas:</yellow>"
    placed_header: "<gray>Recompensas que pusiste:</gray>"
    placed_entry: "<gray>• <white>{target}</white> - {amount}</gray>"
    targeted_header: "<gray>Recompensas sobre ti:</gray>"
    targeted_entry: "<gray>• {amount} <dark_gray>(por {placer})</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /bounty admin <remove|reload></yellow>"
    unknown: "<red>Comando de admin desconocido.</red>"
    remove:
      usage: "<yellow>Uso: /bounty admin remove <recompensaId></yellow>"
  help: |
    <yellow>Comandos de Recompensa:</yellow>
    <gray>/bounty</gray> - Listar recompensas activas
    <gray>/bounty create <jugador> <cantidad></gray> - Crear recompensa
    <gray>/bounty cancel <id></gray> - Cancelar tu recompensa
    <gray>/bounty leaderboard</gray> - Ver mejores cazadores
    <gray>/bounty my</gray> - Ver tus recompensas
    <gray>/bounty admin</gray> - Comandos de admin
  announcement:
    created: "<yellow>¡{placer} puso una recompensa de {amount} sobre {target}!</yellow>"
    claimed: "<green>¡{hunter} reclamó la recompensa sobre {target} por valor de {amount}!</green>"
    expired: "<gray>La recompensa sobre {target} ha expirado.</gray>"

perk:
  error:
    unknown_subcommand: "<red>Subcomando de ventaja desconocido. Usa /perk help para ver los comandos disponibles.</red>"
    player_not_found: "<red>Jugador no encontrado: {playerName}</red>"
    perk_not_found: "<red>Ventaja no encontrada: {perkId}</red>"
    perk_on_cooldown: "<red>¡Esta ventaja está en enfriamiento! {remaining} restante.</red>"
    perk_not_active: "<red>Esta ventaja no está activa actualmente.</red>"
    activate_failed: "<red>Error al activar ventaja: {error}</red>"
    grant_failed: "<red>Error al otorgar ventaja.</red>"
    reload_failed: "<red>Error al recargar ventajas: {error}</red>"
  success:
    perk_activated: "<green>¡Ventaja {perkName} activada!</green>"
    perk_deactivated: "<yellow>Ventaja {perkName} desactivada.</yellow>"
    perk_granted: "<green>¡Ventaja {perkName} otorgada a {playerName}!</green>"
    perk_revoked: "<yellow>Ventaja {perkName} revocada de {playerName}.</yellow>"
    perk_unlocked: "<green>¡Has desbloqueado la ventaja {perkName}!</green>"
    reloaded: "<green>¡Configuración de ventajas recargada!</green>"
  activate:
    usage: "<yellow>Uso: /perk activate <perkId></yellow>"
  deactivate:
    usage: "<yellow>Uso: /perk deactivate <perkId></yellow>"
  info:
    usage: "<yellow>Uso: /perk info <perkId></yellow>"
    header: "<yellow>Info de Ventaja: {id}</yellow>"
    details: "<gray>Categoría: {category} | Enfriamiento: {cooldown}s | Duración: {duration}s</gray>"
  list:
    empty: "<yellow>No hay ventajas disponibles.</yellow>"
    header: "<yellow>Ventajas Disponibles ({count}):</yellow>"
    entry: "<gray>• <white>{id}</white> <dark_gray>({category})</dark_gray></gray>"
  admin:
    usage: "<yellow>Uso: /perk admin <grant|revoke|reload></yellow>"
    unknown: "<red>Comando de admin desconocido.</red>"
    grant:
      usage: "<yellow>Uso: /perk admin grant <jugador> <ventaja></yellow>"
    revoke:
      usage: "<yellow>Uso: /perk admin revoke <jugador> <ventaja></yellow>"
  help: |
    <yellow>Comandos de Ventaja:</yellow>
    <gray>/perk</gray> - Listar ventajas disponibles
    <gray>/perk activate <ventaja></gray> - Activar una ventaja
    <gray>/perk deactivate <ventaja></gray> - Desactivar una ventaja
    <gray>/perk info <ventaja></gray> - Ver detalles
    <gray>/perk admin</gray> - Comandos de admin

