# RDQ Archivo de Traducción - Español (España)
# Formato MiniMessage con degradados y estilos
# Los marcadores usan formato %placeholder%

# ============================================
# PREFIJO GLOBAL
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# CLAVES DE NIVEL RAÍZ
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Sin Recompensas</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Añade objetos para crear recompensas</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Añadir Objeto</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Coloca objetos aquí para añadir como recompensas</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clic izquierdo para colocar objeto</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clic derecho para quitar objeto</gradient>"

# ============================================
# NOMBRES Y DESCRIPCIONES DE ÁRBOLES DE RANGO
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Guardabosques</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domina el arte del tiro con arco y rastreo</gradient>"
      - "<gradient:#6b7280:#9ca3af>Conviértete en uno con la naturaleza</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Guerrero</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domina el arte del combate</gradient>"
      - "<gradient:#6b7280:#9ca3af>Conviértete en un luchador legendario</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mago</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Aprovecha el poder de la magia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Conviértete en maestro de lo arcano</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Pícaro</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domina el sigilo y la astucia</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ataca desde las sombras</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Clérigo</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Canaliza el poder divino</gradient>"
      - "<gradient:#6b7280:#9ca3af>Sana y protege a tus aliados</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Mercader</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Domina el arte del comercio</gradient>"
      - "<gradient:#6b7280:#9ca3af>Construye tu fortuna</gradient>"

