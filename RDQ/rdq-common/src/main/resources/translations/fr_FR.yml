      name: "<gradient:#3b82f6:#60a5fa>Tuteur</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Voie de protection</gradient>"
        - "<gradient:#6b7280:#9ca3af>Devenez un bouclier incassable</gradient>"
        - "<gradient:#6b7280:#9ca3af>Protégez vos alliés à tout prix</gradient>"
