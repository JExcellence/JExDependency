    syntax: "<gradient:#f59e0b:#fbbf24>⚠ Utilisation :</gradient> <gradient:#6b7280:#9ca3af>/rq scoreboard perks</gradient>"
    enabled: "<gradient:#10b981:#34d399>✦ Barre latérale des atouts activée.</gradient>"
    disabled: "<gradient:#ef4444:#f87171>✦ Barre latérale des atouts désactivée.</gradient>"

scoreboard_sidebar:
  perks:
    title: "<dark_aqua>[RDQ]</dark_aqua> <white>Atouts</white>"
    active_summary: "<gray>Actifs :</gray> <aqua>%active_perks%/%max_active_perks%</aqua>"
    owned_summary: "<gray>Obtenus :</gray> <gold>%acquired_perks%</gold><gray>/</gray><light_purple>%total_perks%</light_purple>"
    no_active: "<red>Aucun atout actif</red>"
    active_entry: "<white>%perk_name%</white> <gray>(%usage_count%)</gray>"
    more_active: "<gray>+%remaining_perks% de plus</gray>"

