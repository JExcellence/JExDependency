# ============================================
# MESSAGES DE L'ÉCOUTEUR BOUNTY
# ============================================
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Vous avez une prime active sur votre tête!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valeur de la Prime:</gradient> <gradient:#10b981:#34d399>$%bounty_value%</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expire à:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commandité par:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 PRIME RÉCLAMÉE! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Vous avez réclamé avec succès la prime sur</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Votre part:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Quelqu'un</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>a réclamé la prime sur</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% joueurs</gradient> <gradient:#a855f7:#c084fc>ont réclamé la prime sur</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# ============================================
# MESSAGES DE CRÉATION DE PRIMES
# ============================================
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Prime créée avec succès pour</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Échec du traitement de la prime:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"
  processing: "<gradient:#f59e0b:#fbbf24>⏳ Traitement de la prime...</gradient>"

# ============================================
# MESSAGES DE PROGRESSION DU RANG
# ============================================
rank_progression:
  started: "<gradient:#10b981:#34d399>✅ Progression démarrée pour le rang</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_view_opened: "<gradient:#3b82f6:#60a5fa>📋 Affichage des exigences pour</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  requirements_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Exigences incomplètes pour</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>(%completion_percent%% complété)</gradient>"
  requirement_incomplete: "<gradient:#f59e0b:#fbbf24>⚠ Exigence incomplète:</gradient> <gradient:#6b7280:#9ca3af>%requirement_name% (%progress_percent%%)</gradient>"
  no_requirements: "<gradient:#10b981:#34d399>✅</gradient> <gradient:#a855f7:#c084fc>%rank_name%</gradient> <gradient:#10b981:#34d399>n'a pas d'exigences!</gradient>"

# ============================================
# MESSAGES DE CLIQUEZ SUR LE CLASSEMENT
# ============================================
rank_click:
  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Mode aperçu:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Vous possédez</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Verrouillé:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Complétez d'abord les prérequis</gradient>"

# ============================================
# MESSAGES DE COMMANDE RQ
# ============================================
rq:
  no_luckperms_installed: "<gradient:#ef4444:#f87171>❌ LuckPerms n'est pas installé!</gradient> <gradient:#6b7280:#9ca3af>Cette fonctionnalité nécessite LuckPerms.</gradient>"
  help: "<gradient:#a855f7:#c084fc>📖 Aide RaindropQuests</gradient>\n<gradient:#6b7280:#9ca3af>/rq - Ouvrir le menu principal</gradient>\n<gradient:#6b7280:#9ca3af>/rq ranks - Voir les rangs</gradient>\n<gradient:#6b7280:#9ca3af>/rq bounty - Voir les primes</gradient>\n<gradient:#6b7280:#9ca3af>/rq scoreboard perks - Basculer la barre latérale des atouts</gradient>"
