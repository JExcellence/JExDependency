        - "<gradient:#6b7280:#9ca3af>La peur incarnée sur le champ de bataille</gradient>"
    warlord_shield:
      name: "<gradient:#3b82f6:#60a5fa>Seigneur de Guerre du Bouclier</gradient>"
      lore:
        - "<gradient:#3b82f6:#60a5fa>Gardien ultime</gradient>"
        - "<gradient:#6b7280:#9ca3af>Objet immobilier, éternel protecteur</gradient>"
        - "<gradient:#6b7280:#9ca3af>Personne ne passera pendant que tu es debout</gradient>"
    warlord_arena:
      name: "<gradient:#a855f7:#c084fc>Seigneur de guerre de l'arène</gradient>"
      lore:
        - "<gradient:#a855f7:#c084fc>Gladiateur ultime</gradient>"
        - "<gradient:#6b7280:#9ca3af>Champion des champions</gradient>"
        - "<gradient:#6b7280:#9ca3af>Légende de l'arène</gradient>"
    # Classements hérités (pour une compatibilité ascendante)
