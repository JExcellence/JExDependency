perk:
  # Avantages de la pêche
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Pêche plus rapide</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Attrapez du poisson plus rapidement avec des taux de pêche améliorés</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>Boost d'XP de pêche</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Gagnez de l'XP bonus en attrapant du poisson</gradient>"
  
  # Avantages des potions
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Amplificateur de potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance d'améliorer les effets des potions lorsqu'elles sont consommées</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Durée des potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance de prolonger la durée de la potion une fois consommée</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Remboursement des potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance de récupérer votre potion après l'avoir bu</gradient>"
  
  # Messages d'avantages
  messages:
    # Déverrouiller/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨Avantage débloqué !</gradient> <gradient:#6b7280:#9ca3af>Vous avez débloqué</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
