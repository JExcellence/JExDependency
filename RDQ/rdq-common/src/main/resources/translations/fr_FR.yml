        - "<gradient:#6b7280:#9ca3af>Combattant légendaire, craint de tous</gradient>"
    warlord:
      name: "<gradient:#ef4444:#f87171>⚔ Seigneur de Guerre</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maître de la guerre, commandant d'armées</gradient>"
  # Rangs de l'arbre des mages
  mage:
    apprentice:
      name: "<gradient:#a855f7:#c084fc>✨ Apprenti</gradient>"
