# ============================================
perk_detail_ui:
  title: "<gradient:#a855f7:#c084fc>✨ %perk_name%</gradient>"


# ============================================
# TRADUCTIONS PERK
# ============================================
perk:
  # Avantages de la pêche
  fish_rate:
    name: "<gradient:#3b82f6:#60a5fa>Pêche plus rapide</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Attrapez du poisson plus rapidement avec des taux de pêche améliorés</gradient>"
  fish_xp:
    name: "<gradient:#10b981:#34d399>Boost d'XP de pêche</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Gagnez de l'XP bonus en attrapant du poisson</gradient>"

  # Avantages des potions
  potion_enhance:
    name: "<gradient:#a855f7:#c084fc>Amplificateur de potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance d'améliorer les effets des potions lorsqu'elles sont consommées</gradient>"
  potion_extend:
    name: "<gradient:#f59e0b:#fbbf24>Durée des potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance de prolonger la durée de la potion une fois consommée</gradient>"
  potion_save:
    name: "<gradient:#10b981:#34d399>Remboursement des potions</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance de récupérer votre potion après l'avoir bu</gradient>"

  # Messages d'avantages
  messages:
    # Déverrouiller/Enable/Disable
    unlock:
      notification: "<gradient:#10b981:#34d399>✨Avantage débloqué !</gradient> <gradient:#6b7280:#9ca3af>Vous avez débloqué</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      success: "<gradient:#10b981:#34d399>Avantage débloqué et activé avec succès :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Échec du déverrouillage de l'avantage. Veuillez réessayer.</gradient>"
      error: "<gradient:#ef4444:#f87171>Une erreur s'est produite lors du déverrouillage de l'avantage.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Vous ne remplissez pas les conditions pour débloquer cet avantage !</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Avantage activé :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Échec de l'activation de l'avantage :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Vous avez atteint le nombre maximum d'avantages activés (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Avantage désactivé :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Échec de la désactivation de l'avantage :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"

    # Refroidir
    cooldown:
      active: "<gradient:#ef4444:#f87171>Cet avantage est en temps de recharge pendant</gradient> <gradient:#f59e0b:#fbbf24>%time%</gradient>"
      ready: "<gradient:#10b981:#34d399>L'avantage est prêt à être utilisé !</gradient>"

    # Déclencheurs d'effet
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨Potion améliorée !</gradient> <gradient:#6b7280:#9ca3af>Effets amplifiés</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Durée des potions prolongée !</gradient> <gradient:#6b7280:#9ca3af>Dure plus longtemps</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Potion sauvée !</gradient> <gradient:#6b7280:#9ca3af>Retourné à l'inventaire</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Pêche active plus rapide !</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% XP de pêche !</gradient>"

  # Éléments de l'interface utilisateur
  ui:
    header:
      type_label: "<gray>Taper: <white>%type%</white></gray>"
      category_label: "<gray>Catégorie: <white>%category%</white></gray>"
    requirements:
      no_requirements: "<green>Aucune exigence</green>"
      no_requirements_lore: "<gray>Cet avantage n'a aucune exigence de déverrouillage</gray>"
    rewards:
      title: "<gold>Débloquez la récompense</gold>"
      no_rewards: "<gray>Aucune récompense de déverrouillage</gray>"
      no_rewards_lore: "<gray>Cet avantage n'a pas de récompenses à débloquer</gray>"
      type_label: "<gray>Taper: <white>%type%</white></gray>"
      value_label: "<gray>Valeur: <gold>%value%</gold></gray>"
    status:
      title: "<white>Statut de l'avantage</white>"
      locked: "<red>✖ Verrouillé</red>"
      locked_hint: "<gray>Remplissez les conditions requises pour débloquer</gray>"
      active: "<green>✓ Actif</green>"
      enabled: "<yellow>○ Activé</yellow>"
      disabled: "<gray>○ Désactivé</gray>"
      enabled_count: "<gray>Avantages activés : <white>%count%/%max%</white></gray>"
      cooldown_label: "<gray>Refroidir: <gold>%time%</gold></gray>"
      activations_label: "<gray>Activations : <white>%count%</white></gray>"
    buttons:
      unlock:
        title: "<white>Débloquer l'avantage</white>"
        hint: "<green>Cliquez pour débloquer cet avantage !</green>"
      enable:
        title: "<white>Activer l'avantage</white>"
        hint: "<green>Cliquez pour activer cet avantage</green>"
        limit_reached: "<red>Avantages maximum activés atteint</red>"
      disable:
        title: "<white>Désactiver l'avantage</white>"
        hint: "<yellow>Cliquez pour désactiver cet avantage</yellow>"

  # Avantages existants (pour référence - ajoutez s'il manque)
