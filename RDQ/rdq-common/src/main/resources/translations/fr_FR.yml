  fire_resistance:
    name: "<gradient:#ef4444:#f87171>Résistance au feu</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Immunité aux dégâts de feu et de lave</gradient>"
  double_experience:
    name: "<gradient:#a855f7:#c084fc>Double expérience</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Gagnez le double d'XP de toutes les sources</gradient>"
  critical_strike:
    name: "<gradient:#ef4444:#f87171>Coup critique</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Chance d'infliger des dégâts critiques</gradient>"
  combat_heal:
    name: "<gradient:#10b981:#34d399>Guérison de combat</gradient>"
    description: "<gradient:#6b7280:#9ca3af>Guérissez en infligeant des dégâts aux ennemis</gradient>"
quest:
  zombie_slayer:
    name: <gradient:#ef4444:#f87171>Tueur de zombies</gradient>
    description: Battez les zombies et récupérez leurs gouttes pour prouver vos prouesses au combat
    task:
      kill_zombies:
        name: <white>Vaincre les zombies</white>
        description: Tuer %amount% des zombies
      collect_flesh:
        name: <white>Récupérez de la chair pourrie</white>
        description: Rassembler %amount% chair pourrie des zombies vaincus
  master_miner:
    name: <gradient:#6b7280:#9ca3af>Maître mineur</gradient>
    description: Extrayez divers minerais dans le délai imparti pour devenir un maître mineur
    task:
      mine_coal:
        name: <white>Mine de charbon</white>
        description: Le mien %amount% blocs de minerai de charbon
      mine_iron:
        name: <white>Mine de fer</white>
        description: Le mien %amount% blocs de minerai de fer
      mine_diamond:
        name: <white>Extraire des diamants</white>
        description: Le mien %amount% blocs de minerai de diamant
  builders_dream:
    name: <gradient:#f59e0b:#fbbf24>Le rêve du constructeur</gradient>
    description: Construisez un bâtiment en suivant les étapes séquentielles pour mettre en valeur vos compétences en construction.
    task:
      foundation:
        name: <white>Fondation laïque</white>
        description: Lieu %amount% blocs de briques pour la fondation
      walls:
        name: <white>Construire des murs</white>
        description: Lieu %amount% blocs de planches de chêne pour les murs
      windows:
        name: <white>Ajouter des fenêtres</white>
        description: Lieu %amount% briques de verre pour fenêtres
      roof:
        name: <white>Toit complet</white>
        description: Lieu %amount% blocs d'escalier en chêne pour le toit
view:
  quest:
    categories:
      title: <gradient:#f59e0b:#fbbf24>Catégories de quêtes</gradient>
    list:
      title: <gradient:#f59e0b:#fbbf24>%category% Quêtes</gradient>
    detail:
      title: '<gradient:#f59e0b:#fbbf24>Quête: %quest%</gradient>'
    active:
      title: <gradient:#f59e0b:#fbbf24>Quêtes actives</gradient>
    items:
      back:
        name: <gray>Dos</gray>
        lore:
        - <gray>Revenir au menu précédent</gray>
      start:
        name: <green>Commencer la quête</green>
        lore:
        - <gray>Cliquez pour démarrer cette quête</gray>
        - ''
        - <dark_gray>Exigences:</dark_gray>
        - <dark_gray>- %requirements%</dark_gray>
      abandon:
        name: <red>Abandonner la quête</red>
        lore:
        - <gray>Cliquez pour abandonner cette quête</gray>
        - ''
        - '<yellow>Attention : la progression sera perdue</yellow>'
      info:
        name: <yellow>Informations sur la quête</yellow>
        lore:
        - <gray>Cliquez pour voir les détails de la quête</gray>
      progress:
        name: <aqua>Afficher la progression</aqua>
        lore:
        - <gray>Cliquez pour voir la progression de la quête</gray>
        - ''
        - '<dark_gray>Progrès: <white>%progress%%</white></dark_gray>'
      close:
        name: <gray>Fermer</gray>
        lore:
        - <gray>Fermez ce menu</gray>
      quest_item:
        name: <gradient:#f59e0b:#fbbf24>%quest_name%</gradient>
        lore:
        - <gray>%quest_description%</gray>
        - ''
        - '<dark_gray>Difficulté: %difficulty%</dark_gray>'
        - '<dark_gray>Statut: %status%</dark_gray>'
        - '<dark_gray>Tâches : <white>%task_count%</white></dark_gray>'
        - ''
        - '%action_hint%'
      task_item:
        name: <white>%task_name%</white>
        lore:
        - <gray>%task_description%</gray>
        - ''
        - '<dark_gray>Progrès: <white>%current%/%required%</white></dark_gray>'
        - '<dark_gray>Statut: %status%</dark_gray>'
    lore:
      click_to_start: <green>Cliquez pour démarrer cette quête</green>
      click_to_view: <yellow>Cliquez pour voir les détails de la quête</yellow>
      click_to_abandon: <red>Cliquez pour abandonner cette quête</red>
      already_completed: <green>Déjà terminé</green>
      requirements_not_met: <red>Exigences non remplies</red>
      on_cooldown: '<red>Au temps de recharge : %time%</red>'
      time_remaining: '<yellow>Temps restant : %time%</yellow>'
      repeatable: <aqua>Quête répétable</aqua>
      one_time: <gray>Quête unique</gray>
    progress:
      overall: <yellow>Progrès global</yellow>
      percentage: '<gray>Progrès: <white>%progress%%</white></gray>'
      tasks_completed: '<gray>Tâches : <white>%completed%/%total%</white></gray>'
      time_elapsed: '<gray>Temps écoulé : <white>%time%</white></gray>'
      time_remaining: '<gray>Temps restant : <white>%time%</white></gray>'
    task:
      progress: '<gray>Progrès: <white>%current%/%required%</white></gray>'
      completed: <green>Complété</green>
      remaining: '<gray>Restant: <white>%remaining%</white></gray>'
      locked: <red>Fermé</red>
      sequential: <yellow>Effectuez d'abord les tâches précédentes</yellow>
    rewards:
      header: <yellow>Récompenses</yellow>
      currency: <gold>%amount% %currency%</gold>
      experience: <aqua>%amount% Expérience</aqua>
      item: <white>%amount%x %item%</white>
      perk: '<gradient:#a855f7:#c084fc>Avantage : %perk%</gradient>'
      quest: '<gradient:#f59e0b:#fbbf24>Quête: %quest%</gradient>'
    requirements:
      header: <yellow>Exigences</yellow>
      level: <aqua>Niveau %level%</aqua>
      currency: <gold>%amount% %currency%</gold>
      quest_completion: '<gradient:#f59e0b:#fbbf24>Complet: %quest%</gradient>'
      rank: '<gradient:#a855f7:#c084fc>Rang: %rank%</gradient>'
      permission: '<gray>Autorisation: %permission%</gray>'
difficulty:
  trivial: <gradient:#84cc16:#a3e635>Banal</gradient>
  easy: <gradient:#10b981:#34d399>Facile</gradient>
  normal: <gradient:#f59e0b:#fbbf24>Normale</gradient>
  hard: <gradient:#ef4444:#f87171>Dur</gradient>
  extreme: <gradient:#a855f7:#c084fc>Extrême</gradient>
