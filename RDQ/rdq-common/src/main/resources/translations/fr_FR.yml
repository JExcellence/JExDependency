      name: "<gradient:#f59e0b:#fbbf24>⚔ Chevalier</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Guerrier honorable du royaume</gradient>"
    champion:
      name: "<gradient:#a855f7:#c084fc>⚔ Champion</gradient>"
