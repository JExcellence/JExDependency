  preview_mode: "<gradient:#3b82f6:#60a5fa>👁 Mode aperçu:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  owned: "<gradient:#10b981:#34d399>✅ Vous possédez</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient>"
  locked: "<gradient:#ef4444:#f87171>🔒 Verrouillé:</gradient> <gradient:#f59e0b:#fbbf24>%rank_name%</gradient> <gradient:#6b7280:#9ca3af>- Complétez d'abord les prérequis</gradient>"

# ============================================
# MESSAGES DE COMMANDE RQ
