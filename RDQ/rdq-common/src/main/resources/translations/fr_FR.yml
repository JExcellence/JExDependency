# Fichier de traduction RDQ - Anglais (États-Unis)
# Format MiniMessage avec dégradés et style
# Les espaces réservés utilisent le format %placeholder%

# ============================================
# PRÉFIXE GLOBAL
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDQ]</gradient> "

# ============================================
# CLÉS DE NIVEAU RACINE (utilisées par les appels directs I18n.Builder)
# ============================================
pseudo:
  name: "<gradient:#6b7280:#9ca3af>📦 Pas de Récompenses</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Ajoutez des objets pour créer des récompenses</gradient>"

input_slot:
  name: "<gradient:#10b981:#34d399>➕ Ajouter un Objet</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Placez des objets ici pour les ajouter comme récompenses</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clic gauche pour placer un objet</gradient>"
    - "<gradient:#6b7280:#9ca3af>Clic droit pour retirer un objet</gradient>"

# ============================================
# NOMS ET DESCRIPTIONS D'AFFICHAGE DE L'ARBRE DE CLASSEMENT
# ============================================
tree:
  ranger:
    name: "<gradient:#10b981:#34d399>🏹 Rôdeur</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Maîtrisez l'art du tir à l'arc et du pistage</gradient>"
      - "<gradient:#6b7280:#9ca3af>Ne faites qu'un avec la nature</gradient>"
  warrior:
    name: "<gradient:#ef4444:#f87171>⚔ Guerrier</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Maîtrisez l'art du combat</gradient>"
      - "<gradient:#6b7280:#9ca3af>Devenez un combattant légendaire</gradient>"
  mage:
    name: "<gradient:#a855f7:#c084fc>✨ Mage</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Exploitez le pouvoir de la magie</gradient>"
      - "<gradient:#6b7280:#9ca3af>Devenez un maître de l'arcane</gradient>"
  rogue:
    name: "<gradient:#6b7280:#9ca3af>🗡 Voleur</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Maîtrisez la furtivité et la ruse</gradient>"
      - "<gradient:#6b7280:#9ca3af>Frappez depuis les ombres</gradient>"
  cleric:
    name: "<gradient:#f59e0b:#fbbf24>✝ Clerc</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Canalisez le pouvoir divin</gradient>"
      - "<gradient:#6b7280:#9ca3af>Soignez et protégez vos alliés</gradient>"
  merchant:
    name: "<gradient:#10b981:#34d399>💰 Marchand</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Maîtrisez l'art du commerce</gradient>"
      - "<gradient:#6b7280:#9ca3af>Construisez votre fortune</gradient>"

# ============================================
# NOMS ET DESCRIPTIONS D'AFFICHAGE DES RANGS
# ============================================
rank:

  # ============================================
  # MESSAGES DE CLASSEMENT
  # ============================================
  messages:
    requirements_complete: "<gradient:#10b981:#34d399>🎉 CLASSEZ-VOUS !</gradient> <gradient:#6b7280:#9ca3af>Vous avez rempli toutes les conditions requises pour</gradient> <gradient:#f59e0b:#fbbf24>%rank%</gradient>"
    claim_upgrade: "<gradient:#6b7280:#9ca3af>Utilisez le menu de classement pour réclamer votre mise à niveau de rang !</gradient>"

  default:
    name: "<gradient:#6b7280:#9ca3af>Sans Rang</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Sélectionnez un chemin de rang pour commencer</gradient>"
    unselected:
      name: "<gradient:#6b7280:#9ca3af>Sans Rang</gradient>"
  icon:
    default:
      name: "<gradient:#6b7280:#9ca3af>Rang par Défaut</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Aucun rang sélectionné</gradient>"
  # Rangs de l'arbre des Rangers
  ranger:
    hunter:
      name: "<gradient:#7c3aed:#a78bfa>🏹 Chasseur</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Un pisteur novice apprenant les voies de la nature</gradient>"
    archer:
      name: "<gradient:#10b981:#34d399>🎯 Archer</gradient>"
