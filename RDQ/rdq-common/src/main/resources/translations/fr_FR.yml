# RDQ Common Fichier de Traduction - Français
# Format MiniMessage avec dégradés et style
# Les espaces réservés utilisent le format %placeholder%

# Messages du Listener de Primes
bounty_listener:
  bounty_active:
    warning: "<gradient:#ff6b6b:#ff8e8e>⚠</gradient> <gradient:#a855f7:#c084fc>Vous avez une prime active sur votre tête!</gradient>"
    value: "<gradient:#3b82f6:#60a5fa>💰 Valeur de la Prime:</gradient> <gradient:#10b981:#34d399>%bounty_value%€</gradient>"
    expires: "<gradient:#f59e0b:#fbbf24>⏰ Expire à:</gradient> <gradient:#6b7280:#9ca3af>%expires_at%</gradient>"
    commissioner: "<gradient:#ef4444:#f87171>👤 Commanditaire:</gradient> <gradient:#6b7280:#9ca3af>%commissioner_uuid%</gradient>"
  
  bounty_claimed:
    title: "<gradient:#10b981:#34d399>🎉 PRIME RÉCLAMÉE! 🎉</gradient>"
    victim: "<gradient:#a855f7:#c084fc>Vous avez réclamé avec succès la prime sur</gradient> <gradient:#f59e0b:#fbbf24>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    share: "<gradient:#3b82f6:#60a5fa>Votre part:</gradient> <gradient:#10b981:#34d399>%percentage%%</gradient>"
    someone: "<gradient:#6b7280:#9ca3af>Quelqu'un</gradient>"
    broadcast: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%claimer_name%</gradient> <gradient:#a855f7:#c084fc>a réclamé la prime sur</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"
    broadcast_multiple: "<gradient:#10b981:#34d399>🎯</gradient> <gradient:#f59e0b:#fbbf24>%winner_count% joueurs</gradient> <gradient:#a855f7:#c084fc>ont réclamé la prime sur</gradient> <gradient:#ef4444:#f87171>%victim_name%</gradient><gradient:#a855f7:#c084fc>!</gradient>"

# Messages de Confirmation de Création de Prime
bounty_creation:
  confirm:
    success: "<gradient:#10b981:#34d399>✅ Prime créée avec succès sur</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient><gradient:#10b981:#34d399>!</gradient>"
    error: "<gradient:#ef4444:#f87171>❌ Échec de la création de la prime:</gradient> <gradient:#6b7280:#9ca3af>%error_message%</gradient>"

# Interface de Vue d'Ensemble des Primes (Menu Principal & Vue d'Ensemble)
bounty_overview_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Système de Primes</gradient>"
  
  # Boutons du menu principal
  create_bounty:
    name: "<gradient:#10b981:#34d399>📝 Créer une Prime</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour créer une nouvelle prime</gradient>"
      - "<gradient:#6b7280:#9ca3af>sur un autre joueur</gradient>"
  
  view_bounties:
    name: "<gradient:#3b82f6:#60a5fa>👁 Voir les Primes</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Voir toutes les primes actives</gradient>"
  
  my_bounties:
    name: "<gradient:#f59e0b:#fbbf24>📋 Mes Primes</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Voir les primes que vous avez créées</gradient>"
  
  leaderboard:
    name: "<gradient:#ef4444:#f87171>🏆 Classement</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Meilleurs chasseurs de primes</gradient>"
  
  # Entrées de la liste des primes
  bounty:
    name: "<gradient:#a855f7:#c084fc>🎯 Prime sur</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cible:</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Commanditaire:</gradient> <gradient:#3b82f6:#60a5fa>%commissioner_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Créé:</gradient> <gradient:#10b981:#34d399>%created_at%</gradient>"
      - ""
      - "<gradient:#a855f7:#c084fc>Cliquez pour voir les détails</gradient>"

# Interface de Création de Prime
bounty_creation_ui:
  title: "<gradient:#a855f7:#c084fc>📝 Créer une Prime</gradient>"
  
  select_target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Sélectionner la Cible</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour choisir un joueur</gradient>"
      - "<gradient:#6b7280:#9ca3af>sur lequel placer une prime</gradient>"
  
  add_items:
    name: "<gradient:#10b981:#34d399>💰 Ajouter des Récompenses</gradient>"
    description:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour ajouter des objets</gradient>"
      - "<gradient:#6b7280:#9ca3af>comme récompenses</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Sélectionnez d'abord une cible!</gradient>"
  
  add_currencies:
    name: "<gradient:#f59e0b:#fbbf24>💎 Ajouter Monnaie</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour ajouter des récompenses</gradient>"
      - "<gradient:#6b7280:#9ca3af>en monnaie pour la prime</gradient>"
    disabled: "<gradient:#ef4444:#f87171>❌ Sélectionnez d'abord une cible!</gradient>"
  
  confirm_bounty:
    name: "<gradient:#10b981:#34d399>✅ Créer la Prime</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour créer la prime</gradient>"
      - "<gradient:#6b7280:#9ca3af>avec les récompenses sélectionnées</gradient>"

# Bouton Sélectionner Cible
select_target:
  name: "<gradient:#f59e0b:#fbbf24>🎯 Sélectionner Cible: %target_name%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Cliquez pour choisir un joueur</gradient>"
    - "<gradient:#6b7280:#9ca3af>pour placer une prime</gradient>"
    - ""
    - "<gradient:#f59e0b:#fbbf24>Cible actuelle: %target_name%</gradient>"

# Messages de Confirmation
confirm:
  no_player_selected: "<gradient:#ef4444:#f87171>❌ Aucun joueur sélectionné!</gradient> <gradient:#6b7280:#9ca3af>Veuillez d'abord sélectionner une cible.</gradient>"
  no_rewards_selected: "<gradient:#ef4444:#f87171>❌ Aucune récompense ajoutée!</gradient> <gradient:#6b7280:#9ca3af>Veuillez d'abord ajouter des récompenses.</gradient>"
  confirmation: "<gradient:#f59e0b:#fbbf24>⏳ Création de prime sur</gradient> <gradient:#a855f7:#c084fc>%target_name%</gradient><gradient:#f59e0b:#fbbf24>...</gradient>"
  error: "<gradient:#ef4444:#f87171>❌ Erreur:</gradient> <gradient:#6b7280:#9ca3af>Impossible de trouver le joueur cible %target_name%</gradient>"

# Message de Remboursement d'Objets
left_overs: "<gradient:#f59e0b:#fbbf24>📦 Objets rendus!</gradient> <gradient:#6b7280:#9ca3af>Certains objets ont été lâchés au sol.</gradient>"

# Interface d'Information du Joueur Prime
bounty_player_info_ui:
  title: "<gradient:#a855f7:#c084fc>🎯 Prime sur</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cible de cette prime</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cliquez pour voir les infos du joueur</gradient>"
  
  rewards:
    name: "<gradient:#10b981:#34d399>💰 Voir les Récompenses</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour voir toutes les récompenses</gradient>"
      - "<gradient:#6b7280:#9ca3af>pour réclamer cette prime</gradient>"
  
  delete:
    name: "<gradient:#ef4444:#f87171>🗑 Supprimer la Prime</gradient>"
    lore:
      - "<gradient:#ef4444:#f87171>⚠ Attention: Cette action</gradient>"
      - "<gradient:#ef4444:#f87171>ne peut pas être annulée!</gradient>"
      - ""
      - "<gradient:#6b7280:#9ca3af>Cliquez pour supprimer cette prime</gradient>"
  
  deleted_bounty_successfully: "<gradient:#10b981:#34d399>✅ Prime sur</gradient> <gradient:#f59e0b:#fbbf24>%target_name%</gradient> <gradient:#10b981:#34d399>a été supprimée!</gradient>"

# Interface de Récompense de Prime
bounty_reward_ui:
  title: "<gradient:#a855f7:#c084fc>💰 Récompenses de Prime</gradient>"
  
  pseudo:
    name: "<gradient:#6b7280:#9ca3af>📦 Aucune Récompense</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Ajoutez des objets pour créer</gradient>"
      - "<gradient:#6b7280:#9ca3af>des récompenses pour cette prime</gradient>"
  
  input_slot:
    name: "<gradient:#10b981:#34d399>➕ Ajouter un Objet</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Placez des objets ici pour les ajouter comme récompenses</gradient>"
      - "<gradient:#6b7280:#9ca3af>Clic droit pour retirer des objets</gradient>"
  
  target:
    name: "<gradient:#f59e0b:#fbbf24>🎯 Cible: %target_name%</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cette prime est placée sur</gradient>"
      - "<gradient:#f59e0b:#fbbf24>%target_name%</gradient>"
  
  reward_item:
    lore:
      - "<gradient:#a855f7:#c084fc>💰 Récompense de Prime</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cet objet sera donné à</gradient>"
      - "<gradient:#6b7280:#9ca3af>celui qui réclame la prime</gradient>"
  
  no_new_items_inserted: "<gradient:#ef4444:#f87171>❌ Aucun nouvel objet n'a été ajouté!</gradient>"
  left_overs: "<gradient:#f59e0b:#fbbf24>⚠ Certains objets ont été lâchés car votre inventaire était plein!</gradient>"

# Composants UI de la Plateforme
paginated_player_ui:
  player_entry:
    name: "<gradient:#a855f7:#c084fc>👤</gradient> <gradient:#f59e0b:#fbbf24>%player_name%</gradient>"

# Pagination
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Page %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Page actuelle:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Pages totales:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Page %direction%</gradient>"

# Objets Tête
head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Retour</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour revenir</gradient>"
      - "<gradient:#6b7280:#9ca3af>au menu précédent</gradient>"
  
  proceed:
    name: "<gradient:#10b981:#34d399>➡️ Continuer</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Cliquez pour continuer</gradient>"
      - "<gradient:#6b7280:#9ca3af>à l'étape suivante</gradient>"
  
  previous:
