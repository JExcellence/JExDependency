        - "<gradient:#6b7280:#9ca3af>Tireur d'élite, un tir une mort</gradient>"
    forest_lord:
      name: "<gradient:#10b981:#34d399>🌲 Seigneur de la Forêt</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Maître de la nature, un avec la forêt</gradient>"
  # Rangs de l'arbre des guerriers
  warrior:
    recruit:
      name: "<gradient:#6b7280:#9ca3af>⚔ Recrue</gradient>"
      lore:
        - "<gradient:#6b7280:#9ca3af>Un nouveau guerrier commençant son voyage</gradient>"
        - "<gradient:#6b7280:#9ca3af>Apprenez les bases du combat</gradient>"
    soldier:
      name: "<gradient:#3b82f6:#60a5fa>⚔ Soldat</gradient>"
