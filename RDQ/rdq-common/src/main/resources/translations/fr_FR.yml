# ============================================
# PLUGIN INTEGRATION MANAGEMENT UI
# ============================================
plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>🔌 Intégrations de plugins</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>🧭 Hub d'intégration</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>Ouvrir les tableaux de bord d'intégration du plugin RDQ</gradient>"
    - "<gradient:#6b7280:#9ca3af>Les outils de détection des devises, des compétences/emplois et PlaceholderAPI sont disponibles ici</gradient>"
  actions:
    currency:
      name: "<gradient:#22c55e:#86efac>💱 Intégrations de devises</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Gestion des fournisseurs de devises ouvertes</gradient>"
      - "<gradient:#6b7280:#9ca3af>Examen détecté Devises Vault et JExEconomy</gradient>"
      error: "<gradient:#ef4444:#f87171>❌ Échec de l'ouverture des intégrations de devises !</gradient>"
    skills:
      name: "<gradient:#38bdf8:#60a5fa>📘 Intégrations de compétences</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Afficher l'état de prise en charge pour mcMMO, Aura et EcoSkills</gradient>"
      - "<gradient:#6b7280:#9ca3af>Détecter les plugins de compétences actuellement activés</gradient>"
      error: "<gradient:#ef4444:#f87171>❌ Échec de l'ouverture des intégrations de compétences !</gradient>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>⛏ Intégrations d'emplois</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Afficher l'état de support pour EcoJobs et JobsReborn</gradient>"
      - "<gradient:#6b7280:#9ca3af>Détecter les plugins d'emploi actuellement activés</gradient>"
      error: "<gradient:#ef4444:#f87171>❌ Échec de l'ouverture des intégrations d'emplois !</gradient>"
    placeholder_api:
      name: "<gradient:#38bdf8:#60a5fa>🏷 PlaceholderAPI</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Détecter le support de PlaceholderAPI et gérer les extensions</gradient>"
      - "<gradient:#6b7280:#9ca3af>Installer l'extension Player et recharger PlaceholderAPI</gradient>"
      error: "<gradient:#ef4444:#f87171>❌ Échec de l'ouverture des outils PlaceholderAPI !</gradient>"

# ============================================
# PLACEHOLDER API UI
# ============================================
placeholder_api_ui:
  title: "<gradient:#38bdf8:#60a5fa>🏷 PlaceholderAPI Outils</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>📘 PlaceholderAPI Intégration</gradient>"
    lore:
    - "<gradient:#6b7280:#9ca3af>PlaceholderAPI pris en charge :</gradient> <gradient:#10b981:#34d399>%supported%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Extension cible :</gradient> <gradient:#f59e0b:#fbbf24>%expansion_name%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Installer et recharger directement à partir de ce panneau</gradient>"
  detection:
    supported:
      name: "<gradient:#22c55e:#86efac>✅ PlaceholderAPI détecté</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>PlaceholderAPI est installé et activé</gradient>"
    missing:
      name: "<gradient:#ef4444:#f87171>❌ PlaceholderAPI</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>manquant Installez et activez PlaceholderAPI pour utiliser cette action</gradient>"
  action:
    install:
      name: "<gradient:#22c55e:#86efac>📥 Installer l'extension %expansion_name%</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Exécute :</gradient> <gradient:#f59e0b:#fbbf24>papi ecloud download %expansion_name%</gradient>"
      - "<gradient:#6b7280:#9ca3af>Puis exécute :</gradient> <gradient:#f59e0b:#fbbf24>papi reload</gradient>"
      - "<gradient:#6b7280:#9ca3af>Cliquez pour exécuter les deux commandes PlaceholderAPI</gradient>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>🚫 PlaceholderAPI requis</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Cette action n'est pas disponible tant que PlaceholderAPI n'est pas installé</gradient>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>❌ Accès administrateur requis</gradient>"
      lore:
      - "<gradient:#6b7280:#9ca3af>Vous n'êtes pas autorisé à utiliser les outils d'administration PlaceholderAPI</gradient>"
    locked_message: "<gradient:#ef4444:#f87171>❌ Vous n'avez pas l'autorisation de gérer les intégrations PlaceholderAPI.</gradient>"
    unsupported_message: "<gradient:#ef4444:#f87171>❌ PlaceholderAPI n'est pas disponible sur ce serveur.</gradient>"
    download_failed: "<gradient:#ef4444:#f87171>❌ Échec du téléchargement de l'extension :</gradient> <gradient:#f59e0b:#fbbf24>%expansion_name%</gradient>"
    reload_failed: "<gradient:#ef4444:#f87171>❌ Téléchargement de l'extension terminé, mais le rechargement de PlaceholderAPI a échoué.</gradient>"
    completed: "<gradient:#22c55e:#86efac>✅ Installation de l'extension %expansion_name% et rechargement de PlaceholderAPI.</gradient>"

