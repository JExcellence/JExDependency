      ready: "<gradient:#10b981:#34d399>L'avantage est prêt à être utilisé !</gradient>"
    
    # Déclencheurs d'effet
    potion_enhanced: "<gradient:#a855f7:#c084fc>✨Potion améliorée !</gradient> <gradient:#6b7280:#9ca3af>Effets amplifiés</gradient>"
    potion_extended: "<gradient:#f59e0b:#fbbf24>⏱ Durée des potions prolongée !</gradient> <gradient:#6b7280:#9ca3af>Dure plus longtemps</gradient>"
    potion_saved: "<gradient:#10b981:#34d399>💾 Potion sauvée !</gradient> <gradient:#6b7280:#9ca3af>Retourné à l'inventaire</gradient>"
    fishing_active: "<gradient:#3b82f6:#60a5fa>🎣 Pêche active plus rapide !</gradient>"
    fishing_xp: "<gradient:#10b981:#34d399>+%xp% XP de pêche !</gradient>"
  
