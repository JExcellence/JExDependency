      failed: "<gradient:#ef4444:#f87171>Échec du déverrouillage de l'avantage. Veuillez réessayer.</gradient>"
      error: "<gradient:#ef4444:#f87171>Une erreur s'est produite lors du déverrouillage de l'avantage.</gradient>"
      requirements_not_met: "<gradient:#ef4444:#f87171>Vous ne remplissez pas les conditions pour débloquer cet avantage !</gradient>"
    enable:
      success: "<gradient:#10b981:#34d399>Avantage activé :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Échec de l'activation de l'avantage :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      limit_reached: "<gradient:#ef4444:#f87171>Vous avez atteint le nombre maximum d'avantages activés (%limit%)!</gradient>"
    disable:
      success: "<gradient:#f59e0b:#fbbf24>Avantage désactivé :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
      failed: "<gradient:#ef4444:#f87171>Échec de la désactivation de l'avantage :</gradient> <gradient:#a855f7:#c084fc>%perk%</gradient>"
    
    # Refroidir
