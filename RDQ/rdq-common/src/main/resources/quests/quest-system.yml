# ============================================================================
# Quest System Configuration
# ============================================================================
# Main configuration file for the RDQ quest system.
# 
# Structure:
#   - System-wide settings (max quests, features)
#   - Category definitions (metadata only)
#   - Quest definitions loaded from: definitions/{category}/*.yml
# ============================================================================

# ========================================
# SYSTEM SETTINGS
# ========================================
maxActiveQuests: 5
enableQuestLog: true
enableQuestTracking: true
enableQuestNotifications: true

# ========================================
# QUEST CATEGORIES
# ========================================
# Categories organize quests into logical groups.
# Individual quest definitions are in: definitions/{category}/*.yml
categories:
  
  tutorial:
    displayOrder: 0
    icon:
      material: BOOK
      displayNameKey: "quest.category.tutorial.name"
      descriptionKey: "quest.category.tutorial.description"
    enabled: true
    quests: {}
  
  combat:
    displayOrder: 1
    icon:
      material: IRON_SWORD
      displayNameKey: "quest.category.combat.name"
      descriptionKey: "quest.category.combat.description"
