# Zombie Slayer II - Intermediate Tier
# Second tier in the Zombie Slayer quest chain
# Requires completion of Zombie Slayer I
# Unlocks Zombie Slayer III upon completion
identifier: "zombie_slayer_2"
category: "combat"
difficulty: "NORMAL"
enabled: true
displayOrder: 2

# Quest metadata
repeatable: true
maxCompletions: -1  # Unlimited
cooldownSeconds: 7200  # 2 hour cooldown
timeLimitSeconds: 0  # No time limit

# Icon configuration
icon:
  type: "ZOMBIE_HEAD"
  displayNameKey: "quest.zombie_slayer_2.name"
  descriptionKey: "quest.zombie_slayer_2.description"

# Quest requirements
requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 15
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  previous_quest:
    type: "QUEST_COMPLETION"
    questId: "zombie_slayer_1"
    icon:
      type: "WRITABLE_BOOK"

# Quest tasks
tasks:
  kill_zombies:
    identifier: "kill_zombies"
    nameKey: "quest.zombie_slayer_2.task.kill_zombies.name"
    descriptionKey: "quest.zombie_slayer_2.task.kill_zombies.description"
    orderIndex: 1
    difficulty: "NORMAL"
    sequential: false
    
    requirement:
      type: "ENTITY_KILL"
      entityType: "ZOMBIE"
      amount: 50
      icon:
        type: "IRON_SWORD"
    
    reward:
      type: "CURRENCY"
      currency: "raindrops"
      amount: 125.0
      icon:
        type: "GOLD_NUGGET"
  
  collect_rotten_flesh:
    identifier: "collect_rotten_flesh"
    nameKey: "quest.zombie_slayer_2.task.collect_flesh.name"
    descriptionKey: "quest.zombie_slayer_2.task.collect_flesh.description"
    orderIndex: 2
    difficulty: "NORMAL"
    sequential: false
    
    requirement:
      type: "ITEM_COLLECTION"
      consumeOnComplete: true
      requiredItems:
        rotten_flesh:
          material: "ROTTEN_FLESH"
          amount: 25
      icon:
        type: "ROTTEN_FLESH"
    
    reward:
      type: "EXPERIENCE"
      experienceAmount: 500
      experienceType: "POINTS"
      icon:
        type: "EXPERIENCE_BOTTLE"

# Quest completion rewards
rewards:
  completion_currency:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 500.0
    icon:
      type: "GOLD_BLOCK"
  
  completion_experience:
    type: "EXPERIENCE"
    experienceAmount: 1000
    experienceType: "POINTS"
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  bonus_item:
    type: "ITEM"
    item:
      material: "DIAMOND_SWORD"
      amount: 1
      displayName: "<gradient:#ef4444:#f87171>Zombie Slayer Sword II</gradient>"
      lore:
        - "<gray>An enhanced blade forged from</gray>"
        - "<gray>defeating hordes of zombies</gray>"
        - ""
        - "<dark_gray>Tier: <white>II</white></dark_gray>"
      enchantments:
        DAMAGE_UNDEAD: 4
        DURABILITY: 3
        FIRE_ASPECT: 1
    icon:
      type: "DIAMOND_SWORD"
  
  unlock_tier_3:
    type: "QUEST"
    questId: "zombie_slayer_3"
    icon:
      type: "WRITABLE_BOOK"
