    currency_id: "coins"
    amount: 150
  - type: "EXPERIENCE"
    amount: 75
  - type: "ITEM"
    material: "GOLDEN_HOE"
    amount: 1
    display_name_key: "item.baker_hoe.name"
    lore_key: "item.baker_hoe.lore"
    enchantments:
      EFFICIENCY: 2

prerequisites: []

requirements: []

attributes:
  repeatable: false
  hidden: false
  quest_type: "MAIN"
