# ============================================================================
# BAKER QUEST: Apprentice Baker
# ============================================================================
# Entry-level baking quest introducing basic food crafting.
# First quest in the baker progression chain.
# ============================================================================

identifier: "apprentice_baker"
category: "baker"
difficulty: EASY

icon:
  material: "BREAD"
  display_name_key: "quest.apprentice_baker.name"
  description_key: "quest.apprentice_baker.description"
  custom_model_data: 3000
  enchanted: false

tasks:
  - identifier: "collect_wheat"
    type: "COLLECT_ITEMS"
    target: "WHEAT"
    amount: 64
    icon:
      material: "WHEAT"
      display_name_key: "quest.apprentice_baker.task1.name"
  
  - identifier: "craft_bread"
    type: "CRAFT_ITEMS"
    target: "BREAD"
    amount: 20
    icon:
      material: "BREAD"
      display_name_key: "quest.apprentice_baker.task2.name"
  
  - identifier: "bake_cookies"
    type: "CRAFT_ITEMS"
    target: "COOKIE"
    amount: 16
    icon:
      material: "COOKIE"
      display_name_key: "quest.apprentice_baker.task3.name"

rewards:
