      material: "DIAMOND_SWORD"
      display_name_key: "quest.combat_apprentice.task1.name"
  
  - identifier: "kill_spiders"
    type: "KILL_MOBS"
    target: "SPIDER"
    amount: 20
    icon:
      material: "SPIDER_EYE"
      display_name_key: "quest.combat_apprentice.task2.name"
  
