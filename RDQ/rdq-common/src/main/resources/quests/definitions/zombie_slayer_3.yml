# Zombie Slayer III - Expert Tier
# Third and final tier in the Zombie Slayer quest chain
# Requires completion of Zombie Slayer II
# Grants ultimate rewards and title
identifier: "zombie_slayer_3"
category: "combat"
difficulty: "HARD"
enabled: true
displayOrder: 3

# Quest metadata
repeatable: true
maxCompletions: -1  # Unlimited
cooldownSeconds: 14400  # 4 hour cooldown
timeLimitSeconds: 0  # No time limit

# Icon configuration
icon:
  type: "ZOMBIE_HEAD"
  displayNameKey: "quest.zombie_slayer_3.name"
  descriptionKey: "quest.zombie_slayer_3.description"

# Quest requirements
requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 30
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  previous_quest:
    type: "QUEST_COMPLETION"
    questId: "zombie_slayer_2"
    icon:
      type: "WRITABLE_BOOK"
  
  currency_requirement:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 500.0
    consumable: true  # Consume currency on quest start
    icon:
      type: "GOLD_BLOCK"

# Quest tasks
tasks:
  kill_zombies:
    identifier: "kill_zombies"
    nameKey: "quest.zombie_slayer_3.task.kill_zombies.name"
    descriptionKey: "quest.zombie_slayer_3.task.kill_zombies.description"
    orderIndex: 1
    difficulty: "HARD"
    sequential: false
    
    requirement:
      type: "ENTITY_KILL"
      entityType: "ZOMBIE"
      amount: 100
      icon:
        type: "DIAMOND_SWORD"
    
    reward:
      type: "CURRENCY"
      currency: "raindrops"
      amount: 250.0
      icon:
        type: "GOLD_INGOT"
  
  collect_rotten_flesh:
    identifier: "collect_rotten_flesh"
    nameKey: "quest.zombie_slayer_3.task.collect_flesh.name"
    descriptionKey: "quest.zombie_slayer_3.task.collect_flesh.description"
    orderIndex: 2
    difficulty: "HARD"
    sequential: false
    
    requirement:
      type: "ITEM_COLLECTION"
      consumeOnComplete: true
      requiredItems:
        rotten_flesh:
          material: "ROTTEN_FLESH"
          amount: 50
      icon:
        type: "ROTTEN_FLESH"
    
    reward:
      type: "EXPERIENCE"
      experienceAmount: 1000
      experienceType: "POINTS"
      icon:
        type: "EXPERIENCE_BOTTLE"
  
  kill_zombie_villagers:
    identifier: "kill_zombie_villagers"
    nameKey: "quest.zombie_slayer_3.task.kill_villagers.name"
    descriptionKey: "quest.zombie_slayer_3.task.kill_villagers.description"
    orderIndex: 3
    difficulty: "HARD"
    sequential: false
    
    requirement:
      type: "ENTITY_KILL"
      entityType: "ZOMBIE_VILLAGER"
      amount: 10
      icon:
        type: "GOLDEN_APPLE"
    
    reward:
      type: "COMPOSITE"
      rewards:
        - type: "CURRENCY"
          currency: "raindrops"
          amount: 200.0
        - type: "EXPERIENCE"
          experienceAmount: 500
          experienceType: "POINTS"
      icon:
        type: "GOLD_BLOCK"

# Quest completion rewards
rewards:
  completion_currency:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 1500.0
    icon:
      type: "GOLD_BLOCK"
  
  completion_experience:
    type: "EXPERIENCE"
    experienceAmount: 2500
    experienceType: "POINTS"
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  legendary_sword:
    type: "ITEM"
    item:
      material: "NETHERITE_SWORD"
      amount: 1
      displayName: "<gradient:#ef4444:#f87171>Legendary Zombie Slayer</gradient>"
      lore:
        - "<gradient:#ef4444:#f87171>A legendary blade forged from</gradient>"
        - "<gradient:#ef4444:#f87171>the essence of countless undead</gradient>"
        - ""
        - "<dark_gray>Tier: <gradient:#f59e0b:#fbbf24>III - Legendary</gradient></dark_gray>"
        - ""
        - "<gray>Special Abilities:</gray>"
        - "<yellow>+ Smite V</yellow>"
        - "<yellow>+ Unbreaking IV</yellow>"
        - "<yellow>+ Fire Aspect II</yellow>"
        - "<yellow>+ Looting III</yellow>"
      enchantments:
        DAMAGE_UNDEAD: 5
        DURABILITY: 4
        FIRE_ASPECT: 2
        LOOT_BONUS_MOBS: 3
    icon:
      type: "NETHERITE_SWORD"
  
  slayer_title:
    type: "COMMAND"
    command: "lp user {player} permission set rdq.title.zombie_slayer true"
    executeAsPlayer: false
    icon:
      type: "NAME_TAG"
  
  unlock_perk:
    type: "PERK"
    perkId: "strength"
    icon:
      type: "POTION"
