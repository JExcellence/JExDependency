identifier: "skilled_enchanter"
category: "enchanter"
difficulty: EASY

icon:
  material: "ENCHANTED_BOOK"
  display_name_key: "quest.skilled_enchanter.name"
  description_key: "quest.skilled_enchanter.description"
  custom_model_data: 7001
