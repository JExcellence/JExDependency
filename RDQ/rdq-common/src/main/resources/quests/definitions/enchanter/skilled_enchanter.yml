    type: "ENCHANT_ITEM"
    target: "DIAMOND_PICKAXE"
    amount: 3
    icon:
      material: "DIAMOND_PICKAXE"
      display_name_key: "quest.skilled_enchanter.task3.name"
  
  - identifier: "craft_anvil"
    type: "CRAFT_ITEMS"
    target: "ANVIL"
    amount: 1
    icon:
      material: "ANVIL"
      display_name_key: "quest.skilled_enchanter.task4.name"

