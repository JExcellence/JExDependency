    type: "CRAFT_ITEMS"
    target: "BOOKSHELF"
    amount: 15
    icon:
      material: "BOOKSHELF"
      display_name_key: "quest.skilled_enchanter.task1.name"
  
  - identifier: "collect_experience"
    type: "GAIN_EXPERIENCE"
    amount: 500
    icon:
      material: "EXPERIENCE_BOTTLE"
      display_name_key: "quest.skilled_enchanter.task2.name"
  
