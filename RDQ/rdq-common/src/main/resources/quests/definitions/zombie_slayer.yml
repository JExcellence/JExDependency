# Zombie Slayer I - Beginner Tier
# First tier in the Zombie Slayer quest chain
# Unlocks Zombie Slayer II upon completion
identifier: "zombie_slayer_1"
category: "combat"
difficulty: "EASY"
enabled: true
displayOrder: 1

# Quest metadata
repeatable: true
maxCompletions: -1  # Unlimited
cooldownSeconds: 3600  # 1 hour cooldown
timeLimitSeconds: 0  # No time limit

# Icon configuration
icon:
  type: "ZOMBIE_HEAD"
  displayNameKey: "quest.zombie_slayer_1.name"
  descriptionKey: "quest.zombie_slayer_1.description"

# Quest requirements (must be met before starting)
requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 5
    icon:
      type: "EXPERIENCE_BOTTLE"

# Quest tasks
tasks:
  kill_zombies:
    identifier: "kill_zombies"
    nameKey: "quest.zombie_slayer_1.task.kill_zombies.name"
    descriptionKey: "quest.zombie_slayer_1.task.kill_zombies.description"
    orderIndex: 1
    difficulty: "EASY"
    sequential: false
    
    requirement:
      type: "ENTITY_KILL"
      entityType: "ZOMBIE"
      amount: 10
      icon:
        type: "IRON_SWORD"
    
    reward:
      type: "CURRENCY"
      currency: "raindrops"
      amount: 25.0
      icon:
        type: "GOLD_NUGGET"

# Quest completion rewards
rewards:
  completion_currency:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 100.0
    icon:
      type: "GOLD_INGOT"
  
  completion_experience:
    type: "EXPERIENCE"
    experienceAmount: 250
    experienceType: "POINTS"
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  unlock_tier_2:
    type: "QUEST"
    questId: "zombie_slayer_2"
    icon:
      type: "WRITABLE_BOOK"
