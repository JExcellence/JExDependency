# Quest System Configuration
# This file controls global quest system settings

# Enable or disable the entire quest system
enabled: true

# Maximum number of quests a player can have active at once
max-active-quests: 5

# Auto-save interval in seconds (how often to save quest progress)
auto-save-interval: 300

# Enable quest caching for better performance
cache-enabled: true

# Log performance metrics for quest operations
log-performance: false
