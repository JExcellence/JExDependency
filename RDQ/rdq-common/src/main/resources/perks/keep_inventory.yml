# Keep Inventory Perk
# Preserves the player's inventory on death
identifier: "keep_inventory"
perkType: "PASSIVE"
category: "SURVIVAL"
enabled: true
displayOrder: 13

icon:
  type: "CHEST"
  displayNameKey: "perk.keep_inventory.name"
  descriptionKey: "perk.keep_inventory.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 40
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  currency_requirement:
    type: "CURRENCY"
    currencyRequirement:
      currencyType: "coins"
      requiredCurrencies:
        coins: 7500.0
      consumeOnComplete: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Keep Inventory! Your items are safe!\",\"color\":\"green\"}"
    executeAsPlayer: false

effect:
  specialType: "KEEP_INVENTORY"
