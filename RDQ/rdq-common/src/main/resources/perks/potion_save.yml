# Potion Save
# Chance to get your potion back after drinking it
identifier: "potion_save"
perkType: "EVENT_TRIGGERED"
category: "UTILITY"
enabled: true
displayOrder: 19

icon:
  type: "POTION"
  displayNameKey: "perk.potion_save.name"
  descriptionKey: "perk.potion_save.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 12
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currency: "coins"
    amount: 1800.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Potion Saves! Retain extra potions!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_ITEM_CONSUME_EVENT"
  cooldownMillis: 120000  # 2 minutes (was 30 seconds - very powerful perk!)
  triggerChance: 10.0  # 10% chance (was 25% - getting free potions is very strong)
  customConfig:
    saved: 1  # 1 potion returned
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
