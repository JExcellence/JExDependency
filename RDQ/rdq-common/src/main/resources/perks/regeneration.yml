    rdq.perk.regeneration.level3: 2
    rdq.perk.regeneration.vip: 1
    rdq.perk.regeneration.premium: 2

permissionDurations:
  defaultDuration: 0
  permissionDurations:
    rdq.perk.regeneration.vip: 0
    rdq.perk.regeneration.premium: 0

costs:
  economy:
    targetPluginId: "Vault"
    currencyTypeId: "money"
    amount: 2000.0
  tokens:
    targetPluginId: "TokenManager"
    currencyTypeId: "tokens"
    amount: 100.0

requirements:
  regeneration:
    type: "COMPOSITE"
    operator: "AND"
    requirements:
