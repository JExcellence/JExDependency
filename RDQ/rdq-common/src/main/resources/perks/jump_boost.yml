perkSettings:
  icon:
    material: "FEATHER"
  displayNameKey: "perk.jump_boost.name"
  descriptionKey: "perk.jump_boost.lore"
  priority: 90
  maxConcurrentUsers: null
  requiresOwnedArea: false
  isEnabled: true
  metadata:
    category: "MOVEMENT"
    rarity: "COMMON"
    perkType: "TOGGLEABLE_PASSIVE"
    effectType: "JUMP_BOOST"
    showParticles: true
    particleType: "CLOUD"
    particleAmount: 3
    playToggleSound: true
    toggleOnSound: "ENTITY_PLAYER_LEVELUP"
    toggleOffSound: "BLOCK_NOTE_BLOCK_BASS"

permissionCooldowns:
  defaultCooldown: 0
  permissionCooldowns:
    jump_boost_vip: 0
    jump_boost_premium: 0

permissionAmplifiers:
  defaultAmplifier: 0
  permissionAmplifiers:
    jump_boost_level1: 0
    jump_boost_level2: 1
    jump_boost_level3: 2
    jump_boost_vip: 1
    jump_boost_premium: 2

permissionDurations:
  defaultDuration: 0
  permissionDurations:
    jump_boost_vip: 0
    jump_boost_premium: 0

costs:
  economy:
    targetPluginId: "Vault"
    currencyTypeId: "money"
    amount: 800.0
  tokens:
    targetPluginId: "TokenManager"
    currencyTypeId: "tokens"
    amount: 40.0

requirements:
  jump_boost:
    type: "COMPOSITE"
    operator: "AND"
    requirements:
      - type: "EXPERIENCE_LEVEL"
        level: 15
      - type: "PLAYTIME"
        playtimeRequirement:
          useTotalPlayTime: true
          requiredPlaytimeHours: 1

rewards:
  message:
    type: "MESSAGE"
    message: "Jump boost activated! You can now jump higher!"
  command:
    type: "COMMAND"
    command: "say {player} activated jump boost"
