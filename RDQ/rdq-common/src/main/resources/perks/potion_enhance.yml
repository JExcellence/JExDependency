# Potion Enhance
# Enhances potion when player consumes
identifier: "potion_enhance"
perkType: "EVENT_TRIGGERED"
category: "UTILITY"
enabled: true
displayOrder: 17

icon:
  type: "POTION"
  displayNameKey: "perk.potion_enhance.name"
  descriptionKey: "perk.potion_enhance.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 14
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 2000.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Potion Enhancement! Strengthen potions you consume!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_ITEM_CONSUME"
  cooldownMillis: 45000  # 45 seconds (was 30 - increased due to power)
  triggerChance: 25.0  # 25% chance (was 60% - way too high!)
  customConfig:
    amplify: 1.5  # 50% stronger (was 2.0 = double)
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
