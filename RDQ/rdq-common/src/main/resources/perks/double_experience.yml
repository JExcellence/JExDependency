permissionAmplifiers:
  defaultAmplifier: 0
  permissionAmplifiers:
    rdq.perk.double_experience.level1: 0
    rdq.perk.double_experience.level2: 0
    rdq.perk.double_experience.level3: 0
    rdq.perk.double_experience.vip: 0
    rdq.perk.double_experience.premium: 0

permissionDurations:
  defaultDuration: 0
  permissionDurations:
    rdq.perk.double_experience.vip: 0
    rdq.perk.double_experience.premium: 0

costs:
  economy:
    targetPluginId: "Vault"
    currencyTypeId: "money"
    amount: 1500.0
  tokens:
    targetPluginId: "TokenManager"
    currencyTypeId: "tokens"
    amount: 75.0

requirements:
  double_experience:
    type: "COMPOSITE"
    operator: "AND"
