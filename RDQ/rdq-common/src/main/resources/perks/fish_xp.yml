# Fish XP
# Extra XP from fishing
identifier: "fish_xp"
perkType: "EVENT_TRIGGERED"
category: "UTILITY"
enabled: true
displayOrder: 20

icon:
  type: "COD"
  displayNameKey: "perk.fish_xp.name"
  descriptionKey: "perk.fish_xp.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 35
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currency: "raindrops"
    amount: 5000.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked increased XP while fishing!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_FISH"
  cooldownMillis: 60000  # 60 seconds (was 30)
  triggerChance: 25.0  # 25% chance
  customConfig:
    vanilla: 5.0  # 5 extra XP (was 100 - way too much!)
    skill: 50.0   # 50 skill XP (was 1000)
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
