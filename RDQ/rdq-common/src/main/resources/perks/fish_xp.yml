# Fish XP
# Extra XP from fishing
identifier: "fish_xp"
perkType: "PASSIVE"
category: "UTILITY"
enabled: true
displayOrder: 20

icon:
  type: "COD"
  displayNameKey: "perk.fish_xp.name"
  descriptionKey: "perk.fish_xp.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 35
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currencyRequirement:
      currencyType: "coins"
      requiredCurrencies:
        coins: 5000.0
      consumeOnComplete: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked increased XP while fishing!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_FISH_EVENT"
  cooldownMillis: 30000  # 30 seconds
  triggerChance: 25.0  # 25% chance
  customConfig:
    vanilla: 100.0  # Vanilla MC XP
    skill: 1000.0   # Skill plugin fishing XP
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
