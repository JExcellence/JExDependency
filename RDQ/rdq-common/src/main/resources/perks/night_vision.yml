# Night Vision Perk
# Grants continuous night vision effect to the player
identifier: "night_vision"
perkType: "PASSIVE"
category: "UTILITY"
enabled: true
displayOrder: 2

icon:
  type: "ENDER_EYE"
  displayNameKey: "perk.night_vision.name"
  descriptionKey: "perk.night_vision.description"
  enchanted: true

requirements:
  currency_requirement:
    type: "CURRENCY"
    currency: "coins"
    amount: 150.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Night Vision!\",\"color\":\"green\"}"
    executeAsPlayer: false

effect:
  potionEffectType: "NIGHT_VISION"
  amplifier: 0
  durationTicks: 600  # 30 seconds (refreshed continuously)
  ambient: false
  particles: false
