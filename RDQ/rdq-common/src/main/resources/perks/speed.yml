# Speed Boost Perk
# Grants continuous speed effect to the player
identifier: "speed"
perkType: "PASSIVE"
category: "MOVEMENT"
enabled: true
displayOrder: 1

icon:
  type: "FEATHER"
  displayNameKey: "perk.speed.name"
  descriptionKey: "perk.speed.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 10
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  currency_requirement:
    type: "CURRENCY"
    currency: "coins"
    amount: 500.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Speed Boost!\",\"color\":\"gold\"}"
    executeAsPlayer: false

effect:
  potionEffectType: "SPEED"
  amplifier: 1
  durationTicks: 600  # 30 seconds (refreshed continuously)
  ambient: false
  particles: true
