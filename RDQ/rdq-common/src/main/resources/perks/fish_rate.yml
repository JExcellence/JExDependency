# Fish Rate
# Improve fishing rates to catch fish faster
identifier: "fish_rate"
perkType: "PASSIVE"
category: "UTILITY"
enabled: true
displayOrder: 21

icon:
  type: "SALMON"
  displayNameKey: "perk.fish_rate.name"
  descriptionKey: "perk.fish_rate.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 28
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currencyRequirement:
      currencyType: "coins"
      requiredCurrencies:
        coins: 5000.0
      consumeOnComplete: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked enhanced fish rate! Catch fish faster!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_FISH_EVENT"
  cooldownMillis: 30000  # 30 seconds
  triggerChance: 25.0  # 25% chance
  customConfig:
    # Lower values to catch fish faster - Default 5-30 seconds
    minWaitTime: 60.0  # 3 seconds
    maxWaitTime: 100.0 # 5 seconds
    # Lower values to lure fish faster (time fish circles before biting)
    minLureTime: 10.0
    maxLureTime: 30.0
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
