# Fish Rate
# Improve fishing rates to catch fish faster
identifier: "fish_rate"
perkType: "EVENT_TRIGGERED"
category: "UTILITY"
enabled: true
displayOrder: 21

icon:
  type: "SALMON"
  displayNameKey: "perk.fish_rate.name"
  descriptionKey: "perk.fish_rate.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 28
    icon:
      type: "EXPERIENCE_BOTTLE"

  currency_requirement:
    type: "CURRENCY"
    currency: "coins"
    amount: 5000.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked enhanced fish rate! Catch fish faster!\",\"color\":\"yellow\"}"
    executeAsPlayer: false

effect:
  triggerEvent: "PLAYER_FISH_EVENT"
  cooldownMillis: 60000  # 60 seconds (was 30)
  triggerChance: 25.0  # 25% chance
  customConfig:
    # More balanced values - Default MC: 100-600 ticks (5-30 seconds)
    minWaitTime: 200  # 10 seconds (was 60 = 3 seconds)
    maxWaitTime: 400  # 20 seconds (was 100 = 5 seconds)
    # Lower values to lure fish faster (time fish circles before biting)
    minLureTime: 20   # 1 second
    maxLureTime: 60   # 3 seconds
    playSound: true
    soundType: "ENTITY_PLAYER_LEVELUP"
