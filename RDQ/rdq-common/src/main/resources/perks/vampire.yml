  defaultDuration: 0
  permissionDurations:
    vampire_vip: 0
    vampire_premium: 0

costs:
  economy:
    targetPluginId: "Vault"
    currencyTypeId: "money"
    amount: 2200.0
  tokens:
    targetPluginId: "TokenManager"
    currencyTypeId: "tokens"
    amount: 110.0

requirements:
  vampire:
    type: "COMPOSITE"
    operator: "AND"
