# Strength Perk
# Grants continuous strength effect to the player
identifier: "strength"
perkType: "PASSIVE"
category: "COMBAT"
enabled: true
displayOrder: 4

icon:
  type: "IRON_SWORD"
  displayNameKey: "perk.strength.name"
  descriptionKey: "perk.strength.description"
  enchanted: true

requirements:
  level_requirement:
    type: "EXPERIENCE_LEVEL"
    level: 20
    icon:
      type: "EXPERIENCE_BOTTLE"
  
  currency_requirement:
    type: "CURRENCY"
    currency: "coins"
    amount: 1000.0
    consumable: true
    icon:
      type: "GOLD_INGOT"

unlockRewards:
  welcome_message:
    type: "COMMAND"
    command: "tellraw {player} {\"text\":\"You unlocked Strength!\",\"color\":\"red\"}"
    executeAsPlayer: false

effect:
  potionEffectType: "INCREASE_DAMAGE"
  amplifier: 0
  durationTicks: 600  # 30 seconds (refreshed continuously)
  ambient: false
  particles: true
