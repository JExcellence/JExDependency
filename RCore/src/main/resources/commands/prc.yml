commands:
  rc:
    name: 'rc'
    description: 'Manage this server connection to RaindropCentral'
    aliases: []
    usage: 'rc <main|connect <api-key>|disconnect|claim droplets|store update|bossbar [toggle|enable|disable|set]>'
    errorMessages:
      invalidKey$: 'lut["prefix"] & "&cInvalid API key format"'
      uuidMismatch$: 'lut["prefix"] & "&cThis API key belongs to a different Minecraft account"'
      alreadyConnected$: 'lut["prefix"] & "&eServer is already connected. Use /rc disconnect first"'
      networkError$: 'lut["prefix"] & "&cNetwork error: " & error'
      notConnected$: 'lut["prefix"] & "&cServer is not connected to RaindropCentral"'
      disconnectFailed$: 'lut["prefix"] & "&cFailed to disconnect: " & error'
    permissions:
      missingMessage$: 'lut["prefix"] & "&cYou lack the permission: " & permission'
      nodes:
        bossBar: 'rcore.command.bossbar'
        main: 'rcore.command.main'
        connect: 'rcore.central.connect'
        disconnect: 'rcore.central.disconnect'
        claimDroplets: 'rcore.central.claim.droplets'
        storeUpdate: 'rcore.central.store.update'

lut:
  prefix: '&8[&bRaindropCentral&8] &7'
