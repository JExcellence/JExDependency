# Suomenkieliset käännökset RCore Central -integraatiolle

prefix: "<dark_gray>[<aqua>RaindropCentral</aqua>]</dark_gray> "

rcconnect:
  usage: "<gray>Käyttö: /rcconnect <api-key></gray>"
  connecting: "<yellow>Yhdistetään RaindropCentraliin...</yellow>"
  success: "<green>Yhteys RaindropCentraliin muodostettiin onnistuneesti!</green> <gray>Palvelin lähettää nyt heartbeat-signaaleja.</gray>"
  error:
    invalid_key: "<red>Virheellinen API-avaimen muoto. API-avainten tulee olla 32-128 aakkosnumeerista merkkiä.</red>"
    uuid_mismatch: "<red>Tämä API-avain kuuluu toiselle Minecraft-tilille.</red>"
    already_connected: "<yellow>Palvelin on jo yhdistetty.</yellow> <gray>Käytä ensin komentoa /rcdisconnect.</gray>"
    network: "<red>Verkkovirhe: %error%</red>"

rcdisconnect:
  disconnecting: "<yellow>Katkaistaan yhteyttä RaindropCentraliin...</yellow>"
  success: "<green>Yhteys RaindropCentraliin katkaistiin onnistuneesti.</green>"
  error:
    not_connected: "<red>Palvelin ei ole yhdistetty RaindropCentraliin.</red>"
    failed: "<red>Yhteyden katkaisu epäonnistui. Yritä uudelleen.</red>"
    network: "<red>Verkkovirhe: %error%</red>"

general:
  no_permission: "<red>Sinulla ei ole oikeutta käyttää tätä komentoa.</red>"
