# ============================================
# GUI Buttons
# ============================================

shop_overview_ui:
  title: "{owner} Shop - {location}"

# ============================================
# PAGINATION
# ============================================
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Page %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Current page:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Total pages:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Page %direction%</gradient>"

# ============================================
# HEAD ITEMS
# ============================================
head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Return</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to go back</gradient>"