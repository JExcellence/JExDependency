# ============================================
# GLOBAL PREFIX
# ============================================
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

info:
  total: "<blue>Shops:</blue> <white>{owned_shops}</white>"
  bank: "<green>Tracked Balances ({currency_count}):</green> <white>{currencies}</white>"

# ============================================
# GUI Buttons
# ============================================

shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Place this block to set up your shop.</yellow>"

shop_store_ui:
  title: "Shop Store"
  owned_shops:
    name: "<blue>Total Owned Shops</blue>"
    lore:
      - "<gray>Owned shops:</gray> <white>{owned_shops}</white>"
      - "<gray>Placed shops currently registered</gray>"
      - "<gray>to your account.</gray>"
  max_shops:
    name: "<green>Shop Limit</green>"
    lore:
      - "<gray>Owned shops:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum shops:</gray> <white>{max_shops}</white>"
      - "<gray>This limit controls how many shops</gray>"
      - "<gray>you may place.</gray>"
  costs:
    name: "<gold>Store Costs</gold>"
    lore:
      - "<gray>Available currencies:</gray> <white>{currency_count}</white>"
      - "<gray>Review every required currency</gray>"
      - "<gray>before purchasing a new shop.</gray>"
      - "<yellow>Click to open the cost list.</yellow>"

shop_store_cost_ui:
  title: "Shop Costs"
  summary:
    name: "<gold>Purchase Shop Block</gold>"
    lore:
      - "<gray>The following currencies are required</gray>"
      - "<gray>to purchase a new shop block.</gray>"
      - "<gray>Owned shops:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum shops:</gray> <white>{max_shops}</white>"
      - "<gray>Required currencies:</gray> <white>{currency_count}</white>"
      - "<yellow>Click to purchase using all listed currencies.</yellow>"
  empty:
    name: "<red>No Store Currencies Available</red>"
    lore:
      - "<gray>No configured store currencies are</gray>"
      - "<gray>currently available on this server.</gray>"
  entry:
    name: "<gold>{currency_name}</gold>"
    lore:
      - "<gray>Currency id:</gray> <white>{currency_type}</white>"
      - "<gray>Initial cost:</gray> <white>{initial_cost}</white>"
      - "<gray>Growth rate:</gray> <white>{growth_rate}</white>"
      - "<gray>Current cost:</gray> <white>{current_cost}</white>"
  feedback:
    purchased: "<green>Purchased a shop block. Required currencies: {costs}. Current placed shops: {owned_shops}.</green>"
    insufficient_funds: "<red>You need {cost} from {currency_name} to buy a shop block.</red>"
    purchase_failed: "<red>Failed to charge {cost} from {currency_name}. Any partial charges were rolled back.</red>"
    no_currencies: "<red>No configured store currencies are available right now.</red>"
    limit_reached: "<red>You have reached the shop limit of {max_shops}. Current placed shops: {owned_shops}.</red>"

block_listener:
  error:
    invalid_owner_uuid: "<red>Unable to read the shop owner from this item.</red>"
    max_shops_reached: "<red>You have reached the shop limit of {max_shops}. Current placed shops: {owned_shops}.</red>"

shop_overview_ui:
  title: "{owner} Shop - {location}"
  summary:
    name: "<gold>Shop Summary</gold>"
    player:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Stored entries:</gray> <white>{item_count}</white>"
        - "<gray>Shop type:</gray> <white>Player Shop</white>"
        - "<gray>Inventory:</gray> <white>Finite</white>"
    admin:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Stored entries:</gray> <white>{item_count}</white>"
        - "<gray>Shop type:</gray> <white>Admin Shop</white>"
        - "<gray>Inventory:</gray> <white>Infinite</white>"
  finance:
    name: "<gold>Shop Bank</gold>"
    lore:
      - "<gray>Tracked currencies:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Click to review and withdraw funds.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop Enabled</red>"
        lore:
          - "<gray>This shop is currently an admin shop.</gray>"
          - "<gray>Inventory is infinite for customers.</gray>"
          - "<gray>Stored entries:</gray> <white>{item_count}</white>"
          - "<yellow>Click to switch back to a player shop.</yellow>"
      disabled:
        name: "<green>Admin Shop Disabled</green>"
        lore:
          - "<gray>This shop currently uses normal stock.</gray>"
          - "<gray>Customers can only buy stored amounts.</gray>"
          - "<gray>Stored entries:</gray> <white>{item_count}</white>"
          - "<yellow>Click to enable admin shop mode.</yellow>"
    manage:
      name: "<green>Add Shop Items</green>"
      lore:
        - "<gray>Store new items in this shop.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to open item input.</yellow>"
    edit:
      name: "<aqua>Edit Shop Items</aqua>"
      lore:
        - "<gray>Edit pricing for stored shop items.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to edit prices and currencies.</yellow>"
    storage:
      name: "<gold>View Stored Items</gold>"
      lore:
        - "<gray>Review items already stored in this shop.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to withdraw stored items.</yellow>"
    locked:
      name: "<red>Shop Locked</red>"
      lore:
        - "<gray>Only the owner can add items.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>You do not own this shop.</red>"
    no_admin_permission: "<red>You do not have permission to toggle admin shops.</red>"
    admin_enabled: "<green>This shop is now an admin shop with infinite customer inventory.</green>"
    admin_disabled: "<yellow>This shop is now a normal player shop with finite customer inventory.</yellow>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

shop_input_ui:
  title: "Add Items - {owner} @ {location}"
  summary:
    name: "<gold>Shop Storage</gold>"
    lore:
      - "<gray>Owner:</gray> <white>{owner}</white>"
      - "<gray>Location:</gray> <white>{location}</white>"
      - "<gray>Currently stored:</gray> <white>{stored_count}</white>"
      - "<yellow>New items default to currency type vault and value 0.</yellow>"
  input_slot:
    name: "<green>Input Slot</green>"
    lore:
      - "<gray>Left click with an item on your cursor</gray>"
      - "<gray>or shift-click an item from your inventory.</gray>"
      - "<gray>Right click to remove an inserted stack.</gray>"
  no_new_items_inserted: "<red>No new items were inserted.</red>"
  saved: "<green>Stored {added_count} new entries. Shop now has {stored_count} entries.</green>"
  save_failed: "<red>Failed to save shop items.</red>"
  left_overs: "<yellow>Returned unsaved shop items to your inventory.</yellow>"

shop_storage_ui:
  title: "Stored Items - {location}"
  summary:
    name: "<gold>Stored Items</gold>"
    lore:
      - "<gray>Owner:</gray> <white>{owner}</white>"
      - "<gray>Location:</gray> <white>{location}</white>"
      - "<gray>Stored entries:</gray> <white>{stored_count}</white>"
      - "<yellow>Click any item below to withdraw it.</yellow>"
  entry:
    lore:
      - "<gray>Stored amount:</gray> <white>{amount}</white>"
      - "<gray>Item type:</gray> <white>{item_type}</white>"
      - "<gray>Currency type:</gray> <white>{currency_type}</white>"
      - "<gray>Value:</gray> <white>{value}</white>"
      - "<yellow>Click to extract this item from the shop.</yellow>"
  feedback:
    not_owner: "<red>You do not own this shop.</red>"
    extracted: "<green>Extracted {amount}x {item_type}. Price was {value} {currency_type}. Remaining stored entries: {stored_count}.</green>"
    item_missing: "<red>That stored item could not be found.</red>"
    locked:
      name: "<red>Owner Access Only</red>"
      lore:
        - "<gray>Only the shop owner can withdraw stored items.</gray>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

shop_edit_ui:
  title: "Edit Shop Items - {location}"
  summary:
    name: "<aqua>Shop Price Editor</aqua>"
    lore:
      - "<gray>Owner:</gray> <white>{owner}</white>"
      - "<gray>Location:</gray> <white>{location}</white>"
      - "<gray>Stored entries:</gray> <white>{stored_count}</white>"
      - "<yellow>Click an item below to edit its currency and value.</yellow>"
  entry:
    lore:
      - "<gray>Stored amount:</gray> <white>{amount}</white>"
      - "<gray>Item type:</gray> <white>{item_type}</white>"
      - "<gray>Currency type:</gray> <white>{currency_type}</white>"
      - "<gray>Value:</gray> <white>{value}</white>"
      - "<yellow>Click to edit this shop item.</yellow>"
  feedback:
    locked:
      name: "<red>Owner Access Only</red>"
      lore:
        - "<gray>Only the shop owner can edit item values.</gray>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"

shop_item_edit_ui:
  title: "Edit {item_type}"
  summary:
    lore:
      - "<gray>Stored amount:</gray> <white>{amount}</white>"
      - "<gray>Currency type:</gray> <white>{currency_type}</white>"
      - "<gray>Value:</gray> <white>{value}</white>"
      - "<yellow>Use the buttons below to edit this item.</yellow>"
  currency_type:
    name: "<green>Currency Type</green>"
    lore:
      - "<gray>Current type:</gray> <white>{currency_type}</white>"
      - "<yellow>Click to edit the currency type.</yellow>"
  value:
    name: "<gold>Value</gold>"
    lore:
      - "<gray>Current type:</gray> <white>{currency_type}</white>"
      - "<gray>Current value:</gray> <white>{value}</white>"
      - "<yellow>Click to edit the numeric value.</yellow>"
  confirm:
    name: "<green>Save Item Pricing</green>"
    lore:
      - "<gray>Apply the current currency type and value</gray>"
      - "<gray>to this shop item.</gray>"
  feedback:
    not_owner: "<red>You do not own this shop.</red>"
    shop_missing: "<red>This shop could not be loaded from storage.</red>"
    item_missing: "<red>That shop item could not be found.</red>"
    saved: "<green>Saved item pricing as {value} {currency_type}.</green>"

shop_item_currency_type_anvil_ui:
  title: "Currency Type: {currency_type}"
  input:
    name: "<green>Currency Type</green>"
    lore:
      - "<gray>Enter the currency identifier for this item.</gray>"
      - "<gray>Examples:</gray> <white>vault, tokens, gems</white>"
  error:
    empty: "<red>Currency type cannot be empty.</red>"
    invalid_currency: "<red>Currency type {currency_type} is not available. Use vault or a registered custom currency.</red>"
    processing_failed: "<red>Failed to update the currency type. Input: {input}</red>"

shop_item_value_anvil_ui:
  title: "Value: {value} {currency_type}"
  input:
    name: "<gold>Item Value</gold>"
    lore:
      - "<gray>Enter a non-negative numeric value.</gray>"
      - "<gray>Examples:</gray> <white>0, 10, 25.5</white>"
  error:
    invalid_number: "<red>Enter a valid non-negative number. Input: {input}</red>"
    processing_failed: "<red>Failed to update the item value. Input: {input}</red>"

shop_bank_ui:
  title: "Shop Bank - {location}"
  summary:
    name: "<gold>Bank Balances</gold>"
    lore:
      - "<gray>Owner:</gray> <white>{owner}</white>"
      - "<gray>Location:</gray> <white>{location}</white>"
      - "<gray>Tracked currencies:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Click a balance below to withdraw its full amount.</yellow>"
  entry:
    name: "<gold>{currency_name}</gold>"
    lore:
      - "<gray>Currency id:</gray> <white>{currency_type}</white>"
      - "<gray>Available balance:</gray> <white>{amount} {currency_name}</white>"
      - "<yellow>Click to withdraw this full balance.</yellow>"
  feedback:
    not_owner: "<red>You do not own this shop.</red>"
    entry_missing: "<red>That bank balance is no longer available.</red>"
    withdrawn: "<green>Withdrew {amount} {currency_name}. Remaining {currency_name}: {remaining_amount}. Tracked currencies: {bank_currency_count}.</green>"
    withdraw_failed: "<red>Failed to withdraw {amount} {currency_name} from the shop bank.</red>"
    currency_unavailable: "<red>Currency {currency_name} is not available right now.</red>"
    empty:
      name: "<red>Bank Empty</red>"
      lore:
        - "<gray>This shop has no banked balances to withdraw.</gray>"
    locked:
      name: "<red>Owner Access Only</red>"
      lore:
        - "<gray>Only the shop owner can withdraw shop funds.</gray>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

shop_customer_ui:
  title: "Shop - {location}"
  summary:
    name: "<gold>Customer View</gold>"
    player:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Available entries:</gray> <white>{stored_count}</white>"
        - "<gray>Shop type:</gray> <white>Player Shop</white>"
        - "<gray>Inventory:</gray> <white>Finite</white>"
        - "<yellow>Left click an item to buy one.</yellow>"
        - "<yellow>Right click an item to choose an amount.</yellow>"
    admin:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Available entries:</gray> <white>{stored_count}</white>"
        - "<gray>Shop type:</gray> <white>Admin Shop</white>"
        - "<gray>Inventory:</gray> <white>Infinite</white>"
        - "<yellow>Left click an item to buy one.</yellow>"
        - "<yellow>Right click an item to choose an amount.</yellow>"
  entry:
    player:
      lore:
        - "<gray>Stock:</gray> <white>{amount}</white>"
        - "<gray>Item type:</gray> <white>{item_type}</white>"
        - "<gray>Price each:</gray> <white>{price_each} {currency_name}</white>"
        - "<gray>Total stock value:</gray> <white>{total_price} {currency_name}</white>"
        - "<gray>Currency id:</gray> <white>{currency_type}</white>"
        - "<yellow>Left click to buy one.</yellow>"
        - "<yellow>Right click to choose an amount.</yellow>"
    admin:
      lore:
        - "<gray>Inventory:</gray> <white>Infinite</white>"
        - "<gray>Item type:</gray> <white>{item_type}</white>"
        - "<gray>Price each:</gray> <white>{price_each} {currency_name}</white>"
        - "<gray>Currency id:</gray> <white>{currency_type}</white>"
        - "<gray>Shop type:</gray> <white>Admin Shop</white>"
        - "<yellow>Left click to buy one.</yellow>"
        - "<yellow>Right click to choose an amount.</yellow>"
  feedback:
    purchased_player: "<green>Purchased {amount}x {item_type} for {total_price} {currency_name}. Remaining stock: {remaining_amount}.</green>"
    purchased_admin: "<green>Purchased {amount}x {item_type} for {total_price} {currency_name}. This admin shop has infinite inventory.</green>"
    insufficient_stock: "<red>This shop only has {available_amount}x {item_type} available.</red>"
    insufficient_funds: "<red>You need {total_price} {currency_name} to buy {amount}x {item_type}.</red>"
    currency_unavailable: "<red>Currency {currency_name} is not available right now.</red>"
    invalid_amount: "<red>Enter a valid purchase amount.</red>"
    item_missing: "<red>That shop item is no longer available.</red>"
    empty_shop:
      name: "<red>Shop Empty</red>"
      lore:
        - "<gray>There are no items available for purchase.</gray>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

shop_purchase_amount_anvil_ui:
  title: "Buy {item_type}"
  input:
    name: "<gold>Purchase Amount</gold>"
    player:
      lore:
        - "<gray>Enter how many items you want to buy.</gray>"
        - "<gray>Maximum available:</gray> <white>{max_amount}</white>"
        - "<gray>Item:</gray> <white>{item_type}</white>"
    admin:
      lore:
        - "<gray>Enter how many items you want to buy.</gray>"
        - "<gray>This admin shop has infinite inventory.</gray>"
        - "<gray>Item:</gray> <white>{item_type}</white>"
  error:
    invalid_number: "<red>Enter a whole number between 1 and {max_amount}. Input: {input}</red>"
    invalid_number_admin: "<red>Enter a whole number greater than 0. Input: {input}</red>"
    processing_failed: "<red>Failed to process purchase amount. Input: {input}</red>"

shop_search_ui:
  title: "Browse Shops"
  summary:
    name: "<gold>Shop Directory</gold>"
    lore:
      - "<gray>Tracked shops:</gray> <white>{shop_count}</white>"
      - "<gray>Total available stock:</gray> <white>{available_count}</white>"
      - "<yellow>Click any shop below to open it.</yellow>"
  entry:
    name: "<gold>{owner}'s Shop</gold>"
    lore:
      - "<gray>Owner:</gray> <white>{owner}</white>"
      - "<gray>Location:</gray> <white>{location}</white>"
      - "<gray>Available stock:</gray> <white>{available_count}</white>"
      - "<yellow>Click to open this shop.</yellow>"
  feedback:
    empty:
      name: "<red>No Shops Found</red>"
      lore:
        - "<gray>There are no shops registered yet.</gray>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

# ============================================
# PAGINATION
# ============================================
page:
  name: "<gradient:#6b7280:#9ca3af>📄 Page %current_page%</gradient>"
  lore:
    - "<gradient:#6b7280:#9ca3af>Current page:</gradient> <gradient:#3b82f6:#60a5fa>%current_page%</gradient>"
    - "<gradient:#6b7280:#9ca3af>Total pages:</gradient> <gradient:#3b82f6:#60a5fa>%total_pages%</gradient>"
  fallback: "<gradient:#6b7280:#9ca3af>📄 Page %direction%</gradient>"

# ============================================
# HEAD ITEMS
# ============================================
head:
  return:
    name: "<gradient:#f59e0b:#fbbf24>🔙 Return</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to go back</gradient>"
  proceed:
    name: "<gradient:#f59e0b:#fbbf24>💾 Confirm</gradient>"
    lore:
      - "<gradient:#6b7280:#9ca3af>Click to confirm settings</gradient>"
