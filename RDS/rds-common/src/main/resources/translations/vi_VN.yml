# ============================================
# TIỀN TỐ TOÀN CẦU
# ============================================
# Tiền tố được thêm vào trước cuộc trò chuyện plugin chung đầu ra.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Dòng tóm tắt nhanh chóng đối với người chơi về trạng thái cửa hàng, ngân hàng và thuế.
info:
  total: "<blue>Cửa hàng:</blue> <white>{owned_shops}</white>"
  bank: "<green>Số dư được theo dõi ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Thuế theo lịch trình ({taxed_shops} cửa hàng chịu thuế):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Thuế tiếp theo:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Thông báo thời gian tham gia được hiển thị khi người chơi tham gia máy chủ.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} cửa hàng chịu thuế\n[<blue>Amount<yellow>]\n{taxes}\n<red>Due:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Chuỗi phản hồi lệnh cho các tính năng và chuyển đổi của `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Đã mở <white>RDS Quản trị viên</white><gray> bảng điều khiển.</gray>"
  bar:
    enabled: "<green>Thanh ông chủ cửa hàng được bật khi đang xem cửa hàng.</green>"
    disabled: "<yellow>Thanh ông chủ cửa hàng bị vô hiệu hóa.</yellow>"
  give:
    syntax: "<red>Cách sử dụng: /rs đưa ra<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Cách sử dụng:</gray> <white>/rs bảng điểm &lt;sổ cái|chứng khoán&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Đã bật <white>{scoreboard_type}</white><gray> thanh bên.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Đã tắt <white>{scoreboard_type}</white><gray> thanh bên.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Đã chuyển sang <white>{scoreboard_type}</white><gray> thanh bên.</gray>"
    type:
      ledger: "<gold>sổ cái</gold>"
      stock: "<aqua>stock</aqua>"

# Nhãn bảng điểm bên cạnh và định dạng giá trị.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ Sổ cái [RDS] ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Tổng số tiền trong Cửa hàng của Ngân hàng</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Không có tiền được gửi vào ngân hàng</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Cổ phiếu ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Trạng thái:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Không có cửa hàng người chơi</red>"

# Văn bản thanh Boss được hiển thị khi nhắm mục tiêu một shop.
shop_boss_bar:
  title: "<gold>{shop_type} Cửa hàng</gold> <gray>|</gray> <yellow>Chủ sở hữu:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Các mặt hàng:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Vị trí:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Quản trị viên"
  owner:
    admin: "Quản trị viên"
  available_items:
    finite: "{item_count}"
    limited: "Hàng có hạn"
    infinite: "Infinite"
    various: "Various"

# ============================================
# Các nút GUI
# ============================================

# Tên mặt hàng chặn cửa hàng và siêu dữ liệu truyền thuyết.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Đặt khối này để thiết lập cửa hàng của bạn.</yellow>"

# Nhãn giao diện người dùng tổng quan về cửa hàng cửa hàng, truyền thuyết và trạng thái sẵn có.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Cửa hàng cửa hàng</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Khối cửa hàng được sở hữu</gradient>"
    lore:
      - "<gray>Khối cửa hàng được sở hữu:</gray> <white>{owned_shops}</white>"
      - "<gray>Bản nhạc này đã được mua hoặc cấp</gray>"
      - "<gray>ShopBlock quyền sở hữu.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Giới hạn khối cửa hàng</gradient>"
    lore:
      - "<gray>Khối cửa hàng được sở hữu:</gray> <white>{owned_shops}</white>"
      - "<gray>Số khối cửa hàng tối đa:</gray> <white>{max_shops}</white>"
      - "<gray>Giới hạn này kiểm soát số lượng cửa hàng</gray>"
      - "<gray>khối bạn có thể mở khóa.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Yêu cầu] Yêu cầu về cửa hàng</gradient>"
    lore:
      - "<gray>Yêu cầu được định cấu hình:</gray> <white>{requirement_count}</white>"
      - "<gray>Số lượng yêu cầu hiện tại:</gray> <white>{requirements}</white>"
      - "<gray>Trạng thái:</gray> <white>{availability}</white>"
      - "<yellow>Nhấp để kiểm tra cấp cửa hàng tiếp theo.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Sẵn sàng]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Chưa giải quyết]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ngoại tuyến]</gradient>"

# Giao diện người dùng yêu cầu cấp cửa hàng, hiển thị tiến trình và phản hồi mua hàng.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Yêu cầu] Cấp cửa hàng{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Khối cửa hàng mua</gradient>"
    lore:
      - "<gray>Cấp mua hàng:</gray> <white>{purchase_number}</white>"
      - "<gray>Khối cửa hàng được sở hữu:</gray> <white>{owned_shops}</white>"
      - "<gray>Số khối cửa hàng tối đa:</gray> <white>{max_shops}</white>"
      - "<gray>Yêu cầu được định cấu hình:</gray> <white>{requirement_count}</white>"
      - "<gray>Đã đáp ứng hiện tại:</gray> <white>{met_count}</white>"
      - "<gray>Trạng thái:</gray> <white>{availability}</white>"
      - "<yellow>Nhấp để mua khi cấp này sẵn sàng.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Sẵn sàng]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Chưa giải quyết]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ngoại tuyến]</gradient>"
    none: "<gradient:#10b981:#34d399>[Miễn phí]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Miễn phí] Không yêu cầu</gradient>"
    lore:
      - "<gray>Cấp mua hàng này không có yêu cầu được định cấu hình.</gray>"
      - "<yellow>Bạn có thể mua khối cửa hàng này mà không cần kiểm tra thêm.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Yêu cầu]{requirement_name}</gradient>"
    lore:
      - "<gray>Khóa:</gray> <white>{requirement_key}</white>"
      - "<gray>Loại:</gray> <white>{requirement_type}</white>"
      - "<gray>Trạng thái:</gray> <white>{status}</white>"
      - "<gray>Tiến trình:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Tóm tắt:</gray> <white>{summary}</white>"
      - "<yellow>Nhấp chuột phải vào các yêu cầu tương thích với tiến trình ngân hàng.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Chi tiết Kiểm tra</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Đã gặp]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Chưa giải quyết]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Không có sẵn]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Đã mua một khối cửa hàng. Yêu cầu đã sử dụng:</gray> <white>{requirements}</white><gray>. Khối cửa hàng được sở hữu:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn hiện không đáp ứng <white>{requirement}</white><gray>. Yêu cầu về cửa hàng:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Yêu cầu về cửa hàng <white>{requirement}</white><gray> hiện không khả dụng hoặc không hợp lệ.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bạn đã đạt đến giới hạn khối cửa hàng là <white>{max_shops}</white><gray>. Khối cửa hàng được sở hữu:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> hiện đã sẵn sàng.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Tiến trình đã lưu trữ cho <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Không có vật phẩm hoặc đơn vị tiền tệ phù hợp nào có sẵn cho <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> không hỗ trợ tiến trình được tích vào ngân hàng.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> hiện không khả dụng.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Hồ sơ RDS của bạn không thể tải được nên tiến trình không thể được tải đã lưu.</gray>"

# Chặn các lỗi xác thực tương tác và thông báo bảo vệ.
block_listener:
  error:
    invalid_owner_uuid: "<red>Không thể đọc chủ cửa hàng từ đây item.</red>"
    not_owner: "<red>ShopBlock này thuộc về một người chơi khác và bạn không thể đặt được.</red>"
    max_shops_reached: "<red>Bạn đã đạt đến giới hạn cửa hàng là {max_shops}. Cửa hàng được đặt hiện tại: {owned_shops}.</red>"
    shop_protected: "<red>Cửa hàng không thể bị phá vỡ trực tiếp. Sử dụng menu cửa hàng để đóng cửa hàng.</red>"
    double_chest_requires_shop_block: "<red>Cửa hàng hai ngăn yêu cầu <blue>ShopBlock</blue><red>. Rương bình thường không thể hợp nhất với rương cửa hàng.</red>"
    double_chest_owner_mismatch: "<red>ShopBlock này thuộc về một chủ sở hữu khác, vì vậy nó không thể mở rộng cửa hàng này.</red>"
    shop_already_double_chest: "<red>Cửa hàng này đã sử dụng cả hai nửa rương.</red>"
    double_chest_ambiguous: "<red>ShopBlock này chạm vào nhiều rương cửa hàng. Chỉ đặt nó bên cạnh một cửa hàng.</red>"

# Thông báo kết quả xử lý thuế theo lịch trình.
tax_scheduler:
  paid: "<yellow>Đã thu thuế cửa hàng theo lịch trình đã thu {amount}. Cửa hàng được tính: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Bạn không thể thanh toán thuế cửa hàng theo lịch trình trong số {amount}. Cửa hàng được tính: {owned_shops}.</red>"
  charge_failed: "<red>Không thể thu thuế cửa hàng theo lịch trình của {amount}. Cửa hàng được tính: {owned_shops}.</red>"

# Giao diện tổng quan về cửa hàng chính dành cho các hành động quản lý của chủ sở hữu/quản trị viên.
shop_overview_ui:
  title: "{owner} Cửa hàng - {location}"
  summary:
    name: "<gold>Tóm tắt cửa hàng</gold>"
    player:
      lore:
        - "<gray>Người sở hữu:</gray> <white>{owner}</white>"
        - "<gray>Vị trí:</gray> <white>{location}</white>"
        - "<gray>Các mục được lưu trữ:</gray> <white>{item_count}</white>"
        - "<gray>Loại cửa hàng:</gray> <white>Cửa hàng người chơi</white>"
        - "<gray>Hàng tồn kho:</gray> <white>hữu hạn</white>"
    admin:
      lore:
        - "<gray>Người sở hữu:</gray> <white>{owner}</white>"
        - "<gray>Vị trí:</gray> <white>{location}</white>"
        - "<gray>Các mục được lưu trữ:</gray> <white>{item_count}</white>"
        - "<gray>Loại cửa hàng:</gray> <white>Cửa hàng quản trị</white>"
        - "<gray>Hàng tồn kho:</gray> <white>vô hạn</white>"
  finance:
    name: "<gold>Ngân hàng mua sắm</gold>"
    lore:
      - "<gray>Tiền tệ được theo dõi:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Nhấp để xem xét và rút tiền.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Cửa hàng quản trị đã bật</red>"
        lore:
          - "<gray>Cửa hàng này hiện là cửa hàng quản trị.</gray>"
          - "<gray>Inventory là vô hạn cho khách hàng.</gray>"
          - "<gray>Các mục đã lưu trữ:</gray> <white>{item_count}</white>"
          - "<yellow>Nhấp để chuyển về chế độ một cửa hàng người chơi.</yellow>"
      disabled:
        name: "<green>Cửa hàng quản trị bị vô hiệu hóa</green>"
        lore:
          - "<gray>Cửa hàng này hiện đang sử dụng bình thường stock.</gray>"
          - "<gray>Khách hàng chỉ có thể mua số lượng đã lưu trữ.</gray>"
          - "<gray>Các mục đã lưu trữ:</gray> <white>{item_count}</white>"
          - "<yellow>Nhấp để bật chế độ cửa hàng quản trị.</yellow>"
    close:
      name: "<red>Đóng cửa hàng</red>"
      lore:
        - "<gray>Xóa cửa hàng này và trả lại khối cửa hàng.</gray>"
        - "<gray>Các mục đã lưu trữ:</gray> <white>{item_count}</white>"
        - "<gray>Tiền tệ ngân hàng được theo dõi:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Kho hàng của cửa hàng phải trống trước khi đóng.</yellow>"
    manage:
      name: "<green>Thêm mặt hàng trong cửa hàng</green>"
      lore:
        - "<gray>Lưu trữ các mặt hàng mới trong này shop.</gray>"
        - "<gray>Mục hiện tại:</gray> <white>{item_count}</white>"
        - "<yellow>Nhấp để mở mục nhập.</yellow>"
    customer_view:
      name: "<gold>Mở chế độ xem khách hàng</gold>"
      lore:
        - "<gray>Xem trước cửa hàng này khi khách hàng nhìn thấy.</gray>"
        - "<gray>Mục hiện tại:</gray> <white>{item_count}</white>"
        - "<yellow>Nhấp để duyệt qua cửa hàng này với tư cách là khách hàng.</yellow>"
    trusted:
      name: "<gold>Người chơi đáng tin cậy</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Người chơi đáng tin cậy:</gray> <white>{trusted_count}</white>"
        - "<yellow>Nhấp để quản lý mức độ tin cậy của cửa hàng.</yellow>"
    ledger:
      name: "<gold>Sổ cái cửa hàng</gold>"
      lore:
        - "<gray>Tổng số mục:</gray> <white>{ledger_count}</white>"
        - "<gray>Mua hàng:</gray> <white>{purchase_count}</white>"
        - "<gray>Thuế:</gray> <white>{tax_count}</white>"
        - "<yellow>Nhấp để xem lại lịch sử giao dịch của cửa hàng.</yellow>"
    edit:
      name: "<aqua>Chỉnh sửa Mặt hàng trong Cửa hàng</aqua>"
      lore:
        - "<gray>Chỉnh sửa giá cho cửa hàng được lưu trữ items.</gray>"
        - "<gray>Mục hiện tại:</gray> <white>{item_count}</white>"
        - "<yellow>Nhấp để chỉnh sửa giá và tiền tệ.</yellow>"
    storage:
      name: "<gold>Xem các mục được lưu trữ</gold>"
      lore:
        - "<gray>Xem lại các mặt hàng đã được lưu trữ trong cửa hàng này.</gray>"
        - "<gray>Mục hiện tại:</gray> <white>{item_count}</white>"
        - "<yellow>Nhấp để rút tiền được lưu trữ items.</yellow>"
    locked:
      name: "<red>Cửa hàng Đã khóa</red>"
      lore:
        - "<gray>Chỉ chủ sở hữu mới có thể thêm vật phẩm.</gray>"
        - "<gray>Mục hiện tại:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Bạn không có quyền quản lý cửa hàng này.</red>"
    no_admin_permission: "<red>Bạn không có quyền chuyển đổi các cửa hàng quản trị.</red>"
    admin_limit_reached: "<red>Máy chủ đã có {admin_shops} cửa hàng quản trị viên. Phiên bản miễn phí chỉ cho phép có sẵn {max_admin_shops} cửa hàng quản trị viên.</red>"
    admin_enabled: "<green>Cửa hàng này hiện là cửa hàng quản trị với lượng hàng tồn kho vô hạn dành cho khách hàng. Các cửa hàng được tính: {owned_shops}.</green>"
    admin_disabled: "<yellow>Cửa hàng này hiện là cửa hàng người chơi bình thường với lượng hàng tồn kho có hạn cho khách hàng. Cửa hàng được tính: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Bạn không thể chuyển cửa hàng quản trị này trở lại cửa hàng người chơi vì giới hạn cửa hàng của bạn là {max_shops}. Các cửa hàng được tính: {owned_shops}.</red>"
    close_not_empty: "<red>Bạn chỉ có thể đóng cửa hàng sau khi xóa tất cả các mặt hàng được lưu trữ. Các mục còn lại: {item_count}.</red>"
    close_bank_not_empty: "<red>Rút ngân hàng cửa hàng của bạn trước khi đóng cửa hàng này. Các loại tiền tệ còn lại được theo dõi: {bank_currency_count}.</red>"
    closed: "<green>Đã đóng cửa hàng và trả lại {returned_blocks} ShopBlock(s). Cửa hàng được tính: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Không tìm thấy cửa hàng</red>"
      lore:
        - "<gray>Không thể tải cửa hàng này từ bộ lưu trữ.</gray>"
      message: "<red>Không thể tải cửa hàng này từ bộ lưu trữ.</red>"

# Bảng điều khiển quản trị viên toàn cầu để quản lý RDS.
shop_admin_ui:
