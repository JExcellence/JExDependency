# ============================================
# PREFIXO GLOBAL
# ============================================
# Prefixo anexado ao geral saída de bate-papo do plug-in.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Linhas de resumo rápidas voltadas para o jogador para loja, banco e status fiscal.
info:
  total: "<blue>Lojas:</blue> <white>{owned_shops}</white>"
  bank: "<green>Saldos rastreados ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Imposto programado ({taxed_shops} lojas tributáveis):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Próximo imposto:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Mensagens de tempo de adesão mostradas quando jogadores entram no servidor.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} lojas tributáveis\n[<blue>Valor<yellow>]\n{taxes}\n<red>Prazo:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Sequências de resposta de comando para recursos e alternâncias `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Abriu os <white>Administrador RDS</white><gray> painel.</gray>"
  bar:
    enabled: "<green>Barra do chefe da loja habilitada ao olhar para uma loja.</green>"
    disabled: "<yellow>Barra do chefe da loja desativada.</yellow>"
  give:
    syntax: "<red>Uso: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Uso:</gray> <white>/rs placar &lt;razão | estoque&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Ativado <white>{scoreboard_type}</white><gray> barra lateral.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Desativado <white>{scoreboard_type}</white><gray> barra lateral.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Alterado para <white>{scoreboard_type}</white><gray> barra lateral.</gray>"
    type:
      ledger: "<gold>livro razão</gold>"
      stock: "<aqua>estoque</aqua>"

# Rótulos do placar da barra lateral e formatação de valores.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Razão ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Totais do Banco</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Nenhum fundo depositado</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Estoque ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Estoque:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Nenhuma loja de jogador</red>"

# Texto da barra do chefe mostrado enquanto visando uma loja.
shop_boss_bar:
  title: "<gold>{shop_type} Loja</gold> <gray>|</gray> <yellow>Proprietário:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Itens:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Localização:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Estoque limitado"
    infinite: "Infinito"
    various: "Vários"

# ============================================
# Botões GUI
# ============================================

# Nome do item do bloco da loja e metadados de conhecimento.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Coloque este bloco para configurar sua loja.</yellow>"

# Rótulos da interface do usuário da visão geral da loja da loja, conhecimento e estados de disponibilidade.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Loja de loja</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Blocos de loja própria</gradient>"
    lore:
      - "<gray>Blocos de lojas de propriedade:</gray> <white>{owned_shops}</white>"
      - "<gray>Este rastreia comprado ou concedido</gray>"
      - "<gray>Propriedade do ShopBlock.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Limite de bloqueio de loja</gradient>"
    lore:
      - "<gray>Blocos de lojas de propriedade:</gray> <white>{owned_shops}</white>"
      - "<gray>Máximo de blocos de compras:</gray> <white>{max_shops}</white>"
      - "<gray>Este limite controla quantas lojas</gray>"
      - "<gray>blocos que você pode desbloquear.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisitos da Loja</gradient>"
    lore:
      - "<gray>Requisitos configurados:</gray> <white>{requirement_count}</white>"
      - "<gray>Contagem de requisitos atuais:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Clique para inspecionar a próxima loja camada.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Preparar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Off-line]</gradient>"

# IU de requisitos do nível da loja, exibição de progresso e feedback de compra.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Requerido] Nível da loja{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Comprar bloco de loja</gradient>"
    lore:
      - "<gray>Nível de compra:</gray> <white>{purchase_number}</white>"
      - "<gray>Blocos de lojas de propriedade:</gray> <white>{owned_shops}</white>"
      - "<gray>Máximo de blocos de compras:</gray> <white>{max_shops}</white>"
      - "<gray>Requisitos configurados:</gray> <white>{requirement_count}</white>"
      - "<gray>Atualmente atendido:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Clique para comprar quando este nível estiver pronto.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Preparar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Off-line]</gradient>"
    none: "<gradient:#10b981:#34d399>[Livre]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Grátis] Sem requisitos</gradient>"
    lore:
      - "<gray>Este nível de compra não tem requisitos configurados.</gray>"
      - "<yellow>Você pode comprar este bloco de loja sem cheques extras.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Requerido]{requirement_name}</gradient>"
    lore:
      - "<gray>Chave:</gray> <white>{requirement_key}</white>"
      - "<gray>Tipo:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Progresso:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Resumo:</gray> <white>{summary}</white>"
      - "<yellow>Clique com o botão direito do mouse nos requisitos compatíveis para o progresso do banco.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detalhado Cheques</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Conheci]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Indisponível]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Comprou um bloco de loja. Requisitos consumidos:</gray> <white>{requirements}</white><gray>. Blocos de lojas próprias:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não atende atualmente <white>{requirement}</white><gray>. Requisitos da loja:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>O requisito da loja <white>{requirement}</white><gray> está indisponível ou inválido no momento.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você atingiu o limite de bloqueio de loja de <white>{max_shops}</white><gray>. Blocos de lojas próprias:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> agora está pronto.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Progresso armazenado para <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Nenhum item correspondente ou moeda estava disponível para <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> não suporta progresso no banco.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> está indisponível no momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Seu perfil RDS não pôde ser carregado, então o progresso não pôde ser salvo.</gray>"

# Bloquear erros de validação de interação e avisos de proteção.
block_listener:
  error:
    invalid_owner_uuid: "<red>Não é possível ler o proprietário da loja neste item.</red>"
    not_owner: "<red>Este ShopBlock pertence a outro jogador e não pode ser colocado por você.</red>"
    max_shops_reached: "<red>Você atingiu o limite de loja de {max_shops}. Lojas colocadas atualmente: {owned_shops}.</red>"
    shop_protected: "<red>As lojas não podem ser quebradas diretamente. Use o menu da loja para fechar a loja.</red>"
    double_chest_requires_shop_block: "<red>Lojas de baú duplo exigem um segundo <blue>ShopBlock</blue><red>. Baús normais não podem ser mesclados com baús de loja.</red>"
    double_chest_owner_mismatch: "<red>Este ShopBlock pertence a um proprietário diferente, portanto não pode estender esta loja.</red>"
    shop_already_double_chest: "<red>Esta loja já está usando as duas metades do baú.</red>"
    double_chest_ambiguous: "<red>Este ShopBlock toca vários baús de loja. Coloque-o próximo a apenas uma loja.</red>"

# Mensagens de resultado do processamento de imposto programado.
tax_scheduler:
  paid: "<yellow>Taxa de loja agendada coletada de {amount}. Lojas contadas: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Você não pode pagar o imposto de loja programado de {amount}. Lojas contadas: {owned_shops}.</red>"
  charge_failed: "<red>Falha ao coletar o imposto da loja programado de {amount}. Lojas contadas: {owned_shops}.</red>"

# Interface principal de visão geral da loja para ações de gerenciamento de proprietário/administrador.
shop_overview_ui:
  title: "{owner} Loja - {location}"
  summary:
    name: "<gold>Resumo da loja</gold>"
    player:
      lore:
        - "<gray>Proprietário:</gray> <white>{owner}</white>"
        - "<gray>Localização:</gray> <white>{location}</white>"
        - "<gray>Entradas armazenadas:</gray> <white>{item_count}</white>"
        - "<gray>Loja tipo:</gray> <white>Player Shop</white>"
        - "<gray>Inventário:</gray> <white>Finito</white>"
    admin:
      lore:
        - "<gray>Proprietário:</gray> <white>{owner}</white>"
        - "<gray>Localização:</gray> <white>{location}</white>"
        - "<gray>Entradas armazenadas:</gray> <white>{item_count}</white>"
        - "<gray>Loja tipo:</gray> <white>Admin Shop</white>"
        - "<gray>Inventário:</gray> <white>Infinito</white>"
  finance:
    name: "<gold>Shop Bank</gold>"
    lore:
      - "<gray>Moedas rastreadas:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Clique para revisar e sacar fundos.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop ativado</red>"
        lore:
          - "<gray>Esta loja é atualmente uma loja de administração.</gray>"
          - "<gray>O inventário é infinito para clientes.</gray>"
          - "<gray>Entradas armazenadas:</gray> <white>{item_count}</white>"
          - "<yellow>Clique para voltar para uma loja de jogador.</yellow>"
      disabled:
        name: "<green>Admin Shop desabilitado</green>"
        lore:
          - "<gray>Esta loja atualmente usa normal estoque.</gray>"
          - "<gray>Os clientes só podem comprar quantidades armazenadas.</gray>"
          - "<gray>Entradas armazenadas:</gray> <white>{item_count}</white>"
          - "<yellow>Clique para ativar o modo de loja de administração.</yellow>"
    close:
      name: "<red>Fechar loja</red>"
      lore:
        - "<gray>Remova esta loja e devolva o bloco da loja.</gray>"
        - "<gray>Entradas armazenadas:</gray> <white>{item_count}</white>"
        - "<gray>Moedas bancárias rastreadas:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>O estoque da loja deve estar vazio antes de fechar.</yellow>"
    manage:
      name: "<green>Adicionar itens da loja</green>"
      lore:
        - "<gray>Armazene novos itens neste shop.</gray>"
        - "<gray>Entradas atuais:</gray> <white>{item_count}</white>"
        - "<yellow>Clique para abrir a entrada do item.</yellow>"
    customer_view:
      name: "<gold>Abra a visualização do cliente</gold>"
      lore:
        - "<gray>Visualize esta loja como os clientes a veem.</gray>"
        - "<gray>Entradas atuais:</gray> <white>{item_count}</white>"
        - "<yellow>Clique para navegar nesta loja como um cliente.</yellow>"
    trusted:
      name: "<gold>Jogadores confiáveis</gold>"
      lore:
        - "<gray>Associados:</gray> <white>{associate_count}</white>"
        - "<gray>Confiável jogadores:</gray> <white>{trusted_count}</white>"
        - "<yellow>Clique para gerenciar os níveis de confiança da loja.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Total de entradas:</gray> <white>{ledger_count}</white>"
        - "<gray>Compras:</gray> <white>{purchase_count}</white>"
        - "<gray>Impostos:</gray> <white>{tax_count}</white>"
        - "<yellow>Clique para revisar o histórico de transações da loja.</yellow>"
    edit:
      name: "<aqua>Editar itens da loja</aqua>"
      lore:
        - "<gray>Editar preços para loja armazenada itens.</gray>"
        - "<gray>Entradas atuais:</gray> <white>{item_count}</white>"
        - "<yellow>Clique para editar preços e moedas.</yellow>"
    storage:
      name: "<gold>Ver itens armazenados</gold>"
      lore:
        - "<gray>Revise os itens já armazenados nesta loja.</gray>"
        - "<gray>Entradas atuais:</gray> <white>{item_count}</white>"
        - "<yellow>Clique para retirar itens armazenados.</yellow>"
    locked:
      name: "<red>Loja bloqueada</red>"
      lore:
        - "<gray>Somente o proprietário pode adicionar itens.</gray>"
        - "<gray>Entradas atuais:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Você não tem permissão para gerenciar esta loja.</red>"
    no_admin_permission: "<red>Você não tem permissão para alternar entre lojas de administração.</red>"
    admin_limit_reached: "<red>O servidor já possui {admin_shops} lojas administrativas. A edição gratuita permite apenas {max_admin_shops} lojas administrativas.</red>"
    admin_enabled: "<green>Esta loja agora é uma loja administrativa com estoque infinito de clientes. Lojas contadas: {owned_shops}.</green>"
    admin_disabled: "<yellow>Esta loja agora é uma loja de jogador normal com estoque de clientes finito. Lojas contadas: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Você não pode mudar esta loja de administrador de volta para uma loja de jogador porque seu limite de loja é de {max_shops} já foi alcançado. Lojas contadas: {owned_shops}.</red>"
    close_not_empty: "<red>Você só pode fechar uma loja após remover todos os itens armazenados. Entradas restantes: {item_count}.</red>"
    close_bank_not_empty: "<red>Retire o banco da sua loja antes de fechar esta loja. Moedas rastreadas restantes: {bank_currency_count}.</red>"
    closed: "<green>Fechou a loja e devolveu {returned_blocks} ShopBlock(s). Lojas contadas: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Loja não encontrada</red>"
      lore:
        - "<gray>Esta loja não pôde ser carregada do armazenamento.</gray>"
      message: "<red>Esta loja não pôde ser carregada do armazenamento.</red>"

# Painel de controle de administração global para gerenciamento RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] Controle RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Painel de administração RDS</white>"
    lore:
      - "<gray>Gerencie sistemas globais de administração da loja em um só lugar.</gray>"
      - "<gray>Abra o banco do servidor ou edite as configurações abaixo.</gray>"
      - "<yellow>Requer:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Banco do servidor</gradient>"
      lore:
        - "<gray>Revise a receita da loja administrativa puxada para o banco do servidor.</gray>"
        - "<gray>Verifique o próximo tempo de pull e retire os saldos.</gray>"
        - "<yellow>Clique para abrir o servidor controles bancários.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Loja Config</gradient>"
      lore:
        - "<gray>Editar valores de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Todas as configurações editáveis podem ser alteradas por meio de um prompt de bigorna.</gray>"
        - "<yellow>Clique para abrir os controles de configuração.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Atual] Gerenciador de moeda</gradient>"
      lore:
        - "<gray>Revise as moedas detectadas do Vault e JExEconomy.</gray>"
        - "<gray>Criar o padrão</gray> <white>gotas de chuva</white> <gray>moeda quando necessário.</gray>"
        - "<yellow>Clique para abrir os controles de moeda.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Acesso de administrador necessário</white>"
      lore:
        - "<gray>Você não tem permissão para usar este administrador. painel.</gray>"

# Visualização de moeda do administrador para provedores detectados e criação de moeda padrão.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Atual] Gerenciador de moeda</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informações]</gradient> <white>Provedores de moeda</white>"
    lore:
      - "<gray>Detectado moedas:</gray> <white>{currency_count}</white>"
      - "<gray>Cofre disponível:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy disponível:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Use o botão de cristal para criar o padrão moeda.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Provedor:</gray> <white>{provider}</white>"
      - "<gray>Símbolo:</gray> <white>{symbol}</white>"
      - "<gray>Prefixo:</gray> <white>{prefix}</white>"
      - "<gray>Sufixo:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Criar {currency_id}</white>"
      lore:
        - "<gray>Criar a moeda RDS padrão em JExEconomy.</gray>"
        - "<yellow>Clique para criar {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy Obrigatório</white>"
      lore:
        - "<gray>Você não pode criar moeda padrão sem JExEconomy.</gray>"
        - "<gray>Instale e ative JExEconomy primeiro.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id}Pronto</white>"
      lore:
        - "<gray>A moeda padrão já existe.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Moeda padrão criada:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Falha ao criar moeda:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>A moeda já existe:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não pode usar este botão a menos que JExEconomy esteja disponível.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Sem moedas Detectado</white>"
      lore:
        - "<gray>Nenhuma moeda Vault ou JExEconomy foi detectada.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Acesso de administrador necessário</white>"
      lore:
        - "<gray>Você não tem permissão para usar esta visualização de moeda.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Você não tem permissão para gerenciar moedas.</gray>"
  decoration:
    border:
      name: " "

# Configure a UI do navegador para configurações editáveis e feedback de atualização.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Loja Config</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informações]</gradient> <white>Configurações</white>"
    lore:
      - "<gray>Configurações editáveis detectadas:</gray> <white>{setting_count}</white>"
      - "<gray>Clique em qualquer entrada abaixo para editar seu valor em uma bigorna.</gray>"
      - "<yellow>As alterações são escritas diretamente para config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Definir]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Caminho:</gray> <white>{config_path}</white>"
      - "<gray>Tipo:</gray> <white>{value_type}</white>"
      - "<gray>Valor atual:</gray> <white>{current_value}</white>"
      - "<yellow>Clique para editar esta configuração.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Booleano]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Inteiro]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Longo]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dobro]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Lista]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Corda]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Nenhuma configuração editável</white>"
      lore:
        - "<gray>Nenhuma configuração editável de escalar/lista foi encontrada.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Acesso de administrador necessário</white>"
      lore:
        - "<gray>Você não tem permissão para usar esta visualização de configuração.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Edição de configuração bloqueada</white>"
      lore:
