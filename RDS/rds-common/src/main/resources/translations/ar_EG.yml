# ============================================
# GLOBAL PREFIX
# ============================================
# بادئة معلقة مسبقًا إلى مخرجات الدردشة العامة للمكونات الإضافية.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# خطوط ملخصة سريعة تواجه اللاعب للمتجر والبنك والحالة الضريبية.
info:
  total: "<blue>المتاجر:</blue> <white>{owned_shops}</white>"
  bank: "<green>الأرصدة المتعقبة ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>الضريبة المجدولة ({taxed_shops} متاجر خاضعة للضريبة):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>الضريبة التالية:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# رسائل وقت الانضمام التي تظهر عند دخول اللاعبين إلى الخادم.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} متاجر خاضعة للضريبة\n[<blue>Amount<yellow>]\n{taxes}\n<red>مستحقة:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# سلاسل استجابة الأمر لميزات `/rs` والتبديلات.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>تم فتح <white>مسؤول RDS</white><gray> لوحة.</gray>"
  bar:
    enabled: "<green>تم تمكين شريط رئيس المتجر أثناء البحث في المتجر.</green>"
    disabled: "<yellow>تم تعطيل شريط رئيس المتجر.</yellow>"
  give:
    syntax: "<red>الاستخدام: /rs Give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>الاستخدام:</gray> <white>/rs لوحة النتائج &lt;دفتر الأستاذ|المخزون&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>تمكين <white>{scoreboard_type}</white><gray> شريط جانبي.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>تعطيل <white>{scoreboard_type}</white><gray> شريط جانبي.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>تم التبديل إلى <white>{scoreboard_type}</white><gray> شريط جانبي.</gray>"
    type:
      ledger: "<gold>دفتر الأستاذ</gold>"
      stock: "<aqua>stock</aqua>"

# تسميات لوحة النتائج على الشريط الجانبي وتنسيق القيمة.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ دفتر الأستاذ [RDS] ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ إجماليات البنك</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>لم يتم العثور على أموال مصرفية</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ المخزون [RDS] ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>المخزون:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>لا توجد متاجر للاعبين</red>"

# شريط الرئيس يظهر النص أثناء استهداف متجر.
shop_boss_bar:
  title: "<gold>{shop_type} متجر</gold> <gray>|</gray> <yellow>المالك:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>العناصر:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>الموقع:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "المسؤول"
  owner:
    admin: "المسؤول"
  available_items:
    finite: "{item_count}"
    limited: "مخزون محدود"
    infinite: "لانهائي"
    various: "مختلف"

# ============================================
# أزرار واجهة المستخدم الرسومية
# ============================================

# اسم عنصر كتلة المتجر والبيانات التعريفية التقليدية.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>ضع هذه الكتلة لإعداد متجرك.</yellow>"

# نظرة عامة على المتجر، تسميات واجهة المستخدم والتقاليد وحالات التوفر.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] متجر المتجر</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] كتل المتجر المملوكة</gradient>"
    lore:
      - "<gray>مجموعات المتاجر المملوكة:</gray> <white>{owned_shops}</white>"
      - "<gray>هذه المسارات التي تم شراؤها أو منحها</gray>"
      - "<gray>ShopBlock ملكية.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] حد كتلة المتجر</gradient>"
    lore:
      - "<gray>مجموعات المتاجر المملوكة:</gray> <white>{owned_shops}</white>"
      - "<gray>الحد الأقصى لكتل المتاجر:</gray> <white>{max_shops}</white>"
      - "<gray>يتحكم هذا الحد في عدد المتاجر</gray>"
      - "<gray>الكتل التي يمكنك فتحها.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[الطلب] متطلبات المتجر</gradient>"
    lore:
      - "<gray>المتطلبات التي تم تكوينها:</gray> <white>{requirement_count}</white>"
      - "<gray>عدد المتطلبات الحالية:</gray> <white>{requirements}</white>"
      - "<gray>الحالة:</gray> <white>{availability}</white>"
      - "<yellow>انقر لتفقد طبقة المتجر التالية.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[مستعد]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[قيد الانتظار]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[غير متصل]</gradient>"

# واجهة مستخدم متطلبات طبقة المتجر، وعرض التقدم، وتعليقات الشراء.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[الطلب] متجر الطبقة{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] شراء كتلة المتجر</gradient>"
    lore:
      - "<gray>مستوى الشراء:</gray> <white>{purchase_number}</white>"
      - "<gray>مجموعات المتاجر المملوكة:</gray> <white>{owned_shops}</white>"
      - "<gray>الحد الأقصى لكتل المتاجر:</gray> <white>{max_shops}</white>"
      - "<gray>المتطلبات التي تم تكوينها:</gray> <white>{requirement_count}</white>"
      - "<gray>الموجودة حاليًا:</gray> <white>{met_count}</white>"
      - "<gray>الحالة:</gray> <white>{availability}</white>"
      - "<yellow>انقر للشراء عندما يكون هذا المستوى جاهزًا.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[مستعد]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[قيد الانتظار]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[غير متصل]</gradient>"
    none: "<gradient:#10b981:#34d399>[حر]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[مجاني] لا توجد متطلبات</gradient>"
    lore:
      - "<gray>لا تحتوي طبقة الشراء هذه على متطلبات مهيأة.</gray>"
      - "<yellow>يمكنك شراء كتلة المتجر هذه بدون شيكات إضافية.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[الطلب]{requirement_name}</gradient>"
    lore:
      - "<gray>المفتاح:</gray> <white>{requirement_key}</white>"
      - "<gray>النوع:</gray> <white>{requirement_type}</white>"
      - "<gray>الحالة:</gray> <white>{status}</white>"
      - "<gray>التقدم:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>الملخص:</gray> <white>{summary}</white>"
      - "<yellow>انقر بزر الماوس الأيمن فوق المتطلبات المتوافقة لتقدم البنك.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ الشيكات التفصيلية</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[اجتمع]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[قيد الانتظار]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[غير متاح]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>تم شراء مبنى متجر. المتطلبات المستهلكة:</gray> <white>{requirements}</white><gray>. كتل المتاجر المملوكة:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>أنت لا تستوفي حاليًا <white>{requirement}</white><gray>. متطلبات المتجر:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>متطلبات المتجر <white>{requirement}</white><gray> غير متاح أو غير صالح الآن.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>لقد وصلت إلى حد كتلة المتجر وهو <white>{max_shops}</white><gray>. كتل المتاجر المملوكة:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> جاهز الآن.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>التقدم المخزن لـ <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>لم تكن هناك عناصر أو عملة مطابقة متاحة لـ <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> لا يدعم التقدم البنكي.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> غير متاح الآن.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>لا يمكن تحميل ملف تعريف RDS الخاص بك، لذا لا يمكن متابعة التقدم تم الحفظ.</gray>"

# حظر أخطاء التحقق من صحة التفاعل وإشعارات الحماية.
block_listener:
  error:
    invalid_owner_uuid: "<red>غير قادر على قراءة مالك المتجر من هذا العنصر.</red>"
    not_owner: "<red>يمتلك ShopBlock هذا لاعب آخر ولا يمكنك وضعه.</red>"
    max_shops_reached: "<red>لقد وصلت إلى حد المتجر وهو {max_shops}. المحلات التجارية الحالية: {owned_shops}.</red>"
    shop_protected: "<red>لا يمكن كسر المتاجر مباشرة. استخدم قائمة المتجر لإغلاق المتجر.</red>"
    double_chest_requires_shop_block: "<red>تتطلب المتاجر ذات الصندوق المزدوج <blue>ShopBlock</blue><red>. لا يمكن دمج الصناديق العادية مع صناديق المتجر.</red>"
    double_chest_owner_mismatch: "<red>ينتمي ShopBlock هذا إلى مالك مختلف، لذا لا يمكنه توسيع هذا المتجر.</red>"
    shop_already_double_chest: "<red>يستخدم هذا المتجر كلا نصفي الصندوق بالفعل.</red>"
    double_chest_ambiguous: "<red>يلمس ShopBlock هذا العديد من صناديق المتاجر. ضعه بجوار متجر واحد فقط.</red>"

# رسائل نتائج معالجة الضريبة المجدولة.
tax_scheduler:
  paid: "<yellow>تم جمع ضريبة المتجر المجدولة بنسبة {amount}. المحلات التجارية المعدودة: {owned_shops}.</yellow>"
  insufficient_funds: "<red>لا يمكنك الدفع للمتجر المجدول ضريبة {amount}. المحلات التجارية المعدودة: {owned_shops}.</red>"
  charge_failed: "<red>فشل في تحصيل ضريبة المتجر المجدولة لـ {amount}. المحلات التجارية المعدودة: {owned_shops}.</red>"

# واجهة نظرة عامة على المتجر الرئيسي لإجراءات إدارة المالك/المشرف.
shop_overview_ui:
  title: "{owner} محل - {location}"
  summary:
    name: "<gold>ملخص المتجر</gold>"
    player:
      lore:
        - "<gray>مالك:</gray> <white>{owner}</white>"
        - "<gray>موقع:</gray> <white>{location}</white>"
        - "<gray>الإدخالات المخزنة:</gray> <white>{item_count}</white>"
        - "<gray>نوع المتجر:</gray> <white>متجر اللاعب</white>"
        - "<gray>جرد:</gray> <white>محدود</white>"
    admin:
      lore:
        - "<gray>مالك:</gray> <white>{owner}</white>"
        - "<gray>موقع:</gray> <white>{location}</white>"
        - "<gray>الإدخالات المخزنة:</gray> <white>{item_count}</white>"
        - "<gray>نوع المتجر:</gray> <white>متجر المشرف</white>"
        - "<gray>جرد:</gray> <white>لانهائي</white>"
  finance:
    name: "<gold>متجر البنك</gold>"
    lore:
      - "<gray>العملات المتعقبة:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>انقر لمراجعة وسحب الأموال.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>متجر الإدارة ممكن</red>"
        lore:
          - "<gray>هذا المتجر هو حاليًا متجر إداري.</gray>"
          - "<gray>المخزون لا نهائي لـ العملاء.</gray>"
          - "<gray>الإدخالات المخزنة:</gray> <white>{item_count}</white>"
          - "<yellow>انقر للتبديل مرة أخرى إلى متجر المشغلات.</yellow>"
      disabled:
        name: "<green>متجر الإدارة معطل</green>"
        lore:
          - "<gray>يستخدم هذا المتجر حاليًا المخزون العادي.</gray>"
          - "<gray>يمكن للعملاء شراء الكميات المخزنة فقط.</gray>"
          - "<gray>الإدخالات المخزنة:</gray> <white>{item_count}</white>"
          - "<yellow>انقر لتمكين وضع المتجر الإداري.</yellow>"
    close:
      name: "<red>إغلاق المتجر</red>"
      lore:
        - "<gray>قم بإزالة هذا المتجر وأعد كتلة المتجر.</gray>"
        - "<gray>الإدخالات المخزنة:</gray> <white>{item_count}</white>"
        - "<gray>عملات البنك المتتبعة:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>يجب أن يكون مخزون المتجر فارغًا قبل الإغلاق.</yellow>"
    manage:
      name: "<green>إضافة عناصر المتجر</green>"
      lore:
        - "<gray>قم بتخزين عناصر جديدة في هذا shop.</gray>"
        - "<gray>الإدخالات الحالية:</gray> <white>{item_count}</white>"
        - "<yellow>انقر لفتح إدخال العنصر.</yellow>"
    customer_view:
      name: "<gold>فتح عرض العميل</gold>"
      lore:
        - "<gray>معاينة هذا المتجر كما يراه العملاء.</gray>"
        - "<gray>الإدخالات الحالية:</gray> <white>{item_count}</white>"
        - "<yellow>انقر للتصفح هذا المحل كعميل.</yellow>"
    trusted:
      name: "<gold>اللاعبون الموثوقون</gold>"
      lore:
        - "<gray>الشركاء:</gray> <white>{associate_count}</white>"
        - "<gray>موثوق اللاعبين:</gray> <white>{trusted_count}</white>"
        - "<yellow>انقر لإدارة مستويات ثقة المتجر.</yellow>"
    ledger:
      name: "<gold>دفتر الأستاذ للمتجر</gold>"
      lore:
        - "<gray>إجمالي الإدخالات:</gray> <white>{ledger_count}</white>"
        - "<gray>المشتريات:</gray> <white>{purchase_count}</white>"
        - "<gray>الضرائب:</gray> <white>{tax_count}</white>"
        - "<yellow>انقر لمراجعة سجل معاملات المتجر.</yellow>"
    edit:
      name: "<aqua>تحرير عناصر المتجر</aqua>"
      lore:
        - "<gray>تحرير أسعار عناصر المتجر المخزنة.</gray>"
        - "<gray>الإدخالات الحالية:</gray> <white>{item_count}</white>"
        - "<yellow>انقر لتعديل الأسعار و العملات.</yellow>"
    storage:
      name: "<gold>عرض العناصر المخزنة</gold>"
      lore:
        - "<gray>مراجعة العناصر المخزنة بالفعل في هذا المتجر.</gray>"
        - "<gray>الإدخالات الحالية:</gray> <white>{item_count}</white>"
        - "<yellow>انقر لسحب العناصر المخزنة.</yellow>"
    locked:
      name: "<red>المتجر مغلق</red>"
      lore:
        - "<gray>فقط المالك يمكنه إضافة عناصر.</gray>"
        - "<gray>الإدخالات الحالية:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>ليس لديك إذن لإدارة هذا المتجر.</red>"
    no_admin_permission: "<red>ليس لديك إذن لتبديل متاجر الإدارة.</red>"
    admin_limit_reached: "<red>يحتوي الخادم بالفعل على {admin_shops} متاجر إدارية. الإصدار المجاني يسمح فقط بـ {max_admin_shops} متاجر إدارية.</red>"
    admin_enabled: "<green>أصبح هذا المتجر الآن متجرًا إداريًا بمخزون عملاء لا نهائي. المتاجر المعدودة: {owned_shops}.</green>"
    admin_disabled: "<yellow>هذا المتجر هو الآن متجر لاعبين عادي بمخزون محدود من العملاء. المتاجر المعدودة: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>لا يمكنك تبديل متجر الإدارة هذا مرة أخرى إلى متجر اللاعبين لأن حد متجرك هو {max_shops} بالفعل. المحلات التجارية المعدودة: {owned_shops}.</red>"
    close_not_empty: "<red>لا يمكنك إغلاق متجر إلا بعد إزالة جميع العناصر المخزنة. الإدخالات المتبقية: {item_count}.</red>"
    close_bank_not_empty: "<red>اسحب من بنك متجرك قبل إغلاق هذا المتجر. العملات المتعقبة المتبقية: {bank_currency_count}.</red>"
    closed: "<green>أغلق المتجر وعاد {returned_blocks} متجر (مجموعات). المتاجر المعدودة: {owned_shops}.</green>"
    shop_missing:
      name: "<red>المتجر غير موجود</red>"
      lore:
        - "<gray>لا يمكن تحميل هذا المتجر من التخزين.</gray>"
      message: "<red>لا يمكن تحميل هذا المتجر من التخزين.</red>"

# لوحة تحكم المشرف العامة لإدارة RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[المسؤول] التحكم في RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>لوحة إدارة RDS</white>"
    lore:
      - "<gray>إدارة أنظمة متجر الإدارة العالمية من مكان واحد.</gray>"
      - "<gray>افتح بنك الخادم أو قم بتحرير إعدادات التكوين أدناه.</gray>"
      - "<yellow>يتطلب:</yellow> <white>Raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] بنك الخادم</gradient>"
      lore:
        - "<gray>مراجعة دخل متجر المسؤول الذي تم سحبه إلى بنك الخادم.</gray>"
        - "<gray>التحقق من توقيت السحب التالي وسحب الأرصدة.</gray>"
        - "<yellow>انقر لفتح ضوابط بنك الخادم.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] المتجر التكوين</gradient>"
      lore:
        - "<gray>تحرير القيم من</gray> <white>التكوين/config.yml</white><gray>.</gray>"
        - "<gray>يمكن تغيير كل إعداد قابل للتحرير من خلال مطالبة السندان.</gray>"
        - "<yellow>انقر لفتح عناصر التحكم في التكوين.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[الكير] مدير العملة</gradient>"
      lore:
        - "<gray>مراجعة العملات المكتشفة من Vault و JExEconomy.</gray>"
        - "<gray>إنشاء العملة الافتراضية</gray> <white>قطرات المطر</white> <gray>العملة عند الحاجة.</gray>"
        - "<yellow>انقر لفتح العملة الضوابط.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>يلزم وصول المسؤول</white>"
