# ============================================
# GLOBALNY PREFIX
# ============================================
# Prefix dodawany do ogólnych wyników czatu wtyczki.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Wiersze szybkiego podsumowania dla gracza dotyczące statusu sklepu, banku i podatku.
info:
  total: "<blue>Sklepy:</blue> <white>{owned_shops}</white>"
  bank: "<green>Śledzone salda ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Podatek planowy ({taxed_shops} sklepy podlegające opodatkowaniu):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Następny podatek:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Wiadomości przy dołączeniu wyświetlane, gdy gracze wchodzą na serwer.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} sklepy podlegające opodatkowaniu\n[<blue>Amount<yellow>]\n{taxes}\n<red>Dzień:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Ciągi odpowiedzi na polecenia dla funkcji i przełączników `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Otwarto <white>Administrator RDS</white><gray> panel.</gray>"
  bar:
    enabled: "<green>Pasek szefa sklepu włączony podczas przeglądania sklepu.</green>"
    disabled: "<yellow>Pasek szefa sklepu wyłączony.</yellow>"
  give:
    syntax: "<red>Użycie: /rs Give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Użycie:</gray> <white>/rs tablica wyników &lt;księga | zapasy&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Włączono <white>{scoreboard_type}</white><gray> pasek boczny.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Wyłączono <white>{scoreboard_type}</white><gray> pasek boczny.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Przełączono na <white>{scoreboard_type}</white><gray> pasek boczny.</gray>"
    type:
      ledger: "<gold>księga główna</gold>"
      stock: "<aqua>stock</aqua>"

# Etykiety tablicy wyników na pasku bocznym i formatowanie wartości.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Księga ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Sumy bankowe</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Brak środków w banku</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Zapasy ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Zapas:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Żadne sklepy z graczami</red>"

# Tekst paska szefa wyświetlany podczas kierowanie na sklep.
shop_boss_bar:
  title: "<gold>{shop_type} Sklep</gold> <gray>|</gray> <yellow>Właściciel:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Pozycje:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Lokalizacja:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Ograniczone zapasy"
    infinite: "Nieskończony"
    various: "Various"

# ============================================
# Przyciski GUI
# ============================================

# Nazwa przedmiotu bloku sklepu i metadane wiedzy.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Umieść ten blok, aby skonfigurować swój sklep.</yellow>"

# Etykiety interfejsu sklepu, informacje i stany dostępności.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Sklep sklepu</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Posiadane bloki sklepu</gradient>"
    lore:
      - "<gray>Bloki posiadanego sklepu:</gray> <white>{owned_shops}</white>"
      - "<gray>Ten utwór został zakupiony lub przyznany</gray>"
      - "<gray>ShopBlock własność.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Limit blokowania sklepu</gradient>"
    lore:
      - "<gray>Bloki posiadanego sklepu:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksymalna liczba blokad w sklepie:</gray> <white>{max_shops}</white>"
      - "<gray>Ten limit kontroluje liczbę sklepów</gray>"
      - "<gray>bloki, które możesz odblokować.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Wymaganie] Wymagania sklepu</gradient>"
    lore:
      - "<gray>Skonfigurowane wymagania:</gray> <white>{requirement_count}</white>"
      - "<gray>Bieżąca liczba wymagań:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Kliknij, aby sprawdzić następny poziom sklepu.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Gotowy]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Aż do]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nieaktywny]</gradient>"

# Interfejs użytkownika wymagań dotyczących poziomu sklepu, wyświetlanie postępu i opinie o zakupach.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Wymaganie] Poziom sklepu{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Kup blok sklepu</gradient>"
    lore:
      - "<gray>Poziom zakupów:</gray> <white>{purchase_number}</white>"
      - "<gray>Bloki posiadanego sklepu:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksymalna liczba blokad w sklepie:</gray> <white>{max_shops}</white>"
      - "<gray>Skonfigurowane wymagania:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktualnie spełnione:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Kliknij, aby dokonać zakupu, gdy ten poziom będzie gotowy.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Gotowy]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Aż do]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nieaktywny]</gradient>"
    none: "<gradient:#10b981:#34d399>[Bezpłatny]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Bezpłatny] Brak wymagań</gradient>"
    lore:
      - "<gray>Ten poziom zakupów nie ma skonfigurowanych wymagań.</gray>"
      - "<yellow>Możesz kupić ten sklep bez dodatkowych kontroli.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Wymaganie]{requirement_name}</gradient>"
    lore:
      - "<gray>Klucz:</gray> <white>{requirement_key}</white>"
      - "<gray>Typ:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Postęp:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Podsumowanie:</gray> <white>{summary}</white>"
      - "<yellow>Kliknij prawym przyciskiem myszy wymagania zgodne z postępem banku.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Szczegółowe Czeki</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Spotkane]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Aż do]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nie płynny]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Kupiono blok sklepu. Spełnione wymagania:</gray> <white>{requirements}</white><gray>. Posiadane bloki sklepów:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Obecnie nie spełniasz <white>{requirement}</white><gray>. Wymagania sklepu:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Wymagania dotyczące sklepu <white>{requirement}</white><gray> jest teraz niedostępne lub nieprawidłowe.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Osiągnąłeś limit blokady sklepu <white>{max_shops}</white><gray>. Posiadane bloki sklepów:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> jest już gotowe.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Przechowywane postępy <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Brak pasujących przedmiotów lub waluty dla <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> nie obsługuje postępu w banku.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> jest obecnie niedostępne.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Twój profil RDS nie mógł zostać załadowany, więc postęp nie mógł być zapisane.</gray>"

# Zablokuj błędy sprawdzania interakcji i powiadomienia o ochronie.
block_listener:
  error:
    invalid_owner_uuid: "<red>Nie można odczytać właściciela sklepu z tego przedmiotu.</red>"
    not_owner: "<red>Ten ShopBlock należy do innego gracza i nie możesz go umieścić.</red>"
    max_shops_reached: "<red>Osiągnąłeś limit sklepu {max_shops}. Aktualnie umieszczone sklepy: {owned_shops}.</red>"
    shop_protected: "<red>Sklepów nie można bezpośrednio łamać. Użyj menu sklepu, aby zamknąć sklep.</red>"
    double_chest_requires_shop_block: "<red>Sklepy z podwójną skrzynią wymagają drugiej <blue>ShopBlock</blue><red>. Zwykłe skrzynie nie mogą łączyć się ze skrzyniami sklepowymi.</red>"
    double_chest_owner_mismatch: "<red>Ten ShopBlock należy do innego właściciela, więc nie może rozszerzyć tego sklepu.</red>"
    shop_already_double_chest: "<red>Ten sklep używa już obu połówek klatki piersiowej.</red>"
    double_chest_ambiguous: "<red>Ten ShopBlock dotyka wielu skrzyń sklepowych. Umieść go obok tylko jednego sklepu.</red>"

# Komunikaty o wynikach zaplanowanego przetwarzania podatku.
tax_scheduler:
  paid: "<yellow>Pobrany planowy podatek sklepowy w wysokości {amount}. Zliczone sklepy: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Nie mogłeś zapłacić zaplanowanej kwoty podatek sklepowy w wysokości {amount}. Zliczone sklepy: {owned_shops}.</red>"
  charge_failed: "<red>Nie udało się pobrać zaplanowanego podatku sklepowego w wysokości {amount}. Zliczone sklepy: {owned_shops}.</red>"

# Główny interfejs przeglądu sklepu umożliwiający zarządzanie właścicielami/administratorami.
shop_overview_ui:
  title: "{owner} Sklep - {location}"
  summary:
    name: "<gold>Podsumowanie sklepu</gold>"
    player:
      lore:
        - "<gray>Właściciel:</gray> <white>{owner}</white>"
        - "<gray>Lokalizacja:</gray> <white>{location}</white>"
        - "<gray>Przechowywane wpisy:</gray> <white>{item_count}</white>"
        - "<gray>Typ sklepu:</gray> <white>Sklep Gracza</white>"
        - "<gray>Spis:</gray> <white>Skończony</white>"
    admin:
      lore:
        - "<gray>Właściciel:</gray> <white>{owner}</white>"
        - "<gray>Lokalizacja:</gray> <white>{location}</white>"
        - "<gray>Przechowywane wpisy:</gray> <white>{item_count}</white>"
        - "<gray>Typ sklepu:</gray> <white>Sklep administratora</white>"
        - "<gray>Spis:</gray> <white>Nieskończony</white>"
  finance:
    name: "<gold>Sklep Bankowy</gold>"
    lore:
      - "<gray>Śledzone waluty:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Kliknij, aby sprawdzić i wypłacić środki.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Sklep administracyjny włączony</red>"
        lore:
          - "<gray>Ten sklep jest obecnie sklepem administratora.</gray>"
          - "<gray>Zapasy są nieskończone przez klienci.</gray>"
          - "<gray>Przechowywane wpisy:</gray> <white>{item_count}</white>"
          - "<yellow>Kliknij, aby wrócić do sklepu gracza.</yellow>"
      disabled:
        name: "<green>Sklep administracyjny wyłączony</green>"
        lore:
          - "<gray>Ten sklep używa obecnie normalnego stock.</gray>"
          - "<gray>Klienci mogą kupować tylko zapisane kwoty.</gray>"
          - "<gray>Przechowywane wpisy:</gray> <white>{item_count}</white>"
          - "<yellow>Kliknij, aby włączyć tryb sklepu administracyjnego.</yellow>"
    close:
      name: "<red>Zamknij sklep</red>"
      lore:
        - "<gray>Usuń ten sklep i zwróć blokadę sklepu.</gray>"
        - "<gray>Przechowywane wpisy:</gray> <white>{item_count}</white>"
        - "<gray>Śledzone waluty banku:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Zapasy sklepu muszą być puste przed zamknięciem.</yellow>"
    manage:
      name: "<green>Dodaj przedmioty ze sklepu</green>"
      lore:
        - "<gray>Przechowuj nowe produkty w tym shop.</gray>"
        - "<gray>Bieżące wpisy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknij, aby otworzyć wprowadzanie pozycji.</yellow>"
    customer_view:
      name: "<gold>Otwórz widok klienta</gold>"
      lore:
        - "<gray>Podgląd tego sklepu tak, jak widzą go klienci.</gray>"
        - "<gray>Bieżące wpisy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknij, aby przeglądać ten sklep jako klient.</yellow>"
    trusted:
      name: "<gold>Zaufani gracze</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Zaufany gracze:</gray> <white>{trusted_count}</white>"
        - "<yellow>Kliknij, aby zarządzać poziomami zaufania sklepu.</yellow>"
    ledger:
      name: "<gold>Księga sklepu</gold>"
      lore:
        - "<gray>Łączna liczba wpisów:</gray> <white>{ledger_count}</white>"
        - "<gray>Zakupy:</gray> <white>{purchase_count}</white>"
        - "<gray>Podatki:</gray> <white>{tax_count}</white>"
        - "<yellow>Kliknij, aby przejrzeć historię transakcji w sklepie.</yellow>"
    edit:
      name: "<aqua>Edytuj przedmioty w sklepie</aqua>"
      lore:
        - "<gray>Edytuj ceny przechowywanych pozycje w sklepie.</gray>"
        - "<gray>Bieżące wpisy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknij, aby edytować ceny i waluty.</yellow>"
    storage:
      name: "<gold>Wyświetl zapisane przedmioty</gold>"
      lore:
        - "<gray>Przejrzyj przedmioty już przechowywane w tym sklepie.</gray>"
        - "<gray>Bieżące wpisy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknij, aby wypłacić przechowywane produkty.</yellow>"
    locked:
      name: "<red>Sklep zablokowany</red>"
      lore:
        - "<gray>Tylko właściciel może dodawać przedmioty.</gray>"
        - "<gray>Bieżące wpisy:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Nie masz uprawnień do zarządzania tym sklepem.</red>"
    no_admin_permission: "<red>Nie masz uprawnień do przełączania sklepów administracyjnych.</red>"
    admin_limit_reached: "<red>Serwer ma już {admin_shops} sklepów administracyjnych. Wersja bezpłatna umożliwia dostęp tylko do {max_admin_shops} sklepów administracyjnych.</red>"
    admin_enabled: "<green>Ten sklep jest teraz sklepem administracyjnym z nieskończonym asortymentem klientów. Zliczone sklepy: {owned_shops}.</green>"
    admin_disabled: "<yellow>Ten sklep jest teraz zwykłym sklepem gracza z ograniczonymi zapasami klientów. Zliczone sklepy: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Nie możesz przełączyć tego sklepu administratora z powrotem na sklep gracza, ponieważ Twój limit sklepu wynosi {max_shops} została już osiągnięta. Liczba sklepów: {owned_shops}.</red>"
    close_not_empty: "<red>Możesz zamknąć sklep dopiero po usunięciu wszystkich przechowywanych przedmiotów. Pozostałe wpisy: {item_count}.</red>"
    close_bank_not_empty: "<red>Wycofaj swój sklep banku przed zamknięciem tego sklepu. Pozostałe śledzone waluty: {bank_currency_count}.</red>"
    closed: "<green>Zamknął sklep i wrócił {returned_blocks} ShopBlock(s). Zliczone sklepy: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Nie znaleziono sklepu</red>"
      lore:
        - "<gray>Tego sklepu nie można załadować z pamięci.</gray>"
      message: "<red>Tego sklepu nie można załadować z pamięci.</red>"

# Globalny administracyjny panel sterowania do zarządzania RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] Kontrola RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Panel administracyjny RDS</white>"
    lore:
      - "<gray>Zarządzaj globalnymi systemami administracyjnymi i sklepowymi z jednego miejsca.</gray>"
      - "<gray>Otwórz bank serwerów, konfigurację i elementy sterujące integracją poniżej.</gray>"
      - "<yellow>Wymaga:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Bank serwerów</gradient>"
      lore:
        - "<gray>Przegląd dochodów sklepu administracyjnego pobieranych do banku serwerów.</gray>"
        - "<gray>Sprawdź czas następnego pobrania i wypłać saldo.</gray>"
        - "<yellow>Kliknij, aby otworzyć kontrolę banku serwera.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Edycja wartości z</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Każde edytowalne ustawienie można zmienić poprzez monit kowadła.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące konfiguracją.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integracja wtyczek</gradient>"
      lore:
        - "<gray>Otwarte oferty pracy, umiejętności i narzędzia integracji PlaceholderAPI.</gray>"
        - "<gray>Zarządzaj mostami wymagań wtyczek i konfiguracją rozszerzeń.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące integracją.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Menedżer walut</gradient>"
      lore:
        - "<gray>Przejrzyj wykryte waluty z Vault i JExEconomy.</gray>"
        - "<gray>Utwórz wartość domyślną</gray> <white>raindrops</white> <gray>walutę, jeśli zajdzie taka potrzeba.</gray>"
        - "<yellow>Kliknij, aby otworzyć kontrolę walut.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Umiejętność] Wymagania dotyczące umiejętności</gradient>"
      lore:
        - "<gray>Przejrzyj obsługiwane wtyczki umiejętności i stan wykrywania.</gray>"
        - "<gray>Zastosuj domyślne wymagania dotyczące umiejętności do wszystkich poziomów zakupów.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące wymaganiami umiejętności.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Praca] Wymagania stanowiska</gradient>"
      lore:
        - "<gray>Przejrzyj obsługiwane wtyczki zadań i stan wykrywania.</gray>"
        - "<gray>Zastosuj domyślne wymagania stanowiskowe do wszystkich poziomów zakupów.</gray>"
        - "<yellow>Kliknij, aby otworzyć elementy sterujące wymaganiami stanowiska.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[Podatek] Uruchom podatki teraz</gradient>"
      lore:
        - "<gray>Uruchom jeden natychmiastowy cykl poboru podatku do celów testowych.</gray>"
        - "<gray>Nie zmienia to skonfigurowanego licznika czasu podatku powtarzalnego.</gray>"
        - "<yellow>Kliknij, aby natychmiast uruchomić podatki.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Wymagany dostęp administratora</white>"
      lore:
        - "<gray>Nie masz uprawnień do korzystania z tego panelu administracyjnego.</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Wywołało natychmiastowy cykl poboru podatku sklepowego.</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Narzędzie do planowania podatków sklepu nie jest obecnie dostępne.</gray>"

plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>[Int] Integracja wtyczek</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informacje]</gradient> <white>Centrum integracji</white>"
    lore:
