# ============================================
# 全局前缀
# ============================================
# 前缀中到一般插件聊天输出。
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# 面向玩家的商店、银行和税务状况的快速汇总行。
info:
  total: "<blue>商店：</blue> <white>{owned_shops}</white>"
  bank: "<green>跟踪余额（{currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>预定税（{taxed_shops} 应税商店）：</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>下一个税收：</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# 玩家进入时显示的加入时间消息服务器。
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} 应税商店\n[<blue>金额<yellow>]\n{taxes}\n<red>到期：<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# 命令响应字符串`/rs` 功能和切换。
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>打开<white>RDS 管理员</white><gray> 面板。</gray>"
  bar:
    enabled: "<green>查看商店时启用商店老板栏。</green>"
    disabled: "<yellow>商店老板栏已禁用。</yellow>"
  give:
    syntax: "<red>用法：/rs 给出<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>用法：</gray> <white>/rs 记分板 &lt;分类账|库存&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>启用<white>{scoreboard_type}</white><gray> 侧边栏。</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>禁用<white>{scoreboard_type}</white><gray> 侧边栏。</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>切换到<white>{scoreboard_type}</white><gray> 侧边栏。</gray>"
    type:
      ledger: "<gold>分类帐</gold>"
      stock: "<aqua>stock</aqua>"

# 侧边栏记分板标签和值格式。
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS]分类帐 ◆</gradient>"
    transactions: "<yellow>Tx：</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ 银行总计</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>没有银行资金</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS]库存 ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>库存：</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>没有玩家商店</red>"

# 定位目标时显示的老板栏文本商店。
shop_boss_bar:
  title: "<gold>{shop_type} 商店</gold> <gray>|</gray> <yellow>所有者：</yellow> <white>{owner}</white> <gray>|</gray> <yellow>商品：</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>位置：</yellow> <white>{location}</white>"
  type:
    player: "玩家"
    admin: "管理员"
  owner:
    admin: "管理员"
  available_items:
    finite: "{item_count}"
    limited: "库存有限"
    infinite: "无限"
    various: "各种"

# ============================================
# GUI 按钮
# ============================================

# 商店块项目名称和传说元数据。
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>放置此块以设置您的商店。</yellow>"

# 商店概述 UI 标签、知识和可用性状态。
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 商店商店</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] 拥有的商店区块</gradient>"
    lore:
      - "<gray>拥有的商店区块：</gray> <white>{owned_shops}</white>"
      - "<gray>此轨道已购买或已授予</gray>"
      - "<gray>ShopBlock 所有权。</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] 商店区块限制</gradient>"
    lore:
      - "<gray>拥有的商店区块：</gray> <white>{owned_shops}</white>"
      - "<gray>最大车间区块：</gray> <white>{max_shops}</white>"
      - "<gray>此限制控制商店数量</gray>"
      - "<gray>您可以解锁的块。</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[需求] 店铺要求</gradient>"
    lore:
      - "<gray>配置的要求：</gray> <white>{requirement_count}</white>"
      - "<gray>当前要求计数:</gray> <white>{requirements}</white>"
      - "<gray>状态：</gray> <white>{availability}</white>"
      - "<yellow>单击以检查下一个商店</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[准备好]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待办的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[离线]</gradient>"

# 商店等级要求 UI、进度显示和购买反馈。
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[需求] 商店等级{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] 购买商店区块</gradient>"
    lore:
      - "<gray>购买等级：</gray> <white>{purchase_number}</white>"
      - "<gray>拥有的商店区块：</gray> <white>{owned_shops}</white>"
      - "<gray>最大车间区块：</gray> <white>{max_shops}</white>"
      - "<gray>配置的要求：</gray> <white>{requirement_count}</white>"
      - "<gray>当前满足：</gray> <white>{met_count}</white>"
      - "<gray>状态：</gray> <white>{availability}</white>"
      - "<yellow>单击以在该层准备就绪时进行购买。</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[准备好]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待办的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[离线]</gradient>"
    none: "<gradient:#10b981:#34d399>[自由的]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[免费] 无要求</gradient>"
    lore:
      - "<gray>此购买层没有配置要求。</gray>"
      - "<yellow>您无需额外检查即可购买此商店区块。</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[请求]{requirement_name}</gradient>"
    lore:
      - "<gray>密钥：</gray> <white>{requirement_key}</white>"
      - "<gray>类型：</gray> <white>{requirement_type}</white>"
      - "<gray>状态：</gray> <white>{status}</white>"
      - "<gray>进度：</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>摘要：</gray> <white>{summary}</white>"
      - "<yellow>右键单击兼容要求以存储进度。</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ 详细检查</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[遇见]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待办的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[不可用]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>购买了一个商店街区。消耗的要求：</gray> <white>{requirements}</white><gray>。拥有的商店街区：</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您当前不符合 <white>{requirement}</white><gray>。存储要求：</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>商店要求 <white>{requirement}</white><gray> 目前不可用或无效。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您已达到商店区块限制 <white>{max_shops}</white><gray>。拥有的商店街区：</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> 现已准备就绪。</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>已存储进度<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>没有可用于 <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> 不支持存储进度。</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> 目前不可用。</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>无法加载您的 RDS 配置文件，因此无法加载进度</gray>"

# 阻止交互验证错误和保护通知。
block_listener:
  error:
    invalid_owner_uuid: "<red>无法从该项目读取店主。</red>"
    not_owner: "<red>此 ShopBlock 属于其他玩家，无法由您放置。</red>"
    max_shops_reached: "<red>您已达到商店限制 {max_shops}。当前放置的商店：{owned_shops}.</red>"
    shop_protected: "<red>商店不能直接破坏。使用商店菜单关闭商店。</red>"
    double_chest_requires_shop_block: "<red>双宝箱商店需要第二个<blue>ShopBlock</blue><red>。普通箱子不能与商店箱子合并。</red>"
    double_chest_owner_mismatch: "<red>此 ShopBlock 属于其他所有者，因此无法扩展此商店。</red>"
    shop_already_double_chest: "<red>这家商店已经在使用两半箱。</red>"
    double_chest_ambiguous: "<red>此 ShopBlock 涉及多个商店箱。仅将其放置在一个商店旁边。</red>"

# 预定税处理结果消息。
tax_scheduler:
  paid: "<yellow>收取的计划商店税{amount}。已统计商店：{owned_shops}.</yellow>"
  insufficient_funds: "<red>您无法支付预定的商店税{amount}。已统计商店：{owned_shops}.</red>"
  charge_failed: "<red>未能收取{amount}。已统计商店：{owned_shops}.</red>"

# 用于所有者/管理员管理操作的主商店概览界面。
shop_overview_ui:
  title: "{owner} 店铺 - {location}"
  summary:
    name: "<gold>店铺概要</gold>"
    player:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>地点：</gray> <white>{location}</white>"
        - "<gray>存储的条目：</gray> <white>{item_count}</white>"
        - "<gray>店铺类型：</gray> <white>球员商店</white>"
        - "<gray>存货：</gray> <white>有限</white>"
    admin:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>地点：</gray> <white>{location}</white>"
        - "<gray>存储的条目：</gray> <white>{item_count}</white>"
        - "<gray>店铺类型：</gray> <white>管理商店</white>"
        - "<gray>存货：</gray> <white>无限</white>"
  finance:
    name: "<gold>商店银行</gold>"
    lore:
      - "<gray>追踪货币：</gray> <white>{bank_currency_count}</white>"
      - "<yellow>点击查看并提取资金。</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>管理商店启用</red>"
        lore:
          - "<gray>该商店目前是管理员商店。</gray>"
          - "<gray>库存为无限客户。</gray>"
          - "<gray>已存储条目：</gray> <white>{item_count}</white>"
          - "<yellow>单击可切换回</yellow>"
      disabled:
        name: "<green>管理商店禁用</green>"
        lore:
          - "<gray>此商店当前使用普通库存。</gray>"
          - "<gray>客户只能购买存储的金额。</gray>"
          - "<gray>已存储条目：</gray> <white>{item_count}</white>"
          - "<yellow>单击以启用管理商店模式。</yellow>"
    close:
      name: "<red>关闭商店</red>"
      lore:
        - "<gray>删除此商店并返回商店块。</gray>"
        - "<gray>已存储条目：</gray> <white>{item_count}</white>"
        - "<gray>跟踪银行货币：</gray> <white>{bank_currency_count}</white>"
        - "<yellow>商店库存在关闭前必须为空。</yellow>"
    manage:
      name: "<green>添加商店商品</green>"
      lore:
        - "<gray>在此存储新商品shop.</gray>"
        - "<gray>当前条目:</gray> <white>{item_count}</white>"
        - "<yellow>单击以打开项目输入。</yellow>"
    customer_view:
      name: "<gold>打开客户视图</gold>"
      lore:
        - "<gray>在客户看到时预览此商店。</gray>"
        - "<gray>当前条目:</gray> <white>{item_count}</white>"
        - "<yellow>单击以客户身份浏览该商店。</yellow>"
    trusted:
      name: "<gold>受信任玩家</gold>"
      lore:
        - "<gray>关联：</gray> <white>{associate_count}</white>"
        - "<gray>受信任玩家：</gray> <white>{trusted_count}</white>"
        - "<yellow>单击以管理商店信任级别。</yellow>"
    ledger:
      name: "<gold>商店分类帐</gold>"
      lore:
        - "<gray>条目总数：</gray> <white>{ledger_count}</white>"
        - "<gray>购买：</gray> <white>{purchase_count}</white>"
        - "<gray>税金：</gray> <white>{tax_count}</white>"
        - "<yellow>单击可查看商店交易历史记录。</yellow>"
    edit:
      name: "<aqua>编辑商店物品</aqua>"
      lore:
        - "<gray>编辑定价用于存储的商店物品。</gray>"
        - "<gray>当前条目:</gray> <white>{item_count}</white>"
        - "<yellow>单击以编辑价格和货币。</yellow>"
    storage:
      name: "<gold>查看存储的物品</gold>"
      lore:
        - "<gray>查看已存储在此商店中的商品。</gray>"
        - "<gray>当前条目:</gray> <white>{item_count}</white>"
        - "<yellow>单击可提取存储的资金</yellow>"
    locked:
      name: "<red>商店已锁定</red>"
      lore:
        - "<gray>只有所有者可以添加物品。</gray>"
        - "<gray>当前条目:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>您无权管理此商店。</red>"
    no_admin_permission: "<red>您无权切换管理商店。</red>"
    admin_limit_reached: "<red>服务器已有 {admin_shops} 管理商店。免费版仅允许 {max_admin_shops} 管理商店。</red>"
    admin_enabled: "<green>该商店现在是一个管理商店，拥有无限的客户库存。已统计商店：{owned_shops}.</green>"
    admin_disabled: "<yellow>该商店现在是普通玩家商店，客户库存有限。已统计商店：{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>您无法将此管理商店切换回玩家商店，因为您的商店限制为 {max_shops}。已统计商店：{owned_shops}.</red>"
    close_not_empty: "<red>您只能在删除所有存储的物品后才能关闭商店。剩余条目：{item_count}.</red>"
    close_bank_not_empty: "<red>在关闭此商店之前提取您的商店银行。剩余跟踪货币：{bank_currency_count}.</red>"
    closed: "<green>关闭商店并返回{returned_blocks} ShopBlock。已统计商店：{owned_shops}.</green>"
    shop_missing:
      name: "<red>未找到商店</red>"
      lore:
        - "<gray>此商店无法从存储加载。</gray>"
      message: "<red>此商店无法从存储加载。</red>"

# 用于 RDS 管理的全局管理控制面板。
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS 控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS 管理面板</white>"
    lore:
      - "<gray>从一处管理全局管理商店系统。</gray>"
      - "<gray>打开服务器库或编辑配置设置如下。</gray>"
      - "<yellow>需要：</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] 服务器银行</gradient>"
      lore:
        - "<gray>查看拉入服务器银行的管理商店收入。</gray>"
        - "<gray>检查下一次拉取时间并提取余额。</gray>"
        - "<yellow>单击以打开服务器</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 商店Config</gradient>"
      lore:
        - "<gray>从</gray> <white>配置/config.yml</white><gray>.</gray>"
        - "<gray>每个可编辑设置都可以通过铁砧提示进行更改。</gray>"
        - "<yellow>单击以打开配置控件。</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] 货币经理</gradient>"
      lore:
        - "<gray>查看从金库和中检测到的货币JExEconomy。</gray>"
        - "<gray>创建默认</gray> <white>雨滴</white> <gray>需要时使用货币。</gray>"
        - "<yellow>单击以打开货币控件。</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>需要管理员访问权限</white>"
      lore:
        - "<gray>您无权使用此管理面板。</gray>"

# 检测到的提供商和默认货币创建的管理货币视图。
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] 货币经理</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[信息]</gradient> <white>货币提供商</white>"
    lore:
      - "<gray>已检测到货币：</gray> <white>{currency_count}</white>"
      - "<gray>可用保险库：</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy 可用：</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>使用水晶按钮创建默认值</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[当前]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>提供商：</gray> <white>{provider}</white>"
      - "<gray>符号：</gray> <white>{symbol}</white>"
      - "<gray>前缀：</gray> <white>{prefix}</white>"
      - "<gray>后缀：</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>创建 {currency_id}</white>"
      lore:
        - "<gray>在 JExEconomy 中创建默认 RDS 货币。</gray>"
        - "<yellow>单击以创建 {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy 必需</white>"
      lore:
        - "<gray>您无法在没有 JExEconomy 的情况下创建默认货币。</gray>"
        - "<gray>首先安装并启用JExEconomy。</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[好的]</gradient> <white>{currency_id}就绪</white>"
      lore:
        - "<gray>默认货币已存在。</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>创建默认货币：</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>的预定商店税未能创建货币：</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>货币已存在：</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>除非 JExEconomy 可用，否则您无法使用此按钮。</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>未检测到货币</white>"
      lore:
        - "<gray>没有检测到Vault或JExEconomy货币。</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>需要管理员访问权限</white>"
      lore:
        - "<gray>您无权使用此货币视图。</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您无权管理货币。</gray>"
  decoration:
    border:
      name: " "

# 配置浏览器 UI，用于可编辑设置和更新反馈。
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] 商店Config</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[信息]</gradient> <white>配置设置</white>"
