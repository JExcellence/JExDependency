# ============================================
# MAAILMANLAAJUINEN ETULIITE
# ============================================
# Etuliite liitetty yleisen laajennuksen chat-lähtöön.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Nopeat pelaajien puoleiset yhteenvetolinjat myymälän, pankin ja verotuksellisesta asemasta.
info:
  total: "<blue>Kaupat:</blue> <white>{owned_shops}</white>"
  bank: "<green>Seuratut saldot ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Suunniteltu vero ({taxed_shops}verolliset kaupat):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Seuraava vero:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Liittymisaikaviestit, jotka näytetään, kun pelaajat tulevat palvelimelle.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}verollinen kauppa/kaupat\n[<blue>Määrä<yellow>]\n{taxes}\n<red>Eräpäivä:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Komennon vastausmerkkijonot /rs-ominaisuuksille ja vaihtokytkimille.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Avasi<white>RDS-järjestelmänvalvoja</white><gray>paneeli.</gray>"
  bar:
    enabled: "<green>Kaupan pomopalkki käytössä, kun katsot kauppaa.</green>"
    disabled: "<yellow>Kaupan pomobaari pois käytöstä.</yellow>"
  give:
    syntax: "<red>Käyttö: /rs anna<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Käyttö:</gray> <white>/rs tulostaulu&lt;pääkirja|varasto&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Otettu käyttöön<white>{scoreboard_type}</white><gray>sivupalkki.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Pois käytöstä<white>{scoreboard_type}</white><gray>sivupalkki.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Vaihdettu kohtaan<white>{scoreboard_type}</white><gray>sivupalkki.</gray>"
    type:
      ledger: "<gold>pääkirja</gold>"
      stock: "<aqua>varastossa</aqua>"

# Sivupalkin tulostaulun tarrat ja arvojen muotoilu.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Reskontra ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Pankkien kokonaissummat</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Ei pankkivaroja</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Varasto ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Varasto:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Ei pelaajakauppoja</red>"

# Pääpalkin teksti näkyy, kun kohdistat kauppaan.
shop_boss_bar:
  title: "<gold>{shop_type}Kauppa</gold> <gray>|</gray> <yellow>Omistaja:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Tuotteet:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Sijainti:</yellow> <white>{location}</white>"
  type:
    player: "Pelaaja"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Rajoitettu erä"
    infinite: "Ääretön"
    various: "Eri"

# ============================================
# GUI-painikkeet
# ============================================

# Shop block -tuotteen nimi ja opintojen metatiedot.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Aseta tämä lohko perustaaksesi myymäläsi.</yellow>"

# Kauppakaupan yleiskatsauksen käyttöliittymätunnisteet, oppitunnit ja saatavuustilat.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Shop Store</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Omista myymälälohkoja</gradient>"
    lore:
      - "<gray>Omistamat kauppakorttelit:</gray> <white>{owned_shops}</white>"
      - "<gray>Tämä kappaleita on ostettu tai myönnetty</gray>"
      - "<gray>ShopBlock-omistus.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Shop Block Limit</gradient>"
    lore:
      - "<gray>Omistamat kauppakorttelit:</gray> <white>{owned_shops}</white>"
      - "<gray>Myymälälohkojen enimmäismäärä:</gray> <white>{max_shops}</white>"
      - "<gray>Tämä raja määrää ostosten määrän</gray>"
      - "<gray>lohkot, jotka voit avata.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Kaupan vaatimukset</gradient>"
    lore:
      - "<gray>Määritetyt vaatimukset:</gray> <white>{requirement_count}</white>"
      - "<gray>Nykyinen tarvemäärä:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Tarkista seuraava kauppataso napsauttamalla.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Valmis]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Kauppatason vaatimuskäyttöliittymä, edistymisen näyttö ja ostopalaute.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Kauppataso{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Osta kauppalohko</gradient>"
    lore:
      - "<gray>Ostotaso:</gray> <white>{purchase_number}</white>"
      - "<gray>Omistamat kauppakorttelit:</gray> <white>{owned_shops}</white>"
      - "<gray>Myymälälohkojen enimmäismäärä:</gray> <white>{max_shops}</white>"
      - "<gray>Määritetyt vaatimukset:</gray> <white>{requirement_count}</white>"
      - "<gray>Tällä hetkellä tavattu:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Napsauta ostaaksesi, kun tämä taso on valmis.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Valmis]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Ilmainen]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Ilmainen] Ei vaatimuksia</gradient>"
    lore:
      - "<gray>Tällä ostotasolla ei ole määritettyjä vaatimuksia.</gray>"
      - "<yellow>Voit ostaa tämän kauppalohkon ilman ylimääräisiä shekkejä.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Pyydä]{requirement_name}</gradient>"
    lore:
      - "<gray>Avain:</gray> <white>{requirement_key}</white>"
      - "<gray>Tyyppi:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Edistyminen:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Yhteenveto:</gray> <white>{summary}</white>"
      - "<yellow>Napsauta hiiren kakkospainikkeella yhteensopivia vaatimuksia pankin edistymiseen.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Yksityiskohtaiset tarkastukset</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Odottaa]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Ei saatavilla]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Osti kauppakorttelin. Kulutetut vaatimukset:</gray> <white>{requirements}</white><gray>. Omistamat kauppakorttelit:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Et tapaa tällä hetkellä<white>{requirement}</white><gray>. Kaupan vaatimukset:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Kaupan vaatimus<white>{requirement}</white><gray>ei ole saatavilla tai on virheellinen juuri nyt.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Olet saavuttanut kaupan lohkorajan<white>{max_shops}</white><gray>. Omistamat kauppakorttelit:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>on nyt valmis.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Tallennetun edistymisen kohteelle<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Vastaavia tuotteita tai valuuttoja ei ollut saatavilla<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>ei tue pankkien edistymistä.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>ei ole saatavilla juuri nyt.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDS-profiiliasi ei voitu ladata, joten edistymistä ei voitu tallentaa.</gray>"

# Estä vuorovaikutuksen vahvistusvirheet ja suojausilmoitukset.
block_listener:
  error:
    invalid_owner_uuid: "<red>Kaupan omistajaa ei voi lukea tästä tuotteesta.</red>"
    not_owner: "<red>Tämä ShopBlock kuuluu toiselle pelaajalle, etkä voi sijoittaa sitä.</red>"
    max_shops_reached: "<red>Olet saavuttanut kaupan rajan{max_shops}. Tällä hetkellä sijoitetut kaupat:{owned_shops}.</red>"
    shop_protected: "<red>Kauppoja ei voi rikkoa suoraan. Sulje kauppa käyttämällä kauppavalikkoa.</red>"
    double_chest_requires_shop_block: "<red>Tuplaarkkukaupat vaativat toisen<blue>ShopBlock</blue><red>. Normaalit arkut eivät voi sulautua kauppaarkkuihin.</red>"
    double_chest_owner_mismatch: "<red>Tämä ShopBlock kuuluu toiselle omistajalle, joten se ei voi laajentaa tätä kauppaa.</red>"
    shop_already_double_chest: "<red>Tässä kaupassa on jo käytössä molemmat rintakehät.</red>"
    double_chest_ambiguous: "<red>Tämä ShopBlock koskettaa useita kauppaarkkuja. Sijoita se vain yhden liikkeen viereen.</red>"

# Ajoitetun verokäsittelyn tulosviestit.
tax_scheduler:
  paid: "<yellow>Kerätty aikataulun mukainen myymälävero{amount}. Lasketut kaupat:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Et voinut maksaa aikataulun mukaista kauppaveroa{amount}. Lasketut kaupat:{owned_shops}.</red>"
  charge_failed: "<red>Suunnitellun kauppaveron periminen epäonnistui{amount}. Lasketut kaupat:{owned_shops}.</red>"

# Pääkaupan yleiskatsauksen käyttöliittymä omistajan/järjestelmänvalvojan hallintatoimintoihin.
shop_overview_ui:
  title: "{owner} Kauppa - {location}"
  summary:
    name: "<gold>Kaupan yhteenveto</gold>"
    player:
      lore:
        - "<gray>Omistaja:</gray> <white>{owner}</white>"
        - "<gray>Sijainti:</gray> <white>{location}</white>"
        - "<gray>Tallennetut merkinnät:</gray> <white>{item_count}</white>"
        - "<gray>Kaupan tyyppi:</gray> <white>Pelaajakauppa</white>"
        - "<gray>Varasto:</gray> <white>Rajallinen</white>"
    admin:
      lore:
        - "<gray>Omistaja:</gray> <white>{owner}</white>"
        - "<gray>Sijainti:</gray> <white>{location}</white>"
        - "<gray>Tallennetut merkinnät:</gray> <white>{item_count}</white>"
        - "<gray>Kaupan tyyppi:</gray> <white>Admin kauppa</white>"
        - "<gray>Varasto:</gray> <white>Ääretön</white>"
  finance:
    name: "<gold>Kauppa pankki</gold>"
    lore:
      - "<gray>Seuratut valuutat:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Napsauta tarkistaaksesi ja nostaaksesi varoja.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop käytössä</red>"
        lore:
          - "<gray>Tämä kauppa on tällä hetkellä järjestelmänvalvojakauppa.</gray>"
          - "<gray>Varasto on asiakkaille ääretön.</gray>"
          - "<gray>Tallennetut merkinnät:</gray> <white>{item_count}</white>"
          - "<yellow>Napsauta vaihtaaksesi takaisin pelaajakauppaan.</yellow>"
      disabled:
        name: "<green>Admin Shop pois käytöstä</green>"
        lore:
          - "<gray>Tämä kauppa käyttää tällä hetkellä normaalia varastoa.</gray>"
          - "<gray>Asiakkaat voivat ostaa vain talletettuja määriä.</gray>"
          - "<gray>Tallennetut merkinnät:</gray> <white>{item_count}</white>"
          - "<yellow>Napsauta ottaaksesi järjestelmänvalvojan kauppatilan käyttöön.</yellow>"
    close:
      name: "<red>Sulje kauppa</red>"
      lore:
        - "<gray>Poista tämä kauppa ja palauta kauppalohko.</gray>"
        - "<gray>Tallennetut merkinnät:</gray> <white>{item_count}</white>"
        - "<gray>Seuratut pankkien valuutat:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Myymälävaraston tulee olla tyhjä ennen sulkemista.</yellow>"
    manage:
      name: "<green>Lisää kauppatuotteita</green>"
      lore:
        - "<gray>Säilytä uusia tuotteita tässä kaupassa.</gray>"
        - "<gray>Nykyiset merkinnät:</gray> <white>{item_count}</white>"
        - "<yellow>Napsauta avataksesi kohteen syöttötavan.</yellow>"
    customer_view:
      name: "<gold>Avaa Asiakasnäkymä</gold>"
      lore:
        - "<gray>Esikatsele tätä kauppaa sellaisena kuin asiakkaat näkevät sen.</gray>"
        - "<gray>Nykyiset merkinnät:</gray> <white>{item_count}</white>"
        - "<yellow>Napsauta selataksesi tätä kauppaa asiakkaana.</yellow>"
    trusted:
      name: "<gold>Luotetut pelaajat</gold>"
      lore:
        - "<gray>Yhteistyökumppanit:</gray> <white>{associate_count}</white>"
        - "<gray>Luotetut pelaajat:</gray> <white>{trusted_count}</white>"
        - "<yellow>Napsauta hallitaksesi kaupan luottamustasoja.</yellow>"
    ledger:
      name: "<gold>Kauppakirja</gold>"
      lore:
        - "<gray>Merkintöjä yhteensä:</gray> <white>{ledger_count}</white>"
        - "<gray>Ostokset:</gray> <white>{purchase_count}</white>"
        - "<gray>Verot:</gray> <white>{tax_count}</white>"
        - "<yellow>Napsauta nähdäksesi kaupan tapahtumahistorian.</yellow>"
    edit:
      name: "<aqua>Muokkaa kaupan kohteita</aqua>"
      lore:
        - "<gray>Muokkaa varastoitujen myymälätuotteiden hintoja.</gray>"
        - "<gray>Nykyiset merkinnät:</gray> <white>{item_count}</white>"
        - "<yellow>Napsauta muokataksesi hintoja ja valuuttoja.</yellow>"
    storage:
      name: "<gold>Näytä tallennetut kohteet</gold>"
      lore:
        - "<gray>Tarkista tähän kauppaan jo tallennetut tuotteet.</gray>"
        - "<gray>Nykyiset merkinnät:</gray> <white>{item_count}</white>"
        - "<yellow>Napsauta poistaaksesi tallennetut kohteet.</yellow>"
    locked:
      name: "<red>Kauppa lukittu</red>"
      lore:
        - "<gray>Vain omistaja voi lisätä kohteita.</gray>"
        - "<gray>Nykyiset merkinnät:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Sinulla ei ole lupaa hallinnoida tätä kauppaa.</red>"
    no_admin_permission: "<red>Sinulla ei ole lupaa vaihtaa järjestelmänvalvojan kauppoja.</red>"
    admin_limit_reached: "<red>Palvelimella on jo{admin_shops}admin kaupat. Ilmainen versio sallii vain{max_admin_shops}admin kaupat.</red>"
    admin_enabled: "<green>Tämä kauppa on nyt järjestelmänvalvojakauppa, jossa on loputon asiakasvalikoima. Lasketut kaupat:{owned_shops}.</green>"
    admin_disabled: "<yellow>Tämä kauppa on nyt normaali pelaajakauppa, jossa on rajallinen asiakasvarasto. Lasketut kaupat:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Et voi vaihtaa tätä järjestelmänvalvojakauppaa takaisin pelaajakauppaksi, koska kauppasi raja on{max_shops}on jo saavutettu. Lasketut kaupat:{owned_shops}.</red>"
    close_not_empty: "<red>Voit sulkea kaupan vasta, kun olet poistanut kaikki tallennetut tavarat. Loput merkinnät:{item_count}.</red>"
    close_bank_not_empty: "<red>Nosta myymäläpankki ennen tämän kaupan sulkemista. Loput seurattavat valuutat:{bank_currency_count}.</red>"
    closed: "<green>Sulki myymälän ja palasi{returned_blocks}ShopBlock(t). Lasketut kaupat:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Kauppaa ei löydy</red>"
      lore:
        - "<gray>Tätä kauppaa ei voitu ladata varastosta.</gray>"
      message: "<red>Tätä kauppaa ei voitu ladata varastosta.</red>"

