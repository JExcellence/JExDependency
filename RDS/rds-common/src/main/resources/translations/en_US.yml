# ============================================
# GLOBAL PREFIX
# ============================================
# Prefix prepended to general plugin chat output.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Quick player-facing summary lines for shop, bank, and tax status.
info:
  total: "<blue>Shops:</blue> <white>{owned_shops}</white>"
  bank: "<green>Tracked Balances ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Scheduled Tax ({taxed_shops} taxable shops):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Next Tax:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Join-time messages shown when players enter the server.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} taxable shop(s)\n[<blue>Amount<yellow>]\n{taxes}\n<red>Due:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Command response strings for `/rs` features and toggles.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Opened the <white>RDS Admin</white><gray> panel.</gray>"
  bar:
    enabled: "<green>Shop boss bar enabled while looking at a shop.</green>"
    disabled: "<yellow>Shop boss bar disabled.</yellow>"
  give:
    syntax: "<red>Usage: /rs give <target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Usage:</gray> <white>/rs scoreboard &lt;ledger|stock&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Enabled the <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Disabled the <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Switched to the <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    type:
      ledger: "<gold>ledger</gold>"
      stock: "<aqua>stock</aqua>"

# Sidebar scoreboard labels and value formatting.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Bank Totals</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>No banked funds</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Stock ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stock:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>No player shops</red>"

# Boss bar text shown while targeting a shop.
shop_boss_bar:
  title: "<gold>{shop_type} Shop</gold> <gray>|</gray> <yellow>Owner:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Items:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Location:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Limited Stock"
    infinite: "Infinite"
    various: "Various"

# ============================================
# GUI Buttons
# ============================================

# Shop block item name and lore metadata.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Place this block to set up your shop.</yellow>"

# Shop store overview UI labels, lore, and availability states.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Shop Store</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Owned Shop Blocks</gradient>"
    lore:
      - "<gray>Owned shop blocks:</gray> <white>{owned_shops}</white>"
      - "<gray>This tracks purchased or granted</gray>"
      - "<gray>ShopBlock ownership.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Shop Block Limit</gradient>"
    lore:
      - "<gray>Owned shop blocks:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum shop blocks:</gray> <white>{max_shops}</white>"
      - "<gray>This limit controls how many shop</gray>"
      - "<gray>blocks you can unlock.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Store Requirements</gradient>"
    lore:
      - "<gray>Configured requirements:</gray> <white>{requirement_count}</white>"
      - "<gray>Current requirement count:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Click to inspect the next shop tier.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Ready]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pending]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Shop tier requirement UI, progress display, and purchase feedback.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Shop Tier {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Purchase Shop Block</gradient>"
    lore:
      - "<gray>Purchase tier:</gray> <white>{purchase_number}</white>"
      - "<gray>Owned shop blocks:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum shop blocks:</gray> <white>{max_shops}</white>"
      - "<gray>Configured requirements:</gray> <white>{requirement_count}</white>"
      - "<gray>Currently met:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Click to purchase when this tier is ready.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Ready]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pending]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Free]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Free] No Requirements</gradient>"
    lore:
      - "<gray>This purchase tier has no configured requirements.</gray>"
      - "<yellow>You can purchase this shop block without extra checks.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req] {requirement_name}</gradient>"
    lore:
      - "<gray>Key:</gray> <white>{requirement_key}</white>"
      - "<gray>Type:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Progress:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Summary:</gray> <white>{summary}</white>"
      - "<yellow>Right-click compatible requirements to bank progress.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detailed Checks</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pending]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Unavailable]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Purchased a shop block. Requirements consumed:</gray> <white>{requirements}</white><gray>. Owned shop blocks:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not currently meet <white>{requirement}</white><gray>. Store requirements:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>The store requirement <white>{requirement}</white><gray> is unavailable or invalid right now.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You have reached the shop block limit of <white>{max_shops}</white><gray>. Owned shop blocks:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> is now ready.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Stored progress for <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>No matching items or currency were available for <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> does not support banked progress.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> is unavailable right now.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Your RDS profile could not be loaded, so progress could not be saved.</gray>"

# Block interaction validation errors and protection notices.
block_listener:
  error:
    invalid_owner_uuid: "<red>Unable to read the shop owner from this item.</red>"
    not_owner: "<red>This ShopBlock belongs to another player and cannot be placed by you.</red>"
    max_shops_reached: "<red>You have reached the shop limit of {max_shops}. Current placed shops: {owned_shops}.</red>"
    shop_protected: "<red>Shops cannot be broken directly. Use the shop menu to close the shop.</red>"
    double_chest_requires_shop_block: "<red>Double-chest shops require a second <blue>ShopBlock</blue><red>. Normal chests cannot merge with shop chests.</red>"
    double_chest_owner_mismatch: "<red>This ShopBlock belongs to a different owner, so it cannot extend this shop.</red>"
    shop_already_double_chest: "<red>This shop is already using both chest halves.</red>"
    double_chest_ambiguous: "<red>This ShopBlock touches multiple shop chests. Place it next to only one shop.</red>"

# Scheduled tax processing outcome messages.
tax_scheduler:
  paid: "<yellow>Collected scheduled shop tax of {amount}. Counted shops: {owned_shops}.</yellow>"
  insufficient_funds: "<red>You could not pay the scheduled shop tax of {amount}. Counted shops: {owned_shops}.</red>"
  charge_failed: "<red>Failed to collect the scheduled shop tax of {amount}. Counted shops: {owned_shops}.</red>"

# Main shop overview interface for owner/admin management actions.
shop_overview_ui:
  title: "{owner} Shop - {location}"
  summary:
    name: "<gold>Shop Summary</gold>"
    player:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Stored entries:</gray> <white>{item_count}</white>"
        - "<gray>Shop type:</gray> <white>Player Shop</white>"
        - "<gray>Inventory:</gray> <white>Finite</white>"
    admin:
      lore:
        - "<gray>Owner:</gray> <white>{owner}</white>"
        - "<gray>Location:</gray> <white>{location}</white>"
        - "<gray>Stored entries:</gray> <white>{item_count}</white>"
        - "<gray>Shop type:</gray> <white>Admin Shop</white>"
        - "<gray>Inventory:</gray> <white>Infinite</white>"
  finance:
    name: "<gold>Shop Bank</gold>"
    lore:
      - "<gray>Tracked currencies:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Click to review and withdraw funds.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop Enabled</red>"
        lore:
          - "<gray>This shop is currently an admin shop.</gray>"
          - "<gray>Inventory is infinite for customers.</gray>"
          - "<gray>Stored entries:</gray> <white>{item_count}</white>"
          - "<yellow>Click to switch back to a player shop.</yellow>"
      disabled:
        name: "<green>Admin Shop Disabled</green>"
        lore:
          - "<gray>This shop currently uses normal stock.</gray>"
          - "<gray>Customers can only buy stored amounts.</gray>"
          - "<gray>Stored entries:</gray> <white>{item_count}</white>"
          - "<yellow>Click to enable admin shop mode.</yellow>"
    close:
      name: "<red>Close Shop</red>"
      lore:
        - "<gray>Remove this shop and return the shop block.</gray>"
        - "<gray>Stored entries:</gray> <white>{item_count}</white>"
        - "<gray>Tracked bank currencies:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Shop stock must be empty before closing.</yellow>"
    manage:
      name: "<green>Add Shop Items</green>"
      lore:
        - "<gray>Store new items in this shop.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to open item input.</yellow>"
    customer_view:
      name: "<gold>Open Customer View</gold>"
      lore:
        - "<gray>Preview this shop as customers see it.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to browse this shop as a customer.</yellow>"
    trusted:
      name: "<gold>Trusted Players</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Trusted players:</gray> <white>{trusted_count}</white>"
        - "<yellow>Click to manage shop trust levels.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Total entries:</gray> <white>{ledger_count}</white>"
        - "<gray>Purchases:</gray> <white>{purchase_count}</white>"
        - "<gray>Taxes:</gray> <white>{tax_count}</white>"
        - "<yellow>Click to review shop transaction history.</yellow>"
    edit:
      name: "<aqua>Edit Shop Items</aqua>"
      lore:
        - "<gray>Edit pricing for stored shop items.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to edit prices and currencies.</yellow>"
    storage:
      name: "<gold>View Stored Items</gold>"
      lore:
        - "<gray>Review items already stored in this shop.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
        - "<yellow>Click to withdraw stored items.</yellow>"
    locked:
      name: "<red>Shop Locked</red>"
      lore:
        - "<gray>Only the owner can add items.</gray>"
        - "<gray>Current entries:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>You do not have permission to manage this shop.</red>"
    no_admin_permission: "<red>You do not have permission to toggle admin shops.</red>"
    admin_limit_reached: "<red>The server already has {admin_shops} admin shops. Free edition allows only {max_admin_shops} admin shops.</red>"
    admin_enabled: "<green>This shop is now an admin shop with infinite customer inventory. Counted shops: {owned_shops}.</green>"
    admin_disabled: "<yellow>This shop is now a normal player shop with finite customer inventory. Counted shops: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>You cannot switch this admin shop back to a player shop because your shop limit of {max_shops} is already reached. Counted shops: {owned_shops}.</red>"
    close_not_empty: "<red>You can only close a shop after removing all stored items. Remaining entries: {item_count}.</red>"
    close_bank_not_empty: "<red>Withdraw your shop bank before closing this shop. Remaining tracked currencies: {bank_currency_count}.</red>"
    closed: "<green>Closed the shop and returned {returned_blocks} ShopBlock(s). Counted shops: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>This shop could not be loaded from storage.</gray>"
      message: "<red>This shop could not be loaded from storage.</red>"

# Global admin control panel for RDS management.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Admin Panel</white>"
    lore:
      - "<gray>Manage global admin-shop systems from one place.</gray>"
      - "<gray>Open the server bank or edit config settings below.</gray>"
      - "<yellow>Requires:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Server Bank</gradient>"
      lore:
        - "<gray>Review admin-shop income pulled into the server bank.</gray>"
        - "<gray>Check next pull timing and withdraw balances.</gray>"
        - "<yellow>Click to open server bank controls.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Edit values from</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Every editable setting can be changed through an anvil prompt.</gray>"
        - "<yellow>Click to open config controls.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Currency Manager</gradient>"
      lore:
        - "<gray>Review detected currencies from Vault and JExEconomy.</gray>"
        - "<gray>Create the default</gray> <white>raindrops</white> <gray>currency when needed.</gray>"
        - "<yellow>Click to open currency controls.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Access Required</white>"
      lore:
        - "<gray>You do not have permission to use this admin panel.</gray>"

# Admin currency view for detected providers and default currency creation.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Currency Manager</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Currency Providers</white>"
    lore:
      - "<gray>Detected currencies:</gray> <white>{currency_count}</white>"
      - "<gray>Vault available:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy available:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Use the crystal button to create default currency.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Provider:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Prefix:</gray> <white>{prefix}</white>"
      - "<gray>Suffix:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Create {currency_id}</white>"
      lore:
        - "<gray>Create the default RDS currency in JExEconomy.</gray>"
        - "<yellow>Click to create {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy Required</white>"
      lore:
        - "<gray>You cannot create default currency without JExEconomy.</gray>"
        - "<gray>Install and enable JExEconomy first.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id} Ready</white>"
      lore:
        - "<gray>The default currency already exists.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Created default currency:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Failed to create currency:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Currency already exists:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You cannot use this button unless JExEconomy is available.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>No Currencies Detected</white>"
      lore:
        - "<gray>No Vault or JExEconomy currencies were detected.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Access Required</white>"
      lore:
        - "<gray>You do not have permission to use this currency view.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to manage currencies.</gray>"
  decoration:
    border:
      name: " "

# Config browser UI for editable settings and update feedback.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Config Settings</white>"
    lore:
      - "<gray>Editable settings detected:</gray> <white>{setting_count}</white>"
      - "<gray>Click any entry below to edit its value in an anvil.</gray>"
      - "<yellow>Changes are written directly to config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Path:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Current value:</gray> <white>{current_value}</white>"
      - "<yellow>Click to edit this setting.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Integer]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Long]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Double]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[List]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[String]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>No Editable Settings</white>"
      lore:
        - "<gray>No editable scalar/list config settings were found.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Access Required</white>"
      lore:
        - "<gray>You do not have permission to use this config view.</gray>"
    config_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Config Editing Locked</white>"
      lore:
        - "<gray>This edition does not allow runtime config edits.</gray>"
    permission_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to edit config settings.</gray>"
    config_locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Config editing is locked in this edition.</gray>"
    updated: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Updated <white>{config_path}</white><gray> to <white>{updated_value}</white><gray>.</gray>"

# Anvil prompt text for editing config values.
shop_config_value_anvil_ui:
  title: "Edit {config_path}"
  input:
    lore:
      - "<gray>Path:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Current value:</gray> <white>{current_value}</white>"
      - "<yellow>Enter the new value and confirm.</yellow>"
  error:
    invalid_value: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Invalid input for type <white>{value_type}</white><gray>. Input:</gray> <white>{input}</white>"

# Server bank overview, currency entries, and withdrawal feedback.
server_bank_ui:
  title: "<gradient:#10b981:#34d399>[$] Server Bank</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Income & Transfer Status</white>"
    lore:
      - "<gray>Tracked currencies:</gray> <white>{currency_count}</white>"
      - "<gray>Income:</gray> <white>{income_summary}</white>"
      - "<gray>Next pull:</gray> <white>{next_pull_at}</white>"
      - "<gray>Time until next pull:</gray> <white>{time_until_next_pull}</white>"
      - "<yellow>Admin-shop balances are transferred here on schedule.</yellow>"
    income:
      none: "<gradient:#6b7280:#9ca3af>None</gradient>"
    next_pull:
      disabled: "<gradient:#ef4444:#f87171>Disabled</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>Pending...</gradient>"
    time_until:
      disabled: "<gradient:#ef4444:#f87171>Disabled</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>Pending...</gradient>"
  withdraw_all:
    name: "<gradient:#22c55e:#86efac>[Withdraw]</gradient> <white>Withdraw All</white>"
    lore:
      - "<gray>Attempt to withdraw every positive balance.</gray>"
      - "<gray>Unavailable currencies will be skipped.</gray>"
      - "<yellow>Click to withdraw all funds to your account.</yellow>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[$] {currency_name}</gradient>"
    lore:
      - "<gray>Currency id:</gray> <white>{currency_type}</white>"
      - "<gray>Available balance:</gray> <white>{amount} {currency_name}</white>"
      - "<yellow>Click to withdraw this full currency balance.</yellow>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Server Bank Empty</white>"
      lore:
        - "<gray>No positive balances are available to withdraw.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Access Required</white>"
      lore:
        - "<gray>You do not have permission to manage the server bank.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>You do not have permission to manage the server bank.</gray>"
    entry_missing: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>That server-bank balance is no longer available.</gray>"
    withdrawn: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Withdrew <white>{amount} {currency_name}</white><gray>. Remaining {currency_name}:</gray> <white>{remaining_amount}</white><gray>. Active currencies:</gray> <white>{currency_count}</white>"
    withdraw_all: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Withdrew <white>{withdrawn_currency_count}</white><gray> currency balance(s). Failed:</gray> <white>{failed_currency_count}</white><gray>. Remaining active currencies:</gray> <white>{remaining_currency_count}</white><gray>. Details:</gray> <white>{withdrawn_summary}</white>"
