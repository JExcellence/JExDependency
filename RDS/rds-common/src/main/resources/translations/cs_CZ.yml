        - "<gray>Množství:</gray> <white>{item_amount}</white>"
        - "<gray>Celkem zaplaceno:</gray> <white>{amount} {currency_name}</white>"
        - "<gray>ID měny:</gray> <white>{currency_type}</white>"
        - "<gray>Nahráno:</gray> <white>{created_at}</white>"
    taxation:
