    empty:
      name: "<red>Žádné položky hlavní knihy</red>"
      lore:
        - "<gray>Tento obchod zatím nemá žádné zaznamenané nákupy ani daně.</gray>"
    locked:
      name: "<red>Je vyžadován úplný přístup</red>"
      lore:
        - "<gray>Knihu mohou zobrazit pouze důvěryhodní hráči s plným přístupem.</gray>"
    shop_missing:
      name: "<red>Obchod nenalezen</red>"
      lore:
        - "<gray>Tento obchod se nepodařilo načíst z úložiště.</gray>"
      message: "<red>Tento obchod se nepodařilo načíst z úložiště.</red>"

