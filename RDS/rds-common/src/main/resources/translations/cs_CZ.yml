# ============================================
# GLOBÁLNÍ PŘEDPONA
# ============================================
# Předpona předřazená obecnému výstupu chatu pluginu.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Rychlé souhrnné řádky pro hráče pro obchod, banku a daňový status.
info:
  total: "<blue>Obchody:</blue> <white>{owned_shops}</white>"
  bank: "<green>Sledované zůstatky ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Plánovaná daň ({taxed_shops}zdanitelné obchody):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Další daň:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Zprávy o připojení se zobrazují, když hráči vstoupí na server.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}zdanitelné obchody\n[<blue>Množství<yellow>]\n{taxes}\n<red>Splatné:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Řetězce odezvy na příkaz pro funkce a přepínače `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Otevřel<white>Správce RDS</white><gray>panel.</gray>"
  bar:
    enabled: "<green>Při pohledu na obchod byl aktivován panel šéfa obchodu.</green>"
    disabled: "<yellow>Panel šéfa obchodu je zakázán.</yellow>"
  give:
    syntax: "<red>Použití: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Používání:</gray> <white>/rs výsledková tabulka&lt;účetní kniha|zásob&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Povoleno<white>{scoreboard_type}</white><gray>postranní panel.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktivováno<white>{scoreboard_type}</white><gray>postranní panel.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Přepnuto na<white>{scoreboard_type}</white><gray>postranní panel.</gray>"
    type:
      ledger: "<gold>účetní kniha</gold>"
      stock: "<aqua>stock</aqua>"

# Štítky postranního panelu a formátování hodnot.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Hlavní kniha ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Bankovní součet</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Žádné bankovní prostředky</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Sklad ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Sklad:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Žádné obchody s hráči</red>"

# Text na liště šéfa se zobrazuje při cílení na obchod.
shop_boss_bar:
  title: "<gold>{shop_type}Nakupovat</gold> <gray>|</gray> <yellow>Majitel:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>položky:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Umístění:</yellow> <white>{location}</white>"
  type:
    player: "Hráč"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Omezené zásoby"
    infinite: "Nekonečný"
    various: "Různé"

# ============================================
# GUI tlačítka
# ============================================

# Název položky bloku obchodu a metadata tradice.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Umístěte tento blok k nastavení vašeho obchodu.</yellow>"

# Popisky uživatelského rozhraní, tradice a stavy dostupnosti v přehledu obchodu.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Obchod Obchod</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Bloky vlastněných obchodů</gradient>"
    lore:
      - "<gray>Vlastní bloky prodejen:</gray> <white>{owned_shops}</white>"
      - "<gray>Toto sleduje zakoupené nebo udělené</gray>"
      - "<gray>Vlastnictví ShopBlock.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Limit obchodu</gradient>"
    lore:
      - "<gray>Vlastní bloky prodejen:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximální počet bloků prodejen:</gray> <white>{max_shops}</white>"
      - "<gray>Tento limit určuje, kolik nakupuje</gray>"
      - "<gray>bloky, které můžete odemknout.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Požadavek] Požadavky na obchod</gradient>"
    lore:
      - "<gray>Nakonfigurované požadavky:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktuální počet požadavků:</gray> <white>{requirements}</white>"
      - "<gray>Postavení:</gray> <white>{availability}</white>"
      - "<yellow>Kliknutím zobrazíte další úroveň obchodu.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Připraveno]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Čeká]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Uživatelské rozhraní požadavků na úrovni obchodu, zobrazení průběhu a zpětná vazba k nákupu.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Požadavek] Úroveň obchodů{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Nákupní blok obchodu</gradient>"
    lore:
      - "<gray>Úroveň nákupu:</gray> <white>{purchase_number}</white>"
      - "<gray>Vlastní bloky prodejen:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximální počet bloků prodejen:</gray> <white>{max_shops}</white>"
      - "<gray>Nakonfigurované požadavky:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktuálně splněno:</gray> <white>{met_count}</white>"
      - "<gray>Postavení:</gray> <white>{availability}</white>"
      - "<yellow>Až bude tato úroveň připravena, klikněte pro nákup.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Připraveno]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Čeká]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Uvolnit]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Zdarma] Žádné požadavky</gradient>"
    lore:
      - "<gray>Tato úroveň nákupu nemá žádné nakonfigurované požadavky.</gray>"
      - "<yellow>Tento blok obchodu můžete zakoupit bez dalších kontrol.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Požadavek]{requirement_name}</gradient>"
    lore:
      - "<gray>Klíč:</gray> <white>{requirement_key}</white>"
      - "<gray>Typ:</gray> <white>{requirement_type}</white>"
      - "<gray>Postavení:</gray> <white>{status}</white>"
      - "<gray>Pokrok:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Shrnutí:</gray> <white>{summary}</white>"
      - "<yellow>Kliknutím pravým tlačítkem myši na kompatibilní požadavky zobrazíte pokrok.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Podrobné kontroly</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Splněno]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Čeká]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nedostupné]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Koupil blok obchodu. Spotřebované požadavky:</gray> <white>{requirements}</white><gray>. Vlastní bloky prodejen:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Aktuálně se nesetkáváte<white>{requirement}</white><gray>. Požadavky na prodejnu:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Požadavek obchodu<white>{requirement}</white><gray>je momentálně nedostupná nebo neplatná.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Dosáhli jste limitu blokování prodejen<white>{max_shops}</white><gray>. Vlastní bloky prodejen:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>je nyní připraven.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Uložený průběh pro<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Pro nebyly k dispozici žádné odpovídající položky ani měna<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>nepodporuje řízený pokrok.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>je momentálně nedostupná.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Váš profil RDS se nepodařilo načíst, takže postup nelze uložit.</gray>"

# Blokovat chyby ověření interakce a upozornění na ochranu.
block_listener:
  error:
    invalid_owner_uuid: "<red>Z této položky nelze přečíst vlastníka obchodu.</red>"
    not_owner: "<red>Tento ShopBlock patří jinému hráči a vy ho nemůžete umístit.</red>"
    max_shops_reached: "<red>Dosáhli jste limitu obchodu{max_shops}. Aktuálně umístěné obchody:{owned_shops}.</red>"
    shop_protected: "<red>Obchody nelze rozbít přímo. K uzavření obchodu použijte nabídku obchodu.</red>"
    double_chest_requires_shop_block: "<red>Obchody s dvojitým hrudníkem vyžadují sekundu<blue>ShopBlock</blue><red>. Normální truhly se nemohou sloučit s truhlami obchodů.</red>"
    double_chest_owner_mismatch: "<red>Tento ShopBlock patří jinému majiteli, takže nemůže rozšířit tento obchod.</red>"
    shop_already_double_chest: "<red>Tento obchod již používá obě poloviny hrudníku.</red>"
    double_chest_ambiguous: "<red>Tento ShopBlock se dotýká několika truhlic obchodů. Umístěte jej pouze vedle jednoho obchodu.</red>"

# Zprávy o výsledku plánovaného zpracování daní.
tax_scheduler:
  paid: "<yellow>Vybraná plánovaná obchodní daň ve výši{amount}. Počítané obchody:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Nemohli jste zaplatit plánovanou obchodní daň ve výši{amount}. Počítané obchody:{owned_shops}.</red>"
  charge_failed: "<red>Nepodařilo se vybrat plánovanou daň z obchodu{amount}. Počítané obchody:{owned_shops}.</red>"

# Hlavní rozhraní přehledu obchodu pro akce správy vlastníka/administrátora.
shop_overview_ui:
  title: "{owner} Nakupovat - {location}"
  summary:
    name: "<gold>Souhrn obchodu</gold>"
    player:
      lore:
        - "<gray>Majitel:</gray> <white>{owner}</white>"
        - "<gray>Umístění:</gray> <white>{location}</white>"
        - "<gray>Uložené záznamy:</gray> <white>{item_count}</white>"
        - "<gray>Typ obchodu:</gray> <white>Obchod pro hráče</white>"
        - "<gray>Inventář:</gray> <white>Konečný</white>"
    admin:
      lore:
        - "<gray>Majitel:</gray> <white>{owner}</white>"
        - "<gray>Umístění:</gray> <white>{location}</white>"
        - "<gray>Uložené záznamy:</gray> <white>{item_count}</white>"
        - "<gray>Typ obchodu:</gray> <white>Admin Shop</white>"
        - "<gray>Inventář:</gray> <white>Nekonečný</white>"
  finance:
    name: "<gold>Obchod Banka</gold>"
    lore:
      - "<gray>Sledované měny:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klikněte pro kontrolu a výběr prostředků.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop povolen</red>"
        lore:
          - "<gray>Tento obchod je momentálně administračním obchodem.</gray>"
          - "<gray>Zásoby jsou pro zákazníky nekonečné.</gray>"
          - "<gray>Uložené záznamy:</gray> <white>{item_count}</white>"
          - "<yellow>Kliknutím přepnete zpět do obchodu pro hráče.</yellow>"
      disabled:
        name: "<green>Admin Shop zakázán</green>"
        lore:
          - "<gray>Tento obchod aktuálně používá běžné zásoby.</gray>"
          - "<gray>Zákazníci mohou nakupovat pouze uložené částky.</gray>"
          - "<gray>Uložené záznamy:</gray> <white>{item_count}</white>"
          - "<yellow>Kliknutím povolíte režim správce obchodu.</yellow>"
    close:
      name: "<red>Zavřít obchod</red>"
      lore:
        - "<gray>Odstraňte tento obchod a vraťte blok obchodu.</gray>"
        - "<gray>Uložené záznamy:</gray> <white>{item_count}</white>"
        - "<gray>Sledované bankovní měny:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Zásoby obchodu musí být před uzavřením prázdné.</yellow>"
    manage:
      name: "<green>Přidat položky obchodu</green>"
      lore:
        - "<gray>Skladujte nové zboží v tomto obchodě.</gray>"
        - "<gray>Aktuální záznamy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknutím otevřete zadávání položky.</yellow>"
    customer_view:
      name: "<gold>Otevřete zobrazení zákazníka</gold>"
      lore:
        - "<gray>Prohlédněte si tento obchod, jak jej vidí zákazníci.</gray>"
        - "<gray>Aktuální záznamy:</gray> <white>{item_count}</white>"
        - "<yellow>Klikněte pro procházení tohoto obchodu jako zákazník.</yellow>"
    trusted:
      name: "<gold>Důvěryhodní hráči</gold>"
      lore:
        - "<gray>Spolupracovníci:</gray> <white>{associate_count}</white>"
        - "<gray>Důvěryhodní hráči:</gray> <white>{trusted_count}</white>"
        - "<yellow>Kliknutím můžete spravovat úrovně důvěryhodnosti obchodu.</yellow>"
    ledger:
      name: "<gold>Obchodní kniha</gold>"
      lore:
        - "<gray>Celkový počet záznamů:</gray> <white>{ledger_count}</white>"
        - "<gray>Nákupy:</gray> <white>{purchase_count}</white>"
        - "<gray>Daně:</gray> <white>{tax_count}</white>"
        - "<yellow>Kliknutím zobrazíte historii transakcí obchodu.</yellow>"
    edit:
      name: "<aqua>Upravit položky obchodu</aqua>"
      lore:
        - "<gray>Upravit ceny pro uložené položky obchodu.</gray>"
        - "<gray>Aktuální záznamy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknutím upravíte ceny a měny.</yellow>"
    storage:
      name: "<gold>Zobrazit uložené položky</gold>"
      lore:
        - "<gray>Zkontrolujte položky již uložené v tomto obchodě.</gray>"
        - "<gray>Aktuální záznamy:</gray> <white>{item_count}</white>"
        - "<yellow>Kliknutím odeberete uložené položky.</yellow>"
    locked:
      name: "<red>Obchod uzamčen</red>"
      lore:
        - "<gray>Položky může přidávat pouze vlastník.</gray>"
        - "<gray>Aktuální záznamy:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Nemáte oprávnění ke správě tohoto obchodu.</red>"
    no_admin_permission: "<red>Nemáte oprávnění přepínat obchody pro správu.</red>"
    admin_limit_reached: "<red>Server již má{admin_shops}admin obchody. Volné vydání umožňuje pouze{max_admin_shops}admin obchody.</red>"
    admin_enabled: "<green>Tento obchod je nyní administrátorským obchodem s nekonečným inventářem zákazníků. Počítané obchody:{owned_shops}.</green>"
    admin_disabled: "<yellow>Tento obchod je nyní běžným obchodem pro hráče s omezeným inventářem zákazníků. Počítané obchody:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Tento administrátorský obchod nemůžete přepnout zpět na hráčský obchod, protože váš obchod je limitován{max_shops}je již dosaženo. Počítané obchody:{owned_shops}.</red>"
    close_not_empty: "<red>Obchod můžete zavřít až po odstranění všech uložených věcí. Zbývající položky:{item_count}.</red>"
    close_bank_not_empty: "<red>Před uzavřením tohoto obchodu vyberte svou banku obchodu. Zbývající sledované měny:{bank_currency_count}.</red>"
    closed: "<green>Zavřel obchod a vrátil se{returned_blocks}ShopBlock(y). Počítané obchody:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Obchod nenalezen</red>"
      lore:
        - "<gray>Tento obchod se nepodařilo načíst z úložiště.</gray>"
      message: "<red>Tento obchod se nepodařilo načíst z úložiště.</red>"

# Globální ovládací panel pro správu RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] Řízení RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Panel správce RDS</white>"
    lore:
      - "<gray>Spravujte globální systémy admin-shop z jednoho místa.</gray>"
      - "<gray>Otevřete serverovou banku, konfiguraci a ovládací prvky integrace níže.</gray>"
      - "<yellow>Vyžaduje:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Serverová banka</gradient>"
      lore:
        - "<gray>Kontrola příjmu admin-shopu staženého do serverové banky.</gray>"
        - "<gray>Zkontrolujte načasování dalšího tahu a vyjměte zůstatky.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky banky serveru.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Upravit hodnoty ze</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Každé upravitelné nastavení lze změnit pomocí výzvy kovadliny.</gray>"
        - "<yellow>Klepnutím otevřete ovládací prvky konfigurace.</yellow>"
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Ovládání hráče a skupiny</gradient>"
      lore:
        - "<gray>Nastavení maximálních obchodů a slev pro hráče a skupinu.</gray>"
        - "<gray>Otevřete jakýkoli obchod jako vlastník nebo vynucte uzavření aktivních zobrazení obchodu.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky správce přehrávače/skupiny.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin Integrations</gradient>"
      lore:
        - "<gray>Otevřená pracovní místa, dovednosti a integrační nástroje PlaceholderAPI.</gray>"
        - "<gray>Správa požadavků na pluginy a nastavení rozšíření.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky integrace.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Správce měn</gradient>"
      lore:
        - "<gray>Kontrola zjištěných měn ze služby Vault a JExEconomy.</gray>"
        - "<gray>Vytvořte výchozí</gray> <white>raindrops</white> <gray>měny v případě potřeby.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky měn.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[dovednost] Požadavky na dovednosti</gradient>"
      lore:
        - "<gray>Zkontrolujte podporované pluginy dovedností a stav detekce.</gray>"
        - "<gray>Použijte výchozí požadavky na dovednosti na všechny úrovně nákupu.</gray>"
        - "<yellow>Kliknutím otevřete ovládací prvky požadavků na dovednosti.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Požadavky na pracovní místo</gradient>"
      lore:
        - "<gray>Zkontrolujte podporované pluginy úloh a stav detekce.</gray>"
        - "<gray>Použít výchozí požadavky úlohy na všechny úrovně nákupu.</gray>"
        - "<yellow>Klepnutím otevřete ovládací prvky požadavků úlohy.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[Daně] Spustit nyní daně</gradient>"
      lore:
        - "<gray>Spustit jeden cyklus okamžitého výběru daní pro testování.</gray>"
        - "<gray>Tím se nezmění nakonfigurovaný časovač opakování daně.</gray>"
        - "<yellow>Kliknutím spustíte daně jednou právě teď.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Je vyžadován přístup správce</white>"
      lore:
        - "<gray>Nemáte oprávnění používat tento panel správce.</gray>"
