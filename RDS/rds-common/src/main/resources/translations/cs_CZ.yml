  title: "Hodnota:{value} {currency_type}"
  input:
    name: "<gold>Hodnota položky</gold>"
    lore:
      - "<gray>Zadejte nezápornou číselnou hodnotu.</gray>"
      - "<gray>Příklady:</gray> <white>0, 10, 25.5</white>"
  error:
    invalid_number: "<red>Zadejte platné nezáporné číslo. Vstup:{input}</red>"
    processing_failed: "<red>Aktualizace hodnoty položky se nezdařila. Vstup:{input}</red>"

# Uživatelské rozhraní nákupní banky pro zůstatky a výběry měn v jednotlivých obchodech.
shop_bank_ui:
  title: "Obchodní banka -{location}"
  summary:
    name: "<gold>Bankovní zůstatky</gold>"
    lore:
      - "<gray>Majitel:</gray> <white>{owner}</white>"
      - "<gray>Umístění:</gray> <white>{location}</white>"
      - "<gray>Sledované měny:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Kliknutím na zůstatek níže vyberete jeho plnou částku.</yellow>"
  entry:
    name: "<gold>{currency_name}</gold>"
    lore:
      - "<gray>ID měny:</gray> <white>{currency_type}</white>"
      - "<gray>Disponibilní zůstatek:</gray> <white>{amount} {currency_name}</white>"
      - "<yellow>Klikněte pro výběr celého zůstatku.</yellow>"
  feedback:
    not_owner: "<red>Nemáte oprávnění ke správě tohoto obchodu.</red>"
    entry_missing: "<red>Tento bankovní zůstatek již není k dispozici.</red>"
    withdrawn: "<green>Stáhl se{amount} {currency_name}. Zbývající{currency_name}: {remaining_amount}. Sledované měny:{bank_currency_count}.</green>"
    withdraw_failed: "<red>Nepodařilo se stáhnout{amount} {currency_name}z obchodní banky.</red>"
    currency_unavailable: "<red>Měna{currency_name}není momentálně k dispozici.</red>"
    empty:
      name: "<red>Banka je prázdná</red>"
      lore:
        - "<gray>Tento obchod nemá žádné bankovní zůstatky k výběru.</gray>"
    locked:
      name: "<red>Je vyžadován úplný přístup</red>"
      lore:
        - "<gray>Finanční prostředky z obchodu mohou vybírat pouze důvěryhodní hráči s plným přístupem.</gray>"
    shop_missing:
      name: "<red>Obchod nenalezen</red>"
      lore:
        - "<gray>Tento obchod se nepodařilo načíst z úložiště.</gray>"
      message: "<red>Tento obchod se nepodařilo načíst z úložiště.</red>"

# Důvěryhodné uživatelské rozhraní pro správu hráčů pro role přístupu k obchodu.
shop_trusted_ui:
  title: "Důvěryhodní hráči -{location}"
  summary:
    name: "<gold>Obchod Trust Manager</gold>"
    lore:
      - "<gray>Majitel:</gray> <white>{owner}</white>"
      - "<gray>Umístění:</gray> <white>{location}</white>"
      - "<gray>Spolupracovníci:</gray> <white>{associate_count}</white>"
      - "<gray>Důvěryhodní hráči:</gray> <white>{trusted_count}</white>"
      - "<yellow>Kliknutím na hráče můžete zacyklit jeho stav důvěryhodnosti.</yellow>"
  entry:
    public:
      name: "<gray>{player}</gray>"
      lore:
        - "<gray>Postavení:</gray> <white>Veřejnost</white>"
        - "<gray>Žádná oprávnění ke správě.</gray>"
        - "<yellow>Klikněte pro změnu na Associate.</yellow>"
    associate:
      name: "<yellow>{player}</yellow>"
      lore:
        - "<gray>Postavení:</gray> <white>Přidružený</white>"
        - "<gray>Lze přidat položky do obchodu.</gray>"
        - "<yellow>Kliknutím změníte na Důvěryhodný.</yellow>"
    trusted:
      name: "<green>{player}</green>"
      lore:
        - "<gray>Postavení:</gray> <white>Důvěryhodný</white>"
        - "<gray>Dokáže plně řídit obchod.</gray>"
        - "<yellow>Klikněte pro změnu na Veřejné.</yellow>"
  feedback:
    not_owner: "<red>Důvěryhodné hráče může spravovat pouze majitel obchodu.</red>"
    updated:
      public: "<yellow>Soubor{player}na Veřejnost.</yellow>"
      associate: "<green>Soubor{player}na společníka.</green>"
      trusted: "<green>Soubor{player}na Důvěryhodný.</green>"
    empty:
      name: "<red>Nebyli nalezeni žádní hráči</red>"
      lore:
        - "<gray>Žádní další známí hráči nemohou věřit.</gray>"
    locked:
      name: "<red>Přístup pouze pro vlastníka</red>"
      lore:
        - "<gray>Důvěryhodné hráče může spravovat pouze majitel obchodu.</gray>"
    shop_missing:
      name: "<red>Obchod nenalezen</red>"
      lore:
        - "<gray>Tento obchod se nepodařilo načíst z úložiště.</gray>"
      message: "<red>Tento obchod se nepodařilo načíst z úložiště.</red>"

# Uživatelské rozhraní knihy transakcí pro nákupy a daňovou historii.
