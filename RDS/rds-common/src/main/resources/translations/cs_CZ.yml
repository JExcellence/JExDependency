      lore:
        - "<gray>Účtováno na:</gray> <white>{actor}</white>"
        - "<gray>Podíl na dani:</gray> <white>{amount} {currency_name}</white>"
        - "<gray>Počítané obchody:</gray> <white>{counted_shops}</white>"
        - "<gray>ID měny:</gray> <white>{currency_type}</white>"
        - "<gray>Nahráno:</gray> <white>{created_at}</white>"
