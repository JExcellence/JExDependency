      - "<yellow>Kræver:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Færdighedskrav</gradient>"
      lore:
        - "<gray>Gennemgå understøttede færdighedsplugins og detektionstilstand.</gray>"
