# ============================================
# GLOBAL PREFIX
# ============================================
# Præfiks forudsat til generel plugin-chatoutput.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Hurtige spillervendte oversigtslinjer for butiks-, bank- og skattestatus.
info:
  total: "<blue>Butikker:</blue> <white>{owned_shops}</white>"
  bank: "<green>Sporede saldi ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Planlagt skat ({taxed_shops}afgiftspligtige butikker):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Næste skat:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Deltagelsestidsmeddelelser vises, når spillere kommer ind på serveren.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}afgiftspligtige butikker\n[<blue>Beløb<yellow>]\n{taxes}\n<red>Forfalder:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Kommandosvarstrenge for \"/rs\"-funktioner og skift.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[EN]</gradient> <gray>Åbnede<white>RDS Admin</white><gray>panel.</gray>"
  bar:
    enabled: "<green>Butikschefbar aktiveret, mens du kigger på en butik.</green>"
    disabled: "<yellow>Butikschef bar deaktiveret.</yellow>"
  give:
    syntax: "<red>Anvendelse: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Anvendelse:</gray> <white>/rs resultattavle&lt;hovedbog|lager&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Aktiverede<white>{scoreboard_type}</white><gray>sidebjælke.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktiveret<white>{scoreboard_type}</white><gray>sidebjælke.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Skiftede til<white>{scoreboard_type}</white><gray>sidebjælke.</gray>"
    type:
      ledger: "<gold>hovedbog</gold>"
      stock: "<aqua>lager</aqua>"

# Sidebar resultattavleetiketter og værdiformatering.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Bank totaler</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Ingen bankmidler</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Aktie ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Lager:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Ingen spillerbutikker</red>"

# Boss-bjælketekst vist, mens du målretter mod en butik.
shop_boss_bar:
  title: "<gold>{shop_type}Butik</gold> <gray>|</gray> <yellow>Ejer:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Varer:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Beliggenhed:</yellow> <white>{location}</white>"
  type:
    player: "Spiller"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Begrænset lager"
    infinite: "Uendelig"
    various: "Forskellige"

# ============================================
# GUI knapper
# ============================================

# Butiksblokvarenavn og lore-metadata.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Placer denne blok for at oprette din butik.</yellow>"

# Butiksoversigt UI-etiketter, viden og tilgængelighedstilstande.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Butiksbutik</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Ejede butiksblokke</gradient>"
    lore:
      - "<gray>Ejede butiksblokke:</gray> <white>{owned_shops}</white>"
      - "<gray>Dette spor købt eller givet</gray>"
      - "<gray>ShopBlock ejerskab.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Butiksblokgrænse</gradient>"
    lore:
      - "<gray>Ejede butiksblokke:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimalt antal butiksblokke:</gray> <white>{max_shops}</white>"
      - "<gray>Denne grænse kontrollerer, hvor mange der handler</gray>"
      - "<gray>blokke, du kan låse op.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Butikskrav</gradient>"
    lore:
      - "<gray>Konfigurerede krav:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktuelt antal krav:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klik for at inspicere det næste butiksniveau.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Parat]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Indtil]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Butiksniveaukrav UI, statusvisning og købsfeedback.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Butiksniveau{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Køb Butiksblok</gradient>"
    lore:
      - "<gray>Købsniveau:</gray> <white>{purchase_number}</white>"
      - "<gray>Ejede butiksblokke:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimalt antal butiksblokke:</gray> <white>{max_shops}</white>"
      - "<gray>Konfigurerede krav:</gray> <white>{requirement_count}</white>"
      - "<gray>I øjeblikket mødt:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klik for at købe, når dette niveau er klar.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Parat]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Indtil]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratis]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] Ingen krav</gradient>"
    lore:
      - "<gray>Dette købsniveau har ingen konfigurerede krav.</gray>"
      - "<yellow>Du kan købe denne butiksblok uden ekstra kontrol.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Nøgle:</gray> <white>{requirement_key}</white>"
      - "<gray>Type:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Fremskridt:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Oversigt:</gray> <white>{summary}</white>"
      - "<yellow>Højreklik på kompatible krav til bankens fremskridt.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detaljeret kontrol</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Mødte]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Indtil]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Utilgængelig]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Købte en butiksblok. Forbrugte krav:</gray> <white>{requirements}</white><gray>. Ejede butiksblokke:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du mødes ikke i øjeblikket<white>{requirement}</white><gray>. Butikskrav:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Butikskravet<white>{requirement}</white><gray>er ikke tilgængelig eller ugyldig lige nu.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har nået butiksblokeringsgrænsen på<white>{max_shops}</white><gray>. Ejede butiksblokke:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>er nu klar.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Gemt fremskridt for<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Ingen matchende varer eller valuta var tilgængelige for<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>understøtter ikke bankede fremskridt.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>er ikke tilgængelig lige nu.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Din RDS-profil kunne ikke indlæses, så fremskridt kunne ikke gemmes.</gray>"

# Bloker interaktionsvalideringsfejl og beskyttelsesmeddelelser.
block_listener:
  error:
    invalid_owner_uuid: "<red>Kan ikke læse butiksejeren fra denne vare.</red>"
    not_owner: "<red>Denne ShopBlock tilhører en anden spiller og kan ikke placeres af dig.</red>"
    max_shops_reached: "<red>Du har nået butiksgrænsen på{max_shops}. Nuværende placerede butikker:{owned_shops}.</red>"
    shop_protected: "<red>Butikker kan ikke brydes direkte. Brug butiksmenuen til at lukke butikken.</red>"
    double_chest_requires_shop_block: "<red>Double-chest butikker kræver et sekund<blue>ShopBlock</blue><red>. Normale kister kan ikke smelte sammen med butikskister.</red>"
    double_chest_owner_mismatch: "<red>Denne ShopBlock tilhører en anden ejer, så den kan ikke udvide denne butik.</red>"
    shop_already_double_chest: "<red>Denne butik bruger allerede begge brysthalvdele.</red>"
    double_chest_ambiguous: "<red>Denne ShopBlock rører ved flere butikskasser. Placer den ved siden af ​​kun én butik.</red>"

# Meddelelser om udfald af planlagt skattebehandling.
tax_scheduler:
  paid: "<yellow>Opkrævet planlagt butiksafgift på{amount}. Optalte butikker:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Du kunne ikke betale den planlagte butiksafgift på{amount}. Optalte butikker:{owned_shops}.</red>"
  charge_failed: "<red>Det lykkedes ikke at opkræve den planlagte butiksafgift på{amount}. Optalte butikker:{owned_shops}.</red>"

# Oversigtsgrænseflade for hovedbutik for ejer/admin-administrationshandlinger.
shop_overview_ui:
  title: "{owner} Butik - {location}"
  summary:
    name: "<gold>Butiksoversigt</gold>"
    player:
      lore:
        - "<gray>Ejer:</gray> <white>{owner}</white>"
        - "<gray>Beliggenhed:</gray> <white>{location}</white>"
        - "<gray>Gemte poster:</gray> <white>{item_count}</white>"
        - "<gray>Butikstype:</gray> <white>Player Shop</white>"
        - "<gray>Beholdning:</gray> <white>Finite</white>"
    admin:
      lore:
        - "<gray>Ejer:</gray> <white>{owner}</white>"
        - "<gray>Beliggenhed:</gray> <white>{location}</white>"
        - "<gray>Gemte poster:</gray> <white>{item_count}</white>"
        - "<gray>Butikstype:</gray> <white>Admin butik</white>"
        - "<gray>Beholdning:</gray> <white>Uendelig</white>"
  finance:
    name: "<gold>Butiksbank</gold>"
    lore:
      - "<gray>Sporede valutaer:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klik for at gennemgå og hæve penge.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop aktiveret</red>"
        lore:
          - "<gray>Denne butik er i øjeblikket en adminbutik.</gray>"
          - "<gray>Beholdningen er uendelig for kunderne.</gray>"
          - "<gray>Gemte poster:</gray> <white>{item_count}</white>"
          - "<yellow>Klik for at skifte tilbage til en spillerbutik.</yellow>"
      disabled:
        name: "<green>Admin Shop deaktiveret</green>"
        lore:
          - "<gray>Denne butik bruger i øjeblikket normalt lager.</gray>"
          - "<gray>Kunder kan kun købe lagrede mængder.</gray>"
          - "<gray>Gemte poster:</gray> <white>{item_count}</white>"
          - "<yellow>Klik for at aktivere admin butikstilstand.</yellow>"
    close:
      name: "<red>Luk butik</red>"
      lore:
        - "<gray>Fjern denne butik og returner butiksblokken.</gray>"
        - "<gray>Gemte poster:</gray> <white>{item_count}</white>"
        - "<gray>Sporede bankvalutaer:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Butikslagret skal være tomt før lukning.</yellow>"
    manage:
      name: "<green>Tilføj butiksvarer</green>"
      lore:
        - "<gray>Gem nye varer i denne butik.</gray>"
        - "<gray>Aktuelle poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klik for at åbne elementinput.</yellow>"
    customer_view:
      name: "<gold>Åbn kundevisning</gold>"
      lore:
        - "<gray>Se en forhåndsvisning af denne butik, som kunderne ser den.</gray>"
        - "<gray>Aktuelle poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klik for at gennemse denne butik som kunde.</yellow>"
    trusted:
      name: "<gold>Betroede spillere</gold>"
      lore:
        - "<gray>Associerede:</gray> <white>{associate_count}</white>"
        - "<gray>Betroede spillere:</gray> <white>{trusted_count}</white>"
        - "<yellow>Klik for at administrere butikstillidsniveauer.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Samlet antal poster:</gray> <white>{ledger_count}</white>"
        - "<gray>Indkøb:</gray> <white>{purchase_count}</white>"
        - "<gray>Skatter:</gray> <white>{tax_count}</white>"
        - "<yellow>Klik for at gennemgå butikstransaktionshistorik.</yellow>"
    edit:
      name: "<aqua>Rediger butiksvarer</aqua>"
      lore:
        - "<gray>Rediger priser for lagrede butiksvarer.</gray>"
        - "<gray>Aktuelle poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klik for at redigere priser og valutaer.</yellow>"
    storage:
      name: "<gold>Se gemte genstande</gold>"
      lore:
        - "<gray>Gennemgå varer, der allerede er gemt i denne butik.</gray>"
        - "<gray>Aktuelle poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klik for at trække gemte varer tilbage.</yellow>"
    locked:
      name: "<red>Butikken er låst</red>"
      lore:
        - "<gray>Kun ejeren kan tilføje elementer.</gray>"
        - "<gray>Aktuelle poster:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Du har ikke tilladelse til at administrere denne butik.</red>"
    no_admin_permission: "<red>Du har ikke tilladelse til at skifte adminbutikker.</red>"
    admin_limit_reached: "<red>Serveren har allerede{admin_shops}admin butikker. Gratis udgave tillader kun{max_admin_shops}admin butikker.</red>"
    admin_enabled: "<green>Denne butik er nu en adminbutik med uendelig kundebeholdning. Optalte butikker:{owned_shops}.</green>"
    admin_disabled: "<yellow>Denne butik er nu en normal spillerbutik med begrænset kundebeholdning. Optalte butikker:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Du kan ikke skifte denne adminbutik tilbage til en spillerbutik, fordi din butiksgrænse på{max_shops}er allerede nået. Optalte butikker:{owned_shops}.</red>"
    close_not_empty: "<red>Du kan kun lukke en butik efter at have fjernet alle lagrede varer. Resterende poster:{item_count}.</red>"
    close_bank_not_empty: "<red>Hæv din butiksbank før du lukker denne butik. Resterende sporede valutaer:{bank_currency_count}.</red>"
    closed: "<green>Lukkede butikken og vendte tilbage{returned_blocks}ShopBlock(e). Optalte butikker:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Butik ikke fundet</red>"
      lore:
        - "<gray>Denne butik kunne ikke indlæses fra lageret.</gray>"
      message: "<red>Denne butik kunne ikke indlæses fra lageret.</red>"

# Globalt admin kontrolpanel til RDS-administration.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Admin Panel</white>"
    lore:
      - "<gray>Administrer globale admin-shop-systemer fra ét sted.</gray>"
      - "<gray>Åbn serverbank, konfiguration og integrationskontroller nedenfor.</gray>"
      - "<yellow>Kræver:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Server Bank</gradient>"
      lore:
        - "<gray>Gennemgå admin-shop indkomst trukket ind i serverbanken.</gray>"
        - "<gray>Tjek næste træktidspunkt og træk saldi ud.</gray>"
        - "<yellow>Klik for at åbne serverbankkontroller.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Rediger værdier fra</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Hver redigerbar indstilling kan ændres via en ambolt-prompt.</gray>"
        - "<yellow>Klik for at åbne konfigurationskontroller.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-integrationer</gradient>"
      lore:
        - "<gray>Åbne job, færdigheder og PlaceholderAPI-integrationsværktøjer.</gray>"
        - "<gray>Administrer plugin-kravbroer og udvidelsesopsætning.</gray>"
        - "<yellow>Klik for at åbne integrationskontroller.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutaadministrator</gradient>"
      lore:
        - "<gray>Gennemgå registrerede valutaer fra Vault og JExEconomy.</gray>"
        - "<gray>Opret standard</gray> <white>raindrops</white> <gray>valuta efter behov.</gray>"
        - "<yellow>Klik for at åbne valutakontrol.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Færdighedskrav</gradient>"
      lore:
        - "<gray>Gennemgå understøttede færdighedsplugins og detektionstilstand.</gray>"
        - "<gray>Anvend standardkrav til færdigheder på alle købsniveauer.</gray>"
        - "<yellow>Klik for at åbne kontrolelementer for færdighedskrav.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Job] Jobkrav</gradient>"
      lore:
        - "<gray>Gennemgå understøttede jobplugins og registreringstilstand.</gray>"
        - "<gray>Anvend standardjobkrav på alle købsniveauer.</gray>"
        - "<yellow>Klik for at åbne kontrolelementer for jobkrav.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[Skat] Kør skatter nu</gradient>"
      lore:
        - "<gray>Udløs en øjeblikkelig skatteopkrævningscyklus til test.</gray>"
        - "<gray>Dette ændrer ikke den konfigurerede gentagne skattetimer.</gray>"
        - "<yellow>Klik for at køre skat én gang lige nu.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Admin påkrævet</white>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge dette admin panel.</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Udløste en øjeblikkelig butiksafgiftsopkrævningscyklus.</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Shop skatteplanlægning er ikke tilgængelig lige nu.</gray>"

plugin_integration_management_ui:
