    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Admin Admin påkrævet</white>"
      lore:
        - "<gray>Du har ikke tilladelse til at bruge dette integrationspanel.</gray>"

# PlaceholderAPI integration view for expansion install and reload controls.
placeholder_api_ui:
  title: "<gradient:#38bdf8:#60a5fa>[PAPI] PlaceholderAPI-værktøjer</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>PlaceholderAPI Integration</white>"
    lore:
      - "<gray>PlaceholderAPI understøttet:</gray> <white>{supported}</white>"
      - "<gray>Måludvidelse:</gray> <white>{expansion_name}</white>"
      - "<yellow>Installer udvidelsen og genindlæs PlaceholderAPI fra dette panel.</yellow>"
  detection:
    supported:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>PlaceholderAPI fundet</white>"
      lore:
        - "<gray>PlaceholderAPI er tilgængelig og aktiveret.</gray>"
    missing:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>PlaceholderAPI Mangler</white>"
      lore:
        - "<gray>Installer og aktiver PlaceholderAPI for at bruge denne handling.</gray>"
  action:
    install:
      name: "<gradient:#22c55e:#86efac>[+]</gradient> <white>Installer {expansion_name} Udvidelse</white>"
      lore:
        - "<gray>Kører:</gray> <white>papi ecloud download {expansion_name}</white>"
        - "<gray>Kører derefter:</gray> <white>papi reload</white>"
        - "<yellow>Klik for at udføre begge PlaceholderAPI-kommandoer.</yellow>"
    unavailable:
