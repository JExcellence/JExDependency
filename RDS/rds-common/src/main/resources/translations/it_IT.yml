# ============================================
# GLOBAL PREFIX
# ============================================
# Prefisso anteposto all'output generale della chat del plugin.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Righe di riepilogo rapide rivolte al giocatore per negozio, banca e stato fiscale.
info:
  total: "<blue>Negozi:</blue> <white>{owned_shops}</white>"
  bank: "<green>Saldi monitorati ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Imposta programmata ({taxed_shops} negozi tassabili):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Tassa successiva:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Messaggi di accesso mostrati quando i giocatori accedono al server.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} negozi tassabili\n[<blue>Amount<yellow>]\n{taxes}\n<red>Scadenza:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Stringhe di risposta ai comandi per funzionalità e attivazioni `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Aperto i blocchi negozio <white>RDS Admin</white><gray> pannello.</gray>"
  bar:
    enabled: "<green>Barra del capo del negozio abilitata mentre si guarda un shop.</green>"
    disabled: "<yellow>Barra del capo del negozio disabilitata.</yellow>"
  give:
    syntax: "<red>Utilizzo: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Utilizzo:</gray> <white>/rs tabellone punteggi &lt;registro|magazzino&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Abilitato <white>{scoreboard_type}</white><gray> barra laterale.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Disabilitato <white>{scoreboard_type}</white><gray> barra laterale.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Passato al <white>{scoreboard_type}</white><gray> barra laterale.</gray>"
    type:
      ledger: "<gold>registro</gold>"
      stock: "<aqua>azione</aqua>"

# Etichette del tabellone segnapunti della barra laterale e formattazione dei valori.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Registro ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Totali bancari</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Nessun fondo depositato</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Azioni ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stock:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Nessun negozio di giocatori</red>"

# Testo della barra del boss mostrato mentre si prende di mira un negozio.
shop_boss_bar:
  title: "<gold>{shop_type} Negozio</gold> <gray>|</gray> <yellow>Proprietario:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Articoli:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Ubicazione:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Amministratore"
  owner:
    admin: "Amministratore"
  available_items:
    finite: "{item_count}"
    limited: "Limitato Stock"
    infinite: "Infinito"
    various: "Vari"

# ============================================
# Pulsanti GUI
# ============================================

# Nome dell'articolo bloccato del negozio e metadati delle informazioni.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Inserisci questo blocco per configurare il tuo negozio.</yellow>"

# Panoramica del negozio del negozio Etichette dell'interfaccia utente, informazioni e stati di disponibilità.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Negozio negozio</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Blocchi negozio di proprietà</gradient>"
    lore:
      - "<gray>Di proprietà:</gray> <white>{owned_shops}</white>"
      - "<gray>Questo tiene traccia di acquisti o concessi</gray>"
      - "<gray>ShopBlock proprietà.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Blocco negozio Limite</gradient>"
    lore:
      - "<gray>Di proprietà:</gray> <white>{owned_shops}</white>"
      - "<gray>Numero massimo di blocchi negozio:</gray> <white>{max_shops}</white>"
      - "<gray>Questo limite controlla il numero di negozi</gray>"
      - "<gray>blocchi che puoi sbloccare.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisiti del negozio</gradient>"
    lore:
      - "<gray>Requisiti configurati:</gray> <white>{requirement_count}</white>"
      - "<gray>Conteggio fabbisogno corrente:</gray> <white>{requirements}</white>"
      - "<gray>Stato:</gray> <white>{availability}</white>"
      - "<yellow>Fai clic per ispezionare il livello successivo del negozio.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Pronto]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In attesa di]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Non in linea]</gradient>"

# Interfaccia utente dei requisiti del livello del negozio, visualizzazione dell'avanzamento e feedback sull'acquisto.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Livello del negozio{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Acquista negozio Blocca</gradient>"
    lore:
      - "<gray>Livello di acquisto:</gray> <white>{purchase_number}</white>"
      - "<gray>Di proprietà:</gray> <white>{owned_shops}</white>"
      - "<gray>Numero massimo di blocchi negozio:</gray> <white>{max_shops}</white>"
      - "<gray>Requisiti configurati:</gray> <white>{requirement_count}</white>"
      - "<gray>Attualmente incontrati:</gray> <white>{met_count}</white>"
      - "<gray>Stato:</gray> <white>{availability}</white>"
      - "<yellow>Fai clic per acquistare quando questo livello sarà pronto.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Pronto]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In attesa di]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Non in linea]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratuito]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratuito] Nessun requisito</gradient>"
    lore:
      - "<gray>Questo livello di acquisto non ha requisiti configurati.</gray>"
      - "<yellow>Puoi acquistare questo blocco negozio senza controlli aggiuntivi.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Richiesta]{requirement_name}</gradient>"
    lore:
      - "<gray>Chiave:</gray> <white>{requirement_key}</white>"
      - "<gray>Tipo:</gray> <white>{requirement_type}</white>"
      - "<gray>Stato:</gray> <white>{status}</white>"
      - "<gray>Avanzamento:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Riepilogo:</gray> <white>{summary}</white>"
      - "<yellow>Fai clic con il pulsante destro del mouse sui requisiti compatibili per avanzare in banca.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Controlli dettagliati</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Incontrato]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In attesa di]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Non disponibile]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Acquistato un blocco negozio. Requisiti consumati:</gray> <white>{requirements}</white><gray>. Blocchi di negozi di proprietà:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Al momento non soddisfi i requisiti <white>{requirement}</white><gray>. Requisiti del negozio:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Il requisito del negozio <white>{requirement}</white><gray> non è disponibile o non è valido in questo momento.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Hai raggiunto il limite di blocco negozio di <white>{max_shops}</white><gray>. Blocchi di negozi di proprietà:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> è ora pronto.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Avanzamento memorizzato per <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Nessun articolo o valuta corrispondente era disponibile per <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> non supporta i progressi bancari.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> non è disponibile in questo momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Impossibile caricare il tuo profilo RDS, quindi i progressi non possono essere salvati.</gray>"

# Blocca errori di convalida e protezione dell'interazione avvisi.
block_listener:
  error:
    invalid_owner_uuid: "<red>Impossibile leggere il proprietario del negozio da questo articolo.</red>"
    not_owner: "<red>Questo ShopBlock appartiene a un altro giocatore e non può essere posizionato da te.</red>"
    max_shops_reached: "<red>Hai raggiunto il limite di negozio di {max_shops}. Negozi attualmente posizionati: {owned_shops}.</red>"
    shop_protected: "<red>I negozi non possono essere danneggiati direttamente. Utilizza il menu Negozio per chiudere il negozio.</red>"
    double_chest_requires_shop_block: "<red>I negozi a doppio scrigno richiedono un secondo <blue>ShopBlock</blue><red>. I forzieri normali non possono unirsi ai forzieri del negozio.</red>"
    double_chest_owner_mismatch: "<red>Questo ShopBlock appartiene a un proprietario diverso, quindi non può estendere questo negozio.</red>"
    shop_already_double_chest: "<red>Questo negozio sta già utilizzando entrambe le metà del baule.</red>"
    double_chest_ambiguous: "<red>Questo ShopBlock tocca più casse di negozi. Posizionalo accanto a un solo negozio.</red>"

# Messaggi risultato elaborazione imposta programmata.
tax_scheduler:
  paid: "<yellow>Imposta di negozio programmata riscossa di {amount}. Negozi conteggiati: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Non hai potuto pagare la tassa prevista per il negozio di {amount}. Negozi conteggiati: {owned_shops}.</red>"
  charge_failed: "<red>Impossibile riscuotere l'imposta di negozio programmata di {amount}. Negozi conteggiati: {owned_shops}.</red>"

# Interfaccia principale di panoramica del negozio per le azioni di gestione del proprietario/amministratore.
shop_overview_ui:
  title: "{owner} Negozio - {location}"
  summary:
    name: "<gold>Riepilogo del negozio</gold>"
    player:
      lore:
        - "<gray>Proprietario:</gray> <white>{owner}</white>"
        - "<gray>Posizione:</gray> <white>{location}</white>"
        - "<gray>Voci memorizzate:</gray> <white>{item_count}</white>"
        - "<gray>Tipo di negozio:</gray> <white>Negozio dei giocatori</white>"
        - "<gray>Inventario:</gray> <white>Finito</white>"
    admin:
      lore:
        - "<gray>Proprietario:</gray> <white>{owner}</white>"
        - "<gray>Posizione:</gray> <white>{location}</white>"
        - "<gray>Voci memorizzate:</gray> <white>{item_count}</white>"
        - "<gray>Tipo di negozio:</gray> <white>Negozio di amministrazione</white>"
        - "<gray>Inventario:</gray> <white>Infinito</white>"
  finance:
    name: "<gold>Banca dei negozi</gold>"
    lore:
      - "<gray>Valute monitorate:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Fare clic per rivedere e prelevare fondi.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Negozio amministratore abilitato</red>"
        lore:
          - "<gray>Questo negozio è attualmente un negozio di amministrazione.</gray>"
          - "<gray>L'inventario è infinito per clienti.</gray>"
          - "<gray>Archiviati voci:</gray> <white>{item_count}</white>"
          - "<yellow>Fai clic per tornare al negozio dei giocatori.</yellow>"
      disabled:
        name: "<green>Negozio amministratore disabilitato</green>"
        lore:
          - "<gray>Questo negozio attualmente utilizza scorte normali.</gray>"
          - "<gray>I clienti possono acquistare solo importi memorizzati.</gray>"
          - "<gray>Archiviati voci:</gray> <white>{item_count}</white>"
          - "<yellow>Fai clic per abilitare la modalità negozio amministratore.</yellow>"
    close:
      name: "<red>Chiudi il negozio</red>"
      lore:
        - "<gray>Rimuovi questo negozio e restituisci il blocco del negozio.</gray>"
        - "<gray>Archiviati voci:</gray> <white>{item_count}</white>"
        - "<gray>Valute bancarie monitorate:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Le scorte del negozio devono essere vuote prima della chiusura.</yellow>"
    manage:
      name: "<green>Aggiungi articoli del negozio</green>"
      lore:
        - "<gray>Archivia nuovi articoli in questo negozio.</gray>"
        - "<gray>Voci correnti:</gray> <white>{item_count}</white>"
        - "<yellow>Fare clic per aprire l'input dell'elemento.</yellow>"
    customer_view:
      name: "<gold>Apri visualizzazione cliente</gold>"
      lore:
        - "<gray>Anteprima di questo negozio come lo vedono i clienti.</gray>"
        - "<gray>Voci correnti:</gray> <white>{item_count}</white>"
        - "<yellow>Fai clic per esplorare questo negozio come cliente.</yellow>"
    trusted:
      name: "<gold>Trusted Players</gold>"
      lore:
        - "<gray>Associati:</gray> <white>{associate_count}</white>"
        - "<gray>Trusted giocatori:</gray> <white>{trusted_count}</white>"
        - "<yellow>Fai clic per gestire i livelli di fiducia del negozio.</yellow>"
    ledger:
      name: "<gold>Registro del negozio</gold>"
      lore:
        - "<gray>Voci totali:</gray> <white>{ledger_count}</white>"
        - "<gray>Acquisti:</gray> <white>{purchase_count}</white>"
        - "<gray>Tasse:</gray> <white>{tax_count}</white>"
        - "<yellow>Fai clic per rivedere la cronologia delle transazioni del negozio.</yellow>"
    edit:
      name: "<aqua>Modifica negozio Articoli</aqua>"
      lore:
        - "<gray>Modifica prezzi per articoli del negozio memorizzati.</gray>"
        - "<gray>Voci correnti:</gray> <white>{item_count}</white>"
        - "<yellow>Fare clic per modificare prezzi e valute.</yellow>"
    storage:
      name: "<gold>Visualizza elementi memorizzati</gold>"
      lore:
        - "<gray>Rivedi gli articoli già archiviati in questo negozio.</gray>"
        - "<gray>Voci correnti:</gray> <white>{item_count}</white>"
        - "<yellow>Fai clic per ritirare gli articoli archiviati.</yellow>"
    locked:
      name: "<red>Negozio bloccato</red>"
      lore:
        - "<gray>Solo il proprietario può aggiungere elementi.</gray>"
        - "<gray>Voci correnti:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Non hai l'autorizzazione per gestire questo negozio.</red>"
    no_admin_permission: "<red>Non hai l'autorizzazione per attivare/disattivare l'amministrazione dei negozi.</red>"
    admin_limit_reached: "<red>Il server ha già {admin_shops} negozi amministrati. La versione gratuita consente solo il {max_admin_shops} negozi amministrati.</red>"
    admin_enabled: "<green>Questo negozio è ora un negozio amministrativo con inventario cliente infinito. Negozi conteggiati: {owned_shops}.</green>"
    admin_disabled: "<yellow>Questo negozio è ora un normale negozio di giocatori con inventario cliente limitato. Negozi conteggiati: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Non puoi riportare questo negozio amministrativo in un negozio del giocatore perché il limite del tuo negozio è di {max_shops} è già stato raggiunto. Negozi conteggiati: {owned_shops}.</red>"
    close_not_empty: "<red>Puoi chiudere un negozio solo dopo aver rimosso tutti gli articoli memorizzati. Voci rimanenti: {item_count}.</red>"
    close_bank_not_empty: "<red>Ritira la banca del tuo negozio prima di chiudere questo negozio. Valute monitorate rimanenti: {bank_currency_count}.</red>"
    closed: "<green>Chiuso il negozio e restituito {returned_blocks} ShopBlock(s). Negozi conteggiati: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Negozio non trovato</red>"
      lore:
        - "<gray>Non è stato possibile caricare questo negozio da spazio di archiviazione.</gray>"
      message: "<red>Non è stato possibile caricare questo negozio da spazio di archiviazione.</red>"

# Pannello di controllo di amministrazione globale per la gestione RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Amministratore] Controllo RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Pannello di amministrazione RDS</white>"
    lore:
      - "<gray>Gestisci i sistemi di amministrazione-negozio globali da un'unica posizione.</gray>"
      - "<gray>Apri banca dati server, configurazione e controlli di integrazione di seguito.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Server Bank</gradient>"
      lore:
        - "<gray>Rivedi le entrate del negozio di amministrazione inserite nella banca del server.</gray>"
        - "<gray>Controlla i tempi di prelievo successivo e preleva i saldi.</gray>"
        - "<yellow>Fare clic per aprire i controlli bancari del server.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Modifica valori da</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Ogni impostazione modificabile può essere modificata tramite un prompt dell'incudine.</gray>"
        - "<yellow>Fare clic per aprire i controlli di configurazione.</yellow>"
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Controlli giocatore e gruppo</gradient>"
      lore:
        - "<gray>Imposta negozi e sconti massimi per giocatore e per gruppo.</gray>"
        - "<gray>Apri qualsiasi negozio come proprietario o forza la chiusura delle visualizzazioni del negozio attive.</gray>"
        - "<yellow>Fai clic per aprire i controlli di amministrazione del giocatore/gruppo.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Integrazioni plug-in</gradient>"
      lore:
        - "<gray>Lavori aperti, competenze e strumenti di integrazione PlaceholderAPI.</gray>"
        - "<gray>Gestisci i bridge dei requisiti dei plug-in e la configurazione dell'espansione.</gray>"
        - "<yellow>Fare clic per aprire i controlli di integrazione.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Gestore valuta</gradient>"
      lore:
        - "<gray>Esamina le valute rilevate da Vault e JExEconomy.</gray>"
        - "<gray>Crea la valuta</gray> <white>raindrops</white> <gray>predefinita quando necessario.</gray>"
        - "<yellow>Fare clic per aprire i controlli valutari.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Competenze] Requisiti delle competenze</gradient>"
      lore:
        - "<gray>Esamina i plug-in delle competenze supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti di competenza predefiniti a tutti i livelli di acquisto.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti di competenza.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Lavoro] Requisiti del lavoro</gradient>"
      lore:
        - "<gray>Esaminare i plug-in del lavoro supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti lavorativi predefiniti a tutti i livelli di acquisto.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti del lavoro.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[Imposta] Esegui tasse adesso</gradient>"
      lore:
        - "<gray>Attiva un ciclo immediato di riscossione delle imposte a scopo di test.</gray>"
        - "<gray>Questo non modifica il timer imposta ricorrente configurato.</gray>"
        - "<yellow>Fai clic per eseguire le tasse una volta adesso.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Accesso amministratore richiesto</white>"
      lore:
        - "<gray>Non hai l'autorizzazione per utilizzare questo pannello di amministrazione.</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Ha attivato un ciclo immediato di riscossione delle imposte sui negozi.</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Lo strumento di pianificazione fiscale del negozio non è disponibile al momento.</gray>"

plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>[Int] Integrazioni plug-in</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Informazioni]</gradient> <white>Hub di integrazione</white>"
    lore:
      - "<gray>Gestisci le integrazioni del bridge di requisiti da un'unica posizione.</gray>"
      - "<gray>Lavori aperti, competenze e controlli PlaceholderAPI.</gray>"
      - "<yellow>Richiede:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    skills:
      name: "<gradient:#22c55e:#86efac>[Competenze] Requisiti delle competenze</gradient>"
      lore:
        - "<gray>Esamina i plug-in delle competenze supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti di competenza predefiniti a tutti i livelli di acquisto.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti di competenza.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Lavoro] Requisiti del lavoro</gradient>"
      lore:
        - "<gray>Esaminare i plug-in del lavoro supportati e lo stato di rilevamento.</gray>"
        - "<gray>Applica i requisiti lavorativi predefiniti a tutti i livelli di acquisto.</gray>"
        - "<yellow>Fare clic per aprire i controlli dei requisiti del lavoro.</yellow>"
    placeholder_api:
      name: "<gradient:#38bdf8:#60a5fa>[PAPI] PlaceholderAPI</gradient>"
      lore:
        - "<gray>Rileva il supporto PlaceholderAPI e gestisci le espansioni.</gray>"
        - "<gray>Installa l'espansione</gray> <white>Player</white> <gray>e ricarica PlaceholderAPI.</gray>"
