    name: "<gradient:#38bdf8:#60a5fa>[Huidige]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Provider:</gray> <white>{provider}</white>"
      - "<gray>Symbool:</gray> <white>{symbol}</white>"
      - "<gray>Voorvoegsel:</gray> <white>{prefix}</white>"
      - "<gray>Achtervoegsel:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Maak {currency_id}</white>"
