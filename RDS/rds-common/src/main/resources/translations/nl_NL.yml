    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id}Klaar</white>"
      lore:
        - "<gray>De standaardvaluta bestaat al.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Standaardvaluta gemaakt:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray> niet innen:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Valuta bestaat al:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je kunt deze knop niet gebruiken tenzij JExEconomy beschikbaar is.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Geen valuta gedetecteerd</white>"
      lore:
        - "<gray>Er zijn geen kluis- of JExEconomy-valuta's gedetecteerd.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Beheerderstoegang vereist</white>"
      lore:
        - "<gray>Je hebt geen toestemming om deze valutaweergave te gebruiken.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je hebt geen toestemming om valuta's te beheren.</gray>"
  decoration:
    border:
      name: " "

# Config browser-UI voor bewerkbare instellingen en update-feedback.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Winkel Config</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Configuratie-instellingen</white>"
    lore:
      - "<gray>Bewerkbare instellingen gedetecteerd:</gray> <white>{setting_count}</white>"
      - "<gray>Klik op een item hieronder om de waarde ervan te bewerken een aambeeld.</gray>"
      - "<yellow>Wijzigingen worden rechtstreeks naar de winkel geschreven config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Pad:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Huidige waarde:</gray> <white>{current_value}</white>"
      - "<yellow>Klik om deze instelling te bewerken.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Geheel getal]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Lang]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dubbele]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Lijst]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[Snaar]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Niet bewerkbaar Instellingen</white>"
      lore:
