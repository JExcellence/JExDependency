# ============================================
# GLOBAL PREFIX
# ============================================
# Voorvoegsel toegevoegd aan algemene plug-in chatuitvoer.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Snelle, op de speler gerichte samenvattingsregels voor winkel-, bank- en belastingstatus.
info:
  total: "<blue>Winkels:</blue> <white>{owned_shops}</white>"
  bank: "<green>Bijgehouden saldi ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Geplande belasting ({taxed_shops} belastbare winkels):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Volgende belasting:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Join-time berichten worden weergegeven wanneer spelers de server betreden.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} belastbare winkel(s)\n[<blue>Bedrag<yellow>]\n{taxes}\n<red>Verschuldigd:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Opdrachtantwoordreeksen voor `/rs`-functies en schakelaars.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Heeft de <white>RDS-beheerder</white><gray> paneel.</gray>"
  bar:
    enabled: "<green>Winkelbaasbalk ingeschakeld terwijl je naar een winkel kijkt.</green>"
    disabled: "<yellow>Winkelbaasbalk uitgeschakeld.</yellow>"
  give:
    syntax: "<red>Gebruik: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Gebruik:</gray> <white>/rs scorebord &lt;grootboek|voorraad&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray><white>{scoreboard_type}</white><gray> zijbalk.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray><white>{scoreboard_type}</white><gray> zijbalk.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Overgeschakeld naar <white>{scoreboard_type}</white><gray> zijbalk.</gray>"
    type:
      ledger: "<gold>grootboek</gold>"
      stock: "<aqua>voorraad</aqua>"

# Zijbalkscorebordlabels en waardeopmaak.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Grootboek ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ banktotalen</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Geen banktegoeden</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Voorraad ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Voorraad:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Geen spelerswinkels</red>"

# Baasbalktekst wordt weergegeven tijdens het targeten van een winkel.
shop_boss_bar:
  title: "<gold>{shop_type} Winkel</gold> <gray>|</gray> <yellow>Eigenaar:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Artikelen:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Locatie:</yellow> <white>{location}</white>"
  type:
    player: "Speler"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Beperkte voorraad"
    infinite: "Oneindig"
    various: "Diverse"

# ============================================
# GUI-knoppen
# ============================================

# Winkelblokitemnaam en metagegevens.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Plaats dit blok om uw winkel in te stellen.</yellow>"

# Winkelwinkeloverzicht UI-labels, kennis en beschikbaarheidsstatussen.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Winkelwinkel</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Eigen winkelblokken</gradient>"
    lore:
      - "<gray>winkelblokken geopend:</gray> <white>{owned_shops}</white>"
      - "<gray>Deze tracks zijn gekocht of toegekend</gray>"
      - "<gray>ShopBlock eigendom.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Winkelblokkeringslimiet</gradient>"
    lore:
      - "<gray>winkelblokken geopend:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum winkelblokken:</gray> <white>{max_shops}</white>"
      - "<gray>Deze limiet bepaalt hoeveel winkels</gray>"
      - "<gray>blokken die je kunt ontgrendelen.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Vraag] Winkelvereisten</gradient>"
    lore:
      - "<gray>Geconfigureerde vereisten:</gray> <white>{requirement_count}</white>"
      - "<gray>Huidige aantal vereisten:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klik om het volgende winkelniveau te bekijken.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Klaar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In behandeling]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Winkelniveau-gebruikersinterface, voortgangsweergave en aankoopfeedback.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Vereist] Winkelniveau{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Aankoopwinkelblok</gradient>"
    lore:
      - "<gray>Aankoopniveau:</gray> <white>{purchase_number}</white>"
      - "<gray>winkelblokken geopend:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximum winkelblokken:</gray> <white>{max_shops}</white>"
      - "<gray>Geconfigureerde vereisten:</gray> <white>{requirement_count}</white>"
      - "<gray>Momenteel voldaan:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klik om te kopen wanneer dit niveau klaar is.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Klaar]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In behandeling]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Vrij]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] Geen vereisten</gradient>"
    lore:
      - "<gray>Deze aankooplaag heeft geen geconfigureerde vereisten.</gray>"
      - "<yellow>Je kunt dit winkelblok kopen zonder extra cheques.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Vraag]{requirement_name}</gradient>"
    lore:
      - "<gray>Sleutel:</gray> <white>{requirement_key}</white>"
      - "<gray>Type:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Voortgang:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Samenvatting:</gray> <white>{summary}</white>"
      - "<yellow>Rechtsklik op compatibele vereisten om voortgang te boeken.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Gedetailleerd Cheques</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[In behandeling]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Niet beschikbaar]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Een winkelblok gekocht. Verbruikte vereisten:</gray> <white>{requirements}</white><gray>. Eigen winkelblokken:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je voldoet momenteel niet aan <white>{requirement}</white><gray>. Winkelvereisten:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>De winkelvereiste <white>{requirement}</white><gray> is momenteel niet beschikbaar of ongeldig.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Je hebt de winkelblokkeringslimiet van <white>{max_shops}</white><gray>. Eigen winkelblokken:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> is nu gereed.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Opgeslagen voortgang voor <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Er waren geen overeenkomende items of valuta beschikbaar voor <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> ondersteunt geen voortgang in de bank.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> is momenteel niet beschikbaar.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray> nodigJe RDS-profiel kan niet worden geladen, dus de voortgang kan niet worden geladen opgeslagen.</gray>"

# Blokkeerinteractievalidatiefouten en beveiligingsmeldingen.
block_listener:
  error:
    invalid_owner_uuid: "<red>Kan de winkeleigenaar van dit item niet lezen.</red>"
    not_owner: "<red>Dit ShopBlock is van een andere speler en kan niet door jou worden geplaatst.</red>"
    max_shops_reached: "<red> bereiktJe hebt de winkellimiet van {max_shops}. Huidig ​​geplaatste winkels: {owned_shops}.</red>"
    shop_protected: "<red>Winkels kunnen niet direct worden verbroken. Gebruik het winkelmenu om de winkel te sluiten.</red>"
    double_chest_requires_shop_block: "<red>Uitgeschakeld voor winkels met dubbele kist <blue>ShopBlock</blue><red>. Normale kisten kunnen niet samenvoegen met winkelkisten.</red>"
    double_chest_owner_mismatch: "<red>Dit ShopBlock is van een andere eigenaar en kan deze winkel dus niet uitbreiden.</red>"
    shop_already_double_chest: "<red>Deze winkel gebruikt al beide kisthelften.</red>"
    double_chest_ambiguous: "<red>Dit ShopBlock raakt meerdere winkelkisten. Plaats het naast slechts één winkel.</red>"

# Geplande berichten over de uitkomst van belastingverwerking.
tax_scheduler:
  paid: "<yellow> geretourneerd Geplande winkelbelasting van {amount}. Getelde winkels: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Je kon de geplande winkelbelasting van niet betalen {amount}. Getelde winkels: {owned_shops}.</red>"
  charge_failed: "<red>Kan de geplande winkelbelasting van {amount}. Getelde winkels: {owned_shops}.</red>"

# Hoofdwinkeloverzichtinterface voor beheeracties eigenaar/beheerder.
shop_overview_ui:
  title: "{owner} Winkel - {location}"
  summary:
    name: "<gold>Winkeloverzicht</gold>"
    player:
      lore:
        - "<gray>Eigenaar:</gray> <white>{owner}</white>"
        - "<gray>Locatie:</gray> <white>{location}</white>"
        - "<gray>Opgeslagen items:</gray> <white>{item_count}</white>"
        - "<gray>Winkel type:</gray> <white>Spelerwinkel</white>"
        - "<gray>Voorraad:</gray> <white>Eind</white>"
    admin:
      lore:
        - "<gray>Eigenaar:</gray> <white>{owner}</white>"
        - "<gray>Locatie:</gray> <white>{location}</white>"
        - "<gray>Opgeslagen items:</gray> <white>{item_count}</white>"
        - "<gray>Winkel type:</gray> <white>Admin Shop</white>"
        - "<gray>Voorraad:</gray> <white>Oneindig</white>"
  finance:
    name: "<gold>Winkelbank</gold>"
    lore:
      - "<gray>Bijgehouden valuta's:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klik om geld te bekijken en op te nemen.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop ingeschakeld</red>"
        lore:
          - "<gray>Deze winkel is momenteel een beheerderswinkel.</gray>"
          - "<gray>Inventaris is oneindig voor klanten.</gray>"
          - "<gray>Opgeslagen items:</gray> <white>{item_count}</white>"
          - "<yellow>Klik om terug te schakelen naar een spelerwinkel.</yellow>"
      disabled:
        name: "<green>Admin Shop uitgeschakeld</green>"
        lore:
          - "<gray>Deze winkel gebruikt momenteel normaal voorraad.</gray>"
          - "<gray>Klanten kunnen alleen opgeslagen hoeveelheden kopen.</gray>"
          - "<gray>Opgeslagen items:</gray> <white>{item_count}</white>"
          - "<yellow>Klik om de beheerderswinkelmodus in te schakelen.</yellow>"
    close:
      name: "<red>Winkel sluiten</red>"
      lore:
        - "<gray>Verwijder deze winkel en retourneer het winkelblok.</gray>"
        - "<gray>Opgeslagen items:</gray> <white>{item_count}</white>"
        - "<gray>Bijgehouden bankvaluta's:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Winkelvoorraad moet leeg zijn voordat deze wordt gesloten.</yellow>"
    manage:
      name: "<green>Winkelitems toevoegen</green>"
      lore:
        - "<gray>Sla nieuwe items op in deze shop.</gray>"
        - "<gray>Huidige invoer:</gray> <white>{item_count}</white>"
        - "<yellow>Klik om iteminvoer te openen.</yellow>"
    customer_view:
      name: "<gold>Open klantoverzicht</gold>"
      lore:
        - "<gray>Bekijk een voorbeeld van deze winkel zoals klanten deze zien.</gray>"
        - "<gray>Huidige invoer:</gray> <white>{item_count}</white>"
        - "<yellow>Klik om als klant door deze winkel te bladeren.</yellow>"
    trusted:
      name: "<gold>Vertrouwde spelers</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Vertrouwd spelers:</gray> <white>{trusted_count}</white>"
        - "<yellow>Klik om winkelvertrouwensniveaus te beheren.</yellow>"
    ledger:
      name: "<gold>Winkelgrootboek</gold>"
      lore:
        - "<gray>Totaal aantal inzendingen:</gray> <white>{ledger_count}</white>"
        - "<gray>Aankopen:</gray> <white>{purchase_count}</white>"
        - "<gray>Belastingen:</gray> <white>{tax_count}</white>"
        - "<yellow>Klik om de transactiegeschiedenis van de winkel te bekijken.</yellow>"
    edit:
      name: "<aqua>Bewerk winkelitems</aqua>"
      lore:
        - "<gray>Bewerk prijzen voor opgeslagen winkel items.</gray>"
        - "<gray>Huidige invoer:</gray> <white>{item_count}</white>"
        - "<yellow>Klik om prijzen en valuta's te bewerken.</yellow>"
    storage:
      name: "<gold>Opgeslagen items bekijken</gold>"
      lore:
        - "<gray>Bekijk artikelen die al in deze winkel zijn opgeslagen.</gray>"
        - "<gray>Huidige invoer:</gray> <white>{item_count}</white>"
        - "<yellow>Klik om opgeslagen items op te nemen.</yellow>"
    locked:
      name: "<red>Winkel vergrendeld</red>"
      lore:
        - "<gray>Alleen de eigenaar kan items toevoegen.</gray>"
        - "<gray>Huidige invoer:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Je hebt geen toestemming om deze winkel te beheren.</red>"
    no_admin_permission: "<red>Je hebt geen toestemming om beheerderswinkels in of uit te schakelen.</red>"
    admin_limit_reached: "<red>De server heeft al {admin_shops} beheerderswinkels. In de gratis versie is slechts {max_admin_shops} beheerderswinkels.</red>"
    admin_enabled: "<green>Deze winkel is nu een beheerderswinkel met een oneindige klantenvoorraad. Getelde winkels: {owned_shops}.</green>"
    admin_disabled: "<yellow>Deze winkel is nu een normale spelerswinkel met een beperkte klantenvoorraad. Getelde winkels: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Je kunt deze beheerderswinkel niet terugzetten naar een spelerswinkel omdat je winkellimiet van {max_shops} is al bereikt. Getelde winkels: {owned_shops}.</red>"
    close_not_empty: "<red>Je kunt een winkel alleen sluiten nadat je alle opgeslagen items hebt verwijderd. Resterende inzendingen: {item_count}.</red>"
    close_bank_not_empty: "<red>Trek je winkelbank op voordat je deze winkel sluit. Resterende gevolgde valuta: {bank_currency_count}.</red>"
    closed: "<green>Winkel gesloten en {returned_blocks} Winkelblok(ken). Getelde winkels: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Winkel niet gevonden</red>"
      lore:
        - "<gray>Deze winkel kan niet vanuit de opslag worden geladen.</gray>"
      message: "<red>Deze winkel kan niet vanuit de opslag worden geladen.</red>"

# Global admin control panel voor RDS-beheer.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS-controle</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS-beheerderspaneel</white>"
    lore:
      - "<gray>Beheer wereldwijde admin-shopsystemen vanaf één plek.</gray>"
      - "<gray>Open de serverbank of bewerk configuratie-instellingen hieronder.</gray>"
      - "<yellow>Vereist:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Serverbank</gradient>"
      lore:
        - "<gray>Bekijk de inkomsten uit de beheerderswinkel die naar de serverbank zijn gehaald.</gray>"
        - "<gray>Controleer de timing van de volgende ophaalactie en neem het saldo op.</gray>"
        - "<yellow>Klik om serverbank te openen controles.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Winkel Config</gradient>"
      lore:
        - "<gray>Waarden bewerken van</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Elke bewerkbare instelling kan worden gewijzigd via een aambeeldprompt.</gray>"
        - "<yellow>Klik om configuratiecontroles te openen.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutabeheerder</gradient>"
      lore:
        - "<gray>Bekijk de gedetecteerde valuta uit de kluis en JExEconomy.</gray>"
        - "<gray>Maak de standaard</gray> <white>regendruppels</white> <gray>munt wanneer dat nodig is.</gray>"
        - "<yellow>Klik om valutacontroles te openen.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Beheerderstoegang vereist</white>"
      lore:
        - "<gray>Je hebt geen toestemming om deze beheerder te gebruiken panel.</gray>"

# Beheerdersvalutaweergave voor gedetecteerde providers en standaardvalutacreatie.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutabeheerder</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Valuta Providers</white>"
    lore:
      - "<gray>Gedetecteerd valuta:</gray> <white>{currency_count}</white>"
      - "<gray>Vault beschikbaar:</gray> <white>{vault_available}</white>"
