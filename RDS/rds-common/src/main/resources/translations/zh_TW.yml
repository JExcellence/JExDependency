# ============================================
# 全球前綴
# ============================================
# 一般插件聊天輸出前面的前綴。
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# 面向玩家的商店、銀行和稅務狀況的快速總結行。
info:
  total: "<blue>商店：</blue> <white>{owned_shops}</white>"
  bank: "<green>追蹤餘額 ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>預定稅（{taxed_shops}應稅商店）：</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>下一個稅：</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# 玩家進入伺服器時顯示的加入時間訊息。
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}應稅商店\n[<blue>金額<yellow>]\n{taxes}\n<red>到期的：<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# 命令回應字串`/rs` 功能和切換。 
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[一]</gradient> <gray>開啟<white>RDS 管理員</white><gray>控制板。</gray>"
  bar:
    enabled: "<green>查看商店時啟用商店老闆欄。</green>"
    disabled: "<yellow>店老闆酒吧禁用。</yellow>"
  give:
    syntax: "<red>用法： /rs 給出<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>用法：</gray> <white>/rs 記分牌&lt;分類帳|庫存&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>啟用了<white>{scoreboard_type}</white><gray>側邊欄。</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>禁用了<white>{scoreboard_type}</white><gray>側邊欄。</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>切換到<white>{scoreboard_type}</white><gray>側邊欄。</gray>"
    type:
      ledger: "<gold>分類帳</gold>"
      stock: "<aqua>庫存</aqua>"

# 側邊欄記分板標籤和值格式。
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] 帳本 ◆</gradient>"
    transactions: "<yellow>發送：</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ 銀行總計</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>沒有銀行資金</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] 庫存 ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>庫存：</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>沒有玩家商店</red>"

# 定位目標時顯示的老闆列文字商店。 
shop_boss_bar:
  title: "<gold>{shop_type}店鋪</gold> <gray>|</gray> <yellow>擁有者：</yellow> <white>{owner}</white> <gray>|</gray> <yellow>專案:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>地點：</yellow> <white>{location}</white>"
  type:
    player: "玩家"
    admin: "行政"
  owner:
    admin: "行政"
  available_items:
    finite: "{item_count}"
    limited: "庫存有限"
    infinite: "無限"
    various: "各種"

# ============================================
# 圖形使用者介面按鈕
# ============================================

# 商店區塊物品名稱和傳說元資料。
shop_block:
  name: "<blue>雨滴店</blue>"
  lore:
    - "<yellow>放置此區塊來建立您的商店。</yellow>"

# 商店概覽 UI 標籤、知識和可用性狀態。
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 商店 商店</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] 擁有的商店街區</gradient>"
    lore:
      - "<gray>擁有的商店區塊：</gray> <white>{owned_shops}</white>"
      - "<gray>這追蹤購買或授予</gray>"
      - "<gray>ShopBlock 所有權。</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[上限] 商舖區塊限制</gradient>"
    lore:
      - "<gray>擁有的商店區塊：</gray> <white>{owned_shops}</white>"
      - "<gray>最大商鋪街區：</gray> <white>{max_shops}</white>"
      - "<gray>此限制控製商店數量</gray>"
      - "<gray>您可以解鎖的塊。</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[需求] 店家要求</gradient>"
    lore:
      - "<gray>配置要求：</gray> <white>{requirement_count}</white>"
      - "<gray>當前需求數量：</gray> <white>{requirements}</white>"
      - "<gray>地位：</gray> <white>{availability}</white>"
      - "<yellow>點擊以檢查下一個商店</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[準備好]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待辦的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[離線]</gradient>"

# 商店等級要求UI、進度顯示和購買回饋。
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[需求] 商店等級{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] 購買商店街區</gradient>"
    lore:
      - "<gray>購買等級：</gray> <white>{purchase_number}</white>"
      - "<gray>擁有的商店區塊：</gray> <white>{owned_shops}</white>"
      - "<gray>最大商鋪街區：</gray> <white>{max_shops}</white>"
      - "<gray>配置要求：</gray> <white>{requirement_count}</white>"
      - "<gray>目前遇到：</gray> <white>{met_count}</white>"
      - "<gray>地位：</gray> <white>{availability}</white>"
      - "<yellow>點擊以在該層準備就緒時進行購買。 </yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[準備好]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待辦的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[離線]</gradient>"
    none: "<gradient:#10b981:#34d399>[自由的]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[免費] 無要求</gradient>"
    lore:
      - "<gray>此購買層沒有設定要求。 </gray>"
      - "<yellow>您無需額外檢查即可購買此商店區塊。 </yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[請求]{requirement_name}</gradient>"
    lore:
      - "<gray>鑰匙：</gray> <white>{requirement_key}</white>"
      - "<gray>類型：</gray> <white>{requirement_type}</white>"
      - "<gray>地位：</gray> <white>{status}</white>"
      - "<gray>進步：</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>概括：</gray> <white>{summary}</white>"
      - "<yellow>右鍵單擊相容的要求以儲存進度。</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ 詳細檢查</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[遇見]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[待辦的]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[不可用]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>購買了一塊商店。消耗要求：</gray> <white>{requirements}</white><gray>。擁有商鋪街區：</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您目前不符合 <white>{requirement}</white><gray>。店舖要求：</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>商店要求 <white>{requirement}</white><gray>現在不可用或無效。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>您已達到商店街區限制<white>{max_shops}</white><gray>。擁有商鋪街區：</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>現在已經準備好了。</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>儲存的進度<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>沒有可用於 <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>不支援儲存進度。</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>現在不可用。</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>無法載入您的 RDS 設定文件，因此無法儲存進度。</gray>"

# 阻止交互驗證錯誤和保護通知。 
block_listener:
  error:
    invalid_owner_uuid: "<red>無法讀取該商品的店主。</red>"
    not_owner: "<red>此 ShopBlock 屬於其他玩家，無法由您放置。 </red>"
    max_shops_reached: "<red>您已達到店舖限額{max_shops}。目前已入駐的店：{owned_shops}.</red>"
    shop_protected: "<red>商店不能直接破壞。使用商店菜單關閉商店。</red>"
    double_chest_requires_shop_block: "<red>雙胸店需要第二個<blue>商店街區</blue><red>。普通寶箱無法與商店寶箱合併。</red>"
    double_chest_owner_mismatch: "<red>此 ShopBlock 屬於其他擁有者，因此無法擴充此商店。 </red>"
    shop_already_double_chest: "<red>這家商店已經在使用兩半箱。</red>"
    double_chest_ambiguous: "<red>此 ShopBlock 涉及多個商店箱。僅將其放置在一個商店旁邊。 </red>"

# 預定的稅務處理結果訊息。
tax_scheduler:
  paid: "<yellow>收取的計劃商店稅{amount}。統計店：{owned_shops}.</yellow>"
  insufficient_funds: "<red>您無法支付預定的商店稅{amount}。統計店：{owned_shops}.</red>"
  charge_failed: "<red>未能收取{amount}。統計店：{owned_shops}.</red>"

# 用於所有者/管理員管理操作的主商店概覽介面。
shop_overview_ui:
  title: "{owner} 店鋪 - {location}"
  summary:
    name: "<gold>店鋪概要</gold>"
    player:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>地點：</gray> <white>{location}</white>"
        - "<gray>儲存的條目：</gray> <white>{item_count}</white>"
        - "<gray>店鋪類型：</gray> <white>球員商店</white>"
        - "<gray>存貨：</gray> <white>有限</white>"
    admin:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>地點：</gray> <white>{location}</white>"
        - "<gray>儲存的條目：</gray> <white>{item_count}</white>"
        - "<gray>店鋪類型：</gray> <white>管理商店</white>"
        - "<gray>存貨：</gray> <white>無限</white>"
  finance:
    name: "<gold>商店銀行</gold>"
    lore:
      - "<gray>追蹤貨幣：</gray> <white>{bank_currency_count}</white>"
      - "<yellow>點擊查看並提取資金。</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>已啟用管理商店</red>"
        lore:
          - "<gray>本店目前為行政店。</gray>"
          - "<gray>庫存對客戶來說是無限的。</gray>"
          - "<gray>儲存的條目：</gray> <white>{item_count}</white>"
          - "<yellow>點選可切換回</yellow>"
      disabled:
        name: "<green>管理員商店已停用</green>"
        lore:
          - "<gray>此商店目前使用普通庫存。 </gray>"
          - "<gray>客戶只能購買預存金額。</gray>"
          - "<gray>儲存的條目：</gray> <white>{item_count}</white>"
          - "<yellow>點選啟用管理商店模式。 </yellow>"
    close:
      name: "<red>關閉商店</red>"
      lore:
        - "<gray>刪除該商店並歸還商店區塊。</gray>"
        - "<gray>儲存的條目：</gray> <white>{item_count}</white>"
        - "<gray>追蹤銀行貨幣：</gray> <white>{bank_currency_count}</white>"
        - "<yellow>關門前商店庫存必須清空。</yellow>"
    manage:
      name: "<green>添加商店商品</green>"
      lore:
        - "<gray>在這家商店存放新物品。</gray>"
        - "<gray>目前條目：</gray> <white>{item_count}</white>"
        - "<yellow>點選以開啟項目輸入。 </yellow>"
    customer_view:
      name: "<gold>開啟客戶視圖</gold>"
      lore:
        - "<gray>當顧客看到這家商店時預覽它。</gray>"
        - "<gray>目前條目：</gray> <white>{item_count}</white>"
        - "<yellow>點選以客戶身分瀏覽該商店。</yellow>"
    trusted:
      name: "<gold>值得信賴的玩家</gold>"
      lore:
        - "<gray>關聯：</gray> <white>{associate_count}</white>"
        - "<gray>值得信賴的玩家：</gray> <white>{trusted_count}</white>"
        - "<yellow>點擊以管理商店信任等級。 </yellow>"
    ledger:
      name: "<gold>商店分類帳</gold>"
      lore:
        - "<gray>總條目：</gray> <white>{ledger_count}</white>"
        - "<gray>購買：</gray> <white>{purchase_count}</white>"
        - "<gray>稅費：</gray> <white>{tax_count}</white>"
        - "<yellow>按一下可查看商店交易記錄。 </yellow>"
    edit:
      name: "<aqua>編輯商店商品</aqua>"
      lore:
        - "<gray>編輯儲存的商店商品的定價。</gray>"
        - "<gray>目前條目：</gray> <white>{item_count}</white>"
        - "<yellow>點擊以編輯價格和貨幣。 </yellow>"
    storage:
      name: "<gold>查看儲存的物品</gold>"
      lore:
        - "<gray>查看該商店中已存放的商品。</gray>"
        - "<gray>目前條目：</gray> <white>{item_count}</white>"
        - "<yellow>點擊可提取儲存的資金</yellow>"
    locked:
      name: "<red>商店已上鎖</red>"
      lore:
        - "<gray>只有擁有者可以新增物品。 </gray>"
        - "<gray>目前條目：</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>您沒有管理該商店的權限。</red>"
    no_admin_permission: "<red>您無權切換管理商店。</red>"
    admin_limit_reached: "<red>伺服器已有 {admin_shops}管理商店。免費版僅允許{max_admin_shops}管理商店。</red>"
    admin_enabled: "<green>該商店現在是一個管理商店，擁有無限的客戶庫存。統計店：{owned_shops}.</green>"
    admin_disabled: "<yellow>該商店現在是一家普通玩家商店，客戶庫存有限。統計店：{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>您無法將此管理商店切換回玩家商店，因為您的商店限制為 {max_shops}已經達到了。統計店：{owned_shops}.</red>"
    close_not_empty: "<red>您只能在刪除所有儲存的物品後才能關閉商店。剩餘條目：{item_count}.</red>"
    close_bank_not_empty: "<red>在關閉此商店之前提取您的商店銀行。剩餘追蹤貨幣：{bank_currency_count}.</red>"
    closed: "<green>關閉商店並返回{returned_blocks}商店街區。統計店：{owned_shops}.</green>"
    shop_missing:
      name: "<red>未找到商店</red>"
      lore:
        - "<gray>此商店無法從儲存載入。 </gray>"
      message: "<red>此商店無法從儲存載入。 </red>"

# 用於 RDS 管理的全域管理控制面板。
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[管理員] RDS 控制</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS 管理面板</white>"
    lore:
      - "<gray>從一處管理全域管理商店系統。</gray>"
      - "<gray>開啟下面的伺服器群組、設定和整合控制項。</gray>"
      - "<yellow>需要：</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] 伺服器銀行</gradient>"
      lore:
        - "<gray>審查拉入伺服器銀行的管理商店收入。</gray>"
        - "<gray>檢查下次拉取時間並提取餘額。</gray>"
        - "<yellow>按一下可開啟伺服器群組控制項。</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] 商店設定</gradient>"
      lore:
        - "<gray>編輯</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>中的值 每個可編輯設定都可以透過砧提示進行變更。</gray>"
        - "<yellow>點選可開啟設定控制項。</yellow>"
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] 玩家和群組控制</gradient>"
      lore:
        - "<gray>設定每個玩家和每個群組的最大商店和折扣。</gray>"
        - "<gray>以所有者身分開啟任何商店或強制關閉活動商店視圖。</gray>"
        - "<yellow>點選可開啟玩家/群組管理控制。</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] 外掛程式整合</gradient>"
      lore:
        - "<gray>開放職位、技能和 PlaceholderAPI 整合工具。</gray>"
        - "<gray>管理插件需求橋接器和擴充設定。</gray>"
        - "<yellow>點選可開啟整合控制。</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] 貨幣管理器</gradient>"
      lore:
        - "<gray>查看從 Vault 和 JExEconomy 偵測到的貨幣。</gray>"
        - "<gray>在需要時建立預設的</gray> <white>raindrops</white> <gray>貨幣。</gray>"
        - "<yellow>點選可開啟貨幣控制。</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[技能] 技能要求</gradient>"
      lore:
        - "<gray>查看支援的技能插件和偵測狀態。</gray>"
        - "<gray>將預設技能需求套用至所有購買等級。</gray>"
        - "<yellow>點選可開啟技能要求控制。</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[職位] 職位要求</gradient>"
      lore:
        - "<gray>查看支援的作業插件和檢測狀態。</gray>"
        - "<gray>將預設作業需求套用至所有採購層。</gray>"
        - "<yellow>點選可開啟作業要求控制。</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[稅務] 立即徵稅</gradient>"
      lore:
        - "<gray>觸發一個立即徵稅週期以進行測試。</gray>"
        - "<gray>這不會更改配置的重複報稅計時器。</gray>"
        - "<yellow>按一下立即繳稅。</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>需要管理員存取權限</white>"
      lore:
        - "<gray>您無權使用此管理面板。</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>立即觸發商店徵稅週期。</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>商店稅表目前無法使用。</gray>"

plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>[Int] 外掛程式整合</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[資訊]</gradient> <white>整合中心</white>"
    lore:
      - "<gray>從一處管理需求橋整合。</gray>"
      - "<gray>開放職位、技能和 PlaceholderAPI 控制項。</gray>"
      - "<yellow>需要：</yellow> <white>raindropshops.command.admin</white>"
  actions:
    skills:
      name: "<gradient:#22c55e:#86efac>[技能] 技能要求</gradient>"
