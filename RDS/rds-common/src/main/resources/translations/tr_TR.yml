# ============================================
# GLOBAL PREFIX
# ============================================
# Prefix'te kilitlendi genel eklenti sohbet çıkışına eklenmiştir.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Mağaza, banka ve vergi durumu için oyuncuya yönelik hızlı özet satırları.
info:
  total: "<blue>Mağazalar:</blue> <white>{owned_shops}</white>"
  bank: "<green>Takip edilen Bakiyeler ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Planlanmış Vergi olarak kaydedilen öğe fiyatlandırması ({taxed_shops}vergiye tabi mağazalar):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Sonraki Vergi:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Oyuncular sunucuya girdiğinde gösterilen katılma zamanı mesajları.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}vergiye tabi mağaza(lar)\n[<blue>Amount<yellow>]\n{taxes}\n<red>Due:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# '/rs' özellikleri ve geçişler için komut yanıt dizeleri için toplanan planlanmış mağaza vergisi.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray><white>RDS Yöneticisi</white><gray>paneli.</gray>"
  bar:
    enabled: "<green>Mağaza patronu çubuğu, bir mağazaya bakarken etkinleştirildi.</green>"
    disabled: "<yellow>Mağaza patronu çubuğu devre dışı.</yellow>"
  give:
    syntax: "<red>Kullanım: /rs Give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Kullanım:</gray> <white>/rs puan tablosu&lt;defter | stok&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray><white>{scoreboard_type}</white><gray>kenar çubuğu.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Devre dışı <white>{scoreboard_type}</white><gray>kenar çubuğu.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray><white>{scoreboard_type}</white><gray>kenar çubuğu.</gray>"
    type:
      ledger: "<gold>defter</gold>"
      stock: "<aqua>stock</aqua>"

# Kenar çubuğu puan tablosu etiketleri ve değer biçimlendirmesi.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Defter ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Banka Toplamları</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Bankaya yatırılan fon yok</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Hisse Senedi ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stok:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Oyuncu mağazası yok</red>"

# Boss çubuğu metni şu sırada gösterilir: bir mağaza hedefleniyor.
shop_boss_bar:
  title: "<gold>{shop_type}Mağaza</gold> <gray>|</gray> <yellow>Sahip:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Öğeler:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Konum:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Yönetici"
  owner:
    admin: "Yönetici"
  available_items:
    finite: "{item_count}"
    limited: "Sınırlı Stok"
    infinite: "Infinite"
    various: "Çeşitli"

# ============================================
# GUI Düğmeleri
# ============================================

# Mağaza blok öğesi adı ve bilgi meta verileri.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Mağazanızı kurmak için bu bloğu yerleştirin.</yellow>"

# Mağaza mağazasına genel bakış kullanıcı arayüzü etiketleri, bilgi ve kullanılabilirlik durumları.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Mağaza Mağazası</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Sahip Olunan Mağaza Blokları</gradient>"
    lore:
      - "<gray>Sahip olunan mağaza bloklarını açtı:</gray> <white>{owned_shops}</white>"
      - "<gray>Bu parça satın alındı veya verildi</gray>"
      - "<gray>ShopBlock sahipliği.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Mağaza Blok Sınırı</gradient>"
    lore:
      - "<gray>Sahip olunan mağaza bloklarını açtı:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimum mağaza blokları:</gray> <white>{max_shops}</white>"
      - "<gray>Bu sınır, kaç mağazanın olduğunu kontrol eder</gray>"
      - "<gray>kilidini açabileceğiniz bloklar.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Mağaza Gereksinimleri</gradient>"
    lore:
      - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
      - "<gray>Mevcut gereksinim sayısı:</gray> <white>{requirements}</white>"
      - "<gray>Durum:</gray> <white>{availability}</white>"
      - "<yellow>Sonraki mağaza katmanını incelemek için tıklayın.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Hazır]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Askıda olması]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Çevrimdışı]</gradient>"

# Mağaza katmanı gereksinimi kullanıcı arayüzü, ilerleme ekranı ve satın alma geri bildirimi.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Mağaza Seviyesi{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Mağaza Blokunu Satın Al</gradient>"
    lore:
      - "<gray>Satın Alma katmanı:</gray> <white>{purchase_number}</white>"
      - "<gray>Sahip olunan mağaza bloklarını açtı:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimum mağaza blokları:</gray> <white>{max_shops}</white>"
      - "<gray>Yapılandırılan gereksinimler:</gray> <white>{requirement_count}</white>"
      - "<gray>Şu anda buluşulan:</gray> <white>{met_count}</white>"
      - "<gray>Durum:</gray> <white>{availability}</white>"
      - "<yellow>Bu seviye hazır olduğunda satın almak için tıklayın.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Hazır]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Askıda olması]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Çevrimdışı]</gradient>"
    none: "<gradient:#10b981:#34d399>[Özgür]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Ücretsiz] Gereksinim Yok</gradient>"
    lore:
      - "<gray>Bu satın alma katmanının yapılandırılmış gereksinimleri yoktur.</gray>"
      - "<yellow>Bu mağaza bloğunu ekstra çekler olmadan satın alabilirsiniz.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[İstek]{requirement_name}</gradient>"
    lore:
      - "<gray>Anahtar:</gray> <white>{requirement_key}</white>"
      - "<gray>Tür:</gray> <white>{requirement_type}</white>"
      - "<gray>Durum:</gray> <white>{status}</white>"
      - "<gray>Progress:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Özet:</gray> <white>{summary}</white>"
      - "<yellow>Banka ilerlemesi için uyumlu gereksinimlere sağ tıklayın.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Ayrıntılı Çekler</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Tanıştık]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Askıda olması]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Mevcut değil]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Bir mağaza bloğu satın alındı. Tüketilen gereksinimler:</gray> <white>{requirements}</white><gray>. Sahip olunan mağaza blokları:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray> Şu anda <white>{requirement}</white><gray>. Mağaza gereksinimleri:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Mağaza gereksinimi <white>{requirement}</white><gray>şu anda kullanılamıyor veya geçersiz.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{max_shops}</white><gray>. Sahip olunan mağaza blokları:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>artık hazır.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Saklanan ilerleme <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray><white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>bankalı ilerlemeyi desteklemez.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>şu anda kullanılamıyor.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>'ye ihtiyacınız var RDS profiliniz yüklenemedi, dolayısıyla ilerleme sağlanamadı kaydedildi.</gray>"

# Etkileşim doğrulama hatalarını ve koruma bildirimlerini engelle.
block_listener:
  error:
    invalid_owner_uuid: "<red>Dükkan sahibi buradan okunamıyor item.</red>"
    not_owner: "<red>Bu ShopBlock başka bir oyuncuya aittir ve sizin tarafınızdan yerleştirilemez.</red>"
    max_shops_reached: "<red> mağaza blokaj sınırına ulaştınız {max_shops}. Mevcut yerleştirilmiş mağazalar:{owned_shops}.</red>"
    shop_protected: "<red>Mağazalar doğrudan kırılamaz. Mağazayı kapatmak için mağaza menüsünü kullanın.</red>"
    double_chest_requires_shop_block: "<red>Çift sandıklı mağazalar ikinci bir <blue>ShopBlock</blue><red>. Normal sandıklar mağaza sandıklarıyla birleşemez.</red>"
    double_chest_owner_mismatch: "<red>Bu ShopBlock farklı bir sahibe ait olduğundan bu mağazayı genişletemez.</red>"
    shop_already_double_chest: "<red>Bu mağaza zaten her iki sandık yarısını da kullanıyor.</red>"
    double_chest_ambiguous: "<red>Bu ShopBlock birden fazla mağaza sandığına dokunur. Yalnızca bir mağazanın yanına yerleştirin.</red>"

# Planlanmış vergi işleme sonuç mesajları.
tax_scheduler:
  paid: "<yellow>{amount}. Sayılan mağazalar:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Planlanmış mağaza vergisini ödeyemezsiniz / {amount}. Sayılan mağazalar:{owned_shops}.</red>"
  charge_failed: "<red>{amount}. Sayılan mağazalar:{owned_shops}.</red>"

# Sahip/yönetici yönetimi eylemleri için ana mağazaya genel bakış arayüzü.
shop_overview_ui:
  title: "{owner} Mağaza - {location}"
  summary:
    name: "<gold>Mağaza Özeti</gold>"
    player:
      lore:
        - "<gray>Mal sahibi:</gray> <white>{owner}</white>"
        - "<gray>Konum:</gray> <white>{location}</white>"
        - "<gray>Saklanan girişler:</gray> <white>{item_count}</white>"
        - "<gray>Mağaza türü:</gray> <white>Oyuncu Mağazası</white>"
        - "<gray>Envanter:</gray> <white>Sonlu</white>"
    admin:
      lore:
        - "<gray>Mal sahibi:</gray> <white>{owner}</white>"
        - "<gray>Konum:</gray> <white>{location}</white>"
        - "<gray>Saklanan girişler:</gray> <white>{item_count}</white>"
        - "<gray>Mağaza türü:</gray> <white>Yönetici Mağazası</white>"
        - "<gray>Envanter:</gray> <white>Sonsuz</white>"
  finance:
    name: "<gold>Mağaza Bankası</gold>"
    lore:
      - "<gray>Takip edilen para birimleri:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Parayı incelemek ve çekmek için tıklayın.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Yönetici Mağazası Etkin</red>"
        lore:
          - "<gray>Bu mağaza şu anda bir yönetici mağazasıdır.</gray>"
          - "<gray> türü için geçersiz giriş Envanter için sonsuzdur müşteriler.</gray>"
          - "<gray>Saklanan girişler:</gray> <white>{item_count}</white>"
          - "<yellow>Oynatıcı mağazasına geri dönmek için tıklayın.</yellow>"
      disabled:
        name: "<green>Yönetici Mağazası Devre Dışı</green>"
        lore:
          - "<gray>Bu mağaza şu anda normal kullanıyor stok.</gray>"
          - "<gray>Müşteriler yalnızca depolanan tutarları satın alabilir.</gray>"
          - "<gray>Saklanan girişler:</gray> <white>{item_count}</white>"
          - "<yellow>Yönetici mağaza modunu etkinleştirmek için tıklayın.</yellow>"
    close:
      name: "<red>Mağazayı Kapat</red>"
      lore:
        - "<gray>Bu mağazayı kaldırın ve mağaza bloğunu geri getirin.</gray>"
        - "<gray>Saklanan girişler:</gray> <white>{item_count}</white>"
        - "<gray>Takip edilen banka para birimleri:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Mağaza stoğu kapanmadan önce boş olmalıdır.</yellow>"
    manage:
      name: "<green>Mağaza Öğeleri Ekle</green>"
      lore:
        - "<gray>Yeni öğeleri burada depolayın shop.</gray>"
        - "<gray>Mevcut girişler:</gray> <white>{item_count}</white>"
        - "<yellow>Öğe girişini açmak için tıklayın.</yellow>"
    customer_view:
      name: "<gold>Müşteri Görünümünü Aç</gold>"
      lore:
        - "<gray>Bu mağazayı müşterilerin gördüğü şekilde önizleyin.</gray>"
        - "<gray>Mevcut girişler:</gray> <white>{item_count}</white>"
        - "<yellow>Bu mağazaya müşteri olarak göz atmak için tıklayın.</yellow>"
    trusted:
      name: "<gold>Güvenilen Oyuncular</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Güvenilen oyuncular:</gray> <white>{trusted_count}</white>"
        - "<yellow>Mağaza güven düzeylerini yönetmek için tıklayın.</yellow>"
    ledger:
      name: "<gold>Shop Defter</gold>"
      lore:
        - "<gray>Toplam girişler:</gray> <white>{ledger_count}</white>"
        - "<gray>Purchases:</gray> <white>{purchase_count}</white>"
        - "<gray>Taxes:</gray> <white>{tax_count}</white>"
        - "<yellow>Mağaza işlem geçmişini incelemek için tıklayın.</yellow>"
    edit:
      name: "<aqua>Mağaza Öğelerini Düzenle</aqua>"
      lore:
        - "<gray>Depolanan mağaza için fiyatlandırmayı düzenle öğeler.</gray>"
        - "<gray>Mevcut girişler:</gray> <white>{item_count}</white>"
        - "<yellow>Fiyatları düzenlemek için tıklayın ve para birimleri.</yellow>"
    storage:
      name: "<gold>Saklanan Öğeleri Görüntüle</gold>"
      lore:
        - "<gray>Bu mağazada zaten depolanan öğeleri inceleyin.</gray>"
        - "<gray>Mevcut girişler:</gray> <white>{item_count}</white>"
        - "<yellow>Depolanan öğeleri çekmek için tıklayın.</yellow>"
    locked:
      name: "<red>Mağaza Kilitlendi</red>"
      lore:
        - "<gray>Yalnızca sahip öğe ekleyebilir.</gray>"
        - "<gray>Mevcut girişler:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Bu mağazayı yönetme izniniz yok.</red>"
    no_admin_permission: "<red>Yönetici mağazalarını değiştirme izniniz yok.</red>"
    admin_limit_reached: "<red>Sunucuda zaten {admin_shops}yönetici mağazaları. Ücretsiz sürüm yalnızca izin verir{max_admin_shops}yönetici mağazaları.</red>"
    admin_enabled: "<green>Bu mağaza artık sonsuz müşteri envanterine sahip bir yönetici mağazasıdır. Sayılan mağazalar: {owned_shops}.</green>"
    admin_disabled: "<yellow>Bu mağaza artık sınırlı müşteri envanterine sahip normal bir oyuncu mağazasıdır. Sayılan mağazalar: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Mağaza limitiniz {max_shops}zaten ulaşılmıştır. Sayılan mağazalar:{owned_shops}.</red>"
    close_not_empty: "<red>Bir mağazayı ancak depolanan tüm öğeleri kaldırdıktan sonra kapatabilirsiniz. Kalan girişler: {item_count}.</red>"
    close_bank_not_empty: "<red>Bu mağazayı kapatmadan önce mağaza bankanızı çekin. Takip edilen kalan para birimleri: {bank_currency_count}.</red>"
    closed: "<green>Mağazayı kapattı ve geri döndü {returned_blocks}ShopBlock(lar). Sayılan mağazalar:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Mağaza Bulunamadı</red>"
      lore:
        - "<gray>Bu mağaza depolama alanından yüklenemedi.</gray>"
      message: "<red>Bu mağaza depolama alanından yüklenemedi.</red>"

# RDS yönetimi için genel yönetici kontrol paneli.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Yönetici] RDS Kontrolü</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Yönetici Paneli</white>"
    lore:
      - "<gray>Genel yönetici-mağaza sistemlerini tek yerden yönetin.</gray>"
      - "<gray>Sunucu bankasını açın veya aşağıdaki yapılandırma ayarlarını düzenleyin.</gray>"
      - "<yellow>Gerektirir:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Sunucu Bankası</gradient>"
      lore:
        - "<gray>Sunucu bankasına çekilen yönetici-mağaza gelirini inceleyin.</gray>"
        - "<gray>Sonraki çekme zamanlamasını kontrol edin ve bakiyeleri çekin.</gray>"
        - "<yellow>Sunucu bankası kontrollerini açmak için tıklayın.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Mağaza Config</gradient>"
      lore:
        - "<gray>Değerleri düzenle</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Her düzenlenebilir ayar, bir örs istemi aracılığıyla değiştirilebilir.</gray>"
        - "<yellow>Yapılandırma kontrollerini açmak için tıklayın.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Döviz Yöneticisi</gradient>"
      lore:
        - "<gray>Vault'tan tespit edilen para birimlerini inceleyin ve JExEconomy.</gray>"
        - "<gray>Varsayılanı oluştur</gray> <white>yağmur damlaları</white> <gray>gerektiğinde para birimi.</gray>"
        - "<yellow>Para birimini açmak için tıklayın kontrolleri.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Yönetici Erişimi Gerekli</white>"
      lore:
        - "<gray>Bu yöneticiyi kullanma izniniz yok panel.</gray>"

# Algılanan sağlayıcılar için yönetici para birimi görünümü ve varsayılan para birimi oluşturma.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Döviz Yöneticisi</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Bilgi]</gradient> <white>Currency Sağlayıcılar</white>"
    lore:
      - "<gray>Algılandı para birimleri:</gray> <white>{currency_count}</white>"
      - "<gray>Kasa kullanılabilir:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy mevcut:</gray> <white>{jexeconomy_available}</white>"
