      - "<gray>Prefix:</gray> <white>{prefix}</white>"
      - "<gray>Sonek:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>{currency_id}</white>"
      lore:
        - "<gray>JExEconomy'de varsayılan RDS para birimini oluştur.</gray>"
        - "<yellow>{currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEkonomi Gerekli</white>"
      lore:
        - "<gray>JExEconomy olmadan varsayılan para birimi oluşturamazsınız.</gray>"
        - "<gray>Önce JExEconomy'yi kurun ve etkinleştirin.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[TAMAM]</gradient> <white>{currency_id}Hazır</white>"
      lore:
        - "<gray>Varsayılan para birimi zaten mevcut.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Varsayılan para birimi oluşturuldu:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray> planlı mağaza vergisi tahsil edilemedi Para birimi oluşturulamadı:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Para birimi zaten mevcut:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray> olduğundan bu yönetici mağazasını tekrar oyuncu mağazasına geçiremezsiniz.JExEconomy mevcut olmadığı sürece bu düğmeyi kullanamazsınız.</gray>"
