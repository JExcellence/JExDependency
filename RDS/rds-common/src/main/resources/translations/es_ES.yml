      lore:
        - "<gray>La revisión detectó monedas de Vault y JExEconomy.</gray>"
        - "<gray>Cree la moneda</gray> <white>raindrops</white> <gray>predeterminada cuando sea necesario.</gray>"
        - "<yellow>Haga clic para abrir los controles de divisas.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Habilidad] Requisitos de habilidades</gradient>"
      lore:
        - "<gray>Revise los complementos de habilidades admitidos y el estado de detección.</gray>"
        - "<gray>Aplicar requisitos de habilidades predeterminados a todos los niveles de compra.</gray>"
        - "<yellow>Haga clic para abrir los controles de requisitos de habilidades.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Trabajo] Requisitos del trabajo</gradient>"
      lore:
        - "<gray>Revisar los complementos de trabajo admitidos y el estado de detección.</gray>"
        - "<gray>Aplicar requisitos de trabajo predeterminados a todos los niveles de compra.</gray>"
        - "<yellow>Haga clic para abrir los controles de requisitos del trabajo.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[Impuestos] Ejecutar impuestos ahora</gradient>"
      lore:
        - "<gray>Activa un ciclo de recaudación de impuestos inmediato para realizar pruebas.</gray>"
