    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Se requiere acceso de administrador</white>"
      lore:
        - "<gray>No tienes permiso para utilizar este panel de integración.</gray>"

# PlaceholderAPI integration view for expansion install and reload controls.
placeholder_api_ui:
  title: "<gradient:#38bdf8:#60a5fa>[PAPI] Herramientas de PlaceholderAPI</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Integración de PlaceholderAPI</white>"
    lore:
      - "<gray>PlaceholderAPI compatible:</gray> <white>{supported}</white>"
      - "<gray>Expansión de destino:</gray> <white>{expansion_name}</white>"
      - "<yellow>Instale la expansión y vuelva a cargar PlaceholderAPI desde este panel.</yellow>"
  detection:
    supported:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>PlaceholderAPI detectada</white>"
      lore:
