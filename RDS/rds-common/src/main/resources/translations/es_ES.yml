# ============================================
# PREFIJO GLOBAL
# ============================================
# Prefijo antepuesto al chat general del complemento salida.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Líneas de resumen rápido para el jugador sobre el estado de la tienda, el banco y los impuestos.
info:
  total: "<blue>Tiendas:</blue> <white>{owned_shops}</white>"
  bank: "<green>Saldos rastreados ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Impuesto programado ({taxed_shops} tiendas sujetas a impuestos):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Siguiente impuesto:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Mensajes de tiempo de unión que se muestran cuando los jugadores ingresan al servidor.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} tiendas sujetas a impuestos\n[<blue>Amount<yellow>]\n{taxes}\n<red>Due:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Cadenas de respuesta de comando para funciones `/rs` y alterna.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Se abrieron los <white>RDS Admin</white><gray> panel.</gray>"
  bar:
    enabled: "<green>Barra del jefe de la tienda habilitada mientras se mira una tienda.</green>"
    disabled: "<yellow>Barra del jefe de la tienda deshabilitada.</yellow>"
  give:
    syntax: "<red>Uso: /rs dar<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Uso:</gray> <white>/rs marcador &lt;ledger|stock&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Se habilitó <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deshabilitado <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Cambiado al <white>{scoreboard_type}</white><gray> sidebar.</gray>"
    type:
      ledger: "<gold>ledger</gold>"
      stock: "<aqua>stock</aqua>"

# Etiquetas del marcador de la barra lateral y formato de valores.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Libro mayor ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Totales bancarios</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>No hay fondos depositados</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Stock ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stock:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>No hay tiendas de jugadores</red>"

# El texto de la barra de jefe se muestra al apuntar a un shop.
shop_boss_bar:
  title: "<gold>{shop_type} Tienda</gold> <gray>|</gray> <yellow>Propietario:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Items:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Ubicación:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Stock limitado"
    infinite: "Infinito"
    various: "Varios"

# ============================================
# Botones GUI
# ============================================

# Nombre y tradición del artículo del bloque de la tienda metadata.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Coloque este bloque para configurar su tienda.</yellow>"

# Etiquetas de la interfaz de usuario de descripción general de la tienda, historia y estados de disponibilidad.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Tienda de tienda</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Bloques de tienda propios</gradient>"
    lore:
      - "<gray>Bloques de tienda propios:</gray> <white>{owned_shops}</white>"
      - "<gray>Estas pistas compradas o concedidas</gray>"
      - "<gray>ShopBlock propiedad.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Límite de bloque de tienda</gradient>"
    lore:
      - "<gray>Bloques de tienda propios:</gray> <white>{owned_shops}</white>"
      - "<gray>Bloqueos máximos de tienda:</gray> <white>{max_shops}</white>"
      - "<gray>Este límite controla cuántas tiendas</gray>"
      - "<gray>bloques que puedes desbloquear.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Requisitos de tienda</gradient>"
    lore:
      - "<gray>Requisitos configurados:</gray> <white>{requirement_count}</white>"
      - "<gray>Recuento de requisitos actuales:</gray> <white>{requirements}</white>"
      - "<gray>Estado:</gray> <white>{availability}</white>"
      - "<yellow>Haga clic para inspeccionar la siguiente tienda nivel.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Listo]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendiente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Sin conexión]</gradient>"

# Interfaz de usuario de requisitos de nivel de la tienda, visualización del progreso y comentarios de compra.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Nivel de tienda {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Compra de bloque de tienda</gradient>"
    lore:
      - "<gray>Nivel de compra:</gray> <white>{purchase_number}</white>"
      - "<gray>Bloques de tienda propios:</gray> <white>{owned_shops}</white>"
      - "<gray>Bloqueos máximos de tienda:</gray> <white>{max_shops}</white>"
      - "<gray>Requisitos configurados:</gray> <white>{requirement_count}</white>"
      - "<gray>Actualmente cumplido:</gray> <white>{met_count}</white>"
      - "<gray>Estado:</gray> <white>{availability}</white>"
      - "<yellow>Haga clic para comprar cuando este nivel esté listo.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Listo]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendiente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Sin conexión]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratis]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] No Requisitos</gradient>"
    lore:
      - "<gray>Este nivel de compra no tiene requisitos configurados.</gray>"
      - "<yellow>Puedes comprar este bloque de tienda sin controles adicionales.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req] {requirement_name}</gradient>"
    lore:
      - "<gray>Clave:</gray> <white>{requirement_key}</white>"
      - "<gray>Tipo:</gray> <white>{requirement_type}</white>"
      - "<gray>Estado:</gray> <white>{status}</white>"
      - "<gray>Progreso:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Resumen:</gray> <white>{summary}</white>"
      - "<yellow>Haga clic derecho en requisitos compatibles con el banco progreso.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detallado Cheques</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Pendiente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[No disponible]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Compró un bloque de tienda. Requisitos consumidos:</gray> <white>{requirements}</white><gray>. Bloques de tienda propios:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Actualmente no cumples con <white>{requirement}</white><gray>. Requisitos de la tienda:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>El requisito de la tienda <white>{requirement}</white><gray> no está disponible o no es válido en este momento.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Has alcanzado el límite de bloqueo de tienda de <white>{max_shops}</white><gray>. Bloques de tienda propios:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> ya está listo.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Progreso almacenado para <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>No había artículos o moneda coincidentes disponibles para <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> no admite el progreso bancario.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> no está disponible en este momento.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Tu perfil RDS no se pudo cargar, por lo que no se pudo cargar el progreso. guardado.</gray>"

# Errores de validación de interacción de bloques y avisos de protección.
block_listener:
  error:
    invalid_owner_uuid: "<red>No se puede leer el propietario de la tienda de este artículo.</red>"
    not_owner: "<red>Este ShopBlock pertenece a otro jugador y usted no puede colocarlo.</red>"
    max_shops_reached: "<red>Has alcanzado el límite de tienda de {max_shops}. Tiendas colocadas actualmente: {owned_shops}.</red>"
    shop_protected: "<red>Las tiendas no se pueden dividir directamente. Utilice el menú de la tienda para cerrar la tienda.</red>"
    double_chest_requires_shop_block: "<red>Las tiendas de doble cofre requieren un segundo <blue>ShopBlock</blue><red>. Los cofres normales no pueden fusionarse con los cofres de la tienda.</red>"
    double_chest_owner_mismatch: "<red>Este ShopBlock pertenece a un propietario diferente, por lo que no puede ampliar esta tienda.</red>"
    shop_already_double_chest: "<red>Esta tienda ya está usando ambas mitades del cofre.</red>"
    double_chest_ambiguous: "<red>Este ShopBlock toca varios cofres de tiendas. Colóquelo al lado de una sola tienda.</red>"

# Mensajes de resultados del procesamiento de impuestos programados.
tax_scheduler:
  paid: "<yellow>Impuesto comercial programado recaudado de {amount}. Tiendas contadas: {owned_shops}.</yellow>"
  insufficient_funds: "<red>No puedes pagar el impuesto de tienda programado de {amount}. Tiendas contadas: {owned_shops}.</red>"
  charge_failed: "<red>No se pudo cobrar el impuesto de tienda programado de {amount}. Tiendas contadas: {owned_shops}.</red>"

# Interfaz de descripción general de la tienda principal para acciones de gestión del propietario/administrador.
shop_overview_ui:
  title: "{owner} Comercio - {location}"
  summary:
    name: "<gold>Resumen de la tienda</gold>"
    player:
      lore:
        - "<gray>Dueño:</gray> <white>{owner}</white>"
        - "<gray>Ubicación:</gray> <white>{location}</white>"
        - "<gray>Entradas almacenadas:</gray> <white>{item_count}</white>"
        - "<gray>Tipo de tienda:</gray> <white>Tienda de jugadores</white>"
        - "<gray>Inventario:</gray> <white>Finito</white>"
    admin:
      lore:
        - "<gray>Dueño:</gray> <white>{owner}</white>"
        - "<gray>Ubicación:</gray> <white>{location}</white>"
        - "<gray>Entradas almacenadas:</gray> <white>{item_count}</white>"
        - "<gray>Tipo de tienda:</gray> <white>Tienda de administración</white>"
        - "<gray>Inventario:</gray> <white>Infinito</white>"
  finance:
    name: "<gold>Tienda Banco</gold>"
    lore:
      - "<gray>Monedas rastreadas:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Haga clic para revisar y retirar fondos.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop Enabled</red>"
        lore:
          - "<gray>Esta tienda es actualmente una tienda de administración.</gray>"
          - "<gray>El inventario es infinito para los clientes.</gray>"
          - "<gray>Entradas almacenadas:</gray> <white>{item_count}</white>"
          - "<yellow>Haga clic para volver a una tienda de jugadores.</yellow>"
      disabled:
        name: "<green>Admin Shop Disabled</green>"
        lore:
          - "<gray>Esta tienda actualmente usa normal stock.</gray>"
          - "<gray>Los clientes solo pueden comprar cantidades almacenadas.</gray>"
          - "<gray>Entradas almacenadas:</gray> <white>{item_count}</white>"
          - "<yellow>Haga clic para habilitar el modo de tienda de administrador.</yellow>"
    close:
      name: "<red>Cerrar tienda</red>"
      lore:
        - "<gray>Eliminar esta tienda y devolver el bloque de la tienda.</gray>"
        - "<gray>Entradas almacenadas:</gray> <white>{item_count}</white>"
        - "<gray>Divisas bancarias rastreadas:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>El stock de la tienda debe estar vacío antes del cierre.</yellow>"
    manage:
      name: "<green>Agregar artículos de la tienda</green>"
      lore:
        - "<gray>Almacenar artículos nuevos en esta tienda.</gray>"
        - "<gray>Entradas actuales:</gray> <white>{item_count}</white>"
        - "<yellow>Haga clic para abrir la entrada de artículos.</yellow>"
    customer_view:
      name: "<gold>Abrir vista del cliente</gold>"
      lore:
        - "<gray>Vista previa de esta tienda como la ven los clientes.</gray>"
        - "<gray>Entradas actuales:</gray> <white>{item_count}</white>"
        - "<yellow>Haga clic para explorar esta tienda como cliente.</yellow>"
    trusted:
      name: "<gold>Trusted Jugadores</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Jugadores de confianza:</gray> <white>{trusted_count}</white>"
        - "<yellow>Haga clic para administrar los niveles de confianza de la tienda.</yellow>"
    ledger:
      name: "<gold>Libro mayor de tienda</gold>"
      lore:
        - "<gray>Total de entradas:</gray> <white>{ledger_count}</white>"
        - "<gray>Compras:</gray> <white>{purchase_count}</white>"
        - "<gray>Impuestos:</gray> <white>{tax_count}</white>"
        - "<yellow>Haga clic para revisar el historial de transacciones de la tienda.</yellow>"
    edit:
      name: "<aqua>Editar artículos de la tienda</aqua>"
      lore:
        - "<gray>Editar precios para la tienda almacenada items.</gray>"
        - "<gray>Entradas actuales:</gray> <white>{item_count}</white>"
        - "<yellow>Haga clic para editar precios y monedas.</yellow>"
    storage:
      name: "<gold>Ver artículos almacenados</gold>"
      lore:
        - "<gray>Revise los artículos ya almacenados en esta tienda.</gray>"
        - "<gray>Entradas actuales:</gray> <white>{item_count}</white>"
        - "<yellow>Haga clic para retirar artículos almacenados.</yellow>"
    locked:
      name: "<red>Tienda Bloqueado</red>"
      lore:
        - "<gray>Solo el propietario puede agregar artículos.</gray>"
        - "<gray>Entradas actuales:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>No tienes permiso para administrar esta tienda.</red>"
    no_admin_permission: "<red>No tienes permiso para alternar tiendas administrativas.</red>"
    admin_limit_reached: "<red>El servidor ya tiene {admin_shops} tiendas administrativas. La edición gratuita permite solo {max_admin_shops} tiendas administrativas.</red>"
    admin_enabled: "<green>Esta tienda ahora es una tienda administrativa con un inventario infinito de clientes. Tiendas contadas: {owned_shops}.</green>"
    admin_disabled: "<yellow>Esta tienda es ahora una tienda de jugadores normal con un inventario finito de clientes. Tiendas contadas: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>No puedes volver a cambiar esta tienda de administración a una tienda de jugador porque el límite de tu tienda es {max_shops} ya se ha alcanzado. Tiendas contadas: {owned_shops}.</red>"
    close_not_empty: "<red>Solo puedes cerrar una tienda después de eliminar todos los artículos almacenados. Entradas restantes: {item_count}.</red>"
    close_bank_not_empty: "<red>Retire el banco de su tienda antes de cerrar esta tienda. Monedas rastreadas restantes: {bank_currency_count}.</red>"
    closed: "<green>Cerró la tienda y devolvió {returned_blocks} TiendaBloque(s). Tiendas contadas: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Tienda no encontrada</red>"
      lore:
        - "<gray>Esta tienda no se pudo cargar desde el almacenamiento.</gray>"
      message: "<red>Esta tienda no se pudo cargar desde el almacenamiento.</red>"

# Panel de control de administración global para la gestión de RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Administrador] Control RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Panel de administración RDS</white>"
    lore:
      - "<gray>Administre sistemas globales de administración y tienda desde un solo lugar.</gray>"
      - "<gray>Abra los controles de integración, configuración y banco de servidores a continuación.</gray>"
      - "<yellow>Requiere:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Banco de servidores</gradient>"
      lore:
        - "<gray>Revisar los ingresos de la tienda de administración ingresados ​​en el banco de servidores.</gray>"
        - "<gray>Verifique el momento del próximo retiro y retire los saldos.</gray>"
        - "<yellow>Haga clic para abrir los controles del banco del servidor.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Editar valores desde</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Cada configuración editable se puede cambiar a través de un mensaje de yunque.</gray>"
        - "<yellow>Haga clic para abrir los controles de configuración.</yellow>"
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Controles de jugadores y grupos</gradient>"
      lore:
        - "<gray>Establece descuentos y tiendas máximas por jugador y por grupo.</gray>"
        - "<gray>Abra cualquier tienda como propietario o fuerce el cierre de las vistas activas de la tienda.</gray>"
        - "<yellow>Haga clic para abrir los controles de administración del reproductor/grupo.</yellow>"
    integrations:
