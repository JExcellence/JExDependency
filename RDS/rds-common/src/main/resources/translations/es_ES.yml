  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Se requiere acceso de administrador</white>"
      lore:
        - "<gray>No tiene permiso para utilizar este panel de administración.</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Desencadenó un ciclo inmediato de recaudación de impuestos comerciales. El programador de impuestos de la tienda</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>no está disponible en este momento.</gray>"

plugin_integration_management_ui:
