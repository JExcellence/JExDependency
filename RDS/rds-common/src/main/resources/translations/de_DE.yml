# ============================================
# GLOBAL PREFIX
# ============================================
# Präfix vor dem allgemeinen Plugin-Chat gesperrt Ausgabe.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Schnelle Zusammenfassungszeilen für den Spieler für Shop, Bank und Steuerstatus.
info:
  total: "<blue>Shops:</blue> <white>{owned_shops}</white>"
  bank: "<green>Verfolgte Salden ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Geplante Steuer ({taxed_shops} steuerpflichtige Geschäfte):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Nächste Steuer:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Beitrittszeitnachrichten werden angezeigt, wenn Spieler den Server betreten.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} steuerpflichtige Geschäfte\n[<blue>Amount<yellow>]\n{taxes}\n<red>Fällig:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Befehlsantwortzeichenfolgen für „/rs“-Funktionen und -Schalter.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Öffnete die <white>RDS Admin</white><gray> Panel.</gray>"
  bar:
    enabled: "<green>Shop-Bossleiste beim Betrachten eines Shops aktiviert.</green>"
    disabled: "<yellow>Shop-Bossleiste deaktiviert.</yellow>"
  give:
    syntax: "<red>Verwendung: /rs geben<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Verwendung:</gray> <white>/rs Anzeigetafel &lt;ledger|stock&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Aktiviert die <white>{scoreboard_type}</white><gray> Seitenleiste.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktiviert die <white>{scoreboard_type}</white><gray> Seitenleiste.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Umgestellt auf <white>{scoreboard_type}</white><gray> Seitenleiste.</gray>"
    type:
      ledger: "<gold>ledger</gold>"
      stock: "<aqua>stock</aqua>"

# Sidebar-Scoreboard-Beschriftungen und Werteformatierung.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Hauptbuch ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Banksummen</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Keine Bankmittel</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Bestand ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Lagerbestand:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Keine Spieler-Shops</red>"

# Bossleistentext wird beim Targeting angezeigt shop.
shop_boss_bar:
  title: "<gold>{shop_type} Shop</gold> <gray>|</gray> <yellow>Eigentümer:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Elemente:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Standort:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Administrator"
  owner:
    admin: "Administrator"
  available_items:
    finite: "{item_count}"
    limited: "Begrenzter Bestand"
    infinite: "Unendlich"
    various: "Verschiedenes"

# ============================================
# GUI-Schaltflächen
# ============================================

# Shop-Blockartikelname und Lore-Metadaten.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Platzieren Sie diesen Block, um Ihren Shop einzurichten.</yellow>"

# Shop-Shop-Übersichts-UI-Beschriftungen, Lore und Verfügbarkeitsstatus.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Shop-Shop</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Eigene Shop-Blöcke</gradient>"
    lore:
      - "<gray>Eigene Shop-Blöcke:</gray> <white>{owned_shops}</white>"
      - "<gray>Dies verfolgt gekaufte oder gewährte</gray>"
      - "<gray>ShopBlock Eigentümerschaft.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Shop-Block-Limit</gradient>"
    lore:
      - "<gray>Eigene Shop-Blöcke:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximale Shop-Blöcke:</gray> <white>{max_shops}</white>"
      - "<gray>Dieses Limit steuert, wie viele Shops</gray>"
      - "<gray>Blöcke, die Sie entsperren können.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Shop-Anforderungen</gradient>"
    lore:
      - "<gray>Konfigurierte Anforderungen:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktuelle Anforderungsanzahl:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klicken Sie, um den nächsten Shop zu überprüfen Stufe.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Bereit]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Ausstehend]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"

# Shop-Stufen-Anforderungs-Benutzeroberfläche, Fortschrittsanzeige und Kauf-Feedback.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Shop-Stufe {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Shop-Block kaufen</gradient>"
    lore:
      - "<gray>Kaufstufe:</gray> <white>{purchase_number}</white>"
      - "<gray>Eigene Shop-Blöcke:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximale Shop-Blöcke:</gray> <white>{max_shops}</white>"
      - "<gray>Konfigurierte Anforderungen:</gray> <white>{requirement_count}</white>"
      - "<gray>Derzeit erfüllt:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klicken Sie, um zu kaufen, wenn diese Stufe bereit ist.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Bereit]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Ausstehend]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Offline]</gradient>"
    none: "<gradient:#10b981:#34d399>[Frei]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Frei] Nein Anforderungen</gradient>"
    lore:
      - "<gray>Für diese Kaufebene sind keine Anforderungen konfiguriert.</gray>"
      - "<yellow>Sie können diesen Shop-Block ohne zusätzliche Schecks kaufen.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Erforderlich] {requirement_name}</gradient>"
    lore:
      - "<gray>Schlüssel:</gray> <white>{requirement_key}</white>"
      - "<gray>Typ:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Fortschritt:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Zusammenfassung:</gray> <white>{summary}</white>"
      - "<yellow>Rechtsklick auf kompatible Anforderungen zur Bank Fortschritt.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detailliert Schecks</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Erfüllt]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Ausstehend]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Nicht verfügbar]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Einen Shop-Block gekauft. Verbrauchte Anforderungen:</gray> <white>{requirements}</white><gray>. Eigene Shop-Blöcke:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie treffen derzeit nicht auf <white>{requirement}</white><gray>. Speicheranforderungen:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Die Shop-Anforderung <white>{requirement}</white><gray> ist derzeit nicht verfügbar oder ungültig.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben das Shop-Blocklimit von <white>{max_shops}</white><gray>. Eigene Shop-Blöcke:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> ist jetzt bereit.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Gespeicherter Fortschritt für <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Keine passenden Artikel oder Währungen verfügbar für <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> unterstützt keinen Bankfortschritt.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> ist derzeit nicht verfügbar.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Ihr RDS-Profil konnte nicht geladen werden, daher konnte kein Fortschritt erzielt werden gespeichert.</gray>"

# Interaktionsvalidierungsfehler und Schutzhinweise blockieren.
block_listener:
  error:
    invalid_owner_uuid: "<red>Der Shop-Inhaber kann aus diesem Artikel nicht gelesen werden.</red>"
    not_owner: "<red>Dieser ShopBlock gehört einem anderen Spieler und kann nicht von Ihnen platziert werden.</red>"
    max_shops_reached: "<red>Sie haben das Shop-Blocklimit von {max_shops}. Aktuell platzierte Shops: {owned_shops}.</red>"
    shop_protected: "<red>Shops können nicht direkt zerstört werden. Verwenden Sie das Shop-Menü, um den Shop zu schließen.</red>"
    double_chest_requires_shop_block: "<red>Doppeltruhen-Shops erfordern eine zweite <blue>ShopBlock</blue><red>. Normale Truhen können nicht mit Shop-Truhen zusammengeführt werden.</red>"
    double_chest_owner_mismatch: "<red>Dieser ShopBlock gehört einem anderen Besitzer, daher kann er diesen Shop nicht erweitern.</red>"
    shop_already_double_chest: "<red>Dieser Shop verwendet bereits beide Truhenhälften.</red>"
    double_chest_ambiguous: "<red>Dieser ShopBlock berührt mehrere Shop-Truhen. Platzieren Sie es nur neben einem Shop.</red>"

# Ergebnismeldungen zur Verarbeitung geplanter Steuern.
tax_scheduler:
  paid: "<yellow>Eingezogene geplante Shop-Steuer von {amount}. Gezählte Shops: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Sie konnten die geplante Shop-Steuer von nicht bezahlen {amount}. Gezählte Shops: {owned_shops}.</red>"
  charge_failed: "<red>Die geplante Ladensteuer von {amount}. Gezählte Shops: {owned_shops}.</red>"

# Hauptoberfläche der Shop-Übersicht für Eigentümer-/Administratorverwaltungsaktionen.
shop_overview_ui:
  title: "{owner} Geschäft - {location}"
  summary:
    name: "<gold>Shop-Zusammenfassung</gold>"
    player:
      lore:
        - "<gray>Eigentümer:</gray> <white>{owner}</white>"
        - "<gray>Standort:</gray> <white>{location}</white>"
        - "<gray>Gespeicherte Einträge:</gray> <white>{item_count}</white>"
        - "<gray>Shoptyp:</gray> <white>Spielershop</white>"
        - "<gray>Inventar:</gray> <white>Endlich</white>"
    admin:
      lore:
        - "<gray>Eigentümer:</gray> <white>{owner}</white>"
        - "<gray>Standort:</gray> <white>{location}</white>"
        - "<gray>Gespeicherte Einträge:</gray> <white>{item_count}</white>"
        - "<gray>Shoptyp:</gray> <white>Admin-Shop</white>"
        - "<gray>Inventar:</gray> <white>Unendlich</white>"
  finance:
    name: "<gold>Shop-Bank</gold>"
    lore:
      - "<gray>Verfolgte Währungen:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klicken Sie hier, um Geld zu überprüfen und abzuheben.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin-Shop aktiviert</red>"
        lore:
          - "<gray>Dieser Shop ist derzeit ein Admin-Shop.</gray>"
          - "<gray>Der Bestand ist für Kunden unbegrenzt.</gray>"
          - "<gray>Gespeicherte Einträge:</gray> <white>{item_count}</white>"
          - "<yellow>Klicken Sie hier, um zurück zu wechseln ein Spieler-Shop.</yellow>"
      disabled:
        name: "<green>Admin-Shop deaktiviert</green>"
        lore:
          - "<gray>Dieser Shop verwendet derzeit Normal Lagerbestand.</gray>"
          - "<gray>Kunden können nur gespeicherte Mengen kaufen.</gray>"
          - "<gray>Gespeicherte Einträge:</gray> <white>{item_count}</white>"
          - "<yellow>Klicken Sie, um den Admin-Shop-Modus zu aktivieren.</yellow>"
    close:
      name: "<red>Shop schließen</red>"
      lore:
        - "<gray>Diesen Shop entfernen und den Shop-Block zurückgeben.</gray>"
        - "<gray>Gespeicherte Einträge:</gray> <white>{item_count}</white>"
        - "<gray>Verfolgte Bankwährungen:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Der Shop-Bestand muss vor dem Schließen leer sein.</yellow>"
    manage:
      name: "<green>Shop-Artikel hinzufügen</green>"
      lore:
        - "<gray>Neue Artikel in diesem Shop speichern.</gray>"
        - "<gray>Aktuelle Einträge:</gray> <white>{item_count}</white>"
        - "<yellow>Klicken, um Artikeleingabe zu öffnen.</yellow>"
    customer_view:
      name: "<gold>Kundenansicht öffnen</gold>"
      lore:
        - "<gray>Vorschau dieses Shops, wie Kunden ihn sehen.</gray>"
        - "<gray>Aktuelle Einträge:</gray> <white>{item_count}</white>"
        - "<yellow>Klicken Sie, um diesen Shop als Kunde zu durchsuchen.</yellow>"
    trusted:
      name: "<gold>Vertrauenswürdig Spieler</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Vertrauenswürdige Spieler:</gray> <white>{trusted_count}</white>"
        - "<yellow>Klicken, um Shop-Vertrauensstufen zu verwalten.</yellow>"
    ledger:
      name: "<gold>Shop-Ledger</gold>"
      lore:
        - "<gray>Gesamteinträge:</gray> <white>{ledger_count}</white>"
        - "<gray>Käufe:</gray> <white>{purchase_count}</white>"
        - "<gray>Steuern:</gray> <white>{tax_count}</white>"
        - "<yellow>Klicken Sie hier, um den Shop-Transaktionsverlauf zu überprüfen.</yellow>"
    edit:
      name: "<aqua>Shop-Artikel bearbeiten</aqua>"
      lore:
        - "<gray>Preise für gespeicherten Shop bearbeiten Elemente.</gray>"
        - "<gray>Aktuelle Einträge:</gray> <white>{item_count}</white>"
        - "<yellow>Klicken Sie, um Preise und Währungen zu bearbeiten.</yellow>"
    storage:
      name: "<gold>Gespeicherte Artikel anzeigen</gold>"
      lore:
        - "<gray>Überprüfen Sie Artikel bereits in diesem Shop gespeichert.</gray>"
        - "<gray>Aktuelle Einträge:</gray> <white>{item_count}</white>"
        - "<yellow>Klicken Sie, um gespeicherte Artikel abzuheben.</yellow>"
    locked:
      name: "<red>Shop gesperrt</red>"
      lore:
        - "<gray>Nur der Besitzer kann Artikel hinzufügen.</gray>"
        - "<gray>Aktuelle Einträge:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Sie haben keine Berechtigung, diesen Shop zu verwalten.</red>"
    no_admin_permission: "<red>Sie haben keine Berechtigung, Admin-Shops umzuschalten.</red>"
    admin_limit_reached: "<red>Der Server hat bereits {admin_shops} Admin-Shops. In der kostenlosen Edition sind nur {max_admin_shops} Admin-Shops.</red>"
    admin_enabled: "<green>Dieser Shop ist jetzt ein Admin-Shop mit unbegrenztem Kundenbestand. Gezählte Shops: {owned_shops}.</green>"
    admin_disabled: "<yellow>Dieser Shop ist jetzt ein normaler Spielershop mit begrenztem Kundenbestand. Gezählte Shops: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Sie können diesen Admin-Shop nicht wieder in einen Player-Shop umwandeln, da Ihr Shop-Limit von {max_shops} und ist bereits erreicht. Gezählte Geschäfte: {owned_shops}.</red>"
    close_not_empty: "<red>Sie können einen Shop erst schließen, nachdem Sie alle gespeicherten Artikel entfernt haben. Verbleibende Einträge: {item_count}.</red>"
    close_bank_not_empty: "<red>Zahlen Sie Ihr Shop-Konto ab, bevor Sie diesen Shop schließen. Verbleibende verfolgte Währungen: {bank_currency_count}.</red>"
    closed: "<green>Shop geschlossen und {returned_blocks} ShopBlock(s). Gezählte Shops: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Shop nicht Gefunden</red>"
      lore:
        - "<gray>Dieser Shop konnte nicht aus dem Speicher geladen werden.</gray>"
      message: "<red>Dieser Shop konnte nicht aus dem Speicher geladen werden.</red>"

# Globales Admin-Kontrollfeld für die RDS-Verwaltung.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Admin Panel</white>"
    lore:
      - "<gray>Verwalten Sie globale Admin-Shop-Systeme von einem Ort aus.</gray>"
      - "<gray>Öffnen Sie die Serverbank oder bearbeiten Sie die Konfigurationseinstellungen unten.</gray>"
      - "<yellow>Erfordert: </yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Serverbank</gradient>"
      lore:
        - "<gray>Überprüfen Sie die in die Serverbank übertragenen Admin-Shop-Einnahmen.</gray>"
        - "<gray>Überprüfen Sie den Zeitpunkt des nächsten Abrufs und heben Sie Guthaben ab.</gray>"
        - "<yellow>Klicken, um Server zu öffnen Bankkontrollen.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop-Konfiguration</gradient>"
      lore:
        - "<gray>Werte bearbeiten aus</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Jede editierbare Einstellung kann über eine Amboss-Eingabeaufforderung geändert werden.</gray>"
        - "<yellow>Klicken, um Konfigurationskontrollen zu öffnen.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Währungsmanager</gradient>"
      lore:
        - "<gray>Überprüfen Sie erkannte Währungen aus Vault und JExEconomy.</gray>"
        - "<gray>Erstellen Sie die Standardwährung.</gray> <white>raindrops</white> <gray>Währung wann benötigt.</gray>"
        - "<yellow>Klicken, um Währungskontrollen zu öffnen.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratorzugriff erforderlich</white>"
      lore:
        - "<gray>Sie haben keine Berechtigung, diesen Admin zu verwenden Panel.</gray>"

# Admin-Währungsansicht für erkannte Anbieter und Standardwährungserstellung.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Währungsmanager</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Währungsanbieter</white>"
    lore:
      - "<gray>Erkannt Währungen:</gray> <white>{currency_count}</white>"
      - "<gray>Tresor verfügbar:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy verfügbar:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Verwenden Sie die Kristallschaltfläche, um einen Standard zu erstellen Währung.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Anbieter:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Präfix:</gray> <white>{prefix}</white>"
      - "<gray>Suffix:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Erstellen {currency_id}</white>"
      lore:
        - "<gray>Erstellen Sie die Standard-RDS-Währung in JExEconomy.</gray>"
        - "<yellow>Klicken Sie, um {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy erforderlich</white>"
      lore:
        - "<gray>Sie können keine Standardwährung ohne JExEconomy erstellen.</gray>"
        - "<gray>Installieren und aktivieren Sie zuerst JExEconomy.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id}Bereit</white>"
      lore:
        - "<gray>Die Standardwährung existiert bereits.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Erstellen Sie eine Standardwährung:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray> konnte nicht eingezogen werden. Die Währung konnte nicht erstellt werden: </gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Währung existiert bereits:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie können diese Schaltfläche nur verwenden, wenn JExEconomy verfügbar ist.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Keine Währungen erkannt</white>"
      lore:
        - "<gray>Es wurden keine Vault- oder JExEconomy-Währungen erkannt.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratorzugriff erforderlich</white>"
      lore:
        - "<gray>Sie haben keine Berechtigung, diese Währungsansicht zu verwenden.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Sie haben keine Berechtigung, Währungen zu verwalten.</gray>"
  decoration:
    border:
      name: " "

# Konfigurieren Sie die Browser-Benutzeroberfläche für bearbeitbare Einstellungen und Update-Feedback.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop-Konfiguration</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Konfigurationseinstellungen</white>"
    lore:
      - "<gray>Bearbeitbare Einstellungen erkannt:</gray> <white>{setting_count}</white>"
      - "<gray>Klicken Sie auf einen beliebigen Eintrag unten, um seinen Wert in einem zu bearbeiten Amboss.</gray>"
      - "<yellow>Änderungen werden direkt geschrieben config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Pfad:</gray> <white>{config_path}</white>"
      - "<gray>Typ:</gray> <white>{value_type}</white>"
      - "<gray>Aktueller Wert:</gray> <white>{current_value}</white>"
      - "<yellow>Klicken Sie, um diese Einstellung zu bearbeiten.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Boolean]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Integer]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Long]</gradient>"
