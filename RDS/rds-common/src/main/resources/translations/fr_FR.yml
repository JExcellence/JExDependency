# ============================================
# GLOBAL PREFIX
# ============================================
# Préfixe ajouté au chat général du plugin sortie.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Lignes récapitulatives rapides destinées au joueur pour la boutique, la banque et le statut fiscal.
info:
  total: "<blue>Boutiques :</blue> <white>{owned_shops}</white>"
  bank: "<green>Soldes suivis ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Taxe planifiée ({taxed_shops} boutiques taxables :</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Taxe suivante :</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Messages d'inscription affichés lorsque les joueurs entrent sur le serveur.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} boutique(s) taxable(s)\n[<blue>Montant<yellow>]\n{taxes}\n<red>Échéance :<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Chaînes de réponse à la commande pour les fonctionnalités et les bascules `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Ouverture des blocs de boutique <white>RDS Admin</white><gray>.</gray>"
  bar:
    enabled: "<green>Barre de patron de boutique activée lors de la consultation d'une boutique.</green>"
    disabled: "<yellow>Barre du patron de la boutique. désactivé.</yellow>"
  give:
    syntax: "<red>Utilisation : /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Utilisation :</gray> <white>/rs scoreboard &lt;ledger|stock&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Activé le <white>{scoreboard_type}</white><gray> barre latérale.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Désactivé, les <white>{scoreboard_type}</white><gray> barre latérale.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Passage au <white>{scoreboard_type}</white><gray> barre latérale.</gray>"
    type:
      ledger: "<gold>ledger</gold>"
      stock: "<aqua>stock</aqua>"

# Étiquettes du tableau de bord de la barre latérale et formatage des valeurs.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Grand livre ◆</gradient>"
    transactions: "<yellow>Tx :</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Totaux bancaires</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Aucun fonds en banque</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Stock ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stock :</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Aucune boutique de joueurs</red>"

# Texte de la barre de patron affiché lors du ciblage d'un boutique.
shop_boss_bar:
  title: "<gold>{shop_type} Boutique</gold> <gray>|</gray> <yellow>Propriétaire :</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Articles :</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Emplacement :</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Stock limité"
    infinite: "Infinite"
    various: "Divers"

# ============================================
# Boutons GUI
# ============================================

# Nom de l'article de blocage de la boutique et métadonnées de l'histoire.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Placez ce bloc pour configurer votre boutique.</yellow>"

# Étiquettes de l'interface utilisateur de présentation de la boutique, traditions et états de disponibilité.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Magasin de boutique</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Blocs de boutique détenus</gradient>"
    lore:
      - "<gray>Propriétaire :</gray> <white>{owned_shops}</white>"
      - "<gray>Ceci suit les achats ou les autorisations</gray>"
      - "<gray>ShopBlock propriété.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Limite de bloc de boutique</gradient>"
    lore:
      - "<gray>Propriétaire :</gray> <white>{owned_shops}</white>"
      - "<gray>Blocs de boutique maximum :</gray> <white>{max_shops}</white>"
      - "<gray>Cette limite contrôle le nombre de boutiques</gray>"
      - "<gray>blocs que vous pouvez débloquer.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Exigences du magasin</gradient>"
    lore:
      - "<gray>Exigences configurées :</gray> <white>{requirement_count}</white>"
      - "<gray>Nombre de besoins actuels :</gray> <white>{requirements}</white>"
      - "<gray>Statut :</gray> <white>{availability}</white>"
      - "<yellow>Cliquez pour inspecter la boutique suivante tier.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Prêt]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[En attente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Hors ligne]</gradient>"

# Interface utilisateur des exigences de niveau de la boutique, affichage de la progression et commentaires sur l'achat.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Niveau de magasin {purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Acheter un bloc de boutique</gradient>"
    lore:
      - "<gray>Niveau d'achat :</gray> <white>{purchase_number}</white>"
      - "<gray>Propriétaire :</gray> <white>{owned_shops}</white>"
      - "<gray>Blocs de boutique maximum :</gray> <white>{max_shops}</white>"
      - "<gray>Exigences configurées :</gray> <white>{requirement_count}</white>"
      - "<gray>Actuellement atteint :</gray> <white>{met_count}</white>"
      - "<gray>Statut :</gray> <white>{availability}</white>"
      - "<yellow>Cliquez pour acheter lorsque ce niveau est prêt.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Prêt]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[En attente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Hors ligne]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratuit]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratuit] Non Exigences</gradient>"
    lore:
      - "<gray>Ce niveau d'achat n'a aucune exigence configurée.</gray>"
      - "<yellow>Vous pouvez acheter ce bloc de boutique sans chèques supplémentaires.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req] {requirement_name}</gradient>"
    lore:
      - "<gray>Clé :</gray> <white>{requirement_key}</white>"
      - "<gray>Type :</gray> <white>{requirement_type}</white>"
      - "<gray>Statut :</gray> <white>{status}</white>"
      - "<gray>Progression :</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Résumé :</gray> <white>{summary}</white>"
      - "<yellow>Cliquez avec le bouton droit sur les exigences compatibles pour mettre en banque. progression.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Détaillé Chèques</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Met]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[En attente]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Indisponible]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Acheté un bloc de boutique. Conditions requises :</gray> <white>{requirements}</white><gray>. Blocs de magasins détenus :</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous ne rencontrez actuellement pas <white>{requirement}</white><gray>. Exigences du magasin :</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Les exigences du magasin <white>{requirement}</white><gray> n'est pas disponible ou n'est pas valide pour le moment.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous avez atteint la limite de bloc de boutique de <white>{max_shops}</white><gray>. Blocs de magasins détenus :</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> est maintenant prêt.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Progression stockée pour <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Aucun objet ou devise correspondant n'était disponible pour <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> ne prend pas en charge la progression en banque.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> n'est pas disponible pour le moment.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Votre profil RDS n'a pas pu être chargé, la progression n'a donc pas pu être enregistré.</gray>"

# Bloquer les erreurs de validation d'interaction et les avis de protection.
block_listener:
  error:
    invalid_owner_uuid: "<red>Impossible de lire le propriétaire de la boutique depuis cet article.</red>"
    not_owner: "<red>Ce ShopBlock appartient à un autre joueur et vous ne pouvez pas le placer.</red>"
    max_shops_reached: "<red>Vous avez atteint la limite de boutique de {max_shops}. Boutiques actuellement placées : {owned_shops}.</red>"
    shop_protected: "<red>Les magasins ne peuvent pas être détruits directement. Utilisez le menu de la boutique pour fermer la boutique.</red>"
    double_chest_requires_shop_block: "<red>Les boutiques à double coffre nécessitent une seconde <blue>ShopBlock</blue><red>. Les coffres normaux ne peuvent pas fusionner avec les coffres de magasin.</red>"
    double_chest_owner_mismatch: "<red>Ce ShopBlock appartient à un autre propriétaire, il ne peut donc pas étendre cette boutique.</red>"
    shop_already_double_chest: "<red>Cette boutique utilise déjà les deux moitiés de poitrine.</red>"
    double_chest_ambiguous: "<red>Ce ShopBlock touche plusieurs coffres de boutique. Placez-le à côté d'une seule boutique.</red>"

# Messages de résultat du traitement des taxes planifié.
tax_scheduler:
  paid: "<yellow>Taxe de magasin planifiée collectée de {amount}. Magasins dénombrés : {owned_shops}.</yellow>"
  insufficient_funds: "<red>Vous ne pouvez pas payer la taxe de boutique prévue de {amount}. Magasins dénombrés : {owned_shops}.</red>"
  charge_failed: "<red>Échec de la collecte de la taxe de magasin programmée de {amount}. Magasins dénombrés : {owned_shops}.</red>"

# Interface de présentation principale de la boutique pour les actions de gestion propriétaire/administrateur.
shop_overview_ui:
  title: "{owner} Boutique - {location}"
  summary:
    name: "<gold>Résumé de la boutique</gold>"
    player:
      lore:
        - "<gray>Propriétaire:</gray> <white>{owner}</white>"
        - "<gray>Emplacement:</gray> <white>{location}</white>"
        - "<gray>Entrées stockées :</gray> <white>{item_count}</white>"
        - "<gray>Type de magasin :</gray> <white>Boutique des joueurs</white>"
        - "<gray>Inventaire:</gray> <white>Fini</white>"
    admin:
      lore:
        - "<gray>Propriétaire:</gray> <white>{owner}</white>"
        - "<gray>Emplacement:</gray> <white>{location}</white>"
        - "<gray>Entrées stockées :</gray> <white>{item_count}</white>"
        - "<gray>Type de magasin :</gray> <white>Boutique administrative</white>"
        - "<gray>Inventaire:</gray> <white>Infini</white>"
  finance:
    name: "<gold>Boutique Banque</gold>"
    lore:
      - "<gray>Devises suivies :</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Cliquez pour examiner et retirer des fonds.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Boutique admin activée</red>"
        lore:
          - "<gray>Cette boutique est actuellement une boutique d'administration.</gray>"
          - "<gray>L'inventaire est infini pour les clients.</gray>"
          - "<gray>Entrées stockées :</gray> <white>{item_count}</white>"
          - "<yellow>Cliquez pour revenir à une boutique de joueur.</yellow>"
      disabled:
        name: "<green>Boutique admin désactivée</green>"
        lore:
          - "<gray>Cette boutique utilise actuellement le mode normal. stock.</gray>"
          - "<gray>Les clients ne peuvent acheter que les quantités stockées.</gray>"
          - "<gray>Entrées stockées :</gray> <white>{item_count}</white>"
          - "<yellow>Cliquez pour activer le mode boutique admin.</yellow>"
    close:
      name: "<red>Fermer la boutique</red>"
      lore:
        - "<gray>Supprimez cette boutique et renvoyez le bloc de boutique.</gray>"
        - "<gray>Entrées stockées :</gray> <white>{item_count}</white>"
        - "<gray>Devises bancaires suivies :</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Le stock de la boutique doit être vide avant la fermeture.</yellow>"
    manage:
      name: "<green>Ajouter des articles de la boutique</green>"
      lore:
        - "<gray>Stocker les nouveaux articles dans cette boutique.</gray>"
        - "<gray>Entrées actuelles :</gray> <white>{item_count}</white>"
        - "<yellow>Cliquez pour ouvrir la saisie des éléments.</yellow>"
    customer_view:
      name: "<gold>Ouvrir la vue client</gold>"
      lore:
        - "<gray>Prévisualisez cette boutique telle que les clients la voient.</gray>"
        - "<gray>Entrées actuelles :</gray> <white>{item_count}</white>"
        - "<yellow>Cliquez pour parcourir cette boutique en tant que client.</yellow>"
    trusted:
      name: "<gold>Joueurs de confiance</gold>"
      lore:
        - "<gray>Associés :</gray> <white>{associate_count}</white>"
        - "<gray>Joueurs de confiance :</gray> <white>{trusted_count}</white>"
        - "<yellow>Cliquez pour gérer les niveaux de confiance de la boutique.</yellow>"
    ledger:
      name: "<gold>Ledger de boutique</gold>"
      lore:
        - "<gray>Total des entrées :</gray> <white>{ledger_count}</white>"
        - "<gray>Achats :</gray> <white>{purchase_count}</white>"
        - "<gray>Taxes :</gray> <white>{tax_count}</white>"
        - "<yellow>Cliquez pour consulter l'historique des transactions de la boutique.</yellow>"
    edit:
      name: "<aqua>Modifier les articles de la boutique</aqua>"
      lore:
        - "<gray>Modifier les prix de la boutique stockée éléments.</gray>"
        - "<gray>Entrées actuelles :</gray> <white>{item_count}</white>"
        - "<yellow>Cliquez pour modifier les prix et les devises.</yellow>"
    storage:
      name: "<gold>Voir les articles stockés</gold>"
      lore:
        - "<gray>Examiner articles déjà stockés dans cette boutique.</gray>"
        - "<gray>Entrées actuelles :</gray> <white>{item_count}</white>"
        - "<yellow>Cliquez pour retirer les articles stockés.</yellow>"
    locked:
      name: "<red>Boutique verrouillée</red>"
      lore:
        - "<gray>Seul le propriétaire peut ajouter des éléments.</gray>"
        - "<gray>Entrées actuelles :</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Vous n'avez pas l'autorisation de gérer cette boutique.</red>"
    no_admin_permission: "<red>Vous n'avez pas l'autorisation de basculer entre les boutiques d'administration.</red>"
    admin_limit_reached: "<red>Le serveur a déjà {admin_shops} boutiques administratives. L'édition gratuite permet uniquement de {max_admin_shops} boutiques administratives.</red>"
    admin_enabled: "<green>Cette boutique est désormais une boutique administrative avec un inventaire de clients infini. Boutiques comptées : {owned_shops}.</green>"
    admin_disabled: "<yellow>Cette boutique est désormais une boutique de joueurs normale avec un inventaire de clients limité. Boutiques comptées : {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Vous ne pouvez pas reconvertir cette boutique d'administration en boutique de joueur car la limite de votre boutique est de {max_shops} est déjà atteint. Magasins dénombrés : {owned_shops}.</red>"
    close_not_empty: "<red>Vous ne pouvez fermer une boutique qu'après avoir supprimé tous les articles stockés. Entrées restantes : {item_count}.</red>"
    close_bank_not_empty: "<red>Retirez la banque de votre boutique avant de fermer cette boutique. Devises suivies restantes : {bank_currency_count}.</red>"
    closed: "<green>Fermé la boutique et retourné {returned_blocks} ShopBlock(s). Boutiques comptées : {owned_shops}.</green>"
    shop_missing:
      name: "<red>Boutique Introuvable</red>"
      lore:
        - "<gray>Cette boutique n'a pas pu être chargée à partir du stockage.</gray>"
      message: "<red>Cette boutique n'a pas pu être chargée à partir du stockage.</red>"

# Panneau de contrôle d'administration global pour la gestion RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Contrôle</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Admin Panel</white>"
    lore:
      - "<gray>Gérez les systèmes d'administration globaux de la boutique à partir d'un seul endroit.</gray>"
      - "<gray>Ouvrez la banque de serveurs ou modifiez les paramètres de configuration. ci-dessous.</gray>"
      - "<yellow>Requiert :</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Banque de serveur</gradient>"
      lore:
        - "<gray>Examinez les revenus de l'administration de la boutique extraits de la banque du serveur.</gray>"
        - "<gray>Vérifier le prochain timing de retrait et retirer les soldes.</gray>"
        - "<yellow>Cliquez pour ouvrir contrôles bancaires du serveur.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuration de la boutique</gradient>"
      lore:
        - "<gray>Modifier les valeurs de</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Chaque paramètre modifiable peut être modifié via une invite d'enclume.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de configuration.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Gestionnaire de devises</gradient>"
      lore:
        - "<gray>Examinez les devises détectées dans Vault et JExEconomy.</gray>"
        - "<gray>Créer la devise par défaut</gray> <white>raindrops</white> <gray>devise lorsque nécessaire.</gray>"
        - "<yellow>Cliquez pour ouvrir les contrôles de devises.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Accès administrateur requis</white>"
      lore:
        - "<gray>Vous n'êtes pas autorisé à utiliser cet administrateur. panel.</gray>"

# Vue de la devise d'administration pour les fournisseurs détectés et création de devise par défaut.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Gestionnaire de devises</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Fournisseurs de devises</white>"
    lore:
      - "<gray>Détecté devises :</gray> <white>{currency_count}</white>"
      - "<gray>Coffre disponible :</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy disponible :</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Utilisez le bouton de cristal pour créer un stock par défaut. devise.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Fournisseur :</gray> <white>{provider}</white>"
      - "<gray>Symbole :</gray> <white>{symbol}</white>"
      - "<gray>Préfixe :</gray> <white>{prefix}</white>"
      - "<gray>Suffixe :</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Créer {currency_id}</white>"
      lore:
        - "<gray>Créer la devise RDS par défaut dans JExEconomy.</gray>"
        - "<yellow>Cliquez pour créer {currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy requis</white>"
      lore:
        - "<gray>Vous ne pouvez pas créer de devise par défaut sans JExEconomy.</gray>"
        - "<gray>Installez et activez JExEconomy en premier.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id}Prêt</white>"
      lore:
        - "<gray>La devise par défaut existe déjà.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Devise par défaut créée :</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Échec de la création de la devise :</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>La devise existe déjà :</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous ne pouvez pas utiliser ce bouton à moins que JExEconomy soit disponible.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Aucune devise détectée</white>"
      lore:
        - "<gray>Aucune devise Vault ou JExEconomy n'a été détectée.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Accès administrateur requis</white>"
      lore:
        - "<gray>Vous n'avez pas l'autorisation d'utiliser cette vue de devise.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Vous n'avez pas l'autorisation de gérer les devises.</gray>"
  decoration:
    border:
      name: " "

# Interface utilisateur du navigateur de configuration pour les paramètres modifiables et les commentaires de mise à jour.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Configuration de la boutique</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Paramètres de configuration</white>"
    lore:
      - "<gray>Paramètres modifiables détectés :</gray> <white>{setting_count}</white>"
      - "<gray>Cliquez sur n'importe quelle entrée ci-dessous pour modifier sa valeur dans un anvil.</gray>"
      - "<yellow>Les modifications sont écrites directement dans config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Set]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Chemin :</gray> <white>{config_path}</white>"
      - "<gray>Type :</gray> <white>{value_type}</white>"
      - "<gray>Valeur actuelle :</gray> <white>{current_value}</white>"
      - "<yellow>Cliquez pour modifier ce paramètre.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[Booléen]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Integer]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Long]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Double]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[List]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[String]</gradient>"
  feedback:
    empty:
