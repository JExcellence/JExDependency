# ============================================
# GLOBAL PREFIX
# ============================================
# 접두사에 잠겨 있습니다. 플러그인 채팅 출력.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# 상점, 은행 및 세금 상태에 대한 빠른 플레이어 표시 요약 줄.
info:
  total: "<blue>상점:</blue> <white>{owned_shops}</white>"
  bank: "<green>추적된 잔고({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>예정세로 저장했습니다({taxed_shops} 과세 상점):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>다음 세금:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# 플레이어가 서버에 들어갈 때 표시되는 조인 타임 메시지.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} 과세 상점\n[<blue>Amount<yellow>]\n{taxes}\n<red>가 필요합니다. 기한:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# 에 대한 명령 응답 문자열 `/rs` 기능 및 토글.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray><white>RDS 관리자</white><gray> 패널.</gray>"
  bar:
    enabled: "<green>상점을 보는 동안 상점 보스 바가 활성화되었습니다.</green>"
    disabled: "<yellow>상점 보스 바가 비활성화되었습니다.</yellow>"
  give:
    syntax: "<red>사용: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>사용:</gray> <white>/rs 점수판 &lt;원장|재고&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray><white>{scoreboard_type}</white><gray> 사이드바.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray><white>{scoreboard_type}</white><gray> 사이드바.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray><white>{scoreboard_type}</white><gray> 사이드바.</gray>"
    type:
      ledger: "<gold>원장</gold>"
      stock: "<aqua>stock</aqua>"

# 사이드바 점수판 레이블 및 값 형식.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] 원장 ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ 은행 총액</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>은행 자금 없음</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] 재고 ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>재고:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>플레이어 상점이 없습니다</red>"

# 보스 바 텍스트 표시 상점을 타겟팅합니다.
shop_boss_bar:
  title: "<gold>{shop_type} 상점</gold> <gray>|</gray> <yellow>소유자:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>항목:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>위치:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Limited Stock"
    infinite: "무한"
    various: "Various"

# ============================================
# GUI 버튼
# ============================================

# 상점 블록 항목 이름 및 지식 메타데이터.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>상점을 설정하려면 이 블록을 배치하십시오.</yellow>"

# 상점 상점 개요 UI 라벨, 지식 및 가용성 상태.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] 상점 상점</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] 소유 상점 블록</gradient>"
    lore:
      - "<gray>오픈 상점 블록:</gray> <white>{owned_shops}</white>"
      - "<gray>이 트랙이 구매되었거나 부여되었습니다.</gray>"
      - "<gray>ShopBlock 소유권.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Shop Block Limit</gradient>"
    lore:
      - "<gray>오픈 상점 블록:</gray> <white>{owned_shops}</white>"
      - "<gray>최대 상점 블록:</gray> <white>{max_shops}</white>"
      - "<gray>이 제한은 상점 수를 제어합니다.</gray>"
      - "<gray>잠금을 해제할 수 있는 블록입니다.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[요청] 매장 요구사항</gradient>"
    lore:
      - "<gray>구성 요구 사항:</gray> <white>{requirement_count}</white>"
      - "<gray>현재 요구 사항 수:</gray> <white>{requirements}</white>"
      - "<gray>상태:</gray> <white>{availability}</white>"
      - "<yellow>다음 상점을 살펴보려면 클릭하세요 tier.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[준비가 된]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[보류 중]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[오프라인]</gradient>"

# 상점 계층 요구 사항 UI, 진행률 표시 및 구매 피드백
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[요청] 샵티어{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] 상점 블록 구매</gradient>"
    lore:
      - "<gray>구매 등급:</gray> <white>{purchase_number}</white>"
      - "<gray>오픈 상점 블록:</gray> <white>{owned_shops}</white>"
      - "<gray>최대 상점 블록:</gray> <white>{max_shops}</white>"
      - "<gray>구성 요구 사항:</gray> <white>{requirement_count}</white>"
      - "<gray>현재 충족:</gray> <white>{met_count}</white>"
      - "<gray>상태:</gray> <white>{availability}</white>"
      - "<yellow>이 계층이 준비되면 구매하려면 클릭하십시오.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[준비가 된]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[보류 중]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[오프라인]</gradient>"
    none: "<gradient:#10b981:#34d399>[무료]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[무료] 요구 사항 없음</gradient>"
    lore:
      - "<gray>이 구매 계층에는 구성된 요구 사항이 없습니다.</gray>"
      - "<yellow>추가 확인 없이 이 상점 블록을 구입할 수 있습니다.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[요구사항]{requirement_name}</gradient>"
    lore:
      - "<gray>키:</gray> <white>{requirement_key}</white>"
      - "<gray>유형:</gray> <white>{requirement_type}</white>"
      - "<gray>상태:</gray> <white>{status}</white>"
      - "<gray>진행:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>요약:</gray> <white>{summary}</white>"
      - "<yellow>은행 진행을 위한 호환 요구 사항을 마우스 오른쪽 버튼으로 클릭하십시오.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ 상세 수표</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[만났어요]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[보류 중]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[없는]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>상점 블록을 구매했습니다. 소비된 요구 사항:</gray> <white>{requirements}</white><gray>. 소유한 상점 블록:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>현재 <white>{requirement}</white><gray>. 스토어 요구 사항:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>상점 요구 사항 <white>{requirement}</white><gray>은(는) 지금 사용할 수 없거나 유효하지 않습니다.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray>상점 차단 한도 <white>{max_shops}</white><gray>. 소유한 상점 블록:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>은(는) 이제 준비되었습니다.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>저장된 진행률 <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray><white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray><white>{requirement}</white><gray>는 뱅킹 진행을 지원하지 않습니다.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[엑스]</gradient> <gray><white>{requirement}</white><gray>는 지금 사용할 수 없습니다.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDS 프로필을 로드할 수 없어 진행을 진행할 수 없습니다. 저장된.</gray>"

# 차단 상호 작용 확인 오류 및 보호 알림.
block_listener:
  error:
    invalid_owner_uuid: "<red>이 항목에서 상점 주인을 읽을 수 없습니다.</red>"
    not_owner: "<red>이 ShopBlock은 다른 플레이어의 것이므로 귀하가 설치할 수 없습니다.</red>"
    max_shops_reached: "<red>에 도달했습니다.상점 한도 {max_shops}. 현재 배치된 상점: {owned_shops}.</red>"
    shop_protected: "<red>상점은 직접 파괴할 수 없습니다. 상점을 닫으려면 상점 메뉴를 사용하십시오.</red>"
    double_chest_requires_shop_block: "<red>비활성화됨이중 상자 상점에는 두 번째 <blue>ShopBlock</blue><red>. 일반 상자는 상점 상자와 합쳐질 수 없습니다.</red>"
    double_chest_owner_mismatch: "<red>이 ShopBlock은 다른 소유자의 것이므로 이 상점을 확장할 수 없습니다.</red>"
    shop_already_double_chest: "<red>이 상점은 이미 양쪽 가슴 반쪽을 모두 사용하고 있습니다.</red>"
    double_chest_ambiguous: "<red>이 ShopBlock은 여러 상점 상자에 닿습니다. 단 하나의 상점 옆에 배치하십시오.</red>"

# 예정된 세금 처리 결과 메시지.
tax_scheduler:
  paid: "<yellow>징수된 예정된 상점 세금 {amount}. 계산된 상점: {owned_shops}.</yellow>"
  insufficient_funds: "<red>예정된 상점 세금을 지불할 수 없습니다. of {amount}. 계산된 상점: {owned_shops}.</red>"
  charge_failed: "<red>{amount}. 계산된 상점: {owned_shops}.</red>"

# 소유자/관리자 관리 작업을 위한 주요 상점 개요 인터페이스입니다.
shop_overview_ui:
  title: "{owner} 가게 - {location}"
  summary:
    name: "<gold>상점 요약</gold>"
    player:
      lore:
        - "<gray>소유자:</gray> <white>{owner}</white>"
        - "<gray>위치:</gray> <white>{location}</white>"
        - "<gray>저장된 항목:</gray> <white>{item_count}</white>"
        - "<gray>상점 유형:</gray> <white>플레이어 상점</white>"
        - "<gray>목록:</gray> <white>한정된</white>"
    admin:
      lore:
        - "<gray>소유자:</gray> <white>{owner}</white>"
        - "<gray>위치:</gray> <white>{location}</white>"
        - "<gray>저장된 항목:</gray> <white>{item_count}</white>"
        - "<gray>상점 유형:</gray> <white>관리 상점</white>"
        - "<gray>목록:</gray> <white>무한</white>"
  finance:
    name: "<gold>상점 은행</gold>"
    lore:
      - "<gray>추적된 통화:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>자금을 검토하고 인출하려면 클릭하세요.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop 활성화</red>"
        lore:
          - "<gray>이 상점은 현재 관리 상점입니다.</gray>"
          - "<gray>에 대한 입력이 잘못되었습니다. 고객의 재고는 무한합니다.</gray>"
          - "<gray>저장된 항목:</gray> <white>{item_count}</white>"
          - "<yellow>한계로 다시 전환하려면 클릭하십시오. 플레이어 상점.</yellow>"
      disabled:
        name: "<green>Admin Shop 비활성화됨</green>"
        lore:
          - "<gray>이 상점은 현재 일반을 사용합니다. 재고.</gray>"
          - "<gray>고객은 저장된 금액만 구매할 수 있습니다.</gray>"
          - "<gray>저장된 항목:</gray> <white>{item_count}</white>"
          - "<yellow>관리 상점 모드를 활성화하려면 클릭하세요.</yellow>"
    close:
      name: "<red>상점 폐쇄</red>"
      lore:
        - "<gray>이 상점을 제거하고 상점 블록을 반환합니다.</gray>"
        - "<gray>저장된 항목:</gray> <white>{item_count}</white>"
        - "<gray>추적된 은행 통화:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>닫히기 전에 상점 재고가 비어 있어야 합니다.</yellow>"
    manage:
      name: "<green>상점 항목 추가</green>"
      lore:
        - "<gray>새 항목을 여기에 저장 shop.</gray>"
        - "<gray>현재 항목:</gray> <white>{item_count}</white>"
        - "<yellow>항목 입력을 열려면 클릭하십시오.</yellow>"
    customer_view:
      name: "<gold>고객 보기 열기</gold>"
      lore:
        - "<gray>고객이 보는 대로 이 상점을 미리 보십시오.</gray>"
        - "<gray>현재 항목:</gray> <white>{item_count}</white>"
        - "<yellow>고객으로서 이 상점을 탐색하려면 클릭하세요.</yellow>"
    trusted:
      name: "<gold>Trusted Players</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Trusted 플레이어:</gray> <white>{trusted_count}</white>"
        - "<yellow>상점 신뢰 수준을 관리하려면 클릭하십시오.</yellow>"
    ledger:
      name: "<gold>상점 원장</gold>"
      lore:
        - "<gray>총 항목 수:</gray> <white>{ledger_count}</white>"
        - "<gray>구매:</gray> <white>{purchase_count}</white>"
        - "<gray>세금:</gray> <white>{tax_count}</white>"
        - "<yellow>상점 거래 내역을 검토하려면 클릭하십시오.</yellow>"
    edit:
      name: "<aqua>상점 항목 편집</aqua>"
      lore:
        - "<gray>저장된 상점의 가격 편집 items.</gray>"
        - "<gray>현재 항목:</gray> <white>{item_count}</white>"
        - "<yellow>가격과 통화를 편집하려면 클릭하세요.</yellow>"
    storage:
      name: "<gold>Stored Items 보기</gold>"
      lore:
        - "<gray>이 상점에 이미 저장된 품목을 검토하십시오.</gray>"
        - "<gray>현재 항목:</gray> <white>{item_count}</white>"
        - "<yellow>저장된 자금을 인출하려면 클릭하십시오. items.</yellow>"
    locked:
      name: "<red>상점 잠김</red>"
      lore:
        - "<gray>오너만 항목을 추가할 수 있습니다.</gray>"
        - "<gray>현재 항목:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>이 샵을 관리할 수 있는 권한이 없습니다.</red>"
    no_admin_permission: "<red>어드민 샵을 전환할 수 있는 권한이 없습니다.</red>"
    admin_limit_reached: "<red>서버에 이미 {admin_shops} 관리 상점. 무료 버전에서는 {max_admin_shops} 관리 상점.</red>"
    admin_enabled: "<green>이 상점은 이제 무한한 고객 재고를 갖춘 관리 상점입니다. 계산된 상점: {owned_shops}.</green>"
    admin_disabled: "<yellow>이 상점은 이제 한정된 고객 재고를 갖춘 일반 플레이어 상점입니다. 계산된 상점: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red> 상점 한도가 {max_shops}에 이미 도달했습니다. 집계된 상점: {owned_shops}.</red>"
    close_not_empty: "<red>저장된 항목을 모두 제거한 후에만 상점을 닫을 수 있습니다. 남은 항목: {item_count}.</red>"
    close_bank_not_empty: "<red>이 매장을 닫기 전에 Shop Bank를 인출하세요. 남은 추적 통화: {bank_currency_count}.</red>"
    closed: "<green>상점을 폐쇄하고 {returned_blocks} ShopBlock. 계산된 상점: {owned_shops}.</green>"
    shop_missing:
      name: "<red>상점을 찾을 수 없음</red>"
      lore:
        - "<gray>이 상점은 스토리지에서 로드할 수 없습니다.</gray>"
      message: "<red>이 상점은 스토리지에서 로드할 수 없습니다.</red>"

# RDS 관리를 위한 전역 관리자 제어판.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS 관리자 패널</white>"
    lore:
      - "<gray>글로벌 관리 상점 시스템을 한 곳에서 관리합니다.</gray>"
      - "<gray>오픈 서버 뱅크, 구성 및 통합 제어는 아래에 나와 있습니다.</gray>"
      - "<yellow>필요:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
