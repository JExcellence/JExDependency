# ============================================
# ГЛОБАЛЬНЫЙ ПРЕФИКС
# ============================================
# Prefix добавляется к общему выводу чата плагина.
prefix: "<gradient:#a855f7:#c084fc>[РДС]</gradient> "

# Быстрые сводные строки для игроков о магазине, банке и налоговом статусе.
info:
  total: "<blue>Магазины:</blue> <white>{owned_shops}</white>"
  bank: "<green>Отслеживаемые балансы ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Запланированный налог ({taxed_shops} налогооблагаемые магазины:</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Следующий налог:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Сообщения о времени присоединения, отображаемые при входе игроков на сервер.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} налогооблагаемые магазины\n[<blue>Amount<yellow>]\n{taxes}\n<red>Срок:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Строки ответа команды для функций и переключателей `/rs`.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Открыл <white>Администратор RDS</white><gray> панель.</gray>"
  bar:
    enabled: "<green>Панель босса магазина включена при просмотре магазина.</green>"
    disabled: "<yellow>Панель босса магазина отключена.</yellow>"
  give:
    syntax: "<red>Использование: /rs дать<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray>Использование:</gray> <white>/rs табло &lt;бухгалтерская книга|акции&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Включен <white>{scoreboard_type}</white><gray> боковая панель.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Отключено <white>{scoreboard_type}</white><gray> боковая панель.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Переключен на <white>{scoreboard_type}</white><gray> боковая панель.</gray>"
    type:
      ledger: "<gold>бухгалтерская книга</gold>"
      stock: "<aqua>stock</aqua>"

# Ярлыки на боковой панели и форматирование значений.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Банковские итоги</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Нет банковских средств</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Акции ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Акции:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Нет магазинов игроков</red>"

# Панель босса текст, отображаемый при нацеливании на магазин.
shop_boss_bar:
  title: "<gold>{shop_type} Магазин</gold> <gray>|</gray> <yellow>Владелец:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Предметы:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Местоположение:</yellow> <white>{location}</white>"
  type:
    player: "Player"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Ограниченный запас"
    infinite: "Бесконечный"
    various: "Various"

# ============================================
# Кнопки графического интерфейса
# ============================================

# Имя элемента блока магазина и метаданные истории.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Поместите этот блок, чтобы настроить свой магазин.</yellow>"

# Обзор магазина. Ярлыки пользовательского интерфейса, сведения и состояния доступности.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Магазин магазина</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Принадлежащие блоки магазина</gradient>"
    lore:
      - "<gray>Корпоративные блоки магазинов:</gray> <white>{owned_shops}</white>"
      - "<gray>Эти треки куплены или предоставлены</gray>"
      - "<gray>Владение ShopBlock.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Предел блока магазина</gradient>"
    lore:
      - "<gray>Корпоративные блоки магазинов:</gray> <white>{owned_shops}</white>"
      - "<gray>Максимальное количество блоков магазина:</gray> <white>{max_shops}</white>"
      - "<gray>Этот предел контролирует количество магазинов</gray>"
      - "<gray>блоки, которые вы можете разблокировать.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Требуется] Требования к магазину</gradient>"
    lore:
      - "<gray>Настроенные требования:</gray> <white>{requirement_count}</white>"
      - "<gray>Текущее количество требований:</gray> <white>{requirements}</white>"
      - "<gray>Статус:</gray> <white>{availability}</white>"
      - "<yellow>Нажмите, чтобы проверить следующий уровень магазина.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Готовый]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[В ожидании]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Офлайн]</gradient>"

# Пользовательский интерфейс требований к уровню магазина, отображение прогресса и отзывы о покупках.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Требуется] Уровень магазина{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Покупка Блока магазина</gradient>"
    lore:
      - "<gray>Уровень покупки:</gray> <white>{purchase_number}</white>"
      - "<gray>Корпоративные блоки магазинов:</gray> <white>{owned_shops}</white>"
      - "<gray>Максимальное количество блоков магазина:</gray> <white>{max_shops}</white>"
      - "<gray>Настроенные требования:</gray> <white>{requirement_count}</white>"
      - "<gray>В настоящее время выполнено:</gray> <white>{met_count}</white>"
      - "<gray>Статус:</gray> <white>{availability}</white>"
      - "<yellow>Нажмите, чтобы купить, когда этот уровень будет готов.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Готовый]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[В ожидании]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Офлайн]</gradient>"
    none: "<gradient:#10b981:#34d399>[Бесплатно]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Бесплатно] Никаких требований</gradient>"
    lore:
      - "<gray>Этот уровень покупки не имеет настроенных требований.</gray>"
      - "<yellow>Вы можете приобрести этот блок магазина без дополнительных проверок.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Требуется]{requirement_name}</gradient>"
    lore:
      - "<gray>Ключ:</gray> <white>{requirement_key}</white>"
      - "<gray>Тип:</gray> <white>{requirement_type}</white>"
      - "<gray>Статус:</gray> <white>{status}</white>"
      - "<gray>Прогресс:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Сводка:</gray> <white>{summary}</white>"
      - "<yellow>Нажмите правой кнопкой мыши совместимые требования для прогресса в банке.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Подробно Чеки</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Встретил]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[В ожидании]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Недоступно]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Куплен блок магазина. Израсходованные требования: </gray> <white>{requirements}</white><gray>. Собственные блоки магазинов: </gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray>В настоящее время вы не встречаетесь с <white>{requirement}</white><gray>. Требования к магазину: </gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Требования магазина <white>{requirement}</white><gray> сейчас недоступен или недействителен. </gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray>Вы достигли ограничения магазина <white>{max_shops}</white><gray>. Собственные блоки магазинов: </gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> теперь готово. </gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Сохраненный прогресс для <white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Нет соответствующих предметов или валюты для <white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray><white>{requirement}</white><gray> не поддерживает прогресс в банке. </gray>"
    unavailable: "<gradient:#ef4444:#f87171>[Х]</gradient> <gray><white>{requirement}</white><gray> сейчас недоступен. </gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Ваш профиль RDS не может быть загружен, поэтому прогресс невозможен сохранено.</gray>"

# Блокировать ошибки проверки взаимодействия и уведомления о защите.
block_listener:
  error:
    invalid_owner_uuid: "<red>Невозможно прочитать владельца магазина из этого предмета.</red>"
    not_owner: "<red>Этот ShopBlock принадлежит другому игроку и не может быть размещен вами.</red>"
    max_shops_reached: "<red>Вы достигли ограничения магазина {max_shops}. Текущие размещенные магазины: {owned_shops}.</red>"
    shop_protected: "<red>Магазины не могут быть взломаны напрямую. Используйте меню магазина, чтобы закрыть магазин. </red>"
    double_chest_requires_shop_block: "<red>Для магазинов с двумя сундуками требуется второй <blue>ShopBlock</blue><red>. Обычные сундуки не могут объединяться с сундуками из магазина.</red>"
    double_chest_owner_mismatch: "<red>Этот ShopBlock принадлежит другому владельцу, поэтому он не может расширить этот магазин.</red>"
    shop_already_double_chest: "<red>Этот магазин уже использует обе половины сундука.</red>"
    double_chest_ambiguous: "<red>Этот ShopBlock касается нескольких сундуков с магазинами. Разместите его рядом только с одним магазином.</red>"

# Сообщения о результатах обработки запланированного налога.
tax_scheduler:
  paid: "<yellow>Собранный запланированный торговый налог в размере {amount}. Подсчитано магазинов: {owned_shops}.</yellow>"
  insufficient_funds: "<red>Вы не можете оплатить запланированный налог магазина из {amount}. Подсчитано магазинов: {owned_shops}.</red>"
  charge_failed: "<red>Не удалось собрать запланированный налог магазина в размере {amount}. Подсчитано магазинов: {owned_shops}.</red>"

# Главный интерфейс обзора магазина для действий по управлению владельцем/администратором.
shop_overview_ui:
  title: "{owner} Магазин - {location}"
  summary:
    name: "<gold>Краткое описание магазина</gold>"
    player:
      lore:
        - "<gray>Владелец:</gray> <white>{owner}</white>"
        - "<gray>Расположение:</gray> <white>{location}</white>"
        - "<gray>Сохраненные записи:</gray> <white>{item_count}</white>"
        - "<gray>Тип магазина:</gray> <white>Магазин игроков</white>"
        - "<gray>Инвентарь:</gray> <white>Конечный</white>"
    admin:
      lore:
        - "<gray>Владелец:</gray> <white>{owner}</white>"
        - "<gray>Расположение:</gray> <white>{location}</white>"
        - "<gray>Сохраненные записи:</gray> <white>{item_count}</white>"
        - "<gray>Тип магазина:</gray> <white>Админ магазин</white>"
        - "<gray>Инвентарь:</gray> <white>бесконечный</white>"
  finance:
    name: "<gold>Магазин Банк</gold>"
    lore:
      - "<gray>Отслеживаемые валюты:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Нажмите, чтобы просмотреть и вывести средства.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Администратор магазина включен</red>"
        lore:
          - "<gray>Этот магазин в настоящее время является магазином администратора. </gray>"
          - "<gray>Инвентаризация бесконечна для клиентов.</gray>"
          - "<gray>Сохраненные записи:</gray> <white>{item_count}</white>"
          - "<yellow>Нажмите, чтобы вернуться в магазин игроков.</yellow>"
      disabled:
        name: "<green>Администратор магазина отключен</green>"
        lore:
          - "<gray>Этот магазин в настоящее время использует обычный режим stock.</gray>"
          - "<gray>Клиенты могут покупать только сохраненные суммы.</gray>"
          - "<gray>Сохраненные записи:</gray> <white>{item_count}</white>"
          - "<yellow>Нажмите, чтобы включить режим администратора магазина.</yellow>"
    close:
      name: "<red>Закрыть магазин</red>"
      lore:
        - "<gray>Удалить этот магазин и вернуть блок магазина.</gray>"
        - "<gray>Сохраненные записи:</gray> <white>{item_count}</white>"
        - "<gray>Отслеживаемые банковские валюты:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Перед закрытием запасы магазина должны быть пусты. </yellow>"
    manage:
      name: "<green>Добавить элементы магазина</green>"
      lore:
        - "<gray>Храните новые товары в этом магазине. shop.</gray>"
        - "<gray>Текущие записи:</gray> <white>{item_count}</white>"
        - "<yellow>Нажмите, чтобы открыть ввод элемента.</yellow>"
    customer_view:
      name: "<gold>Открыть представление клиента</gold>"
      lore:
        - "<gray>Просмотрите этот магазин так, как его видят покупатели.</gray>"
        - "<gray>Текущие записи:</gray> <white>{item_count}</white>"
        - "<yellow>Нажмите чтобы просмотреть этот магазин в качестве покупателя.</yellow>"
    trusted:
      name: "<gold>Доверенные игроки</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Доверенные игроки:</gray> <white>{trusted_count}</white>"
        - "<yellow>Нажмите, чтобы управлять уровнями доверия магазина.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Всего записей:</gray> <white>{ledger_count}</white>"
        - "<gray>Покупки:</gray> <white>{purchase_count}</white>"
        - "<gray>Налоги:</gray> <white>{tax_count}</white>"
        - "<yellow>Нажмите, чтобы просмотреть историю транзакций магазина.</yellow>"
    edit:
      name: "<aqua>Редактировать предметы магазина</aqua>"
      lore:
        - "<gray>Изменить цены для сохраненных товаров в магазине.</gray>"
        - "<gray>Текущие записи:</gray> <white>{item_count}</white>"
        - "<yellow>Нажмите, чтобы изменить цены и валюты.</yellow>"
    storage:
      name: "<gold>Просмотреть сохраненные элементы</gold>"
      lore:
        - "<gray>Просмотрите предметы, уже хранящиеся в этом магазине.</gray>"
        - "<gray>Текущие записи:</gray> <white>{item_count}</white>"
        - "<yellow>Нажмите, чтобы вывести сохраненные предметы.</yellow>"
    locked:
      name: "<red>Shop Locked</red>"
      lore:
        - "<gray>Только владелец может добавлять предметы.</gray>"
        - "<gray>Текущие записи:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>У вас нет разрешения на управление этим магазином.</red>"
    no_admin_permission: "<red>У вас нет разрешения на переключение магазинов администратора.</red>"
    admin_limit_reached: "<red>На сервере уже есть {admin_shops} административные магазины. Бесплатная версия позволяет использовать только {max_admin_shops} административные магазины. </red>"
    admin_enabled: "<green>Этот магазин теперь является магазином администратора с бесконечным количеством покупателей. Подсчитано магазинов: {owned_shops}.</green>"
    admin_disabled: "<yellow>Этот магазин теперь является обычным магазином игроков с ограниченным количеством покупателей. Подсчитанные магазины: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Вы не можете переключить этот магазин администратора обратно в магазин игрока, поскольку ваш лимит магазина составляет {max_shops} уже достигнута. Подсчитанные магазины: {owned_shops}.</red>"
    close_not_empty: "<red>Вы можете закрыть магазин только после удаления всех сохраненных товаров. Оставшиеся записи: {item_count}.</red>"
    close_bank_not_empty: "<red>Выведите свой банк магазина перед закрытием этого магазина. Остальные отслеживаемые валюты: {bank_currency_count}.</red>"
    closed: "<green>Закрыл магазин и вернулся {returned_blocks} ShopBlock(s). Подсчитанные магазины: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Shop Not Found</red>"
      lore:
        - "<gray>Этот магазин не может быть загружен из хранилища.</gray>"
      message: "<red>Этот магазин не может быть загружен из хранилища.</red>"

# Глобальная панель управления администратором для управления RDS.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Администратор] Управление RDS</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>Панель администратора RDS</white>"
    lore:
      - "<gray>Управляйте глобальными системами администрирования и магазина из одного места.</gray>"
      - "<gray>Откройте банк серверов, настройки и элементы управления интеграцией ниже.</gray>"
      - "<yellow>Требуется:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Банк сервера</gradient>"
      lore:
        - "<gray>Просмотр доходов административного магазина, поступающих в банк сервера.</gray>"
        - "<gray>Проверьте время следующего запроса и снимите остатки.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления банком сервера.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Редактирование значений из</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Любой редактируемый параметр можно изменить с помощью наковальни.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления конфигурацией.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Интеграция плагинов</gradient>"
      lore:
        - "<gray>Открытие вакансий, навыков и инструментов интеграции PlaceholderAPI.</gray>"
        - "<gray>Управление мостами требований к плагинам и настройкой расширения.</gray>"
        - "<yellow>Нажмите, чтобы открыть элементы управления интеграцией.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Менеджер валют</gradient>"
      lore:
        - "<gray>Просмотр обнаруженных валют из Vault и JExEconomy.</gray>"
        - "<gray>При необходимости создайте валюту</gray> <white>raindrops</white> <gray>по умолчанию.</gray>"
        - "<yellow>Нажмите, чтобы открыть валютный контроль.</yellow>"
    skills:
