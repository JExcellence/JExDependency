  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Integration Hub</white>"
    lore:
      - "<gray>Hantera kravbrygga integrationer från ett ställe.</gray>"
      - "<gray>Öppna jobb, färdigheter och PlaceholderAPI-kontroller.</gray>"
      - "<yellow>Kräver:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skicklighetskrav</gradient>"
      lore:
        - "<gray>Granska färdighetsplugin som stöds och upptäcktstillstånd.</gray>"
        - "<gray>Tillämpa standardkrav för färdighet på alla inköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för kompetenskrav.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Jobb] Jobbkrav</gradient>"
      lore:
        - "<gray>Granska stödda jobbpluginprogram och upptäcktstillstånd.</gray>"
        - "<gray>Tillämpa standardjobbkrav på alla inköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för jobbkrav.</yellow>"
