# ============================================
# GLOBAL PREFIX
# ============================================
# Prefix föregås av allmän plugin-chattutgång.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Snabba sammanfattningsrader för spelare för butik, bank och skattestatus.
info:
  total: "<blue>Butiker:</blue> <white>{owned_shops}</white>"
  bank: "<green>Spårade saldon ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Scheduled Tax ({taxed_shops}skattepliktiga butiker):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Nästa skatt:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Meddelanden när spelare går in på servern visas när de går med.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}skattepliktiga butiker\n[<blue>Belopp<yellow>]\n{taxes}\n<red>Förfaller:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Kommandosvarssträngar för \"/rs\"-funktioner och växlar.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray>Öppnade<white>RDS Admin</white><gray>panel.</gray>"
  bar:
    enabled: "<green>Butiksbaren aktiverad när du tittar på en butik.</green>"
    disabled: "<yellow>Butikschef bar inaktiverad.</yellow>"
  give:
    syntax: "<red>Användning: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Användande:</gray> <white>/rs resultattavla&lt;reskontra|lager&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Aktiverade<white>{scoreboard_type}</white><gray>sidofältet.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Inaktiverade<white>{scoreboard_type}</white><gray>sidofältet.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Bytte till<white>{scoreboard_type}</white><gray>sidofältet.</gray>"
    type:
      ledger: "<gold>huvudbok</gold>"
      stock: "<aqua>stock</aqua>"

# Sidofältets resultattavlaetiketter och värdeformatering.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Bank Summor</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Inga bankmedel</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Aktie ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Stock:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Inga spelarbutiker</red>"

# Chefsfältstext visas när du riktar in dig på en butik.
shop_boss_bar:
  title: "<gold>{shop_type}Handla</gold> <gray>|</gray> <yellow>Ägare:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Artiklar:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Plats:</yellow> <white>{location}</white>"
  type:
    player: "Spelare"
    admin: "Administration"
  owner:
    admin: "Administration"
  available_items:
    finite: "{item_count}"
    limited: "Begränsat lager"
    infinite: "Oändlig"
    various: "Olika"

# ============================================
# GUI-knappar
# ============================================

# Butiksblockobjektnamn och lore-metadata.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Placera detta block för att skapa din butik.</yellow>"

# Butiksöversikt över UI-etiketter, kunskap och tillgänglighetsstatus.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Butiksbutik</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Ägda butiksblock</gradient>"
    lore:
      - "<gray>Ägda butiksblock:</gray> <white>{owned_shops}</white>"
      - "<gray>Detta spår köpt eller beviljat</gray>"
      - "<gray>ShopBlock-ägande.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Butiksblockgräns</gradient>"
    lore:
      - "<gray>Ägda butiksblock:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximalt antal butiksblock:</gray> <white>{max_shops}</white>"
      - "<gray>Denna gräns styr hur många som handlar</gray>"
      - "<gray>block du kan låsa upp.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Butikskrav</gradient>"
    lore:
      - "<gray>Konfigurerade krav:</gray> <white>{requirement_count}</white>"
      - "<gray>Aktuellt antal krav:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klicka för att inspektera nästa butiksnivå.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Redo]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I avvaktan på]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Off-line]</gradient>"

# Användargränssnitt för krav på butiksnivå, framstegsvisning och köpfeedback.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Butiksnivå{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Köp Butiksblock</gradient>"
    lore:
      - "<gray>Inköpsnivå:</gray> <white>{purchase_number}</white>"
      - "<gray>Ägda butiksblock:</gray> <white>{owned_shops}</white>"
      - "<gray>Maximalt antal butiksblock:</gray> <white>{max_shops}</white>"
      - "<gray>Konfigurerade krav:</gray> <white>{requirement_count}</white>"
      - "<gray>För närvarande träffat:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klicka för att köpa när denna nivå är klar.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Redo]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I avvaktan på]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Off-line]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratis]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] Inga krav</gradient>"
    lore:
      - "<gray>Denna köpnivå har inga konfigurerade krav.</gray>"
      - "<yellow>Du kan köpa detta butiksblock utan extra kontroller.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Nyckel:</gray> <white>{requirement_key}</white>"
      - "<gray>Typ:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Framsteg:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Sammanfattning:</gray> <white>{summary}</white>"
      - "<yellow>Right-click compatible requirements to bank progress.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detaljerade kontroller</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Mött]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I avvaktan på]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Inte tillgänglig]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Köpte ett butiksblock. Förbrukade krav:</gray> <white>{requirements}</white><gray>. Ägda butiksblock:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du träffas inte för närvarande<white>{requirement}</white><gray>. Butikskrav:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Butikskravet<white>{requirement}</white><gray>är otillgänglig eller ogiltig just nu.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har nått gränsen för butiksblockering på<white>{max_shops}</white><gray>. Ägda butiksblock:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>är nu klar.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Lagrade framsteg för<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Inga matchande föremål eller valuta var tillgängliga för<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>stöder inte bankerade framsteg.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>är inte tillgänglig just nu.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Din RDS-profil kunde inte laddas, så framsteg kunde inte sparas.</gray>"

# Blockera interaktionsvalideringsfel och skyddsmeddelanden.
block_listener:
  error:
    invalid_owner_uuid: "<red>Det går inte att läsa butiksägaren från denna artikel.</red>"
    not_owner: "<red>Detta ShopBlock tillhör en annan spelare och kan inte placeras av dig.</red>"
    max_shops_reached: "<red>Du har nått butiksgränsen på{max_shops}. Nuvarande placerade butiker:{owned_shops}.</red>"
    shop_protected: "<red>Butiker kan inte brytas direkt. Använd butiksmenyn för att stänga butiken.</red>"
    double_chest_requires_shop_block: "<red>Dubbelkista butiker kräver en sekund<blue>ShopBlock</blue><red>. Normala kistor kan inte smälta samman med butikskistor.</red>"
    double_chest_owner_mismatch: "<red>Detta ShopBlock tillhör en annan ägare, så det kan inte utöka denna butik.</red>"
    shop_already_double_chest: "<red>Den här butiken använder redan båda brösthalvorna.</red>"
    double_chest_ambiguous: "<red>Detta ShopBlock vidrör flera butikskistor. Placera den bredvid endast en butik.</red>"

# Scheduled tax processing outcome messages.
tax_scheduler:
  paid: "<yellow>Inkasserad schemalagd butiksskatt på{amount}. Räknade butiker:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Du kunde inte betala den planerade butiksskatten på{amount}. Räknade butiker:{owned_shops}.</red>"
  charge_failed: "<red>Det gick inte att samla in den planerade butiksskatten på{amount}. Räknade butiker:{owned_shops}.</red>"

# Översiktsgränssnitt för huvudbutik för hantering av ägare/administratörer.
shop_overview_ui:
  title: "{owner} Handla - {location}"
  summary:
    name: "<gold>Butikssammanfattning</gold>"
    player:
      lore:
        - "<gray>Ägare:</gray> <white>{owner}</white>"
        - "<gray>Plats:</gray> <white>{location}</white>"
        - "<gray>Lagrade poster:</gray> <white>{item_count}</white>"
        - "<gray>Butikstyp:</gray> <white>Spelarbutik</white>"
        - "<gray>Lager:</gray> <white>Ändlig</white>"
    admin:
      lore:
        - "<gray>Ägare:</gray> <white>{owner}</white>"
        - "<gray>Plats:</gray> <white>{location}</white>"
        - "<gray>Lagrade poster:</gray> <white>{item_count}</white>"
        - "<gray>Butikstyp:</gray> <white>Admin butik</white>"
        - "<gray>Lager:</gray> <white>Oändlig</white>"
  finance:
    name: "<gold>Shop Bank</gold>"
    lore:
      - "<gray>Spårade valutor:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klicka för att granska och ta ut pengar.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop aktiverad</red>"
        lore:
          - "<gray>Denna butik är för närvarande en adminbutik.</gray>"
          - "<gray>Lagret är oändligt för kunderna.</gray>"
          - "<gray>Lagrade poster:</gray> <white>{item_count}</white>"
          - "<yellow>Klicka för att byta tillbaka till en spelarbutik.</yellow>"
      disabled:
        name: "<green>Admin Shop inaktiverad</green>"
        lore:
          - "<gray>Denna butik använder för närvarande normalt lager.</gray>"
          - "<gray>Kunder kan endast köpa lagrade mängder.</gray>"
          - "<gray>Lagrade poster:</gray> <white>{item_count}</white>"
          - "<yellow>Klicka för att aktivera admin butiksläge.</yellow>"
    close:
      name: "<red>Stäng butik</red>"
      lore:
        - "<gray>Ta bort denna butik och returnera butiksblocket.</gray>"
        - "<gray>Lagrade poster:</gray> <white>{item_count}</white>"
        - "<gray>Spårade bankvalutor:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Butikslagret måste vara tomt innan stängning.</yellow>"
    manage:
      name: "<green>Lägg till butiksartiklar</green>"
      lore:
        - "<gray>Lagra nya varor i denna butik.</gray>"
        - "<gray>Aktuella poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klicka för att öppna objektinmatning.</yellow>"
    customer_view:
      name: "<gold>Öppna kundvy</gold>"
      lore:
        - "<gray>Förhandsgranska den här butiken när kunderna ser den.</gray>"
        - "<gray>Aktuella poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klicka för att bläddra i denna butik som kund.</yellow>"
    trusted:
      name: "<gold>Pålitliga spelare</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Betrodda spelare:</gray> <white>{trusted_count}</white>"
        - "<yellow>Klicka för att hantera butiksförtroendenivåer.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Totalt antal poster:</gray> <white>{ledger_count}</white>"
        - "<gray>Inköp:</gray> <white>{purchase_count}</white>"
        - "<gray>Skatter:</gray> <white>{tax_count}</white>"
        - "<yellow>Klicka för att granska butikens transaktionshistorik.</yellow>"
    edit:
      name: "<aqua>Redigera butiksartiklar</aqua>"
      lore:
        - "<gray>Redigera prissättning för lagrade butiksartiklar.</gray>"
        - "<gray>Aktuella poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klicka för att redigera priser och valutor.</yellow>"
    storage:
      name: "<gold>Visa lagrade föremål</gold>"
      lore:
        - "<gray>Review items already stored in this shop.</gray>"
        - "<gray>Aktuella poster:</gray> <white>{item_count}</white>"
        - "<yellow>Klicka för att ta bort lagrade föremål.</yellow>"
    locked:
      name: "<red>Butiken låst</red>"
      lore:
        - "<gray>Endast ägaren kan lägga till objekt.</gray>"
        - "<gray>Aktuella poster:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Du har inte behörighet att hantera denna butik.</red>"
    no_admin_permission: "<red>Du har inte behörighet att växla adminbutiker.</red>"
    admin_limit_reached: "<red>Servern har redan{admin_shops}admin butiker. Gratisutgåvan tillåter endast{max_admin_shops}admin butiker.</red>"
    admin_enabled: "<green>Denna butik är nu en adminbutik med oändligt kundlager. Räknade butiker:{owned_shops}.</green>"
    admin_disabled: "<yellow>Den här butiken är nu en normal spelarbutik med begränsat kundlager. Räknade butiker:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Du kan inte byta tillbaka denna adminbutik till en spelarbutik eftersom din butiksgräns på{max_shops}är redan nådd. Räknade butiker:{owned_shops}.</red>"
    close_not_empty: "<red>Du kan bara stänga en butik efter att du tagit bort alla lagrade föremål. Återstående poster:{item_count}.</red>"
    close_bank_not_empty: "<red>Ta ut din butiksbank innan du stänger denna butik. Återstående spårade valutor:{bank_currency_count}.</red>"
    closed: "<green>Stängde butiken och återvände{returned_blocks}ShopBlock(ar). Räknade butiker:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Butiken hittades inte</red>"
      lore:
        - "<gray>Den här butiken kunde inte laddas från lagringen.</gray>"
      message: "<red>Den här butiken kunde inte laddas från lagringen.</red>"

# Global administratörskontrollpanel för RDS-hantering.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS Control</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS Admin Panel</white>"
    lore:
      - "<gray>Hantera globala admin-shop-system från ett ställe.</gray>"
      - "<gray>Öppna serverbank, konfiguration och integrationskontroller nedan.</gray>"
      - "<yellow>Kräver:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Server Bank</gradient>"
      lore:
        - "<gray>Granska admin-butikens inkomster som dras in i serverbanken.</gray>"
        - "<gray>Kontrollera nästa dragtid och ta ut saldon.</gray>"
        - "<yellow>Klicka för att öppna serverbankskontroller.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Shop Config</gradient>"
      lore:
        - "<gray>Redigera värden från</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Varje redigerbar inställning kan ändras genom en städprompt.</gray>"
        - "<yellow>Klicka för att öppna konfigurationskontroller.</yellow>"
    players:
      name: "<gradient:#22c55e:#86efac>[Ply] Spelar- och gruppkontroller</gradient>"
      lore:
        - "<gray>Ställ in max butiker och rabatter per spelare och per grupp.</gray>"
        - "<gray>Öppna valfri butik som ägare eller tvinga stäng aktiva butiksvyer.</gray>"
        - "<yellow>Klicka för att öppna spelar-/gruppadministratörskontroller.</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] Plugin-integrationer</gradient>"
      lore:
        - "<gray>Öppna jobb, färdigheter och PlaceholderAPI-integreringsverktyg.</gray>"
        - "<gray>Hantera bryggor med pluginkrav och expansionsinställningar.</gray>"
        - "<yellow>Klicka för att öppna integrationskontroller.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutahanterare</gradient>"
      lore:
        - "<gray>Granska upptäckta valutor från Vault och JExEconomy.</gray>"
        - "<gray>Skapa standardvalutan för</gray> <white>raindrops</white> <gray>när det behövs.</gray>"
        - "<yellow>Klicka för att öppna valutakontroller.</yellow>"
    skills:
      name: "<gradient:#22c55e:#86efac>[Skill] Skicklighetskrav</gradient>"
      lore:
        - "<gray>Granska färdighetsplugin som stöds och upptäcktstillstånd.</gray>"
        - "<gray>Tillämpa standardkrav för färdighet på alla inköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för kompetenskrav.</yellow>"
    jobs:
      name: "<gradient:#f59e0b:#fbbf24>[Jobb] Jobbkrav</gradient>"
      lore:
        - "<gray>Granska stödda jobbpluginprogram och upptäcktstillstånd.</gray>"
        - "<gray>Tillämpa standardjobbkrav på alla inköpsnivåer.</gray>"
        - "<yellow>Klicka för att öppna kontroller för jobbkrav.</yellow>"
    tax_run:
      name: "<gradient:#f59e0b:#fbbf24>[skatt] Kör skatter nu</gradient>"
      lore:
        - "<gray>Utlöser en omedelbar skatteuppbördscykel för testning.</gray>"
        - "<gray>Detta ändrar inte den konfigurerade återkommande skattetimern.</gray>"
        - "<yellow>Klicka för att köra skatter en gång just nu.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Adminåtkomst krävs</white>"
      lore:
        - "<gray>Du har inte behörighet att använda denna adminpanel.</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Utlöste en omedelbar indrivningscykel för butiksskatt.</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Shop tax scheduler är inte tillgänglig just nu.</gray>"

plugin_integration_management_ui:
