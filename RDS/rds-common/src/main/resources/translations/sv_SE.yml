    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Adminåtkomst krävs</white>"
      lore:
        - "<gray>Du har inte behörighet att använda denna integrationspanel.</gray>"

# PlaceholderAPI integration view for expansion install and reload controls.
placeholder_api_ui:
  title: "<gradient:#38bdf8:#60a5fa>[PAPI] PlaceholderAPI-verktyg</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>PlaceholderAPI-integrering</white>"
    lore:
      - "<gray>PlaceholderAPI stöds:</gray> <white>{supported}</white>"
      - "<gray>Målexpansion:</gray> <white>{expansion_name}</white>"
      - "<yellow>Installera expansionen och ladda om PlaceholderAPI från den här panelen.</yellow>"
  detection:
    supported:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>PlaceholderAPI upptäckt</white>"
      lore:
        - "<gray>PlaceholderAPI är tillgängligt och aktiverat.</gray>"
    missing:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>PlaceholderAPI saknas</white>"
      lore:
        - "<gray>Installera och aktivera PlaceholderAPI för att använda den här åtgärden.</gray>"
  action:
    install:
      name: "<gradient:#22c55e:#86efac>[+]</gradient> <white>Installera {expansion_name} Expansion</white>"
