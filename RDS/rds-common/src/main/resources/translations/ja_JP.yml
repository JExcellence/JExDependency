    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS 管理パネル</white>"
    lore:
      - "<gray>グローバルな管理ショップ システムを 1 か所から管理します。</gray>"
      - "<gray>以下のサーバーバンク、構成、統合コントロールを開きます。</gray>"
      - "<yellow>必要：</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] サーバーバンク</gradient>"
      lore:
        - "<gray>サーバーバンクに引き込まれた管理ショップの収入を確認します。</gray>"
        - "<gray>次回の引き出しタイミングを確認し、残高を引き出します。</gray>"
        - "<yellow>クリックしてサーバーバンクコントロールを開きます。</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] ショップ構成</gradient>"
      lore:
        - "<gray>値を編​​集する</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>編集可能な設定はすべて、Anvil プロンプトを通じて変更できます。</gray>"
        - "<yellow>クリックして構成コントロールを開きます。</yellow>"
    integrations:
      name: "<gradient:#10b981:#34d399>[Int] プラグインの統合</gradient>"
