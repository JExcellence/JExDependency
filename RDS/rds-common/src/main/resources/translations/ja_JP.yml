# ============================================
# GLOBAL PREFIX
# ============================================
# プレフィックスでロックされます一般的なプラグイン チャット出力の先頭に追加されます。
prefix: "<gradient:#a855f7:#c084fc>【RDS】</gradient> "

# ショップ、銀行、税金の状況をプレイヤーに表示する簡単な概要行。
info:
  total: "<blue>ショップ:</blue> <white>{owned_shops}</white>"
  bank: "<green>追跡残高 ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>として保存します({taxed_shops} 課税対象ショップ):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>次の税金:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# プレイヤーが参加するときに表示される参加時メッセージサーバーにログインします。
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} 課税対象ショップ\n[<blue>金額<yellow>]\n{taxes}\n<red>期限:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

#  コマンド応答`/rs` 機能とトグルの文字列。
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[A]</gradient> <gray><white>RDS 管理者</white><gray> パネル。</gray>"
  bar:
    enabled: "<green>ショップを見ている間ショップ ボス バーが有効。</green>"
    disabled: "<yellow>ショップ ボス バーが無効。</yellow>"
  give:
    syntax: "<red>使用法: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>使用法:</gray> <white>/rs スコアボード &lt;元帳|株式&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>有効化<white>{scoreboard_type}</white><gray> サイドバー。</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>無効化 <white>{scoreboard_type}</white><gray> サイドバー。</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray><white>{scoreboard_type}</white><gray> サイドバー。</gray>"
    type:
      ledger: "<gold>元帳</gold>"
      stock: "<aqua>在庫</aqua>"

# サイドバーのスコアボードのラベルと値の書式設定。
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] 元帳 ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ 銀行合計</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>銀行資金がありません</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] 在庫 ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>在庫:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>プレーヤー ショップはありません</red>"

# ボス バーのテキストショップをターゲットにしているときに表示されます。
shop_boss_bar:
  title: "<gold>{shop_type} ショップ</gold> <gray>|</gray> <yellow>所有者:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>アイテム:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>場所:</yellow> <white>{location}</white>"
  type:
    player: "プレイヤー"
    admin: "管理者"
  owner:
    admin: "管理者"
  available_items:
    finite: "{item_count}"
    limited: "在庫に限りがあります"
    infinite: "無限"
    various: "さまざま"

# ============================================
# GUI ボタン
# ============================================

# ショップ ブロックのアイテム名と伝承メタデータ。
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>このブロックを配置してショップを設定します。</yellow>"

# ショップ ストアの概要 UI ラベル、情報、および在庫状況。
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] ショップ ストア</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] 所有するショップ ブロック</gradient>"
    lore:
      - "<gray>所有ショップ ブロックをオープンしました:</gray> <white>{owned_shops}</white>"
      - "<gray> のみがあります購入または付与された追跡</gray>"
      - "<gray>ShopBlock の所有権。</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[上限] ショップ ブロック制限</gradient>"
    lore:
      - "<gray>所有ショップ ブロックをオープンしました:</gray> <white>{owned_shops}</white>"
      - "<gray>最大ショップ ブロック:</gray> <white>{max_shops}</white>"
      - "<gray>この制限によりショップの数が制御されます</gray>"
      - "<gray>ロックを解除できるブロック。</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>【必須】店舗要件</gradient>"
    lore:
      - "<gray>構成された要件:</gray> <white>{requirement_count}</white>"
      - "<gray>現在の要件数:</gray> <white>{requirements}</white>"
      - "<gray>ステータス:</gray> <white>{availability}</white>"
      - "<yellow>クリックして検査してください次のショップ階層。</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[準備ができて]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[保留中]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[オフライン]</gradient>"

# ショップ層の要件 UI、進行状況の表示、および購入フィードバック。
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[必須] ショップ階層{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] ショップ ブロックを購入</gradient>"
    lore:
      - "<gray>購入段階:</gray> <white>{purchase_number}</white>"
      - "<gray>所有ショップ ブロックをオープンしました:</gray> <white>{owned_shops}</white>"
      - "<gray>最大ショップ ブロック:</gray> <white>{max_shops}</white>"
      - "<gray>構成された要件:</gray> <white>{requirement_count}</white>"
      - "<gray>現在一致している:</gray> <white>{met_count}</white>"
      - "<gray>ステータス:</gray> <white>{availability}</white>"
      - "<yellow>このレベルの準備ができたらクリックして購入します。</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[準備ができて]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[保留中]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[オフライン]</gradient>"
    none: "<gradient:#10b981:#34d399>[無料]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>【無料】条件なし</gradient>"
    lore:
      - "<gray>この購入層には構成された要件がありません。</gray>"
      - "<yellow>このショップ ブロックは追加の小切手なしで購入できます。</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[必須]{requirement_name}</gradient>"
    lore:
      - "<gray>キー:</gray> <white>{requirement_key}</white>"
      - "<gray>タイプ:</gray> <white>{requirement_type}</white>"
      - "<gray>ステータス:</gray> <white>{status}</white>"
      - "<gray>進捗状況:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>概要:</gray> <white>{summary}</white>"
      - "<yellow>互換性のある要件を右クリックして進行状況を確認します。</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓詳細チェック</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[会った]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[保留中]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[利用不可]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>ショップ ブロックを購入しました。消費された要件:</gray> <white>{requirements}</white><gray>。所有するショップ ブロック:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>のショップ税を現在満たしていません<white>{requirement}</white><gray>。ストア要件:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>ストア要件 <white>{requirement}</white><gray> は現在利用できないか無効です。</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>ショップ ブロック制限の <white>{max_shops}</white><gray>。所有するショップ ブロック:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> は準備ができています。</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>保管された進行状況<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray><white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[×]</gradient> <gray><white>{requirement}</white><gray> はバンクされた進行状況をサポートしていません。</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[×]</gradient> <gray><white>{requirement}</white><gray> は現在利用できません。</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDS プロファイルをロードできなかったため、進行できませんでした。 </gray>"

# インタラクション検証エラーと保護通知をブロックします。
block_listener:
  error:
    invalid_owner_uuid: "<red>このアイテムからショップオーナーを読み取ることができません。</red>"
    not_owner: "<red>このショップブロックは別のプレイヤーに属しているため、あなたは配置できません。</red>"
    max_shops_reached: "<red> に達しました。ショップ制限 {max_shops}。現在配置されているショップ: {owned_shops}.</red>"
    shop_protected: "<red>ショップを直接破壊することはできません。ショップ メニューを使用してショップを閉じます。</red>"
    double_chest_requires_shop_block: "<red>ダブルチェスト ショップには 2 番目の <blue>ShopBlock</blue><red>。通常のチェストはショップのチェストと結合できません。</red>"
    double_chest_owner_mismatch: "<red>このショップブロックは別の所有者に属しているため、このショップを拡張できません。</red>"
    shop_already_double_chest: "<red>このショップはすでに両方のチェストハーフを使用しています。</red>"
    double_chest_ambiguous: "<red>このショップブロックは複数のショップチェストに触れています。 1 つのショップのみの隣に配置してください。</red>"

# 予定税処理結果メッセージ。
tax_scheduler:
  paid: "<yellow>予定されている店舗税 {amount}。カウントされたショップ: {owned_shops}.</yellow>"
  insufficient_funds: "<red>予定された金額を支払うことができませんでした。 {amount}。カウントされたショップ: {owned_shops}.</red>"
  charge_failed: "<red>{amount}。カウントされたショップ: {owned_shops}.</red>"

# オーナー/管理者の管理アクションのためのメインショップ概要インターフェイス。
shop_overview_ui:
  title: "{owner} 店 - {location}"
  summary:
    name: "<gold>ショップ概要</gold>"
    player:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>位置：</gray> <white>{location}</white>"
        - "<gray>保存されたエントリ:</gray> <white>{item_count}</white>"
        - "<gray>ショップタイプ:</gray> <white>プレイヤーショップ</white>"
        - "<gray>在庫：</gray> <white>有限</white>"
    admin:
      lore:
        - "<gray>所有者：</gray> <white>{owner}</white>"
        - "<gray>位置：</gray> <white>{location}</white>"
        - "<gray>保存されたエントリ:</gray> <white>{item_count}</white>"
        - "<gray>ショップタイプ:</gray> <white>管理者ショップ</white>"
        - "<gray>在庫：</gray> <white>無限</white>"
  finance:
    name: "<gold>ショップバンク</gold>"
    lore:
      - "<gray>追跡対象通貨:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>クリックして資金を確認し、引き出します。</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>管理ショップ有効</red>"
        lore:
          - "<gray>このショップは現在管理ショップです。</gray>"
          - "<gray>インベントリは無限です顧客。</gray>"
          - "<gray>保管エントリ:</gray> <white>{item_count}</white>"
          - "<yellow>クリックして在庫制限に戻ります。プレーヤー ショップ。</yellow>"
      disabled:
        name: "<green>管理ショップ無効</green>"
        lore:
          - "<gray>このショップは現在通常を使用しています在庫です。</gray>"
          - "<gray>顧客は保存された数量のみを購入できます。</gray>"
          - "<gray>保管エントリ:</gray> <white>{item_count}</white>"
          - "<yellow>クリックして管理ショップモードを有効にします。</yellow>"
    close:
      name: "<red>店を閉じる</red>"
      lore:
        - "<gray>このショップを削除し、ショップ ブロックを返します。</gray>"
        - "<gray>保管エントリ:</gray> <white>{item_count}</white>"
        - "<gray>追跡銀行通貨:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>ショップの在庫は閉店前に空である必要があります。</yellow>"
    manage:
      name: "<green>ショップアイテムの追加</green>"
      lore:
        - "<gray>ここに新しいアイテムを保管しますshop.</gray>"
        - "<gray>現在のエントリ:</gray> <white>{item_count}</white>"
        - "<yellow>クリックしてアイテム入力を開きます。</yellow>"
    customer_view:
      name: "<gold>顧客ビューを開く</gold>"
      lore:
        - "<gray>顧客が表示するこのショップをプレビューします。</gray>"
        - "<gray>現在のエントリ:</gray> <white>{item_count}</white>"
        - "<yellow>クリックして顧客としてこのショップを閲覧します。</yellow>"
    trusted:
      name: "<gold>Trusted Players</gold>"
      lore:
        - "<gray>Associates:</gray> <white>{associate_count}</white>"
        - "<gray>Trustedプレイヤー:</gray> <white>{trusted_count}</white>"
        - "<yellow>クリックしてショップの信頼レベルを管理します。</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>エントリの合計:</gray> <white>{ledger_count}</white>"
        - "<gray>購入数:</gray> <white>{purchase_count}</white>"
        - "<gray>税金:</gray> <white>{tax_count}</white>"
        - "<yellow>クリックしてショップの取引履歴を確認します。</yellow>"
    edit:
      name: "<aqua>ショップ アイテムの編集</aqua>"
      lore:
        - "<gray>ストア ショップの価格設定の編集items.</gray>"
        - "<gray>現在のエントリ:</gray> <white>{item_count}</white>"
        - "<yellow>クリックして価格を編集通貨。</yellow>"
    storage:
      name: "<gold>保管アイテムの表示</gold>"
      lore:
        - "<gray>確認このショップにすでに保管されているアイテム。</gray>"
        - "<gray>現在のエントリ:</gray> <white>{item_count}</white>"
        - "<yellow>クリック保管されているアイテムを引き出すにはクリックしてください。</yellow>"
    locked:
      name: "<red>ショップがロックされています</red>"
      lore:
        - "<gray>アイテムを追加できるのはオーナーだけです。</gray>"
        - "<gray>現在のエントリ:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>このショップを管理する権限がありません。</red>"
    no_admin_permission: "<red>管理ショップを切り替える権限がありません。</red>"
    admin_limit_reached: "<red>サーバーにはすでに {admin_shops} 管理ショップ。無料版では、{max_admin_shops} 管理ショップ。</red>"
    admin_enabled: "<green>このショップは現在、無限の顧客在庫を持つ管理ショップです。カウントされるショップ: {owned_shops}.</green>"
    admin_disabled: "<yellow>このショップは現在、限られた顧客在庫を持つ通常のプレーヤー ショップです。カウントされるショップ: {owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>ショップ制限が {max_shops} にすでに達しています。カウントされるショップ: {owned_shops}.</red>"
    close_not_empty: "<red>保管されているアイテムをすべて削除した後でのみ、ショップを閉じることができます。残りのエントリ: {item_count}.</red>"
    close_bank_not_empty: "<red>このショップを閉じる前にショップ銀行を引き出してください。追跡されている残りの通貨: {bank_currency_count}.</red>"
    closed: "<green>店を閉めて返品しました {returned_blocks} ショップブロック。カウントされるショップ: {owned_shops}.</green>"
    shop_missing:
      name: "<red>ショップが見つかりません</red>"
      lore:
        - "<gray>このショップはストレージからロードできませんでした。</gray>"
      message: "<red>このショップはストレージからロードできませんでした。</red>"

# RDS 管理用のグローバル管理コントロール パネル。
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[管理者] RDS コントロール</gradient>"
