  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[×]</gradient> <white>管理者アクセスが必要です</white>"
      lore:
        - "<gray>この管理パネルを使用する権限がありません。</gray>"
    tax_run_triggered: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>即時店舗税徴収サイクルを開始しました。</gray>"
    tax_run_unavailable: "<gradient:#ef4444:#f87171>[×]</gradient> <gray>ショップ税スケジューラは現在利用できません。</gray>"

plugin_integration_management_ui:
  title: "<gradient:#10b981:#34d399>[Int] プラグインの統合</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[情報]</gradient> <white>統合ハブ</white>"
    lore:
      - "<gray>要件ブリッジの統合を 1 か所から管理します。</gray>"
