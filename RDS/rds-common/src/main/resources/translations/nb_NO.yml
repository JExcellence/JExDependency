# ============================================
# GLOBAL PREFIKS
# ============================================
# Prefiks foran til generell plugin-chat-utgang.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Raske spillervendte oppsummeringslinjer for butikk-, bank- og skattestatus.
info:
  total: "<blue>Butikker:</blue> <white>{owned_shops}</white>"
  bank: "<green>Sporede saldoer ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Planlagt skatt ({taxed_shops} avgiftspliktige butikker):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Neste skatt:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Meldinger om deltakelse vises når spillere går inn på serveren.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops} avgiftspliktige butikk(er)\n[<blue>Beløp<yellow>]\n{taxes}\n<red>Forfaller:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Kommandosvarstrenger for `/rs`-funksjoner og veksler.
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[EN]</gradient> <gray>Åpnet<white>RDS Admin</white><gray> panel.</gray>"
  bar:
    enabled: "<green>Butikksjefsbar aktivert mens du ser på en butikk.</green>"
    disabled: "<yellow>Butikksjef bar deaktivert.</yellow>"
  give:
    syntax: "<red>Bruk: /rs gi<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Bruk:</gray> <white>/rs resultattavle&lt;hovedbok|lager&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Aktiverte<white>{scoreboard_type}</white><gray> sidefelt.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Deaktivert<white>{scoreboard_type}</white><gray> sidefelt.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Byttet til<white>{scoreboard_type}</white><gray> sidefelt.</gray>"
    type:
      ledger: "<gold>hovedbok</gold>"
      stock: "<aqua>lager</aqua>"

# Sidebar resultattavleetiketter og verdiformatering.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Banktotaler</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Ingen bankmidler</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Aksje ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Lager:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Ingen spillerbutikker</red>"

# Sjefslinjetekst vises mens du målretter mot en butikk.
shop_boss_bar:
  title: "<gold>{shop_type} Butikk</gold> <gray>|</gray> <yellow>Eier:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Varer:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Sted:</yellow> <white>{location}</white>"
  type:
    player: "Spiller"
    admin: "Admin"
  owner:
    admin: "Admin"
  available_items:
    finite: "{item_count}"
    limited: "Begrenset lager"
    infinite: "Uendelig"
    various: "Diverse"

# ============================================
# GUI-knapper
# ============================================

# Butikkblokkvarenavn og lore-metadata.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Plasser denne blokken for å sette opp butikken din.</yellow>"

# Butikkbutikkoversikt UI-etiketter, lore og tilgjengelighetsstatuser.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Butikkbutikk</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Eide butikkblokker</gradient>"
    lore:
      - "<gray>Eide butikkblokker:</gray> <white>{owned_shops}</white>"
      - "<gray>Dette sporer kjøpt eller gitt</gray>"
      - "<gray>ShopBlock eierskap.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Cap] Butikkblokkgrense</gradient>"
    lore:
      - "<gray>Eide butikkblokker:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimalt antall butikkblokker:</gray> <white>{max_shops}</white>"
      - "<gray>Denne grensen styrer hvor mange som handler</gray>"
      - "<gray>blokker du kan låse opp.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Butikkkrav</gradient>"
    lore:
      - "<gray>Konfigurerte krav:</gray> <white>{requirement_count}</white>"
      - "<gray>Gjeldende kravtelling:</gray> <white>{requirements}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klikk for å inspisere neste butikklag.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Ferdig]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I påvente av]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Frakoblet]</gradient>"

# Butikknivåkrav UI, fremdriftsvisning og tilbakemelding på kjøp.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Butikknivå{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Kjøp Butikkblokk</gradient>"
    lore:
      - "<gray>Kjøpsnivå:</gray> <white>{purchase_number}</white>"
      - "<gray>Eide butikkblokker:</gray> <white>{owned_shops}</white>"
      - "<gray>Maksimalt antall butikkblokker:</gray> <white>{max_shops}</white>"
      - "<gray>Konfigurerte krav:</gray> <white>{requirement_count}</white>"
      - "<gray>Foreløpig møtt:</gray> <white>{met_count}</white>"
      - "<gray>Status:</gray> <white>{availability}</white>"
      - "<yellow>Klikk for å kjøpe når dette nivået er klart.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Ferdig]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I påvente av]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Frakoblet]</gradient>"
    none: "<gradient:#10b981:#34d399>[Gratis]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Gratis] Ingen krav</gradient>"
    lore:
      - "<gray>Dette kjøpsnivået har ingen konfigurerte krav.</gray>"
      - "<yellow>Du kan kjøpe denne butikkblokken uten ekstra sjekker.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Nøkkel:</gray> <white>{requirement_key}</white>"
      - "<gray>Type:</gray> <white>{requirement_type}</white>"
      - "<gray>Status:</gray> <white>{status}</white>"
      - "<gray>Framgang:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Sammendrag:</gray> <white>{summary}</white>"
      - "<yellow>Høyreklikk kompatible krav til bankens fremgang.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Detaljerte kontroller</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Møtte]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[I påvente av]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Utilgjengelig]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Kjøpte en butikkblokk. Forbrukte krav:</gray> <white>{requirements}</white><gray>. Eide butikkblokker:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du møter ikke for øyeblikket<white>{requirement}</white><gray>. Butikkkrav:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Butikkkravet<white>{requirement}</white><gray> er utilgjengelig eller ugyldig akkurat nå.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har nådd butikkblokkeringsgrensen på<white>{max_shops}</white><gray>. Eide butikkblokker:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray> er nå klar.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Lagret fremdrift for<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Ingen samsvarende varer eller valuta var tilgjengelig for<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> støtter ikke bankfremdrift.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray> er utilgjengelig akkurat nå.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>RDS-profilen din kunne ikke lastes inn, så fremdriften kunne ikke lagres.</gray>"

# Blokker interaksjonsvalideringsfeil og beskyttelsesmerknader.
block_listener:
  error:
    invalid_owner_uuid: "<red>Kan ikke lese butikkeieren fra denne varen.</red>"
    not_owner: "<red>Denne ShopBlock tilhører en annen spiller og kan ikke plasseres av deg.</red>"
    max_shops_reached: "<red>Du har nådd butikkgrensen på{max_shops}. Nåværende plasserte butikker:{owned_shops}.</red>"
    shop_protected: "<red>Butikker kan ikke brytes direkte. Bruk butikkmenyen for å stenge butikken.</red>"
    double_chest_requires_shop_block: "<red>Butikker med dobbelt bryst krever et sekund<blue>ShopBlock</blue><red>. Vanlige kister kan ikke slå sammen med butikkkister.</red>"
    double_chest_owner_mismatch: "<red>Denne ShopBlock tilhører en annen eier, så den kan ikke utvide denne butikken.</red>"
    shop_already_double_chest: "<red>Denne butikken bruker allerede begge brysthalvdelene.</red>"
    double_chest_ambiguous: "<red>Denne ShopBlock berører flere butikkkister. Plasser den ved siden av bare én butikk.</red>"

# Utfallsmeldinger for planlagt skattebehandling.
tax_scheduler:
  paid: "<yellow>Innkrevd oppsatt butikkavgift på{amount}. Telte butikker:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Du kunne ikke betale den planlagte butikkavgiften på{amount}. Telte butikker:{owned_shops}.</red>"
  charge_failed: "<red>Kunne ikke kreve inn den planlagte butikkavgiften på{amount}. Telte butikker:{owned_shops}.</red>"

# Hovedbutikkoversiktsgrensesnitt for eier/admin-administrasjonshandlinger.
shop_overview_ui:
  title: "{owner} Butikk - {location}"
  summary:
    name: "<gold>Butikksammendrag</gold>"
    player:
      lore:
        - "<gray>Eier:</gray> <white>{owner}</white>"
        - "<gray>Sted:</gray> <white>{location}</white>"
        - "<gray>Lagrede oppføringer:</gray> <white>{item_count}</white>"
        - "<gray>Butikktype:</gray> <white>Spillerbutikk</white>"
        - "<gray>Inventar:</gray> <white>Finitt</white>"
    admin:
      lore:
        - "<gray>Eier:</gray> <white>{owner}</white>"
        - "<gray>Sted:</gray> <white>{location}</white>"
        - "<gray>Lagrede oppføringer:</gray> <white>{item_count}</white>"
        - "<gray>Butikktype:</gray> <white>Administrasjonsbutikk</white>"
        - "<gray>Inventar:</gray> <white>Uendelig</white>"
  finance:
    name: "<gold>Butikkbank</gold>"
    lore:
      - "<gray>Sporede valutaer:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Klikk for å se gjennom og ta ut midler.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Admin Shop aktivert</red>"
        lore:
          - "<gray>Denne butikken er for tiden en administrasjonsbutikk.</gray>"
          - "<gray>Beholdningen er uendelig for kundene.</gray>"
          - "<gray>Lagrede oppføringer:</gray> <white>{item_count}</white>"
          - "<yellow>Klikk for å bytte tilbake til en spillerbutikk.</yellow>"
      disabled:
        name: "<green>Admin Shop deaktivert</green>"
        lore:
          - "<gray>Denne butikken bruker for øyeblikket normalt lager.</gray>"
          - "<gray>Kunder kan kun kjøpe lagrede beløp.</gray>"
          - "<gray>Lagrede oppføringer:</gray> <white>{item_count}</white>"
          - "<yellow>Klikk for å aktivere admin shop-modus.</yellow>"
    close:
      name: "<red>Lukk butikk</red>"
      lore:
        - "<gray>Fjern denne butikken og returner butikkblokken.</gray>"
        - "<gray>Lagrede oppføringer:</gray> <white>{item_count}</white>"
        - "<gray>Sporede bankvalutaer:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Butikklageret må være tomt før stenging.</yellow>"
    manage:
      name: "<green>Legg til butikkvarer</green>"
      lore:
        - "<gray>Lagre nye varer i denne butikken.</gray>"
        - "<gray>Aktuelle oppføringer:</gray> <white>{item_count}</white>"
        - "<yellow>Klikk for å åpne elementinndata.</yellow>"
    customer_view:
      name: "<gold>Åpne kundevisning</gold>"
      lore:
        - "<gray>Forhåndsvis denne butikken slik kundene ser den.</gray>"
        - "<gray>Aktuelle oppføringer:</gray> <white>{item_count}</white>"
        - "<yellow>Klikk for å bla gjennom denne butikken som kunde.</yellow>"
    trusted:
      name: "<gold>Klarerte spillere</gold>"
      lore:
        - "<gray>Medarbeidere:</gray> <white>{associate_count}</white>"
        - "<gray>Klarerte spillere:</gray> <white>{trusted_count}</white>"
        - "<yellow>Klikk for å administrere butikktillitsnivåer.</yellow>"
    ledger:
      name: "<gold>Shop Ledger</gold>"
      lore:
        - "<gray>Totalt antall oppføringer:</gray> <white>{ledger_count}</white>"
        - "<gray>Kjøp:</gray> <white>{purchase_count}</white>"
        - "<gray>Skatter:</gray> <white>{tax_count}</white>"
        - "<yellow>Klikk for å se butikktransaksjonshistorikk.</yellow>"
    edit:
      name: "<aqua>Rediger butikkvarer</aqua>"
      lore:
        - "<gray>Rediger priser for lagrede butikkvarer.</gray>"
        - "<gray>Aktuelle oppføringer:</gray> <white>{item_count}</white>"
        - "<yellow>Klikk for å redigere priser og valutaer.</yellow>"
    storage:
      name: "<gold>Vis lagrede elementer</gold>"
      lore:
        - "<gray>Se gjennom varer som allerede er lagret i denne butikken.</gray>"
        - "<gray>Aktuelle oppføringer:</gray> <white>{item_count}</white>"
        - "<yellow>Klikk for å trekke tilbake lagrede varer.</yellow>"
    locked:
      name: "<red>Butikken er låst</red>"
      lore:
        - "<gray>Bare eieren kan legge til elementer.</gray>"
        - "<gray>Aktuelle oppføringer:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Du har ikke tillatelse til å administrere denne butikken.</red>"
    no_admin_permission: "<red>Du har ikke tillatelse til å bytte adminbutikk.</red>"
    admin_limit_reached: "<red>Serveren har allerede{admin_shops} adminbutikker. Gratisutgaven tillater kun {max_admin_shops} adminbutikker.</red>"
    admin_enabled: "<green>Denne butikken er nå en administrasjonsbutikk med uendelig kundebeholdning. Telte butikker:{owned_shops}.</green>"
    admin_disabled: "<yellow>Denne butikken er nå en normal spillerbutikk med begrenset kundebeholdning. Telte butikker:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Du kan ikke bytte denne adminbutikken tilbake til en spillerbutikk fordi butikkgrensen din er på{max_shops} er allerede nådd. Telte butikker: {owned_shops}.</red>"
    close_not_empty: "<red>Du kan bare stenge en butikk etter at du har fjernet alle lagrede varer. Gjenstående oppføringer:{item_count}.</red>"
    close_bank_not_empty: "<red>Ta ut butikkbanken din før du stenger denne butikken. Gjenværende sporede valutaer:{bank_currency_count}.</red>"
    closed: "<green>Stengte butikken og returnerte{returned_blocks} ShopBlock(er). Telte butikker: {owned_shops}.</green>"
    shop_missing:
      name: "<red>Butikk ikke funnet</red>"
      lore:
        - "<gray>Denne butikken kunne ikke lastes fra lageret.</gray>"
      message: "<red>Denne butikken kunne ikke lastes fra lageret.</red>"

# Globalt administrasjonskontrollpanel for RDS-administrasjon.
shop_admin_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Admin] RDS-kontroll</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[!]</gradient> <white>RDS administrasjonspanel</white>"
    lore:
      - "<gray>Administrer globale admin-shop-systemer fra ett sted.</gray>"
      - "<gray>Åpne serverbanken eller rediger konfigurasjonsinnstillingene nedenfor.</gray>"
      - "<yellow>Krever:</yellow> <white>raindropshops.command.admin</white>"
  actions:
    server_bank:
      name: "<gradient:#10b981:#34d399>[$] Serverbank</gradient>"
      lore:
        - "<gray>Gjennomgå administrasjonsbutikkinntekter hentet inn i serverbanken.</gray>"
        - "<gray>Sjekk tidspunktet for neste trekk og ta ut saldoene.</gray>"
        - "<yellow>Klikk for å åpne serverbankkontroller.</yellow>"
    config:
      name: "<gradient:#38bdf8:#60a5fa>[Cfg] Butikkkonfig</gradient>"
      lore:
        - "<gray>Rediger verdier fra</gray> <white>config/config.yml</white><gray>.</gray>"
        - "<gray>Alle redigerbare innstillinger kan endres gjennom en ambolt-melding.</gray>"
        - "<yellow>Klikk for å åpne konfigurasjonskontroller.</yellow>"
    currency:
      name: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutabehandler</gradient>"
      lore:
        - "<gray>Se gjennom oppdagede valutaer fra Vault og JExEconomy.</gray>"
        - "<gray>Opprett standarden</gray> <white>regndråper</white> <gray>valuta ved behov.</gray>"
        - "<yellow>Klikk for å åpne valutakontroller.</yellow>"
  feedback:
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratortilgang kreves</white>"
      lore:
        - "<gray>Du har ikke tillatelse til å bruke dette administrasjonspanelet.</gray>"

# Administratorvalutavisning for oppdagede leverandører og standard valutaoppretting.
shop_admin_currency_ui:
  title: "<gradient:#a78bfa:#c4b5fd>[Cur] Valutabehandler</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Valutaleverandører</white>"
    lore:
      - "<gray>Oppdagede valutaer:</gray> <white>{currency_count}</white>"
      - "<gray>Hvelv tilgjengelig:</gray> <white>{vault_available}</white>"
      - "<gray>JExEconomy tilgjengelig:</gray> <white>{jexeconomy_available}</white>"
      - "<yellow>Bruk krystallknappen for å lage standardvaluta.</yellow>"
  currency_entry:
    name: "<gradient:#38bdf8:#60a5fa>[Cur]</gradient> <white>{currency_id}</white>"
    lore:
      - "<gray>Leverandør:</gray> <white>{provider}</white>"
      - "<gray>Symbol:</gray> <white>{symbol}</white>"
      - "<gray>Prefiks:</gray> <white>{prefix}</white>"
      - "<gray>Suffiks:</gray> <white>{suffix}</white>"
  default_currency:
    create:
      name: "<gradient:#10b981:#34d399>[+]</gradient> <white>Skape{currency_id}</white>"
      lore:
        - "<gray>Opprett standard RDS-valuta i JExEconomy.</gray>"
        - "<yellow>Klikk for å opprette{currency_id}.</yellow>"
    unavailable:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>JExEconomy påkrevd</white>"
      lore:
        - "<gray>Du kan ikke opprette standardvaluta uten JExEconomy.</gray>"
        - "<gray>Installer og aktiver JExEconomy først.</gray>"
    already_exists:
      name: "<gradient:#22c55e:#86efac>[OK]</gradient> <white>{currency_id}Klar</white>"
      lore:
        - "<gray>Standardvalutaen finnes allerede.</gray>"
    messages:
      created: "<gradient:#22c55e:#86efac>[+]</gradient> <gray>Opprettet standardvaluta:</gray> <white>{currency_id}</white>"
      failed: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Kunne ikke opprette valuta:</gray> <white>{currency_id}</white>"
      already_exists: "<gradient:#38bdf8:#60a5fa>[!]</gradient> <gray>Valuta eksisterer allerede:</gray> <white>{currency_id}</white>"
      jexeconomy_required: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du kan ikke bruke denne knappen med mindre JExEconomy er tilgjengelig.</gray>"
  feedback:
    empty:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Ingen valutaer oppdaget</white>"
      lore:
        - "<gray>Ingen Vault- eller JExEconomy-valutaer ble oppdaget.</gray>"
    locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratortilgang kreves</white>"
      lore:
        - "<gray>Du har ikke tillatelse til å bruke denne valutavisningen.</gray>"
    locked_message: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Du har ikke tillatelse til å administrere valutaer.</gray>"
  decoration:
    border:
      name: " "

# Konfigurer nettlesergrensesnittet for redigerbare innstillinger og oppdateringsfeedback.
shop_config_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Cfg] Butikkkonfig</gradient>"
  summary:
    name: "<gradient:#f59e0b:#fbbf24>[Info]</gradient> <white>Konfigurasjonsinnstillinger</white>"
    lore:
      - "<gray>Redigerbare innstillinger oppdaget:</gray> <white>{setting_count}</white>"
      - "<gray>Klikk på en oppføring nedenfor for å redigere verdien i en ambolt.</gray>"
      - "<yellow>Endringer skrives direkte til config/config.yml.</yellow>"
  entry:
    name: "<gradient:#22c55e:#86efac>[Sett]</gradient> <white>{config_path}</white>"
    lore:
      - "<gray>Sti:</gray> <white>{config_path}</white>"
      - "<gray>Type:</gray> <white>{value_type}</white>"
      - "<gray>Gjeldende verdi:</gray> <white>{current_value}</white>"
      - "<yellow>Klikk for å redigere denne innstillingen.</yellow>"
  type:
    boolean: "<gradient:#22c55e:#86efac>[boolsk]</gradient>"
    integer: "<gradient:#f59e0b:#fbbf24>[Heltall]</gradient>"
    long: "<gradient:#f59e0b:#fbbf24>[Lang]</gradient>"
    double: "<gradient:#38bdf8:#60a5fa>[Dobbelt]</gradient>"
    list: "<gradient:#a78bfa:#c4b5fd>[Liste]</gradient>"
    string: "<gradient:#6b7280:#9ca3af>[String]</gradient>"
  feedback:
    empty:
      name: "<gradient:#6b7280:#9ca3af>[~]</gradient> <white>Ingen redigerbare innstillinger</white>"
      lore:
        - "<gray>Ingen redigerbare skalar-/listekonfigurasjonsinnstillinger ble funnet.</gray>"
    permission_locked:
      name: "<gradient:#ef4444:#f87171>[X]</gradient> <white>Administratortilgang kreves</white>"
      lore:
