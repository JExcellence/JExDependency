# ============================================
# ΠΑΓΚΟΣΜΙΟ ΠΡΟΘΕΜΑ
# ============================================
# Το πρόθεμα προστέθηκε στη γενική έξοδο συνομιλίας με προσθήκη.
prefix: "<gradient:#a855f7:#c084fc>[RDS]</gradient> "

# Γρήγορες γραμμές σύνοψης για το κατάστημα, την τράπεζα και τη φορολογική κατάσταση.
info:
  total: "<blue>Καταστήματα:</blue> <white>{owned_shops}</white>"
  bank: "<green>Παρακολουθούμενα υπόλοιπα ({currency_count}):</green> <white>{currencies}</white>"
  tax_amount: "<gold>Προγραμματισμένος φόρος ({taxed_shops}φορολογητέα καταστήματα):</gold> <white>{taxes}</white>"
  tax_schedule: "<yellow>Επόμενος φόρος:</yellow> <white>{next_tax_at}</white> <gray>({time_until})</gray>"

# Τα μηνύματα χρόνου συμμετοχής εμφανίζονται όταν οι παίκτες εισέρχονται στον διακομιστή.
player_join:
  tax_notice: "<green>~~~~~~~~<red>RDS<green>~~~~~~~~\n<yellow>{taxed_shops}φορολογητέο(α) κατάστημα(α)\n[<blue>Ποσό<yellow>]\n{taxes}\n<red>Οφειλόμενος:<yellow> {next_tax_at} ({time_until}).\n<green>~~~~~~~~<red>RDS<green>~~~~~~~~</green>"

# Συμβολοσειρές απόκρισης εντολών για χαρακτηριστικά και εναλλαγές «/rs».
prs:
  admin:
    opened: "<gradient:#38bdf8:#60a5fa>[ΕΝΑ]</gradient> <gray>Άνοιξε το<white>Διαχειριστής RDS</white><gray>πίνακας.</gray>"
  bar:
    enabled: "<green>Η γραμμή αφεντικού καταστήματος ενεργοποιήθηκε ενώ κοιτάζετε ένα κατάστημα.</green>"
    disabled: "<yellow>Η γραμμή αφεντικού καταστήματος απενεργοποιήθηκε.</yellow>"
  give:
    syntax: "<red>Χρήση: /rs give<target_player> <amount></red>"
  scoreboard:
    syntax: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Χρήση:</gray> <white>/rs πίνακας αποτελεσμάτων&lt;καθολικό|απόθεμα&gt;</white>"
    enabled: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Ενεργοποιήθηκε το<white>{scoreboard_type}</white><gray>πλαϊνή μπάρα.</gray>"
    disabled: "<gradient:#f59e0b:#fbbf24>[-]</gradient> <gray>Απενεργοποιήθηκε το<white>{scoreboard_type}</white><gray>πλαϊνή μπάρα.</gray>"
    switched: "<gradient:#38bdf8:#60a5fa>[>]</gradient> <gray>Μετάβαση στο<white>{scoreboard_type}</white><gray>πλαϊνή μπάρα.</gray>"
    type:
      ledger: "<gold>καθολικό</gold>"
      stock: "<aqua>στοκ</aqua>"

# Ετικέτες πίνακα αποτελεσμάτων πλευρικής γραμμής και μορφοποίηση τιμών.
scoreboard_sidebar:
  ledger:
    title: "<gradient:#f59e0b:#fbbf24>◆ [RDS] Ledger ◆</gradient>"
    transactions: "<yellow>Tx:</yellow> <white>{transaction_count}</white>"
    bank_header: "<gold>$ Τραπεζικά Σύνολα</gold>"
    bank_entry: "<gray>{currency_name}:</gray> <white>{amount}</white>"
    bank_empty: "<red>Χωρίς τραπεζικά κεφάλαια</red>"
  stock:
    title: "<gradient:#38bdf8:#60a5fa>◆ [RDS] Απόθεμα ◆</gradient>"
    location: "<white>{location}</white>"
    amount: "<gray>Στοκ:</gray> <white>{current_stock}/{total_stock}</white>"
    empty: "<red>Δεν υπάρχουν καταστήματα παικτών</red>"

# Το κείμενο της γραμμής αφεντικού εμφανίζεται κατά τη στόχευση ενός καταστήματος.
shop_boss_bar:
  title: "<gold>{shop_type}Κατάστημα</gold> <gray>|</gray> <yellow>Ιδιοκτήτης:</yellow> <white>{owner}</white> <gray>|</gray> <yellow>Στοιχεία:</yellow> <white>{available_items}</white> <gray>|</gray> <yellow>Τοποθεσία:</yellow> <white>{location}</white>"
  type:
    player: "Παίχτης"
    admin: "Διαχειρ"
  owner:
    admin: "Διαχειρ"
  available_items:
    finite: "{item_count}"
    limited: "Περιορισμένο απόθεμα"
    infinite: "Απειρος"
    various: "Διάφορος"

# ============================================
# Κουμπιά GUI
# ============================================

# Όνομα στοιχείου μπλοκ καταστήματος και μεταδεδομένα γνώσης.
shop_block:
  name: "<blue>RaindropShop</blue>"
  lore:
    - "<yellow>Τοποθετήστε αυτό το μπλοκ για να ρυθμίσετε το κατάστημά σας.</yellow>"

# Επισκόπηση καταστημάτων ετικέτες διεπαφής χρήστη, παραδόσεις και καταστάσεις διαθεσιμότητας.
shop_store_ui:
  title: "<gradient:#38bdf8:#60a5fa>[$] Κατάστημα</gradient>"
  owned_shops:
    name: "<gradient:#10b981:#34d399>[#] Ιδιόκτητα μπλοκ καταστημάτων</gradient>"
    lore:
      - "<gray>Ιδιόκτητα μπλοκ καταστημάτων:</gray> <white>{owned_shops}</white>"
      - "<gray>Αυτό το κομμάτι αγοράστηκε ή παραχωρήθηκε</gray>"
      - "<gray>Ιδιοκτησία ShopBlock.</gray>"
  max_shops:
    name: "<gradient:#f59e0b:#fbbf24>[Κεφάλαιο] Όριο αποκλεισμού καταστημάτων</gradient>"
    lore:
      - "<gray>Ιδιόκτητα μπλοκ καταστημάτων:</gray> <white>{owned_shops}</white>"
      - "<gray>Μέγιστα μπλοκ καταστημάτων:</gray> <white>{max_shops}</white>"
      - "<gray>Αυτό το όριο ελέγχει πόσα καταστήματα</gray>"
      - "<gray>μπλοκ που μπορείτε να ξεκλειδώσετε.</gray>"
  costs:
    name: "<gradient:#f59e0b:#fbbf24>[Req] Απαιτήσεις καταστήματος</gradient>"
    lore:
      - "<gray>Διαμορφωμένες απαιτήσεις:</gray> <white>{requirement_count}</white>"
      - "<gray>Τρέχουσα καταμέτρηση απαιτήσεων:</gray> <white>{requirements}</white>"
      - "<gray>Κατάσταση:</gray> <white>{availability}</white>"
      - "<yellow>Κάντε κλικ για να επιθεωρήσετε την επόμενη βαθμίδα καταστήματος.</yellow>"
    availability:
      available: "<gradient:#10b981:#34d399>[Ετοιμος]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Εκκρεμής]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Εκτός σύνδεσης]</gradient>"

# Διεπαφή χρήστη απαίτησης επιπέδου καταστημάτων, προβολή προόδου και σχόλια αγοράς.
shop_store_cost_ui:
  title: "<gradient:#38bdf8:#60a5fa>[Req] Επίπεδο καταστήματος{purchase_number}</gradient>"
  summary:
    name: "<gradient:#10b981:#34d399>[+] Αγορά μπλοκ καταστήματος</gradient>"
    lore:
      - "<gray>Επίπεδο αγοράς:</gray> <white>{purchase_number}</white>"
      - "<gray>Ιδιόκτητα μπλοκ καταστημάτων:</gray> <white>{owned_shops}</white>"
      - "<gray>Μέγιστα μπλοκ καταστημάτων:</gray> <white>{max_shops}</white>"
      - "<gray>Διαμορφωμένες απαιτήσεις:</gray> <white>{requirement_count}</white>"
      - "<gray>Επί του παρόντος συναντήθηκαν:</gray> <white>{met_count}</white>"
      - "<gray>Κατάσταση:</gray> <white>{availability}</white>"
      - "<yellow>Κάντε κλικ για αγορά όταν αυτό το επίπεδο είναι έτοιμο.</yellow>"
    availability:
      ready: "<gradient:#10b981:#34d399>[Ετοιμος]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Εκκρεμής]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Εκτός σύνδεσης]</gradient>"
    none: "<gradient:#10b981:#34d399>[Δωρεάν]</gradient>"
  empty:
    name: "<gradient:#10b981:#34d399>[Δωρεάν] Χωρίς Απαιτήσεις</gradient>"
    lore:
      - "<gray>Αυτό το επίπεδο αγοράς δεν έχει διαμορφωμένες απαιτήσεις.</gray>"
      - "<yellow>Μπορείτε να αγοράσετε αυτό το μπλοκ καταστήματος χωρίς επιπλέον ελέγχους.</yellow>"
  progress_bar:
    empty: "<gradient:#6b7280:#9ca3af>░</gradient>"
    partial: "<gradient:#f59e0b:#fbbf24>▓</gradient>"
    filled: "<gradient:#10b981:#34d399>█</gradient>"
  entry:
    name: "<gradient:#f59e0b:#fbbf24>[Req]{requirement_name}</gradient>"
    lore:
      - "<gray>Κλειδί:</gray> <white>{requirement_key}</white>"
      - "<gray>Τύπος:</gray> <white>{requirement_type}</white>"
      - "<gray>Κατάσταση:</gray> <white>{status}</white>"
      - "<gray>Πρόοδος:</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
      - "<gray>Περίληψη:</gray> <white>{summary}</white>"
      - "<yellow>Κάντε δεξί κλικ σε συμβατές απαιτήσεις για την πρόοδο της τράπεζας.</yellow>"
    details: "<gradient:#f59e0b:#fbbf24>▓ Λεπτομερείς Έλεγχοι</gradient>"
    status:
      met: "<gradient:#10b981:#34d399>[Μετ]</gradient>"
      pending: "<gradient:#f59e0b:#fbbf24>[Εκκρεμής]</gradient>"
      unavailable: "<gradient:#ef4444:#f87171>[Δυσεύρετος]</gradient>"
  feedback:
    purchased: "<gradient:#10b981:#34d399>[+]</gradient> <gray>Αγόρασε ένα μπλοκ καταστήματος. Απαιτήσεις που καταναλώνονται:</gray> <white>{requirements}</white><gray>. Ιδιόκτητα μπλοκ καταστημάτων:</gray> <white>{owned_shops}/{max_shops}</white>"
    requirement_unmet: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Δεν συναντιέστε αυτήν τη στιγμή<white>{requirement}</white><gray>. Απαιτήσεις καταστήματος:</gray> <white>{requirements}</white>"
    requirement_unavailable: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Η απαίτηση του καταστήματος<white>{requirement}</white><gray>δεν είναι διαθέσιμο ή δεν είναι έγκυρο αυτήν τη στιγμή.</gray>"
    limit_reached: "<gradient:#ef4444:#f87171>[X]</gradient> <gray>Έχετε φτάσει το όριο αποκλεισμού καταστημάτων<white>{max_shops}</white><gray>. Ιδιόκτητα μπλοκ καταστημάτων:</gray> <white>{owned_shops}</white>"
    complete: "<gradient:#10b981:#34d399>█</gradient> <gray><white>{requirement}</white><gray>είναι τώρα έτοιμο.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    progress_saved: "<gradient:#f59e0b:#fbbf24>▓</gradient> <gray>Αποθηκευμένη πρόοδος για<white>{requirement}</white><gray>.</gray> {progress_bar} <gradient:#6b7280:#9ca3af>{progress}</gradient>"
    no_progress: "<gradient:#6b7280:#9ca3af>░</gradient> <gray>Δεν υπήρχαν διαθέσιμα στοιχεία ή νόμισμα που να ταιριάζουν<white>{requirement}</white><gray>.</gray>"
    unsupported: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>δεν υποστηρίζει την τραπεζική πρόοδο.</gray>"
    unavailable: "<gradient:#ef4444:#f87171>[X]</gradient> <gray><white>{requirement}</white><gray>δεν είναι διαθέσιμο αυτή τη στιγμή.</gray>"
    profile_missing: "<gradient:#ef4444:#f87171>[!]</gradient> <gray>Δεν ήταν δυνατή η φόρτωση του προφίλ σας RDS, επομένως δεν ήταν δυνατή η αποθήκευση της προόδου.</gray>"

# Αποκλεισμός σφαλμάτων επικύρωσης αλληλεπίδρασης και ειδοποιήσεων προστασίας.
block_listener:
  error:
    invalid_owner_uuid: "<red>Δεν είναι δυνατή η ανάγνωση του ιδιοκτήτη του καταστήματος από αυτό το στοιχείο.</red>"
    not_owner: "<red>Αυτό το ShopBlock ανήκει σε άλλο παίκτη και δεν μπορεί να τοποθετηθεί από εσάς.</red>"
    max_shops_reached: "<red>Έχετε φτάσει το όριο καταστήματος του{max_shops}. Τρέχοντα τοποθετημένα καταστήματα:{owned_shops}.</red>"
    shop_protected: "<red>Τα καταστήματα δεν μπορούν να σπάσουν απευθείας. Χρησιμοποιήστε το μενού καταστήματος για να κλείσετε το κατάστημα.</red>"
    double_chest_requires_shop_block: "<red>Τα μαγαζιά με διπλό στήθος απαιτούν ένα δεύτερο<blue>ShopBlock</blue><red>. Τα κανονικά σεντούκια δεν μπορούν να συγχωνευθούν με τα σεντούκια καταστημάτων.</red>"
    double_chest_owner_mismatch: "<red>Αυτό το ShopBlock ανήκει σε διαφορετικό ιδιοκτήτη, επομένως δεν μπορεί να επεκτείνει αυτό το κατάστημα.</red>"
    shop_already_double_chest: "<red>Αυτό το κατάστημα χρησιμοποιεί ήδη και τα δύο μισά στήθους.</red>"
    double_chest_ambiguous: "<red>Αυτό το ShopBlock αγγίζει πολλαπλά σεντούκια καταστημάτων. Τοποθετήστε το δίπλα σε ένα μόνο κατάστημα.</red>"

# Προγραμματισμένα μηνύματα αποτελέσματος φορολογικής επεξεργασίας.
tax_scheduler:
  paid: "<yellow>Εισπράττεται προγραμματισμένος φόρος καταστημάτων του{amount}. Καταμετρημένα καταστήματα:{owned_shops}.</yellow>"
  insufficient_funds: "<red>Δεν μπορούσατε να πληρώσετε τον προγραμματισμένο φόρο καταστήματος του{amount}. Καταμετρημένα καταστήματα:{owned_shops}.</red>"
  charge_failed: "<red>Αποτυχία είσπραξης του προγραμματισμένου φόρου καταστήματος του{amount}. Καταμετρημένα καταστήματα:{owned_shops}.</red>"

# Κύρια διεπαφή επισκόπησης καταστήματος για ενέργειες διαχείρισης ιδιοκτήτη/διαχειριστή.
shop_overview_ui:
  title: "{owner} Κατάστημα - {location}"
  summary:
    name: "<gold>Περίληψη καταστήματος</gold>"
    player:
      lore:
        - "<gray>Ιδιοκτήτης:</gray> <white>{owner}</white>"
        - "<gray>Τοποθεσία:</gray> <white>{location}</white>"
        - "<gray>Αποθηκευμένες καταχωρήσεις:</gray> <white>{item_count}</white>"
        - "<gray>Τύπος καταστήματος:</gray> <white>Player Shop</white>"
        - "<gray>Καταγραφή εμπορευμάτων:</gray> <white>Πεπερασμένος</white>"
    admin:
      lore:
        - "<gray>Ιδιοκτήτης:</gray> <white>{owner}</white>"
        - "<gray>Τοποθεσία:</gray> <white>{location}</white>"
        - "<gray>Αποθηκευμένες καταχωρήσεις:</gray> <white>{item_count}</white>"
        - "<gray>Τύπος καταστήματος:</gray> <white>Κατάστημα διαχειριστή</white>"
        - "<gray>Καταγραφή εμπορευμάτων:</gray> <white>Απειρος</white>"
  finance:
    name: "<gold>Τράπεζα καταστήματος</gold>"
    lore:
      - "<gray>Παρακολουθούμενα νομίσματα:</gray> <white>{bank_currency_count}</white>"
      - "<yellow>Κάντε κλικ για έλεγχο και ανάληψη χρημάτων.</yellow>"
  actions:
    admin_toggle:
      enabled:
        name: "<red>Ενεργοποιήθηκε το κατάστημα Admin</red>"
        lore:
          - "<gray>Αυτό το κατάστημα είναι επί του παρόντος ένα κατάστημα διαχείρισης.</gray>"
          - "<gray>Το απόθεμα είναι άπειρο για τους πελάτες.</gray>"
          - "<gray>Αποθηκευμένες καταχωρήσεις:</gray> <white>{item_count}</white>"
          - "<yellow>Κάντε κλικ για να επιστρέψετε σε ένα κατάστημα παικτών.</yellow>"
      disabled:
        name: "<green>Το Admin Shop απενεργοποιήθηκε</green>"
        lore:
          - "<gray>Αυτό το κατάστημα χρησιμοποιεί προς το παρόν κανονικό απόθεμα.</gray>"
          - "<gray>Οι πελάτες μπορούν να αγοράσουν μόνο αποθηκευμένα ποσά.</gray>"
          - "<gray>Αποθηκευμένες καταχωρήσεις:</gray> <white>{item_count}</white>"
          - "<yellow>Κάντε κλικ για να ενεργοποιήσετε τη λειτουργία καταστήματος διαχειριστή.</yellow>"
    close:
      name: "<red>Κλείσιμο καταστήματος</red>"
      lore:
        - "<gray>Αφαιρέστε αυτό το κατάστημα και επιστρέψτε το μπλοκ καταστήματος.</gray>"
        - "<gray>Αποθηκευμένες καταχωρήσεις:</gray> <white>{item_count}</white>"
        - "<gray>Τραπεζικά νομίσματα που παρακολουθούνται:</gray> <white>{bank_currency_count}</white>"
        - "<yellow>Το απόθεμα του καταστήματος πρέπει να είναι άδειο πριν κλείσει.</yellow>"
    manage:
      name: "<green>Προσθήκη ειδών καταστήματος</green>"
      lore:
        - "<gray>Αποθηκεύστε νέα αντικείμενα σε αυτό το κατάστημα.</gray>"
        - "<gray>Τρέχουσες εγγραφές:</gray> <white>{item_count}</white>"
        - "<yellow>Κάντε κλικ για να ανοίξετε την εισαγωγή στοιχείου.</yellow>"
    customer_view:
      name: "<gold>Ανοίξτε την Προβολή πελατών</gold>"
      lore:
        - "<gray>Κάντε προεπισκόπηση αυτού του καταστήματος όπως το βλέπουν οι πελάτες.</gray>"
        - "<gray>Τρέχουσες εγγραφές:</gray> <white>{item_count}</white>"
        - "<yellow>Κάντε κλικ για να περιηγηθείτε σε αυτό το κατάστημα ως πελάτης.</yellow>"
    trusted:
      name: "<gold>Αξιόπιστοι παίκτες</gold>"
      lore:
        - "<gray>Συνεργάτες:</gray> <white>{associate_count}</white>"
        - "<gray>Αξιόπιστοι παίκτες:</gray> <white>{trusted_count}</white>"
        - "<yellow>Κάντε κλικ για να διαχειριστείτε τα επίπεδα εμπιστοσύνης καταστήματος.</yellow>"
    ledger:
      name: "<gold>Κατάστημα Ledger</gold>"
      lore:
        - "<gray>Σύνολο συμμετοχών:</gray> <white>{ledger_count}</white>"
        - "<gray>Ψώνια:</gray> <white>{purchase_count}</white>"
        - "<gray>Φόροι:</gray> <white>{tax_count}</white>"
        - "<yellow>Κάντε κλικ για να ελέγξετε το ιστορικό συναλλαγών καταστήματος.</yellow>"
    edit:
      name: "<aqua>Επεξεργασία ειδών καταστήματος</aqua>"
      lore:
        - "<gray>Επεξεργασία τιμολόγησης για αποθηκευμένα είδη καταστήματος.</gray>"
        - "<gray>Τρέχουσες εγγραφές:</gray> <white>{item_count}</white>"
        - "<yellow>Κάντε κλικ για να επεξεργαστείτε τιμές και νομίσματα.</yellow>"
    storage:
      name: "<gold>Προβολή αποθηκευμένων αντικειμένων</gold>"
      lore:
        - "<gray>Ελέγξτε τα είδη που είναι ήδη αποθηκευμένα σε αυτό το κατάστημα.</gray>"
        - "<gray>Τρέχουσες εγγραφές:</gray> <white>{item_count}</white>"
        - "<yellow>Κάντε κλικ για ανάληψη αποθηκευμένων στοιχείων.</yellow>"
    locked:
      name: "<red>Το κατάστημα είναι κλειδωμένο</red>"
      lore:
        - "<gray>Μόνο ο κάτοχος μπορεί να προσθέσει στοιχεία.</gray>"
        - "<gray>Τρέχουσες εγγραφές:</gray> <white>{item_count}</white>"
  feedback:
    not_owner: "<red>Δεν έχετε άδεια διαχείρισης αυτού του καταστήματος.</red>"
    no_admin_permission: "<red>Δεν έχετε άδεια για εναλλαγή καταστημάτων διαχειριστή.</red>"
    admin_limit_reached: "<red>Ο διακομιστής έχει ήδη{admin_shops}admin καταστήματα. Η δωρεάν έκδοση επιτρέπει μόνο{max_admin_shops}admin καταστήματα.</red>"
    admin_enabled: "<green>Αυτό το κατάστημα είναι πλέον ένα κατάστημα διαχείρισης με άπειρο απόθεμα πελατών. Καταμετρημένα καταστήματα:{owned_shops}.</green>"
    admin_disabled: "<yellow>Αυτό το κατάστημα είναι πλέον ένα κανονικό κατάστημα παικτών με πεπερασμένο απόθεμα πελατών. Καταμετρημένα καταστήματα:{owned_shops}.</yellow>"
    admin_disable_limit_reached: "<red>Δεν μπορείτε να επαναφέρετε αυτό το κατάστημα διαχειριστή σε κατάστημα αναπαραγωγής επειδή το όριο του καταστήματός σας είναι{max_shops}έχει ήδη επιτευχθεί. Καταμετρημένα καταστήματα:{owned_shops}.</red>"
    close_not_empty: "<red>Μπορείτε να κλείσετε ένα κατάστημα μόνο αφού αφαιρέσετε όλα τα αποθηκευμένα αντικείμενα. Υπόλοιπες καταχωρήσεις:{item_count}.</red>"
    close_bank_not_empty: "<red>Αποσύρετε την τράπεζα του καταστήματός σας πριν κλείσετε αυτό το κατάστημα. Υπόλοιπα παρακολουθούμενα νομίσματα:{bank_currency_count}.</red>"
    closed: "<green>Έκλεισε το μαγαζί και επέστρεψε{returned_blocks}ShopBlock(α). Καταμετρημένα καταστήματα:{owned_shops}.</green>"
    shop_missing:
      name: "<red>Το κατάστημα δεν βρέθηκε</red>"
      lore:
