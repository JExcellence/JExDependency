# Admin shop stock behavior.
admin_shops:
  # gradual = restore limited admin stock one item at a time using each item's reset timer.
  # full_at_time = refill every limited admin item to full stock at the configured time.
  restock_mode: gradual
  # How often the admin shop restock scheduler checks shops.
  restock_check_period_ticks: 20
  # Default per-item reset timer used when a stock limit is first configured.
  default_reset_timer_ticks: 1200
  # Used when restock_mode is full_at_time.
  full_restock_time: midnight
  # Time zone used for full_at_time restocks.
  time_zone: system
# Central server bank settings for admin shop income.
server_bank:
  # Enable automatic transfer from admin shop banks into the global server bank.
  enabled: true
  # Bukkit ticks between transfer sweeps (20 ticks = 1 second).
  transfer_interval_ticks: 1200
# Protection bridge settings. Currently supports RDT, Towny, and HuskTowns.
protection:
  # If true, players can place ShopBlocks only while standing in their own town claim.
  only_player_shops: false
  # If true, failed protection shop taxes first attempted from town bank will retry from the owner's player balance.
  # If false, a failed town-bank tax charge is recorded as unpaid debt on affected shops.
  shop_taxes_fallback_to_player: false
  # Tax currencies charged through the player's town bank during scheduled shop taxes.
  # Uses the same per-currency format as taxes.<currency> (initial_cost, growth_rate, maximum_tax).
  # Supports multiple and custom currencies.
  shop_taxes:
    vault:
      initial_cost: 100.0
      growth_rate: 1.125
      maximum_tax: -1
    raindrops:
      initial_cost: 5.0
      growth_rate: 1.075
      maximum_tax: 50000
# Scheduled taxes for counted player shops.
taxes:
  vault:
    initial_cost: 100.0
    growth_rate: 1.125
    # -1 for no cap
    maximum_tax: -1
  raindrops:
    initial_cost: 5.0
    growth_rate: 1.075
    maximum_tax: 50000
  # Bukkit ticks between tax runs. Default is 24 hours.
  duration: 1728000
  # Examples: noon, midnight, 6pm, 18:00, 06:30
  start_time: noon
  # Time zone used when aligning the configured start_time. Examples:
  # system, UTC, America/New_York, Europe/London
  time_zone: system
  # Send a reminder on join showing the player's next scheduled shop tax.
  join_notification: true
  # Extra tax multiplier per shop item marked with availability mode NEVER.
  # Example: 0.25 means +25% tax for each NEVER item across your player shops.
  never_item_penalty_rate: 0.25
  # Maximum unpaid bankruptcy debt tracked per shop and currency.
  # Positive values cap debt growth; -1 (or any non-positive value) allows unlimited debt.
  maximum_bankruptcy_amount: -1
# Player shop boss bar settings for /rs bar.
boss_bar:
  # Bukkit ticks between boss bar refreshes.
  update_period_ticks: 10
  # Maximum block distance a player can look at and still see shop details.
  view_distance: 12
# Default currency when items are added to shops - players can change to any currencies not blacklisted
default_currency_type: vault
# Blacklisted currencies - players cannot set shops to listed currency
blacklisted_currencies:
  - raindrops
