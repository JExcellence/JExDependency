# Admin shop stock behavior.
admin_shops:
  # gradual = restore limited admin stock one item at a time using each item's reset timer.
  # full_at_time = refill every limited admin item to full stock at the configured time.
  restock_mode: gradual
  # How often the admin shop restock scheduler checks shops.
  restock_check_period_ticks: 20
  # Default per-item reset timer used when a stock limit is first configured.
  default_reset_timer_ticks: 1200
  # Used when restock_mode is full_at_time.
  full_restock_time: midnight
  # Time zone used for full_at_time restocks.
  time_zone: system
# Scheduled taxes for counted player shops.
taxes:
  vault:
    initial_cost: 100.0
    growth_rate: 1.125
    # -1 for no cap
    maximum_tax: -1
  coins:
    initial_cost: 5.0
    growth_rate: 1.075
    maximum_tax: 50000
  # Bukkit ticks between tax runs. Default is 24 hours.
  duration: 1728000
  # Examples: noon, midnight, 6pm, 18:00, 06:30
  start_time: noon
  # Time zone used when aligning the configured start_time. Examples:
  # system, UTC, America/New_York, Europe/London
  time_zone: system
  # Send a reminder on join showing the player's next scheduled shop tax.
  join_notification: true
# Player shop boss bar settings for /rs bar.
boss_bar:
  # Bukkit ticks between boss bar refreshes.
  update_period_ticks: 10
  # Maximum block distance a player can look at and still see shop details.
  view_distance: 12
# Default currency when items are added to shops - players can change to any currencies not blacklisted
default_currency_type: vault
# Blacklisted currencies - players cannot set shops to listed currency
blacklisted_currencies:
  - raindrops
