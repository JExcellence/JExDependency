# Admin shop stock behavior.
admin_shops:
  # gradual = restore limited admin stock one item at a time using each item's reset timer.
  # full_at_time = refill every limited admin item to full stock at the configured time.
  restock_mode: gradual
  # How often the admin shop restock scheduler checks shops.
  restock_check_period_ticks: 20
  # Default per-item reset timer used when a stock limit is first configured.
  default_reset_timer_ticks: 1200
  # Used when restock_mode is full_at_time.
  full_restock_time: midnight
  # Time zone used for full_at_time restocks.
  time_zone: system
# Central server bank settings for admin shop income.
server_bank:
  # Enable automatic transfer from admin shop banks into the global server bank.
  enabled: true
  # Bukkit ticks between transfer sweeps (20 ticks = 1 second).
  transfer_interval_ticks: 1200
# Protection bridge settings. Currently supports RDT, Towny, and HuskTowns.
protection:
  # If true, players can place ShopBlocks only while standing in their own town claim.
  only_player_shops: false
  # If true, failed protection shop taxes first attempted from town bank will retry from the owner's player balance.
  # If false, a failed town-bank tax charge is recorded as unpaid debt on affected shops.
  shop_taxes_fallback_to_player: true
  # Protection-tax currencies and optional global maximum charge caps.
  # Base tax calculation still comes from taxes.<currency> (initial_cost, growth_rate, maximum_tax).
  # Values here are global maximums for the scheduled protection-tax charge per currency:
  #   > 0 = cap charge at this amount, <= 0 = unlimited.
  # Supports multiple and custom currencies.
  shop_taxes:
    vault: -1
    raindrops: 50000
# Scheduled taxes for counted player shops.
taxes:
  vault:
    initial_cost: 100.0
    growth_rate: 1.125
    # -1 for no cap
    maximum_tax: -1
  raindrops:
    initial_cost: 5.0
    growth_rate: 1.075
    maximum_tax: 50000
  # Bukkit ticks between tax runs. Default is 24 hours.
  duration: 1728000
  # Examples: noon, midnight, 6pm, 18:00, 06:30
  start_time: noon
  # Time zone used when aligning the configured start_time. Examples:
  # system, UTC, America/New_York, Europe/London
  time_zone: system
  # Send a reminder on join showing the player's next scheduled shop tax.
  join_notification: true
  # Extra tax multiplier per shop item marked with availability mode NEVER.
  # Example: 0.25 means +25% tax for each NEVER item across your player shops.
  never_item_penalty_rate: 0.25
  # Maximum unpaid bankruptcy debt tracked per shop and currency.
  # Positive values cap debt growth; -1 (or any non-positive value) allows unlimited debt.
  maximum_bankruptcy_amount:
    vault: -1
    raindrops: -1
# Player shop boss bar settings for /rs bar.
boss_bar:
  # Bukkit ticks between boss bar refreshes.
  update_period_ticks: 10
  # Maximum block distance a player can look at and still see shop details.
  view_distance: 12
# Default currency when items are added to shops - players can change to any currencies not blacklisted
default_currency_type: vault
# Fallback item price used when a material has no entry in config/material-prices.yml
default_item_price: 0.0
# Blacklisted currencies - players cannot set shops to listed currency
blacklisted_currencies:
  - raindrops
# Dynamic market pricing for customer views and checkout.
dynamic_pricing:
  # Set to true to enable market-based price adjustments.
  enabled: true
  # Bukkit ticks between market snapshot refreshes.
  refresh_interval_ticks: 200
  # Sliding window used when counting recent completed sales.
  recent_sales_window_minutes: 180
  # ITEM_UNITS or TRANSACTIONS.
  recent_sales_mode: ITEM_UNITS
  # CONFIG_DEFAULT, LISTING_VALUE, or FIXED_FALLBACK.
  missing_base_price_mode: CONFIG_DEFAULT
  # Used only when missing_base_price_mode is FIXED_FALLBACK.
  missing_base_price_fallback: 0.0
  formula:
    # Base multiplier before market signals are applied.
    base_multiplier: 1.0
    # Lower and upper multiplier guards.
    minimum_multiplier: 0.20
    maximum_multiplier: 4.00
    # Supply pressure from number of shops selling the item.
    shops_selling_weight: 0.35
    shops_selling_baseline: 4.0
    # Supply pressure from listed stock quantity.
    listed_items_weight: 0.25
    listed_items_baseline: 512.0
    # Demand pressure from recent completed sales.
    recent_sales_weight: 0.60
    recent_sales_baseline: 128.0
  stability:
    # Absolute floor and optional absolute cap for final unit prices.
    minimum_price: 0.01
    # <= 0 disables the absolute maximum price cap.
    maximum_price: -1.0
    # 0.35 = 35% maximum movement per refresh step.
    max_step_change_percent: 0.35
    # 0.0 disables smoothing, 1.0 fully trusts newest raw values.
    smoothing_alpha: 0.35
    # Decimal places for the final dynamic unit price.
    rounding_scale: 2
  infinite_stock:
    # IGNORE, FIXED_CAP, or USE_HIGHEST_FINITE.
    mode: FIXED_CAP
    # Effective listed quantity when mode is FIXED_CAP.
    fixed_cap_amount: 4096
    # Fallback effective quantity for USE_HIGHEST_FINITE when no finite listing exists.
    fallback_amount_when_no_finite: 512
    # Whether infinite listings count toward the number of shops selling.
    count_as_seller: true
