# Log a startup warning for shop purchase tiers that do not have configured requirements.
warn_missing_requirements: true

# Default limit for placed player shops. Set to -1 for no limit.
max_shops: 10

# RPlatform-powered requirements consumed for each one-based shop purchase tier.
