# Set to false to disable this skill without deleting its rates.
enabled: true

# Bukkit material used for this skill's icon in the menu.
display:
  icon: CRAFTING_TABLE

# Shared level and prestige settings for this skill.
progression:
  # Soft cap for normal leveling. Before the final prestige, players stop gaining new
  # levels here, but extra XP is still stored until they prestige.
  soft-max-level: 1000
  # Final prestige count for this skill. After a player reaches this many prestiges,
  # levels can continue past the soft cap as overlevels.
  max-prestiges: 10
  # Prestige settings shared by every XP source in this skill.
  prestige:
    # Supported prestige trigger values:
    # - MANUAL: players must choose to prestige after reaching the soft cap.
    #   This is the only trigger RDA currently supports.
    trigger: MANUAL
    # Extra XP percent granted per completed prestige.
    # This bonus is applied after party sharing splits the base XP award.
    xp-bonus-per-prestige-percent: 10
  # XP curve settings used to calculate the next level requirement.
  level-formula:
    # Supported formula types:
    # - POWER: xp_to_next(level) = base_xp + growth * pow(level + 1, exponent)
    #   This is the only formula type RDA currently supports.
    type: POWER
    # Flat XP added into each next-level calculation.
    base-xp: 50
    # Growth multiplier applied to the POWER formula before exponent scaling.
    growth: 4.0
    # Exponent applied to (level + 1) in the POWER formula.
    exponent: 1.20
    # Supported rounding modes:
    # - FLOOR: round the final XP requirement down to a whole number.
    #   This is the only rounding mode RDA currently supports.
    rounding: FLOOR
    # Human-readable formula reference for admins. RDA does not parse this value.
    formula-doc: "xp_to_next(level) = floor(base_xp + growth * pow(level + 1, exponent))"

# Ordered XP sources. RDA checks these from top to bottom in gameplay and shows
# them in the same order in the GUI.
# Keep one target per rate. If multiple materials, items, entities, or projectile kinds
# should give different XP, split them into separate rate entries instead of grouping them.
# Leaving a selector out makes that filter match anything for that rate.
# description-key points to translations. If you prefer plain text here, replace it with
# description: "Your text here".
# Supported trigger values:
# - BLOCK_BREAK: breaking a matching block
# - BLOCK_TRAVEL: moving the configured distance on foot
# - CHUNK_DISCOVERY: entering an unvisited chunk for the first time
# - ENTITY_DAMAGE: dealing damage to a hostile mob or player
# - DAMAGE_TAKEN: taking damage
# - SHIELD_BLOCK: blocking damage with a shield
# - BREW_COLLECT: taking brewed potions from a brewing stand
# - ENCHANT_TABLE: enchanting an item in an enchanting table
# - ANVIL_ENCHANT: applying or upgrading enchantments in an anvil
# - CRAFT_RESULT: taking a crafted result
# - FISH_CATCH: catching fish or loot with a fishing rod
# - TAME_SUCCESS: taming a creature
# - TAMED_KILL: a tamed creature landing the killing blow
# - FURNACE_COLLECT: taking smelted output from a furnace, smoker, or blast furnace
# - HONEY_COLLECT: harvesting honey with the required item
# Selector keys:
# - material: match one Bukkit Material
# - entity-type: match one Bukkit EntityType
# - required-item: require one item material for that trigger
# - projectile-kind: ARROW, TIPPED_ARROW, or SPECTRAL_ARROW
# Optional flags:
# - require-fully-grown: only ageable blocks at max growth count
# - hostile-only: only hostile mobs count
# - player-only: only player victims count
# - exclude-same-town: ignore same-town PvP when the protection bridge can resolve both towns
# - distance: blocks of movement needed for one BLOCK_TRAVEL XP award
# - required-tool: ANY, PICKAXE, AXE, SHOVEL, or HOE
