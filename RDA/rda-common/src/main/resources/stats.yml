# Global allowlist for which input modes can trigger active abilities.
activation:
  # Supported modes: COMMAND, LEFT_CLICK, SHIFT_LEFT_CLICK, RIGHT_CLICK, SHIFT_RIGHT_CLICK.
  # Leave this list empty to allow every mode server-wide.
  # A skill still has to allow the mode in its own active.allowed-triggers list.
  # If the two lists have no overlap, RDA falls back to COMMAND.
  allowed-modes:
    - COMMAND
    - LEFT_CLICK
    - SHIFT_LEFT_CLICK
    - RIGHT_CLICK
    - SHIFT_RIGHT_CLICK

# Manual respec restrictions and costs.
respec:
  # Cooldown in seconds after a player manually resets all spent stat points. Use 0 to disable the cooldown.
  cooldown-seconds: 43200
  # Percent of each skill's total stored progression XP removed before earned ability points are recalculated. Use 0 to disable the tax.
  point-tax-percent: 0

# Shared mana pool defaults and SPI scaling.
mana:
  # Base maximum mana before SPI bonuses are applied.
  base: 100.0
  # Extra maximum mana granted for each spent SPI point.
  per-spi-point: 5.0
  # Base mana regenerated each second before SPI bonuses are applied.
  base-regen-per-second: 1.0
  # Extra mana regenerated each second for each spent SPI point.
  regen-per-spi-point: 0.3
  # Default HUD mode assigned to new players.
  # Supported modes:
  # - ACTION_BAR: show mana in the action bar
  # - BOSS_BAR: show mana in a boss bar
  # - ALWAYS_VISIBLE: show both boss bar and action bar updates
  # - MENUS_ONLY: hide the live HUD and rely on menus/manual messages instead
  default-display-mode: ACTION_BAR
  # Reserved low-mana threshold percentage. RDA currently loads this value but does not apply automatic low-mana behavior to it yet.
  low-threshold-percent: 20.0
