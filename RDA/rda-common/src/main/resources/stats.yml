# Settings that control how skill progression turns into global ability points.
ability-points:
  # Default number of skill levels required to earn one global ability point.
  # This is used unless stats.yml skill-overrides or a skill.yml override says otherwise.
  default-interval: 5
  # Optional per-skill overrides. Values must be positive whole numbers.
  # Use these enum-style skill ids: MINING, WOODCUTTING, DEFENSE, FARMING, AGILITY,
  # ARCHERY, ALCHEMY, ENCHANTING, EXCAVATION, CRAFTING, FISHING, FORAGING,
  # TAMING, COOKING, FIGHTING, and SMITHING.
  # skill-overrides:
  #   MINING: 7
  #   WOODCUTTING: 6

# Per-stat menu metadata and passive scaling formulas.
# Each stat section can use description-key (recommended, translation lookup) or
# description (plain text fallback). passive.max is optional for every stat.
stats:
  # Vitality stat presentation and passive scaling.
  vit:
    # Bukkit material shown for this stat in menus.
    icon: GOLDEN_APPLE
    # Translation key for the short flavor text shown in the stat menu.
    description-key: ra_config_descriptions.stats.vit
    # Passive bonus settings resolved from spent stat points.
    passive:
      # Display label shown for the passive bonus in the UI.
      label: "Max Health"
      # Suffix appended to the resolved passive value.
      unit: "HP"
      # Starting passive value before any points are allocated.
      base: 0.0
      # Gain applied per point before the first soft cap.
      full-rate: 1.0
      # Gain applied per point between the first and second soft caps.
      half-rate: 0.5
      # Gain applied per point after the second soft cap.
      quarter-rate: 0.25
      # Point threshold where returns drop from full-rate to half-rate.
      first-soft-cap: 20
      # Point threshold where returns drop from half-rate to quarter-rate.
      second-soft-cap: 40
      # Maximum passive value allowed after all scaling is applied. Remove this key to disable the cap.
      max: 40.0
  # Strength stat presentation and passive scaling.
