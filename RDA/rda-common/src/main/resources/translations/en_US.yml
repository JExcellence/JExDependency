        steady_aim: "Improves precision and follow through for accurate shots."
        skill_shot: "Rewards confident projectile placement instead of pure crit fishing."
        pinning_shot: "Builds stronger control pressure on well placed hits."
        retrieval: "Makes arrow economy more forgiving and less swingy over long fights."
        rapid_fire: "Enters a short firing window where ranged output spikes hard."
