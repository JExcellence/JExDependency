ra_main_ui:
  title: "<gradient:#38bdf8:#60a5fa>Raindrop Abilities</gradient>"
  info:
    name: "<aqua>Build Overview</aqua>"
    lore:
      - "<gray>Total power: <white>%total_power%</white></gray>"
      - "<gray>Enabled skills: <white>%enabled_skills%</white></gray>"
      - "<gray>Earned points: <white>%earned_points%</white></gray>"
      - "<gray>Unspent points: <green>%unspent_points%</green></gray>"
      - "<gray>Mana: <aqua>%current_mana%</aqua>/<white>%max_mana%</white></gray>"
      - "<gray>Choose a stat to inspect linked passives and actives.</gray>"
  stat:
    name: "<gold>%stat_name%</gold>"
    lore:
      - "<gray>Allocated points: <white>%allocated_points%</white></gray>"
      - "<gray>Passive: <white>%passive_label%</white></gray>"
      - "<gray>Current bonus: <aqua>%passive_value% %passive_unit%</aqua></gray>"
      - "<gray>Click to spend points and inspect linked abilities.</gray>"
  skills:
    name: "<gold>Skills</gold>"
    lore:
      - "<gray>Browse your progression tracks and prestige status.</gray>"
      - "<gray>Currently tracking <white>%enabled_skills%</white> live skills.</gray>"
  settings:
    name: "<gold>Settings</gold>"
    lore:
      - "<gray>Adjust mana HUD and active trigger preferences.</gray>"

ra_skills_ui:
  title: "<gradient:#38bdf8:#60a5fa>RDA Skills</gradient>"
  info:
    name: "<aqua>Skill Summary</aqua>"
    lore:
      - "<gray>Total power: <white>%total_power%</white></gray>"
      - "<gray>Enabled skills: <white>%enabled_skills%</white></gray>"
      - "<gray>Select a skill to inspect progression and XP rates.</gray>"
  skill:
    name: "<gold>%skill_name%</gold>"
    lore:
      - "<gray>Level: <white>%level%</white></gray>"
      - "<gray>Prestige: <white>%prestige%</white> <yellow>%prestige_symbols%</yellow></gray>"
      - "<gray>Current XP: <aqua>%current_xp%</aqua></gray>"
      - "<gray>XP to next: <aqua>%xp_to_next%</aqua></gray>"
      - "<gray>Configured rates: <white>%rate_count%</white></gray>"
      - "<gray>Power contribution: <white>%total_power%</white></gray>"

ra_skill_ui:
  title: "<gradient:#38bdf8:#60a5fa>%skill_name%</gradient>"
  info:
    name: "<aqua>%skill_name% Status</aqua>"
    lore:
      - "<gray>Level: <white>%level%</white></gray>"
      - "<gray>Prestige: <white>%prestige%</white> <yellow>%prestige_symbols%</yellow></gray>"
      - "<gray>Current XP: <aqua>%current_xp%</aqua></gray>"
      - "<gray>XP to next: <aqua>%xp_to_next%</aqua></gray>"
      - "<gray>Prestige bonus: <aqua>+%xp_bonus_percent%%</aqua></gray>"
      - "<gray>Soft cap: <white>%soft_max_level%</white></gray>"
      - "<gray>Passive abilities: <white>%passive_count%</white></gray>"
      - "<gray>Active ability: <white>%active_name%</white></gray>"
      - "<gray>Total power: <white>%total_power%</white></gray>"
  rate:
    name: "<gold>%rate_name%</gold>"
    lore:
      - "<gray>%rate_description%</gray>"
      - "<gray>Trigger: <white>%rate_trigger%</white></gray>"
      - "<gray>XP rate: <aqua>%rate_xp%</aqua></gray>"
  prestige:
    name: "<gradient:#f59e0b:#f97316>Prestige %skill_name%</gradient>"
    lore:
      - "<gray>Reset %skill_name_lower% level and XP to start a new prestige.</gray>"
      - "<gray>Current prestige: <white>%prestige%</white>/<white>%max_prestiges%</white></gray>"
      - "<gray>Next total %skill_name_lower% XP bonus: <aqua>+%xp_bonus_percent%%</aqua></gray>"
      - "<gray>All <white>%reset_points%</white> allocated point(s) will reset.</gray>"
      - "<gray>Available to reapply after prestige: <green>%available_points%</green>.</gray>"

ra_skill_prestige_confirmation:
  title: "<gradient:#f59e0b:#f97316>Confirm %skill_name% Prestige</gradient>"
  confirm:
    name: "<green>Confirm Prestige</green>"
    lore:
      - "<gray>%skill_name% level will reset from <white>%level%</white>.</gray>"
      - "<gray>Your prestige will become <white>%prestige%</white>/<white>%max_prestiges%</white>.</gray>"
      - "<gray>Total %skill_name_lower% XP bonus will become <aqua>+%xp_bonus_percent%%</aqua>.</gray>"
      - "<gray>All <white>%reset_points%</white> allocated point(s) will reset.</gray>"
      - "<gray>Available to reapply after prestige: <green>%available_points%</green>.</gray>"
  cancel:
    name: "<red>Keep Progress</red>"
    lore:
      - "<gray>Return to the %skill_name_lower% menu without prestiging.</gray>"

ra_stat_ui:
  title: "<gradient:#38bdf8:#60a5fa>%stat_name%</gradient>"
  info:
    name: "<aqua>%stat_name% Overview</aqua>"
    lore:
      - "<gray>%stat_description%</gray>"
      - "<gray>Allocated points: <white>%allocated_points%</white></gray>"
      - "<gray>Unspent points: <green>%unspent_points%</green></gray>"
      - "<gray>Passive: <white>%passive_label%</white></gray>"
      - "<gray>Current bonus: <aqua>%passive_value%</aqua> <white>%passive_unit%</white></gray>"
      - "<gray>Spend points here to unlock stronger ability tiers.</gray>"
  spend:
    name: "<green>Spend %stat_name% Point</green>"
    lore:
      - "<gray>Unspent points: <white>%unspent_points%</white></gray>"
      - "<gray>Currently allocated: <white>%allocated_points%</white></gray>"
      - "<gray>Click to invest one point into %stat_name_lower%.</gray>"
  ability:
    name: "<gold>%ability_name%</gold>"
    lore:
      - "<gray>%ability_description%</gray>"
      - "<gray>Skill: <white>%skill_name%</white></gray>"
      - "<gray>Type: <white>%ability_kind%</white></gray>"
      - "<gray>Tier: <white>%ability_tier%</white></gray>"
      - "<gray>Unlock: <white>%ability_state%</white></gray>"
      - "<gray>Potency: <aqua>%ability_potency%</aqua></gray>"
      - "<gray>Active state: <white>%active_state%</white></gray>"
      - "<gray>Cooldown: <white>%cooldown_seconds%</white></gray>"
      - "<gray>Next gates: skill <white>%next_skill_level%</white>, stat <white>%next_stat_points%</white></gray>"

ra_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>Build Settings</gradient>"
  info:
    name: "<aqua>Settings Overview</aqua>"
    lore:
      - "<gray>Current mana: <aqua>%current_mana%</aqua>/<white>%max_mana%</white></gray>"
      - "<gray>Mana HUD mode: <white>%mana_mode%</white></gray>"
      - "<gray>Use this menu to tune how active abilities feel moment to moment.</gray>"
  mana:
    name: "<gold>Mana HUD Mode</gold>"
    lore:
      - "<gray>Current mode: <white>%mana_mode%</white></gray>"
      - "<gray>Click to manage your mana display settings.</gray>"
  triggers:
    name: "<gold>Active Triggers</gold>"
    lore:
      - "<gray>Choose how each skill active is triggered.</gray>"

ra_trigger_settings_ui:
  title: "<gradient:#38bdf8:#60a5fa>Active Triggers</gradient>"
  info:
    name: "<aqua>Trigger Preferences</aqua>"
    lore:
      - "<gray>Each skill can cycle through the trigger modes allowed by the server and skill config.</gray>"
      - "<gray>Click a skill to rotate to the next available mode.</gray>"
  skill:
    name: "<gold>%skill_name%</gold>"
    lore:
      - "<gray>Active: <white>%active_name%</white></gray>"
      - "<gray>Selected mode: <white>%activation_mode%</white></gray>"
      - "<gray>Allowed modes: <white>%allowed_modes%</white></gray>"
      - "<gray>Click to cycle this skill to the next mode.</gray>"

ra_build:
  hud:
    mana: "<aqua>Mana <white>%current_mana%</white>/<white>%max_mana%</white></aqua>"
  message:
    points_earned: "<green>You earned <white>%points%</white> ability point(s) from %skill_name%.</green>"
    cast_success: "<green>%skill_name% active is running for <white>%duration_seconds%</white>s. Mana spent: <aqua>%mana_cost%</aqua>. Cooldown: <white>%cooldown_seconds%</white>s.</green>"
    cast_no_mana: "<red>Not enough mana to cast %skill_name%. Need <white>%mana_cost%</white>.</red>"
    cast_cooldown: "<red>%skill_name% is cooling down for another <white>%cooldown_seconds%</white>s.</red>"

ra_skill:
  message:
    gain: "<gray>+<aqua>%xp%</aqua> %skill_name% XP from <white>%source_name%</white></gray>"
    level_up: "<green>%skill_name% reached level <white>%level%</white>. Total power: <white>%total_power%</white>.</green>"
    prestige_ready: "<gold>%skill_name% can now prestige at level <white>%soft_max_level%</white>.</gold>"
    prestige_success: "<green>%skill_name% prestiged to <white>%prestige%</white>/<white>%max_prestiges%</white>. Total %skill_name_lower% XP bonus: <aqua>+%xp_bonus_percent%%</aqua>.</green>"
    prestige_reset: "<gold>Prestige reset <white>%reset_points%</white> allocated point(s). Build totals after recalculation: earned <white>%earned_points%</white>, unspent <green>%unspent_points%</green>.</gold>"
    prestige_unavailable: "<red>Prestige is unavailable. Reach level <white>%soft_max_level%</white> first.</red>"
    disabled: "<red>%skill_name% progression is currently disabled.</red>"

ra_party:
  message:
    not_in_party: "<red>You are not currently in an RDA party.</red>"
    info_header: "<aqua>Party led by <white>%leader_name%</white><aqua>. Members: <white>%member_count%</white>/<white>%max_members%</white><aqua>. Pending invites: <white>%pending_invites%</white>.</aqua>"
    info_header_unlimited: "<aqua>Party led by <white>%leader_name%</white><aqua>. Members: <white>%member_count%</white><aqua>. Pending invites: <white>%pending_invites%</white>.</aqua>"
    info_members: "<gray>Members: <white>%member_names%</white></gray>"
    invite_sent: "<green>Sent a party invite to <white>%target_name%</white><green>. It expires in <white>%invite_timeout_seconds%</white>s.</green>"
    invite_notify: "<gold><white>%leader_name%</white><gold> invited you to a party. Use <white>/ra party accept %leader_name%</white><gold> or <white>/ra party decline %leader_name%</white><gold>.</gold>"
    invite_self: "<red>You cannot invite yourself to a party.</red>"
    invite_target_in_party: "<red><white>%target_name%</white><red> is already in a party.</red>"
    invite_not_leader: "<red>Only the party leader can send invites.</red>"
    invite_full: "<red>Your party is already at its configured size limit.</red>"
    accept_success: "<green>You joined the party led by <white>%leader_name%</white><green>.</green>"
    accept_notify: "<green><white>%target_name%</white><green> accepted your party invite.</green>"
    accept_no_invite: "<red>No pending invite from <white>%leader_name%</white><red> was found.</red>"
    accept_already_in_party: "<red>You are already in a party.</red>"
    accept_full: "<red>That party is full right now.</red>"
    decline_success: "<yellow>You declined the party invite from <white>%leader_name%</white><yellow>.</yellow>"
    decline_notify: "<yellow><white>%target_name%</white><yellow> declined your party invite.</yellow>"
    decline_no_invite: "<red>No pending invite from <white>%leader_name%</white><red> was found.</red>"
    leave_success: "<yellow>You left your current party.</yellow>"
    leave_disbanded: "<yellow>You left and the party was disbanded because no members remained.</yellow>"
    leader_transferred: "<gold>Party leadership transferred to <white>%leader_name%</white><gold>.</gold>"
    kick_success: "<yellow>Removed <white>%target_name%</white><yellow> from the party.</yellow>"
    kick_notify: "<red>You were removed from the party by <white>%leader_name%</white><red>.</red>"
    kick_not_leader: "<red>Only the party leader can remove members.</red>"
    kick_target_missing: "<red><white>%target_name%</white><red> is not in your party.</red>"
    kick_self: "<red>You cannot kick yourself. Use <white>/ra party leave</white><red> instead.</red>"
    disband_success: "<yellow>Your party was disbanded.</yellow>"
    disband_not_leader: "<red>Only the party leader can disband the party.</red>"
    shared_gain: "<gray>+<aqua>%xp%</aqua> %skill_name% XP shared from <white>%earner_name%</white> via <white>%source_name%</white></gray>"

ra_config_descriptions:
  stats:
    vit: "Survivability, mitigation, and staying power."
    str: "Power output for melee pressure and heavy work."
    agi: "Movement tempo, acceleration, and recovery."
    dex: "Precision, ranged pressure, and clean execution."
    int: "Systems mastery, crafting efficiency, and arcane control."
    spi: "Mana, sustain, and combat rhythm."
    luk: "Fortune, pity-meter growth, and rare finds."
    cha: "Barter strength, tame support, and social leverage."
  skills:
    agility:
      rates:
        travel: "Gain 4 Agility XP every 16 blocks of continuous travel."
        discover_chunk: "Gain 30 Agility XP the first time you enter a chunk."
      abilities:
        windrunner: "Turns sustained movement into better travel tempo and path speed."
        marathoner: "Extends mobility during long routes by stabilizing stamina and mana flow."
        sure_footing: "Reduces bad fall outcomes through practiced landings and movement control."
        graceful_roll: "Softens impact windows when you recover from risky movement lines."
        trailblazer: "Rewards confident route chaining with steady travel progress."
        wind_rush: "Unlocks a burst window for rapid repositioning and chase control."
    alchemy:
      rates:
        potion: "Collect brewed Potions from a brewing stand."
        splash_potion: "Collect brewed Splash Potions from a brewing stand."
        lingering_potion: "Collect brewed Lingering Potions from a brewing stand."
      abilities:
        brew_efficiency: "Improves potion station throughput and reagent use."
        extended_potency: "Turns precise brewing into stronger lasting potion value."
        reagent_conservation: "Builds reliable refund momentum instead of random ingredient flips."
        stable_mixtures: "Reduces bad brewing variance by rewarding careful recipe handling."
        catalytic_insight: "Improves system level control over chained brewing jobs."
        concoct: "Triggers a short brewing surge that amplifies productive station work."
    archery:
      rates:
        arrow_hostile: "Gain 2 Archery XP per point of arrow damage dealt to hostile mobs."
        tipped_arrow_hostile: "Gain 3 Archery XP per point of tipped-arrow damage dealt to hostile mobs."
        spectral_arrow_hostile: "Gain 4 Archery XP per point of spectral-arrow damage dealt to hostile mobs."
        arrow_player: "Gain 3 Archery XP per point of arrow damage dealt to enemy players."
        tipped_arrow_player: "Gain 4 Archery XP per point of tipped-arrow damage dealt to enemy players."
        spectral_arrow_player: "Gain 5 Archery XP per point of spectral-arrow damage dealt to enemy players."
      abilities:
