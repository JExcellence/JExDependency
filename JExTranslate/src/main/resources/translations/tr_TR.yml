  first-join: "<yellow>Sunucuya hoş geldin, {player}!</yellow> <gray>Bu senin ilk katılımın!</gray>"
  tutorial: "<gradient:gold:yellow>Sunucuya Hoş Geldiniz!</gradient>"

coins:
