# English translations for JExTranslate Example Plugin

prefix: "<gold>[ExamplePlugin]</gold> "

welcome:
  returning: "<green>Welcome back, {player}!</green> <gray>({online} players online)</gray>"
  first-join: "<yellow>Welcome to the server, {player}!</yellow> <gray>This is your first time joining!</gray>"
  tutorial: "<gradient:gold:yellow>Welcome to the Server!</gradient>"

coins:
  balance: "You have <gold>{amount}</gold> coins"
  info: "Coins: {coins}"

lang:
  current: "Your current language is: <yellow>{locale}</yellow>"
  available: "Available languages: <gray>{locales}</gray>"
  changed: "Language changed to: <green>{locale}</green>"
  error: "<red>Failed to change language. Language storage not supported.</red>"

reload:
  starting: "Reloading translations..."
  complete: "<green>Translations reloaded!</green> <gray>({locales} locales, {keys} keys)</gray>"

error:
  no-permission: "<red>You don't have permission to use this command.</red>"
  player-only: "<red>This command can only be used by players.</red>"
  invalid-usage: "<red>Invalid usage. Use: {usage}</red>"
