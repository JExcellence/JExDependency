commands:
  ppay:
    name: 'ppay'
    description: 'Pay another player with currency'
    aliases:
      - pay
    usage: 'pay <currency> <player> <amount>'
    argumentUsages:
      1$: 'lut["prefix"] & "&7/" & alias & " &c<currency> &7<player> &7<amount>"'
      2$: 'lut["prefix"] & "&7/" & alias & " &7<currency> &c<player> &7<amount>"'
      3$: 'lut["prefix"] & "&7/" & alias & " &7<currency> &7<player> &c<amount>"'
    errorMessages:
      internalError$: 'lut["prefix"] & "&4An internal error occurred"'
      playerNotOnline$: 'lut["prefix"] & "&7The player &c" & value & " &7is &cnot online"'
      playerUnknown$: 'lut["prefix"] & "&7The player &c" & value & " &7has &cnot played &7on this server before"'
      notAPlayer$: 'lut["prefix"] & "&4You\sre not a player"'
      malformedDouble$: 'lut["prefix"] & "&7The value &c" & value & " &7is not a valid &cdouble"'
    permissions:
      missingMessage$: 'lut["prefix"] & "You\sre lacking the permission: " & permission'
      nodes:
        command: "pay.command"
        commandBypass: "pay.command.bypass"

lut:
  prefix: '&8[&5Pay&8] &7'

enabled: true
allowedCurrencies: []
minAmount: 0.01
maxAmount: 0
