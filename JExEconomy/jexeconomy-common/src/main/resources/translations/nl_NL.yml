# Saldo Commando's
balance:
  self: "<gradient:#FFD700:#FFA500>💰 Mijn Saldo:</gradient> <white><gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient></white>"
  other: "<gradient:#FFD700:#FFA500>💰 Speler Saldo:</gradient> <white><gradient:#FFD700:#FFA500>%player%</gradient>'s saldo: <gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient></white>"
  all: "<gradient:#FFD700:#FFA500>💰 Mijn Saldi:</gradient>"
  all_entry: "<gradient:#4ECDC4:#45B7B8>➤</gradient> <gradient:#FFD700:#FFA500>%identifier%</gradient>: <gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient>"
  not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Geen Saldo:</gradient> <white>Je hebt geen saldo voor <gradient:#FFD700:#FFA500>%identifier%</gradient>!</white>"

# Betaal Commando's
pay:
  usage: "<gradient:#FFD700:#FFA500>⚠ Gebruik:</gradient> <white>/pay <valuta> <speler> <bedrag></white>"
  disabled: "<gradient:#FF6B6B:#FF8E8E>✖ Uitgeschakeld:</gradient> <white>Het betaalcommando is momenteel uitgeschakeld.</white>"
  currency_not_allowed: "<gradient:#FF6B6B:#FF8E8E>✖ Valuta Niet Toegestaan:</gradient> <white>Valuta <gradient:#FFD700:#FFA500>%currency%</gradient> is niet toegestaan voor betalingen.</white>"
  currency_not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Valuta Niet Gevonden:</gradient> <white>Valuta <gradient:#FFD700:#FFA500>%currency%</gradient> bestaat niet.</white>"
  invalid_amount: "<gradient:#FF6B6B:#FF8E8E>✖ Ongeldig Bedrag:</gradient> <white>'<gradient:#FFD700:#FFA500>%amount%</gradient>' is geen geldig bedrag.</white>"
  amount_out_of_range: "<gradient:#FF6B6B:#FF8E8E>✖ Bedrag Buiten Bereik:</gradient> <white>Bedrag <gradient:#FFD700:#FFA500>%amount%</gradient> moet tussen <gradient:#FFD700:#FFA500>%min%</gradient> en <gradient:#FFD700:#FFA500>%max%</gradient> liggen.</white>"
  cannot_pay_self: "<gradient:#FF6B6B:#FF8E8E>✖ Ongeldig Doel:</gradient> <white>Je kunt niet aan jezelf betalen!</white>"
  player_not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Speler Niet Gevonden:</gradient> <white>Speler <gradient:#4ECDC4:#45B7B8>%player%</gradient> is niet gevonden.</white>"
  insufficient_funds: "<gradient:#FF6B6B:#FF8E8E>✖ Onvoldoende Saldo:</gradient> <white>Je hebt <gradient:#FFD700:#FFA500>%required%</gradient> <gradient:#FFD700:#FFA500>%currency%</gradient> nodig maar hebt alleen <gradient:#FFD700:#FFA500>%available%</gradient>.</white>"
  transfer_failed: "<gradient:#FF6B6B:#FF8E8E>✖ Overdracht Mislukt:</gradient> <white>De betaling kon niet worden voltooid. Probeer het opnieuw.</white>"
  success: "<gradient:#00FF00:#32CD32>✓ Betaling Verzonden:</gradient> <white>Je hebt <gradient:#FFD700:#FFA500>%amount% %symbol%</gradient> naar <gradient:#4ECDC4:#45B7B8>%target%</gradient> gestuurd!</white>"
  received: "<gradient:#00FF00:#32CD32>✓ Betaling Ontvangen:</gradient> <white>Je hebt <gradient:#FFD700:#FFA500>%amount% %symbol%</gradient> van <gradient:#4ECDC4:#45B7B8>%sender%</gradient> ontvangen!</white>"
  # Legacy sleutels voor achterwaartse compatibiliteit
  success_sender: "<gradient:#00FF00:#32CD32>✓ Verzonden:</gradient> <white>Je hebt <gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient> naar <gradient:#4ECDC4:#45B7B8>%player%</gradient> gestuurd!</white>"
  success_receiver: "<gradient:#00FF00:#32CD32>✓ Ontvangen:</gradient> <white>Je hebt <gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient> van <gradient:#4ECDC4:#45B7B8>%player%</gradient> ontvangen!</white>"
  self_pay: "<gradient:#FF6B6B:#FF8E8E>✖ Ongeldig Doel:</gradient> <white>Je kunt niet aan jezelf betalen!</white>"
  failed: "<gradient:#FF6B6B:#FF8E8E>✖ Betaling Mislukt:</gradient> <white>Betaling mislukt. Probeer het opnieuw.</white>"

# Admin Commando's
admin:
  set:
    success: "<gradient:#00FF00:#32CD32>✓ Saldo Ingesteld:</gradient> <white>Saldo van <gradient:#4ECDC4:#45B7B8>%player%</gradient> ingesteld op <gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient>!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Instellen Mislukt:</gradient> <white>Kon saldo niet instellen. Probeer het opnieuw.</white>"
  give:
    success: "<gradient:#00FF00:#32CD32>✓ Valuta Gegeven:</gradient> <white><gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient> gegeven aan <gradient:#4ECDC4:#45B7B8>%player%</gradient>!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Geven Mislukt:</gradient> <white>Kon valuta niet geven. Probeer het opnieuw.</white>"
  take:
    success: "<gradient:#00FF00:#32CD32>✓ Valuta Afgenomen:</gradient> <white><gradient:#FFD700:#FFA500>%prefix%%amount%%symbol%%suffix%</gradient> afgenomen van <gradient:#4ECDC4:#45B7B8>%player%</gradient>!</white>"
    insufficient_funds: "<gradient:#FF6B6B:#FF8E8E>✖ Onvoldoende Saldo:</gradient> <white><gradient:#4ECDC4:#45B7B8>%player%</gradient> heeft niet genoeg saldo!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Afnemen Mislukt:</gradient> <white>Kon valuta niet afnemen. Probeer het opnieuw.</white>"
  reset:
    success: "<gradient:#00FF00:#32CD32>✓ Saldo Gereset:</gradient> <white>Saldo van <gradient:#4ECDC4:#45B7B8>%player%</gradient> voor <gradient:#FFD700:#FFA500>%identifier%</gradient> gereset!</white>"
    all_success: "<gradient:#00FF00:#32CD32>✓ Alle Saldi Gereset:</gradient> <white>Alle saldi van <gradient:#4ECDC4:#45B7B8>%player%</gradient> gereset!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Reset Mislukt:</gradient> <white>Kon saldo niet resetten. Probeer het opnieuw.</white>"

