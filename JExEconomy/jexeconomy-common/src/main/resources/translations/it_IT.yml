  required_permission: "<gray>Permesso richiesto: <gradient:#FFD700:#FFA500>jexeconomy.admin.delete</gradient></gray>"
  reset:
    no_permission: "<gradient:#FF6B6B:#FF8E8E>❌ Accesso Negato:</gradient> <white>Non hai il permesso di azzerare i saldi delle valute.</white>"
    required: "<gray>Permesso richiesto: <gradient:#FFD700:#FFA500>jexeconomy.admin.reset</gradient></gray>"

# ═══════════════════════════════════════════════════════════════
# MESSAGGI COMANDI
# ═══════════════════════════════════════════════════════════════

currency:
