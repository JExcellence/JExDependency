    already_exists: "<gradient:#FF6B6B:#FF8E8E>✖ Già Esistente:</gradient> <white>La valuta <gradient:#FFD700:#FFA500>%identifier%</gradient> esiste già!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Creazione Fallita:</gradient> <white>Impossibile creare la valuta. Riprova.</white>"
  delete:
