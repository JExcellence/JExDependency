      no_permission: "<gradient:#FF6B6B:#FF8E8E>✖ Nessun Permesso:</gradient> <white>Non hai il permesso di usare questo comando.</white>"
  help:
    header: "<gradient:#FFD700:#FFA500>✦ Aiuto Comando Valuta ✦</gradient>"
    usage: "<gradient:#6C7B7F:#95A5A6>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
    commands:
      - "<gradient:#FFD700:#FFA500>•</gradient> <gradient:#4ECDC4:#45B7B8>/currency</gradient> <gray>- Visualizza tutti i tuoi saldi valute</gray>"
      - "<gradient:#FFD700:#FFA500>•</gradient> <gradient:#4ECDC4:#45B7B8>/currency <valuta></gradient> <gray>- Visualizza il tuo saldo per una valuta specifica</gray>"
      - "<gradient:#FFD700:#FFA500>•</gradient> <gradient:#4ECDC4:#45B7B8>/currency <giocatore></gradient> <gray>- Visualizza tutti i saldi di un altro giocatore</gray>"
      - "<gradient:#FFD700:#FFA500>•</gradient> <gradient:#4ECDC4:#45B7B8>/currency <valuta> <giocatore></gradient> <gray>- Visualizza il saldo di un altro giocatore per una valuta specifica</gray>"
    footer: "<gradient:#6C7B7F:#95A5A6>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"

