      currency_not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Valuta Non Trovata:</gradient> <white>Valuta <gradient:#FFD700:#FFA500>%currency%</gradient> non trovata. Valute disponibili: <gradient:#6C7B7F:#95A5A6>%available_currencies%</gradient></white>"
      player_not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Giocatore Non Trovato:</gradient> <white>Giocatore <gradient:#4ECDC4:#45B7B8>%player%</gradient> non trovato o non ha mai giocato prima.</white>"
