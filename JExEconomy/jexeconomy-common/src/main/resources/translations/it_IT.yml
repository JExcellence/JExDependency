      - "<gradient:#00FF00:#32CD32>▶ Clicca per creare nuova valuta</gradient>"
  edit_currency:
    name: "<gradient:#FFD700:#FFA500>🔧 Modifica Valuta</gradient>"
    lore:
      - ""
      - "<gray>Modifica le proprietà delle valute esistenti"
      - "<gray>e aggiorna le loro configurazioni.</gray>"
