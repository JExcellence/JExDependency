    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Eliminazione Fallita:</gradient> <white>Impossibile eliminare la valuta. Riprova.</white>"
  edit:
    success: "<gradient:#00FF00:#32CD32>✓ Valuta Aggiornata:</gradient> <white><gradient:#FFD700:#FFA500>%field%</gradient> della valuta <gradient:#FFD700:#FFA500>%identifier%</gradient> aggiornato con successo a <gradient:#FFD700:#FFA500>%value%</gradient>!</white>"
    not_found: "<gradient:#FF6B6B:#FF8E8E>✖ Non Trovata:</gradient> <white>La valuta <gradient:#FFD700:#FFA500>%identifier%</gradient> non esiste!</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>✖ Aggiornamento Fallito:</gradient> <white>Impossibile aggiornare la valuta. Riprova.</white>"
    fields: "<gradient:#FFD700:#FFA500>ℹ Campi Disponibili:</gradient> <white><gradient:#FFD700:#FFA500>symbol</gradient>, <gradient:#FFD700:#FFA500>prefix</gradient>, <gradient:#FFD700:#FFA500>suffix</gradient>, <gradient:#FFD700:#FFA500>identifier</gradient></white>"
