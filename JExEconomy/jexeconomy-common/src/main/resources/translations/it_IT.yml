    all_header_other: "<gradient:#FFD700:#FFA500>━━━━━━━ Saldi Valute di %player% ━━━━━━━</gradient>"
    all_footer: "<gradient:#FFD700:#FFA500></gradient>"
    entry: "<white>║ <gradient:#FFD700:#FFA500>%currency%</gradient>: <gradient:#FFD700:#FFA500>%prefix%</gradient><gradient:#FFFFFF:#F8F8FF>%balance%</gradient><gradient:#FFD700:#FFA500>%suffix% %symbol%</gradient></white>"
