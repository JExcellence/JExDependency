      - "<gradient:#00FF00:#32CD32>▶ 点击设置前缀</gradient>"

  suffix:
    name: "<gradient:#4ECDC4:#45B7B8>📄 货币后缀</gradient>"
    lore:
      - ""
      - "<gray>设置在货币金额后显示的"
      - "<gray>文本（可选）。</gray>"
      - ""
      - "<gradient:#FFD700:#FFA500>示例:</gradient> <white>' 币', ' 点', ' 积分'</white>"
      - "<white>• 最多16个字符</white>"
      - "<white>• 可以为空</white>"
