    success:
      player_accounts_created: "<gradient:#00FF00:#32CD32>✅ 账户已创建:</gradient> <white>成功为货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 创建了 <gradient:#FFD700:#FFA500>%player_amount%</gradient> 个玩家账户！</white>"

