      - "<gradient:#00FF00:#32CD32>▶ 点击设置后缀</gradient>"

  create_currency:
    name: "<gradient:#00FF00:#32CD32>✓ 创建货币</gradient>"
    lore:
      - ""
      - "<gray>所有必填字段已填写完毕。"
      - "<gray>点击创建您的新货币。</gray>"
      - ""
      - "<gradient:#00FF00:#32CD32>▶ 点击创建货币</gradient>"

  create:
    processing: "<gradient:#FFD700:#FFA500>🔄 处理中:</gradient> <white>正在创建货币 <gradient:#FFD700:#FFA500>%identifier%</gradient>...</white>"
    already_exists: "<gradient:#FF6B6B:#FF8E8E>❌ 已存在:</gradient> <white>货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 已存在！请选择其他标识符。</white>"
    successfully_created: "<gradient:#00FF00:#32CD32>✅ 货币已创建:</gradient> <white>成功创建货币 <gradient:#FFD700:#FFA500>%identifier%</gradient>！</white>"
    failed: "<gradient:#FF6B6B:#FF8E8E>❌ 创建失败:</gradient> <white>创建货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 失败。请重试。</white>"
    error: "<gradient:#FF6B6B:#FF8E8E>❌ 意外错误:</gradient> <white>创建货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 时发生错误: <gradient:#FF6B6B:#FF8E8E>%error%</gradient></white>"
    database_error: "<gradient:#FF6B6B:#FF8E8E>❌ 数据库错误:</gradient> <white>创建货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 时发生数据库错误: <gradient:#FF6B6B:#FF8E8E>%error%</gradient></white>"
    currency_not_found_in_cache: "<gradient:#FF6B6B:#FF8E8E>❌ 缓存错误:</gradient> <white>货币 <gradient:#FFD700:#FFA500>%identifier%</gradient> 已创建但在缓存中找不到。请重启服务器。</white>"
