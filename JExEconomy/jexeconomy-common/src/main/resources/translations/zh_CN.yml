# 货币创建 UI
currencies_creating_ui:
  title: "<gradient:#4ECDC4:#45B7B8>创建货币</gradient>"

  identifier:
    name: "<gradient:#FFD700:#FFA500>🏷️ 货币标识符</gradient>"
    lore:
      - ""
      - "<gray>设置在系统中识别此货币的"
      - "<gray>唯一名称。</gray>"
      - ""
      - "<gradient:#FFD700:#FFA500>要求:</gradient>"
      - "<white>• 2-16个字符</white>"
      - "<white>• 仅限字母、数字、_、-</white>"
