    missing_symbol:     "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Set a symbol first."
    success:            "<gradient:#86efac:#16a34a>✔</gradient> <green>Currency <gold>{currency_identifier}</gold> created."
    failed:             "<gradient:#fca5a5:#dc2626>✘</gradient> <red>Create failed for <gold>{currency_identifier}</gold>."

