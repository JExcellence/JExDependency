# ─── JExEconomy 3.0 ─ English (US) ───────────────────────────────────────────
# MiniMessage format | {placeholder} syntax | One line per chat message
# Nested click/hover tags are parsed recursively after placeholder substitution.

prefix: "<gold>JExEconomy</gold> <dark_gray>|</dark_gray> "

# ── Errors ────────────────────────────────────────────────────────────────────

error:
  no-permission: "<red>You don't have permission."
  player-not-found: "<red>Player <white>{player}</white> not found."
  invalid-amount: "<red>Invalid amount. Must be a positive number."
  currency-not-found: "<red>Currency <gold>{currency}</gold> not found."
  insufficient-funds: "<red>Insufficient funds. Need <gold>{required}</gold>, have <gold>{balance}</gold>."
  self-payment: "<red>You cannot pay yourself."
  no-currencies: "<red>No currencies configured."

# ── Balance ───────────────────────────────────────────────────────────────────

balance:
  self: "<gray>Your <gold>{currency}</gold> balance: <gold>{balance}</gold>"
  other: "<gray><white>{player}</white>'s <gold>{currency}</gold> balance: <gold>{balance}</gold>"
  all-header-self: "<gray>━━━ <gold>Your Balances</gold> ━━━"
  all-header-other: "<gray>━━━ <gold>{player}'s Balances</gold> ━━━"
  entry: "<dark_gray>·</dark_gray> <gold>{currency}</gold> <dark_gray>(<gray>{symbol}</gray>)</dark_gray> <gray>→</gray> <gold>{balance}</gold>"
  all-footer: ""
  no-accounts-self: "<gray>You have no accounts yet."
  no-accounts-other: "<gray><white>{player}</white> has no accounts yet."

# ── Pay ───────────────────────────────────────────────────────────────────────

pay:
  usage: "<gray>Usage: <white>/pay <player> <amount> [currency]"
  sent: "<green>Paid <gold>{amount}</gold> to <white>{target}</white>. <dark_gray>(<gray>balance: <gold>{balance}</gold><dark_gray>)"
  received: "<green>Received <gold>{amount}</gold> from <white>{sender}</white>."
  disabled: "<red>Payments are currently disabled."
  failed: "<red>Payment failed: <white>{error}</white>"
  no-default-currency: "<red>No currencies are configured. Ask an admin to create one."
  currency-not-allowed: "<red>Currency <gold>{currency}</gold> is not allowed for payments."
  amount-out-of-range: "<red>Amount <gold>{amount}</gold> is outside the allowed range (<gold>{min}</gold> to <gold>{max}</gold>)."
  amount-below-min: "<red>Amount <gold>{amount}</gold> is below the minimum of <gold>{min}</gold>."

# ── Admin Console (deposit / withdraw) ────────────────────────────────────────

admin:
  deposit-success: "<green>Deposited <gold>{amount}</gold> to <white>{player}</white>. <dark_gray>(<gray>new balance: <gold>{balance}</gold><dark_gray>)"
  deposit-failed: "<red>Deposit to <white>{player}</white> failed: <white>{error}</white>"
  withdraw-success: "<green>Withdrew <gold>{amount}</gold> from <white>{player}</white>. <dark_gray>(<gray>new balance: <gold>{balance}</gold><dark_gray>)"
  withdraw-failed: "<red>Withdrawal from <white>{player}</white> failed: <white>{error}</white>"
  unknown-currency: "<red>Unknown currency <gold>{currency}</gold>. <gray>Available: <white>{available}</white>"
  no-default-currency: "<red>No currencies are configured. Create one with <white>/currencies create</white> first."
  reset-all: "<green>Reset <gold>{count}</gold> balances for <gold>{currency}</gold>."

# ── Currencies (management) ───────────────────────────────────────────────────

currencies:
  overview-placeholder: "<gray>Currency management GUI will be available soon."
  help: "<gray>Usage: <white>/currencies <create|delete|edit|info|overview>"
  create:
    usage: "<gray>Usage: <white>/currencies create <identifier> <symbol> [prefix] [suffix]"
    success: "<green>Currency <gold>{currency}</gold> created."
    failed: "<red>Currency creation was cancelled."
    already-exists: "<red>Currency <gold>{currency}</gold> already exists."
  delete:
    usage: "<gray>Usage: <white>/currencies delete <identifier>"
    success: "<green>Currency <gold>{currency}</gold> deleted."
    failed: "<red>Currency deletion was cancelled."
  edit:
    usage: "<gray>Usage: <white>/currencies edit <identifier> <field> <value>"
    success: "<green>Currency <gold>{currency}</gold> updated: <white>{field}</white> <gray>=</gray> <white>{value}</white>."
    failed: "<red>Failed to update currency <gold>{currency}</gold>."
  info:
    usage: "<gray>Usage: <white>/currencies info <identifier>"
    details: "<gray>Currency <gold>{identifier}</gold>: <gray>symbol=<gold>{symbol}</gold>, prefix=<white>{prefix}</white>, suffix=<white>{suffix}</white>"
  overview:
    header: "<gray>━━━ <gold>Currencies</gold> ({count}) ━━━"
    entry: "<dark_gray>·</dark_gray> <gold>{identifier}</gold> <dark_gray>[{symbol}]</dark_gray> <gray>prefix=<white>{prefix}</white>, suffix=<white>{suffix}</white>"
    empty: "<gray>No currencies configured yet."

# ── Currency lifecycle (fired from service) ───────────────────────────────────

currency:
  created: "<green>Currency <gold>{identifier}</gold> created."
  deleted: "<green>Currency <gold>{identifier}</gold> deleted."
  updated: "<green>Currency <gold>{identifier}</gold> updated."

# ── Leaderboard ───────────────────────────────────────────────────────────────

leaderboard:
  header: "<gold>{currency}</gold> <gray>Leaderboard"
  entry: "<gray>{rank}. <white>{player}</white> <dark_gray>-</dark_gray> <gold>{balance} {symbol}</gold>"
  empty: "<gray>No entries yet."

# ── Transaction Log ───────────────────────────────────────────────────────────
# Values with nested click/hover tags rely on MiniMessage's quote recursion.
# Placeholders are substituted BEFORE MiniMessage parses the final string.

log:
  empty: "<gray>No transaction logs found."
  error: "<red>Failed to load transaction logs."
  not-found: "<red>Log entry <white>#{id}</white> not found."
  page-not-found: "<red>Page {page} does not exist. Total pages: {total}."
  details-usage: "<gray>Usage: <white>/pcurrencylog details <id>"
  invalid-id: "<red><white>{input}</white> is not a valid log id."
  invalid-page: "<red><white>{input}</white> is not a valid page number."

  # Pagination screen
  header: "<gray>━━━ <gold>Transaction Logs</gold> <dark_gray>·</dark_gray> <gray>Page <gold>{page}</gold>/<gold>{total_pages}</gold> <dark_gray>({total_entries} entries)</dark_gray> ━━━"
  status-success: "<green>✔</green>"
  status-failed: "<red>✘</red>"
  entry: "<click:run_command:\"/pcurrencylog details {id}\"><hover:show_text:'<gray>ID: <white>{id}</white><newline><gray>Type: <white>{type}</white><newline><gray>Amount: <white>{amount}</white><newline><gray>Balance: <white>{old_balance}</white> → <white>{new_balance}</white><newline><yellow>Click for details</yellow>'><dark_gray>{index}.</dark_gray> {status} <white>{type}</white> <gold>{amount}</gold> <gray>{currency}</gray> <dark_gray>{timestamp}</dark_gray></hover></click>"
  nav-prev-active: "<click:run_command:\"/pcurrencylog view {target_page}\"><green>« Prev</green></click>"
  nav-prev-disabled: "<dark_gray>« Prev</dark_gray>"
  nav-next-active: "<click:run_command:\"/pcurrencylog view {target_page}\"><green>Next »</green></click>"
  nav-next-disabled: "<dark_gray>Next »</dark_gray>"
  nav-line: "  {prev} <dark_gray>·</dark_gray> <gray>Page {page}/{total_pages}</gray> <dark_gray>·</dark_gray> {next}"

  # Details screen
  details-header: "<gray>━━━ <gold>Transaction</gold> <dark_gray>#</dark_gray><gold>{id}</gold> ━━━"
  details-time: "<dark_gray>│</dark_gray> <gray>Time: <white>{time}</white>"
  details-status: "<dark_gray>│</dark_gray> <gray>Status: {status}"
  details-type: "<dark_gray>│</dark_gray> <gray>Type: <white>{type}</white>"
  details-currency: "<dark_gray>│</dark_gray> <gray>Currency: <gold>{currency}</gold>"
  details-amount: "<dark_gray>│</dark_gray> <gray>Amount: <gold>{amount}</gold>"
  details-balance: "<dark_gray>│</dark_gray> <gray>Balance: <white>{old}</white> <gray>→</gray> <white>{new}</white>"
  details-net-positive: "<dark_gray>│</dark_gray> <gray>Net: <green>+{amount}</green>"
  details-net-negative: "<dark_gray>│</dark_gray> <gray>Net: <red>-{amount}</red>"
  details-player: "<dark_gray>│</dark_gray> <gray>Player: <white>{player}</white>"
  details-initiator: "<dark_gray>│</dark_gray> <gray>Initiated by: <white>{initiator}</white>"
  details-reason: "<dark_gray>│</dark_gray> <gray>Reason: <white>{reason}</white>"
  details-error: "<dark_gray>│</dark_gray> <red>Error: {error}</red>"
  details-back: "  <click:run_command:\"/pcurrencylog view\"><green>« Back to Logs</green></click>"

  # Help/usage screen
  usage-header: "<gray>━━━ <gold>Currency Log</gold> ━━━"
  usage-view: "<dark_gray>│</dark_gray> <green>/pcurrencylog view [page]</green> <dark_gray>·</dark_gray> <gray>View your transaction logs"
  usage-details: "<dark_gray>│</dark_gray> <green>/pcurrencylog details <id></green> <dark_gray>·</dark_gray> <gray>Show full details for a log entry"

# ── Migration (console) ───────────────────────────────────────────────────────

migrate:
  usage-header: "<gray>━━━ <gold>Migration Commands</gold> ━━━"
  usage-start: "<dark_gray>│</dark_gray> <green>/cmigrate start</green> <dark_gray>·</dark_gray> <gray>Start migration (not yet implemented)"
  usage-status: "<dark_gray>│</dark_gray> <green>/cmigrate status</green> <dark_gray>·</dark_gray> <gray>Check migration status"
  usage-supported: "<dark_gray>│</dark_gray> <green>/cmigrate supported</green> <dark_gray>·</dark_gray> <gray>List supported economy plugins"
  usage-info: "<dark_gray>│</dark_gray> <green>/cmigrate info</green> <dark_gray>·</dark_gray> <gray>Migration system information"
  not-implemented: "<yellow>Migration is not yet implemented in 3.0. This feature will arrive in a future update."
  status: "<gray>No migration has been performed yet."
  supported-header: "<gray>━━━ <gold>Supported Providers</gold> <dark_gray>(planned)</dark_gray> ━━━"
  supported-entry: "<dark_gray>·</dark_gray> <white>{provider}"
  supported-vault: "<gray>A generic Vault API bridge will also be available."
  info-header: "<gray>━━━ <gold>JExEconomy Migration</gold> ━━━"
  info-description: "<gray>Migrate data from existing economy plugins into JExEconomy 3.0."
  info-features-header: "<gray>Planned features:"
  info-feature: "<dark_gray>·</dark_gray> <white>{feature}"
  info-footer: "<gray>Use <white>/cmigrate start</white> to begin once implemented."

# ── GUI — shared legacy keys (kept for any remaining references) ──────────────

ui:
  overview-title: "<gold>Currencies"
  detail-title: "<gold>{currency}</gold> <gray>Details"
  create-title: "<gold>Create Currency"
  edit-title: "<gold>Edit <white>{currency}</white>"
  delete-title: "<red>Delete <white>{currency}</white>"
  leaderboard-title: "<gold>{currency}</gold> <gray>Top Players"
  confirm: "<green>Confirm"
  cancel: "<red>Cancel"
  back: "<gray>← Back"
  next-page: "<gray>Next Page »"
  prev-page: "<gray>« Previous Page"
  page-info: "<gray>Page {current} of {total}"

# ── View: Currency Overview ───────────────────────────────────────────────────

currency_overview_ui:
  title: "<gold>Currencies"
  previous: "<gray>« Previous Page"
  next: "<gray>Next Page »"
  loading: "<gray>Loading..."
  page:
    name: "<gray>Page <white>{current_page}<gray>/<white>{max_page}"
    lore:
      - "<dark_gray>Click to navigate pages."
  currency:
    name: "<gold>{currency_identifier} <dark_gray>({currency_symbol})"
    lore:
      - "<dark_gray>Click to view details."
      - ""
      - "<gray>Prefix: <white>{currency_prefix}"
      - "<gray>Suffix: <white>{currency_suffix}"

# ── View: Currency Detail ─────────────────────────────────────────────────────

currency_detail_ui:
  title: "<gold>{currency_identifier} <gray>Details"
  back: "<gray>← Back"
  currency_icon:
    name: "<gold>{currency_identifier}"
    lore:
      - "<gray>Icon material: <white>{material_name}"
  currency_symbol:
    name: "<gray>Symbol: <gold>{currency_symbol}"
    lore:
      - "<dark_gray>The short display symbol for this currency."
      - "<gray>Currency: <white>{currency_identifier}"
  currency_prefix:
    name: "<gray>Prefix"
    lore:
      - "<gray>Text shown before the amount."
      - "<gray>Value: <white>{currency_prefix}"
  currency_suffix:
    name: "<gray>Suffix"
    lore:
      - "<gray>Text shown after the amount."
      - "<gray>Value: <white>{currency_suffix}"
  leaderboard:
    name: "<gold>Leaderboard"
    lore:
      - "<dark_gray>View the top holders of"
      - "<gray>{currency_identifier} <dark_gray>(<gray>{currency_symbol}<dark_gray>)."
      - ""
      - "<yellow>Click to open."
  edit:
    name: "<yellow>Edit Currency"
    lore:
      - "<dark_gray>Modify the properties of"
      - "<gray>{currency_identifier}<dark_gray>."
      - ""
      - "<yellow>Click to edit."
  reset_all:
    name: "<red>Reset All Balances"
    lore:
      - "<red>Wipes every account balance"
      - "<dark_red>for <white>{currency_identifier}<dark_red>."
      - ""
      - "<red>⚠ This cannot be undone!"
    confirm_chat: "<red>Type <white>CONFIRM</white> in chat to reset all balances for <gold>{currency_identifier}<red>."

# ── View: Currency Create ─────────────────────────────────────────────────────

currency_create_ui:
  title: "<gold>Create Currency"
  back: "<gray>← Back"
  identifier:
    name: "<gold>Identifier: <white>{value}"
    lore:
      - "<dark_gray>Unique programmatic name."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to set."
  symbol:
    name: "<gold>Symbol: <white>{value}"
    lore:
      - "<dark_gray>Short display character (e.g. $, €, ⭐)."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to set."
  icon:
    name: "<gold>Icon: <white>{value}"
    lore:
      - "<dark_gray>Bukkit Material name for the GUI icon."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to set."
  prefix:
    name: "<gold>Prefix: <white>{value}"
    lore:
      - "<dark_gray>Text before the amount. Optional."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to set."
  suffix:
    name: "<gold>Suffix: <white>{value}"
    lore:
      - "<dark_gray>Text after the amount. Optional."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to set."
  create:
    name: "<green>✔ Create Currency"
    lore:
      - "<dark_gray>Saves <gold>{currency_identifier}</gold> to the database."
      - ""
      - "<green>Click to create."
    missing_identifier: "<red>Set an identifier before creating."
    missing_symbol: "<red>Set a symbol before creating."
    success: "<green>Currency <gold>{currency_identifier}</gold> created."
    failed: "<red>Currency creation was cancelled or failed."

# ── View: Currency Edit ───────────────────────────────────────────────────────

currency_edit_ui:
  title: "<gold>Edit <white>{currency_identifier}"
  back: "<gray>← Back"
  identifier:
    name: "<gold>Identifier: <white>{value}"
    lore:
      - "<dark_gray>Unique programmatic name."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to change."
  symbol:
    name: "<gold>Symbol: <white>{value}"
    lore:
      - "<dark_gray>Short display character."
      - "<gray>Current: <white>{value}"
      - "<gray>Currency: <white>{currency_identifier}"
      - ""
      - "<yellow>Click to change."
  icon:
    name: "<gold>Icon: <white>{value}"
    lore:
      - "<dark_gray>Bukkit Material name."
      - "<gray>Current: <white>{value}"
      - ""
      - "<yellow>Click to change."
  prefix:
    name: "<gold>Prefix: <white>{value}"
    lore:
      - "<dark_gray>Text before amounts."
      - "<gray>Current: <white>{value}"
      - "<gray>Currency: <white>{currency_identifier}"
      - ""
      - "<yellow>Click to change."
  suffix:
    name: "<gold>Suffix: <white>{value}"
    lore:
      - "<dark_gray>Text after amounts."
      - "<gray>Current: <white>{value}"
      - "<gray>Currency: <white>{currency_identifier}"
      - ""
      - "<yellow>Click to change."
  save:
    name: "<green>✔ Save Changes"
    lore:
      - "<dark_gray>Persists edits for <gold>{currency_identifier}</gold>."
      - ""
      - "<green>Click to save."
