ui:
  overview-title:    "<gradient:#fde047:#f59e0b>Currencies</gradient>"
  detail-title:      "<gradient:#fde047:#f59e0b>{currency}</gradient>"
  create-title:      "<gradient:#86efac:#16a34a>New Currency</gradient>"
  edit-title:        "<gradient:#93c5fd:#2563eb>Edit {currency}</gradient>"
  delete-title:      "<gradient:#fca5a5:#dc2626>Delete {currency}</gradient>"
  leaderboard-title: "<gradient:#d8b4fe:#9333ea>{currency} Top</gradient>"
  confirm:           "<gradient:#86efac:#16a34a>✔ Confirm</gradient>"
  cancel:            "<gradient:#fca5a5:#dc2626>✖ Cancel</gradient>"
  back:              "<gray>← Back"
  next-page:         "<gray>Next »"
  prev-page:         "<gray>« Previous"
  page-info:         "<gray>{current}<dark_gray>/<gray>{total}"

# ── View: Currency Overview ───────────────────────────────────────────────────

currency_overview_ui:
  title:    "<gradient:#fde047:#f59e0b>Currencies</gradient>"
  previous: "<gray>« Previous"
  next:     "<gray>Next »"
  loading:  "<gray>Loading…"
  page:
    name: "<gradient:#93c5fd:#2563eb>Page {current_page}<dark_gray>/<gradient:#93c5fd:#2563eb>{max_page}</gradient>"
