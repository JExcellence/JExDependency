    lore:
      - "<gray>Prefix <dark_gray>»</dark_gray> <white>{currency_prefix}"
      - "<gray>Suffix <dark_gray>»</dark_gray> <white>{currency_suffix}"
      - ""
      - "<gradient:#a5f3fc:#06b6d4>▸ Click to open</gradient>"

# ── View: Currency Detail ─────────────────────────────────────────────────────

currency_detail_ui:
  title: "<gradient:#fde047:#f59e0b>{currency_identifier}</gradient>"
  back:  "<gray>← Back"
  currency_icon:
    name: "<gradient:#fde047:#f59e0b>{currency_identifier}</gradient>"
    lore:
      - "<gray>Material <dark_gray>»</dark_gray> <white>{material_name}"
  currency_symbol:
    name: "<gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{currency_symbol}</gradient>"
