    failed: "<red>Failed to update currency <gold>{currency_identifier}</gold>."

# ── View: Currency Delete ─────────────────────────────────────────────────────

currency_delete_ui:
  title: "<red>Delete Currency"
  back: "<gray>← Back"
  warning:
    name: "<red>⚠ Delete <white>{currency_identifier}"
    lore:
      - "<red>This will permanently delete"
      - "<white>{currency_identifier} <dark_gray>(<gray>{currency_symbol}<dark_gray>)."
      - "<red>All player accounts will be removed!"
      - ""
      - "<dark_red>⚠ This cannot be undone!"
  confirm:
    name: "<green>✔ Confirm Delete"
    lore:
      - "<dark_gray>Deletes <gold>{currency_identifier}</gold> and all accounts."
      - ""
      - "<red>⚠ Irreversible action."
  cancel:
    name: "<gray>✖ Cancel"
    lore:
      - "<dark_gray>Go back without deleting."
  success: "<green>Currency <gold>{currency_identifier}</gold> deleted."
  failed: "<red>Deletion of <gold>{currency_identifier}</gold> was cancelled."
  error: "<red>Error deleting <gold>{currency_identifier}</gold>: <white>{error}"

# ── View: Currency Leaderboard ────────────────────────────────────────────────

currency_leaderboard_ui:
  title: "<gold>{currency_identifier} <gray>Leaderboard"
  back: "<gray>← Back"
  previous: "<gray>« Previous"
  next: "<gray>Next »"
  loading: "<gray>Loading leaderboard..."
  page:
    name: "<gray>Page <white>{current_page}<gray>/<white>{max_page}"
    lore:
      - "<dark_gray>Navigate the leaderboard."
  currency_info:
    name: "<gold>{currency_identifier} <dark_gray>({currency_symbol})"
    lore:
      - "<dark_gray>Top 25 balance holders."
      - "<gray>Symbol: <gold>{currency_symbol}"
  player_entry:
    name: "{rank_color}#{rank} <white>{player_name}"
    lore:
      - "<gray>Balance: <gold>{formatted_balance}"
      - "<gray>Symbol: <white>{currency_symbol}"

# ── View: Currency Field Input (Anvil) ────────────────────────────────────────

currency_field_input_ui:
  title: "<gold>Set {field}"
  error:
    empty: "<red>Input cannot be empty."
    invalid_material: "<red><white>{value}</white> is not a valid Material name."

# ── JExCommand framework ──────────────────────────────────────────────────────
# Keys emitted by the JExCommand 2.0 tree handler and built-in argument types.
# All placeholders follow the {name} convention.

jexcommand:
  usage: "<gray>Usage: <white>{usage}</white>"
  error:
    missing-argument: "<red>Missing argument <gold>{name}</gold> <dark_gray>(<gray>{type}</gray>)</dark_gray>."
    too-many-arguments: "<red>Too many arguments."
    unknown-subcommand: "<red>Unknown subcommand <gold>{name}</gold>."
    no-permission: "<red>You don't have permission. <dark_gray>(<gray>{permission}</gray>)</dark_gray>"
    not-a-player: "<red>This command can only be run by a player."
    not-a-console: "<red>This command can only be run from the console."
    unknown-type: "<red>Unknown argument type <gold>{type}</gold>."
    internal: "<red>Internal error: <white>{message}</white>"
    invalid-long: "<red><white>{value}</white> is not a valid integer."
    invalid-double: "<red><white>{value}</white> is not a valid number."
    not-positive-long: "<red><white>{value}</white> must be a positive integer."
    not-positive-double: "<red><white>{value}</white> must be a positive number."
    player-not-online: "<red>Player <white>{value}</white> is not online."
    player-unknown: "<red>Player <white>{value}</white> has never joined this server."
    invalid-enum: "<red><white>{value}</white> is not one of: <gray>{options}</gray>."
    invalid-uuid: "<red><white>{value}</white> is not a valid UUID."
    expected-single-word: "<red>Expected a single word without spaces."

# ── /economy admin command ────────────────────────────────────────────────────

economy:
  error:
    currency-not-found: "<red>Currency <gold>{currency}</gold> not found."

  # Help
  help-header:  "<gold><bold>── /economy ──"
  help-give:    "<gray>/<white>{alias} give <player> <amount> [currency]</white> — credit a balance"
  help-take:    "<gray>/<white>{alias} take <player> <amount> [currency]</white> — debit a balance"
  help-set:     "<gray>/<white>{alias} set <player> <amount> [currency]</white> — set absolute balance"
  help-reset:   "<gray>/<white>{alias} reset <player> [currency]</white> — reset balance to zero"
  help-migrate: "<gray>/<white>{alias} migrate <start|status|supported|info></white> — migration tooling"
  help-reload:  "<gray>/<white>{alias} reload</white> — reload currency cache + translations"
  help-footer:  "<dark_gray>──────────────────────────"

  # give/take/set/reset — success & failure
  give-success:  "<green>Gave <gold>{amount}</gold> to <white>{player}</white>. <dark_gray>(<gray>balance: <gold>{balance}</gold><dark_gray>)"
  give-failed:   "<red>Give failed for <white>{player}</white>: <white>{error}</white>"
  take-success:  "<green>Took <gold>{amount}</gold> from <white>{player}</white>. <dark_gray>(<gray>balance: <gold>{balance}</gold><dark_gray>)"
  take-failed:   "<red>Take failed for <white>{player}</white>: <white>{error}</white>"
  set-success:   "<green>Set <white>{player}</white>'s <gold>{currency}</gold> to <gold>{balance}</gold>."
  set-failed:    "<red>Set failed for <white>{player}</white>: <white>{error}</white>"
  reset-success: "<green>Reset <white>{player}</white>'s <gold>{currency}</gold>."
  reset-failed:  "<red>Reset failed for <white>{player}</white>: <white>{error}</white>"

  # Reload
  reload-start:   "<gray>Reloading currencies and translations..."
  reload-success: "<green>Reload complete. <dark_gray>(<gray>{count} currencies<dark_gray>)"
  reload-failed:  "<red>Reload failed: <white>{error}</white>"
