# ─── JExEconomy 3.0 ─ English (US) ───────────────────────────────────────────
# MiniMessage format | {placeholder} syntax | One line per chat message
# Gradients use full hex codes; nested click/hover tags are parsed recursively
# after placeholder substitution.
#
# Palette anchors:
#   gold   #fde047 → #f59e0b   (plugin / sections)
#   green  #86efac → #16a34a   (success)
#   red    #fca5a5 → #dc2626   (errors)
#   blue   #93c5fd → #2563eb   (info)
#   cyan   #a5f3fc → #06b6d4   (balance / currency)
#   purple #d8b4fe → #9333ea   (leaderboards)

prefix: "<gradient:#fde047:#f59e0b><bold>JExEconomy</bold></gradient> <dark_gray>»</dark_gray> "

# ── Errors ────────────────────────────────────────────────────────────────────

error:
  no-permission: "<gradient:#fca5a5:#dc2626>You don't have permission.</gradient>"
  player-not-found: "<gradient:#fca5a5:#dc2626>Player <white>{player}</white> not found.</gradient>"
  invalid-amount: "<gradient:#fca5a5:#dc2626>Invalid amount. Must be a positive number.</gradient>"
  currency-not-found: "<gradient:#fca5a5:#dc2626>Currency <white>{currency}</white> not found.</gradient>"
  insufficient-funds: "<gradient:#fca5a5:#dc2626>Insufficient funds.</gradient> <gray>Need <#fde047>{required}</#fde047>, have <#fde047>{balance}</#fde047>."
  self-payment: "<gradient:#fca5a5:#dc2626>You cannot pay yourself.</gradient>"
  no-currencies: "<gradient:#fca5a5:#dc2626>No currencies configured.</gradient>"

# ── Balance ───────────────────────────────────────────────────────────────────

balance:
  # Single-currency views
  self: "<gray>Your <gradient:#a5f3fc:#06b6d4>{currency}</gradient> balance <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{balance}</gradient>"
  other: "<white>{player}</white><gray>'s <gradient:#a5f3fc:#06b6d4>{currency}</gradient> balance <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{balance}</gradient>"

  # Multi-currency listing
  all-header-self: "<gradient:#fde047:#f59e0b>━━━━━━  Your Balances  ━━━━━━</gradient>"
  all-header-other: "<gradient:#fde047:#f59e0b>━━━━  </gradient><white>{player}</white><gradient:#fde047:#f59e0b>'s Balances  ━━━━</gradient>"
  entry: "<dark_gray>┃</dark_gray> <gradient:#a5f3fc:#06b6d4>{currency}</gradient> <dark_gray>·</dark_gray> <gradient:#fde047:#f59e0b>{balance}</gradient> <dark_gray>({symbol})</dark_gray>"
  all-footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"
  no-accounts-self: "<gray>You have no accounts yet."
  no-accounts-other: "<gray><white>{player}</white> has no accounts yet."

  # Top leaderboard
  top:
    header: "<gradient:#d8b4fe:#9333ea>━━━━  Top {limit} · </gradient><gradient:#a5f3fc:#06b6d4>{currency}</gradient><gradient:#d8b4fe:#9333ea>  ━━━━</gradient>"
    entry: "<dark_gray>┃</dark_gray> <gradient:#d8b4fe:#9333ea><bold>#{rank}</bold></gradient> <white>{player}</white> <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{balance}</gradient>"
    footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"
    empty: "<gray>No one has a <gradient:#a5f3fc:#06b6d4>{currency}</gradient> balance yet."

  # Help screen
  help-header: "<gradient:#fde047:#f59e0b>━━━━━━  /balance  ━━━━━━</gradient>"
  help-self:   "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias}</gradient> <dark_gray>·</dark_gray> <gray>Your primary currency"
  help-single: "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} <currency></gradient> <dark_gray>·</dark_gray> <gray>Your balance in one currency"
  help-all:    "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} all [player]</gradient> <dark_gray>·</dark_gray> <gray>Every balance"
  help-other:  "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} <currency> <player></gradient> <dark_gray>·</dark_gray> <gray>Inspect another player"
  help-top:    "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} top [currency] [limit]</gradient> <dark_gray>·</dark_gray> <gray>Leaderboard"
  help-footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"

# ── Pay ───────────────────────────────────────────────────────────────────────

pay:
  usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/pay <player> <amount> [currency]</gradient>"
  sent: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Paid <gradient:#fde047:#f59e0b>{amount}</gradient> to <white>{target}</white> <dark_gray>·</dark_gray> balance <gradient:#fde047:#f59e0b>{balance}</gradient>"
  received: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Received <gradient:#fde047:#f59e0b>{amount}</gradient> from <white>{sender}</white>"
  disabled: "<gradient:#fca5a5:#dc2626>Payments are currently disabled.</gradient>"
  failed: "<gradient:#fca5a5:#dc2626>Payment failed <dark_gray>·</dark_gray> <white>{error}</white></gradient>"
  no-default-currency: "<gradient:#fca5a5:#dc2626>No currencies are configured.</gradient> <gray>Ask an admin to create one."
  currency-not-allowed: "<gradient:#fca5a5:#dc2626>Currency <white>{currency}</white> is not allowed for payments.</gradient>"
  amount-out-of-range: "<gradient:#fca5a5:#dc2626>Amount <white>{amount}</white> is outside the allowed range</gradient> <gray>(<#fde047>{min}</#fde047> — <#fde047>{max}</#fde047>)"
  amount-below-min: "<gradient:#fca5a5:#dc2626>Amount <white>{amount}</white> is below the minimum of <#fde047>{min}</#fde047>.</gradient>"

# ── Admin Console (deposit / withdraw / reset-all) ────────────────────────────

admin:
  deposit-success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Deposited <gradient:#fde047:#f59e0b>{amount}</gradient> to <white>{player}</white> <dark_gray>·</dark_gray> balance <gradient:#fde047:#f59e0b>{balance}</gradient>"
  deposit-failed: "<gradient:#fca5a5:#dc2626>Deposit to <white>{player}</white> failed <dark_gray>·</dark_gray> <white>{error}</white></gradient>"
  withdraw-success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Withdrew <gradient:#fde047:#f59e0b>{amount}</gradient> from <white>{player}</white> <dark_gray>·</dark_gray> balance <gradient:#fde047:#f59e0b>{balance}</gradient>"
  withdraw-failed: "<gradient:#fca5a5:#dc2626>Withdrawal from <white>{player}</white> failed <dark_gray>·</dark_gray> <white>{error}</white></gradient>"
  unknown-currency: "<gradient:#fca5a5:#dc2626>Unknown currency <white>{currency}</white>.</gradient> <gray>Available <dark_gray>»</dark_gray> <white>{available}</white>"
  no-default-currency: "<gradient:#fca5a5:#dc2626>No currencies are configured.</gradient> <gray>Create one with <gradient:#93c5fd:#2563eb>/currencies create</gradient> first."
  reset-all: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Reset <gradient:#fde047:#f59e0b>{count}</gradient> balances for <gradient:#a5f3fc:#06b6d4>{currency}</gradient>"

# ── Currencies (management) ───────────────────────────────────────────────────

currencies:
  overview-placeholder: "<gray>Currency management GUI will be available soon."

  create:
    usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/currencies create <identifier> <symbol> [prefix] [suffix]</gradient>"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency}</gradient> created."
    failed: "<gradient:#fca5a5:#dc2626>Currency creation was cancelled.</gradient>"
    already-exists: "<gradient:#fca5a5:#dc2626>Currency <white>{currency}</white> already exists.</gradient>"

  delete:
    usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/currencies delete <identifier></gradient>"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency}</gradient> deleted."
    failed: "<gradient:#fca5a5:#dc2626>Currency deletion was cancelled.</gradient>"

  edit:
    usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/currencies edit <identifier> <field> <value></gradient>"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency}</gradient> updated <dark_gray>·</dark_gray> <white>{field}</white> = <white>{value}</white>"
    failed: "<gradient:#fca5a5:#dc2626>Failed to update currency <white>{currency}</white>.</gradient>"

  info:
    usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/currencies info <identifier></gradient>"
    details: "<gradient:#fde047:#f59e0b>━━━━  </gradient><gradient:#a5f3fc:#06b6d4>{identifier}</gradient><gradient:#fde047:#f59e0b>  ━━━━</gradient>\n<dark_gray>┃</dark_gray> <gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{symbol}</gradient>\n<dark_gray>┃</dark_gray> <gray>Prefix <dark_gray>»</dark_gray> <white>{prefix}</white>\n<dark_gray>┃</dark_gray> <gray>Suffix <dark_gray>»</dark_gray> <white>{suffix}</white>\n<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"

  overview:
    header: "<gradient:#fde047:#f59e0b>━━━━━━  Currencies ({count})  ━━━━━━</gradient>"
    entry: "<dark_gray>┃</dark_gray> <gradient:#a5f3fc:#06b6d4>{identifier}</gradient> <dark_gray>[<gray>{symbol}</gray>]</dark_gray> <dark_gray>·</dark_gray> <gray>prefix <white>{prefix}</white>, suffix <white>{suffix}</white>"
    empty: "<gray>No currencies configured yet."

  # Compact list (chat)
  list:
    header: "<gradient:#fde047:#f59e0b>━━━━━━  Currencies ({count})  ━━━━━━</gradient>"
    entry: "<dark_gray>┃</dark_gray> <gradient:#a5f3fc:#06b6d4>{identifier}</gradient> <dark_gray>[<gray>{symbol}</gray>]</dark_gray> <dark_gray>·</dark_gray> <gray>prefix <white>{prefix}</white>, suffix <white>{suffix}</white>"
    footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"

  # Help screen
  help:
    header:   "<gradient:#fde047:#f59e0b>━━━━━━  /currencies  ━━━━━━</gradient>"
    overview: "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias}</gradient> <dark_gray>·</dark_gray> <gray>Open management GUI"
    list:     "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} list</gradient> <dark_gray>·</dark_gray> <gray>List currencies in chat"
    info:     "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} info <currency></gradient> <dark_gray>·</dark_gray> <gray>Inspect one currency"
    create:   "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} create [id symbol prefix suffix]</gradient> <dark_gray>·</dark_gray> <gray>Create (opens GUI if no args)"
    edit:     "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} edit <currency> <field> <value></gradient> <dark_gray>·</dark_gray> <gray>Update one field"
    delete:   "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} delete <currency></gradient> <dark_gray>·</dark_gray> <gray>Delete a currency"
    footer:   "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"

# ── Currency lifecycle (fired from service) ───────────────────────────────────

currency:
  created: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{identifier}</gradient> created."
  deleted: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{identifier}</gradient> deleted."
  updated: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{identifier}</gradient> updated."

# ── Leaderboard (chat, non-GUI) ───────────────────────────────────────────────

leaderboard:
  header: "<gradient:#d8b4fe:#9333ea>━━━━  </gradient><gradient:#a5f3fc:#06b6d4>{currency}</gradient><gradient:#d8b4fe:#9333ea>  Leaderboard  ━━━━</gradient>"
  entry: "<dark_gray>┃</dark_gray> <gradient:#d8b4fe:#9333ea><bold>#{rank}</bold></gradient> <white>{player}</white> <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{balance} {symbol}</gradient>"
  empty: "<gray>No entries yet."

# ── Transaction Log ───────────────────────────────────────────────────────────
# Nested click/hover tags rely on MiniMessage's quote recursion.
# Placeholders are substituted BEFORE MiniMessage parses the final string.

log:
  empty: "<gray>No transaction logs found."
  empty-other: "<gray><white>{player}</white> has no transaction logs."
  viewing-other: "<gray>Viewing logs for <white>{player}</white>."
  error: "<gradient:#fca5a5:#dc2626>Failed to load transaction logs.</gradient>"
  not-found: "<gradient:#fca5a5:#dc2626>Log entry <white>#{id}</white> not found.</gradient>"
  page-not-found: "<gradient:#fca5a5:#dc2626>Page {page} does not exist.</gradient> <gray>Total pages <dark_gray>»</dark_gray> {total}"
  details-usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/pcurrencylog details <id></gradient>"
  invalid-id: "<gradient:#fca5a5:#dc2626><white>{input}</white> is not a valid log id.</gradient>"
  invalid-page: "<gradient:#fca5a5:#dc2626><white>{input}</white> is not a valid page number.</gradient>"
  player-usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>/pcurrencylog player <name> [page]</gradient>"

  # Pagination screen
  header: "<gradient:#fde047:#f59e0b>━━━━  Transaction Logs  ━━━━</gradient> <dark_gray>·</dark_gray> <gray>Page <white>{page}</white>/<white>{total_pages}</white> <dark_gray>({total_entries} entries)</dark_gray>"
  status-success: "<gradient:#86efac:#16a34a>✔</gradient>"
  status-failed: "<gradient:#fca5a5:#dc2626>✘</gradient>"
  entry: "<click:run_command:\"/pcurrencylog details {id}\"><hover:show_text:'<gray>ID <dark_gray>»</dark_gray> <white>{id}</white><newline><gray>Type <dark_gray>»</dark_gray> <white>{type}</white><newline><gray>Amount <dark_gray>»</dark_gray> <#fde047>{amount}</#fde047><newline><gray>Balance <dark_gray>»</dark_gray> <white>{old_balance}</white> → <white>{new_balance}</white><newline><gradient:#fde047:#f59e0b>Click for details</gradient>'><dark_gray>{index}.</dark_gray> {status} <white>{type}</white> <gradient:#fde047:#f59e0b>{amount}</gradient> <gradient:#a5f3fc:#06b6d4>{currency}</gradient> <dark_gray>{timestamp}</dark_gray></hover></click>"
  nav-prev-active: "<click:run_command:\"/pcurrencylog view {target_page}\"><gradient:#86efac:#16a34a>« Prev</gradient></click>"
  nav-prev-disabled: "<dark_gray>« Prev</dark_gray>"
  nav-next-active: "<click:run_command:\"/pcurrencylog view {target_page}\"><gradient:#86efac:#16a34a>Next »</gradient></click>"
  nav-next-disabled: "<dark_gray>Next »</dark_gray>"
  nav-line: "  {prev} <dark_gray>·</dark_gray> <gray>Page {page}/{total_pages}</gray> <dark_gray>·</dark_gray> {next}"

  # Details screen
  details-header: "<gradient:#fde047:#f59e0b>━━━━  Transaction </gradient><dark_gray>#</dark_gray><gradient:#fde047:#f59e0b>{id}  ━━━━</gradient>"
  details-time:     "<dark_gray>┃</dark_gray> <gray>Time <dark_gray>»</dark_gray> <white>{time}</white>"
  details-status:   "<dark_gray>┃</dark_gray> <gray>Status <dark_gray>»</dark_gray> {status}"
  details-type:     "<dark_gray>┃</dark_gray> <gray>Type <dark_gray>»</dark_gray> <white>{type}</white>"
  details-currency: "<dark_gray>┃</dark_gray> <gray>Currency <dark_gray>»</dark_gray> <gradient:#a5f3fc:#06b6d4>{currency}</gradient>"
  details-amount:   "<dark_gray>┃</dark_gray> <gray>Amount <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{amount}</gradient>"
  details-balance:  "<dark_gray>┃</dark_gray> <gray>Balance <dark_gray>»</dark_gray> <white>{old}</white> <dark_gray>→</dark_gray> <white>{new}</white>"
  details-net-positive: "<dark_gray>┃</dark_gray> <gray>Net <dark_gray>»</dark_gray> <gradient:#86efac:#16a34a>+{amount}</gradient>"
  details-net-negative: "<dark_gray>┃</dark_gray> <gray>Net <dark_gray>»</dark_gray> <gradient:#fca5a5:#dc2626>-{amount}</gradient>"
  details-player:    "<dark_gray>┃</dark_gray> <gray>Player <dark_gray>»</dark_gray> <white>{player}</white>"
  details-initiator: "<dark_gray>┃</dark_gray> <gray>Initiator <dark_gray>»</dark_gray> <white>{initiator}</white>"
  details-reason:    "<dark_gray>┃</dark_gray> <gray>Reason <dark_gray>»</dark_gray> <white>{reason}</white>"
  details-error:     "<dark_gray>┃</dark_gray> <gradient:#fca5a5:#dc2626>Error <dark_gray>»</dark_gray> {error}</gradient>"
  details-back: "  <click:run_command:\"/pcurrencylog view\"><gradient:#86efac:#16a34a>« Back to Logs</gradient></click>"

  # Clear command
  clear-start:          "<gray>Pruning log entries older than <white>{days}</white> days..."
  clear-success:        "<gradient:#86efac:#16a34a>✔</gradient> <gray>Removed <gradient:#fde047:#f59e0b>{count}</gradient> log entries older than <white>{days}</white> days."
  clear-failed:         "<gradient:#fca5a5:#dc2626>Clear failed <dark_gray>»</dark_gray> <white>{error}</white></gradient>"
  clear-days-too-small: "<gradient:#fca5a5:#dc2626>Minimum retention is <white>{min}</white> days</gradient> <gray>(given <white>{given}</white>)."
  clear-invalid-days:   "<gradient:#fca5a5:#dc2626><white>{input}</white> is not a valid day count.</gradient>"

  # Help screen
  usage-header:  "<gradient:#fde047:#f59e0b>━━━━━━  /currencylog  ━━━━━━</gradient>"
  usage-view:    "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} view [page]</gradient> <dark_gray>·</dark_gray> <gray>View your transaction logs"
  usage-details: "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} details <id></gradient> <dark_gray>·</dark_gray> <gray>Full details for one entry"
  usage-player:  "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} player <name> [page]</gradient> <dark_gray>·</dark_gray> <gray>Another player's log"
  usage-clear:   "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} clear [days]</gradient> <dark_gray>·</dark_gray> <gray>Prune entries older than N days"

# ── Migration (console) ───────────────────────────────────────────────────────

migrate:
  usage-header:     "<gradient:#fde047:#f59e0b>━━━━━━  /economy migrate  ━━━━━━</gradient>"
  usage-start:      "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/economy migrate start</gradient> <dark_gray>·</dark_gray> <gray>Start migration (not yet implemented)"
  usage-status:     "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/economy migrate status</gradient> <dark_gray>·</dark_gray> <gray>Check migration status"
  usage-supported:  "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/economy migrate supported</gradient> <dark_gray>·</dark_gray> <gray>List supported plugins"
  usage-info:       "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/economy migrate info</gradient> <dark_gray>·</dark_gray> <gray>System information"
  not-implemented:  "<gradient:#fde047:#f59e0b>Migration is not yet implemented in 3.0.</gradient> <gray>Arrives in a future update."
  status:           "<gray>No migration has been performed yet."
  supported-header: "<gradient:#fde047:#f59e0b>━━━━  Supported Providers</gradient> <dark_gray>(planned)</dark_gray> <gradient:#fde047:#f59e0b>━━━━</gradient>"
  supported-entry:  "<dark_gray>┃</dark_gray> <white>{provider}</white>"
  supported-vault:  "<gray>A generic Vault API bridge will also be available."
  info-header:      "<gradient:#fde047:#f59e0b>━━━━━━  JExEconomy Migration  ━━━━━━</gradient>"
  info-description: "<gray>Migrate data from existing economy plugins into JExEconomy 3.0."
  info-features-header: "<gray>Planned features:"
  info-feature:     "<dark_gray>┃</dark_gray> <white>{feature}</white>"
  info-footer:      "<gray>Use <gradient:#93c5fd:#2563eb>/economy migrate start</gradient> to begin once implemented."

# ── Shared GUI strings ────────────────────────────────────────────────────────

ui:
  overview-title:   "<gradient:#fde047:#f59e0b>Currencies</gradient>"
  detail-title:     "<gradient:#a5f3fc:#06b6d4>{currency}</gradient> <gray>Details"
  create-title:     "<gradient:#86efac:#16a34a>Create Currency</gradient>"
  edit-title:       "<gradient:#fde047:#f59e0b>Edit</gradient> <white>{currency}</white>"
  delete-title:     "<gradient:#fca5a5:#dc2626>Delete</gradient> <white>{currency}</white>"
  leaderboard-title: "<gradient:#d8b4fe:#9333ea>{currency}</gradient> <gray>Top Players"
  confirm:   "<gradient:#86efac:#16a34a>Confirm</gradient>"
  cancel:    "<gradient:#fca5a5:#dc2626>Cancel</gradient>"
  back:      "<gray>« Back"
  next-page: "<gray>Next Page »"
  prev-page: "<gray>« Previous Page"
  page-info: "<gray>Page {current} of {total}"

# ── View: Currency Overview ───────────────────────────────────────────────────

currency_overview_ui:
  title: "<gradient:#fde047:#f59e0b>Currencies</gradient>"
  previous: "<gray>« Previous Page"
  next: "<gray>Next Page »"
  loading: "<gray>Loading..."
  page:
    name: "<gray>Page <white>{current_page}</white>/<white>{max_page}</white>"
    lore:
      - "<dark_gray>Click to navigate pages."
  currency:
    name: "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> <dark_gray>({currency_symbol})</dark_gray>"
    lore:
      - "<gray>Prefix <dark_gray>»</dark_gray> <white>{currency_prefix}"
      - "<gray>Suffix <dark_gray>»</dark_gray> <white>{currency_suffix}"
      - ""
      - "<gradient:#fde047:#f59e0b>Click to view details.</gradient>"

# ── View: Currency Detail ─────────────────────────────────────────────────────

currency_detail_ui:
  title: "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> <gray>Details"
  back: "<gray>« Back"
  currency_icon:
    name: "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient>"
    lore:
      - "<gray>Icon <dark_gray>»</dark_gray> <white>{material_name}"
  currency_symbol:
    name: "<gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{currency_symbol}</gradient>"
    lore:
      - "<dark_gray>The short display symbol."
  currency_prefix:
    name: "<gray>Prefix"
    lore:
      - "<gray>Value <dark_gray>»</dark_gray> <white>{currency_prefix}"
      - "<dark_gray>Text shown before the amount."
  currency_suffix:
    name: "<gray>Suffix"
    lore:
      - "<gray>Value <dark_gray>»</dark_gray> <white>{currency_suffix}"
      - "<dark_gray>Text shown after the amount."
  leaderboard:
    name: "<gradient:#d8b4fe:#9333ea>Leaderboard</gradient>"
    lore:
      - "<gray>Top holders of <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient>"
      - ""
      - "<gradient:#fde047:#f59e0b>Click to open.</gradient>"
  edit:
    name: "<gradient:#fde047:#f59e0b>Edit Currency</gradient>"
    lore:
      - "<gray>Modify the properties of"
      - "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient><gray>."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to edit.</gradient>"
  reset_all:
    name: "<gradient:#fca5a5:#dc2626>Reset All Balances</gradient>"
    lore:
      - "<gray>Wipes every balance for"
      - "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient><gray>."
      - ""
      - "<gradient:#fca5a5:#dc2626>⚠ This cannot be undone.</gradient>"
    confirm_chat: "<gradient:#fca5a5:#dc2626>Type <white>CONFIRM</white> in chat to reset all balances for <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient><gradient:#fca5a5:#dc2626>.</gradient>"

# ── View: Currency Create ─────────────────────────────────────────────────────

currency_create_ui:
  title: "<gradient:#86efac:#16a34a>Create Currency</gradient>"
  back: "<gray>« Back"
  identifier:
    name: "<gray>Identifier <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Unique programmatic name."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to set.</gradient>"
  symbol:
    name: "<gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{value}</gradient>"
    lore:
      - "<dark_gray>Short display character (e.g. $, €, ⭐)."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to set.</gradient>"
  icon:
    name: "<gray>Icon <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Material name shown in GUIs."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to set.</gradient>"
  prefix:
    name: "<gray>Prefix <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Text before the amount. Optional."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to set.</gradient>"
  suffix:
    name: "<gray>Suffix <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Text after the amount. Optional."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to set.</gradient>"
  create:
    name: "<gradient:#86efac:#16a34a>✔ Create Currency</gradient>"
    lore:
      - "<gray>Saves <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> to the database."
      - ""
      - "<gradient:#86efac:#16a34a>Click to create.</gradient>"
    missing_identifier: "<gradient:#fca5a5:#dc2626>Set an identifier before creating.</gradient>"
    missing_symbol: "<gradient:#fca5a5:#dc2626>Set a symbol before creating.</gradient>"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> created."
    failed: "<gradient:#fca5a5:#dc2626>Currency creation was cancelled or failed.</gradient>"

# ── View: Currency Edit ───────────────────────────────────────────────────────

currency_edit_ui:
  title: "<gradient:#fde047:#f59e0b>Edit</gradient> <white>{currency_identifier}</white>"
  back: "<gray>« Back"
  identifier:
    name: "<gray>Identifier <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Unique programmatic name."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to change.</gradient>"
  symbol:
    name: "<gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{value}</gradient>"
    lore:
      - "<dark_gray>Short display character."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to change.</gradient>"
  icon:
    name: "<gray>Icon <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Material name shown in GUIs."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to change.</gradient>"
  prefix:
    name: "<gray>Prefix <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Text before amounts."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to change.</gradient>"
  suffix:
    name: "<gray>Suffix <dark_gray>»</dark_gray> <white>{value}</white>"
    lore:
      - "<dark_gray>Text after amounts."
      - ""
      - "<gradient:#fde047:#f59e0b>Click to change.</gradient>"
  save:
    name: "<gradient:#86efac:#16a34a>✔ Save Changes</gradient>"
    lore:
      - "<gray>Persists edits for <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient>."
      - ""
      - "<gradient:#86efac:#16a34a>Click to save.</gradient>"
    missing_identifier: "<gradient:#fca5a5:#dc2626>Identifier cannot be empty.</gradient>"
    missing_symbol: "<gradient:#fca5a5:#dc2626>Symbol cannot be empty.</gradient>"
    success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> saved."
    failed: "<gradient:#fca5a5:#dc2626>Failed to update currency <white>{currency_identifier}</white>.</gradient>"

# ── View: Currency Delete ─────────────────────────────────────────────────────

currency_delete_ui:
  title: "<gradient:#fca5a5:#dc2626>Delete Currency</gradient>"
  back: "<gray>« Back"
  warning:
    name: "<gradient:#fca5a5:#dc2626>⚠ Delete</gradient> <white>{currency_identifier}</white>"
    lore:
      - "<gray>Permanently removes"
      - "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> <dark_gray>(<gray>{currency_symbol}</gray>)</dark_gray>"
      - "<gradient:#fca5a5:#dc2626>and every related account.</gradient>"
      - ""
      - "<gradient:#fca5a5:#dc2626>⚠ This cannot be undone.</gradient>"
  confirm:
    name: "<gradient:#86efac:#16a34a>✔ Confirm Delete</gradient>"
    lore:
      - "<gray>Deletes <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> and all accounts."
      - ""
      - "<gradient:#fca5a5:#dc2626>Irreversible action.</gradient>"
  cancel:
    name: "<gray>✖ Cancel</gray>"
    lore:
      - "<dark_gray>Go back without deleting."
  success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Currency <gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> deleted."
  failed: "<gradient:#fca5a5:#dc2626>Deletion of <white>{currency_identifier}</white> was cancelled.</gradient>"
  error: "<gradient:#fca5a5:#dc2626>Error deleting <white>{currency_identifier}</white> <dark_gray>»</dark_gray> <white>{error}</white></gradient>"

# ── View: Currency Leaderboard ────────────────────────────────────────────────

currency_leaderboard_ui:
  title: "<gradient:#d8b4fe:#9333ea>{currency_identifier}</gradient> <gray>Leaderboard"
  back: "<gray>« Back"
  previous: "<gray>« Previous"
  next: "<gray>Next »"
  loading: "<gray>Loading leaderboard..."
  page:
    name: "<gray>Page <white>{current_page}</white>/<white>{max_page}</white>"
    lore:
      - "<dark_gray>Navigate the leaderboard."
  currency_info:
    name: "<gradient:#a5f3fc:#06b6d4>{currency_identifier}</gradient> <dark_gray>({currency_symbol})</dark_gray>"
    lore:
      - "<dark_gray>Top 25 balance holders."
      - "<gray>Symbol <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{currency_symbol}</gradient>"
  player_entry:
    name: "{rank_color}<bold>#{rank}</bold> <white>{player_name}</white>"
    lore:
      - "<gray>Balance <dark_gray>»</dark_gray> <gradient:#fde047:#f59e0b>{formatted_balance}</gradient>"
      - "<gray>Symbol <dark_gray>»</dark_gray> <white>{currency_symbol}</white>"

# ── View: Currency Field Input (Anvil) ────────────────────────────────────────

currency_field_input_ui:
  title: "<gradient:#fde047:#f59e0b>Set {field}</gradient>"
  error:
    empty: "<gradient:#fca5a5:#dc2626>Input cannot be empty.</gradient>"
    invalid_material: "<gradient:#fca5a5:#dc2626><white>{value}</white> is not a valid Material name.</gradient>"

# ── JExCommand framework ──────────────────────────────────────────────────────
# Keys emitted by the JExCommand 2.0 tree handler and built-in argument types.
# All placeholders follow the {name} convention.

jexcommand:
  usage: "<gray>Usage <dark_gray>»</dark_gray> <gradient:#93c5fd:#2563eb>{usage}</gradient>"
  error:
    missing-argument: "<gradient:#fca5a5:#dc2626>Missing argument <white>{name}</white></gradient> <dark_gray>(<gray>{type}</gray>)</dark_gray>"
    too-many-arguments: "<gradient:#fca5a5:#dc2626>Too many arguments.</gradient>"
    unknown-subcommand: "<gradient:#fca5a5:#dc2626>Unknown subcommand <white>{name}</white>.</gradient>"
    no-permission: "<gradient:#fca5a5:#dc2626>You don't have permission.</gradient> <dark_gray>(<gray>{permission}</gray>)</dark_gray>"
    not-a-player: "<gradient:#fca5a5:#dc2626>This command can only be run by a player.</gradient>"
    not-a-console: "<gradient:#fca5a5:#dc2626>This command can only be run from the console.</gradient>"
    unknown-type: "<gradient:#fca5a5:#dc2626>Unknown argument type <white>{type}</white>.</gradient>"
    internal: "<gradient:#fca5a5:#dc2626>Internal error <dark_gray>»</dark_gray> <white>{message}</white></gradient>"
    invalid-long: "<gradient:#fca5a5:#dc2626><white>{value}</white> is not a valid integer.</gradient>"
    invalid-double: "<gradient:#fca5a5:#dc2626><white>{value}</white> is not a valid number.</gradient>"
    not-positive-long: "<gradient:#fca5a5:#dc2626><white>{value}</white> must be a positive integer.</gradient>"
    not-positive-double: "<gradient:#fca5a5:#dc2626><white>{value}</white> must be a positive number.</gradient>"
    player-not-online: "<gradient:#fca5a5:#dc2626>Player <white>{value}</white> is not online.</gradient>"
    player-unknown: "<gradient:#fca5a5:#dc2626>Player <white>{value}</white> has never joined this server.</gradient>"
    invalid-enum: "<gradient:#fca5a5:#dc2626><white>{value}</white> is not one of</gradient> <gray>{options}</gray>"
    invalid-uuid: "<gradient:#fca5a5:#dc2626><white>{value}</white> is not a valid UUID.</gradient>"
    expected-single-word: "<gradient:#fca5a5:#dc2626>Expected a single word without spaces.</gradient>"

# ── /economy admin command ────────────────────────────────────────────────────

economy:
  error:
    currency-not-found: "<gradient:#fca5a5:#dc2626>Currency <white>{currency}</white> not found.</gradient>"

  # Help
  help-header:  "<gradient:#fde047:#f59e0b>━━━━━━  /economy  ━━━━━━</gradient>"
  help-give:    "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} give <player> <amount> [currency]</gradient> <dark_gray>·</dark_gray> <gray>Credit a balance"
  help-take:    "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} take <player> <amount> [currency]</gradient> <dark_gray>·</dark_gray> <gray>Debit a balance"
  help-set:     "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} set <player> <amount> [currency]</gradient> <dark_gray>·</dark_gray> <gray>Absolute balance"
  help-reset:   "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} reset <player> [currency]</gradient> <dark_gray>·</dark_gray> <gray>Zero balance"
  help-migrate: "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} migrate <action></gradient> <dark_gray>·</dark_gray> <gray>Migration tooling"
  help-reload:  "<dark_gray>┃</dark_gray> <gradient:#93c5fd:#2563eb>/{alias} reload</gradient> <dark_gray>·</dark_gray> <gray>Reload cache + translations"
  help-footer:  "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</dark_gray>"

  # give/take/set/reset — success & failure
  give-success:  "<gradient:#86efac:#16a34a>✔</gradient> <gray>Gave <gradient:#fde047:#f59e0b>{amount}</gradient> to <white>{player}</white> <dark_gray>·</dark_gray> balance <gradient:#fde047:#f59e0b>{balance}</gradient>"
  give-failed:   "<gradient:#fca5a5:#dc2626>Give failed for <white>{player}</white> <dark_gray>»</dark_gray> <white>{error}</white></gradient>"
  take-success:  "<gradient:#86efac:#16a34a>✔</gradient> <gray>Took <gradient:#fde047:#f59e0b>{amount}</gradient> from <white>{player}</white> <dark_gray>·</dark_gray> balance <gradient:#fde047:#f59e0b>{balance}</gradient>"
  take-failed:   "<gradient:#fca5a5:#dc2626>Take failed for <white>{player}</white> <dark_gray>»</dark_gray> <white>{error}</white></gradient>"
  set-success:   "<gradient:#86efac:#16a34a>✔</gradient> <gray>Set <white>{player}</white>'s <gradient:#a5f3fc:#06b6d4>{currency}</gradient> to <gradient:#fde047:#f59e0b>{balance}</gradient>"
  set-failed:    "<gradient:#fca5a5:#dc2626>Set failed for <white>{player}</white> <dark_gray>»</dark_gray> <white>{error}</white></gradient>"
  reset-success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Reset <white>{player}</white>'s <gradient:#a5f3fc:#06b6d4>{currency}</gradient>."
  reset-failed:  "<gradient:#fca5a5:#dc2626>Reset failed for <white>{player}</white> <dark_gray>»</dark_gray> <white>{error}</white></gradient>"

  # Reload
  reload-start:   "<gray>Reloading currencies and translations..."
  reload-success: "<gradient:#86efac:#16a34a>✔</gradient> <gray>Reload complete <dark_gray>·</dark_gray> <gradient:#fde047:#f59e0b>{count}</gradient> currencies"
  reload-failed:  "<gradient:#fca5a5:#dc2626>Reload failed <dark_gray>»</dark_gray> <white>{error}</white></gradient>"
