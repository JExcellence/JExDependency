# RaindropQuests (RDQ) Translation File - English
# Locale: en
# Format: MiniMessage with %placeholder% format

# === General ===
rq:
  no_luckperms_installed: "<gradient:#9b59b6:#ffffff>LuckPerms not found. Install plugin to use feature.</gradient>"

# General prefix used throughout the plugin
prefix:
  - "<gradient:#9b59b6:#ffffff>✦ RDQImpl ✦</gradient> <color:#9b59b6>|</color> <color:#ffffff>"

# === Head UI (Common navigation elements) ===
head:
  return:
    name: "<gradient:#9b59b6:#ffffff>Return</gradient>"
    lore:
      - "<gradient:#9b59b6:#ffffff>Click here to return</gradient>"
  proceed:
    name: "<gradient:#9b59b6:#ffffff>Proceed</gradient>"
    lore:
      - "<gradient:#9b59b6:#ffffff>Click here to proceed</gradient>"
  next:
    name: "<gradient:#9b59b6:#ffffff>Next</gradient>"
    lore:
      - "<gradient:#9b59b6:#ffffff>Go to the next page</gradient>"
  previous:
    name: "<gradient:#9b59b6:#ffffff>Previous</gradient>"
    lore:
      - "<gradient:#9b59b6:#ffffff>Go to the previous page</gradient>"
  page:
    name: "<gradient:#9b59b6:#ffffff>Page: %page%</gradient>"
    lore:
      - "<gradient:#9b59b6:#ffffff>%first_page% - %page% - %max_page%</gradient>"

# === Bounty System ===
bounty:
  # BountyMainView - getKey() = "bounty_main_ui"
  main_ui:
    title: "<gradient:#9b59b6:#ffffff>Bounty Menu</gradient>"
    decoration:
      name: " "
    create_button:
      name: "<green>Create Bounty</green>"
      lore:
        - "<gray>Click to create a new bounty</gray>"
        - "<gray>Place a bounty on another player</gray>"
    list_button:
      name: "<gradient:#9b59b6:#ffffff>View Bounties</gradient>"
      lore:
        - "<gray>Click to view all active bounties</gray>"
        - "<gray>See who has bounties on their head</gray>"
    leaderboard_button:
      name: "<gold>Bounty Leaderboard</gold>"
      lore:
        - "<gray>View top bounty hunters</gray>"
        - "<gray>See who has claimed the most bounties</gray>"
    my_bounties_button:
      name: "<yellow>My Bounties</yellow>"
      lore:
        - "<gray>View bounties you have created</gray>"
        - "<gray>Track your commissioned bounties</gray>"
    create_bounty_locked:
      name: "<red>Create Bounty (Locked)</red>"
      lore:
        - "<gray>This feature is premium only</gray>"
      message: "<red>You need premium to create bounties!</red>"
    upgrade_premium:
      name: "<gold>Upgrade to Premium</gold>"
      lore:
        - "<gray>Unlock bounty creation and more!</gray>"
      message: "<gold>Visit our store to upgrade!</gold>"
  
  # BountyCreationView - getKey() = "bounty.creation"
  creation:
    title: "<gradient:#9b59b6:#ffffff>Bounty Creation View <white>%current_page%</white> / <white>%max_page%</white></gradient>"
    title_selected: "<gradient:#9b59b6:#ffffff>Bounty - <white>%player_name%</white></gradient>"
    confirm:
      confirm: "<gradient:#9b59b6:#ffffff>Create Bounty</gradient>"
      error: "<gradient:#9b59b6:#ffffff>Error creating bounty for <red>%target_name%</red></gradient>"
      success: "<gradient:#9b59b6:#ffffff>Bounty successfully created for <green>%target_name%</green></gradient>"
      name: "<gradient:#9b59b6:#ffffff>Confirm Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Alerts everyone a bounty as been set!</gradient>"
      no_player: "<gradient:#9b59b6:#ffffff><red>You must select a target player before confirming.</red></gradient>"
      no_reward: "<gradient:#9b59b6:#ffffff><red>You must add at least one reward item before confirming.</red></gradient>"
    add_items:
      name: "<gradient:#9b59b6:#ffffff>Add Reward Items</gradient>"
      disabled: "<gradient:#9b59b6:#ffffff><red>Add Reward Items <gray>(Select a target first)</gray></red></gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Add item rewards to incentivize the kill!</gradient>"
    add_currency:
      name: "<gradient:#9b59b6:#ffffff>Add Currency Reward</gradient>"
      disabled: "<gradient:#9b59b6:#ffffff><red>Add Currency Reward <gray>(Select a target first)</gray></red></gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Add economic value to the kill!</gradient>"
    select_target:
      title: "<gradient:#9b59b6:#ffffff>Bounty Creation Menu</gradient>"
      name: "<gradient:#9b59b6:#ffffff>Create a Bounty</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Choose a player to place a bounty on.</gradient>"
        - "<gradient:#9b59b6:#ffffff>Current: <white>%target_name%</white></gradient>"
  
  # BountyListView - getKey() = "bounty_list_ui"
  list_ui:
    title: "<gradient:#9b59b6:#ffffff>Active Bounties</gradient>"
    no_bounties:
      name: "<gray>No Active Bounties</gray>"
      lore:
        - "<gray>There are currently no active bounties</gray>"
        - "<gray>Create one to get started!</gray>"
  
  # BountyLeaderboardView - getKey() = "bounty_leaderboard_ui"
  leaderboard_ui:
    title: "<gradient:#9b59b6:#ffffff>Bounty Hunter Leaderboard</gradient>"
    no_hunters:
      name: "<gray>No Bounty Hunters</gray>"
      lore:
        - "<gray>No one has claimed a bounty yet</gray>"
        - "<gray>Be the first!</gray>"
  
  # MyBountiesView - getKey() = "bounty_my_bounties_ui"
  my_bounties_ui:
    title: "<gradient:#9b59b6:#ffffff>My Bounties</gradient>"
    no_bounties:
      name: "<gray>No Bounties Created</gray>"
      lore:
        - "<gray>You haven't created any bounties yet</gray>"
        - "<gray>Create one from the main menu!</gray>"
  
  # BountyRewardView - getKey() = "bounty.reward"
  reward:
    title: "<gradient:#9b59b6:#ffffff>Bounty Rewards</gradient>"
    pseudo:
      name: "<gray>No Rewards</gray>"
      lore: "<gray>No rewards have been added yet.</gray>"
    input_slot:
      name: "<gradient:#9b59b6:#ffffff>Insert Reward</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Place an item here to add it as a reward.</gradient>"
    left_overs: "<gradient:#9b59b6:#ffffff>Some items could not be returned to your inventory and were dropped at your feet.</gradient>"
    reward_item:
      lore: "<gray>Reward contributed by <white>%contributor%</white></gray>"
    target:
      name: "<gradient:#9b59b6:#ffffff>Bounty Target: <white>%target_name%</white></gradient>"
      lore: "<gray>The player who will receive the bounty.</gray>"
    no_new_items_inserted: "<gradient:#9b59b6:#ffffff>You have to insert at least 1 new reward to move on further.</gradient>"
  
  # BountyOverviewView - getKey() = "bounty.overview"
  overview:
    title: "<gradient:#9b59b6:#ffffff>Bounties Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>View and manage all bounties.</gradient>"
    entry:
      name: "<gradient:#9b59b6:#ffffff>%target_name%</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Information</gradient>"
        - "<gradient:#9b59b6:#ffffff>- %target_name%</gradient>"
        - "<gradient:#9b59b6:#ffffff>- Created by %commissioner_name% at %created_at%</gradient>"
    create_bounty:
      name: "<gradient:#9b59b6:#ffffff>Create Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Initiate a bounty on another player</gradient>"
    delete_bounty:
      name: "<gradient:#9b59b6:#ffffff>Delete Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Delete an open bounty</gradient>"
    deleted_bounty_successfully: "<gradient:#9b59b6:#ffffff>Bounty (#%bounty_id%) of target %target_name% with uuid %target_uniqueId% has been forcefully deleted.</gradient>"
  
  # BountyPlayerInfoView - getKey() = "bounty.player_info"
  player_info:
    title: "Viewing Bounty - %target_name%"
    target:
      name: "%player_name%"
    delete:
      name: "<gradient:#9b59b6:#ffffff>Delete Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Delete an open bounty</gradient>"
    rewards:
      name: "<gradient:#9b59b6:#ffffff>Bounty Rewards</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>View or add rewards to bounty</gradient>"
    info:
      name: "<gradient:#9b59b6:#ffffff>Bounty Information</gradient>"
      lore:
        - "<gray>Target: <white>%target_name%</white></gray>"
        - "<gray>Commissioner: <white>%commissioner_name%</white></gray>"
        - "<gray>Created: <white>%created_at%</white></gray>"
        - "<gray>Rewards: <white>%reward_count%</white></gray>"
  
  # Bounty messages (not a view, but bounty-related)
  claimed:
    player: "<gradient:#9b59b6:#ffffff>You claimed the bounty on <green>%target_name%</green></gradient>"
    broadcast: "<gradient:#9b59b6:#ffffff><gold>%receiver_name%</gold> has claimed the bounty on <green>%target_name%</green>!</gradient>"
  created:
    broadcast: "<gradient:#9b59b6:#ffffff><gold>%commissioner_name%</gold> has opened a bounty on <green>%target_name%</green>!</gradient>"
  display:
    player_list_name: "<gradient:#9b59b6:#ffffff>%bounty_symbol% %player_name%</gradient>"
    player_display_name: "<gradient:#9b59b6:#ffffff>%bounty_symbol% %player_name%</gradient> <reset>"

# === Paginated Player View ===
paginated_player_view:
  title: "<gradient:#9b59b6:#ffffff>Select Player <white>%current_page%</white> / <white>%max_page%</white></gradient>"
  player_entry:
    name: "<white>%player_name%</white>"
    lore:
      - "<gray>Click to select this player as the bounty target.</gray>"
  no_players: "<gray>No players available to select.</gray>"

# === Forge Section ===
forge:
  cooldown_active: "<gradient:#9b59b6:#ffffff>Cooldown: <white>%rdq_seconds%</white></gradient>"
  incorrect_block_info: "<gradient:#9b59b6:#ffffff>Incorrect block information.</gradient>"
  structure_incomplete: "<gradient:#9b59b6:#ffffff>The structure is <red>incomplete</red>.</gradient>"
  structure_complete: "<gradient:#9b59b6:#ffffff>The structure is <green>complete</green>!</gradient>"

# === Main Overview UI ===
main_overview_ui:
  title: "<gradient:#9b59b6:#ffffff>Main Menu</gradient>"
  lore: "<gradient:#9b59b6:#ffffff>RDQImpl Main Menu</gradient>"

# === Quest Overview UI ===
quest_overview_ui:
  title: "<gradient:#9b59b6:#ffffff>Quests Menu</gradient>"
  lore: "<gradient:#9b59b6:#ffffff>Complete quests and earn raindrops</gradient>"

# === Perk System ===
perk:
  # Perk commands
  command:
    list_header: "<gradient:#9b59b6:#ffffff>Available Perks:</gradient>"
    list_entry: "<gray>%perk%: %status%</gray>"
    info_header: "<gradient:#9b59b6:#ffffff>Perk Info: %perk%</gradient>"
    info_display_name: "<gray>Name: %name%</gray>"
    info_description: "<gray>Description: %description%</gray>"
    info_status: "<gray>Status: %status%</gray>"
    info_category: "<gray>Category: %category%</gray>"
    activated: "<green>Perk %perk% activated!</green>"
    deactivated: "<green>Perk %perk% deactivated!</green>"

  # Perk errors
  error:
    not_found: "<red>Perk %perk% not found</red>"
    no_permission: "<red>You don't have permission: %permission%</red>"
    no_perks: "<red>No perks available</red>"
    already_active: "<yellow>Perk %perk% is already active.</yellow>"
    activation_denied: "<red>You cannot activate %perk% right now.</red>"
    activation_failed: "<red>Failed to activate %perk%. Try again later.</red>"
    not_active: "<red>Perk %perk% is not active.</red>"
    deactivation_failed: "<red>Failed to deactivate %perk%. Try again later.</red>"
    player_not_found: "<red>? Player <white>%player%</white> not found</red>"

  # PerkMainView - getKey() = "perk_main_ui"
  main_ui:
    title: "<gradient:#9b59b6:#ffffff>Perks Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>Obtain perks to enhance gameplay</gradient>"
    decoration:
      name: " "
    view_all_perks:
      name: "<gradient:#9b59b6:#ffffff>View All Perks</gradient>"
      lore:
        - "<gray>Browse and manage your perks</gray>"
        - ""
        - "<green>? Click to view perks</green>"
    my_active_perks:
      name: "<gradient:#9b59b6:#ffffff>Active Perks</gradient>"
      lore:
        - "<gray>View currently active perks</gray>"
        - "<gray>Active: <white>%active_count%</white>/%max_count%</gray>"
        - ""
        - "<green>? Click to manage</green>"
    perk_statistics:
      name: "<gradient:#9b59b6:#ffffff>Perk Statistics</gradient>"
      lore:
        - "<gray>Total Perks: <white>%total_perks%</white></gray>"
        - "<gray>Owned: <white>%owned_perks%</white></gray>"
        - "<gray>Locked: <white>%locked_perks%</white></gray>"
        - "<gray>Active: <white>%active_perks%</white></gray>"

  # PerkListViewFrame - getKey() = "perk_list_ui"
  list_ui:
    title: "<gradient:#9b59b6:#ffffff>Available Perks</gradient>"
    category_all: "All Categories"
    perk_item:
      name: "<yellow>%perk_name%</yellow>"
      lore:
        category: "<gray>Category: <white>%category%</white></gray>"
        state: "<gray>State: %state%</gray>"
        priority: "<gray>Priority: <white>%priority%</white></gray>"
        cooldown: "<gray>Cooldown: <white>%cooldown%</white></gray>"
        duration: "<gray>Duration: <white>%duration%</white></gray>"
        requirements: "<gray>Requirements: <white>%req_completed%</white>/<white>%req_total%</white></gray>"
        action_activate: "<green>? Click to activate</green>"
        action_deactivate: "<red>? Click to deactivate</red>"
        action_locked: "<red>? Locked - View requirements</red>"
        action_view: "<yellow>? Click for details</yellow>"
    navigation:
      previous: "<green>? Previous Page</green>"
      next: "<green>Next Page ?</green>"
      page_info: "<white>Page %page%/%max_page%</white>"
      no_previous: "<gray>No previous page</gray>"
      no_next: "<gray>No next page</gray>"
    filter:
      all: "<white>All Categories</white>"
      category: "<white>%category%</white>"

  # PerkDetailView - getKey() = "perk.detail_ui"
  detail_ui:
    title: "<gradient:#9b59b6:#ffffff>Perk: %perk%</gradient>"
    activate_button: "<green>Activate</green>"
    deactivate_button: "<red>Deactivate</red>"
    permission_scaling: "<gray>Permission Scaling: %scaling%</gray>"

  # PerkRequirementView - getKey() = "perk.requirement_ui"
  requirement_ui:
    title: "<gradient:#9b59b6:#ffffff>Requirements - %perk_name%</gradient>"
    requirement_item:
      name: "%requirement_name%"
      lore:
        type: "<gray>Type: <white>%type%</white></gray>"
        progress: "<gray>Progress: <white>%progress%</white>%</gray>"
        completed: "<green>? Completed</green>"
        incomplete: "<yellow>? In Progress</yellow>"
        locked: "<red>? Not Started</red>"
    buttons:
      complete:
        name: "<green>? Complete Requirement</green>"
        lore: "<gray>Mark this requirement as complete</gray>"
      back:
        name: "<white>? Back to Perk</white>"

  # PerkUnlockView - getKey() = "perk.unlock_ui"
  unlock_ui:
    title: "<gradient:#9b59b6:#ffffff>Unlock - %perk_name%</gradient>"
    confirm:
      name: "<green>? Confirm Unlock</green>"
      lore:
        - "<gray>Unlock this perk</gray>"
        - ""
        - "<gray>Requirements:</gray>"
        - "<green>? All completed</green>"
    cancel:
      name: "<red>? Cancel</red>"
      lore: "<gray>Return without unlocking</gray>"
    cost_info:
      name: "<yellow>?? Unlock Cost</yellow>"
      lore: "<gray>This perk has no cost</gray>"

  # PerkAdminView - getKey() = "perk.admin_ui"
  admin_ui:
    title: "<gradient:#9b59b6:#ff0000>Admin - %perk_name%</gradient>"
    buttons:
      toggle_enabled:
        name: "<yellow>? Toggle Enabled</yellow>"
        lore:
          - "<gray>Current: %enabled%</gray>"
          - "<gray>Click to toggle</gray>"
      edit_settings:
        name: "<yellow>? Edit Settings</yellow>"
        lore: "<gray>Modify perk configuration</gray>"
      grant_player:
        name: "<green>+ Grant to Player</green>"
        lore: "<gray>Give this perk to a player</gray>"
      revoke_player:
        name: "<red>- Revoke from Player</red>"
        lore: "<gray>Remove this perk from a player</gray>"
      reload:
        name: "<yellow>? Reload Perk</yellow>"
        lore: "<gray>Reload perk from configuration</gray>"

  # Perk messages
  messages:
    activated: "<green>? Activated perk: <white>%perk_name%</white></green>"
    deactivated: "<yellow>? Deactivated perk: <white>%perk_name%</white></yellow>"
    unlocked: "<green>?? Unlocked perk: <white>%perk_name%</white>!</green>"
    already_active: "<yellow>? Perk <white>%perk_name%</white> is already active</yellow>"
    already_owned: "<yellow>? You already own <white>%perk_name%</white></yellow>"
    on_cooldown: "<red>? Perk <white>%perk_name%</white> is on cooldown for %time_remaining%</red>"
    requirements_not_met: "<red>? Requirements not met for <white>%perk_name%</white></red>"
    max_active_reached: "<red>? Maximum active perks reached (%count%/%max%)</red>"
    activation_failed: "<red>? Failed to activate <white>%perk_name%</white></red>"
    deactivation_failed: "<red>? Failed to deactivate <white>%perk_name%</white></red>"
    unlock_failed: "<red>? Failed to unlock <white>%perk_name%</white></red>"
    coming_soon: "<yellow>? This feature is coming soon!</yellow>"

  # Perk admin messages
  admin:
    granted: "<green>? Granted perk <white>%perk_name%</white> to <white>%player%</white></green>"
    revoked: "<yellow>? Revoked perk <white>%perk_name%</white> from <white>%player%</white></yellow>"
    enabled: "<green>? Enabled perk <white>%perk_name%</white> for <white>%player%</white></green>"
    disabled: "<yellow>? Disabled perk <white>%perk_name%</white> for <white>%player%</white></yellow>"

  # Perk states
  state:
    active: "<green>?</green> <white>Active</white>"
    available: "<green>?</green> <white>Available</white>"
    locked: "<red>?</red> <gray>Locked</gray>"
    cooldown: "<yellow>?</yellow> <white>Cooldown</white>"
    disabled: "<dark_gray>?</dark_gray> <gray>Disabled</gray>"

  # Perk categories
  category:
    combat: "<red>?</red> Combat"
    utility: "<yellow>??</yellow> Utility"
    movement: "<aqua>?</aqua> Movement"
    mining: "<gray>?</gray> Mining"
    passive: "<green>?</green> Passive"
    economic: "<gold>??</gold> Economic"

  # Individual perk definitions
  double_experience:
    name: "<yellow>Double Experience</yellow>"
    lore: "<gray>Doubles all experience gained from any source.</gray>"
  fire_resistance:
    name: "<yellow>Fire Resistance</yellow>"
    lore: "<gray>Grants immunity to fire and lava damage.</gray>"
  fly:
    name: "<yellow>Flight</yellow>"
    lore: "<gray>Grants the ability to fly freely.</gray>"
  haste:
    name: "<yellow>Haste</yellow>"
    lore: "<gray>Increases mining and attack speed significantly.</gray>"
  jump_boost:
    name: "<yellow>Jump Boost</yellow>"
    lore: "<gray>Increases jump height to reach higher places.</gray>"
  luck:
    name: "<yellow>Luck</yellow>"
    lore: "<gray>Improves the quality and quantity of loot you receive.</gray>"
  night_vision:
    name: "<yellow>Night Vision</yellow>"
    lore: "<gray>Allows you to see clearly in complete darkness.</gray>"
  prevent_death:
    name: "<yellow>Prevent Death</yellow>"
    lore: "<gray>Prevents death once per cooldown and restores health.</gray>"
  regeneration:
    name: "<yellow>Regeneration</yellow>"
    lore: "<gray>Gradually restores your health over time.</gray>"
  resistance:
    name: "<yellow>Resistance</yellow>"
    lore: "<gray>Reduces incoming damage from all sources.</gray>"
  speed:
    name: "<yellow>Speed Boost</yellow>"
    lore: "<gray>Greatly increases your movement speed.</gray>"
  strength:
    name: "<yellow>Strength</yellow>"
    lore: "<gray>Boosts melee damage output in combat.</gray>"
  treasure_hunter:
    name: "<yellow>Treasure Hunter</yellow>"
    lore: "<gray>Grants a chance to discover bonus ore while mining.</gray>"
  vampire:
    name: "<yellow>Vampire</yellow>"
    lore: "<gray>Heals you whenever you damage your foes.</gray>"
  water_breathing:
    name: "<yellow>Water Breathing</yellow>"
    lore: "<gray>Lets you breathe underwater indefinitely.</gray>"

  entry:
    name: "<yellow>%perk%</yellow> %status%"

# === Rank System ===
rank:
  # Rank notifications
  notification:
    fallback:
      title: "Failed to retrieve translation title key. Check language file."
      subtitle: "Failed to retrieve translation subtitle key. Check language file."
      action_bar: "Failed to retrieve translation action bar key. Check language"

  # RankMainView - getKey() = "rank_main_ui"
