  # === Rank Requirement Detail View ===
  # RankRequirementDetailView i18n keys
  rank_requirement_detail_ui:
    # View title
    title: "<gradient:#4CAF50:#2196F3>Requirement Details</gradient> <gray>-</gray> <white>%requirement_type%</white>"

    # Progress related keys
    progress_text: "<gray>Progress:</gray>"
    current_progress: "<white>Current:</white> <yellow>%current_amount%</yellow><gray>/</gray><green>%required_amount%</green>"
    current_progress_percentage: "<white>Progress:</white> <green>%progress_percentage%</green>"
    required_amount_left: "<white>Still needed:</white> <red>%required_amount%</red>"
    progress_completed: "<green>✓ Completed!</green>"
    in_progress: "<yellow>⚡ In Progress</yellow>"
    progress_not_started: "<red>✗ Not Started</red>"
    progress_details: "<gray>Item #%item_number% details</gray>"

    # Summary section
    summary:
      items_completed: "<white>Items completed:</white> <green>%completed_item_amount%</green><gray>/</gray><yellow>%total_item_amount%</yellow>"
      requirement_type: "<white>Type:</white> <aqua>%type%</aqua>"
      progress_percentage: "<white>Progress:</white> <green>%completion_progress_percentage%</green>"
      completion_status: "<white>Status:</white> <yellow>%completion_status%</yellow>"
      requirement_summary:
        name: "<gradient:#FFD700:#FFA500>📊 Requirement Summary</gradient>"
      requirement_tip:
        name: "<gradient:#4CAF50:#8BC34A>💡 Tips & Hints</gradient>"

    current_progress_summary: "<gradient:#2196F3:#03DAC6>📈 Progress Summary</gradient>"
    current_progress_status: "<white>Status:</white> <yellow>%progress_status%</yellow>"

    # Item requirement tips
    item_requirement:
      tip:
        - "<white>💡 <gradient:#4CAF50:#8BC34A>Item Collection Tips</gradient></white>"
        - ""
        - "<gray>• Collect the required items in your inventory</gray>"
        - "<gray>• Items must match exactly (type, amount)</gray>"
        - "<gray>• Progress is tracked automatically</gray>"
        - "<gray>• You can view detailed progress above</gray>"
        - ""
        - "<yellow>⚡ Tip:</yellow> <white>Organize items in chests for easy access!</white>"

    # Requirement tips by type
    requirement_tip:
      currency:
        - "<white>💰 <gradient:#FFD700:#FFA500>Currency Tips</gradient></white>"
        - ""
        - "<gray>• Earn money through various activities</gray>"
        - "<gray>• Check /balance to see current amount</gray>"
        - "<gray>• Money is deducted when requirement is completed</gray>"
        - ""
        - "<yellow>⚡ Tip:</yellow> <white>Save up gradually over time!</white>"

      experience_level:
        - "<white>⭐ <gradient:#4CAF50:#8BC34A>Experience Tips</gradient></white>"
        - ""
        - "<gray>• Gain XP through mining, fighting, farming</gray>"
        - "<gray>• Experience levels are consumed on completion</gray>"
        - "<gray>• Check your XP bar for current level</gray>"
        - ""
        - "<yellow>⚡ Tip:</yellow> <white>Build an XP farm for faster leveling!</white>"

      playtime:
        - "<white>⏰ <gradient:#2196F3:#03DAC6>Playtime Tips</gradient></white>"
        - ""
        - "<gray>• Simply play on the server to progress</gray>"
        - "<gray>• Time is tracked automatically</gray>"
        - "<gray>• AFK time may not count towards progress</gray>"
        - ""
        - "<yellow>⚡ Tip:</yellow> <white>Stay active for best progress!</white>"

      other:
        - "<white>📋 <gradient:#9C27B0:#673AB7>General Tips</gradient></white>"
        - ""
        - "<gray>• Follow the requirement instructions</gray>"
        - "<gray>• Progress is tracked automatically</gray>"
        - "<gray>• Contact staff if you need help</gray>"
        - ""
        - "<yellow>⚡ Tip:</yellow> <white>Check back regularly for updates!</white>"

    # Click messages
    summary_clicked: "<green>📊 Summary information displayed above!</green>"
    tips_clicked: "<green>💡 Tips and hints shown above!</green>"

    # Item detail messages
    item_detail:
      header: "<gradient:#4CAF50:#2196F3>📦 Item Details</gradient> <gray>-</gray> <white>%item_name% #%item_number%</white>"
      progress: "<white>Progress:</white> <yellow>%current%</yellow><gray>/</gray><green>%required%</green> <gray>(%percentage%)</gray>"
      missing: "<white>Missing:</white> <red>%shortage%</red> <gray>more needed</gray>"

    # Requirement info section
    requirement_info:
      requirement_type: "<white>Requirement Type:</white> <aqua>%type%</aqua>"
      progress_percentage: "<white>Completion:</white> <green>%completion_progress_percentage%</green>"
      completion_status: "<white>Status:</white> <yellow>%completion_status%</yellow>"
      missing_items:
        item: "<white>Missing Items:</white>"
        more: "<gray>... and %item_amount% more items</gray>"
        items:
          - "<gray>%item_1%</gray>"
