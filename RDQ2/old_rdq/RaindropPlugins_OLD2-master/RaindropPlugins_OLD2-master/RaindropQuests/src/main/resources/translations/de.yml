translations:
  # Soft Depends
  rq:
    no_luckperms_installed: "<gradient:#9b59b6:#ffffff>LuckPerms not found. Install plugin to use feature.</gradient>"

  # Pagination buttons
  paginated_player_ui:
    title: "<gradient:#9b59b6:#ffffff>Available Players</gradient>"
    player_entry:
      name: "%player_name%"

  # General prefix used throughout the plugin
  prefix:
    - "<gradient:#9b59b6:#ffffff>✦ RDQImpl ✦</gradient> <color:#9b59b6>|</color> <color:#ffffff>"

  # === Forge Section ===
  forge:
    cooldown_active: "<gradient:#9b59b6:#ffffff>Cooldown: <white>%rdq_seconds%</white></gradient>"
    incorrect_block_info: "<gradient:#9b59b6:#ffffff>Incorrect block information.</gradient>"
    structure_incomplete: "<gradient:#9b59b6:#ffffff>The structure is <red>incomplete</red>.</gradient>"
    structure_complete: "<gradient:#9b59b6:#ffffff>The structure is <green>complete</green>!</gradient>"

  # === Head UI ===
  head:
    return:
      name: "<gradient:#9b59b6:#ffffff>Return</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Click here to return</gradient>"
    proceed:
      name: "<gradient:#9b59b6:#ffffff>Proceed</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Click here to proceed</gradient>"
    next:
      name: "<gradient:#9b59b6:#ffffff>Next</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Go to the next page</gradient>"
    previous:
      name: "<gradient:#9b59b6:#ffffff>Previous</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Go to the previous page</gradient>"
    page:
      name: "<gradient:#9b59b6:#ffffff>Page: %page%</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>%first_page% - %page% - %max_page%</gradient>"

  # === Bounty Creation UI ===
  bounty_creation_ui:
    title: "<gradient:#9b59b6:#ffffff>Bounty Creation View <white>%current_page%</white> / <white>%max_page%</white></gradient>"
    title_selected: "<gradient:#9b59b6:#ffffff>Bounty - <white>%player_name%</white></gradient>"
    confirm:
      confirm: "<gradient:#9b59b6:#ffffff>Create Bounty</gradient>"
      error: "<gradient:#9b59b6:#ffffff>Error creating bounty for <red>%target_name%</red></gradient>"
      success: "<gradient:#9b59b6:#ffffff>Bounty successfully created for <green>%target_name%</green></gradient>"
      name: "<gradient:#9b59b6:#ffffff>Confirm Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Alerts everyone a bounty as been set!</gradient>"
      no_player: "<gradient:#9b59b6:#ffffff><red>You must select a target player before confirming.</red></gradient>"
      no_reward: "<gradient:#9b59b6:#ffffff><red>You must add at least one reward item before confirming.</red></gradient>"
    add_items:
      name: "<gradient:#9b59b6:#ffffff>Add Reward Items</gradient>"
      disabled: "<gradient:#9b59b6:#ffffff><red>Add Reward Items <gray>(Select a target first)</gray></red></gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Add item rewards to incentivize the kill!</gradient>"
    add_currency:
      name: "<gradient:#9b59b6:#ffffff>Add Currency Reward</gradient>"
      disabled: "<gradient:#9b59b6:#ffffff><red>Add Currency Reward <gray>(Select a target first)</gray></red></gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Add economic value to the kill!</gradient>"
    select_target:
      title: "<gradient:#9b59b6:#ffffff>Bounty Creation Menu</gradient>"
      name: "<gradient:#9b59b6:#ffffff>Create a Bounty</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Choose a player to place a bounty on.</gradient>"
        - "<gradient:#9b59b6:#ffffff>Current: <white>%target_name%</white></gradient>"

  # === Bounty Reward UI ===
  bounty_reward_ui:
    title: "<gradient:#9b59b6:#ffffff>Bounty Rewards</gradient>"
    pseudo:
      name: "<gray>No Rewards</gray>"
      lore: "<gray>No rewards have been added yet.</gray>"
    input_slot:
      name: "<gradient:#9b59b6:#ffffff>Insert Reward</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Place an item here to add it as a reward.</gradient>"
    left_overs: "<gradient:#9b59b6:#ffffff>Some items could not be returned to your inventory and were dropped at your feet.</gradient>"
    reward_item:
      lore: "<gray>Reward contributed by <white>%contributor%</white></gray>"
    target:
      name: "<gradient:#9b59b6:#ffffff>Bounty Target: <white>%target_name%</white></gradient>"
      lore: "<gray>The player who will receive the bounty.</gray>"
    no_new_items_inserted: "<gradient:#9b59b6:#ffffff>You have to insert at least 1 new reward to move on further.</gradient>"

  # === Bounty Overview UI ===
  bounty_overview_ui:
    title: "<gradient:#9b59b6:#ffffff>Bounties Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>View and manage all bounties.</gradient>"
    bounty:
      name: "<gradient:#9b59b6:#ffffff>%target_name%</gradient>"
      lore:
        - "<gradient:#9b59b6:#ffffff>Information</gradient>"
        - "<gradient:#9b59b6:#ffffff>- %target_name%</gradient>"
        - "<gradient:#9b59b6:#ffffff>- Created by %commissioner_name% at %created_at%</gradient>"
    create_bounty:
      name: "<gradient:#9b59b6:#ffffff>Create Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Initiate a bounty on another player</gradient>"
    delete_bounty:
      name: "<gradient:#9b59b6:#ffffff>Delete Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Delete an open bounty</gradient>"
    deleted_bounty_successfully: "<gradient:#9b59b6:#ffffff>Bounty (#%bounty_id%) of target %target_name% with uuid %target_uniqueId% has been forcefully deleted.</gradient>"

  bounty_player_info_ui:
    title: "Viewing Bounty - %target_name%"
    target:
      name: "%player_name%"
    delete:
      name: "<gradient:#9b59b6:#ffffff>Delete Bounty</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>Delete an open bounty</gradient>"
    rewards:
      name: "<gradient:#9b59b6:#ffffff>Bounty Rewards</gradient>"
      lore: "<gradient:#9b59b6:#ffffff>View or add rewards to bounty</gradient>"

  # === Bounty Messages ===
  bounty:
    claimed:
      player: "<gradient:#9b59b6:#ffffff>You claimed the bounty on <green>%target_name%</green></gradient>"
      broadcast: "<gradient:#9b59b6:#ffffff><gold>%receiver_name%</gold> has claimed the bounty on <green>%target_name%</green>!</gradient>"
    created:
      broadcast: "<gradient:#9b59b6:#ffffff><gold>%commissioner_name%</gold> has opened a bounty on <green>%target_name%</green>!</gradient>"
    display:
      player_list_name: "<gradient:#9b59b6:#ffffff>%bounty_symbol% %player_name%</gradient>"
      player_display_name: "<gradient:#9b59b6:#ffffff>%bounty_symbol% %player_name%</gradient> <reset>"

  # === Paginated Player UI ===
  paginated_player_view:
    title: "<gradient:#9b59b6:#ffffff>Select Player <white>%current_page%</white> / <white>%max_page%</white></gradient>"
    player_entry:
      name: "<white>%player_name%</white>"
      lore:
        - "<gray>Click to select this player as the bounty target.</gray>"
    no_players: "<gray>No players available to select.</gray>"

  # === Main Overview UI ===
  main_overview_ui:
    title: "<gradient:#9b59b6:#ffffff>Main Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>RDQImpl Main Menu</gradient>"

  # === Perk Overview UI ===
  perk_overview_ui:
    title: "<gradient:#9b59b6:#ffffff>Perks Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>Obtain perks to enhance gameplay</gradient>"

  # === Quest Overview UI ===
  quest_overview_ui:
    title: "<gradient:#9b59b6:#ffffff>Quests Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>Complete quests and earn raindrops</gradient>"

  # === Ranks ===
  rank:
    notification:
      fallback:
        title: "Failed to retrieve translation title key. Check language file."
        subtitle: "Failed to retrieve translation subtitle key. Check language file."
        action_bar: "Failed to retrieve translation action bar key. Check language"
    cleric:
      acolyte:
        name: "<bold><gradient:#9b59b6:#bd7cd8>Acolyte</gradient></bold>"
        lore:
          - "<italic><gradient:#b98ad6:#ffffff>A humble initiate beginning their spiritual journey.</gradient></italic>"
          - "<italic><gradient:#b98ad6:#ffffff>Acolytes assist higher clerics and</gradient></italic>"
          - "<italic><gradient:#b98ad6:#ffffff>learn the basic rites of their order.</gradient></italic>"
      devotee:
        name: "<bold><gradient:#a066cc:#c999e2>Devotee</gradient></bold>"
        lore:
          - "<italic><gradient:#c099dc:#ffffff>With unwavering faith, Devotees commit themselves</gradient></italic>"
          - "<italic><gradient:#c099dc:#ffffff>to a divine path. They perform minor blessings</gradient></italic>"
          - "<italic><gradient:#c099dc:#ffffff>and uphold sacred duties within their community.</gradient></italic>"
      priest:
        name: "<bold><gradient:#b175d9:#d5b4eb>Priest</gradient></bold>"
        lore:
          - "<italic><gradient:#ccaee5:#ffffff>Ordained into service, Priests wield the</gradient></italic>"
          - "<italic><gradient:#ccaee5:#ffffff>authority of their order. They lead prayers, offer</gradient></italic>"
          - "<italic><gradient:#ccaee5:#ffffff>guidance, and channel healing energies to aid others.</gradient></italic>"
      healer:
        name: "<bold><gradient:#c285e5:#e1cdf3>Healer</gradient></bold>"
        lore:
          - "<italic><gradient:#d7c3ee:#ffffff>Compassion flows through the Healer's touch.</gradient></italic>"
          - "<italic><gradient:#d7c3ee:#ffffff>Masters of restorative arts, they mend wounds</gradient></italic>"
          - "<italic><gradient:#d7c3ee:#ffffff>both physical and spiritual, often sought</gradient></italic>"
          - "<italic><gradient:#d7c3ee:#ffffff>in times of crisis.</gradient></italic>"
      bishop:
        name: "<bold><gradient:#d395f2:#ebdff9>Bishop</gradient></bold>"
        lore:
          - "<italic><gradient:#e3d7f5:#ffffff>A leader of faith and wisdom,</gradient></italic>"
          - "<italic><gradient:#e3d7f5:#ffffff>Bishops oversee others in the order, spread</gradient></italic>"
          - "<italic><gradient:#e3d7f5:#ffffff>divine teachings, and invoke</gradient></italic>"
          - "<italic><gradient:#e3d7f5:#ffffff>stronger blessings in the name of their deity.</gradient></italic>"
      oracle:
        name: "<bold><gradient:#e4a4ff:#f6effd>Oracle</gradient></bold>"
        lore:
          - "<italic><gradient:#eddaf9:#ffffff>Touched by visions and prophecy,</gradient></italic>"
          - "<italic><gradient:#eddaf9:#ffffff>Oracles glimpse truths beyond the mortal veil.</gradient></italic>"
          - "<italic><gradient:#eddaf9:#ffffff>Their words carry weight,</gradient></italic>"
          - "<italic><gradient:#eddaf9:#ffffff>and their power shapes the fate of many.</gradient></italic>"
      high_priest:
        name: "<bold><gradient:#f0bfff:#ffffff>High Priest</gradient></bold>"
        lore:
          - "<italic><gradient:#f6ecfc:#ffffff>The pinnacle of divine connection,</gradient></italic>"
          - "<italic><gradient:#f6ecfc:#ffffff>High Priests are the chosen voices of their god.</gradient></italic>"
          - "<italic><gradient:#f6ecfc:#ffffff>They radiate sacred energy, command miracles,</gradient></italic>"
          - "<italic><gradient:#f6ecfc:#ffffff>and lead the faithful with unparalleled grace.</gradient></italic>"

    mage:
      apprentice:
        name: "<bold><gradient:#341f97:#5f27cd>Apprentice</gradient></bold>"
        lore:
          - "<italic><gradient:#6e4cc9:#ffffff>New to the arcane world, Apprentices study</gradient></italic>"
          - "<italic><gradient:#6e4cc9:#ffffff>basic spellcraft and magical theory under</gradient></italic>"
          - "<italic><gradient:#6e4cc9:#ffffff>the guidance of seasoned mentors. The spark</gradient></italic>"
          - "<italic><gradient:#6e4cc9:#ffffff>of potential is just beginning to flicker.</gradient></italic>"
      scholar:
        name: "<bold><gradient:#5f27cd:#706fd3>Scholar</gradient></bold>"
        lore:
          - "<italic><gradient:#8573d6:#ffffff>Having mastered fundamentals, Scholars delve</gradient></italic>"
          - "<italic><gradient:#8573d6:#ffffff>deep into magical texts, absorbing lore and</gradient></italic>"
          - "<italic><gradient:#8573d6:#ffffff>practicing controlled spellcasting.</gradient></italic>"
          - "<italic><gradient:#8573d6:#ffffff>Their minds expand with ancient truths.</gradient></italic>"
      elementalist:
        name: "<bold><gradient:#706fd3:#3ae374>Elementalist</gradient></bold>"
        lore:
          - "<italic><gradient:#5ed09f:#ffffff>Now attuned to the natural forces,</gradient></italic>"
          - "<italic><gradient:#5ed09f:#ffffff>Elementalists wield fire, frost, wind, and earth.</gradient></italic>"
          - "<italic><gradient:#5ed09f:#ffffff>Their magic surges with primal energy,</gradient></italic>"
          - "<italic><gradient:#5ed09f:#ffffff>dangerous but thrilling.</gradient></italic>"
      enchanter:
        name: "<bold><gradient:#3ae374:#12cbc4>Enchanter</gradient></bold>"
        lore:
          - "<italic><gradient:#32b6b0:#ffffff>With a delicate touch, Enchanters imbue</gradient></italic>"
          - "<italic><gradient:#32b6b0:#ffffff>objects with magic and alter the properties of</gradient></italic>"
          - "<italic><gradient:#32b6b0:#ffffff>the world around them. Their spellwork</gradient></italic>"
          - "<italic><gradient:#32b6b0:#ffffff>weaves enchantment into the mundane.</gradient></italic>"
      sorcerer:
        name: "<bold><gradient:#12cbc4:#9980fa>Sorcerer</gradient></bold>"
        lore:
          - "<italic><gradient:#8f88e8:#ffffff>No longer bound by books alone, Sorcerers</gradient></italic>"
          - "<italic><gradient:#8f88e8:#ffffff>channel raw magical force through will alone.</gradient></italic>"
          - "<italic><gradient:#8f88e8:#ffffff>Their power is instinctive,</gradient></italic>"
          - "<italic><gradient:#8f88e8:#ffffff>flowing from deep within.</gradient></italic>"
      wizard:
        name: "<bold><gradient:#9980fa:#f368e0>Wizard</gradient></bold>"
        lore:
          - "<italic><gradient:#d493f2:#ffffff>Wizards are disciplined spellcasters,</gradient></italic>"
          - "<italic><gradient:#d493f2:#ffffff>masters of magical theory and practice.</gradient></italic>"
          - "<italic><gradient:#d493f2:#ffffff>Their incantations are precise,</gradient></italic>"
          - "<italic><gradient:#d493f2:#ffffff>their power vast, their minds razor-sharp.</gradient></italic>"
      archmage:
        name: "<bold><gradient:#f368e0:#feca57>Archmage</gradient></bold>"
        lore:
          - "<italic><gradient:#f9b872:#ffffff>The pinnacle of arcane mastery. Archmages</gradient></italic>"
          - "<italic><gradient:#f9b872:#ffffff>bend reality, unravel mysteries of the cosmos,</gradient></italic>"
          - "<italic><gradient:#f9b872:#ffffff>and stand as paragons of magical</gradient></italic>"
          - "<italic><gradient:#f9b872:#ffffff>power. They are legend incarnate.</gradient></italic>"

    merchant:
      trader:
        name: "<bold><gradient:#a67c00:#d4af37>Trader</gradient></bold>"
        lore:
          - "<italic><gradient:#c4a44c:#ffffff>Just starting out, Traders barter goods and</gradient></italic>"
          - "<italic><gradient:#c4a44c:#ffffff>learn the basics of negotiation and value.</gradient></italic>"
      vendor:
        name: "<bold><gradient:#d4af37:#e1c16e>Vendor</gradient></bold>"
        lore:
          - "<italic><gradient:#ddbb5f:#ffffff>Vendors set up shop and begin to attract a</gradient></italic>"
          - "<italic><gradient:#ddbb5f:#ffffff>steady stream of customers, refining their market skills.</gradient></italic>"
      artificer:
        name: "<bold><gradient:#e1c16e:#b08d57>Artificer</gradient></bold>"
        lore:
          - "<italic><gradient:#c49d63:#ffffff>Artificers craft unique items of high value,</gradient></italic>"
          - "<italic><gradient:#c49d63:#ffffff>combining skill and creativity to supply rare goods.</gradient></italic>"
      alchemist:
        name: "<bold><gradient:#b08d57:#7d6608>Alchemist</gradient></bold>"
        lore:
          - "<italic><gradient:#9a7f3b:#ffffff>Blending science with commerce,</gradient></italic>"
          - "<italic><gradient:#9a7f3b:#ffffff>Alchemists turn base materials into</gradient></italic>"
          - "<italic><gradient:#9a7f3b:#ffffff>gold—literally and figuratively.</gradient></italic>"
      master_crafter:
        name: "<bold><gradient:#7d6608:#d68910>Master Crafter</gradient></bold>"
        lore:
          - "<italic><gradient:#c98f3c:#ffffff>Masters of their trade, these artisans produce</gradient></italic>"
          - "<italic><gradient:#c98f3c:#ffffff>legendary goods sought by nobles and adventurers alike.</gradient></italic>"
      merchant_prince:
        name: "<bold><gradient:#d68910:#f9ca24>Merchant Prince</gradient></bold>"
        lore:
          - "<italic><gradient:#f1bc3a:#ffffff>With caravans and contracts spanning nations,</gradient></italic>"
          - "<italic><gradient:#f1bc3a:#ffffff>Merchant Princes command wealth rivaling kings.</gradient></italic>"
      guild_master:
        name: "<bold><gradient:#f9ca24:#fff200>Guild Master</gradient></bold>"
        lore:
          - "<italic><gradient:#fce94a:#ffffff>At the summit of commerce, the Guild Master</gradient></italic>"
          - "<italic><gradient:#fce94a:#ffffff>oversees vast trade empires,</gradient></italic>"
          - "<italic><gradient:#fce94a:#ffffff>broker alliances, and shape economies.</gradient></italic>"

    ranger:
      hunter:
        name: "<bold><gradient:#145a32:#196f3d>Hunter</gradient></bold>"
        lore:
          - "<italic><gradient:#2d7a43:#ffffff>A primal stalker of the forest,</gradient></italic>"
          - "<italic><gradient:#2d7a43:#ffffff>skilled in tracking and surviving the wilderness.</gradient></italic>"
      archer:
        name: "<bold><gradient:#196f3d:#1e8449>Archer</gradient></bold>"
        lore:
          - "<italic><gradient:#3b8f50:#ffffff>An expert with the bow,</gradient></italic>"
          - "<italic><gradient:#3b8f50:#ffffff>precise and patient in battle and in the hunt.</gradient></italic>"
      tracker:
        name: "<bold><gradient:#1e8449:#229954>Tracker</gradient></bold>"
        lore:
          - "<italic><gradient:#4ea863:#ffffff>A master of footprints, broken twigs,</gradient></italic>"
          - "<italic><gradient:#4ea863:#ffffff>and silent movement through any terrain.</gradient></italic>"
      marksman:
        name: "<bold><gradient:#229954:#28b463>Marksman</gradient></bold>"
        lore:
          - "<italic><gradient:#5ac675:#ffffff>With deadly accuracy,</gradient></italic>"
          - "<italic><gradient:#5ac675:#ffffff>the Marksman can drop prey from great distances.</gradient></italic>"
      pathfinder:
        name: "<bold><gradient:#28b463:#52be80>Path Finder</gradient></bold>"
        lore:
          - "<italic><gradient:#6ecf91:#ffffff>Skilled in navigation, they uncover</gradient></italic>"
          - "<italic><gradient:#6ecf91:#ffffff>hidden trails and lead others through peril.</gradient></italic>"
      sniper:
        name: "<bold><gradient:#52be80:#82e0aa>Sniper</gradient></bold>"
        lore:
          - "<italic><gradient:#88dcaa:#ffffff>From the treetops or cliffs,</gradient></italic>"
          - "<italic><gradient:#88dcaa:#ffffff>the Sniper strikes unseen with lethal focus.</gradient></italic>"
      forest_lord:
        name: "<bold><gradient:#82e0aa:#abebc6>Forest Lord</gradient></bold>"
        lore:
          - "<italic><gradient:#a1e3b2:#ffffff>One with the wild, the Forest Lord</gradient></italic>"
          - "<italic><gradient:#a1e3b2:#ffffff>commands nature and moves as its</gradient></italic>"
          - "<italic><gradient:#a1e3b2:#ffffff>guardian and champion.</gradient></italic>"

    rogue:
      thief:
        name: "<bold><gradient:#6c5ce7:#81ecec>Thief</gradient></bold>"
        lore:
          - "<italic><gradient:#74b9ff:#ffffff>An opportunist of the shadows,</gradient></italic>"
          - "<italic><gradient:#74b9ff:#ffffff>picking pockets and escaping unseen.</gradient></italic>"
      scout:
        name: "<bold><gradient:#81ecec:#00cec9>Scout</gradient></bold>"
        lore:
          - "<italic><gradient:#55efc4:#ffffff>Light on their feet and sharp-eyed, Scouts</gradient></italic>"
          - "<italic><gradient:#55efc4:#ffffff>slip through danger to gather intelligence.</gradient></italic>"
      assassin:
        name: "<bold><gradient:#6c5ce7:#a29bfe>Assassin</gradient></bold>"
        lore:
          - "<italic><gradient:#a29bfe:#ffffff>Silent and lethal, Assassins strike from</gradient></italic>"
          - "<italic><gradient:#a29bfe:#ffffff>darkness with fatal precision.</gradient></italic>"
      infiltrator:
        name: "<bold><gradient:#a29bfe:#e84393>Infiltrator</gradient></bold>"
        lore:
          - "<italic><gradient:#fab1a0:#ffffff>Blending in, breaking through,</gradient></italic>"
          - "<italic><gradient:#fab1a0:#ffffff>and slipping out undetected.</gradient></italic>"
          - "<italic><gradient:#fab1a0:#ffffff>They're ghosts in the system.</gradient></italic>"
      shadowblade:
        name: "<bold><gradient:#e84393:#fd79a8>Shadow Blade</gradient></bold>"
        lore:
          - "<italic><gradient:#f78fb3:#ffffff>Wielding enchanted blades and cloaked in magic,</gradient></italic>"
          - "<italic><gradient:#f78fb3:#ffffff>they are death made graceful.</gradient></italic>"
      spymaster:
        name: "<bold><gradient:#00b894:#00cec9>Spy Master</gradient></bold>"
        lore:
          - "<italic><gradient:#81ecec:#ffffff>Master manipulators and tacticians, Spy Masters</gradient></italic>"
          - "<italic><gradient:#81ecec:#ffffff>control networks of secrets and agents.</gradient></italic>"
      shadowmaster:
        name: "<bold><gradient:#0984e3:#6c5ce7>Shadow Master</gradient></bold>"
        lore:
          - "<italic><gradient:#74b9ff:#ffffff>The embodiment of darkness. Shadow Masters are</gradient></italic>"
          - "<italic><gradient:#74b9ff:#ffffff>myth—neither seen nor remembered.</gradient></italic>"

    warrior:
      recruit:
        name: "<bold><gradient:#922b21:#a93226>Recruit</gradient></bold>"
        lore:
          - "<italic><gradient:#b84333:#ffffff>A novice stepping onto the battlefield,</gradient></italic>"
          - "<italic><gradient:#b84333:#ffffff>eager to prove their worth.</gradient></italic>"
      fighter:
        name: "<bold><gradient:#a93226:#c0392b>Fighter</gradient></bold>"
        lore:
          - "<italic><gradient:#c25644:#ffffff>Skilled in combat basics,</gradient></italic>"
          - "<italic><gradient:#c25644:#ffffff>Fighters hold their ground and sharpen their skills.</gradient></italic>"
      guardian:
        name: "<bold><gradient:#c0392b:#d35400>Guardian</gradient></bold>"
        lore:
          - "<italic><gradient:#d67240:#ffffff>Protectors of allies, Guardians are</gradient></italic>"
          - "<italic><gradient:#d67240:#ffffff>stalwart defenders and bastions of strength.</gradient></italic>"
      berserker:
        name: "<bold><gradient:#d35400:#e67e22>Berserker</gradient></bold>"
        lore:
          - "<italic><gradient:#df7e33:#ffffff>Fierce and unstoppable, Berserkers</gradient></italic>"
          - "<italic><gradient:#df7e33:#ffffff>channel fury into devastating blows.</gradient></italic>"
      paladin:
        name: "<bold><gradient:#e67e22:#f39c12>Paladin</gradient></bold>"
        lore:
          - "<italic><gradient:#e7a737:#ffffff>Champions of justice, Paladins</gradient></italic>"
          - "<italic><gradient:#e7a737:#ffffff>combine martial prowess with unyielding honor.</gradient></italic>"
      warlord:
        name: "<bold><gradient:#f39c12:#f5b041>Warlord</gradient></bold>"
        lore:
          - "<italic><gradient:#f1b85b:#ffffff>Commanders of armies, Warlords</gradient></italic>"
          - "<italic><gradient:#f1b85b:#ffffff>lead with strategy and overwhelming force.</gradient></italic>"
      champion:
        name: "<bold><gradient:#f5b041:#f7dc6f>Champion</gradient></bold>"
        lore:
          - "<italic><gradient:#f6d67d:#ffffff>The ultimate warrior, Champions</gradient></italic>"
          - "<italic><gradient:#f6d67d:#ffffff>are legends whose names inspire generations.</gradient></italic>"


  # === Rank Main UI ===
  rank_main_ui:
    title: "<gradient:#9b59b6:#ffffff>Ranks Menu</gradient>"
    rank_tree:
      name: "Rank Tree"
      lore: "Explore available ranks"

  # === Rank Overview UI ===
  rank_overview_ui:
    title: "<gradient:#9b59b6:#ffffff>Ranks Menu</gradient>"
    lore: "<gradient:#9b59b6:#ffffff>Gain ranks and unlock features</gradient>"

  # RankPathOverview UI Internationalization
  rank_path_overview_ui:
    title: "&6Rank Path: %rank_tree_name%"

    # Preview mode
    preview_prefix: "&7[PREVIEW]"

    # Unknown/fallback text
    unknown_tree: "Unknown Rank Tree"

    # Navigation controls
    nav:
      left: "&7← Navigate Left"
      right: "&7Navigate Right →"
