name: JExCore
version: '1.0.0'
main: de.jexcellence.core.JExCorePremium
description: Clean shared core for JExcellence / Raindrop plugins (Premium Edition)
api-version: '1.21'
author: JExcellence
website: https://jexcellence.de
loader: de.jexcellence.dependency.loader.PaperPluginLoader
# Needs to be open so downstream plugins (JExQuests, JExEconomy) can
# reach the shared sealed types in jexcore-api (Reward, Requirement,
# StatisticChangeEvent) via their paper-plugin dependencies block.
has-open-classloader: true
prefix: JExcellence
folia-supported: true
