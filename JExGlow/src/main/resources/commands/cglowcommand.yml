commands:
  cglow:
    name: 'cglow'
    description: 'Manage player glow effects from console'
    aliases:
      - consoleglow
    usage: '/cglow <on|off> <player>'
    argumentUsages:
      1$: 'lut["prefix"] & "<gray>/" & alias & " <red><on|off> <player></red></gray>"'
    errorMessages:
      malformedEnum$: |
        lut["prefix"] & "<gray>The value <red>" & value & "</red> is not valid</gray>"
      playerNotOnline$: 'lut["prefix"] & "<gray>The player <red>" & value & "</red> is <red>not online</red></gray>"'
      playerUnknown$: 'lut["prefix"] & "<gray>The player <red>" & value & "</red> has <red>not played</red> on this server before</gray>"'
      internalError$: 'lut["prefix"] & "<dark_red>An internal error occurred</dark_red>"'
      notAConsole$: 'lut["prefix"] & "<red>You can only execute this command in the console</red>"'
      notAPlayer$: 'lut["prefix"] & "<gray>This command can only be executed as a <red>player</red></gray>"'
    permissions:
      missingMessage$: 'lut["prefix"] & "<gray>You lack the permission: <red>" & permission & "</red></gray>"'
      nodes:
        default: 'jexglow.admin'

lut:
  prefix: '<gradient:#60a5fa:#3b82f6>[JExGlow]</gradient> '
